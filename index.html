[{"letter": "A", "text": "처녀막 폐쇄증(imperforate hymen)"}, {"letter": "B", "text": "자궁경부 무형성증"}, {"letter": "C", "text": "안드로겐 불응성 증후군"}, {"letter": "D", "text": "Mayer-Rokitansky-Küster-Hauser 증후군"}, {"letter": "E", "text": "자궁내막 유착증"}], "answer": "A", "explanation": "주기적 복통과 푸른빛의 질구 팽대는 월경혈이 막힌 처녀막 뒤에 저류되어 발생하는 혈자궁질증(hematocolpos)의 전형적인 소견입니다. 힘을 주면 더 돌출되는 것(Valsalva maneuver로 확인)도 처녀막 폐쇄증의 특징입니다. 치료는 십자 절개술입니다. 따라서 '처녀막 폐쇄증(imperforate hymen)'이 정답입니다. MRKH 증후군은 자궁과 상부 질이 없으나 통증이 없고 정상 외음부 소견을 보입니다. 자궁내막 유착증은 속발성 무월경의 원인입니다. 자궁경부 무형성증도 혈류 저류를 유발할 수 있지만 질구 팽대는 보이지 않습니다. AIS는 46XY로 자궁이 없고 치모가 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "14세 여아가 원발성 무월경과 매달 반복되는 하복부 통증을 호소한다. 신체 검사에서 외음부에 푸른빛을 띠는 돌출된 막이 관찰되며, 환자가 힘을 주면 더 돌출된다. 골반 초음파에서 질 내에 액체 저류가 있다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "항생제 치료"}, {"letter": "B", "text": "복강경 난소낭종절제술"}, {"letter": "C", "text": "경과관찰"}, {"letter": "D", "text": "자궁내막 생검"}, {"letter": "E", "text": "처녀막 절개술(hymenectomy)"}], "answer": "E", "explanation": "처녀막 폐쇄증(imperforate hymen)으로 인한 질혈종(hematocolpos)이 의심되며, 진단을 위해 영상 검사와 함께 처녀막 절개술을 시행하여 막힌 생식기 출구를 열어주어야 한다. 질혈종이 오래되면 자궁강 내 혈액 저류(hematometra)로 이어질 수 있으므로 조기 수술이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "16세 여성이 초경이 없어 내원하였다. 유방 발달은 Tanner 4기이며, 월경 주기에 맞춰 주기적인 하복부 통증을 호소한다. 진찰 소견에서 회음부에 푸른빛의 팽윤된 막이 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "처녀막 폐쇄증"}, {"letter": "B", "text": "안드로겐 불감성 증후군"}, {"letter": "C", "text": "자궁경부 협착증"}, {"letter": "D", "text": "횡질 중격"}, {"letter": "E", "text": "자궁내막 유착증"}], "answer": "A", "explanation": "처녀막 폐쇄증은 유방 발달이 있는 원발성 무월경 환자에서 자궁 출구 폐쇄로 인해 월경혈이 배출되지 못하여 회음부에 푸른빛 팽윤(hematocolpos)과 주기적 하복통을 유발합니다. 횡질 중격은 더 상방에 위치하여 외부 관찰이 어렵고, 자궁경부 협착증은 대개 수술 후 발생합니다. 자궁내막 유착증(Asherman syndrome)은 이차성 무월경을 유발하며, 안드로겐 불감성 증후군은 자궁이 없고 46,XY 핵형을 보입니다. 따라서 가장 가능성 있는 진단은 처녀막 폐쇄증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "MRKH (Mayer-Rokitansky-Küster-Hauser) 증후군의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "보조생식술을 통한 임신이 가능하다"}, {"letter": "B", "text": "46,XY 핵형을 보인다"}, {"letter": "C", "text": "자궁내막증 발생 위험이 높다"}, {"letter": "D", "text": "원발성 무월경과 정상적인 유방 발달을 보인다"}, {"letter": "E", "text": "서혜부에서 고환이 촉지된다"}], "answer": "D", "explanation": "MRKH 증후군은 46,XX로, Müllerian duct 무형성으로 자궁과 질 상부가 없어 원발성 무월경을 보이나 난소는 정상이므로 여성호르몬 분비로 유방 발달 등 이차성징이 정상입니다. 고환은 없고, 자궁이 없어 자궁내막증이나 임신은 불가능합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 35}, {"question": "다음 중 완전형 안드로겐 무감응 증후군(complete androgen insensitivity syndrome)과 MRKH 증후군을 감별하는 데 있어, 완전형 안드로겐 무감응 증후군에서만 관찰되는 소견은?", "options": [{"letter": "A", "text": "음모의 부재"}, {"letter": "B", "text": "원발성 무월경"}, {"letter": "C", "text": "유방 발달"}, {"letter": "D", "text": "46,XX 핵형"}, {"letter": "E", "text": "질 무형성 (짧은 맹관)"}], "answer": "A", "explanation": "완전형 안드로겐 무감응 증후군에서는 androgen receptor의 결함으로 음모 발달이 저하되어 음모가 거의 관찰되지 않습니다. 반면 MRKH 증후군에서는 난소와 부신의 안드로겐 작용으로 음모가 정상적으로 발달합니다. 질 무형성, 원발성 무월경, 유방 발달은 두 질환 모두에서 나타날 수 있고, 46,XX 핵형은 MRKH 증후군의 특징입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 35}, {"question": "MRKH 증후군으로 진단된 20세 여자 환자에게 가장 적절한 치료 방침은?", "options": [{"letter": "A", "text": "자궁 이식 수술 (uterine transplantation)"}, {"letter": "B", "text": "Gonadectomy 및 hormone 대체 요법 (gonadectomy and hormone replacement)"}, {"letter": "C", "text": "질 확장기 사용 또는 질 성형술 (vaginal dilator or vaginoplasty)"}, {"letter": "D", "text": "Estrogen 보충 요법 (estrogen replacement therapy)"}, {"letter": "E", "text": "주기적 progesterone 투여 (cyclic progesterone)"}], "answer": "C", "explanation": "MRKH 증후군 환자는 정상 난소를 가지므로 호르몬 치료는 불필요하다. 주된 문제는 질의 길이가 짧거나 무형성인 점으로, 일차적으로 질 확장기(vaginal dilator)를 사용하거나, 필요시 질 성형술(vaginoplasty, McIndoe operation 등)을 시행한다. Progesterone이나 estrogen 보충은 필요 없으며, gonadectomy 및 hormone 대체 요법은 완전형 안드로겐 무감응 증후군 환자에게 적용된다. 자궁 이식은 실험적 단계이다. 따라서 '질 확장기 사용 또는 질 성형술 (vaginal dilator or vaginoplasty)'이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 35}, {"question": "15세 여아가 심한 주기적 골반통으로 내원하였다. 외음부 검사에서 처녀막은 정상적인 구멍이 확인되나 외음부에서의 팽륜은 보이지 않는다. 초음파에서 자궁과 질 내에 혈종이 관찰된다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "MRKH 증후군"}, {"letter": "B", "text": "처녀막 폐쇄 (Hymenal atresia)"}, {"letter": "C", "text": "세로 질 중격 (한쪽 폐쇄) (Longitudinal vaginal septum with unilateral obstruction)"}, {"letter": "D", "text": "고위 가로 질 중격 (High transverse vaginal septum)"}, {"letter": "E", "text": "안드로겐 불응 증후군 (AIS)"}], "answer": "D", "explanation": "이 환자는 hematocolpos와 hematometra가 있으면서 처녀막은 정상 개방되어 있고 외음부의 팽륜이 없습니다. 이는 폐쇄 부위가 처녀막보다 높은 곳에 위치함을 의미하며, 고위 가로 질 중격(high transverse vaginal septum)의 특징입니다. 처녀막 폐쇄는 막 자체가 팽윤되는 소견을 보입니다. 세로 질 중격 한쪽 폐쇄는 생리가 다른 쪽으로 나오므로 완전히 무월경이 아니며 점차 악화되는 생리통이 특징입니다. MRKH 증후군은 자궁 자체가 없으므로 hematometra가 생기지 않습니다. AIS도 자궁이 없어 혈종이 관찰되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 36}, {"question": "30세 여성이 반복적인 조기 유산으로 내원하였다. 자궁난관조영술(HSG)에서 두 개의 자궁내강이 관찰된다. MRI에서 자궁 기저부는 부드럽고 바깥쪽 함몰은 0.5 cm이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "공상자궁(arcuate uterus)"}, {"letter": "B", "text": "단각자궁(unicornuate uterus)"}, {"letter": "C", "text": "중격자궁(septate uterus)"}, {"letter": "D", "text": "중복자궁(didelphys uterus)"}, {"letter": "E", "text": "쌍각자궁(bicornuate uterus)"}], "answer": "C", "explanation": "HSG에서 두 개의 자궁내강이 보이고 MRI에서 자궁 외부 기저부가 부드럽고 함몰이 0.5 cm로 얕은 것은 중격자궁의 전형적인 소견입니다. 중격자궁은 내부 중격으로 인해 두 개의 강을 보이지만 외부 윤곽은 거의 정상이거나 함몰이 1 cm 미만입니다. 쌍각자궁은 기저부 함몰이 1 cm 이상 깊게 파입니다. 단각자궁은 하나의 자궁각만 있습니다. 중복자궁은 두 개의 자궁체부와 자궁경부로 완전히 분리됩니다. 공상자궁은 기저부 함몰이 1 cm 미만이지만 중격이 없으므로 HSG에서 두 개의 강이 보이지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "쌍각자궁(bicornuate uterus)의 자궁 기저부 함몰이 1 cm 이상인 환자에서 수술적 교정을 원할 때 시행하는 가장 적절한 술식은?", "options": [{"letter": "A", "text": "자궁경하 중격 절제술"}, {"letter": "B", "text": "양측 자궁각 절제술"}, {"letter": "C", "text": "질 중격 절제술"}, {"letter": "D", "text": "십자절개 배액술"}, {"letter": "E", "text": "쐐기절제 후 자궁근층 재봉합"}], "answer": "E", "explanation": "쌍각자궁의 수술적 교정은 자궁성형술(metroplasty)로, 이는 두 뿔 사이의 조직을 쐐기 모양으로 절제한 후 자궁근층을 재봉합하여 하나의 자궁강을 만드는 술식입니다. 자궁경하 중격 절제술은 중격자궁에서 시행합니다. 질 중격 절제술은 질 중격 폐쇄 시 시행합니다. 십자절개 배액술은 처녀막 폐쇄의 치료입니다. 양측 자궁각 절제술은 표준 술식이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "자궁난관조영술(HSG)에서 V자 형태의 두 개의 자궁내강이 관찰되는 반복 유산 환자에서, 자궁 기저부의 외형을 평가하여 쌍각자궁과 중격자궁을 감별하기 위해 가장 유용한 검사는?", "options": [{"letter": "A", "text": "복강경"}, {"letter": "B", "text": "자궁경"}, {"letter": "C", "text": "자궁난관조영술 (HSG)"}, {"letter": "D", "text": "골반 MRI"}, {"letter": "E", "text": "초음파 (2차원)"}], "answer": "D", "explanation": "HSG는 자궁 내강의 모양만을 보여주므로 바깥 윤곽을 평가할 수 없다. 쌍각자궁은 자궁 기저부가 깊게 파여 있고(1 cm 이상 함몰), 중격자궁은 기저부가 부드럽게 볼록하거나 약간만 파인다. 골반 MRI는 자궁의 장막면과 기저부 함몰 정도를 명확히 보여주어 두 질환을 가장 정확히 감별할 수 있다. 강의에서도 MRI를 통한 겉모습 확인을 강조하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "25세 여성이 불임 평가로 시행한 초음파에서 우측은 정상 난소와 나팔관이 관찰되나 좌측 부속기는 식별되지 않으며, 자궁은 우측으로 편향된 작은 크기의 단각 형태를 보인다. 가장 가능성이 높은 자궁 기형은?", "options": [{"letter": "A", "text": "공상자궁"}, {"letter": "B", "text": "중복자궁"}, {"letter": "C", "text": "단각자궁"}, {"letter": "D", "text": "쌍각자궁"}, {"letter": "E", "text": "중격자궁"}], "answer": "C", "explanation": "단각자궁(unicornuate uterus)은 한쪽 뮐러관만 발달하여 자궁이 하나의 뿔 형태로 편향되고 반대편 나팔관과 자궁각이 없는 기형이다. 초음파에서 한쪽 부속기가 식별되지 않고 자궁이 작고 치우친 모양으로 관찰되는 것이 전형적이다. 중격자궁이나 쌍각자궁은 두 개의 자궁내강이 보이고, 중복자궁은 두 개의 자궁체부가 따로 존재하며, 공상자궁은 기저부가 살짝 들어간 정상 변이로 이러한 소견과 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "임신 23주인 32세 산모가 무증상으로 산전 진찰을 받던 중, 질식 초음파 검사에서 자궁경부 길이가 13mm로 측정되었고, 자궁경부 내구가 열리며 양막이 돌출된 것이 관찰되었다. 자궁 수축은 없으며 질 출혈도 없다. 과거 임신에서 19주에 무통성 자궁경부 개대로 인한 유산의 병력이 있다. 이 산모에게 가장 적절한 처치는?", "options": [{"letter": "A", "text": "경과 관찰"}, {"letter": "B", "text": "자궁 수축 억제제 투여"}, {"letter": "C", "text": "프로게스테론 질정 투여"}, {"letter": "D", "text": "응급 제왕절개술"}, {"letter": "E", "text": "자궁경부 원형 묶음술"}], "answer": "E", "explanation": "과거 임신에서 무통성 자궁경부 개대로 인한 유산의 병력이 있고, 현재 초음파에서 자궁경부 길이 단축 및 자궁경부 내구 열림, 양막 돌출이 보이며 자궁 수축이 없으므로 자궁경부 무력증(cervical insufficiency)이 강력히 의심된다. 이러한 경우 자궁경부 원형 묶음술(cerclage)을 시행하여 조산을 예방할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "임신 32주 산모가 5분 간격의 규칙적인 자궁수축을 주소로 내원하였다. 태아는 둔위, 양수지수 10 cm, 니트라진 검사 음성, 자궁경부 2 cm 개대, 80% 소실되어 있다. 태아심박동은 양호하다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "자궁수축억제제 투여"}, {"letter": "B", "text": "질식 분만 유도"}, {"letter": "C", "text": "긴급 제왕절개술"}, {"letter": "D", "text": "인공 양수 주입술"}, {"letter": "E", "text": "양수내 감염 예방을 위한 항생제 투여"}], "answer": "A", "explanation": "만삭 전 진통에서 분만이 임박한 경우 자궁수축억제제를 투여하여 태아 폐성숙을 위한 스테로이드 투여 시간을 확보하는 것이 원칙이다. 둔위이지만 태아 상태가 양호하고 자궁내 감염 증거가 없으므로 즉각적인 제왕절개술은 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "완전형 안드로겐 무감응 증후군(complete androgen insensitivity syndrome)으로 진단된 17세 여자 환자에게 권고할 향후 관리로 가장 적절한 것은?", "options": [{"letter": "A", "text": "정기적 testis 초음파로 감시만 시행"}, {"letter": "B", "text": "Orchidopexy 및 fertility 보존"}, {"letter": "C", "text": "소아기 gonadectomy와 testosterone 투여"}, {"letter": "D", "text": "사춘기 완료 후 gonadectomy와 estrogen 투여"}, {"letter": "E", "text": "Antiandrogen 약물 치료"}], "answer": "D", "explanation": "완전형 AIS 환자는 46XY 핵형으로, 복강 또는 서혜부에 고환(testis)이 존재한다. 이 고환은 20대 이후 성선모세포종(gonadoblastoma) 등의 악성 위험이 증가하므로 사춘기 완료 후 절제(gonadectomy)하는 것이 권장된다. 이후 여성 2차 성징 유지 및 골건강을 위해 estrogen을 투여한다. 소아기 절제는 사춘기 발달을 저해하고, testosterone은 수용체 결함으로 효과가 없으며, 감시만으로는 악성 위험을 막을 수 없다. 따라서 '사춘기 완료 후 gonadectomy와 estrogen 투여'가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여성 표현형이 원발성 무월경으로 내원하였다. 신체검사에서 유방 발달은 양호하나 치모와 액와모가 없으며, 짧은 맹낭 형태의 질이 관찰된다. 초음파에서 자궁과 난관은 보이지 않고, 복부에 고환으로 추정되는 종괴가 있다. 핵형은 46,XY, 혈중 테스토스테론은 정상 남성 범위이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "5α-환원효소 결핍증"}, {"letter": "B", "text": "안드로겐 불응 증후군 (AIS)"}, {"letter": "C", "text": "Swyer 증후군"}, {"letter": "D", "text": "선천성 부신 증식증 (CAH)"}, {"letter": "E", "text": "MRKH 증후군"}], "answer": "B", "explanation": "이 환자는 완전 안드로겐 불응 증후군(complete AIS)의 전형적인 특징을 모두 보입니다: 46,XY 핵형, 정상 남성 수치의 테스토스테론, 자궁 부재, 맹단 질, 유방 발달, 치모/액와모 결여. 이는 안드로겐 수용체 결함으로 인해 남성호르몬 작용이 일어나지 않기 때문입니다. MRKH 증후군은 46,XX로, 난소는 정상이며 자궁이 없습니다. 5α-환원효소 결핍증은 사춘기에 남성화가 진행되고 외부생식기가 모호합니다. Swyer 증후군은 고환이 아닌 줄무늬 생식샘을 가지며, 자궁이 있고 FSH가 높으며 유방 발달이 없습니다. 선천성 부신 증식증은 46,XX에서 남성화를 보입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성 표현형이 원발성 무월경과 음핵비대(clitoromegaly)로 내원하였다. 사춘기 이후 변성기 목소리와 약간의 체모가 나타났다. 혈액검사: 테스토스테론은 정상 남성 범위, DHT는 낮음. 핵형은 46,XY. 가장 적절한 다음 조치는?", "options": [{"letter": "A", "text": "질 확장술"}, {"letter": "B", "text": "자궁경하 중격 절제술"}, {"letter": "C", "text": "진단 즉시 생식샘 제거술"}, {"letter": "D", "text": "에스트로겐 단독 투여"}, {"letter": "E", "text": "사춘기 이후 생식샘 제거술"}], "answer": "C", "explanation": "5α-환원효소 결핍증은 DHT 생성 불능으로 인해 외부 생식기가 여성형이지만, 사춘기에 테스토스테론의 직접 작용으로 남성화가 진행됩니다. 정소를 그대로 둘 경우 지속적인 남성화와 높은 종양 발생 위험이 있으므로 진단 즉시 생식샘 제거술을 시행해야 합니다. AIS에서는 사춘기 이후 유방 발달을 위해 생식샘 제거를 늦춥니다. 에스트로겐 단독 투여는 종양 위험을 제거하지 못합니다. 자궁경하 중격 절제술이나 질 확장술은 이 질환과 무관합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "20세 여성 표현형이 원발성 무월경과 유방 발달 부재로 내원하였다. 초음파에서 자궁이 확인되나 난소 대신 줄무늬 생식샘이 관찰된다. 혈액검사: FSH 상승, 에스트라디올 저하, 테스토스테론 낮음. 핵형은 46,XY. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Swyer 증후군"}, {"letter": "B", "text": "5α-환원효소 결핍증"}, {"letter": "C", "text": "안드로겐 불응 증후군 (AIS)"}, {"letter": "D", "text": "MRKH 증후군"}, {"letter": "E", "text": "터너 증후군"}], "answer": "A", "explanation": "Swyer 증후군은 46,XY 완전 생식샘 발달부전으로, 줄무늬 생식샘(streak gonad)을 가지며 항뮐러관호르몬이 분비되지 않아 자궁이 잔존하게 됩니다. 낮은 에스트로겐과 안드로겐으로 인해 유방 발달이 없고, FSH는 뇌하수체의 신호 증가로 높아집니다. AIS는 유방 발달이 있고 자궁이 없습니다. 5α-환원효소 결핍증은 남성화가 나타나며 자궁이 없습니다. MRKH 증후군은 46,XX로 자궁이 없습니다. 터너 증후군은 45,X로 저신장, 익상경 등의 특징을 보입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 저신장(키 140 cm)과 사춘기 지연으로 내원하였다. 외모상 익상경(webbed neck), 외반주(cubitus valgus), 방패형 가슴이 관찰된다. 혈액검사: FSH 상승, 에스트라디올 저하. 핵형은 45,X. 다음 중 이 질환과 연관된 심혈관 기형으로 알려진 것은?", "options": [{"letter": "A", "text": "심실 중격 결손 (Ventricular septal defect)"}, {"letter": "B", "text": "동맥관 개존증 (Patent ductus arteriosus)"}, {"letter": "C", "text": "대동맥 축착 (Coarctation of the aorta)"}, {"letter": "D", "text": "팔로 사징증 (Tetralogy of Fallot)"}, {"letter": "E", "text": "대혈관 전위 (Transposition of the great arteries)"}], "answer": "C", "explanation": "터너 증후군(45,X)은 대동맥 축착(coarctation of the aorta) 및 이첨 대동맥 판막(bicuspid aortic valve)과 강한 연관성을 가집니다. 따라서 진단 시 심장 초음파를 통한 평가가 필수적입니다. 팔로 사징증, 대혈관 전위, 심실 중격 결손, 동맥관 개존증은 터너 증후군에 특이적으로 동반되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 신체검사에서 유방 발달은 Tanner 1단계, 음모는 Tanner 3단계이며 외음부는 정상이다. 골반 초음파에서 자궁과 난소의 크기가 작다. 혈액검사 결과 난포자극호르몬(FSH) 0.5 mIU/mL (참고치 3~20), 황체형성호르몬(LH) 0.2 mIU/mL (참고치 2~15), 에스트라디올 15 pg/mL (참고치 30~200), 염색체검사 46,XX, 뇌 MRI 정상이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "저생식샘자극호르몬성 생식샘저하증(Hypogonadotropic hypogonadism)"}, {"letter": "B", "text": "난소 부전(Primary ovarian insufficiency)"}, {"letter": "C", "text": "뮐러관 무형성증(Müllerian agenesis)"}, {"letter": "D", "text": "체질성 성장 지연(Constitutional delay of growth and puberty)"}, {"letter": "E", "text": "안드로겐 불응 증후군(Androgen insensitivity syndrome)"}], "answer": "A", "explanation": "46,XX 핵형, 낮은 FSH/LH, 낮은 에스트라디올, 이차성징 발현 부재, 정상 뇌 MRI 소견은 저생식샘자극호르몬성 생식샘저하증에 합당하다. 난소 부전은 FSH가 상승하고, 안드로겐 불응 증후군은 46,XY에 유방 발달이 있으므로 다르다. 뮐러관 무형성증은 자궁이 없으며, 체질성 성장 지연은 골연령 지연이 전형적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 점차 심해지는 쉰 목소리와 얼굴 및 몸에 과도한 털이 나는 증상으로 내원하였다. 초경은 12세에 있었으나 이후 주기가 불규칙적이었고, 내원 3년 전부터 음핵이 커지는 것을 인지하였다. 신체검사에서 혈압은 정상, 음모는 남성형 분포를 보이며 음핵 비대가 관찰된다. 핵형은 46,XX, 복부 초음파에서 자궁과 양측 난소는 정상이다. 혈액검사 결과: testosterone 증가, 17‑hydroxyprogesterone 현저히 증가, cortisol 감소. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "5α-reductase deficiency"}, {"letter": "B", "text": "Androgen Insensitivity Syndrome"}, {"letter": "C", "text": "Müllerian agenesis"}, {"letter": "D", "text": "Swyer syndrome"}, {"letter": "E", "text": "Congenital Adrenal Hyperplasia (21-hydroxylase deficiency)"}], "answer": "E", "explanation": "환자는 46,XX 핵형을 가지며, 음핵 비대, 다모증, 쉰 목소리 등의 남성화 증상을 보이고, 혈중 testosterone과 17‑hydroxyprogesterone이 증가되었으며 cortisol이 감소되어 있다. 이는 cortisol 합성 장애로 인해 안드로겐으로의 대사가 과잉되는 21‑hydroxylase 결핍에 의한 선천부신과다형성(CAH)의 전형적인 소견이다. Androgen Insensitivity Syndrome과 5α-reductase deficiency는 46,XY 핵형에서 나타나고, Swyer syndrome은 난소 대신 흔적생식샘과 높은 FSH를 보이며, Müllerian agenesis는 자궁이 없고 정상 여성 핵형에서 나타나므로 감별된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "여성 생식세포 분열 과정에서 제1차 난모세포(primary oocyte)의 감수분열이 정지되는 시기는?", "options": [{"letter": "A", "text": "말기(telophase) I"}, {"letter": "B", "text": "중기(metaphase) I"}, {"letter": "C", "text": "전기(prophase) I (복사기, diplotene)"}, {"letter": "D", "text": "중기(metaphase) II"}, {"letter": "E", "text": "후기(anaphase) I"}], "answer": "C", "explanation": "Primary oocytes begin meiosis I during fetal life but arrest in late prophase I, specifically at the diplotene stage. This arrest persists until puberty. At puberty, the LH surge triggers the resumption of meiosis I, leading to formation of the secondary oocyte and the first polar body. The secondary oocyte then arrests at metaphase II and completes meiosis II only if fertilization occurs. '중기 I', '후기 I', '말기 I' describe later stages of meiosis I that do not occur until ovulation. '중기 II' is the arrest point of the secondary oocyte, not the primary oocyte.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "여성에서 음모(pubic hair) 발생을 주로 유발하는 호르몬은?", "options": [{"letter": "A", "text": "프로게스테론(progesterone)"}, {"letter": "B", "text": "융모성 성선 자극 호르몬(hCG)"}, {"letter": "C", "text": "성선자극호르몬방출호르몬(GnRH)"}, {"letter": "D", "text": "안드로겐(androgen, DHEA 등)"}, {"letter": "E", "text": "에스트로겐(estrogen)"}], "answer": "D", "explanation": "Pubic hair development (pubarche) is primarily driven by androgens produced by the adrenal cortex (adrenarche) and, to a lesser extent, by the ovaries. Androgens such as dehydroepiandrosterone (DHEA) and androstenedione stimulate hair follicles in the pubic and axillary regions. '에스트로겐' and '프로게스테론' are not directly responsible for sexual hair growth. 'hCG' is involved in early pregnancy maintenance, and 'GnRH' stimulates pituitary gonadotropins. Thus, '안드로겐' is the correct answer.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "20세 여성의 난소에서 aromatase 발현이 억제될 경우, 이차적으로 나타날 수 있는 생리적 변화로 가장 적절한 것은?", "options": [{"letter": "A", "text": "혈중 안드로겐 농도 감소"}, {"letter": "B", "text": "혈중 에스트로겐 농도 증가"}, {"letter": "C", "text": "난소 인히빈(inhibin) 분비 증가"}, {"letter": "D", "text": "뇌하수체 LH 분비 감소"}, {"letter": "E", "text": "뇌하수체 FSH 분비 증가"}], "answer": "E", "explanation": "Aromatase는 안드로겐을 에스트로겐으로 전환하는 효소이므로, 억제 시 난소에서의 에스트로겐 합성이 감소한다. 그 결과 시상하부-뇌하수체에 대한 음성 되먹임이 약화되어 뇌하수체 FSH 분비가 증가한다. 이러한 원리로 aromatase 억제제는 배란유도에 사용되기도 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 신체검진에서 유방 발달은 Tanner 4단계이나 음모는 Tanner 1단계이며, 짧은 맹관 질이 관찰된다. 골반 초음파에서 자궁이 보이지 않는다. 혈액 검사 결과 FSH는 정상, testosterone은 정상 남성 수준이다. 환자의 핵형으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "46,XX"}, {"letter": "B", "text": "45,X0"}, {"letter": "C", "text": "47,XXX"}, {"letter": "D", "text": "46,XY"}, {"letter": "E", "text": "46,XX/46,XY mosaicism"}], "answer": "D", "explanation": "유방 발달은 있으나 음모가 없고, 자궁과 질이 불완전한 소견은 완전형 androgen insensitivity syndrome(고환성 여성화 증후군)에 합당하다. 이 질환은 46,XY 핵형을 가지며, androgen 수용체 결핍으로 인해 말단 조직에서 androgen에 반응하지 못해 여성 표현형이 나타난다. 45,X0는 Turner syndrome, 46,XX는 정상 여성이지만 자궁 무발생은 Müllerian agenesis에서 가능하다. Mosaicism은 Turner 증후군의 변형으로 나타날 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여아가 초경이 없어 내원하였다. 혈액 검사 결과 FSH 80 mIU/mL (폐경 후 수준), estradiol 10 pg/mL 로 확인되었다. 이 환자에서 다음으로 시행해야 할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "갑상선 기능 검사"}, {"letter": "B", "text": "골반 초음파"}, {"letter": "C", "text": "뇌하수체 MRI"}, {"letter": "D", "text": "핵형 분석 (karyotype)"}, {"letter": "E", "text": "혈중 prolactin 측정"}], "answer": "D", "explanation": "FSH가 현저히 높고 estradiol이 낮은 hypergonadotropic hypogonadism 소견은 난소 부전(ovarian failure)을 의미한다. 이 경우 원인 감별을 위해 핵형 분석을 시행하여 Turner syndrome(45,X0), 46,XX gonadal dysgenesis, Swyer syndrome(46,XY) 등을 확인해야 한다. 골반 초음파는 해부학적 이상 감별에 도움이 되나 우선적으로 원인을 규명하기 위해서는 핵형 분석이 필요하다. 뇌하수체 MRI, 갑상선 기능, prolactin 측정은 FSH가 낮거나 정상인 hypogonadotropic hypogonadism에서 고려한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "39세 여성이 6개월 전부터 생리가 없어 내원하였다. 과거력상 자궁내막증 수술력 없고, 최근 심한 스트레스도 없었다. 혈액 검사에서 FSH 60 mIU/mL, estradiol 15 pg/mL, 핵형은 46,XX이다. 적절한 치료로 옳은 것은?", "options": [{"letter": "A", "text": "Bromocriptine"}, {"letter": "B", "text": "Clomiphene citrate"}, {"letter": "C", "text": "경구 피임약"}, {"letter": "D", "text": "Estrogen replacement"}, {"letter": "E", "text": "GnRH agonist"}], "answer": "D", "explanation": "46,XX premature ovarian failure(POF)는 hypergonadotropic hypogonadism에 해당하며, 난소 기능이 소실되어 estrogen 결핍 증상 및 골다공증 위험이 있으므로 estrogen 보충 요법이 필요하다. Bromocriptine은 hyperprolactinemia에, GnRH agonist는 중추성 성조숙증이나 자궁내막증 등에 사용된다. Clomiphene citrate는 난소 기능이 보존된 무배란증에서 배란 유도에 사용하며, POF에서는 효과가 없다. 경구 피임약은 주로 PCOS의 월경 조절이나 피임 목적으로 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "6세 여아가 질 출혈을 주소로 내원하였다. 신체검진에서 유방 발달은 없고 음모만 관찰되며, 등과 둔부에 경계가 불규칙한 café-au-lait 반점이 있다. 혈중 estradiol은 증가, FSH는 억제되어 있다. 이 환자에서 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "Androgen insensitivity syndrome"}, {"letter": "B", "text": "선천성 부신증식증 (congenital adrenal hyperplasia)"}, {"letter": "C", "text": "McCune-Albright syndrome"}, {"letter": "D", "text": "진성 성조숙증 (true precocious puberty)"}, {"letter": "E", "text": "Turner syndrome"}], "answer": "C", "explanation": "FSH가 억제된 말초성 성조숙증과 특징적인 café-au-lait 반점이 동반된 경우 McCune-Albright syndrome을 의심해야 한다. 이 질환은 G-protein 돌연변이로 인해 난소가 자율적으로 estrogen을 분비하여 성조숙증이 발생한다. 진성 성조숙증은 FSH가 증가된 중추성이다. 선천성 부신증식증은 남성화와 함께 17-OHP 상승을 보인다. Androgen insensitivity syndrome은 46,XY이고 여성 외형이나 무월경이 주증상이다. Turner syndrome은 저신장과 hypergonadotropic hypogonadism을 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여아가 초경이 없고, 신체검진상 키 140 cm, 익상경(webbed neck), 팔꿈치 외반(cubitus valgus)이 관찰된다. 혈액 검사에서 FSH 70 mIU/mL, estradiol 12 pg/mL 이다. 핵형 분석 결과로 예측되는 것은?", "options": [{"letter": "A", "text": "46,XX"}, {"letter": "B", "text": "45,X0"}, {"letter": "C", "text": "46,XY"}, {"letter": "D", "text": "45,X0/46,XX mosaicism"}, {"letter": "E", "text": "47,XXX"}], "answer": "B", "explanation": "저신장, 익상경, 외반주 등의 전형적인 Turner syndrome 표현형에 hypergonadotropic hypogonadism 소견을 보이므로 가장 흔한 핵형인 45,X0를 예측할 수 있다. 45,X0/46,XX mosaicism은 잔여 난소 기능으로 인해 정상 사춘기 발달이나 월경이 있을 수 있어 특징이 덜 뚜렷하다. 46,XX는 주로 Müllerian agenesis에서, 46,XY는 androgen insensitivity syndrome에서 관찰된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 초경이 없고 2차 성징이 전혀 나타나지 않아 내원하였다. 혈액 검사 결과 FSH 1.2 mIU/mL, estradiol 5 pg/mL, prolactin 120 ng/mL(정상 <25)이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Bromocriptine"}, {"letter": "B", "text": "Clomiphene citrate"}, {"letter": "C", "text": "GnRH agonist"}, {"letter": "D", "text": "갑상선 호르몬"}, {"letter": "E", "text": "Estrogen replacement"}], "answer": "A", "explanation": "저FSH, 저estradiol의 hypogonadotropic hypogonadism에 prolactin이 현저히 상승되어 있어 프로락틴종(prolactinoma)에 의한 2차성 성선기능저하증으로 진단된다. Prolactin이 증가하면 GnRH 분비가 억제되어 FSH 분비가 감소하므로, dopamine agonist인 bromocriptine을 투여하여 prolactin 수치를 정상화하면 사춘기 발달이 회복될 수 있다. Estrogen replacement는 난소 부전 시에, GnRH agonist는 성조숙증에 사용된다. Clomiphene citrate는 배란 유도에, 갑상선 호르몬은 갑상선기능저하증에 사용한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 키가 작고 초경이 없어 내원하였다. 출생 시 체중과 키는 정상이었으며, 평소 건강하였다. 환아의 아버지는 중학교 때 키가 작았으나 최종 키는 175cm이다. 현재 키는 3백분위수, 체중은 10백분위수이다. 유방 발달은 Tanner 2단계, 음모는 관찰되지 않는다. 골연령은 11세이다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "성장호르몬 치료를 시작한다"}, {"letter": "B", "text": "GnRH 작용제를 투여한다"}, {"letter": "C", "text": "정기적 추적 관찰 및 재확신을 제공한다"}, {"letter": "D", "text": "두개골 자기공명영상(MRI)을 즉시 시행한다"}, {"letter": "E", "text": "성선 스테로이드 대체요법을 시작한다"}], "answer": "C", "explanation": "체질성 성장 및 사춘기 지연(Constitutional Delay of Growth and Puberty, CDGP)은 가족력, 골연령 지연, 정상적인 초기 사춘기 징후를 보이며, 병적인 원인이 배제될 경우 특별한 치료 없이 정기적 추적 관찰 및 재확신을 제공하는 것이 가장 적절합니다. 성장호르몬은 성장호르몬 결핍증에서, GnRH 작용제는 진성 성조숙증에서, 성선 스테로이드는 영구적인 성선기능저하증에서 사용합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없고 유방 발달이 전혀 없어 내원하였다. 신장은 163 cm로 정상이며, 익상경이나 외반주관절은 관찰되지 않는다. 골반 초음파에서 자궁과 질이 확인되며, 혈액 검사에서 FSH 78 mIU/mL, estradiol 9 pg/mL이다. 핵형 분석으로 가장 예상되는 것은?", "options": [{"letter": "A", "text": "46,XX/46,XY mosaicism"}, {"letter": "B", "text": "45,X0"}, {"letter": "C", "text": "47,XXX"}, {"letter": "D", "text": "46,XY"}, {"letter": "E", "text": "46,XX"}], "answer": "D", "explanation": "이 환자는 고FSH성 생식샘저하증을 보이면서 자궁이 존재하고 유방 발달이 전혀 없어, 완전 생식샘발생장애를 시사한다. 정상 키, 익상경 부재로 Turner syndrome (45,X0) 가능성은 낮다. 자궁이 있으므로 androgen insensitivity syndrome (자궁 없음)과 감별된다. 핵형 46,XY인 Swyer syndrome은 streak gonad를 가지며 자궁이 형성되고 유방 발달이 없으며, 고환종양 발생 위험이 높아 성선절제술이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여아가 초경이 없고 유방 발달이 거의 없어 내원하였다. 1년 전부터 쉽게 피로하고, 추위를 많이 타며, 체중이 8 kg 증가하였다. 신장은 3백분위수이다. 혈액 검사: FSH 1.1 mIU/mL, estradiol 8 pg/mL, TSH 100 μIU/mL (참고치 0.5-5.0), free T4 0.2 ng/dL (0.8-1.8). 가장 적절한 치료는?", "options": [{"letter": "A", "text": "GnRH agonist 주사 투여"}, {"letter": "B", "text": "Conjugated estrogen 경구 투여"}, {"letter": "C", "text": "Clomiphene 경구 투여"}, {"letter": "D", "text": "Dopamine agonist 경구 투여"}, {"letter": "E", "text": "Levothyroxine 경구 투여"}], "answer": "E", "explanation": "환자는 전형적인 원발성 갑상선기능저하증(TSH 상승, free T4 감소)에 의한 저생식샘자극성 생식샘저하증을 보인다. 갑상선기능저하증은 TRH 증가로 프로락틴 분비를 자극하거나 gonadotropin 분비를 억제하여 사춘기 지연을 초래한다. Levothyroxine 투여로 갑상선 기능을 정상화하면 TSH가 감소하고 FSH 분비가 회복되어 사춘기 진행과 초경이 정상화된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "무월경을 주소로 내원한 30세 여성의 혈액 검사에서 FSH와 LH가 현저히 증가되어 있고 estradiol은 낮게 측정되었다. 이러한 소견을 보일 수 있는 질환은?", "options": [{"letter": "A", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "B", "text": "안드로겐 불감성 증후군 (Androgen insensitivity syndrome)"}, {"letter": "C", "text": "원발성 난소 부전 (Primary ovarian insufficiency)"}, {"letter": "D", "text": "고프로락틴혈증 (Hyperprolactinemia)"}, {"letter": "E", "text": "시상하부성 무월경 (Hypothalamic amenorrhea)"}], "answer": "C", "explanation": "원발성 난소 부전에서는 난소가 에스트라디올을 충분히 생성하지 못하여 negative feedback이 소실되므로 FSH와 LH가 상승한다. PCOS는 대개 LH가 정상이거나 상승하고 FSH는 정상이며, 에스트로겐은 정상 또는 높다. 시상하부성 무월경과 고프로락틴혈증은 FSH/LH가 정상이거나 낮다. 안드로겐 불감성 증후군은 LH가 상승할 수 있지만 말초에서 안드로겐이 에스트로겐으로 전환되어 에스트라디올은 정상이거나 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "Turner 증후군 환자의 무월경에 관한 설명으로 올바른 것은?", "options": [{"letter": "A", "text": "45X 핵형이 가장 흔하며 hypergonadotropic hypogonadism을 보인다."}, {"letter": "B", "text": "46XX 핵형을 보이며 자궁 발육 부전이 주된 원인이다."}, {"letter": "C", "text": "Hypogonadotropic hypogonadism 상태이며 FSH가 감소한다."}, {"letter": "D", "text": "Androgen 불응성으로 인해 자궁이 없고 2차 성징 발현이 되지 않는다."}, {"letter": "E", "text": "난소 기능은 정상이나 시상하부 기능 저하로 무월경이 발생한다."}], "answer": "A", "explanation": "Turner 증후군은 성염색체 이상으로 45X 핵형이 가장 흔하며, 난소의 조기 퇴화로 인해 난포가 소실되어 ovarian failure를 초래한다. 이에 따라 FSH와 LH가 상승하는 hypergonadotropic hypogonadism 상태가 된다. '46XX 핵형을 보이며 자궁 발육 부전이 주된 원인이다'는 MRKH나 다른 뮐러관 기형에 해당할 수 있다. 'Hypogonadotropic hypogonadism 상태이며 FSH가 감소한다'는 시상하부나 뇌하수체 병변에서 나타난다. '난소 기능은 정상이나 시상하부 기능 저하로 무월경이 발생한다'는 시상하부성 무월경이다. 'Androgen 불응성으로 인해 자궁이 없고 2차 성징 발현이 되지 않는다'는 완전 androgen 불응성 증후군(CAIS)의 일부 특징과 유사하지만, CAIS에서는 46XY 핵형이고 부분적인 유방 발달이 있을 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 유방 발달은 정상이고 음모는 다소 적으나, 골반 초음파에서 자궁과 질 상부가 관찰되지 않았다. 핵형 검사 결과 46XX로 확인되었다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Androgen 불응성 증후군 (AIS)"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "뮐러관 무발생 (Mayer-Rokitansky-Küster-Hauser syndrome, MRKH)"}, {"letter": "D", "text": "Kallmann 증후군"}, {"letter": "E", "text": "처녀막 폐쇄증 (imperforate hymen)"}], "answer": "C", "explanation": "MRKH는 46XX 핵형, 정상 난소와 2차 성징 발현을 보이지만 자궁과 질 상부가 결여된 선천성 질환이다. 'Androgen 불응성 증후군(AIS)'은 46XY 핵형이며, 고환이 존재하지만 안드로겐 수용체 이상으로 외성기는 여성형이고 유방 발달은 있을 수 있으나 자궁이 없고 음모가 거의 없다. 'Turner 증후군'은 45X 핵형, 저신장, 난소 기능 부전을 보이며 자궁은 존재한다. 'Kallmann 증후군'은 저생식샘자극호르몬성(hypogonadotropic) 무월경으로, 자궁은 정상이다. '처녀막 폐쇄증'은 자궁과 질은 정상이지만 처녀막이 막혀 생리혈이 배출되지 않는 경우로, 초음파상 자궁이 관찰된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "23세 무월경 환자의 혈액 검사에서 FSH 65 mIU/mL, LH 50 mIU/mL, estradiol 12 pg/mL로 측정되었다. 이 결과가 시사하는 병변 부위는 어디인가?", "options": [{"letter": "A", "text": "질 (vagina)"}, {"letter": "B", "text": "시상하부 (hypothalamus)"}, {"letter": "C", "text": "뇌하수체 (pituitary gland)"}, {"letter": "D", "text": "자궁내막 (endometrium)"}, {"letter": "E", "text": "난소 (ovary)"}], "answer": "E", "explanation": "FSH와 LH가 매우 높고 estradiol이 낮은 소견은 난소 자체의 기능 부전(ovarian failure)을 의미하며, 이는 hypergonadotropic hypogonadism에 해당한다. 시상하부나 뇌하수체 병변이라면 gonadotropin이 정상 이하로 낮게(hypogonadotropic) 나타날 것이다. 자궁내막이나 질의 이상은 outflow obstruction이나 자궁 내 유착 등으로 호르몬 수치는 정상일 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 초경 지연과 키 성장 부진으로 내원하였다. 아버지도 사춘기가 늦었으며, 골연령이 11세로 측정되었다. 이 환자에게 가장 적절한 조치는?", "options": [{"letter": "A", "text": "GnRH agonist 투여"}, {"letter": "B", "text": "경과관찰 및 정기적 추적"}, {"letter": "C", "text": "뇌하수체 MRI 검사"}, {"letter": "D", "text": "즉시 성장호르몬 치료 시작"}, {"letter": "E", "text": "에스트로겐 사춘기 유도"}], "answer": "B", "explanation": "가족력상 사춘기 지연과 골연령 지연이 동반된 경우 체질성 성장 및 사춘기 지연(Constitutional delay of growth and puberty)의 가능성이 높다. 이 경우 특별한 치료 없이 정기적인 성장 평가와 관찰이 권장되며, 대부분 시간이 경과하면서 정상적인 사춘기가 시작된다. 따라서 경과관찰 및 정기적 추적이 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 유방 발달은 Tanner 4기로 양호하나 음모는 거의 없으며, 질은 짧고 자궁이 촉지되지 않는다. 핵형 분석 결과 46,XY이다. 가능한 진단은?", "options": [{"letter": "A", "text": "선천성 부신 과형성증"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "Androgen Insensitivity Syndrome"}, {"letter": "D", "text": "5α-reductase 결핍증"}, {"letter": "E", "text": "Mayer-Rokitansky-Kuster-Hauser 증후군"}], "answer": "C", "explanation": "46,XY 핵형, 정상 유방 발달, 음모 부재, 자궁 부재는 완전형 Androgen Insensitivity Syndrome의 전형적인 소견이다. Androgen 수용체 유전자 돌연변이로 인해 표적 조직이 androgens에 반응하지 못해 Wolffian 관이 발달하지 않고, 고환에서 분비되는 항뮬러관 호르몬에 의해 Müllerian 관도 퇴화되어 자궁이 없다. Mayer-Rokitansky-Kuster-Hauser 증후군은 46,XX이며 난소와 자궁이 없을 수 있으나 음모 발달은 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여자가 초경이 없어 내원하였다. 유방과 음모 발달은 Tanner 1기이며 골반 초음파에서 자궁은 작고 난소가 보이지 않는다. 혈액검사에서 FSH 75 mIU/mL, LH 55 mIU/mL, estradiol 12 pg/mL이다. 다음 단계로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "GnRH 자극 검사"}, {"letter": "B", "text": "프로게스테론 자극 검사"}, {"letter": "C", "text": "혈청 프로락틴 검사"}, {"letter": "D", "text": "핵형 분석 (karyotype)"}, {"letter": "E", "text": "뇌하수체 MRI"}], "answer": "D", "explanation": "원발성 무월경에서 FSH 및 LH가 높고 estradiol이 낮은 경우 고생식샘자극호르몬 성선저하증(hypergonadotropic hypogonadism)으로 난소 기능 부전을 의미한다. 이때 가장 중요한 다음 검사는 핵형 분석 (karyotype)을 통해 Turner 증후군(45,X) 또는 46,XX 순수 성선발육부전 등을 감별하는 것이다. 핵형 결과에 따라 치료와 상담 방향이 달라지므로 필수적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "30세 여성이 6개월간 무월경으로 내원하였다. 임신 검사는 음성이며, progesterone challenge test를 시행한 결과 피임약 중단 후 소퇴성 출혈(withdrawal bleeding)이 관찰되었다. 이 소견이 시사하는 것은?", "options": [{"letter": "A", "text": "시상하부 기능 이상이 있다"}, {"letter": "B", "text": "뇌하수체 기능 부전이 있다"}, {"letter": "C", "text": "난관 폐쇄가 있다"}, {"letter": "D", "text": "난소의 estrogen 생성이 적절하다"}, {"letter": "E", "text": "자궁내막 유착이 동반되어 있다"}], "answer": "D", "explanation": "Progesterone challenge test에서 progesterone을 투여 후 중단하였을 때 소퇴성 출혈이 발생하는 것은 자궁내막이 이미 estrogen에 의해 증식되어 있었음을 의미합니다. 즉, 내인성 estrogen 분비가 충분하고 자궁내막 반응성이 유지되어 있음을 시사합니다. '난소의 estrogen 생성이 적절하다'가 정답입니다. '뇌하수체 기능 부전이 있다'와 '시상하부 기능 이상이 있다'는 저에스트로겐 상태를 초래하여 출혈이 없을 것입니다. '자궁내막 유착이 동반되어 있다'는 자궁내막이 손상되어 출혈 반응이 없을 수 있습니다. '난관 폐쇄가 있다'는 이 검사와 관련이 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "저성선자극호르몬성 생식선저하증(hypogonadotropic hypogonadism)이 의심되는 환자에게 GnRH 자극 검사를 시행하였다. 주사 후 LH가 기저치의 1.7배 이상 증가하였다. 이 결과가 의미하는 것은?", "options": [{"letter": "A", "text": "뇌하수체에 종양이 있을 가능성이 높다"}, {"letter": "B", "text": "난소 기능 부전을 시사한다"}, {"letter": "C", "text": "고프로락틴혈증을 동반하고 있다"}, {"letter": "D", "text": "안드로겐 불응성 증후군을 시사한다"}, {"letter": "E", "text": "뇌하수체 기능은 정상이며 시상하부에 병변이 있을 가능성이 높다"}], "answer": "E", "explanation": "GnRH 자극 검사에서 LH가 기저치의 1.7배 이상 상승하면 뇌하수체 전엽이 정상 예비능을 가지고 있어 GnRH에 반응한다는 뜻입니다. 이는 뇌하수체 자체의 문제보다는 시상하부에서 GnRH 분비가 부족한 것을 시사하므로, '뇌하수체 기능은 정상이며 시상하부에 병변이 있을 가능성이 높다'가 정답입니다. '뇌하수체에 종양이 있을 가능성이 높다'는 반응 저하 시 의심합니다. 난소 기능 부전은 FSH 상승으로 진단합니다. 안드로겐 불응성 증후군은 46XY 핵형과 관련됩니다. 고프로락틴혈증은 prolactin 상승으로 진단합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "19세 여성이 원발성 무월경을 주소로 내원하였다. 유방 발달은 Tanner stage 4이지만, 치모는 전혀 없으며 질은 맹관으로 끝나고 자궁경부는 만져지지 않는다. 가장 가능성이 높은 핵형은?", "options": [{"letter": "A", "text": "46,XY"}, {"letter": "B", "text": "45,X"}, {"letter": "C", "text": "46,XX"}, {"letter": "D", "text": "45,X/46,XX 모자이시즘"}, {"letter": "E", "text": "47,XXX"}], "answer": "A", "explanation": "이 환자는 유방 발달이 있지만 치모가 없고, 질은 맹관이며 자궁이 없는 전형적인 안드로겐 불응성 증후군(Androgen Insensitivity Syndrome, AIS)의 특징을 보입니다. AIS는 46,XY 핵형을 가지며, 안드로겐 수용체 결함으로 인해 남성 호르몬에 대한 반응이 없어 여성 외형을 나타내지만 치모가 없고, 자궁과 상부 질이 결여됩니다. 따라서 '46,XY'가 정답입니다. '46,XX'는 MRKH 증후군에서 관찰되며, 이 경우 치모가 정상입니다. '45,X'는 Turner 증후군으로 유방 발달이 없고 성선 이형성증을 보입니다. 기타 선택지는 이 임상 양상에 부합하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "25세 여성이 무월경으로 내원하여 검사한 결과 FSH가 45 mIU/mL로 증가되어 있었다. 핵형 검사에서 45,X/46,XY 모자이시즘이 확인되었다. 이 환자에게 필요한 가장 중요한 처치는?", "options": [{"letter": "A", "text": "도파민 작용제 투여"}, {"letter": "B", "text": "성장 호르몬 투여"}, {"letter": "C", "text": "클로미펜 투여"}, {"letter": "D", "text": "에스트로겐 보충 요법"}, {"letter": "E", "text": "성선 절제술(gonadectomy)"}], "answer": "E", "explanation": "45,X/46,XY 모자이시즘은 Y 염색체 물질을 포함하므로, 이형성 성선에서 성선모세포종(gonadoblastoma) 같은 악성 종양이 발생할 위험이 있습니다. 따라서 예방적으로 성선 절제술을 시행해야 합니다. '성선 절제술(gonadectomy)'이 정답입니다. 에스트로겐 보충 요법은 성선 절제 후 이차성징 유지 및 골 건강을 위해 필요하지만, 종양 예방을 위한 가장 중요한 처치는 절제술입니다. 클로미펜은 배란 유도제로 난소 기능 부전에는 효과가 없습니다. 성장 호르몬은 Turner 증후군의 저신장 치료에 사용되나 종양 위험과 직접적 관련이 없습니다. 도파민 작용제는 고프로락틴혈증 치료제입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "33세 여성이 3개월 전 유산 소파술을 받은 이후로 월경량이 매우 적어지고 최근 두 달 동안 완전히 무월경이 되었다. 골반 초음파에서 자궁내막은 얇고 불규칙하게 보인다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "프로락틴 분비 종양"}, {"letter": "B", "text": "갑상선 기능 저하증"}, {"letter": "C", "text": "뇌하수체 선종"}, {"letter": "D", "text": "자궁내막 유착증(Asherman 증후군)"}, {"letter": "E", "text": "난소 기능 부전"}], "answer": "D", "explanation": "유산 소파술과 같은 자궁내 시술 후에 발생한 무월경 또는 희발월경은 자궁내막 유착증(Asherman 증후군)의 전형적인 병력입니다. 소파술로 인해 기저층이 손상되어 유착이 형성되고, 자궁내막이 얇고 불규칙하게 보입니다. '자궁내막 유착증(Asherman 증후군)'이 정답입니다. 난소 기능 부전은 FSH 상승을 동반하며 수술력과 무관합니다. 갑상선 기능 저하증은 TSH 상승으로 진단하며 월경 이상 외 전신 증상이 동반됩니다. 뇌하수체 선종과 프로락틴 분비 종양은 고프로락틴혈증, 두통, 시야 장애 등을 유발하며 자궁내 소파술과 연관성이 적습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 없고(Tanner 1), 음모는 약간 있다. 골반 초음파에서 자궁은 있으나 크기가 작고, 난소는 잘 관찰되지 않았다. 혈액 검사: FSH 70 mIU/mL(정상 3-20), LH 50 mIU/mL(정상 2-15), 난포호르몬 10 pg/mL(정상 30-200). 다음으로 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "핵형 검사"}, {"letter": "B", "text": "항뮐러관 호르몬(AMH) 검사"}, {"letter": "C", "text": "프로게스테론 쇠퇴 출혈 검사"}, {"letter": "D", "text": "뇌 자기공명영상(MRI)"}, {"letter": "E", "text": "GnRH 자극 검사"}], "answer": "A", "explanation": "FSH가 높고 난포호르몬이 낮은 고생식샘자극호르몬성 생식선저하증(hypergonadotropic hypogonadism)에서는 원발성 난소부전을 시사한다. 원발성 무월경과 함께 이러한 소견을 보일 때는 터너 증후군(Turner syndrome)과 같은 염색체 이상을 확인하기 위해 핵형 검사를 우선적으로 시행해야 한다. 터너 증후군은 45,X 또는 모자이시즘 등으로 나타날 수 있으며, 동반된 심혈관계 이상이나 신장 이상 등을 평가해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "40세 남성이 체중 증가, 근력 약화, 고혈압으로 내원하였다. 병력 청취에서 글루코코르티코이드 제제 복용력은 없다. 신체 검진에서 중심성 비만, 월상 안면, 자색 선조가 관찰된다. 24시간 소변 유리 코르티솔이 증가되어 있고, 고용량 덱사메타손 억제 검사에서 코르티솔 분비가 억제되지 않았다. 이 환자의 쿠싱증후군(Cushing syndrome)의 원인으로 가장 흔한 것은?", "options": [{"letter": "A", "text": "부신 암종"}, {"letter": "B", "text": "이소성 ACTH 분비 종양"}, {"letter": "C", "text": "뇌하수체 ACTH 분비 미세선종 (Cushing disease)"}, {"letter": "D", "text": "부신 과증식"}, {"letter": "E", "text": "부신 선종"}], "answer": "C", "explanation": "외인성 스테로이드 사용이 배제되고 내인성 쿠싱증후군이 확인된 경우, 약 70%에서 뇌하수체 ACTH 과분비에 의한 쿠싱병이 원인이다. 부신 종양이나 이소성 ACTH 분비는 상대적으로 드물다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "이차성징 발달이 없는 17세 여성이 원발성 무월경으로 내원하여 혈중 FSH가 상승되어 있을 때, 가장 의심해야 할 원인은 무엇인가?", "options": [{"letter": "A", "text": "스와이어 증후군 (Swyer syndrome)"}, {"letter": "B", "text": "터너 증후군 (Turner syndrome)"}, {"letter": "C", "text": "순수 생식샘 발육부전 (Pure gonadal dysgenesis)"}, {"letter": "D", "text": "안드로겐 불응 증후군 (Androgen insensitivity syndrome)"}, {"letter": "E", "text": "뮐러관 무발생 (Mayer-Rokitansky-Küster-Hauser syndrome)"}], "answer": "B", "explanation": "이차성징(유방 발달)이 없다는 것은 에스트로겐의 작용이 없었음을 의미한다. FSH가 상승되어 있으면 난소 자체의 문제(난소 부전)를 시사하며, 이 중 가장 흔한 원인은 터너 증후군(Turner syndrome, 45,X)이다. 스와이어 증후군(Swyer syndrome, 46,XY)과 순수 생식샘 발육부전(pure gonadal dysgenesis, 46,XX 또는 46,XY)도 난소 부전을 일으키지만 빈도가 낮다. 안드로겐 불응 증후군(androgen insensitivity syndrome)과 뮐러관 무발생(Mayer-Rokitansky-Küster-Hauser syndrome)은 이차성징이 정상적으로 발현되므로 답이 될 수 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방과 음모 발달은 Tanner 1기였고, 혈액검사에서 FSH 0.2 mIU/mL, LH 0.1 mIU/mL, estradiol 18 pg/mL였다. 염색체 검사는 46,XX였다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "난소부전 (primary ovarian insufficiency)"}, {"letter": "B", "text": "시상하부 무월경 (hypothalamic amenorrhea)"}, {"letter": "C", "text": "안드로겐 불감성 증후군 (androgen insensitivity syndrome)"}, {"letter": "D", "text": "다낭성난소증후군 (polycystic ovary syndrome)"}, {"letter": "E", "text": "특발성 저성선자극호르몬성 성선기능저하증 (idiopathic hypogonadotropic hypogonadism)"}], "answer": "E", "explanation": "FSH와 LH가 낮고 에스트라디올도 낮은 소견은 중추성 성선기능저하를 의미하며, 정상 염색체 검사(46,XX)와 2차 성징의 결여(Tanner 1기)는 난소 자체의 문제가 아닌 시상하부-뇌하수체 축의 기능 부전을 시사한다. 시상하부 무월경은 주로 이차성 무월경에서 발생하며, 원발성 무월경과 성적 유치증을 동반한 경우 특발성 저성선자극호르몬성 성선기능저하증이 가장 적합한 진단명이다. 안드로겐 불감성 증후군은 46,XY이며 유방 발달이 있을 수 있다. 다낭성난소증후군은 FSH가 정상이거나 약간 상승하고 LH가 높은 소견을 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달과 음모는 Tanner 1기였으며, 질 초음파에서 자궁이 확인되었다. 혈액검사에서 FSH 45 mIU/mL, LH 30 mIU/mL였다. 핵형 검사에서 46,XY로 확인되었다. 적절한 처치는?", "options": [{"letter": "A", "text": "반복적인 골반 초음파 추적관찰"}, {"letter": "B", "text": "에스트로겐 투여"}, {"letter": "C", "text": "생식선 절제술"}, {"letter": "D", "text": "프로게스테론 투여"}, {"letter": "E", "text": "Sella MRI 촬영"}], "answer": "C", "explanation": "Swyer 증후군(46,XY 성선발생장애)에서는 항뮬러관 호르몬이 분비되지 않아 자궁과 여성 외부생식기를 가지지만 성선은 흔적선이고 기능하지 않습니다. 이러한 성선에는 gonadoblastoma 등 종양 발생 위험이 높기 때문에 진단 즉시 생식선 절제술을 시행해야 합니다. 호르몬 투여는 절제술 이후에 고려됩니다. 따라서 적절한 처치는 생식선 절제술입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "24세 여성이 1년간의 이차성 무월경과 간헐적인 안면홍조를 호소한다. 임신 검사 음성, 프로락틴 정상, TSH 정상, FSH 38 mIU/mL, LH 25 mIU/mL. 다음 중 가장 적절한 검사는?", "options": [{"letter": "A", "text": "Sella MRI"}, {"letter": "B", "text": "경구 포도당 부하 검사"}, {"letter": "C", "text": "핵형 분석"}, {"letter": "D", "text": "복부/질 초음파"}, {"letter": "E", "text": "자궁내막 생검"}], "answer": "C", "explanation": "FSH가 38 mIU/mL로 상승된 이차성 무월경은 난소기능부전(조기난소부전)을 시사합니다. 특히 20대 젊은 여성에서는 Turner 증후군 모자이크형(예: 45,X/46,XX) 등 염색체 이상이 원인일 수 있으므로 핵형 분석을 시행해야 합니다. Sella MRI는 FSH가 낮을 때(저고나도트로핀 성선기능저하증) 적응됩니다. 따라서 가장 적절한 검사는 핵형 분석입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "생식샘자극호르몬방출호르몬(GnRH)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "뇌하수체 전엽에서 합성, 저장된다."}, {"letter": "B", "text": "직접 난소에 작용하여 난포 발육을 촉진한다."}, {"letter": "C", "text": "에스트로겐에 의해 분비가 항진된다."}, {"letter": "D", "text": "펄스(pulse) 형태로 분비된다."}, {"letter": "E", "text": "지속 투여 시 생식샘자극호르몬 분비가 증가한다."}], "answer": "D", "explanation": "GnRH는 시상하부에서 펄스 형태로 분비되어 뇌하수체 전엽에서 FSH, LH를 분비하게 합니다. 지속 투여 시 수용체 하향 조절로 오히려 분비가 감소합니다. 합성은 시상하부에서 이루어지며, 에스트로겐은 상황에 따라 음성 또는 양성 피드백을 합니다. GnRH는 뇌하수체에 작용하지 난소에 직접 작용하지 않습니다. 따라서 옳은 설명은 펄스 형태로 분비된다입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "31세 여자가 1년 전 분만 후 무월경을 주소로 내원하였다. 분만 시 심한 출혈로 대량 수혈과 자궁동맥색전술을 받았으며, 이후 유즙 분비가 없어 모유 수유를 하지 못했다. 임신반응검사 음성이다. 치료로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "정신과적 상담 및 지지 요법"}, {"letter": "B", "text": "생식샘자극호르몬(Gonadotropin) 투여"}, {"letter": "C", "text": "에스트로겐-프로게스틴 주기 요법"}, {"letter": "D : "A", "text": "부속기에서 촉지되는 단단한 종괴"}, {"letter": "B", "text": "복부 전반에 걸친 반발 압통"}, {"letter": "C", "text": "맥박 증가와 체위성 저혈압"}, {"letter": "D", "text": "경부운동압통(cervical motion tenderness)"}, {"letter": "E", "text": "장음의 감소"}], "answer": "D", "explanation": "PID에서는 자궁경부를 면봉이나 겸자로 움직일 때 심한 통증을 호소하는 경부운동압통이 특징적인 이학적 소견입니다. ‘복부 전반에 걸친 반발 압통’은 복막염에서 나타날 수 있고 PID가 심해지면 동반될 수 있으나 초기 특이 소견은 아닙니다. ‘맥박 증가와 체위성 저혈압’은 혈복강 등 출혈성 쇼크를 시사합니다. ‘부속기에서 촉지되는 단단한 종괴’는 종양이나 농양을 의미할 수 있지만 PID의 필수 소견은 아닙니다. ‘장음의 감소’는 장폐색이나 복막염에서 나타납니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 60}, {"question": "골반염증성질환으로 치료 중인 28세 여성이 우상복부 통증을 호소하고 심호흡 시 악화된다. 복부 초음파에서 담낭 이상이 없다면 가장 가능한 진단은?", "options": [{"letter": "A", "text": "급성 담낭염 (Acute cholecystitis)"}, {"letter": "B", "text": "바이러스 간염 (Viral hepatitis)"}, {"letter": "C", "text": "췌장염 (Pancreatitis)"}, {"letter": "D", "text": "횡격막하 농양 (Subphrenic abscess)"}, {"letter": "E", "text": "간주위염 (Fitz-Hugh-Curtis syndrome)"}], "answer": "E", "explanation": "PID가 있는 젊은 여성에서 급성 우상복부 통증이 발생하고 담낭 등에 이상이 없다면, 골반염증이 횡경막을 타고 간 피막으로 전파되어 발생하는 간주위염(Fitz-Hugh-Curtis syndrome)을 의심해야 합니다. 강의에서 간 표면과 갈비뼈 표면의 유착으로 호흡 시 통증이 발생한다고 설명했습니다. 급성 담낭염은 초음파에서 담낭 벽 비후 등의 소견이 있을 것이고, 바이러스 간염은 간효소 상승, 췌장염은 아밀라제 상승 등이 동반됩니다. 횡격막하 농양도 가능하지만, PID에 연관된 특징적 합병증으로 Fitz-Hugh-Curtis syndrome이 가장 적합합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "원인 불명의 불임으로 내원한 35세 여성의 복강경 조직검사에서 건락성 육아종이 관찰되었다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "골반 결핵 (Pelvic tuberculosis)"}, {"letter": "B", "text": "자궁내막증 (Endometriosis)"}, {"letter": "C", "text": "난소 상피암 (Ovarian cancer)"}, {"letter": "D", "text": "만성 골반염증성질환 (Chronic PID)"}, {"letter": "E", "text": "이물 육아종 (Foreign body granuloma)"}], "answer": "A", "explanation": "건락성 육아종(caseating granuloma)과 거대세포는 결핵의 특징적인 조직 소견입니다. 강의에서 '현미경으로 이런 세포가 보이면 골반 결핵이라고 진단한다'고 언급했습니다. 자궁내막증은 자궁내막 조직이 이소성으로 존재하는 것이고, 만성 PID는 비특이적 염증 소견이며, 난소암은 악성 세포가 관찰됩니다. 이물 육아종은 이물질에 대한 반응으로, 결핵균과는 무관합니다. 따라서 불임과 건락성 육아종은 골반 결핵을 강력히 시사합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "25세 여성이 1주일간 지속되는 화농성 질 분비물과 성교 후 출혈을 주소로 내원하였다. 내진에서 자궁경부에 홍반과 화농성 분비물이 관찰된다. Neisseria gonorrhoeae와 Chlamydia trachomatis 감염이 의심될 때, 가장 적절한 경험적 항생제 치료는?", "options": [{"letter": "A", "text": "Metronidazole 500 mg 하루 2회 7일간 경구 투여"}, {"letter": "B", "text": "Doxycycline 100 mg 하루 2회 14일간 경구 투여"}, {"letter": "C", "text": "Fluconazole 150 mg 경구 단회 투여"}, {"letter": "D", "text": "Clindamycin 300 mg 하루 2회 경구 + Gentamicin 근육주사"}, {"letter": "E", "text": "Ceftriaxone 250 mg 근육주사 단회 + Azithromycin 1 g 경구 단회"}], "answer": "E", "explanation": "자궁경부염의 가장 흔한 원인균은 Neisseria gonorrhoeae와 Chlamydia trachomatis이며, 두 균을 동시에 치료하는 것이 권장된다. Ceftriaxone은 임질에, Azithromycin 또는 Doxycycline은 클라미디아에 효과적이다. Metronidazole은 세균성 질증이나 트리코모나스에 사용되고, Doxycycline 단독은 임질을 치료할 수 없다. Clindamycin+Gentamicin은 PID의 입원 치료에 사용된다. Fluconazole은 곰팡이 치료제이다. 따라서 Ceftriaxone과 Azithromycin 병용이 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "28세 여성이 하복부 통증과 발열로 응급실에 내원하였다. 골반 초음파에서 난관난소 농양이 관찰되어 골반염증성질환(PID)으로 진단되었다. 다음 중 입원 치료의 적응증에 해당하는 것은?", "options": [{"letter": "A", "text": "급성 맹장염이 감별진단에서 명확히 배제된 경우"}, {"letter": "B", "text": "골반 내 농양이 관찰된 경우"}, {"letter": "C", "text": "외래에서 경구 항생제 치료에 증상이 호전된 경우"}, {"letter": "D", "text": "경구 항생제 복용이 가능하고 구토가 없는 경우"}, {"letter": "E", "text": "체온이 37.5도로 24시간 지속된 경우"}], "answer": "B", "explanation": "PID의 입원 치료 적응증은 임신 중이거나, 외래 경구 치료에 실패한 경우, 고열(>38도) 지속, 상복부까지의 심한 염증, 골반 농양, 구토 등으로 경구 약물 복용이 불가능한 경우, 응급 수술이 필요한 경우, 맹장염 등 외과적 질환과의 감별이 어려운 경우 등이다. 골반 내 농양이 관찰된 경우는 입원 적응증에 해당하지만, 나머지 보기들은 해당하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshP  of deep vein thrombosis"}, {"letter": "D", "text": "Pregnancy"}, {"letter": "E", "text": "Smoking (age ≥35 years, ≥15 cigarettes/day)"}], "answer": "B", "explanation": "COC의 절대적 금기증에는 pregnancy, migraine with aura, 35세 이상의 heavy smoking, venous thromboembolism 과거력 등이 포함된다. 반면, controlled diabetes mellitus는 대사 조절이 잘 되면 COC 사용이 가능하므로 절대적 금기증이 아니다. 따라서 'Controlled diabetes mellitus'가 이 문항에서 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 70}, {"question": "Estrogen의 생리적 작용에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "High-density lipoprotein (HDL) cholesterol을 감소시킨다."}, {"letter": "B", "text": "Coagulation factor 생성을 억제한다."}, {"letter": "C", "text": "Vascular endothelial function을 개선한다."}, {"letter": "D", "text": "Low-density lipoprotein (LDL) cholesterol을 증가시킨다."}, {"letter": "E", "text": "Bone resorption을 증가시킨다."}], "answer": "C", "explanation": "Estrogen은 혈관내피세포에서 nitric oxide 생성을 촉진하여 endothelial function을 개선하고 혈관을 확장시킨다. 또한, 골흡수 억제, HDL 증가, LDL 감소의 작용이 있다. 혈액 응고 인자 생성은 오히려 증가시키므로, 'Vascular endothelial function을 개선한다'가 옳은 설명이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 70}, {"question": "다음 중 자궁외 임신의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "이전의 자궁외 임신 (previous ectopic pregnancy) 병력"}, {"letter": "B", "text": "체외수정 (in vitro fertilization) 시술 과거력"}, {"letter": "C", "text": "경구 피임약 (oral contraceptives) 지속적 복용"}, {"letter": "D", "text": "자궁내 장치 (intrauterine device, IUD) 사용"}, {"letter": "E", "text": "이전 골반염 (pelvic inflammatory disease) 병력"}], "answer": "C", "explanation": "골반염은 난관 손상을 유발하여 위험인자이다. IUD 사용 시 임신이 되면 자궁외 임신 가능성이 상대적으로 높다. IVF는 자궁외 임신 위험을 높인다. 이전 자궁외 임신은 재발 위험을 50% 이상 증가시킨다. 경구 피임약은 배란을 억제하여 전체 임신 자체를 예방하므로 자궁외 임신의 위험을 낮추며, 직접적 위험인자로 간주되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "응급 피임약(emergency contraceptive pills)을 복용한 여성이 1시간 후에 심하게 구토하였다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "다른 종류의 응급 피임약으로 교체한다."}, {"letter": "B", "text": "혈중 hCG 검사를 시행한다."}, {"letter": "C", "text": "동일한 용량의 약을 다시 복용시킨다."}, {"letter": "D", "text": "자궁내장치(IUD)를 즉시 삽입한다."}, {"letter": "E", "text": "경과 관찰한다."}], "answer": "C", "explanation": "응급 피임약 복용 후 2시간 이내 구토 시 약물이 충분히 흡수되지 않아 효과가 떨어질 수 있으므로, 동일한 용량의 약을 다시 복용하거나 다른 응급 피임 방법을 고려해야 한다. '경과 관찰한다'는 실패 가능성을 방치하는 것이며, 'IUD 즉시 삽입'도 선택 가능하지만 일반적으로 경구약 재복용이 먼저 고려된다. '혈중 hCG 검사'는 현시점에서 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "가임기 여성이 응급 피임(emergency contraception)을 위해 내원 시 가장 먼저 시행해야 하는 검사는?", "options": [{"letter": "A", "text": "혈청 에스트라디올"}, {"letter": "B", "text": "질 초음파"}, {"letter": "C", "text": "소변 임신 반응 검사"}, {"letter": "D", "text": "자궁경부 세포진 검사"}, {"letter": "E", "text": "혈청 프로게스테론"}], "answer": "C", "explanation": "응급 피임은 임신 중 금기이므로, 환자가 이미 임신한 상태인지 확인하기 위해 가장 먼저 소변 임신 반응 검사를 시행해야 한다. '질 초음파'나 '혈청 프로게스테론'은 임신 확인을 위해 사용될 수 있지만 응급실에서 우선적으로 시행하는 선별 검사는 소변 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성폭행(sexual assault) 피해자가 응급실에 내원하였을 때, 의사가 가장 먼저 취해야 할 적절한 조치는?", "options": [{"letter": "A", "text": "경찰 신고를 권유한다."}, {"letter": "B", "text": "피해 상황에 대해 자세히 질문한다."}, {"letter": "C", "text": "응급 피임약을 처방한다."}, {"letter": "D", "text": "증거 채취를 위해 즉시 신체 검진을 시행한다."}, {"letter": "E", "text": "조용하고 독립된 공간에서 제3자 입회 하에 진료한다."}], "answer": "E", "explanation": "의사는 피해자의 사생활을 보호하면서도 의사와 환자 단둘이 있는 것을 피하기 위해 반드시 제3자(간호사 등)를 입회시켜야 한다. '자세한 질문'이나 '즉시 신체 검진'은 환자의 상태가 안정된 후 동의하에 이루어져야 한다. '경찰 신고 권유'는 환자의 결정에 맡겨야 하며, '응급 피임약 처방'은 임신 확인 후 필요한 경우에 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성폭행 피해자가 소변 임신 반응 검사를 권유받았으나 거부하였다. 의사의 가장 적절한 대응은?", "options": [{"letter": "A", "text": "환자의 의사를 존중하여 검사를 생략한다."}, {"letter": "B", "text": "검사 없이 응급 피임약을 처방한다."}, {"letter": "C", "text": "경찰에 신고하여 법적 조치를 취한다."}, {"letter": "D", "text": "거부 사실과 설명 내용을 차트에 기록한다."}, {"letter": "E", "text": "정신과 의사에게 상담을 의뢰한다."}], "answer": "D", "explanation": "성폭행 피해자가 검사를 거부할 경우, 의사는 환자에게 검사의 필요성을 충분히 설명한 후 거부 사유와 설명 사실을 의무기록에 반드시 남겨야 한다. 이는 추후 법적 분쟁을 방지하기 위해 필수적이다. '검사 없이 처방'하거나 '검사 생략'은 환자의 안전을 위협할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "다음 중 응급 피임(emergency contraception)의 작용 기전이 아닌 것은?", "options": [{"letter": "A", "text": "수정 억제"}, {"letter": "B", "text": "자궁내막 착상 억제"}, {"letter": "C", "text": "배란 억제 또는 지연"}, {"letter": "D", "text": "황체 형성 촉진"}, {"letter": "E", "text": "정자의 기능 억제"}], "answer": "D", "explanation": "응급 피임은 황체 기능을 억제하여 프로게스테론 분비를 감소시키고 자궁내막 탈락을 유도함으로써 착상을 방해한다. '황체 형성 촉진'은 이러한 작용과 반대된다. 다른 선택지들은 모두 응급 피임의 기전으로 알려져 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "다음 중 응급 피임약(emergency contraceptive pills)의 금기증에 해당하는 것은?", "options": [{"letter": "A", "text": "현재 임신"}, {"letter": "B", "text": "과거 자궁외 임신"}, {"letter": "C", "text": "모유 수유"}, {"letter": "D", "text": "35세 이상의 나이"}, {"letter": "E", "text": "무조짓 편두통"}], "answer": "A", "explanation": "응급 피임약은 기존 임신에 대해 유산을 유발하지는 않지만, 임신 중에는 사용을 금기한다. 심한 편두통(신경학적 증상 동반)은 주의해야 하지만, 무조짓 편두통은 일반적인 금기증이 아니다. 모유 수유와 과거 자궁외 임신은 금기 사유가 되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성폭행 피해자가 응급실에 내원하였다. 이 환자에게 즉시 예방적 조치로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "Hepatitis B immunoglobulin (HBIG) 근육주사"}, {"letter": "B", "text": "Emergency contraceptive pills 경구투여"}, {"letter": "C", "text": "Ceftriaxone 근육주사"}, {"letter": "D", "text": "Azithromycin 경구투여"}, {"letter": "E", "text": "Metronidazole 경구투여"}], "answer": "A", "explanation": "성폭행 후 예방적 항생제로 ceftriaxone, azithromycin, metronidazole이 권고되며, 응급 피임약도 필요합니다. Hepatitis B immunoglobulin (HBIG)은 일률적으로 투여하지 않으며, B형 간염 백신만 접종하는 것이 원칙입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성폭행을 당한 지 3일째에 응급실로 내원한 23세 여성에서 소변 human chorionic gonadotropin (hCG) 검사를 시행하는 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "성폭행 이전의 임신 여부를 확인하기 위해"}, {"letter": "B", "text": "배란 여부를 확인하기 위해"}, {"letter": "C", "text": "자궁 내막 상태를 평가하기 위해"}, {"letter": "D", "text": "성병 감염 여부를 선별하기 위해"}, {"letter": "E", "text": "성폭행으로 인한 임신 여부를 진단하기 위해"}], "answer": "A", "explanation": "hCG는 수정 후 최소 2주가 지나야 상승하므로, 성폭행 3일 만에 검사로는 성폭행에 의한 임신을 진단할 수 없다. 교수님 강의에서 강조된 바와 같이, 이 검사의 주된 목적은 환자가 내원 당시 이미 임신 상태인지를 확인하여 약물이나 방사선 노출로 인한 태아 손상을 예방하기 위함이다. 따라서 '성폭행 이전의 임신 여부를 확인하기 위해'가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "응급 피임약을 복용한 28세 여성에서 임신 여부를 확인하기 위한 추적 검사의 가장 적절한 시기는?", "options": [{"letter": "A", "text": "4주 후"}, {"letter": "B", "text": "3주 후"}, {"letter": "C", "text": "1주 후"}, {"letter": "D", "text": "6주 후"}, {"letter": "E", "text": "2주 후"}], "answer": "B", "explanation": "교수님 강의에 따르면, 응급 피임약 복용 후에는 반드시 임신 여부를 확인해야 하며, 일반적으로 복용 3주 후에 소변 임신 반응 검사를 시행하여 성공 여부를 판단한다. 이 시기는 착상 후 충분히 hCG가 상승하여 검출 가능한 시점이므로, '3주 후'가 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성교육(sex education)에서 혼전 성관계, 매춘, 성병 등 사회적 책임에 대한 교육을 집중적으로 제공해야 하는 연령대는?", "options": [{"letter": "A", "text": "7-10세"}, {"letter": "B", "text": "11-13세"}, {"letter": "C", "text": "14-16세"}, {"letter": "D", "text": "20-24세"}, {"letter": "E", "text": "17-19세"}], "answer": "C", "explanation": "14-16세는 성적으로 활발해지는 시기이므로, 사회적 책임, 피임, 성병 예방에 대한 교육이 가장 중요하다. 7-10세는 생명의 탄생, 11-13세는 2차 성징에 대한 교육이 주를 이룬다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 73}, {"question": "골반가로막(pelvic diaphragm)을 구성하는 근육에 해당하는 것은?", "options": [{"letter": "A", "text": "장요근(iliopsoas muscle)"}, {"letter": "B", "text": "내폐쇄근(obturator internus muscle)"}, {"letter": "C", "text": "장골미골근(iliococcygeus muscle)"}, {"letter": "D", "text": "이상근(piriformis muscle)"}, {"letter": "E", "text": "심층회음횡근(deep transverse perineal muscle)"}], "answer": "C", "explanation": "골반가로막은 levator ani와 coccygeus로 구성되며, levator ani는 pubococcygeus, pubovaginalis, puborectalis, iliococcygeus를 포함한다. '이상근'과 '내폐쇄근'은 골반 측벽 근육이다. '장요근'은 고관절 굴곡근이며, '심층회음횡근'은 비뇨생식가로막에 속한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "다음 중 질(vagina)을 압박하는 골격근으로 작용하지 않는 것은?", "options": [{"letter": "A", "text": "두덩곧장근(puborectalis)"}, {"letter": "B", "text": "엉덩꼬리근(iliococcygeus)"}, {"letter": "C", "text": "두덩꼬리근(pubococcygeus)"}, {"letter": "D", "text": "망울해면체근(bulbospongiosus)"}, {"letter": "E", "text": "속폐쇄근(obturator internus)"}], "answer": "E", "explanation": "속폐쇄근(obturator internus)은 골반 벽 근육으로 하지의 외회전에 관여하며 질을 압박하지 않는다. 나머지 근육들은 항문올림근이나 회음부 근육으로 질을 압박하는 기능이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반근막(pelvic fascia)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "배안의 근막과 완전히 분리되어 있다."}, {"letter": "B", "text": "복막과 동일한 구조이다."}, {"letter": "C", "text": "골반장기를 지지하는 결합조직이다."}, {"letter": "D", "text": "주로 평활근으로 구성된다."}, {"letter": "E", "text": "골반뼈에 부착하지 않는다."}], "answer": "C", "explanation": "골반근막은 골반장기를 지지하고 골반벽에 부착하는 치밀한 결합조직으로, 복막과는 다르다. 평활근이 아닌 교원섬유로 구성된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "질식분만 시 회음절개(episiotomy)와 회음열상에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "정중절개(median)는 내측절개(mediolateral)보다 직장 손상 위험이 낮다."}, {"letter": "B", "text": "회음절개는 주로 방광 손상을 예방하기 위해 시행한다."}, {"letter": "C", "text": "회음체(perineal body)는 피부와 피하조직만으로 구성되어 있다."}, {"letter": "D", "text": "4도 회음 열상은 직장 점막(rectal mucosa)까지 손상된 경우를 말한다."}, {"letter": "E", "text": "내측절개는 정중절개보다 통증이 적고 상처 회복이 빠르다."}], "answer": "D", "explanation": "4도 회음 열상은 항문괄약근을 넘어 직장 점막까지 손상된 경우를 의미합니다. 정중절개는 직장으로의 연장 위험이 더 높으며, 내측절개가 더 안전하지만 통증이 심할 수 있습니다. 회음체는 여러 근육이 합쳐진 구조물입니다. 따라서 정답은 \"4도 회음 열상은 직장 점막까지 손상된 경우를 말한다.\" 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "55세 다산부 여성이 질 내 덩어리가 만져지는 증상으로 내원하였다. 진찰상 방광류(cystocele)가 의심될 때, 결손이 발생한 해부학적 지지 구조는?", "options": [{"letter": "A", "text": "Level 1 지지 (기인대-자궁천골인대)"}, {"letter": "B", "text": "Level 2 앞쪽 지지 (치골경부근막)"}, {"letter": "C", "text": "Level 2 뒤쪽 지지 (직장질근막)"}, {"letter": "D", "text": "자궁천골인대"}, {"letter": "E", "text": "Level 3 지지 (회음체)"}], "answer": "B", "explanation": "골반 장기 지지는 세 level로 구분된다. Level 2 앞쪽의 치골경부근막(pubocervical fascia)이 약해지면 방광이 질 내로 탈출하는 방광류가 발생한다. Level 1 결손은 자궁 탈출, Level 2 뒤쪽 결손은 직장류, Level 3 결손은 복압성 요실금과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "복압성 요실금(stress urinary incontinence)의 발생과 가장 밀접한 연관이 있는 해부학적 지지 구조의 손상 level은?", "options": [{"letter": "A", "text": "기인대(cardinal ligament)"}, {"letter": "B", "text": "Level 1"}, {"letter": "C", "text": "Level 3"}, {"letter": "D", "text": "Level 2 (anterior)"}, {"letter": "E", "text": "Level 2 (posterior)"}], "answer": "C", "explanation": "Level 3은 질 입구, 요도 경부, 회음체 등을 포함하는 하부 지지 구조이다. 이 부위가 손상되면 요도의 과운동성(hypermobility)이 발생하여 복압 증가 시 요도가 제대로 닫히지 못해 소변이 누출된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반 장기 탈출증의 해부학적 분류에서 Level 1 지지 구조의 결손 시 발생하는 대표적인 상태는 무엇인가?", "options": [{"letter": "A", "text": "방광류 (cystocele)"}, {"letter": "B", "text": "자궁 탈출 (uterine prolapse)"}, {"letter": "C", "text": "직장류 (rectocele)"}, {"letter": "D", "text": "요도 과운동성 (urethral hypermobility)"}, {"letter": "E", "text": "복압성 요실금 (stress urinary incontinence)"}], "answer": "B", "explanation": "Level 1 지지 구조는 자궁-천골 인대와 기 인대 등으로 구성되어 질 상부를 골반 측벽과 천골에 고정한다. 이 부위에 결손이 발생하면 자궁 경부의 하강이나 질 천장 탈출, 즉 자궁 탈출이 발생한다. 방광류와 직장류는 Level 2의 결손, 복압성 요실금과 요도 과운동성은 Level 3의 결손에 의해 주로 발생한다. 따라서 '자궁 탈출'이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "Level 2 골반 지지 구조의 손상으로 인해 발생할 수 있는 증상이 아닌 것은?", "options": [{"letter": "A", "text": "직장 탈출(rectocele)"}, {"letter": "B", "text": "변실금"}, {"letter": "C", "text": "배뇨 곤란"}, {"letter": "D", "text": "복압성 요실금"}, {"letter": "E", "text": "방광 탈출(cystocele)"}], "answer": "B", "explanation": "Level 2는 중간 질로서 방광과 직장을 지지하는 부위이다. 손상 시 cystocele, rectocele, 복압성 요실금, 배뇨 곤란 등이 발생할 수 있다. 변실금은 항문 괄약근과 perineal body가 관련된 Level 3 손상에서 주로 나타나므로 Level 2의 전형적인 증상이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "Level 3 골반 지지의 손상과 가장 관련이 깊은 골반장기 탈출증은?", "options": [{"letter": "A", "text": "Rectocele"}, {"letter": "B", "text": "Vaginal vault prolapse"}, {"letter": "C", "text": "Urethrocele"}, {"letter": "D", "text": "Uterine prolapse"}, {"letter": "E", "text": "Cystocele"}], "answer": "C", "explanation": "Level 3는 질 입구 및 하부 질로, perineal body와 요도 지지 구조를 포함한다. 이 부위가 손상되면 요도 탈출(urethrocele)이나 perineal body 결손이 발생한다. Cystocele과 rectocele은 주로 Level 2, uterine prolapse와 vaginal vault prolapse는 Level 1과 연관된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "자궁탈출증이 있는 55세 여성에서 항문관(anal canal)이 정상으로 확인되었다. 이 환자에서 정상일 것으로 가장 예상되는 구조물은?", "options": [{"letter": "A", "text": "회음체 (Perineal body)"}, {"letter": "B", "text": "두덩방광근막 (Pubocervical fascia)"}, {"letter": "C", "text": "자궁천골인대 (Uterosacral ligament)"}, {"letter": "D", "text": "항문거근 (Levator ani muscle)"}, {"letter": "E", "text": "기인대 (Cardinal ligament)"}], "answer": "A", "explanation": "자궁탈출증은 주로 자궁천골인대(uterosacral ligament) 및 기인대(cardinal ligament)의 약화로 발생합니다. 항문관(anal canal)이 정상이라는 것은 후방 구역의 주요 지지 구조인 회음체(perineal body)가 온전함을 시사합니다. 회음체는 직장과 질 사이의 섬유근성 구조로, 항문관의 안정성에 핵심적인 역할을 합니다. 따라서 '회음체 (Perineal body)'가 정상일 것으로 가장 예상됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "DeLancey 분류에 따른 골반 지지 구조 중 Level 1의 약화로 인해 주로 발생하는 것은?", "options": [{"letter": "A", "text": "Rectocele"}, {"letter": "B", "text": "Urethrocele"}, {"letter": "C", "text": "Cystocele"}, {"letter": "D", "text": "Uterine prolapse"}, {"letter": "E", "text": "Enterocele"}], "answer": "D", "explanation": "Level 1은 cardinal ligament와 uterosacral ligament 등으로 구성되어 자궁과 질 상부를 지지합니다. 이 구조의 손상은 자궁탈출증(uterine prolapse)으로 이어집니다. Cystocele과 urethrocele은 주로 Level 2/3의 앞쪽 지지 결함, rectocele은 뒤쪽 지지 결함과 관련됩니다. Enterocele은 정단부 탈출과 동반될 수 있으나, Level 1 단독 결함보다는 복합 결함에서 나타납니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "요실금 기전을 설명하는 해먹(hammock) 이론에서, 정상적인 요도 폐쇄력을 유지하기 위해 필요한 요도-방광 연결 각도는?", "options": [{"letter": "A", "text": "130°"}, {"letter": "B", "text": "180°"}, {"letter": "C", "text": "110°"}, {"letter": "D", "text": "90°"}, {"letter": "E", "text": "150°"}], "answer": "A", "explanation": "강의에서 요도가 적절한 폐쇄력을 갖기 위해서는 약 130°의 예각을 유지해야 한다고 하였습니다. 이 각도가 소실되면 요실금이나 폐색이 발생할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "중격자궁으로 인한 반복 유산 환자에서 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁경하 중격 절제술"}, {"letter": "B", "text": "호르몬 요법"}, {"letter": "C", "text": "경과 관찰"}, {"letter": "D", "text": "자궁난관조영술"}, {"letter": "E", "text": "복강경하 자궁성형술"}], "answer": "A", "explanation": "중격자궁이 반복 유산의 원인일 때, 자궁경을 이용한 중격 절제술(hysteroscopic septectomy)이 표준 치료입니다. 이 수술은 중격을 절제함으로써 착상을 위한 자궁내강을 개선하고 유산율을 낮춥니다. 경과 관찰은 해부학적 문제를 해결하지 못합니다. 복강경하 자궁성형술은 쌍각자궁에서 사용됩니다. 자궁난관조영술은 진단 검사이며, 호르몬 요법은 중격 자체를 교정하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "33세 여성이 2년 전 자연 유산 후 자궁내막 소파술(D&C)을 받은 뒤 월경량이 거의 없어졌으며, 1년간 임신이 되지 않아 내원하였다. 자궁난관조영술(HSG)에서 자궁강 내 여러 곳에 음영 결손(filling defects)이 관찰되었다. 월경 주기는 규칙적이며 호르몬 검사는 정상이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁절제술(Hysterectomy)"}, {"letter": "B", "text": "자궁경 유착 박리술(Hysteroscopic adhesiolysis)"}, {"letter": "C", "text": "항생제 치료"}, {"letter": "D", "text": "자궁나팔관조영술 반복(Repeat HSG)"}, {"letter": "E", "text": "경구 피임약 투여"}], "answer": "B", "explanation": "소파술 후 월경량 감소와 자궁강 내 유착 소견은 Asherman 증후군을 시사하며, 표준 치료는 자궁경을 통한 유착 박리술(Hysteroscopic adhesiolysis)이다. 자궁절제술은 가임기 여성에서 부적절하고, 경구 피임약이나 항생제는 원인 치료가 되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "임신 6주에 난소 종양이 발견된 환자에서, 수술적 난소 절제가 불가피한 경우 가장 적절한 수술 시점은?", "options": [{"letter": "A", "text": "임신 8주경에 수술한다"}, {"letter": "B", "text": "임신 20주 이후에 수술한다"}, {"letter": "C", "text": "임신 12주 이후에 수술한다"}, {"letter": "D", "text": "분만 후에 수술한다"}, {"letter": "E", "text": "진단 즉시 수술한다"}], "answer": "C", "explanation": "Before the luteoplacental shift (which occurs around 5–10 weeks of gestation), the pregnancy relies on progesterone produced by the corpus luteum in the ovary. If the ovary containing the corpus luteum is removed before this shift, progesterone levels drop, leading to miscarriage. After 10–12 weeks, the placenta takes over progesterone production (luteoplacental shift), so oophorectomy would not terminate the pregnancy. '진단 즉시 수술한다' and '임신 8주경에 수술한다' risk miscarriage because the shift may not be complete. '임신 20주 이후에 수술한다' and '분만 후에 수술한다' delay surgery unnecessarily if the mass is risky. Therefore, '임신 12주 이후에 수술한다' is the safest option.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "33세 여성이 유산 소파술 후 월경량이 매우 적어지고 간헐적 하복통이 있다. 자궁난관조영술에서 자궁강 내 불규칙한 충만결손이 관찰되었다. 자궁내시경 검사에서 자궁내막 유착이 확인되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "고용량 에스트로겐 요법"}, {"letter": "B", "text": "체외수정 시술"}, {"letter": "C", "text": "전자궁절제술"}, {"letter": "D", "text": "자궁경하 유착박리술"}, {"letter": "E", "text": "광범위 항생제 투여"}], "answer": "D", "explanation": "자궁내막 유착증(Asherman's syndrome)의 치료는 자궁경하 유착박리술(hysteroscopic adhesiolysis)을 통해 자궁강을 복원하는 것이다. 수술 후 유착 재발 방지를 위해 자궁강 내 풍선 카테터 유치나 고용량 에스트로겐 투여 후 프로게스테론 요법을 보조적으로 사용할 수 있지만, 근본적인 치료는 유착 박리수술이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "다음 중 자궁내 유착(Asherman's syndrome)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "치료를 위해 GnRH agonist를 장기간 투여하는 것이 원칙이다."}, {"letter": "B", "text": "과거 소파수술력과 무월경 또는 생리량 감소의 병력과 관련된다."}, {"letter": "C", "text": "HSG에서 자궁강이 전형적인 삼각형 모양으로 깨끗하게 관찰된다."}, {"letter": "D", "text": "질식 초음파에서 자궁내막이 비정상적으로 두꺼워져 관찰된다."}, {"letter": "E", "text": "난관의 개통성과 직접적인 연관이 있어 난관 성형술이 필요하다."}], "answer": "B", "explanation": "자궁내 유착(Asherman's syndrome)은 주로 소파수술 후 발생하며, 무월경이나 생리량 감소, 불임을 유발할 수 있다. HSG에서는 자궁강 내 불규칙한 충만 결손이나 폐쇄 소견을 보이며, 치료는 hysteroscopic adhesiolysis가 원칙이다. 질식 초음파에서 자궁내막이 두꺼워지는 것은 다른 병변에서 관찰될 수 있으며, GnRH agonist는 치료에 사용되지 않는다. 따라서 과거 소파수술력과 무월경 또는 생리량 감소의 병력과 관련된다는 설명이 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "복식 전자궁절제술 후 3일째 환자가 우측 측복부 통증과 발열을 호소하며, 시행한 신장 초음파에서 오른쪽 수신증(hy lioinguinal nerve block을 시행하였으나 산모가 지속적으로 하복부 통증을 호소한다. 마취되지 않아 통증의 원인이 될 가능성이 가장 높은 신경은?", "options": [{"letter": "A", "text": "Obturator nerve"}, {"letter": "B", "text": "Inferior gluteal nerve"}, {"letter": "C", "text": "Lateral femoral cutaneous nerve"}, {"letter": "D", "text": "Genitofemoral nerve"}, {"letter": "E", "text": "Posterior femoral cutaneous nerve"}], "answer": "D", "explanation": "Pudendal nerve block은 회음부와 질 하부를 마취하고, ilioinguinal nerve block은 anterior labia majora와 mons pubis 일부를 마취하지만, genitofemoral nerve의 genital branch는 mons pubis와 labia majora의 감각을 담당하므로 이 신경이 마취되지 않으면 통증이 지속될 수 있다. 다른 신경들은 주로 하지나 둔부에 분포하여 해당 통증과 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "25세 여성이 2년간 지속된 심한 월경통과 성교통으로 내원하였다. 통증은 월경기 내내 지속되며 월경 후에도 아랫배 불편감이 있다. 골반 내진에서 자궁부속기 이동성 감소와 더글라스와(Douglas pouch)에 압통성 결절이 촉진된다. 질초음파에서 왼쪽 난소에 4 cm 크기의 균질한 저에코 낭종이 관찰된다. 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "기능성 난소 낭종(Functional ovarian cyst)"}, {"letter": "B", "text": "골반 염증성 질환(Pelvic inflammatory disease)"}, {"letter": "C", "text": "자궁선근증(Adenomyosis)"}, {"letter": "D", "text": "자궁근종(Uterine myoma)"}, {"letter": "E", "text": "자궁내막증(Endometriosis)"}], "answer": "E", "explanation": "월경통, 성교통, 더글라스와의 압통성 결절 및 특징적인 난소 낭종(자궁내막종)은 자궁내막증(Endometriosis)의 전형적인 임상 소견이다. 골반 염증성 질환은 감염 증상과 양측 부속기 압통이 동반되고, 기능성 난소 낭종은 자연 소실되며 통증이 덜하다. 자궁근종은 주로 월경 과다를, 자궁선근증은 미만성 자궁 비대를 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "가임기 여성에서 생리 주기 중간에 반복적으로 발생하는 일측성 하복부 통증으로, 수시간 지속 후 자연 소실되는 경우 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "자궁내막증 (endometriosis)"}, {"letter": "B", "text": "난소낭종 파열 (ovarian cyst rupture)"}, {"letter": "C", "text": "배란통 (mittelschmerz)"}, {"letter": "D", "text": "자궁외임신 (ectopic pregnancy)"}, {"letter": "E", "text": "골반염증성질환 (pelvic inflammatory disease)"}], "answer": "C", "explanation": "배란통은 배란 시기 난포 파열로 인한 통증으로, 주기적으로 생리 중간에 발생하며 짧게 지속되는 특징이 있다. '자궁외임신'은 무월경 후 발생하고, '난소낭종 파열'은 더 극심한 통증과 출혈 소견을 보인다. 'PID'와 '자궁내막증'은 주로 지속적이거나 월경과 연관된 통증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "만성골반통증 환자에서 복강경 검사상 유착(adhesion)이 발견되었다. 유착에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "유착박리술(adhesiolysis)은 모든 환자에서 통증 완화를 보장한다"}, {"letter": "B", "text": "유착이 심할수록 통증도 반드시 심하다"}, {"letter": "C", "text": "장폐색이나 불임이 없는 경우 유착박리술이 도움이 되지 않을 수 있다"}, {"letter": "D", "text": "무증상인 경우에도 예방적 유착박리술이 권장된다"}, {"letter": "E", "text": "유착은 선천적인 경우가 대부분이며 이전 수술력과 무관하다"}], "answer": "C", "explanation": "'장폐색이나 불임이 없는 경우 유착박리술이 도움이 되지 않을 수 있다'가 옳은 설명이다. 골반 수술 후 유착은 통증과 반드시 비례하지 않으며, 불임이나 장폐색이 동반되지 않은 단순 통증 환자에서는 수술적 유착 제거가 증상 호전을 보장하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "28세 여성이 '자궁내막증' 진단을 받고 '내막증식증'과 어떻게 다른지 물어본다. 다음 중 올바른 설명은?", "options": [{"letter": "A", "text": "내막증은 자궁근층에 자궁내막 조직이 침범한 것이고, 내막증식증은 자궁내막이 두꺼워진 것이다."}, {"letter": "B", "text": "내막증식증은 난소에 종괴를 형성하지만 내막증은 그렇지 않다."}, {"letter": "C", "text": "내막증은 폐경 후 여성에서 호발하고, 내막증식증은 가임기 여성에서 호발한다."}, {"letter": "D", "text": "내막증은 자궁내막 조직이 자궁 외부에 존재하는 것이고, 내막증식증은 자궁내막의 과도한 증식이 있는 상태이다."}, {"letter": "E", "text": "두 질환은 같은 질환으로 내막증식증이 진행되면 내막증이 된다."}], "answer": "D", "explanation": "자궁내막증(endometriosis)은 자궁내막 조직이 자궁 외부에 존재하는 것이고, 자궁내막증식증(endometrial hyperplasia)은 자궁안을 덮고 있는 자궁내막의 비정상적인 증식을 의미합니다. '두 질환은 같은 질환으로 내막증식증이 진행되면 내막증이 된다'는 잘못된 설명으로, 두 질환은 발생 기전과 위치가 전혀 다릅니다. '내막증은 자궁근층에 자궁내막 조직이 침범한 것이고'는 자궁선근증(adenomyosis)에 대한 설명입니다. '내막증은 폐경 후 여성에서 호발하고'는 틀린 설명으로, 자궁내막증은 가임기 여성에서 주로 발생합니다. '내막증식증은 난소에 종괴를 형성하지만' 역시 잘못된 정보로, 난소에 종괴(endometrioma)를 형성하는 것은 자궁내막증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "자궁내막증의 발생 기전에 대한 가설 중, 월경혈이 나팔관을 통해 역류하여 복강 내에 자궁내막 조직이 착상된다는 이론은 무엇인가?", "options": [{"letter": "A", "text": "Coelomic metaplasia theory"}, {"letter": "B", "text": "Vascular dissemination theory"}, {"letter": "C", "text": "Retrograde menstruation theory"}, {"letter": "D", "text": "Lymphatic spread theory"}, {"letter": "E", "text": "Embryonic rest theory"}], "answer": "C", "explanation": "역행월경설(Retrograde menstruation theory)은 Sampson에 의해 제안된 가설로, 월경혈이 나팔관을 통해 복강 내로 역류하여 자궁내막 조직이 복막 등에 착상하면서 내막증이 발생한다는 이론입니다. Coelomic metaplasia theory는 복막 상피가 자궁내막 조직으로 화생(metaplasia)된다는 가설입니다. Vascular dissemination theory와 Lymphatic spread theory는 각각 혈관과 림프관을 통해 자궁내막 조직이 원격 전이된다는 가설입니다. Embryonic rest theory는 언급되지 않은 가설입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "다음 중 자궁내막증으로 인한 통증의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "월경 시작과 동시에 발생하는 1-2일간의 경련성 월경통"}, {"letter": "B", "text": "배란 시기에만 발생하는 중간기 통증"}, {"letter": "C", "text": "월경전 시작되어 월경 후에도 지속되는 속발성 월경통"}, {"letter": "D", "text": "월경 주기와 무관하게 발생하는 비주기적 골반통"}, {"letter": "E", "text": "초경 이후 지속되어 온 원발성 월경통"}], "answer": "C", "explanation": "자궁내막증의 통증은 전형적으로 속발성 월경통(이전에는 월경통이 없다가 나중에 발생)으로, 월경 시작 수일 전부터 시작되어 월경 중, 그리고 월경 후에도 수일간 지속될 수 있습니다. '월경 시작과 동시에 발생하는 1-2일간의 경련성 월경통'은 원발성 월경통의 특징입니다. '비주기적 골반통'은 자궁내막증에서도 만성적으로 나타날 수 있으나 주된 통증은 월경 주기와 연관됩니다. '초경 이후 지속된 원발성 월경통'도 자궁내막증보다 원발성 월경통에 합당합니다. '배란 시기 중간기 통증'은 Mittelschmerz로, 내막증과 무관합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "35세 여성이 심한 월경통과 월경과다를 주소로 내원하였다. 골반진찰에서 자궁은 대칭적으로 커져 있고 미만성 압통이 있으나, 자궁부속기에 덩이는 만져지지 않으며 자궁의 움직임은 정상이다. 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "자궁근종"}, {"letter": "B", "text": "골반염증성질환"}, {"letter": "C", "text": "자궁내막증"}, {"letter": "D", "text": "난소낭종"}, {"letter": "E", "text": "자궁선근증"}], "answer": "E", "explanation": "Adenomyosis (자궁선근증) presents with secondary dysmenorrhea and menorrhagia. Physical examination reveals a symmetrically enlarged, tender uterus with normal mobility. In contrast, endometriosis often presents with a fixed, retroverted uterus and tender nodules in the cul-de-sac or adnexal masses. Uterine myomas may cause an irregular, firm enlargement. PID typically presents with fever and cervical motion tenderness. Ovarian cysts present as adnexal masses. Thus, the most likely diagnosis is '자궁선근증'.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "자궁내막증이 의심되는 환자에서 시행하는 골반 진찰 소견으로 가장 시사하는 것은?", "options": [{"letter": "A", "text": "자궁의 측방 편위와 비압통성 자궁부속기 종괴"}, {"letter": "B", "text": "자궁의 전굴과 압통성 결절"}, {"letter": "C", "text": "자궁의 후굴, 자궁천골인대의 압통성 결절 및 고정된 자궁"}, {"letter": "D", "text": "자궁의 후굴과 비압통성 난소 종괴"}, {"letter": "E", "text": "정상 소견만 관찰된다."}], "answer": "C", "explanation": "자궁내막증의 골반 진찰에서 자주 관찰되는 소견은 자궁의 후굴(retroversion), 자궁천골인대(uterosacral ligament)의 압통성 결절(nodularity), 그리고 유착으로 인해 자궁이 고정(fixed)되어 움직임이 제한되는 것이다. '자궁의 후굴, 자궁천골인대의 압통성 결절 및 고정된 자궁'이 가장 시사하는 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "자궁내막증(endometriosis)으로 인한 불임의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "HSG 소견에서 나팔관이 정상적인 손 모양의 fimbria를 보인다."}, {"letter": "B", "text": "중증 자궁내막증은 시험관 시술(IVF)의 적응증이 된다."}, {"letter": "C", "text": "복강경 소견에서 골반 장기의 adhesion이 거의 관찰되지 않는다."}, {"letter": "D", "text": "PID와 달리 tubo-ovarian abscess를 유발하지 않는다."}, {"letter": "E", "text": "자궁내막증은 대부분 난소의 follicular fluid로 쉽게 진단된다."}], "answer": "B", "explanation": "중증 자궁내막증은 광범위한 골반 유착과 난관 손상을 초래하여 자연 임신이 어려우므로 시험관 시술의 적응증입니다. 복강경 소견에서는 치밀한 유착(dense adhesion)이 관찰되며, 나팔관의 fimbria가 소실되고 장기가 달라붙는 등 비정상 소견을 보입니다. 자궁내막증 진단은 복강경 및 조직검사가 gold standard이며, follicular fluid로 진단하지 않습니다. PID와 마찬가지로 tubo-ovarian abscess와 같은 심한 염증성 유착을 유발할 수 있습니다. 따라서 '중증 자궁내
