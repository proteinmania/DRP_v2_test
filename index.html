<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLRF Review — REI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
    --accent: #2563eb; --accent-light: #eff6ff;
    --correct: #16a34a; --wrong: #dc2626;
    --text: #1e293b; --text2: #64748b; --border: #e2e8f0;
    --font-size: 16px;
  }
  html { font-size: var(--font-size); }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ── Header (FTM flex column) ────────────────────────────────────────── */
  #header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center;
    flex-shrink: 0; flex-wrap: wrap;
  }
  #header > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #header { gap: 12px; }
    #header > * + * { margin-left: 0; }
  }
  #header h1 { font-size: 1rem; color: var(--accent); font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #progress-bar-wrap {
    flex: 1; min-width: 120px; height: 6px;
    background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  #progress-bar { height: 100%; width: 0%; background: var(--accent);
    border-radius: 3px; transition: width .3s; }
  #progress-label { font-size: .82rem; color: var(--text2); white-space: nowrap; }
  #wrong-badge {
    background: var(--wrong); color: #fff; border-radius: 12px;
    padding: 2px 10px; font-size: .78rem; font-weight: 600; display: none;
  }
  .font-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: .82rem;
    transition: background .15s, color .15s;
  }
  .font-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .font-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #btn-hide-img, #btn-review {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; font-size: .82rem; white-space: nowrap;
  }
  #btn-hide-img:hover, #btn-review:hover {
    background: var(--accent-light); border-color: var(--accent); color: var(--accent);
  }
  #btn-review.active { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  #gemini-btn {
    padding: 4px 10px; border-radius: 6px; border: none;
    background: #eef2ff; color: #4338ca; cursor: pointer;
    font-size: .78rem; font-weight: 600; white-space: nowrap;
    outline: 1px solid #c7d7fe;
  }
  #gemini-btn:hover { background: #e0e7ff; outline-color: var(--accent); }
  #generated-label { font-size: .72rem; color: var(--text2); margin-left: auto; white-space: nowrap; }

  /* ── Main layout ─────────────────────────────────────────────────────── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: slide panel (DRP scroll-snap, dark bg) ───────────────────── */
  #slide-col {
    width: 42%; min-width: 20%; max-width: 70%;
    background: #1e293b; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  #slide-col::-webkit-scrollbar { display: none; }
  #slide-col { scrollbar-width: none; }
  .slide-page-item {
    height: calc(100vh - 52px); scroll-snap-align: start;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; gap: .5rem; flex-shrink: 0;
    position: relative;
  }
  .slide-canvas-wrap {
    position: relative; display: inline-block; line-height: 0;
  }
  .slide-canvas-wrap img {
    max-width: 100%; max-height: calc(100% - 40px);
    object-fit: contain; border-radius: 6px; cursor: zoom-in;
  }
  .anno-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; border-radius: 6px;
  }
  .anno-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  .slide-page-meta {
    color: #94a3b8; font-size: .75rem; text-align: center;
  }
  .slide-page-badge {
    position: absolute; bottom: 1rem; right: 1rem;
    background: rgba(0,0,0,.5); color: #94a3b8;
    font-size: .7rem; padding: 3px 8px; border-radius: 99px;
  }
  #no-slide-msg {
    color: #94a3b8; font-size: .85rem; text-align: center;
    padding: 40px 0; display: none;
  }

  /* ── Annotation toolbar (vertical bar between slide-col and divider) ── */
  #anno-toolbar {
    width: 44px; flex-shrink: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: #1e293b; color: #cbd5e1;
    padding: 8px 4px; gap: 3px;
    border-right: 1px solid #334155;
  }
  .anno-mode, .anno-tool, #anno-undo, #anno-clear, #anno-clear-all {
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
    font-size: .82rem; display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0;
  }
  .anno-mode:hover, .anno-tool:hover, #anno-undo:hover, #anno-clear:hover, #anno-clear-all:hover {
    background: #334155; color: #e2e8f0;
  }
  .anno-mode.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .anno-tool.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .anno-mode:disabled, .anno-tool:disabled,
  #anno-undo:disabled, #anno-clear:disabled, #anno-clear-all:disabled {
    opacity: .35; cursor: default;
  }
  .anno-sep {
    border: none; border-top: 1px solid #334155;
    width: 28px; margin: 2px 0; padding: 0;
  }
  #anno-color {
    width: 28px; height: 28px; border: 1px solid #334155;
    border-radius: 6px; cursor: pointer; background: none; padding: 1px;
  }
  #anno-size {
    width: 4px; height: 60px; accent-color: #3b82f6; cursor: pointer;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: bt-lr; background: transparent;
  }
  /* Safari / older Samsung Internet: range slider track & thumb */
  #anno-overlay-size::-webkit-slider-runnable-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #3b82f6; border-radius: 50%; margin-top: -5px;
  }
  #anno-overlay-size::-moz-range-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-moz-range-thumb {
    width: 14px; height: 14px; background: #3b82f6;
    border: none; border-radius: 50%;
  }

  /* ── Annotation slide nav (mobile draw mode) ─────────────────────────── */
  #anno-slide-nav {
    position: sticky; top: 0; z-index: 20;
    display: none; justify-content: center; align-items: center;
    padding: 8px;
    background: rgba(15,23,42,.95); flex-shrink: 0;
  }
  #anno-slide-nav > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #anno-slide-nav { gap: 12px; }
    #anno-slide-nav > * + * { margin-left: 0; }
  }
  #anno-slide-nav button {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: .9rem; display: flex; align-items: center; justify-content: center;
  }
  #anno-slide-nav button:hover { background: #334155; }
  #anno-slide-nav button:disabled { opacity: .3; cursor: default; }
  #anno-slide-counter { color: #94a3b8; font-size: .78rem; }

  /* ── Divider (DRP % based + touch) ──────────────────────────────────── */
  #divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
    z-index: 10; display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }
  body.resizing { cursor: col-resize; user-select: none; }
  #divider::after {
    content: '⋮'; color: #94a3b8; font-size: 14px; pointer-events: none;
  }
  #divider:hover::after, #divider.dragging::after { color: #fff; }

  /* ── Right: quiz panel ──────────────────────────────────────────────── */
  #quiz-col {
    flex: 1; min-width: 20%; padding: 1.25rem 1.5rem 50vh;
    overflow-y: auto; overflow-x: hidden;
  }

  /* ── Section ────────────────────────────────────────────────────────── */
  .page-section {
    margin-bottom: 2.5rem;
    scroll-margin-top: 16px;
  }
  .section-header {
    font-size: .75rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 1rem;
  }

  /* ── Question card ──────────────────────────────────────────────────── */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; transition: border-color .2s;
  }
  .q-card.focused { border-color: var(--accent); }
  .q-card.correct-card { border-color: var(--correct); }
  .q-card.wrong-card { border-color: var(--wrong); }
  /* V2 individual question cards: tighter spacing for scrollable list */
  .q-card.v2-card {
    margin-bottom: 0.75rem;
    scroll-margin-top: 1rem;  /* for scrollIntoView */
  }
  .q-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: .75rem; gap: 8px;
  }
  .q-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: .85rem; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .q-nav button:hover { background: var(--accent-light); color: var(--accent); }
  .q-nav button:disabled { opacity: .3; cursor: default; }
  .q-slide-link {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent); font-size: .72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: background .15s, border-color .15s;
  }
  .q-slide-link:hover { background: var(--accent-light); border-color: var(--accent); }
  .q-counter { font-size: .8rem; color: var(--text2); font-weight: 500; }

  /* Card metadata badges */
  .card-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge {
    background: var(--surface2); border-radius: 10px;
    padding: 2px 8px; font-size: .7rem; color: var(--text2);
  }
  .badge-num {
    background: var(--accent); color: #fff;
  }
  .badge-basket-cc {
    background: #f59e0b; color: #fff;
  }
  .badge-basket-mech {
    background: #8b5cf6; color: #fff;
  }
  .badge-basket-diff {
    background: #ec4899; color: #fff;
  }
  .badge-mesh-diff {
    background: #0ea5e9; color: #fff;
  }
  .q-type-divider {
    display: flex; align-items: center;
    margin-bottom: 10px; padding: 6px 0;
    color: #0ea5e9; font-size: .78rem; font-weight: 600;
    letter-spacing: .3px;
  }
  .q-type-divider > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    .q-type-divider { gap: 8px; }
    .q-type-divider > * + * { margin-left: 0; }
  }
  .q-type-divider::before, .q-type-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
  }

  .q-text { font-size: .92rem; line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }

  /* ── Options (FTM: letter + text + exclude X) ───────────────────────── */
  .options { display: flex; flex-direction: column; margin-bottom: .75rem; }
  .options > * + * { margin-top: .45rem; }
  @supports (gap: 0px) {
    .options { gap: .45rem; }
    .options > * + * { margin-top: 0; }
  }
  .option {
    display: flex; align-items: flex-start; gap: 8px;
    padding: .55rem .85rem; border-radius: 7px;
    border: 1.5px solid var(--border); cursor: pointer;
    font-size: .88rem; line-height: 1.45;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .option:hover:not(.locked):not(.excluded) {
    border-color: var(--accent); background: var(--accent-light);
  }
  .option.correct { border-color: var(--correct); background: #f0fdf4;
    color: var(--correct); font-weight: 600; }
  .option.wrong { border-color: var(--wrong); background: #fef2f2;
    color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.excluded {
    background: #fef2f2; border-color: var(--wrong); opacity: .6;
    cursor: default;
  }
  .option.excluded .exclude-btn {
    background: var(--wrong); color: #fff; border-color: var(--wrong);
  }
  .letter { font-weight: 700; color: var(--accent); min-width: 16px; flex-shrink: 0; }
  .opt-text { flex: 1; }
  .exclude-btn {
    margin-left: auto; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .exclude-btn:hover { background: var(--surface2); }

  /* ── Answer box ─────────────────────────────────────────────────────── */
  .answer-box {
    display: none; margin-top: .75rem; padding: .75rem;
    background: var(--accent-light); border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .answer-box.show { display: block; }
  .correct-badge {
    background: var(--correct); color: #fff; border-radius: 10px;
    padding: 2px 10px; font-size: .78rem; display: inline-block;
    margin-bottom: 6px; font-weight: 600;
  }
  .explanation { font-size: .85rem; line-height: 1.55; color: #334155; }

  /* ── Highlighter (text selection → mark) ─────────────────────── */
  .hl-mark {
    background: #fef08a; border-radius: 2px; padding: 0 1px;
    cursor: pointer;
  }
  .hl-mark:hover { opacity: .7; }
  .mesh-path-box {
    margin-top: 8px; padding: 8px 10px;
    background: #fef3c7; border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    font-size: .82rem; line-height: 1.5; color: #92400e;
  }

  /* ── Key Content box (DRP conditional) ──────────────────────────────── */
  .key-content-box {
    margin-top: 1rem; padding: .85rem 1rem;
    background: #fefce8; border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b; border-radius: 0 8px 8px 0;
    font-size: .85rem; line-height: 1.6; color: #78350f;
  }
  .key-content-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #92400e; margin-bottom: .35rem;
  }

  /* ── MeSH overlay (totalmesh / chunkmesh) ────────────────────────────── */
  .mesh-overlay-box {
    margin-top: .7rem; padding: .75rem 1rem;
    border-radius: 0 8px 8px 0;
    font-size: .82rem; line-height: 1.6;
  }
  .totalmesh-box {
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-left: 4px solid #2563eb; color: #1e3a5f;
  }
  .chunkmesh-box {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-left: 4px solid #16a34a; color: #14532d;
  }
  .mesh-overlay-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: .35rem;
  }
  .mesh-overlay-text {
    margin: 0; white-space: pre-wrap; font-family: inherit;
    font-size: .8rem; line-height: 1.5;
  }
  .learning-path-panel {
    margin: .7rem 0; padding: .75rem 1rem;
    background: #fef2f2; border: 1px solid #fecaca;
    border-left: 4px solid #dc2626; border-radius: 0 8px 8px 0;
  }
  .learning-path-title {
    font-size: .75rem; font-weight: 700; color: #991b1b;
    margin-bottom: .5rem;
  }

  /* ── Expandable transcript (FTM conditional) ────────────────────────── */
  .chunk-detail { margin-top: .5rem; }
  .chunk-detail summary {
    font-size: .75rem; color: var(--text2); cursor: pointer;
  }
  .chunk-text {
    font-size: .75rem; color: var(--text2); margin-top: 6px;
    line-height: 1.5; white-space: pre-wrap;
    max-height: 160px; overflow-y: auto;
  }

  /* ── Image fullscreen overlay (DRP) ─────────────────────────────────── */
  #img-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 300;
    cursor: zoom-out; align-items: center; justify-content: center;
  }
  #img-overlay.show { display: flex; }
  #img-container {
    position: relative; display: inline-block; line-height: 0;
  }
  #img-container img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 6px; transition: transform .1s ease;
    transform-origin: center center;
  }
  #anno-overlay-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border-radius: 6px;
    pointer-events: none;
  }
  #anno-overlay-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  #anno-overlay-toolbar {
    display: none; position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 310;
    align-items: center; flex-wrap: wrap;
    background: rgba(15,23,42,.95); color: #cbd5e1;
    padding: 8px 14px; border-radius: 12px; font-size: .78rem;
  }
  #anno-overlay-toolbar.show { display: flex; }
  #anno-overlay-toolbar > * + * { margin-left: 4px; }
  @supports (gap: 0px) {
    #anno-overlay-toolbar { gap: 4px; }
    #anno-overlay-toolbar > * + * { margin-left: 0; }
  }

  /* ── Review overlay (DRP full-screen) ───────────────────────────────── */
  #review-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    z-index: 200; flex-direction: column;
  }
  #review-overlay.show { display: flex; }
  #review-header {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #review-title { font-size: .95rem; font-weight: 700; color: var(--accent); }
  #review-close {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: .85rem;
  }
  #review-close:hover { background: #fef2f2; border-color: var(--wrong); color: var(--wrong); }
  #review-body { flex: 1; display: flex; overflow: hidden; }
  #review-slide-col {
    width: 42%; min-width: 20%; max-width: 70%; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain; background: #1e293b;
    -webkit-overflow-scrolling: touch;
  }
  #review-slide-col::-webkit-scrollbar { display: none; }
  #review-slide-col { scrollbar-width: none; }
  #review-slide-col img {
    width: 100%; height: auto; object-fit: contain; display: block;
  }
  #review-divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
  }
  #review-divider:hover, #review-divider.dragging { background: var(--accent); }
  #review-quiz-col {
    flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem 50vh;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Inline slides (portrait only) ──────────────────────────────────── */
  .inline-slides { display: none; margin-bottom: .75rem; }
  /* Safari < 15 fallback: padding-bottom trick maintains 16:9 ratio */
  .inline-slide-viewer {
    position: relative; background: #1e293b; border-radius: 8px;
    overflow: hidden; width: 100%; padding-bottom: 56.25%; height: 0;
  }
  .inline-slide-viewer > * {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @supports (aspect-ratio: 1) {
    .inline-slide-viewer {
      aspect-ratio: 16/9; padding-bottom: 0; height: auto;
      display: flex; align-items: center; justify-content: center;
    }
    .inline-slide-viewer > * {
      position: static; width: auto; height: auto;
    }
  }
  .inline-slide-img {
    max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;
  }
  .inline-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.45); color: #fff; border: none;
    border-radius: 50%; width: 32px; height: 32px; font-size: .9rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: background .15s;
  }
  .inline-nav-btn:hover { background: rgba(37,99,235,.8); }
  .inline-nav-btn:disabled { opacity: .2; cursor: default; }
  .inline-nav-btn.prev { left: 8px; }
  .inline-nav-btn.next { right: 8px; }
  .inline-slide-counter {
    text-align: center; font-size: .72rem; color: var(--text2); margin-top: 4px;
  }

  /* ── Portrait responsive (DRP) ──────────────────────────────────────── */

"B", "text": "SCJ는 편평상피와 원주상피가 만나는 경계로, 편평세포암(squamous cell carcinoma)의 호발 부위이다."}, {"letter": "C", "text": "SCJ는 자궁경부 바깥쪽(ectocervix)의 원주상피와 안쪽(endocervix)의 편평상피 경계를 말한다."}, {"letter": "D", "text": "SCJ의 위치는 출생 후 일생 동안 변하지 않는다."}, {"letter": "E", "text": "SCJ는 자궁경부 선암(adenocarcinoma)이 가장 흔히 발생하는 부위이다."}], "answer": "B", "explanation": "편평원주상피접합부(SCJ)는 자궁경부 바깥쪽의 편평상피와 안쪽의 원주상피가 만나는 경계로, 자궁경부 편평세포암이 가장 흔히 발생하는 부위입니다. 자궁경부 안쪽은 원주상피, 바깥쪽은 편평상피로 덮여 있으며 SCJ는 연령에 따라 위치가 변화합니다(가임기에는 외번되어 외자궁경부에 위치, 폐경 후에는 자궁경부 안쪽으로 이동). 따라서 정답은 \"SCJ는 편평상피와 원주상피가 만나는 경계로, 편평세포암의 호발 부위이다.\" 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종 바이러스(HPV)의 발암기전에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "HPV E6 단백질은 Rb와, E7 단백질은 p53과 결합하여 종양억제 기능을 저해한다."}, {"letter": "B", "text": "HPV E6 단백질은 BRCA1, E7 단백질은 BRCA2와 결합을 통해 DNA 수선을 방해한다."}, {"letter": "C", "text": "HPV E6 단백질은 p53과, E7 단백질은 Rb와 결합하여 종양억제 기능을 저해한다."}, {"letter": "D", "text": "HPV E6 단백질은 p53의 발현을 증가시키고, E7 단백질은 Rb의 인산화를 촉진한다."}, {"letter": "E", "text": "HPV E6와 E7 단백질은 모두 p53에 결합하여 세포자멸사를 유도한다."}], "answer": "C", "explanation": "고위험 HPV의 발암기전에서 E6 단백질은 p53 종양억제단백질과 결합하여 분해를 촉진하고, E7 단백질은 Rb 단백질과 결합하여 E2F를 유리시켜 세포주기를 비정상적으로 진행시킵니다. 'HPV E6 단백질은 Rb와, E7 단백질은 p53과 결합한다'는 반대로 기술되어 틀립니다. 'BRCA1, BRCA2'는 유방암/난소암 관련 유전자로 HPV와 직접적 연관이 없습니다. 'p53 발현 증가, Rb 인산화 촉진'은 실제 기전과 반대입니다. '모두 p53에 결합'하는 것은 사실이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부암 예방을 위한 인유두종 바이러스(HPV) 백신에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "4가 백신은 HPV 16, 18형 외에 31, 33형을 포함한다."}, {"letter": "B", "text": "HPV 백신은 성관계 시작 이후에 접종해야 효과가 있다."}, {"letter": "C", "text": "9가 백신은 HPV 16, 18, 31, 33, 45, 52, 58형을 포함한다."}, {"letter": "D", "text": "현재 우리나라 국가예방접종사업에서 무료 접종하는 백신은 4가 백신이다."}, {"letter": "E", "text": "2가 백신은 HPV 6, 11형을 포함하여 첨규콘딜로마를 예방한다."}],  유전자 변이 (BRCA1 mutation)"}, {"letter": "E", "text": "조기 성관계 시작 (Early onset of sexual intercourse)"}], "answer": "E", "explanation": "'조기 성관계 시작'은 인유두종 바이러스(HPV) 감염 및 지속 감염의 위험을 증가시켜 자궁경부암의 발생과 연관된다. 비만, 늦은 폐경, 저출산은 자궁내막암의 위험인자이며, BRCA1 변이는 유방암 및 난소암의 위험인자이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "40세 여성이 성교 후 출혈로 내원하여 검사 중 자궁경부에 국한된 2cm 종괴가 확인되었다. MRI상 자궁방 침범은 없었으나 우측 골반 림프절 전이가 확인되었다. 조직생검은 편평상피세포암이었다. 이 환자의 FIGO 2018 병기는?", "options": [{"letter": "A", "text": "IIA"}, {"letter": "B", "text": "IIIB"}, {"letter": "C", "text": "IB1"}, {"letter": "D", "text": "IB2"}, {"letter": "E", "text": "IIIC1"}], "answer": "E", "explanation": "정답은 'IIIC1'이다. 림프절 전이가 확인되었으므로, FIGO 2018 분류에 따라 골반 림프절 전이를 동반한 자궁경부암은 IIIC1으로 분류된다. IIIC는 원발 종양의 크기나 국소 진행 정도와 관계없이 림프절 전이가 있을 때 부여하는 병기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "52세 여자가 복통으로 내원하였다. 골반 초음파에서 우측 난소에 8cm의 고형 종양이 발견되어 개복술을 시행하였다. 우측 난소 및 난관 절제술을 시행하였으며, 동결절편검사에서 장액성 난소암(serous carcinoma)으로 진단되었다. 수술 중 종양의 피막이 파열되었으나 난소 표면 침범은 없었고, 좌측 난소와 자궁은 정상이었다. 골반 및 대동맥 주위 림프절 박리 검체 20개 모두에서 전이 소견은 없었다. 복강 세척 세포검사(peritoneal washing cytology) 결과는 음성이었다. 이 환자의 FIGO 수술적 병기는?", "options": [{"letter": "A", "text": "IC1"}, {"letter": "B", "text": "IA"}, {"letter": "C", "text": "IIA"}, {"letter": "D", "text": "IIB"}, {"letter": "E", "text": "IC2"}], "answer": "A", "explanation": "종양이 한쪽 난소에 국한되어 있고, 수술 중 피막 파열(rupture)이 발생하였으므로 FIGO 2014 병기 IC1에 해당한다. IC2는 난소 표면 침범이 있는 경우, IC3는 복강 세척 세포검사에서 양성인 경우이다. 림프절 전이가 없고 다른 장기 침범이 없으므로 상위 병기는 아니다. 따라서 정답은 IC1이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "FIGO IA1 자궁경부암(침윤 깊이 2mm, 편평상피세포암, LVSI 음성)을 진단받은 28세 미혼 여성이 가임력 보존을 강력히 원할 때 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Type 2 변형 근치자궁적출술(Modified radical hysterectomy)"}, {"letter": "B", "text": "전자궁적출술 및 양측 난소절제술"}, {"letter": "C", "text": "Type 3 광범위 자궁적출술(Radical hysterectomy)"}, {"letter": "D", "text": "원추절제술(Conization)"}, {"letter": "E", "text": "동시항암화학방사선요법(CCRT)"}], "answer": "D", "explanation": "IA1기(침윤 깊이 ≤3mm, LVSI 음성)의 경우 원추절제술만으로도 완치가 가능하며 가임력 보존에 적합합니다. 광범위 자궁적출술(type 2, 3)은 IA2 이상에서 시행됩니다. CCRT는 국소 진행성 병기(IIB 이상)에서 1차 치료입니다. 전자궁적출술은 불필요하게 광범위합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "자궁경부암으로 광범위 자궁적출술 및 골반 림프절 절제술을 시행한 환자의 수술 후 병리소견에서 동시항암화학방사선요법(CCRT)이 필요한 고위험 인자는?", "options": [{"letter": "A", "text": "림프혈관 침범(LVSI)이 있는 경우"}, {"letter": "B", "text": "원발 종양의 크기가 3cm인 경우"}, {"letter": "C", "text": "조직형이 편평상피세포암인 경우"}, {"letter": "D", "text": "침윤 깊이가 4mm인 경우"}, {"letter": "E", "text": "골반 림프절에 전이가 확인된 경우"}], "answer": "E", "explanation": "수술 후 CCRT의 고위험 적응증은 ①골반 림프절 전이, ②절제면 양성, ③자궁주위조직(parametrium) 침윤입니다. 편평상피세포암 조직형은 대부분을 차지하나 그 자체로 적응증이 되지 않습니다. 침윤 깊이 4mm, 종양 크기 3cm, LVSI 등은 중등도 위험인자로 방사선 치료가 고려될 수 있으나, 단독으로 CCRT를 요구하지는 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "FIGO 병기 IIB 자궁경부암(편평상피세포암) 환자에게 가장 적절한 일차 치료는?", "options": [{"letter": "A", "text": "광범위 자궁적출술 및 림프절 절제술"}, {"letter": "B", "text": "단독 항암화학요법"}, {"letter": "C", "text": "원추절제술(Conization)"}, {"letter": "D", "text": "동시항암화학방사선요법(CCRT)"}, {"letter": "E", "text": "선행 항암화학요법 후 근치적 수술"}], "answer": "D", "explanation": "IIB기는 자궁주위조직(parametrial invasion) 침범이 있는 국소 진행성 병기로, 표준 치료는 동시항암화학방사선요법(CCRT)입니다. 수술은 IIA기까지 주로 시행하며, IIB 이상에서는 수술적 접근이 일차 권고되지 않습니다. 원추절제술은 초기 미세침윤암에만 적용됩니다. 단독 항암화학요법은 완치 목적이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "40세 여성이 성교 후 출혈로 병원에 왔다. 자궁경부 조직생검에서 편평세포암이 확인되었고, MRI에서 자궁경부에 국한된 병변으로 측정된 침윤 깊이는 7mm, 수평 확장은 10mm였으며, 자궁방 침범은 없었다. 림프혈관 침범은 관찰되지 않았다. FIGO 병기 IB1에 해당하는 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "동시 항암화학방사선요법으로 근치 치료한다."}, {"letter": "B", "text": "단순 자궁절제술만 시행한다."}, {"letter": "C", "text": "원추절제술만으로 치료를 종결한다."}, {"letter": "D", "text": "수술적 절제를 하지 않고 방사선치료만 시행한다."}, {"letter": "E", "text": "광범위 자궁적출술과 골반 림프절 절제술을 시행한다."}], "answer": "E", "explanation": "FIGO IB1 자궁경부암은 침윤 깊이가 5mm 초과하고 최대 직경이 2cm 이하인 경우로, 표준 치료는 광범위 자궁적출술 및 골반 림프절 절제술이다. 단순 자궁절제술은 IA1 미세침윤암에 국한되며, 원추절제술은 진단 목적이거나 가임력 보존을 원하는 IA기 환자에서 고려된다. 동시 항암화학방사선요법은 IIB 이상의 국소 진행성 자궁경부암에서 일차 치료로 권고된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "45세 여성이 자궁경부암 stage IA2로 진단받았다. 자궁 보존을 원하지 않으며 완치를 위한 근치적 수술을 원할 때, 가장 적절한 수술 방법은?", "options": [{"letter": "A", "text": "Type I 단순 자궁절제술"}, {"letter": "B", "text": "환상투열절제술 (LEEP)"}, {"letter": "C", "text": "Type II 변형 광범위 자궁절제술"}, {"letter": "D", "text": "Type III 광범위 자궁절제술"}, {"letter": "E", "text": "Type IV 초광범위 자궁절제술"}], "answer": "C", "explanation": "정답은 'Type II 변형 광범위 자궁절제술'이다. Stage IA2 자궁경부암은 미세침윤암으로, 표준 수술 치료는 Type II 변형 광범위 자궁절제술과 골반 림프절 절제술이다. Type I 단순 자궁절제술은 stage IA1에 적용되며, Type III는 IB1 이상, 환상투열절제술은 가임력 보존이 필요하거나 진단 목적으로 시행된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "65세 산과력 2-0-3-2인 여자가 성교후 출혈로 병원에 왔다. 자궁경부 조직검사 결과 깊이 8mm 침윤이 있는 invasive carcinoma로 판명되었다. 골반진찰 및 영상검사에서 자궁크기 정상, 자궁방(parametrium), 방광, 질에 침윤은 없었다. 적절한 처치는?", "options": [{"letter": "A", "text": "방사선 치료"}, {"letter": "B", "text": "광범위자궁절제술(radical hysterectomy)"}, {"letter": "C", "text": "항암화학요법"}, {"letter": "D", "text": "원추절제술(conization)"}, {"letter": "E", "text": "단순자궁절제술"}], "answer": "B", "explanation": "침윤 깊이 8mm는 FIGO stage IB1에 해당하며, 자궁방, 방광, 질 침윤이 없으므로 광범위자궁절제술이 표준 치료이다. 원추절제술은 IA1 병변에 적합하고, 단순자궁절제술은 IA2 또는 병변 크기가 작은 경우에 선택될 수 있다. 방사선 치료는 수술이 불가능한 경우 대안으로 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "22세 여성이 1년 동안 불규칙한 월경과 간헐적인 질출혈로 병원에 왔다. 초음파검사에서 자궁내막 두께가 15 mm로 두꺼워져 있고, 자궁내막 생검 결과 비정형이 없는 자궁내막증식증(endometrial hyperplasia without atypia)으로 진단되었다. 적절한 초기 치료는 무엇인가?", "options": [{"letter": "A", "text": "전자궁절제술"}, {"letter": "B", "text": "기대요법"}, {"letter": "C", "text": "경구 에스트로겐 투여"}, {"letter": "D", "text": "레보노르게스트렐 자궁내장치"}, {"letter": "E", "text": "경구 프로게스틴(예: medroxyprogesterone acetate)"}], "answer": "E", "explanation": "비정형이 없는 자궁내막증식증은 자궁내막암으로의 진행 위험이 상대적으로 낮으며, 젊은 여성에서 전자궁절제술은 지나치게 침습적이다. 기대요법은 출혈이 지속될 경우 적절하지 않다. 에스트로겐 단독 투여는 병변을 악화시킬 수 있다. 레보노르게스트렐 자궁내장치와 경구 프로게스틴은 모두 효과적인 치료법이지만, 초기 치료로 경구 프로게스틴(예: medroxyprogesterone acetate)이 널리 사용되며, 프로게스틴 치료를 통해 대부분의 병변은 호전된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 5}, {"question": "62세 여성이 폐경 후 질출혈로 내원하여 시행한 자궁내막생검에서 Endometrial intraepithelial neoplasia (EIN)로 진단되었다. 골반 초음파에서 자궁내막 두께는 14mm로 측정되었다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁경부 확장 자궁내막 긁어냄술"}, {"letter": "B", "text": "경구 프로게스틴 치료"}, {"letter": "C", "text": "전자궁절제술"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "GnRH agonist 주사"}], "answer": "C", "explanation": "EIN은 자궁내막암의 전구 병변으로, 특히 폐경 후 여성에서는 진행 위험이 높아 전자궁절제술이 표준 치료입니다. 단순 경과 관찰이나 프로게스틴 치료는 불충분하며, 반복 소파술은 근치적 치료가 되지 않습니다. GnRH agonist는 적응증이 아닙니다. 정답은 '전자궁절제술'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 5}, {"question": "2014 WHO 분류에 따른 endometrial hyperplasia의 분류로 옳은 것은?", "options": [{"letter": "A", "text": "Simple without atypia, complex without atypia, atypical hyperplasia로 구분한다."}, {"letter": "B", "text": "Complex hyperplasia는 반드시 progestin 치료를 해야 한다."}, {"letter": "C", "text": "Simple hyperplasia는 암으로 진행하지 않아 치료가 필요 없다."}, {"letter": "D", "text": "Hyperplasia without  "Type 2는 precursor lesion인 endometrial hyperplasia가 흔히 동반된다."}, {"letter": "C", "text": "Type 1은 주로 estrogen-independent tumor이다."}, {"letter": "D", "text": "Type 1은 대개 grade 3이며 예후가 나쁘다."}, {"letter": "E", "text": "Type 2는 endometrioid histology가 대부분이다."}], "answer": "A", "explanation": "Type 1 endometrial cancer는 estrogen-dependent tumor로, 젊은 여성에서 주로 발생하며, endometrioid type이고, grade가 낮으며, 전암병변(endometrial hyperplasia)을 동반하고 예후가 좋습니다. 반면, type 2는 estrogen-independent, 고령에서 발생, non-endometrioid (serous, clear cell 등), grade가 높고 예후가 나쁘며 전암병변이 없습니다. 따라서 'Type 1은 젊은 여성에서 주로 발생하고 예후가 좋다'가 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "Lynch syndrome에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Endometrial cancer 위험을 증가시키지 않는다."}, {"letter": "B", "text": "Mismatch repair (MMR) 유전자 변이와 관련된다."}, {"letter": "C", "text": "대장암 발생 위험과는 무관하다."}, {"letter": "D", "text": "상염색체 열성으로 유전된다."}, {"letter": "E", "text": "예방적 자궁절제술은 권고되지 않는다."}], "answer": "B", "explanation": "Lynch syndrome은 mismatch repair (MMR) 유전자(MLH1, MSH2, MSH6, PMS2, EPCAM)의 변이에 의해 발생하며, 상염색체 우성으로 유전됩니다. 이로 인해 자궁내막암(25-60%), 대장암, 난소암 등의 위험이 현저히 증가합니다. 가임 완료 후 예방적 자궁절제술이 권고됩니다. 따라서 'Mismatch repair 유전자 변이와 관련된다'가 옳은 설명입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "자궁내막 증식증(endometrial hyperplasia) 및 자궁내막모양 샘암종(endometrioid adenocarcinoma)의 초기 발생 단계에서 가장 흔히 관찰되는 유전자 변이(돌연변이)는?", "options": [{"letter": "A", "text": "MLH1"}, {"letter": "B", "text": "TP53"}, {"letter": "C", "text": "BRCA1"}, {"letter": "D", "text": "PTEN"}, {"letter": "E", "text": "KRAS"}], "answer": "D", "explanation": "PTEN 유전자 변이는 type I 자궁내막암(endometrioid adenocarcinoma) 및 그 전구병변인 자궁내막 증식증의 초기 발생에 중요한 역할을 한다. PTEN의 불활성화로 인해 PI3K/AKT 신호전달 경로가 활성화된다. BRCA1은 유방암/난소암, KRAS는 여러 암종, MLH1은 Lynch syndrome, TP53은 type II 자궁내막암과 관련이 깊다.", "chunkTran "letter": "B", "text": "소변 사람융모생식샘자극호르몬 검사 (Urine hCG)"}, {"letter": "C", "text": "자궁내막생검 (Endometrial biopsy)"}, {"letter": "D", "text": "자궁경부질세포진검사 (Papanicolaou smear)"}, {"letter": "E", "text": "경과 관찰 (Observation)"}], "answer": "C", "explanation": "폐경 후 질출혈이 있고 초음파에서 자궁내막이 두꺼워진 경우(>5mm), 자궁내막 증식증이나 암을 배제하기 위해 자궁내막생검 (Endometrial biopsy)이 가장 먼저 시행해야 할 표준 검사이다. 자궁경부질세포진검사는 자궁경부 병변을 선별하는 검사이며, 자궁경관확장소파술은 조직검사가 불충분할 때 시행할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "월경과다를 주소로 내원한 43세 자궁근종 환자에게 자궁내막 소파검사(endometrial curettage)를 시행하는 주요 목적은 무엇인가?", "options": [{"letter": "A", "text": "근종의 악성 전환 여부를 확인하기 위해"}, {"letter": "B", "text": "자궁내막 증식증 또는 자궁내막암을 배제하기 위해"}, {"letter": "C", "text": "근종의 조직학적 확진을 위해"}, {"letter": "D", "text": "점막하 근종을 절제하기 위해"}, {"letter": "E", "text": "자궁내막을 위축시켜 출혈을 줄이기 위해"}], "answer": "B", "explanation": "자궁근종이 있는 환자에서 월경과다가 있을 때, 그 원인을 근종으로만 간주하면 안 되며, 동반될 수 있는 자궁내막 증식증이나 자궁내막암을 감별하기 위해 자궁내막 소파검사를 시행한다. 근종 자체는 소파검사로 진단하거나 악성 여부를 확인하는 것이 아니며, 이 검사를 통해 자궁내막 조직을 얻어 병리학적 진단을 내리는 것이 목적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "45세 여성이 불규칙한 질출혈로 자궁내막 생검을 시행하였다. 병리보고서에는 증식된 자궁내막이 관찰되었으나, 핵 이형성에 대한 기술은 누락되어 있다. 자궁내막암 진행 위험도를 판단하기 위해 병리의사에게 반드시 확인해 달라고 요청해야 할 소견은?", "options": [{"letter": "A", "text": "자궁내막 폴립의 동반 유무"}, {"letter": "B", "text": "편평상피 화생의 분포"}, {"letter": "C", "text": "핵 이형성의 유무"}, {"letter": "D", "text": "침윤성 선구조의 존재"}, {"letter": "E", "text": "선-기질 비율의 등급"}], "answer": "C", "explanation": "자궁내막 증식증의 관리와 예후는 핵 이형성의 유무에 따라 결정된다. 핵 이형성을 동반한 증식증(비정형 증식증)은 자궁내막암으로 진행할 확률이 약 25-30%에 이르므로, 정확한 진단과 적극적인 치료가 필요하다. 편평상피 화생, 선-기질 비율, 폴립 등은 보조 소견일 뿐이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "60세 폐경 후 여성이 atypical endometrial hyperplasia로 진단되었으며, 자녀 계획이 없을 때 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Total hysterectomy with bilateral salpingo-oophorectomy"}, {"letter": "B", "text": "Levonorgestrel-releasing intrauterine system (Mirena)"}, {"letter": "C", "text": "경과관찰"}, {"letter": "D", "text": "GnRH agonist"}, {"letter": "E", "text": "Oral progestogen therapy"}], "answer": "A", "explanation": "Atypical endometrial hyperplasia는 자궁내막암으로 진행할 위험이 높고, 특히 폐경 후 여성에서는 동시성 암이 존재할 가능성이 있어 자궁절제술이 표준 치료입니다. 자녀 계획이 없으므로 자궁 보존을 고려할 필요가 없습니다. 경과관찰은 위험합니다. Oral progestogen therapy나 LNG-IUS는 가임력 보존을 원하는 젊은 여성이나 수술이 불가능한 경우에 제한적으로 사용됩니다. GnRH agonist는 주된 치료가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "Endometrial cancer의 FIGO 수술적 병기 설정에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Stage II는 cervical stroma 침범이 있는 경우이다."}, {"letter": "B", "text": "Stage IB는 myometrium 침범이 없는 경우이다."}, {"letter": "C", "text": "Stage IVA는 서혜부 림프절 전이가 있는 경우이다."}, {"letter": "D", "text": "Stage IA는 myometrium 침범이 50% 이상인 경우이다."}, {"letter": "E", "text": "Stage IIIC는 자궁 주변 질조직을 침범한 경우이다."}], "answer": "A", "explanation": "Stage II는 종양이 cervical stroma를 침범한 경우입니다. Stage IA는 myometrium 침범이 없거나 50% 미만, Stage IB는 50% 이상 침범한 경우입니다. Stage IIIC는 골반 또는 대동맥 주위 림프절 전이가 있는 경우이며, 질조직 침범은 Stage IIIB에 해당합니다. Stage IVA는 방광이나 직장 점막을 침범한 경우이고, 서혜부 림프절 전이는 Stage IVB(원격 전이)로 분류됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "젊은 여성의 endometrial cancer에서 가임력 보존 치료(progestin therapy)를 고려할 수 있는 기준으로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "Stage II 이상인 경우"}, {"letter": "B", "text": "약물 치료 금기 사유가 없는 경우"}, {"letter": "C", "text": "Endometrioid adenocarcinoma, grade 1"}, {"letter": "D", "text": "나이가 40세 이하인 경우"}, {"letter": "E", "text": "MRI 상 myometrium 침범이 없는 경우"}], "answer": "A", "explanation": "가임력 보존 치료는 자궁내막에 국한된 stage IA(침범 없음)에서만 고려합니다. Stage II 이상은 자궁 외 침범이 있으므로 표준 수술 치료가 필요합니다. Endometrioid adenocarcinoma, grade 1은 조직학적 요건이며, MRI에서 근층 침범이 없어야 합니다. 나이는 40세 이하로 제한되며, 약물 금기(예: 혈전색전증 등)가 없어야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "다음 중 endometrial cancer의 근치적 수술 치료 원칙으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "전자궁 적출술 및 양측 난소난관 절제술 (Total hysterectomy + bilateral salpingo-oophorectomy)"}, {"letter": "B", "text": "고용량 프로게스테론 요법 (High-dose progestin therapy)"}, {"letter": "C", "text": "전자궁 적출술 (Total hysterectomy)"}, {"letter": "D", "text": "양측 난소난관 절제술 (Bilateral salpingo-oophorectomy)"}, {"letter": "E", "text": "광범위 자궁 적출술 및 골반 림프절 절제술 (Radical hysterectomy + pelvic lymph node dissection)"}], "answer": "A", "explanation": "자궁내막암의 표준 수술적 치료는 전자궁 적출술과 양측 난소난관 절제술(total hysterectomy with bilateral salpingo-oophorectomy, TH+BSO)입니다. 강의에서 교수님은 자궁내막암 치료의 기본 원칙으로 자궁과 양측 난소 및 나팔관을 모두 제거하는 것이 치료의 선택(treatment of choice, TOC)이라고 명시하셨습니다. 단순 자궁 적출술만으로는 부족하며, 광범위 자궁 적출술은 주로 자궁경부암에서 사용됩니다. 고용량 프로게스테론 요법은 엄격한 기준을 만족하는 젊은 환자에서 가임력 보존 시에만 제한적으로 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "다음 중 자궁내막암으로 진단받은 환자 중 수술 시 골반 및 대동맥 주위 림프절 절제술을 반드시 시행해야 하는 경우는?", "options": [{"letter": "A", "text": "65세 여성, grade 1 endometrioid adenocarcinoma, myometrial invasion 10%, tumor size 2.5 cm"}, {"letter": "B", "text": "60세 여성, grade 2 endometrioid adenocarcinoma, myometrial invasion 40%, tumor size 1.8 cm"}, {"letter": "C", "text": "70세 여성, grade 1 endometrioid adenocarcinoma, myometrial invasion 40%, tumor size 1.0 cm"}, {"letter": "D", "text": "55세 여성, grade 2 endometrioid adenocarcinoma, myometrial invasion 30%, tumor size 3.0 cm"}, {"letter": "E", "text": "50세 여성, grade 1 endometrioid adenocarcinoma, myometrial invasion 20%, tumor size 1.5 cm"}], "answer": "D", "explanation": "강의에서 자궁내막암 림프절 절제술의 적응증으로 제시된 기준은 grade 3, grade 2이면서 종양 직경 2 cm 이상, 조직학적으로 serous 또는 clear cell carcinoma, 자궁근층 침범 50% 이상, 자궁경부 침범입니다. 이 중 55세 grade 2 endometrioid adenocarcinoma 환자는 종양 크기가 3 cm로 2 cm 이상이므로 림프절 절제술의 적응증에 해당합니다. 다른 환자들은 제시된 적응증에 해당하지 않아 림프절 절제술이 반드시 필요하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "부인과 수술을 위한 설명 및 동의(informed consent)에 관한 내용으로 옳은 것은?", "options": [{"letter": "A", "text": "수술의 필요성과 이점만 설명하면 충분하다."}, {"letter": "B", "text": "복강경 수술 중 개복술로의 전환 가능성에 대해 설명할 필요가 없다."}, {"letter": "C", "text": "수술을 하지 않을 경우의 대안에 대한 설명은 필수가 아니다."}, {"letter": "D", "text": "환자가 수술 동의서에 서명하면 설명은 생략해도 된다."}, {"letter": "E", "text": "수술 중 수술 방법이나 범위가 변경될 가능성에 대해 설명해야 한다."}], "answer": "E", "explanation": "수술 설명 및 동의(informed consent) 시에는 수술이 필요한 이유, 수술하지 않을 경우의 대안과 그 예후, 수술의 위험성과 이점, 그리고 수술 중 방법이나 범위가 변경될 가능성(예: 복강경에서 개복술로 전환)까지 설명해야 합니다. 강의에서 '최근에는 laparotomy보다 laparoscopy를 많이 하기 때문에, 수술 중에 수술 방법이나 수술 범위가 변경될 가능성에 대해서도 미리 이야기해줄 필요가 있다'고 명시하고 있습니다. 따라서 '수술 중 수술 방법이나 범위가 변경될 가능성에 대해 설명해야 한다'가 옳은 설명입니다. 다른 선택지들은 모두 핵심 요소를 누락하거나 틀린 내용입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "자궁경부를 보존하는 subtotal(supracervical) hysterectomy에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁 탈출의 위험을 줄여준다는 근거가 충분하다."}, {"letter": "B", "text": "성기능 보존을 위해 total hysterectomy보다 권고된다."}, {"letter": "C", "text": "자궁경부가 남아있기 때문에 Pap smear를 지속적으로 시행해야 한다."}, {"letter": "D", "text": "비뇨기계 장기의 하방 전위를 예방한다."}, {"letter": "E", "text": "수술 후 자궁경부암 검진이 불필요하다."}], "answer": "C", "explanation": "강의에 따르면, 자궁경부를 남길 경우 성기능 보존이나 장기 탈출 예방에 대한 근거는 아직 불충분하며, 교과서에서는 total hysterectomy가 주로 권고됩니다. 또한 'cervix를 남겨두고 hysterectomy를 하시는 경우에는 해당 부분이 아래쪽에서 관찰되기 때문에 Pap smear도 주기적으로 시행해야 됩니다'라고 하여, 자궁경부가 남아있으면 지속적인 자궁경부암 검진이 필요합니다. 따라서 'Pap smear를 지속적으로 시행해야 한다'가 정답이며, 나머지는 모두 근거 부족 또는 틀린 내용입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "Total laparoscopic hysterectomy를 시행할 때, 추가적인 salpingectomy에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "BRCA mutation이 있는 환자에게만 효과적이다."}, {"letter": "B", "text": "자궁절제술과 동시에 시행하면 수술 위험만 증가시킬 뿐이다."}, {"letter": "C", "text": "모든 여성에서 난소암 위험을 완전히 없앨 수 있다."}, {"letter": "D", "text": "난소암 위험 감소에 도움이 될 수 있어 환자와 상의 후 시행할 수 있다."}, {"letter": "E", "text": "자궁절제술을 받는 모든 환자에게 반드시 시행해야 한다."}], "answer": "D", "explanation": "강의에 따르면 'salpinx만 제거하더라도 난소암 위험을 줄여줄 수 있다는 연구 결과가 있어서', 자궁절제술을 결정한 환자에게 선택권을 주고 설명 후 시행할 수 있습니다. 이는 일반 여성에서도 위험 감소 효과가 기대되며, 의무적이지 않습니다. 따라서 '난소암 위험 감소에 도움이 될 수 있어 환자와 상의 후 시행할 수 있다'가 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "다음 중 자궁근종으로 인한 자궁절제술의 적응증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "크기가 갑자기 증가하는 근종"}, {"letter": "B", "text": "무증상의 10주 크기 자궁근종"}, {"letter": "C", "text": "12주 크기이지만 증상이 없는 근종"}, {"letter": "D", "text": "5주 크기의 근종으로 인한 경미한 월경통"}, {"letter": "E", "text": "폐경 후 추적 관찰에서 크기 변화가 없는 근종"}], "answer": "A", "explanation": "강의에서는 자궁근종 절제 적응증으로 '증상이 있는 경우', '크기가 갑자기 증가하는 경우', '요관 폐색으로 hydronephrosis 발생', '폐경 후 원인 없이 갑자기 커지는 경우', '임신 12주 정도 크기로 매우 커지는 경우'를 제시했습니다. 빠른 크기 증가는 육종(sarcoma) 가능성 때문에 특히 중요한 수술 적응증입니다. 반면, 무증상 10주 크기, 크기 변화 없는 폐경 후 근종, 경미한 증상의 작은 근종은 약물 치료 등 대안을 고려할 수 있습니다. 12주 크기 무증상 근종도 크기만으로 절대적 적응증은 아니므로, '크기가 갑자기 증가하는 근종'이 가장 적절한 적응증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "다음 중 광범위자궁절제술(radical hysterectomy)에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "근치적 목적이 아닌 진단 목적의 수술이다."}, {"letter": "B", "text": "자궁주위조직(parametrium)을 포함하여 절제한다."}, {"letter": "C", "text": "자궁경부만 절제하는 수술이다."}, {"letter": "D", "text": "양성 자궁근종의 표준 수술이다."}, {"letter": "E", "text": "질식 접근법으로만 시행한다."}], "answer": "B", "explanation": "광범위자궁절제술은 자궁과 함께 자궁주위조직(parametrium) 및 질 상부를 절제하는 술식으로, 주로 자궁경부암 등의 악성종양에서 근치적 목적으로 시행됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "쇄석위(lithotomy position)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "주로 상복부 수술 시 사용된다."}, {"letter": "B", "text": "방광결석을 깨는 수술에서 유래된 이름이다."}, {"letter": "C", "text": "골반 진찰에는 사용되지 않는다."}, {"letter": "D", "text": "고관절과 슬관절을 완전히 펴는 자세이다."}, {"letter": "E", "text": "환자가 복와위(prone position)로 눕는 자세이다."}], "answer": "B", "explanation": "강의에서 'litho는 돌, tomy는 깨다. 돌을 깨던 자세... 쇄석위'라고 설명하였다. 쇄석위는 앙와위로 고관절과 슬관절을 90도 굴곡시키며, 골반 진찰이나 부인과 수술에서 필수적으로 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "골반 진찰에서 시행하는 양합진(bimanual examination)의 주된 목적은 무엇인가?", "options": [{"letter": "A", "text": "자궁경부의 세포 채취"}, {"letter": "B", "text": "직장 점막의 검사"}, {"letter": "C", "text": "요도의 카테터 삽입"}, {"letter": "D", "text": "자궁과 부속기의 촉진"}, {"letter": "E", "text": "질 분비물의 성상 확인"}], "answer": "D", "explanation": "양합진은 한 손의 검지와 중지를 질에 삽입하여 자궁경부를 위로 밀고, 다른 손으로 복벽 위에서 자궁저부를 촉지하는 검사이다. 이를 통해 자궁의 크기, 모양, 위치, 압통 및 난소나 나팔관 등 부속기의 종괴를 평가할 수 있다. 질 분비물 확인은 질경 검사로, 자궁경부 세포 채취는 Pap 도말로 시행하며, 요도 카테터 삽입이나 직장 점막 검사는 양합진과 구별되는 별도의 술기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "25세 여성이 외음부의 통증성 종괴를 주소로 내원하였다. 진찰상 대음순 후방에 약 3cm의 낭성 종괴가 촉지되었다. 이 종괴가 발생한 해부학적 구조는?", "options": [{"letter": "A", "text": "Bartholin's gland"}, {"letter": "B", "text": "Nabothian cyst"}, {"letter": "C", "text": "Sebaceous gland"}, {"letter": "D", "text": "Gartner's duct"}, {"letter": "E", "text": "Skene's gland"}], "answer": "A", "explanation": "Bartholin's gland는 대음순 후방에 위치하여 폐쇄 시 낭종을 형성합니다. 감염이 동반되면 통증성 농양으로 발전할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "폐경 후 비정상 질출혈이 있는 여성에서 endometrial hyperplasia 또는 endometrial cancer를 진단하기 위한 가장 정확한 검사는 무엇인가?", "options": [{"letter": "A", "text": "Abdominal-pelvic CT"}, {"letter": "B", "text": "Serum CA-125 측정"}, {"letter": "C", "text": "Cervical cytology (Pap smear)"}, {"letter": "D", "text": "Transvaginal ultrasonography"}, {"letter": "E", "text": "Endometrial biopsy"}], "answer": "E", "explanation": "Endometrial biopsy는 자궁내막 조직을 직접 채취하여 병리학적으로 확진하는 가장 정확한 검사입니다. Transvaginal ultrasonography는 자궁내막 두께를 측정하여 비정상 여부를 선별하는 데 유용하나 확진은 불가능합니다. Cervical cytology는 주로 자궁경부 병변을 검출하며, 자궁내막 세포가 일부 나올 수 있으나 민감도가 낮습니다. Serum CA-125는 난소암 등에서 상승할 수 있으나 자궁내막암에 특이적이지 않습니다. Abdominal-pelvic CT는 전이 평가에 사용되며 확진 도구가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "회음신경차단(pudendal nerve block) 시행 시 주요 해부학적 지표로 사용되는 것은?", "options": [{"letter": "A", "text": "좌골극(ischial spine)"}, {"letter": "B", "text": "치골결합(symphysis pubis)"}, {"letter": "C", "text": "천골갑(sacral promontory)"}, {"letter": "D", "text": "장골극(iliac crest)"}, {"letter": "E", "text": "미골(coccyx)"}], "answer": "A", "explanation": "강의에서 'ischial spine 주변에 pudendal nerve들이 있는데, 그 nerve를 마취하기 위해서... 손가락을 향해서 주사기를 쏘는' 방법을 설명하며 좌골극을 지표로 삼고 있다. '치골결합'은 앞쪽, '천골갑'은 분만 시 하강 정도 측정에 사용되나(promontory는 산과에서 landmark), 회음신경차단 지표는 아니다. '장골극'과 '미골'은 주요 지표가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "무명골(innominate bone)을 구성하는 세 뼈의 올바른 조합은?", "options": [{"letter": "A", "text": "장골(ilium), 좌골(ischium), 대퇴골(femur)"}, {"letter": "B", "text": "치골(pubis), 천골(sacrum), 대퇴골(femur)"}, {"letter": "C", "text": "장골(ilium), 천골(sacrum), 미골(coccyx)"}, {"letter": "D", "text": "장골(ilium), 좌골(ischium), 치골(pubis)"}, {"letter": "E", "text": "좌골(ischium), 치골(pubis), 천골(sacrum)"}], "answer": "D", "explanation": "강의에서 무명골(hip bone)은 ilium, l", "meshPath": "", "matchedSlide": 16}, {"question": "정상 질 세균총에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "항생제 사용은 질 세균총에 영향을 미치지 않는다."}, {"letter": "B", "text": "정상 질 pH는 중성(~7.0)을 유지한다."}, {"letter": "C", "text": "Lactobacillus는 젖산(lactic acid)을 생성하여 산성 환경을 조성한다."}, {"letter": "D", "text": "Lactobacillus는 알칼리성 물질을 분비하여 병원균을 억제한다."}, {"letter": "E", "text": "질 세척(douching)은 Lactobacillus의 성장을 촉진한다."}], "answer": "C", "explanation": "Lactobacillus는 질 내에서 글리코겐을 대사하여 젖산을 생성함으로써 정상 질 pH를 4.0~5.0의 산성으로 유지하며, 병원균 증식을 억제한다. 질 세척이나 항생제 사용은 정상 세균총을 파괴하여 오히려 감염 위험을 증가시킨다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "자궁 몸통(body)과 cervix 사이에 위치하는 좁아진 부위는?", "options": [{"letter": "A", "text": "infundibulum"}, {"letter": "B", "text": "ampulla"}, {"letter": "C", "text": "fundus"}, {"letter": "D", "text": "isthmus"}, {"letter": "E", "text": "cornu"}], "answer": "D", "explanation": "isthmus는 자궁의 몸통과 cervix 사이의 좁은 이행부로, 임신 시 자궁 하절부(lower uterine segment)를 형성합니다. 'fundus'는 자궁의 상부 둥근 부분, 'cornu'는 난관이 연결되는 자궁각, 'ampulla'와 'infundibulum'은 난관의 부위이므로 모두 틀립니다. 정답은 'isthmus'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "난관(fallopian tube)에서 수정(fertilization)이 가장 흔히 일어나는 부위는?", "options": [{"letter": "A", "text": "ampulla"}, {"letter": "B", "text": "fimbriae"}, {"letter": "C", "text": "infundibulum"}, {"letter": "D", "text": "interstitial part"}, {"letter": "E", "text": "isthmus"}], "answer": "A", "explanation": "ampulla는 난관의 가장 긴 부분으로, 정자와 난자가 만나 수정이 이루어지는 주요 장소입니다. 'interstitial part'는 난관의 자궁벽 내 부분, 'isthmus'는 좁은 부분, 'fimbriae'는 난자의 채취를 담당하며, 'infundibulum'은 깔때기 모양의 원위부입니다. 따라서 정답은 'ampulla'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "중추간막(mesosalpinx)이 장간막(mesentery)을 형성하는 구조는?", "options": [{"letter": "A", "text": "자궁천골인대(Uterosacral ligament)"}, {"letter": "B", "text": "난소(Ovary)"}, {"letter": "C", "text": "자궁원인대(Round ligament)"}, {"letter": "D", "text": "자궁(Uterus)"}, {"letter": "E", "text": "난관(Fallopian tube)"}], "answer": "E", "explanation": "중추간막은 자궁넓은인대(broad ligament)의 일부로, 난관을 싸고 있는 장간막이다. 난소는 중난소간막(mesovarium)에 의해, 자궁은 중자궁간막(mesometrium)에 의해 지지된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "난소(ovary)의 피질(cortex)과 수질(medulla) 구조에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "피질(cortex)은 주로 혈관과 신경으로 구성된 섬유근육 조직이다."}, {"letter": "B", "text": "피질과 수질의 경계는 불분명하며, 난포는 두 층에 무작위로 분포한다."}, {"letter": "C", "text": "난포는 피질에 위치하며, 수질에는 혈관·신경·림프관 등이 분포한다."}, {"letter": "D", "text": "난포(follicle)는 주로 수질(medulla)에 위치한다."}, {"letter": "E", "text": "난소 표면 상피는 중층편평상피(stratified squamous epithelium)이다."}], "answer": "C", "explanation": "난소의 피질에는 난포가 위치하고, 수질에는 혈관, 신경, 림프관 등이 분포합니다. 난소의 표면 상피는 단층 입방상피입니다. 따라서 정답은 \"난포는 피질에 위치하며, 수질에는 혈관·신경·림프관 등이 분포한다.\" 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "자궁외 임신(ectopic pregnancy)이 가장 흔하게 발생하는 해부학적 위치는?", "options": [{"letter": "A", "text": "나팔관 협부 (isthmus of fallopian tube)"}, {"letter": "B", "text": "복막강 (abdominal cavity)"}, {"letter": "C", "text": "나팔관 팽대부 (ampulla of fallopian tube)"}, {"letter": "D", "text": "난소 (ovary)"}, {"letter": "E", "text": "자궁경부 (cervix)"}], "answer": "C", "explanation": "전체 자궁외 임신의 약 95%는 난관 임신이며, 난관 내에서는 팽대부(ampulla)가 70%로 가장 흔하다. 협부(isthmus)는 약 10%, 난소나 자궁경부, 복강은 5% 미만으로 드물다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "진골반(true pelvis)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁, 난소 등 생식기관이 포함된다."}, {"letter": "B", "text": "분만 시 태아와 무관한 공간이다."}, {"letter": "C", "text": "가장 넓은 골반 공간을 형성한다."}, {"letter": "D", "text": "거짓골반(false pelvis)보다 위쪽에 위치한다."}, {"letter": "E", "text": "대장을 포함한 위장관계 장기가 주로 존재한다."}], "answer": "A", "explanation": "진골반(true pelvis, lesser pelvis)은 자궁, 난소 등 생식기관을 담고 있으며, 분만 시 태아가 통과하는 산도이다. '대장을 포함한 위장관계 장기가 주로 존재한다'는 거짓골반의 설명이다. 진골반은 거짓골반 아래에 있고, 좁은 공간이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁동맥(uterine artery)이 속엉덩동맥(internal iliac artery)에서 기시하여 자궁으로 주행할 때 주변을 주행하며, 골반 수술 중 실수로 결찰(ligation)되기 쉬운 구조물은 무엇인가?", "options": [{"letter": "A", "text": "자궁원인대(round ligament of uterus)"}, {"letter": "B", "text": "직장(rectum)"}, {"letter": "C", "text": "난소(ovary)"}, {"letter": "D", "text": "요관(ureter)"}, {"letter": "E", "text": "방광(urinary bladder)"}], "answer": "D", "explanation": "자궁동맥은 자궁옆조직(parametrium) 내에서 요관과 교차하며 주행하는데, 요관이 자궁동맥의 아래쪽으로 지나가므로 'water under the bridge' 관계로 알려져 있다. 골반 수술, 특히 자궁절제술 시 자궁동맥을 결찰할 때 요관이 함께 묶일 수 있어 요관 손상이 발생할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "난소절제술이나 난소낭종절제술 시 중요하게 다루어야 할 인대로, 난소동맥(ovarian artery)이 주행하는 구조물은?", "options": [{"letter": "A", "text": "자궁원인대(round ligament of uterus)"}, {"letter": "B", "text": "자궁천골인대(uterosacral ligament)"}, {"letter": "C", "text": "누두골반인대(infundibulopelvic ligament)"}, {"letter": "D", "text": "자궁광인대(broad ligament of uterus)"}, {"letter": "E", "text": "난소고유인대(proper ovarian ligament)"}], "answer": "C", "explanation": "누두골반인대(infundibulopelvic ligament), 혹은 난소현수인대(suspensory ligament of ovary)는 난소동맥, 난소정맥, 신경 및 림프관을 포함하고 있어 난소와 골반 측벽을 연결한다. 난소 수술 시 이 인대를 결찰하여 혈류를 차단해야 하므로 해부학적 중요성이 크다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "ovarian artery와 ovarian vein을 포함하고 있는 인대(ligament)는?", "options": [{"letter": "A", "text": "broad ligament"}, {"letter": "B", "text": "infundibulopelvic ligament"}, {"letter": "C", "text": "pubocervical ligament"}, {"letter": "D", "text": "round ligament"}, {"letter": "E", "text": "uterosacral ligament"}], "answer": "B", "explanation": "infundibulopelvic ligament (suspensory ligament of the ovary)는 난소의 상극을 골반 벽에 연결하며 ovarian artery, vein, nerve, lymphatic을 포함합니다. 'round ligament'는 자궁에서 서혜관을 통해 대음순에 부착, 'uterosacral ligament'는 자궁경부와 천골을 연결, 'broad ligament'는 자궁을 골반 벽에 부착시키는 복막 주름이며, 'pubocervical ligament'는 자궁경부와 치골을 연결하여 지지합니다. 따라서 정답은 'infundibulopelvic ligament'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁절제술 시 요관(ureter)이 손상될 수 있는 주요 해부학적 이유는?", "options": [{"letter": "A", "text": "ureter가 uterine artery 아래로 주행한다"}, {"letter": "B", "text": "ureter가 uterine artery 위로 주행한다"}, {"letter": "C", "text": "ureter가 uterine artery 앞으로 주행한다"}, {"letter": "D", "text": "ureter가 uterine artery보다 바깥쪽에 위치한다"}, {"letter": "E", "text": "ureter와 uterine artery가 서로 교차하지 않는다"}], "answer": "A", "explanation": "ureter는 골반 내에서 uterine artery의 아래쪽(물이 다리 아래를 지나듯)을 통과하여 방광으로 들어갑니다 (water under the bridge). 따라서 자궁 절제 시 uterine artery를 결찰할 때 ureter 손상의 위험이 높습니다. 'ureter가 uterine artery 위로 주행한다', 'ureter가 uterine artery 앞으로 주행한다', 'ureter가 uterine artery보다 바깥쪽에 위치한다'는 모두 실제 관계와 다르며, 'ureter와 uterine artery가 서로 교차하지 않는다'는 사실이 아니므로 틀립니다. 정답은 'ureter가 uterine artery 아래로 주행한다'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁경부(cervix)의 질내 부분이 질과 통해있는 구멍은?", "options": [{"letter": "A", "text": "자궁관입구(ostium of fallopian tube)"}, {"letter": "B", "text": "자궁원인대입구(round ligament insertion)"}, {"letter": "C", "text": "바깥자궁경입구(external os)"}, {"letter": "D", "text": "자궁동맥입구(uterine artery orifice)"}, {"letter": "E", "text": "속자궁경입구(internal os)"}], "answer": "C", "explanation": "자궁경부의 질내 부분(vaginal portion)은 원형으로, 그 중앙에 바깥자궁경입구(external os)가 있어 자궁경관을 통해 질과 자궁체부를 연결한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "직장자궁주름(rectouterine fold) 내에 위치하며, 자궁목(cervix)을 뒤로 당겨 자궁의 위치를 지지하는 주요 인대는?", "options": [{"letter": "A", "text": "자궁천골인대(uterosacral ligament)"}, {"letter": "B", "text": "난소고유인대(ovarian ligament)"}, {"letter": "C", "text": "자궁원인대(round ligament)"}, {"letter": "D", "text": "자궁목기본인대(cardinal ligament)"}, {"letter": "E", "text": "난소걸이인대(infundibulopelvic ligament)"}], "answer": "A", "explanation": "자궁천골인대는 직장자궁주름 내에서 주행하며 자궁경부를 천골 후방으로 연결하여 자궁이 전방으로 기울어지는 것을 막아준다. 자궁목기본인대는 자궁의 측방 지지를 담당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "해부학 용어에서 'vulva'와 동의어로 사용되는 것은?", "options": [{"letter": "A", "text": "clitoris"}, {"letter": "B", "text": "vestibule"}, {"letter": "C", "text": "perineum"}, {"letter": "D", "text": "pudendum"}, {"letter": "E", "text": "labia majora"}], "answer": "D", "explanation": "vulva와 pudendum은 여성 외부생식기를 가리키는 동의어이다. perineum은 회음부, vestibule은 질전정, clitoris는 음핵, labia majora는 대음순을 지칭한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁원인대(round ligament of uterus)의 주행 경로로 옳은 것은?", "options": [{"letter": "A", "text": "난소(ovary) → 서혜관 → 치골(pubis)"}, {"letter": "B", "text": "자궁경부(cervix) → 골반벽(pelvic wall)"}, {"letter": "C", "text": "자궁협부(isthmus) → 대퇴골(femur)"}, {"letter": "D", "text": "자궁각(uterine cornu) → 서혜관(inguinal canal) → 대음순(labia majora)"}, {"letter": "E", "text": "자궁저(uterine fundus) → 천골(sacrum)"}], "answer": "D", "explanation": "자궁원인대는 자궁각에서 시작하여 서혜관을 지나 대음순에 부착됩니다. 다른 선택지들은 자궁천골인대(천골 부착)나 자궁경부인대 등의 경로를 설명합니다. 따라서 정답은 \"자궁각 → 서혜관 → 대음순\"입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "방광(bladder)과 질(vagina) 사이에 존재하는 성긴결합조직 공간의 명칭은?", "options": [{"letter": "A", "text": "직장질공간(rectovaginal space)"}, {"letter": "B", "text": "방광질공간(vesicovaginal space)"}, {"letter": "C", "text": "방광자궁인대(vesicouterine ligament)"}, {"letter": "D", "text": "골반가로막(pelvic diaphragm)"}, {"letter": "E", "text": "방광자궁오목(vesicouterine pouch)"}], "answer": "B", "explanation": "방광과 질 사이의 성긴결합조직 공간은 방광질공간(vesicovaginal space) 또는 방광질중격이며, 부인과 수술 시 중요한 해부학적 지표입니다. 방광자궁오목은 방광과 자궁 사이의 복막 공간입니다. 따라서 정답은 \"방광질공간\"입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복강경 수술을 위해 측면에 trocar를 삽입할 때 손상 위험이 가장 높은 혈관은?", "options": [{"letter": "A", "text": "상복벽 동맥 (superior epigastric artery)"}, {"letter": "B", "text": "내장골 동맥 (internal iliac artery)"}, {"letter": "C", "text": "자궁 동맥 (uterine artery)"}, {"letter": "D", "text": "난소 동맥 (ovarian artery)"}, {"letter": "E", "text": "하복벽 동맥 (inferior epigastric artery)"}], "answer": "E", "explanation": "강의에서는 복강경 trocar 삽입 시 주의할 혈관으로 inferior epigastric artery와 superficial circumflex iliac artery를 명시하며, 특히 측면 구멍을 뚫을 때 이 혈관들이 손상되면 심각한 출혈을 일으킬 수 있다고 강조했습니다. 자궁동맥, 난소동맥, 내장골동맥 등은 수술 심부에 위치하여 직접적인 trocar 손상 위험이 낮고, 상복벽동맥은 상복부에 분포하므로 정답은 하복벽 동맥(inferior epigastric artery)입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복식 전자궁절제술(total abdominal hysterectomy) 시 지혈을 위해 자궁동맥을 결찰할 때, 해부학적으로 가장 가까이 위치하여 함께 결찰될 위험이 있는 구조물은?", "options": [{"letter": "A", "text": "요관"}, {"letter": "B", "text": "폐쇄신경"}, {"letter": "C", "text": "방광"}, {"letter": "D", "text": "장골동맥"}, {"letter": "E", "text": "난소동맥"}], "answer": "A", "explanation": "요관은 자궁동맥의 아래쪽으로 주행하여 \"water under the bridge\" 관계를 형성한다. 자궁동맥 결찰 시 주변 조직을 묶을 때 요관이 함께 포함될 수 있으며, 이로 인해 수술 후 수신증(hydronephrosis)이나 요관 폐쇄가 발생할 수 있다. 방광, 장골동맥, 난소동맥, 폐쇄신경은 자궁동맥 결찰 부위에서 상대적으로 떨어져 있어 직접 손상 위험이 낮다. 따라서 요관이 가장 위험한 구조물이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "시상하부-뇌하수체-난소(HPO) 축에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "에스트로겐의 감소는 FSH 분비를 촉진하는 음성 되먹임을 유발한다."}, {"letter": "B", "text": "프로게스테론의 증가는 GnRH 분비를 촉진한다."}, {"letter": "C", "text": "LH surge는 배란 후 황체 형성을 억제한다."}, {"letter": "D", "text": "GnRH는 뇌하수체 후엽에서 분비된다."}, {"letter": "E", "text": "시상하부에서 합성된 FSH가 난소를 직접 자극한다."}], "answer": "A", "explanation": "에스트로겐이 낮아지면 시상하부와 뇌하수체에 음성 되먹임이 감소하여 FSH 분비가 증가한다(GnRH 분비 촉진). 강의 중 ‘처음에는 난포 호르몬이 확 줄어들었을 때는 FSH 분비가 증가가 돼요’라는 부분이 이를 설명한다. GnRH는 시상하부에서 분비되어 뇌하수체 전엽을 자극하며, FSH는 뇌하수체 전엽에서 분비된다. 프로게스테론은 배란 후 황체에서 생성되어 음성 되먹임을 한다. LH surge는 배란을 유발하고 황체 형성(luteinization)을 촉진한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "사춘기 이전에 시상하부-뇌하수체-난소(HPO) 축이 억제되어 있는 이유에 대한 설명으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "뇌하수체의 FSH, LH 저장량이 부족하기 때문이다."}, {"letter": "B", "text": "중추신경계의 음성 되먹임 민감도가 높아 설정값이 낮기 때문이다."}, {"letter": "C", "text": "갑상선 호르몬이 성호르몬 생성을 억제하기 때문이다."}, {"letter": "D", "text": "시상하부의 GnRH 분비가 완전히 중단되어 있기 때문이다."}, {"letter": "E", "text": "난소의 난포가 GnRH에 반응하지 않기 때문이다."}], "answer": "B", "explanation": "사춘기 이전에는 시상하부-뇌하수체-난소 축이 이미 형성되어 있으나, 중추신경계의 음성 되먹임(negative feedback) 감수성이 매우 높아 낮은 설정값(set point)에서 호르몬 분비가 억제됩니다. 사춘기가 시작되면 이 설정값이 변화하여 HPO 축이 활성화됩니다. 뇌하수체의 FSH와 LH 저장량은 충분하며, GnRH 분비가 완전히 중단되지 않고, 난소는 GnRH에 직접 반응하지 않으며, 갑상선 호르몬이 성호르몬 생성을 주된 억제 인자는 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "시상하부-뇌하수체-난소(HPO) 축의 되먹임(feedback) 조절에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "에스트로겐이 시상하부에 작용하는 것은 short-loop feedback이다."}, {"letter": "B", "text": "Short-loop feedback은 표적장기에서 분비되는 호르몬이 시상하부에 작용하는 것이다."}, {"letter": "C", "text": "Long-loop feedback은 주로 신경전달물질에 의해 매개된다."}, {"letter": "D", "text": "뇌하수체에서 분비된 FSH가 시상하부에 작용하는 것은 long-loop feedback이다."}, {"letter": "E", "text": "GnRH가 자신의 분비를 억제하는 것은 ultra-short feedback의 예이다."}], "answer": "E", "explanation": "GnRH가 시상하부 내에서 자신의 분비를 자가조절하는 것은 ultra-short feedback에 해당합니다. 에스트로겐에 의한 시상하부 작용은 long-loop feedback이고, 뇌하수체 호르몬(FSH)이 시상하부에 작용하는 것은 short-loop feedback입니다. Long-loop feedback은 주로 호르몬에 의해 매개되며, short-loop feedback은 인접 기관 간의 피드백을 의미합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "갑상선자극호르몬(TSH)이 시상하부-뇌하수체-난소 축에 미칠 수 있는 영향으로 가장 타당한 것은?", "options": [{"letter": "A", "text": "TSH 구조가 FSH와 유사하여 FSH 분비를 억제하는 착오 되먹임을 일으킬 수 있다."}, {"letter": "B", "text": "TSH가 갑상선 호르몬 분비를 억제하여 성호르몬 분비를 증가시킨다."}, {"letter": "C", "text": "TSH가 시상하부의 GnRH 분비를 직접 차단한다."}, {"letter": "D", "text": "TSH가 FSH 수용체에 직접 결합하여 난포 성장을 촉진한다."}, {"letter": "E", "text": "TSH 수용체가 LH surge를 유발한다."}], "answer": "A", "explanation": "TSH는 FSH와 구조적으로 유사하여, TSH가 증가할 경우 뇌에서 FSH가 충분한 것으로 잘못 인식하여 음성 되먹임이 일어나 FSH 분비를 억제할 수 있습니다. 이는 다른 호르몬들과의 교차 작용 가능성을 시사합니다. 직접적인 수용체 결합이나 GnRH 차단 효과는 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "GnRH agonist를 지속적으로 투여할 때 생식샘 자극 호르몬(FSH, LH) 분비가 억제되는 주된 기전은?", "options": [{"letter": "A", "text": "뇌하수체 전엽 세포의 직접적인 세포독성"}, {"letter": "B", "text": "에스트로겐에 의한 음성 되먹임 강화"}, {"letter": "C", "text": "GnRH 수용체의 하향 조절(down-regulation)"}, {"letter": "D", "text": "시상하부의 GnRH 합성 억제"}, {"letter": "E", "text": "난소에서의 GnRH 수용체 차단"}], "answer": "C", "explanation": "GnRH agonist는 초기에 FSH·LH를 급증시키는(flare effect) 후, 지속 투여 시 뇌하수체의 GnRH 수용체가 하향 조절(down-regulation)되고 탈감작(desensitization)되어 오히려 FSH·LH 분비가 억제된다. 강의에서 ‘일반적인 용량으로 일주일 이상 계속되면 그 수용체가 감소하고 … down-regulation이 됩니다. … hypogonadism이 발생을 한다’고 설명한다. 세포독성이나 시상하부 직접 억제, 난소 수용체 차단 등은 관련된 기전이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH agonist와 GnRH antagonist를 투여할 때 초기 반응의 차이로 가장 적절한 것은?", "options": [{"letter": "A", "text": "Antagonist는 초기에 프로게스테론 분비를 촉진한다."}, {"letter": "B", "text": "Antagonist는 초기에 에스트로겐 수치를 급증시킨다."}, {"letter": "C", "text": "Agonist는 처음에 FSH/LH 분비를 증가시키지만 antagonist는 그렇지 않다."}, {"letter": "D", "text": "Agonist는 초기부터 난포 성장을 억제한다."}, {"letter": "E", "text": "두 약물 모두 첫 투여 시 배란을 유도한다."}], "answer": "C", "explanation": "GnRH agonist는 수용체에 작용해 초기에 FSH와 LH 분비를 일으키는 ‘flare effect’를 보인다. 반면 antagonist는 수용체를 직접 차단하여 초기 자극 없이 즉시 FSH/LH 분비를 억제한다. 강의에서 ‘agonist는 초기에 혈중 FSH와 LH 농도가 증가해요. 이거를 flare effect라고 해요. Antagonist는 이런 flare-up effect가 전혀 없어요’라고 구분하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH의 박동성 분비에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "박동 빈도가 감소하면 LH 분비가 우선적으로 촉진된다."}, {"letter": "B", "text": "박동 빈도가 증가하면 FSH 분비가 우선적으로 촉진된다."}, {"letter": "C", "text": "박동성 분비는 사춘기 이후에만 시작된다."}, {"letter": "D", "text": "박동성 분비는 생식샘 자극 호르몬 분비에 필수적이며, 빈도에 따라 FSH와 LH 분비가 조절된다."}, {"letter": "E", "text": "GnRH 분비는 일정한 농도로 지속된다."}], "answer": "D", "explanation": "GnRH는 박동성(pulsatile)으로 분비되어야 뇌하수체가 정상적으로 FSH·LH를 분비할 수 있다. 또한 박동 빈도가 높으면 LH 분비가, 낮으면 FSH 분비가 우세해진다(‘파동 횟수가 증가하면 LH 분비가 증가하고, 파동 횟수가 적으면 FSH 분비가 촉진된다’). 지속적 분비는 오히려 수용체 하향 조절을 유발하여 억제 효과를 낸다. HPO 축은 태아기에 이미 형성되어 사춘기 전까지 억제되어 있을 뿐, 박동성 분비 기전 자체는 사춘기 이전에도 존재한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "난소의 과립막 세포에서 분비되는 인히빈(inhibin)의 주된 역할은?", "options": [{"letter": "A", "text": "프로게스테론 분비 촉진"}, {"letter": "B", "text": "FSH 분비 억제"}, {"letter": "C", "text": "FSH 분비 촉진"}, {"letter": "D", "text": "LH 분비 촉진"}, {"letter": "E", "text": "GnRH 분비 억제"}], "answer": "B", "explanation": "인히빈(inhibin)은 난소의 과립막 세포에서 생성되어 뇌하수체 전엽에 작용하여 FSH 분비를 선택적으로 억제한다. 강의에서도 ‘inhibin은 r": "A", "text": "Oligomenorrhea에 해당하므로 배란 장애를 의심한다."}, {"letter": "B", "text": "Menorrhagia에 해당하나, 생리 주기가 규칙적이므로 AUB로 보지 않는다."}, {"letter": "C", "text": "생리양이 80cc 이하로 추정되므로 정상 변이에 해당한다."}, {"letter": "D", "text": "정상 월경 범주에 속하므로 안심시키고 경과 관찰한다."}, {"letter": "E", "text": "비정상 자궁출혈(AUB)로 평가하여 추가 검사가 필요하다."}], "answer": "E", "explanation": "정상 월경 기간은 4.5~8일이므로 9일로 길어진 경우 비정상이다. 양이 많아진 것도 AUB의 기준에 포함된다. 따라서 ‘비정상 자궁출혈(AUB)로 평가하여 추가 검사가 필요하다’가 적절하다. ‘정상 월경 범주에 속하므로 안심시키고 경과 관찰한다’는 기준을 벗어났으므로 틀리다. ‘Menorrhagia에 해당하나 생리 주기가 규칙적이므로 AUB로 보지 않는다’는 AUB의 정의상 기간이나 양의 이상만 있어도 해당하므로 옳지 않다. ‘Oligomenorrhea에 해당하므로 배란 장애를 의심한다’는 희발월경을 뜻하며 이 증례와 무관하다. ‘생리양이 80cc 이하로 추정되므로 정상 변이에 해당한다’도 기간이 길기 때문에 정상이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 29}, {"question": "16세 여성이 1년 전 초경 이후 불규칙한 월경과 간헐적인 과다 월경을 주소로 내원하였다. 주기는 21~45일로 불규칙하고, 생리 기간은 7~10일 지속된다. 신체검사 및 초음파에서 특별한 구조적 이상은 관찰되지 않는다. 이 환자에서 가장 가능성 높은 원인은?", "options": [{"letter": "A", "text": "무배란성 출혈 (anovulatory bleeding)"}, {"letter": "B", "text": "혈액응고장애 (coagulopathy)"}, {"letter": "C", "text": "자궁내막 증식증 (endometrial hyperplasia)"}, {"letter": "D", "text": "난소 종양에 의한 estrogen 과다분비"}, {"letter": "E", "text": "자궁경부 폴립"}], "answer": "A", "explanation": "청소년기에는 시상하부-뇌하수체-난소 축이 미성숙하여 anovulation이 가장 흔한 원인이다. 구조적 이상이 없고, 과다월경을 동반한 불규칙 출혈은 무배란성 출혈의 전형적 양상이다. 난소 종양이나 자궁내막 증식증은 이 연령대에서 드물다. 혈액응고장애는 10% 정도에서 발견되지만, 가장 가능성 높은 원인은 아니다. 자궁경부 폴립은 구조적 이상이므로 초음파에서 보일 가능성이 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 29}, {"question": "38세 여성이 과다 월경으로 응급실에 내원하였다. 활력징후는 정상이며, 질 초음파에서 자궁내막 두께는 3mm로 매우 얇았다. 임신검사 음성, 혈색소 9.5 g/dL이다. 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "경구 NSAIDs 단독 투여"}, {"letter": "B", "text": "Tranexamic acid 경구 단독 투여"}, {"letter": "C", "text": "Levonorgestrel IUS (LNG-IUS) 즉시 삽입"}, {"letter": "D", "text": "고용량 estrogen 정맥 주사"}, {"letter": "E", "text" 다. 전립선은 비뇨생식동(urogenital sinus)에서 발생합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 31}, {"question": "다음 중 태생기 Wolffian duct (mesonephric duct)로부터 발생하는 구조는?", "options": [{"letter": "A", "text": "음핵 (clitoris)"}, {"letter": "B", "text": "부고환 (epididymis)"}, {"letter": "C", "text": "자궁 (uterus)"}, {"letter": "D", "text": "나팔관 (uterine tube)"}, {"letter": "E", "text": "질 상부 (upper vagina)"}], "answer": "B", "explanation": "Wolffian duct는 태생기 남성에서 testosterone의 영향을 받아 유지되며, 부고환(epididymis), 정관(vas deferens), 정낭(seminal vesicle) 등을 형성한다. 나팔관, 자궁, 질 상부는 paramesonephric duct (Müllerian duct)에서 발생하며, 음핵은 genital tubercle에서 발생한다. 따라서 '부고환 (epididymis)'이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 31}, {"question": "25세 여자가 외음부 우측 하방에 통증을 동반한 종창으로 내원하였다. 진찰상 압통과 발적이 동반되어 있으며, 가장 관련된 해부학적 구조는?", "options": [{"letter": "A", "text": "Gartner's duct"}, {"letter": "B", "text": "Vestibular bulb"}, {"letter": "C", "text": "Bartholin's gland (greater vestibular gland)"}, {"letter": "D", "text": "Nuck's canal"}, {"letter": "E", "text": "Skene's gland (paraurethral gland)"}], "answer": "C", "explanation": "Bartholin's gland (greater vestibular gland)은 질 전정의 후측방에 위치하며, 분비관이 막히면 낭종 또는 농양이 발생하여 외음부 하방의 통증성 종창을 일으킨다. Skene's gland는 요도 주변에 위치하여 요도 불편감을, Gartner's duct와 Nuck's canal은 일반적으로 증상을 일으키지 않으며, Vestibular bulb는 발기 조직이다. 따라서 'Bartholin's gland (greater vestibular gland)'가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 31}, {"question": "발생학적으로 여성의 대음순(labia majora)과 상동인 남성의 구조물은?", "options": [{"letter": "A", "text": "음경귀두(glans penis)"}, {"letter": "B", "text": "음낭(scrotum)"}, {"letter": "C", "text": "음경체(body of penis)"}, {"letter": "D", "text": "부고환(epididymis)"}, {"letter": "E", "text": "전립선(prostate)"}], "answer": "B", "explanation":
