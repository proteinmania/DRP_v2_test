ns": [{"letter": "A", "text": "자궁경부 세포진 검사"}, {"letter": "B", "text": "골반 초음파 검사"}, {"letter": "C", "text": "자궁내막 생검"}, {"letter": "D", "text": "혈액 응고 검사"}, {"letter": "E", "text": "소변 임신 반응 검사"}], "answer": "E", "explanation": "가임기 여성의 비정상 자궁출혈에서는 임신 가능성을 가장 먼저 확인해야 한다. 소변 임신 반응 검사는 신속하고 비침습적이며, 이후 진단 및 치료 방향을 결정하는 데 필수적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "무월경을 주소로 내원한 여성에게 프로게스테론 부하 검사(progesterone challenge test)를 시행한 후 소퇴성 출혈이 발생하였다. 이 결과가 의미하는 것은?", "options": [{"letter": "A", "text": "임신 상태임을 의미한다."}, {"letter": "B", "text": "난소 부전이 있음을 의미한다."}, {"letter": "C", "text": "자궁내막이 완전히 소실되었음을 의미한다."}, {"letter": "D", "text": "시상하부-뇌하수체 기능이 정상임을 의미한다."}, {"letter": "E", "text": "내인성 에스트로겐이 충분한 상태임을 의미한다."}], "answer": "E", "explanation": "프로게스테론 부하 후 소퇴성 출혈이 있으면 자궁내막이 내인성 에스트로겐에 의해 증식되었고 배출로가 정상임을 의미하므로, 내인성 에스트로겐이 충분한 상태임을 의미한다. 가 가장 적절한 해석이다. 임신이 배제된 상태에서 시행하므로 임신 상태임을 의미하지 않으며, 시상하부-뇌하수체-난소 축의 정상 여부를 직접적으로 의미하지는 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "18세 여자가 초경이 없어 내원하였다. 유방과 음모는 Tanner 3기로 정상 발달하였고, 외부생식기는 정상이다. 골반초음파에서 자궁이 관찰되지 않고, 혈액검사상 FSH 8.5 mIU/mL, LH 6.0 mIU/mL, E2 90 pg/mL, 핵형 46,XX이다. 다음 중 가장 필요한 추가 검사는?", "options": [{"letter": "A", "text": "갑상선 기능 검사"}, {"letter": "B", "text": "신장 초음파 검사"}, {"letter": "C", "text": "뇌하수체 MRI 촬영"}, {"letter": "D", "text": "진단적 복강경 시술"}, {"letter": "E", "text": "혈청 프로락틴 수치 측정"}], "answer": "B", "explanation": "MRKH 증후군(Mayer-Rokitansky-Küster-Hauser syndrome)은 자궁과 질의 무발생 또는 저형성을 특징으로 하는 선천성 기형으로, 정상 난소 기능을 가지므로 이차 성징은 정상적으로 발현된다. 이 증후군은 약 30-40%에서 신장 기형(특히 일측성 신무발생)을 동반하므로, 자궁이 없는 46,XX 여성에서 MRKH가 의심될 경우 반드시 신장 초음파 검사를 시행하여 동반 기형 여부를 평가해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "18세 여성이 원발성 무월경으로 내원하여 MRKH 증후군으로 진단되었다. 초음파에서 자궁이 관찰되지 않고 양측 난소는 정상이다. 이 환자에서 동반될 가능성이 높은 기형을 확인하기 위해 우선적으로 권고해야 할 검사는?", "options": [{"letter": "A", "text": "복부 CT"}, {"letter": "B", "text": "뇌 MRI"}, {"letter": "C", "text": "방광경 검사"}, {"letter": "D", "text": "심장 초음파"}, {"letter": "E", "text": "갑상선 기능 검사"}], "answer": "A", "explanation": "MRKH 증후군은 비뇨기계 동반 기형, 특히 일측성 신장 무형성과의 연관성이 높다. 강의에서도 진단 시 복부 CT나 골반 MRI를 통해 신장 및 요관의 이상을 반드시 확인해야 한다고 강조하였다. 복부 CT는 비뇨기계 구조를 상세히 평가할 수 있어 가장 먼저 시행해야 할 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "여성에서 정상 사춘기 발달의 일반적인 순서로 옳은 것은?", "options": [{"letter": "A", "text": "성장 급증 → 유방 발달 → 음모 출현 → 초경"}, {"letter": "B", "text": "유방 발달 → 초경 → 음모 출현 → 성장 급증"}, {"letter": "C", "text": "음모 출현 → 유방 발달 → 성장 급증 → 초경"}, {"letter": "D", "text": "유방 발달 → 음모 출현 → 성장 급증 → 초경"}, {"letter": "E", "text": "성장 급증 → 초경 → 유방 발달 → 음모 출현"}], "answer": "A", "explanation": "In girls, the first sign of puberty is often a growth spurt (height acceleration), followed by breast budding (thelarche), then the appearance of pubic hair (pubarche). Peak height velocity typically occurs after pubarche, and menarche (first menstruation) is one of the final events. The sequence '성장 급증 → 유방 발달 → 음모 출현 → 초경' reflects this order. '유방 발달 → 음모 출현 → 성장 급증 → 초경' incorrectly places the growth spurt after thelarche. '음모 출현 → 유방 발달 → 성장 급증 → 초경' is incorrect because breast development precedes pubic hair. The other options similarly misplace menarche or other milestones.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여아가 초경이 없어 내원하였다. 신체검진에서 유방 발달과 음모는 정상이나, 자궁이 촉지되지 않는다. 혈중 FSH, LH, estradiol은 정상 범위이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Polycystic ovary syndrome"}, {"letter": "B", "text": "Kallmann syndrome"}, {"letter": "C", "text": "Müllerian agenesis"}, {"letter": "D", "text": "Androgen insensitivity syndrome"}, {"letter": "E", "text": "Turner syndrome"}], "answer": "C", "explanation": "정상 2차 성징과 정상 음모, 정상 gonadotropin 수치를 보이는 무월경은 해부학적 원인에 의한 eugonadotropic amenorrhea를 시사한다. 자궁이 없는 경우 Müllerian agenesis(물러관 무발생)를 의심할 수 있다. Androgen insensitivity syndrome은 46,XY 핵형, 높은 testosterone, 음모가 거의 없고 blind vagina가 동반된다. Turner syndrome은 hypergonadotropic hypogonadism(FSH 증가)과 저신장 등의 특징을 보인다. Kallmann syndrome은 hypogonadotropic hypogonadism으로 FSH가 낮다. PCOS는 정상 자궁을 가지며 불규칙 월경을 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "22세 여성이 1년간 무월경을 주소로 내원하였다. 체중감소를 목적으로 극심한 다이어트를 한 이후 체중이 15 kg 감소하였고, 현재 BMI는 16.5 kg/m²이다. 혈액 검사 결과 FSH 1.5 mIU/mL, LH 0.8 mIU/mL, estradiol 10 pg/mL(참고치 30-200), prolactin 12 ng/mL, TSH 2.0 mIU/L이다. 프로게스테론 쇠퇴성 출혈은 없었으며, 에스트로겐-프로게스테론 투여 후 쇠퇴성 출혈은 있었다. 환자에게 시행할 가장 적절한 치료는?", "options": [{"letter": "A", "text": "복합 경구 피임제(combined OCP) 투여"}, {"letter": "B", "text": "클로미펜(clomiphene) 투여"}, {"letter": "C", "text": "에스트로겐 단독 요법"}, {"letter": "D", "text": "브로모크립틴(bromocriptine) 투여"}, {"letter": "E", "text": "체중 증가 및 생활습관 교정"}], "answer": "E", "explanation": "저체중과 심한 스트레스에 의한 기능성 시상하부 무월경(Functional Hypothalamic Amenorrhea, FHA)에서는 체중 증가 및 생활습관 교정이 일차 치료입니다. 에스트로겐 단독 요법이나 OCP는 골밀도 감소가 동반된 경우에 한해 신중히 사용할 수 있으며, 클로미펜은 배란 유도에, 브로모크립틴은 고프로락틴혈증에 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여자가 초경이 없어 내원하였다. 유방 발달은 Tanner 1기, 음모 발달은 Tanner 2기이며, 외음부와 질은 정상 구조이다. 골반 초음파에서 자궁과 난소가 작게 관찰되었고, 혈액 검사에서 FSH 0.4 mIU/mL, LH 0.2 mIU/mL, estradiol 10 pg/mL이며, 프로락틴과 갑상선자극호르몬은 정상이다. 염색체 검사는 46,XX이다. 원인 감별을 위해 가장 적절한 다음 검사는?", "options": [{"letter": "A", "text": "난소 생검"}, {"letter": "B", "text": "부신 초음파"}, {"letter": "C", "text": "뇌 자기공명영상(MRI)"}, {"letter": "D", "text": "자궁난관 조영술"}, {"letter": "E", "text": "성선자극호르몬자극호르몬(GnRH) 자극 검사"}], "answer": "C", "explanation": "이 환자는 기초 검사에서 저성선자극호르몬성 성선저하증(hypogonadotropic hypogonadism) 소견을 보이며, 46,XX 정상 핵형으로 터너증후군이 배제되었다. 원인 감별을 위하여 뇌하수체 및 시상하부의 구조적 병변을 확인하기 위해 뇌 자기공명영상(MRI)을 시행해야 한다. 또한 칼만증후군(Kallmann syndrome) 감별을 위해 후각 검사를 함께 고려할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 미혼 여성이 최근 3개월간 불규칙한 질출혈로 내원하였다. 평소 월경은 규칙적이었으나 최근 생리 양상이 달라졌다고 한다. 문진 시 성관계력은 부인하나, 다음 중 가장 우선적으로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "갑상선자극호르몬 (TSH) 검사"}, {"letter": "B", "text": "질 초음파 및 자궁경 검사"}, {"letter": "C", "text": "혈액응고 인자 검사 (coagulation factor assay)"}, {"letter": "D", "text": "자궁내막 흡인 조직검사 (endometrial aspiration biopsy)"}, {"letter": "E", "text": "소변 hCG 검사 (urine pregnancy test)"}], "answer": "E", "explanation": "가임기 여성의 비정상 자궁출혈에서 가장 먼저 배제해야 할 것은 임신이다. 환자가 성관계를 부인하더라도 임신검사는 필수로 시행한다. 임신이 확인된 후에야 다른 구조적, 기능적 원인에 대한 평가를 진행할 수 있다. 자궁내막 조직검사는 폐경기 이후나 내막 증식증이 의심될 때 시행한다. 혈액응고 검사는 청소년기나 응고장애 의심 시 고려한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "15세 여성이 초경 이후 1년간 월경량이 지나치게 많아 자주 빈혈로 입원하였다. 월경 주기는 규칙적이며, 기간은 7~9일이다. 초음파 검사상 특별한 구조적 이상은 발견되지 않았다. 다음 중 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "갑상선자극호르몬(TSH) 검사"}, {"letter": "B", "text": "자궁내막 생검"}, {"letter": "C", "text": "자궁내시경 검사 (hysteroscopy)"}, {"letter": "D", "text": "혈청 progesterone 측정"}, {"letter": "E", "text": "혈액응고검사 (coagulation profile)"}], "answer": "E", "explanation": "청소년기 비정상 자궁출혈에서 구조적 이상이 없는 경우 무배란이 주된 원인이지만, 혈액응고 장애(coagulopathy)가 약 10%에서 발견되므로 과다 월경이 있는 청소년에서는 응고검사를 반드시 시행해야 한다. 해당 환자는 구조적 이상이 없고, 과다 출혈로 빈혈이 발생하였으므로 von Willebrand disease 등 응고 이상을 배제하는 것이 우선이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "14세 여자 환자가 아직 초경이 없고 유방 발달이나 음모 발달이 전혀 관찰되지 않는다. 보호자가 매우 걱정하여 내원하였다. 가장 적절한 조치는 무엇인가?", "opti 증 (imperforate hymen)"}, {"letter": "C", "text": "Androgen 불응성 증후군"}, {"letter": "D", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "E", "text": "Turner 증후군"}], "answer": "B", "explanation": "처녀막 폐쇄증은 outflow obstruction의 한 원인으로, 자궁과 난소가 정상이고 2차 성징 발현이 정상임에도 불구하고 생리혈이 배출되지 못해 주기적인 심한 하복통이 발생한다. 'Turner 증후군'은 2차 성징 발달이 지연되거나 없으며, 저신장 등 다른 특징이 동반된다. 'Androgen 불응성 증후군'은 46XY로 자궁이 없고, 주기적 통증을 유발하지 않는다. 'PCOS'는 무월경과 함께 비만, 다모증 등의 안드로겐 과잉 증상이 나타나며, 주기적 통증은 특징적이지 않다. 'Kallmann 증후군'은 후각 소실을 동반한 hypogonadotropic hypogonadism으로 2차 성징 발현이 저하된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "무월경을 주소로 내원한 20~40대 여성에서 가장 먼저 시행해야 하는 검사는 무엇인가?", "options": [{"letter": "A", "text": "갑상선 기능 검사"}, {"letter": "B", "text": "혈청 prolactin 측정"}, {"letter": "C", "text": "소변 또는 혈액 hCG 검사"}, {"letter": "D", "text": "혈청 FSH와 LH 측정"}, {"letter": "E", "text": "골반 초음파 검사"}], "answer": "C", "explanation": "가임기 여성의 무월경 진단에서 첫 번째 단계는 임신 여부를 확인하는 hCG 검사이다. 임신이 배제된 후에야 FSH/LH, prolactin, 갑상선 기능 검사, 골반 초음파 등의 원인 검사를 진행할 수 있다. 강의에서도 \"가임 가능성 우선 임신 여부를 확인한다. hCG test.\"라고 강조하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "자궁 소파술 과거력이 있는 무월경 환자에서 Asherman 증후군이 의심될 때, 진단을 위해 가장 먼저 시행할 검사는?", "options": [{"letter": "A", "text": "자궁내막 조직 생검"}, {"letter": "B", "text": "골반 초음파 검사 시행"}, {"letter": "C", "text": "진단적 자궁경 검사 시행"}, {"letter": "D", "text": "자궁난관조영술 촬영"}, {"letter": "E", "text": "골반 자기공명영상"}], "answer": "D", "explanation": "자궁난관조영술 촬영은 자궁강 내 유착을 의심할 때 일차적으로 시행하는 영상의학적 검사로, 조영제의 충만 결손을 통해 유착 부위를 확인할 수 있다. 진단적 자궁경 검사 시행은 더 정확하지만 침습적이어서 선별검사 후 필요시 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 여성이 6개월간의 무월경과 유루증으로 내원하였다. 임신 검사는 음성이다. 가장 먼저 시행해야 할 검사는 무엇인가?", "options": [{"letter": "A", "text": "혈청 프로락틴 검사"}, {"letter": "B", "text": "프로게스테론 자극 검사"}, {"letter": "C", "text": "갑상선 기능 검사"}, {"letter": "D", "text": "뇌하수체 MRI 촬영"}, {"letter": "E", "text": "난포자극호르몬 검사"}], "answer": "A", "explanation": "무월경과 유루증을 보이는 환자에서 고프로락틴혈증을 확인하기 위해 혈청 프로락틴 검사가 우선적으로 필요하다. 프로락틴 수치가 상승된 경우 원인 감별을 위해 갑상선 기능 검사, 뇌하수체 MRI 등을 추가로 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여아가 초경이 없어 내원하였다. 유방 발달은 Tanner 1기로 전혀 없으며, 보호자에 따르면 환아는 후각이 둔하다고 한다. 혈액 검사에서 FSH 1.2 mIU/mL, LH 1.5 mIU/mL로 매우 낮게 측정되었다. 가장 의심되는 진단은 무엇인가?", "options": [{"letter": "A", "text": "터너 증후군 (Turner syndrome)"}, {"letter": "B", "text": "다낭성 난소 증후군 (Polycystic ovary syndrome)"}, {"letter": "C", "text": "칼만 증후군 (Kallmann syndrome)"}, {"letter": "D", "text": "뮐러관 무형성증 (MRKH syndrome)"}, {"letter": "E", "text": "성선 발육 부전 (Gonadal dysgenesis)"}], "answer": "C", "explanation": "원발성 무월경, 무후각증, 저성선자극호르몬성 성선기능저하증(FSH/LH 저하)은 칼만 증후군(Kallmann syndrome)에 합당합니다. 터너 증후군은 고성선자극호르몬성 성선기능저하증을 보입니다. 다낭성 난소 증후군은 일반적으로 2차 성징 발현 후 나타나며 고안드로겐혈증과 난소의 다낭 소견이 특징입니다. 뮐러관 무형성증(MRKH)은 자궁은 없으나 유방 발달은 정상입니다. 성선 발육 부전은 고FSH를 보이므로 이 환자와 부합하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "22세 여성이 최근 10kg의 체중 감소 후 6개월째 무월경을 보여 내원하였다. 임신 검사는 음성이다. 혈액 검사 결과 FSH 2.5 mIU/mL, LH 3.0 mIU/mL, estradiol 14 pg/mL로 측정되었다. 이러한 소견이 시사하는 병변 부위는 어디인가?", "options": [{"letter": "A", "text": "시상하부 또는 뇌하수체 (Hypothalamus or pituitary)"}, {"letter": "B", "text": "난소 (Ovary)"}, {"letter": "C", "text": "질 (Vagina)"}, {"letter": "D", "text": "자궁경부 (Cervix)"}, {"letter": "E", "text": "자궁내막 (Endometrium)"}], "answer": "A", "explanation": "FSH와 LH가 정상 이하로 저하되고 estradiol도 낮은 소견은 이차성 성선기능저하증, 즉 시상하부 또는 뇌하수체 병변에 의한 무월경임을 시사합니다. 난소성 원인이라면 FSH가 상승되어야 합니다. 자궁내막, 자궁경부, 질 병변은 대개 호르몬 검사가 정상 범위입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "30세 여성이 4개월 동안의 무월경과 함께 피로감, 체중 증가, 추위를 느끼는 증상을 호소한다. 임신 검사는 음성이다. 가장 유용한 일차 검사는 무엇인가?", "options": [{"letter": "A", "text": "갑상선 자극 호르몬 (TSH) 측정"}, {"letter": "B", "text": "혈중 FSH 측정"}, {"letter": "C", "text": "경질 골반 초음파"}, {"letter": "D", "text": "혈중 프로락틴 측정"}, {"letter": "E", "text": "핵형 분석"}], "answer": "A", "explanation": "피로, 체중 증가, 한랭 불내성 등의 증상은 갑상선 기능 저하증을 의심하게 하며, 갑상선 질환은 무월경의 원인이 될 수 있습니다. 따라서 가장 먼저 갑상선 자극 호르몬(TSH)을 측정하는 것이 적절합니다. FSH는 난소 원인 감별에, 초음파는 해부학적 이상 확인에, 프로락틴은 고프로락틴혈증 의심 시, 핵형 분석은 터너 증후군 등 유전적 원인 의심 시 시행합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여성이 유방 발달이 전혀 없고 월경이 한 번도 없어 내원하였다. 신체 검사에서 자궁은 촉지되며, 다른 신경학적 이상은 없다. 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "뇌하수체 MRI"}, {"letter": "B", "text": "골반 초음파"}, {"letter": "C", "text": "혈청 FSH 측정"}, {"letter": "D", "text": "프로게스테론 부하 검사"}, {"letter": "E", "text": "핵형 검사(karyotyping)"}], "answer": "C", "explanation": "원발성 무월경에서 이차성징(유방 발달)이 없는 경우, 내인성 estrogen이 부족함을 의미합니다. 이때 원인 감별을 위해 가장 먼저 FSH를 측정합니다. FSH가 높으면 난소성(hypergonadotropic), 낮으면 중추성(hypogonadotropic)으로 분류할 수 있습니다. '혈청 FSH 측정'이 정답입니다. 골반 초음파는 구조적 이상 확인에 도움이 되지만, 호르몬 검사가 선행되어야 합니다. 뇌하수체 MRI는 FSH 저하 시 시행합니다. 핵형 검사는 FSH 상승 시 Y chromosome 확인을 위해 필요합니다. 프로게스테론 부하 검사는 estrogen 상태 평가에 사용되나, 유방 미발달로 이미 저에스트로겐 상태가 의심되므로 FSH 측정이 우선입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "28세 여성이 1년간 무월경으로 병원에 왔다. 소변 hCG 검사는 음성이다. 신체 검진과 초음파에서 해부학적 이상은 관찰되지 않았다. 다음으로 가장 먼저 시행해야 할 혈액 검사는?", "options": [{"letter": "A", "text": "항뮐러관호르몬(AMH)"}, {"letter": "B", "text": "TSH와 프로락틴"}, {"letter": "C", "text": "인슐린 저항성 검사"}, {"letter": "D", "text": "FSH와 에스트라디올"}, {"letter": "E", "text": "테스토스테론과 DHEA-S"}], "answer": "B", "explanation": "속발성 무월경의 진단 알고리즘에서 임신을 배제한 후에는 갑상선 기능 이상과 고프로락틴혈증을 먼저 확인합니다. TSH와 프로락틴을 측정하면 estion": "18세 여성이 월경이 전혀 없어 내원하였다. 유방 발달은 Tanner stage 4이고, 치모는 정상적으로 발달하였다. 골반 초음파에서 자궁이 관찰되지 않았다. 핵형 검사는 46,XX이다. 이 환자에게 가장 필요한 추가 검사는?", "options": [{"letter": "A", "text": "D. GnRH 자극 검사"}, {"letter": "B", "text": "E. 갑상선 기능 검사"}, {"letter": "C", "text": "A. 뇌하수체 MRI"}, {"letter": "D", "text": "C. 신장 초음파 또는 요로조영술"}, {"letter": "E", "text": "B. 복강경 난소 생검"}], "answer": "D", "explanation": "MRKH 증후군(뮐러관 무발생증)은 정상 핵형(46,XX)과 정상 이차성징을 보이지만 자궁과 상부 질이 없어 원발성 무월경을 보인다. 이 질환은 비뇨기계 및 척추 기형을 빈번히 동반하므로 신장 초음파나 요로조영술을 통해 신장 기형을 확인하는 것이 필수적이다. 뇌하수체 MRI나 GnRH 자극 검사는 중추성 무월경이 의심될 때 시행하며, 갑상선 검사는 일반적 선별검사이나 이 경우 해부학적 문제가 명확하므로 우선적으로 신장 평가가 필요하다. 따라서 추가 검사로 신장 초음파가 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 여성이 2년간 무월경으로 내원하였다. 임신 검사, TSH, 프로락틴, 프로게스테론 유발시험 모두 정상이거나 반응이 없었다. 혈중 FSH는 1.2 mIU/mL로 낮게 측정되었다. 다음으로 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "A. 골반 초음파"}, {"letter": "B", "text": "E. 복강경 난소 생검"}, {"letter": "C", "text": "C. 뇌 자기공명영상(MRI)"}, {"letter": "D", "text": "D. 자궁내막 생검"}, {"letter": "E", "text": "B. GnRH 자극 검사"}], "answer": "C", "explanation": "저생식샘자극호르몬성 생식선저하증(hypogonadotropic hypogonadism)은 FSH와 LH가 낮고 에스트로겐이 부족한 상태이다. 이 경우 시상하부 또는 뇌하수체에 종양이 있을 가능성을 배제하기 위해 반드시 뇌 MRI를 시행해야 한다. GnRH 자극 검사는 MRI 이후 감별 진단에 도움이 될 수 있으나, 우선적으로 구조적 병변을 확인하는 것이 중요하다. 골반 초음파는 이미 시행했을 것이며, 자궁내막 생검이나 복강경 생검은 도움이 되지 않는다. 따라서 뇌 MRI가 가장 적절한 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 여성이 6개월간 무월경을 주소로 내원하였다. 가장 먼저 시행해야 할 검사는 무엇인가?", "options": [{"letter": "A", "text": "혈청 FSH 검사"}, {"letter": "B", "text": "갑상선 자극 호르몬 (TSH) 검사"}, {"letter": "C", "text": "골반 초음파 검사"}, {"letter": "D", "text": "혈청 프로락틴 검사"}, {"letter": "E", "text": "소변 임신 검사"}], "answer": "E", "explanation": "속발성 무월경의 접근에서 가장 먼저 시행해야 할 것은 임신 검사(pregnancy test)이다. 임신은 가임기 여성에서 무월경의 가장 흔한 원인이므로 반드시 먼저 배제해야 한다. 임신이 아닌 경우 프로락틴, TSH 검사로 넘어간다. 혈청 FSH 검사나 골반 초음파 검사는 이후 단계에서 원인 감별을 위해 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "이차성징 발달은 정상이나 자궁이 없는 18세 원발성 무월경 여성에서 시행해야 할 가장 중요한 검사는?", "options": [{"letter": "A", "text": "핵형 검사 (karyotyping)"}, {"letter": "B", "text": "혈중 FSH 측정"}, {"letter": "C", "text": "골반 MRI"}, {"letter": "D", "text": "혈중 테스토스테론 측정"}, {"letter": "E", "text": "복강경 검사"}], "answer": "A", "explanation": "이차성징(유방 발달 등)이 있다는 것은 에스트로겐 작용이 있었음을 의미한다. 자궁이 없는 경우에는 뮐러관 무발생(MRKH; 46,XX)과 안드로겐 불응 증후군(AIS; 46,XY)을 감별해야 한다. 이 두 질환은 핵형 검사(karyotyping)로 가장 먼저 구분할 수 있다. 46,XX이면 MRKH, 46,XY이면 AIS로 진단하며, AIS의 경우 Y 염색체로 인한 생식샘 종양 위험이 있으므로 생식샘 절제술(gonadectomy)이 필요하다. FSH나 테스토스테론 측정, MRI 등은 보조적 정보를 제공할 수 있으나 핵형 검사가 진단적 결정 단계이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "24세 여성이 8개월간의 무월경과 양측 유방의 유루증을 주소로 내원하였다. 신체검사에서 특이 소견은 없었다. 가장 먼저 시행해야 할 검사는 무엇인가?", "options": [{"letter": "A", "text": "프로게스테론 쇠퇴출혈 검사"}, {"letter": "B", "text": "난포자극호르몬 측정"}, {"letter": "C", "text": "갑상선자극호르몬 측정"}, {"letter": "D", "text": "안장 자기공명영상 (sella MRI)"}, {"letter": "E", "text": "혈중 프로락틴 측정"}], "answer": "E", "explanation": "유루증을 동반한 무월경 환자에서 가장 먼저 시행해야 할 검사는 혈중 프로락틴 농도 측정이다. 프로락틴이 상승되어 있으면 원인 감별을 위해 갑상선자극호르몬 측정(갑상선기능저하증 감별)과 안장 MRI를 고려한다. 프로게스테론 쇠퇴출혈 검사는 무월경의 평가에 도움이 되지만 첫 검사로는 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 여성이 3개월간의 불규칙한 질출혈을 주소로 내원하였다. 신체 활력징후는 안정적이며, 복부 진찰에서 특이 소견은 없다. 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검(endometrial biopsy)"}, {"letter": "B", "text": "자궁경부 세포진 검사(Pap smear)"}, {"letter": "C", "text": "골반 초음파(pelvic ultrasound)"}, {"letter": "D", "text": "소변 human chorionic gonadotropin (hCG) 검사"}, {"letter": "E", "text": "혈청 프로게스테론 측정"}], "answer": "D", "explanation": "가임기 여성에서 생리불순이나 질출혈이 발생하면 가장 먼저 임신 여부를 확인해야 하며, 소변 hCG 검사가 신속하고 간편한 선별검사이다. 임신이 배제된 후에야 추가적인 진단 절차를 진행할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여자가 primary amenorrhea로 내원하였다. 신체검사에서 유방발달 Tanner 1기, 음모발달 Tanner 1기 소견을 보인다. Pelvic ultrasound상 uterus는 관찰되나 크기가 작다. 혈액검사 결과: FSH 75 mIU/mL (참고치 5~15), LH 59 mIU/mL (5~20), Estradiol 13 pg/mL (30~200). 다음 중 가장 우선적으로 시행할 검사는?", "options": [{"letter": "A", "text": "Brain MRI"}, {"letter": "B", "text": "Prolactin 측정"}, {"letter": "C", "text": "Pelvic CT"}, {"letter": "D", "text": "Thyroid function test"}, {"letter": "E", "text": "Karyotype analysis"}], "answer": "E", "explanation": "FSH와 LH가 증가하고 estradiol이 감소된 소견은 hypergonadotropic hypogonadism을 시사한다. Primary amenorrhea와 delayed puberty를 동반한 경우, gonadal dysgenesis (예: Turner syndrome)를 감별하기 위해 karyotype analysis가 우선적으로 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "태아기 Sertoli cell에서 분비되어 Müllerian duct의 퇴행을 유도하는 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Anti-Müllerian hormone"}, {"letter": "B", "text": "Dihydrotestosterone"}, {"letter": "C", "text": "Testosterone"}, {"letter": "D", "text": "Inhibin B"}, {"letter": "E", "text": "Estrogen"}], "answer": "A", "explanation": "Sertoli 세포는 anti-Müllerian hormone(AMH)을 분비하여 Müllerian duct의 퇴행을 유도합니다. Testosterone과 DHT는 Leydig 세포에서 분비되며 Wolffian duct 유지와 외부 남성화에 관여하고, estrogen과 inhibin B는 다른 역할을 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "33세 여자가 3년간의 불임으로 남편과 함께 내원하였다. 여성의 골반초음파, 자궁난관조영술, 배란검사 모두 정상이다. 남편의 정액검사에서 정자 농도 500만/mL, 운동성 5%, 정상 형태 2%로 심한 남성인자 불임으로 진단되었다. 가장 적절한 보조생식술은?", "options": [{"letter": "A", "text": "세포질내 정자주입술(ICSI)"}, {"letter": "B", "text": "고환정자채취술(TESE)"}, {"letter": "C", "text": "자궁강내 정액주입술(IUI)"}, {"letter": "D", "text": "자연주기 임신 시도"}, {"letter": "E", "text": "체외수정-배아이식술(IVF-ET)"}], "answer": "A", "explanation": "Severe male factor infertility, characterized by very low sperm count (<5 million/mL), poor motility (<10%), and abnormal morphology (<4%), typically requires ICSI. IUI is ineffective with such low motile sperm counts. Conventional IVF may result in low fertilization rates, whereas ICSI directly injects a single sperm into each oocyte, overcoming severe sperm defects. TESE is reserved for obstructive azoospermia. Therefore, the most appropriate assisted reproductive technology is '세포질내 정자주입술(ICSI)'.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "24세 남성이 음모가 없고 성욕이 저하되어 내원하였다. 정액 검사에서 무정자증이 확인되었고, 양측 고환은 각각 5mL로 작았다. 혈청 테스토스테론 0.4 ng/mL (정상 2.5~10), LH 0.3 mIU/mL (정상 4~12), FSH 0.2 mIU/mL (정상 4~12)로 모두 낮았다. 프로락틴은 정상이다. 다음으로 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "생식샘자극호르몬방출호르몬(GnRH) 자극 검사"}, {"letter": "B", "text": "복부-골반 컴퓨터단층촬영(CT)"}, {"letter": "C", "text": "핵형 검사"}, {"letter": "D", "text": "뇌하수체 자기공명영상(MRI)"}, {"letter": "E", "text": "고환 생검"}], "answer": "A", "explanation": "저성선자극호르몬성 생식선저하증(hypogonadotropic hypogonadism)에서는 시상하부와 뇌하수체의 감별을 위해 GnRH 자극 검사를 시행한다. GnRH 자극 검사에서 LH와 FSH 반응이 있으면 시상하부 병변을, 반응이 미약하면 뇌하수체 자체의 문제를 시사한다. 이후 필요시 뇌하수체 MRI를 시행할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "28세 남성이 불임을 주소로 내원하였다. 신체 검진에서 양측 고환이 작고 단단하게 만져진다. 병력 청취에서 2년 동안 보디빌딩을 목적으로 단백동화 스테로이드를 주사해 왔다고 한다. 혈액 검사에서 예상되는 호르몬 소견은?", "options": [{"letter": "A", "text": "Testosterone 감소, LH 감소, FSH 감소"}, {"letter": "B", "text": "Testosterone 감소, LH 증가, FSH 증가"}, {"letter": "C", "text": "Testosterone 증가, LH 증가, FSH 증가"}, {"letter": "D", "text": "Testosterone 증가, LH 감소, FSH 감소"}, {"letter": "E", "text": "Testosterone 정상, LH 정상, FSH 정상"}], "answer": "A", "explanation": "외인성 안드로겐(단백동화 스테로이드)은 시상하부-뇌하수체에 음성 피드백을 가하여 GnRH, LH, FSH의 분비를 억제한다. 이로 인해 고환에서의 내인성 testosterone 생산이 감소하므로, 혈중 testosterone은 낮고 LH와 FSH도 낮은 소견을 보인다 (2차성 성선기능저하증). 'Testosterone 증가, LH 감소, FSH 감소'는 외인성 안드로겐이 직접 작용하는 경우일 수 있으나, 대개 단백동화 스테로이드는 testosterone assay에 측정되지 않아 내인성 testosterone은 낮게 측정된다. 따라서 정답은 모두 낮은 수치를 보이는 4번이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "정계정맥류(varicocele)가 주로 왼쪽에 호발하는 해부학적 이유로 가장 옳은 것은?", "options": [{"letter": "A", "text": "왼쪽 고환정맥이 좌신동맥과 교차하여 압박받기 쉬워서"}, {"letter": "B", "text": "왼쪽 고환정맥이 하대정맥(IVC)으로 직접 유입되기 때문"}, {"letter": "C", "text": "왼쪽 고환정맥이 오른쪽보다 길어서 판막 부전이 잘 생기기 때문"}, {"letter": "D", "text": "왼쪽 고환정맥이 대동맥 뒤로 주행하면서 압박받기 때문"}, {"letter": "E", "text": "왼쪽 고환정맥이 좌신정맥(left renal vein)으로 직각으로 유입되기 때문"}], "answer": "E", "explanation": "왼쪽 고환정맥은 좌신정맥에 직각으로 유입되어 정수압이 높아지는 반면, 오른쪽은 하대정맥으로 비스듬히 유입되어 상대적으로 낮은 압력을 받는다. 이러한 해부학적 차이가 왼쪽에 정계정맥류가 호발하는 주된 이유이다. '왼쪽 고환정맥이 하대정맥으로 직접 유입되기 때문'은 오른쪽의 배출 경로이며, 나머지 보기들은 특정 상황에서 압박이 될 수 있으나 주된 원인은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "불임 검사를 받는 34세 남성이 3주 전에 급성 부고환염으로 항생제 치료를 완료하였다. 현재 정액 검사를 시행할 때, 이 검사에 반영되는 정자는 언제 생성된 것인가?", "options": [{"letter": "A", "text": "약 3주일 전"}, {"letter": "B", "text": "약 1주일 전"}, {"letter": "C", "text": "약 3개월 전"}, {"letter": "D", "text": "약 6주일 전"}, {"letter": "E", "text": "약 6개월 전"}], "answer": "C", "explanation": "정자 생성 주기는 약 74일(약 3개월)이다. 따라서 현재 사정된 정자는 약 3개월 전에 생성되기 시작한 것이다. 환자가 3주 전에 앓은 부고환염은 현재 정액 검사의 결과에 아직 영향을 미치지 않았을 가능성이 높으며, 감염이 정자 생성에 영향을 주었다면 그 효과를 보기 위해서는 최소 3개월을 기다려야 한다. '약 1주일 전'이나 '약 3주일 전'은 너무 짧고, '약 6개월 전'은 과도한 기간이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "25세 남성이 불임과 양측 고환 위축으로 내원하였다. 키가 185cm로 크고, 여성형 유방이 관찰된다. 정액 검사에서 무정자증을 보이고, 염색체 검사에서 47,XXY가 확인되었다. 이 환자의 혈액 검사에서 예상되는 소견은?", "options": [{"letter": "A", "text": "Testosterone 낮음, LH 낮음, FSH 낮음"}, {"letter": "B", "text": "Testosterone 높음, LH 낮음, FSH 낮음"}, {"letter": "C", "text": "Testosterone 높음, LH 높음, FSH 높음"}, {"letter": "D", "text": "Testosterone 정상, LH 정상, FSH 정상"}, {"letter": "E", "text": "Testosterone 낮음, LH 높음, FSH 높음"}], "answer": "E", "explanation": "클라인펠터 증후군은 고환 기능 부전으로 인한 일차성 성선기능저하증이다. 고환의 Leydig cell과 Sertoli cell의 기능 저하로 testosterone이 낮아지며, 시상하부-뇌하수체의 음성 피드백이 소실되어 LH와 FSH가 높게 분비된다. 따라서 'Testosterone 낮음, LH 높음, FSH 높음'이 정답이다. 반면, 칼만 증후군이나 단백동화 스테로이드 사용에서는 이차성 성선기능저하증으로 LH, FSH가 모두 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "33세 여성과 35세 남성이 3년간 피임 없이 성관계를 가졌으나 임신이 되지 않았다. 여성의 월경은 규칙적이고, 골반 초음파 및 자궁난관조영술은 정상이다. 남성의 정액 검사 결과: 정액량 1.5mL, 정자 농도 3×10⁶/mL (참고치 ≥ 15×10⁶/mL), 운동성 5% (참고치 ≥ 32%), 정상 형태 정자 2% (참고치 ≥ 4%). 임신을 위해 다음으로 시행할 가장 적절한 방법은?", "options": [{"letter": "A", "text": "난자 세포질내 정자 주입술 (ICSI)"}, {"letter": "B", "text": "체외 수정 (IVF)"}, {"letter": "C", "text": "공여 정자를 이용한 시술"}, {"letter": "D", "text": "자궁강내 정액 주입술 (IUI)"}, {"letter": "E", "text": "입양"}], "answer": "A", "explanation": "중증의 소수정자무력기형정자증(심각한 정자 수 감소, 운동성 저하, 형태 이상)을 동반한 순수 남성 인자 불임에서 IUI나 일반적인 IVF로는 수정에 필요한 정자 수가 부족하여 성공률이 낮다. ICSI는 하나의 정자를 난자에 직접 주입하여 수정을 가능하게 하므로 가장 적절한 다음 단계이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "5-alpha reductase inhibitor(5-ARI)를 장기간 복용할 때 발생할 수 있는 부작용으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "전립선 크기 증가"}, {"letter": "B", "text": "성욕 감소 및 발기부전"}, {"letter": "C", "text": "혈중 testosterone 증가"}, {"letter": "D", "text": "정자 운동성 증가"}, {"letter": "E", "text": "골밀도 증가"}], "answer": "B", "explanation": "5-ARI는 testosterone이 DHT로 변환되는 것을 억제함으로써 DHT의 작용을 감소시키므로, 장기 복용 시 성욕 감소, 발기부전, 불임 등의 성기능 관련 부작용이 발생할 수 있다. 혈중 testosterone은 오히려 증가할 수 있고, 전립선 크기는 감소하며, 정자 운동성은 악화되는 경향을 보인다. 골밀도에는 유의한 영향을 미치지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "30세 남성이 불임으로 내원하였다. 후각 저하가 동반되어 있고, 혈액 검사에서 LH, FSH, testosterone이 모두 낮게 측정되었다. 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "Klinefelter syndrome"}, {"letter": "B", "text": "Hyperprolactinemia"}, {"letter": "C", "text": "Kallmann syndrome"}, {"letter": "D", "text": "Varicocele"}, {"letter": "E", "text": "Vas deferens agenesis"}], "answer": "C", "explanation": "Kallmann syndrome은 hypogonadotropic hypogonadism과 후각 저하/소실을 특징으로 하는 선천성 질환으로, GnRH 분비 장애로 인해 LH, FSH, testosterone이 모두 낮다. Klinefelter syndrome은 hypergonadotropic hypogonadism으로 LH와 FSH가 높다. Varicocele은 주로 신체 검진으로 진단하며, Hyperprolactinemia는 prolactin 상승이 동반된다. Vas deferens agenesis는 정관 폐쇄를 유발하나 호르몬 수치는 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "28세 남성이 3년간 보디빌딩 목적으로 anabolic steroid를 주사해 왔고, 정액 검사에서 심한 oligospermia를 보인다. 혈액 검사에서 낮은 LH, FSH, testosterone이 확인되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경과 관찰만 시행한다."}, {"letter": "B", "text": "Steroid를 점차 감량하며 중단한다."}, {"letter": "C", "text": "Steroid를 즉시 중단하고 clomiphene을 투여한다."}, {"letter": "D", "text": "GnRH agonist를 투여한다."}, {"letter": "E", "text": "고환 정자 채취술(TESE)을 즉시 시행한다."}], "answer": "C", "explanation": "외인성 anabolic steroid에 의해 HPG axis가 억제된 경우, 우선 steroid를 즉시 중단해야 한다. 이후 clomiphene과 같은 선택적 에스트로겐 수용체 조절제(SERM)로 축을 자극하여 내인성 testosterone 생산과 정자 형성 회복을 유도한다. 점진적 감량은 불필요하며, TESE는 약물 치료 실패 후 고려한다. GnRH agonist는 축을 더욱 억제하므로 사용하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "35세 남성이 불임을 주소로 내원하였다. 신체 검진에서 양측 고환이 작고 단단하게 만져진다. 염색체 핵형 검사에서 47,XXY (클라인펠터 증후군)로 확인되었고, 정액 검사에서 무정자증이 확인되었다. 환자가 생물학적 자녀를 갖기를 원할 때, 가장 적절한 접근법은?", "options": [{"letter": "A", "text": "테스토스테론 대체 요법"}, {"letter": "B", "text": "고환 조직 내 정자 추출술 (TESE) 후 ICSI"}, {"letter": "C", "text": "공여 정자를 이용한 인공 수정"}, {"letter": "D", "text": "정관 정관 문합술"}, {"letter": "E", "text": "입양"}], "answer": "B", "explanation": "클라인펠터 증후군 환자는 대개 비폐쇄성 무정자증을 보이지만, 고환 내에 드물게 남아 있는 정자 생성 부위에서 미세 절제 정자 추출술(micro-TESE)로 정자를 회수할 수 있다. 회수된 정자는 ICSI를 통해 생물학적 자녀를 가질 가능성을 제공한다. 테스토스테론 대체 요법은 생식능력 유지를 원할 때 금기이며, 정관 문합술은 폐쇄성 무정자증에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 106}, {"question": "57세 남성이 성욕 저하, 피로감, 근력 감소로 남성 호르몬 보충 요법을 시작하려고 한다. 금기증이 없음을 확인한 후 치료를 시작할 때, 부작용 예방을 위해 정기적으로 추적 관찰해야 하는 검사 항목은?", "options": [{"letter": "A", "text": "공복 혈당과 HbA1c"}, {"letter": "B", "text": "간기능 검사와 지질 프로필"}, {"letter": "C", "text": "혈청 creatinine과 electrolytes"}, {"letter": "D", "text": "갑상선 기능 검사"}, {"letter": "E", "text": "Hematocrit(Hct)와 PSA"}], "answer": "E", "explanation": "테스토스테론 보충 요법은 적혈구 증가증(hematocrit 상승)을 유발하여 혈전 위험을 높일 수 있고, 잠복된 전립선암을 활성화시킬 가능성이 있어 PSA 상승 여부를 감시해야 한다. 따라서 치료 중 Hct와 PSA를 정기적으로 측정하는 것이 권고된다. 신장 기능, 갑상선, 당 대사, 간 기능 검사 등은 일반적으로 요구되는 추적 지표는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 107}, {"question": "Testosterone replacement therapy(TRT)를 시작하기 전에 확인해야 할 절대적 금기 사항으로 옳은 것은?", "options": [{"letter": "A", "text": "Mild sleep apnea"}, {"letter": "B", "text": "Untreated prostate cancer"}, {"letter": "C", "text": "Uncontrolled hypertension"}, {"letter": "D", "text": "History of osteoporosis"}, {"letter": "E", "text": "Age under 50 years"}], "answer": "B", "explanation": "TRT의 절대적 금기에는 활동성 또는 untreated prostate cancer와 severe obstructive sleep apnea가 포함된다. Testosterone은 잠복된 prostate cancer를 진행시킬 수 있으므로 PSA 및 DRE로 선별 후 시행해야 한다. Uncontrolled hypertension이나 age under 50은 금기가 아니며, osteoporosis는 오히려 TRT의 적응증이 될 수 있다. Mild sleep apnea는 중증이 아니면 금기에 해당하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 107}, {"question": "62세 남성이 소변 줄기가 가늘고, 잔뇨감, 야간뇨를 호소하며, 최근 발기부전이 동반되었다. 전립선비대증(BPH)과 발기부전(ED)을 동시에 치료할 수 있는 약물로 적절한 것은?", "options": [{"letter": "A", "text": "Mirabegron"}, {"letter": "B", "text": "Tamsulosin"}, {"letter": "C", "text": "Solifenacin"}, {"letter": "D", "text": "Tadalafil"}, {"letter": "E", "text": "Finasteride"}], "answer": "D", "explanation": "Tadalafil은 PDE5 억제제로 발기부전 치료에 사용되며, 동시에 BPH 증상 개선에도 FDA 승인을 받은 약제이다. Tamsulosin은 알파 차단제로 BPH에 사용되나 발기부전에는 효과가 없고, Finasteride는 5-알파 환원효소 억제제로 전립선 크기를 줄이나 오히려 발기부전을 유발할 수 있다. Solifenacin은 과민성 방광에, Mirabegron은 베타3 작용제로 과민성 방광에 사용된다. 따라서 Tadalafil이 유일하게 두 질환에 모두 효과적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "68세 남성이 주간 빈뇨, 야간뇨, 약뇨 및 배뇨 지연을 호소한다. 전립선 비대증이 의심될 때, 증상의 중증도를 객관적으로 평가하기 위해 가장 우선적으로 시행해야 하는 것은?", "options": [{"letter": "A", "text": "배뇨 후 잔뇨량 측정"}, {"letter": "B", "text": "국제 전립선 증상 점수(IPSS) 설문지"}, {"letter": "C", "text": "경직장 전립선 초음파(TRUS)"}, {"letter": "D", "text": "요속 검사(uroflowmetry)"}, {"letter": "E", "text": "혈청 PSA 측정"}], "answer": "B", "explanation": "IPSS는 전립선 비대증 환자의 증상 정도를 점수화하여 경증, 중등도, 중증으로 분류하는 표준화된 설문 도구이다. 환자의 주 호소가 배뇨 증상인 경우, 치료 여부를 결정하기 위해 IPSS 점수를 우선 확인하는 것이 권장된다. TRUS, 요속 검사, PSA, 잔뇨량 측정 등은 부가적인 검사로 증상의 중증도 평가보다는 합병증 감별에 유용하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "다음 중 야간뇨(nocturia)의 정의로 가장 올바른 것은?", "options": [{"letter": "A", "text": "야간에 소변 생성이 과다하여 깨는 것"}, {"letter": "B", "text": "수면 중 불수의적으로 소변이 유출되는 것"}, {"letter": "C", "text": "야간에 소변을 보기 위해 깨고 나서 다시 잠들기 어려운 상태"}, {"letter": "D", "text": "주간에 소변을 8회 이상 보는 것"}, {"letter": "E", "text": "야간에 소변을 보기 위해 깨었지만 바로 다시 잠드는 상태"}], "answer": "E", "explanation": "야간뇨는 밤에 소변이 마려워 잠에서 깨어 배뇨한 직후 바로 다시 잠드는 것을 말한다. 만약 깬 후 잠들기 어려우면 이는 불면증의 영역이다. '야간에 소변을 보기 위해 깨고 나서 다시 잠들기 어려운 상태'는 불면증에 가깝고, '주간에 소변을 8회 이상 보는 것'은 빈뇨의 정의이며, '수면 중 불수의적으로 소변이 유출되는 것'은 야뇨증(enuresis), '야간에 소변 생성이 과다하여 깨는 것'은 야간다뇨(nocturnal polyuria)로 야간뇨의 한 원인이지만 정의는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "전립선특이항원(PSA)의 정상 생리적 기능으로 가장 옳은 것은?", "options": [{"letter": "A", "text": "정자 영양 공급"}, {"letter": "B", "text": "정자 운동성 증가"}, {"letter": "C", "text": "정액 응고"}, {"letter": "D", "text": "정액 액화"}, {"letter": "E", "text": "세균 사멸 작용"}], "answer": "D", "explanation": "PSA는 정액이 사정 후 응고되었다가 다시 액화되는 과정에 필수적인 효소로, 정액 액화를 통해 정자의 운동성을 확보한다. PSA는 전립선암의 혈청 표지자로 잘 알려져 있지만, 생리적으로는 정액 응고 인자를 분해하는 역할을 한다. '정액 응고'는 정낭에서 분비되는 응고 효소에 의해 일어나며, PSA는 이를 액화하는 방향으로 작용한다. '세균 사멸 작용'이나 '영양 공급'은 PSA의 주된 기능이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "70세 남성이 빈뇨, 야간뇨, 배뇨곤란으로 내원하였다. 혈액검사에서 전립선특이항원(PSA)이 355ng/mL로 상승되어 있고, 직장수지검사에서 전립선이 딱딱하게 만져졌다. 경직장초음파 유도 생검 결과 Gleason score 8(4+4)의 전립선암으로 확인되었다. 뼈스캔에서 다발성 골전이가 관찰되었다. 이 환자에게 가장 적절한 일차 치료는?", "options": [{"letter": "A", "text": "남성호르몬 차단 요법 (androgen deprivation therapy)"}, {"letter": "B", "text": "추적 관찰 (active surveillance)"}, {"letter": "C", "text": "외부 방사선 치료 (external beam radiation therapy)"}, {"letter": "D", "text": "시스플라틴 기반 항암화학요법"}, {"letter": "E", "text": "근치적 전립선절제술 (radical prostatectomy)"}], "answer": "A", "explanation": "남성호르몬 차단 요법은 전이성 전립선암의 표준 일차 치료로서, 안드로겐 의존성 종양 성장을 억제한다. 근치적 전립선절제술과 방사선 치료는 국소 치료로 전신 질환에는 부적절하다. 추적 관찰은 저위험 국소 전립선암에, 항암화학요법은 거세저항성 질환에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "65세 남성이 3개월 전부터 빈뇨, 야간뇨, 약뇨를 호소하며 내원하였다. 국제전립선증상점수(IPSS)는 15점, 최대 요속(Qmax)은 10mL/s, 혈액 검사에서 전립선특이항원(PSA)은 0.7ng/mL이다. 직장수지검사에서 전립선은 매끈하고 탄력적이며, 크기는 약 25g으로 추정된다. 이 환자에게 일차 약물 치료로 가장 적절한 것은?", "options": [{"letter": "A", "text": "5-알파 환원효소 억제제 (5α-reductase inhibitor)"}, {"letter": "B", "text": "PDE5 억제제"}, {"letter": "C", "text": "항콜린제 (anticholinergic)"}, {"letter": "D", "text": "알파 차단제 (alpha-blocker)"}, {"letter": "E", "text": "베타-3 작용제 (beta-3 agonist)"}], "answer": "D", "explanation": "중등도 하부요로증상(IPSS 15)과 요속 저하가 있지만 전립선 크기가 작고(25g) PSA 수치가 낮은 경우, 알파 차단제가 일차 약제로 권장된다. 5-알파 환원효소 억제제는 전립선 비대(>40g)가 동반된 경우에 효과적이며, 항콜린제와 베타-3 작용제는 주로 저장 증상에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "Two-cell, two-gonadotropin 이론에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Theca cell은 LH의 자극을 받아 androgen을 합성한다."}, {"letter": "B", "text": "Granulosa cell은 FSH의 자극을 받아 progesterone을 합성한다."}, {"letter": "C", "text": "Theca cell은 FSH와 LH 모두에 반응하지 않는다."}, {"letter": "D", "text": "Granulosa cell은 LH의 자극을 받아 estrogen을 합성한다."}, {"letter": "E", "text": "Theca cell은 FSH의 자극을 받아 androgen을 합성한다."}], "answer": "A", "explanation": "Two-cell, two-gonadotropin model에 따르면, LH는 theca cell을 자극하여 cholesterol로부터 androgen을 생성하며, 이 androgen은 과립막세포로 이동하여 FSH에 의해 aromatase가 활성화되면서 estrogen으로 전환된다. 따라서 'theca cell은 LH의 자극을 받아 androgen을 합성한다'가 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "난포 내 에스트라디올 합성에 관한 two-cell two-gonadotropin 이론에서, 다음 중 옳은 설명은?", "options": [{"letter": "A", "text": "FSH는 협막세포(theca cell)에서 안드로스테네디온을 에스트라디올로 전환한다."}, {"letter": "B", "text": "LH는 협막세포에서 안드로스테네디온 생성을 촉진하고, FSH는 과립막세포에서 아로마타제를 활성화한다."}, {"letter": "C", "text": "LH는 과립막세포(granulosa cell)의 콜레스테롤을 안드로스테네디온으로 전환한다."}, {"letter": "D", "text": "FSH는 콜레스테롤을 안드로스테네디온으로 전환하는 데 직접 작용한다."}, {"letter": "E", "text": "안드로스테네디온은 협막세포에서 직접 에스트라디올로 전환된다."}], "answer": "B", "explanation": "정답은 'LH는 협막세포에서 안드로스테네디온 생성을 촉진하고, FSH는 과립막세포에서 아로마타제를 활성화한다'이다. Two-cell two-gonadotropin theory에 따르면, LH는 협막세포(theca cell)의 수용체에 결합하여 콜레스테롤을 안드로스테네디온으로 전환시키고, 이렇게 생성된 안드로스테네디온은 확산을 통해 과립막세포(granulosa cell)로 이동한다. FSH는 과립막세포에서 아로마타제(aromatase) 효소를 활성화하여 안드로스테네디온을 에스트라디올로 전환한다. 다른 선택지는 모두 세포 종류나 호르몬 작용을 잘못 연결한 것이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "여성에서 안드로겐 생성에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "안드로겐의 대부분은 난소에서 생성된다."}, {"letter": "B", "text": "난소와 부신이 각각 약 50%씩 생성한다."}, {"letter": "C", "text": "안드로겐의 대부분은 부신에서 생성된다."}, {"letter": "D", "text": "안드로겐은 오직 난소에서만 생성된다."}, {"letter": "E", "text": "안드로겐은 주로 지방 조직에서 생성된다."}], "answer": "B", "explanation": "여성의 주요 안드로겐(안드로스테네디온, 테스토스테론 등)은 난소와 부신에서 각각 약 50%씩 분비된다. 남성의 경우 고환에서 대량 분비되므로 부신의 기여도가 상대적으로 낮지만, 여성에서는 두 기관이 균등하게 기여하므로 고안드로겐증 평가 시 양쪽 모두를 고려해야 한다. 지방 조직은 말초에서 안드로겐에서 에스트로겐으로의 전환에 관여하지만 주 생성 장소는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "심한 남성형 다모증과 혈중 총 테스토스테론이 200 ng/dL 이상인 24세 여성에서 가장 의심해야 할 원인은?", "options": [{"letter": "A", "text": "안드로겐 분비 종양"}, {"letter": "B", "text": "쿠싱 증후군 (Cushing syndrome)"}, {"letter": "C", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "D", "text": "특발성 다모증"}, {"letter": "E", "text": "선천 부신 과형성 (CAH)"}], "answer": "A", "explanation": "심한 남성형 다모증(빠르게 진행하거나 남성형 탈모, 음성 저하 등)과 혈중 테스토스테론이 200 ng/dL 이상으로 크게 상승한 경우, 난소 또는 부신의 안드로겐 분비 종양을 강력히 의심해야 한다. PCOS에서도 경도~중등도의 테스토스테론 상승이 있을 수 있으나 이 정도로 심하지는 않다. 선천 부신 과형성(CAH)은 17-OHP 상승 등이 특징이며, 쿠싱 증후군은 다른 임상 양상을 동반한다. 특발성 다모증은 안드로겐 수치가 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 경구 피임약이 고안드로겐증을 개선하는 기전으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "간에서 SHBG 합성 증가"}, {"letter": "B", "text": "LH 분비 억제"}, {"letter": "C", "text": "5-alpha reductase 활성 직접 억제"}, {"letter": "D", "text": "난소 안드로겐 합성 감소"}, {"letter": "E", "text": "부신 안드로겐 분비 감소"}], "answer": "C", "explanation": "경구 피임약(OCP)은 에스트로겐과 프로게스테론 성분으로 시상하부-뇌하수체 축에 음성 되먹임을 가하여 LH 분비를 억제하고, 결과적으로 난소의 안드로겐(안드로스테네디온) 합성을 감소시킨다. 또한 간에서 SHBG(성호르몬 결합 글로불린) 합성을 증가시켜 유리 테스토스테론을 낮추며, 부신 안드로겐 분비도 일부 억제한다. 그러나 5-alpha reductase를 직접 억제하지는 않는데, 이는 스피로놀락톤(spironolactone)이나 피나스테리드(finasteride) 등의 작용 기전이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "다낭성난소증후군의 검사실 소견으로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "LH/FSH 비율 증가"}, {"letter": "B", "text": "항뮐러호르몬(AMH) 증가"}, {"letter": "C", "text": "공복 인슐린 농도 증가"}, {"letter": "D", "text": "유리 테스토스테론 증가"}, {"letter": "E", "text": "성호르몬결합글로불린(SHBG) 증가"}], "answer": "E", "explanation": "다낭성난소증후군에서는 인슐린 저항성으로 인해 간에서의 SHBG 생성이 감소하므로 SHBG는 증가하지 않고 오히려 감소한다. LH/FSH 비율 증가, 유리 테스토스테론 증가, 공복 인슐린 증가, AMH 증가는 모두 흔히 관찰되는 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "25세 여성이 불규칙한 생리와 다모증을 주소로 내원하였다. 신체검진상 비만(BMI 28 kg/m²)이며, 초음파에서 양측 난소에 다수의 소낭포(PCOS 형태)가 관찰된다. 혈중 호르몬 검사에서 예상되는 소견은?", "options": [{"letter": "A", "text": "FSH 감소, LH 감소"}, {"letter": "B", "text": "FSH 증가, LH 증가"}, {"letter": "C", "text": "FSH 감소, LH 증가"}, {"letter": "D", "text": "FSH 정상, LH 정상"}, {"letter": "E", "text": "FSH 증가, LH 감소"}], "answer": "C", "explanation": "PCOS에서는 GnRH 박동성 분비 이상으로 LH 분비가 증가되고 FSH는 상대적으로 감소되어 LH/FSH 비율이 2~3 이상 역전되는 전형적인 호르몬 변화를 보인다. 이로 인해 난포 성숙이 억제되어 무배란이 지속된다. FSH 증가는 난소 부전에서 관찰되며, FSH와 LH 모두 감소된 경우는 hypogonadotropic hypogonadism을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성난소증후군(PCOS) 환자에서 장기적으로 발생할 위험이 증가하지 않는 것은?", "options": [{"letter": "A", "text": "골다공증"}, {"letter": "B", "text": "대사증후군"}, {"letter": "C", "text": "자궁내막암"}, {"letter": "D", "text": "고혈압"}, {"letter": "E", "text": "제2형 당뇨병"}], " tional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소증후군(PCOS)의 초음파 소견으로 가장 특징적인 것은?", "options": [{"letter": "A", "text": "나팔관 팽대"}, {"letter": "B", "text": "복수 저류"}, {"letter": "C", "text": "진주 목걸이(necklace) 모양의 난포 배열"}, {"letter": "D", "text": "자궁내막 두께 감소"}, {"letter": "E", "text": "난소 부피 감소"}], "answer": "C", "explanation": "PCOS의 초음파 소견은 다수의 작은 난포(2-8mm)가 난소 가장자리에 배열되어 진주 목걸이(necklace pattern)를 형성하는 것이 특징적이다. 난소 부피는 증가할 수 있으며, 자궁내막은 무배란으로 인해 두꺼워질 수 있다. 나팔관 팽대나 복수는 PCOS의 특징이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소증후군(PCOS) 환자에서 생리가 규칙적이더라도 주기적인 자궁내막 검사가 필요한 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "무배란성 출혈로 인한 자궁내막 증식증 및 암 위험이 지속될 수 있으므로"}, {"letter": "B", "text": "다낭성 난소증후군은 자연 완치되는 질환이므로"}, {"letter": "C", "text": "규칙적인 생리는 배란을 의미하므로 안심할 수 있다"}, {"letter": "D", "text": "자궁근종이 동반될 가능성이 높으므로"}, {"letter": "E", "text": "난소암으로 진행할 위험이 높으므로"}], "answer": "A", "explanation": "PCOS 환자에서 겉으로 보기에 생리가 규칙적이더라도 이는 무배란성 출혈일 수 있으며, 자궁내막의 일부만 불완전하게 탈락하는 경우가 있다. 에스트로겐의 지속적 자극으로 인해 나머지 자궁내막은 증식되어 자궁내막 증식증이나 자궁내막암으로 발전할 위험이 있다. 따라서 규칙적인 생리처럼 보여도 자궁내막 상태를 평가하는 검진이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성난소증후군(PCOS) 환자의 혈액검사 소견으로 옳은 것은?", "options": [{"letter": "A", "text": "혈중 테스토스테론 농도가 증가한다."}, {"letter": "B", "text": "LH/FSH 비율이 1 이하로 감소한다."}, {"letter": "C", "text": "혈중 FSH 농도가 증가한다."}, {"letter": "D", "text": "혈중 에스트라디올 농도가 감소한다."}, {"letter": "E", "text": "성호르몬 결합 글로불린(SHBG)이 증가한다."}], "answer": "A", "explanation": "PCOS에서는 난포자극호르몬(FSH)은 정상이거나 약간 낮고, 황체형성호르몬(LH)이 증가하여 LH/FSH 비율이 2 이상으로 증가합니다. 또한 고안드로겐혈증으로 인해 테스토스테론이 증가하고, 에스트라디올은 정상이거나 약간 상승할 수 있습니다. 성호르몬 결합 글로불린(SHBG)은 안드로겐 증가로 인해 감소합니다. 따라서 옳은 소견은 '혈중 테스토스테론 농도가 증가한다.' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다음 중 endometrial hyperplasia 및 endometrial cancer의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "Multiparity (다산력)"}, {"letter": "B", "text": "Tamoxifen 사용"}, {"letter": "C", "text": "Lynch syndrome"}, {"letter": "D", "text": "Obesity (BMI >30)"}, {"letter": "E", "text": "Polycystic ovary syndrome (PCOS)"}], "answer": "A", "explanation": "Multiparity(다산력)는 자궁내막 증식증과 암의 위험을 낮추는 보호 인자입니다. 반면, Obesity는 말초에서 androgen이 estrogen으로 전환되는 것을 증가시켜 위험을 높입니다. PCOS는 만성적인 무배란으로 인해 estrogen 노출이 길어지고, Tamoxifen은 자궁내막에 선택적 estrogen 수용체 조절제로 작용하여 증식을 유발할 수 있습니다. Lynch syndrome은 MMR 유전자 변이로 인해 자궁내막암, 대장암 등의 위험을 유의하게 증가시킵니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "Polycystic ovary syndrome (PCOS) 환자의 혈액검사 소견으로 가장 옳은 것은?", "options": [{"letter": "A", "text": "Sex hormone-binding globulin (SHBG) 증가"}, {"letter": "B", "text": "LH 감소"}, {"letter": "C", "text": "Prolactin 증가"}, {"letter": "D", "text": "Testosterone 증가"}, {"letter": "E", "text": "FSH 증가"}], "answer": "D", "explanation": "PCOS에서는 과안드로겐혈증으로 인해 testosterone이 증가하는 소견이 흔히 관찰된다. LH는 증가하거나 LH/FSH 비율이 증가할 수 있으며, FSH는 정상 또는 감소, SHBG는 감소, prolactin은 대개 정상이다. 따라서 'Testosterone 증가'가 가장 옳은 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군(PCOS)으로 진단받은 24세 여성이 임신을 원하지 않는다. 이 환자의 자궁내막 보호를 위해 가장 적절한 치료는?", "options": [{"letter": "A", "text": "난소 천공술(ovarian drilling)"}, {"letter": "B", "text": "주기적 프로게스테론 투여"}, {"letter": "C", "text": "메트포르민 단독 요법"}, {"letter": "D", "text": "저용량 아스피린 복용"}, {"letter": "E", "text": "클로미펜 구연산염 복용"}], "answer": "B", "explanation": "PCOS에서는 만성 무배란으로 인해 지속적인 무저항 에스트로겐(unopposed estrogen)이 자궁내막을 과증식시켜 자궁내막 증식증 및 암 위험을 높입니다. 임신을 원하지 않는 경우에는 주기적 프로게스테론이나 경구 피임약을 투여하여 인위적인 소퇴성 출혈을 유발함으로써 자궁내막을 탈락시켜 보호합니다. '주기적 프로게스테론 투여'가 정답입니다. 메트포르민은 인슐린 저항성 개선에 도움이 되지만 단독으로 내 "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "무월경과 유루증을 주소로 내원한 28세 여성에서 혈중 프로락틴이 200 ng/mL로 상승하고 뇌하수체 MRI에서 0.7 cm 크기의 미세선종이 발견되었다. 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "카베르골린(Cabergoline) 투여"}, {"letter": "B", "text": "방사선 치료"}, {"letter": "C", "text": "경구 피임약 투여"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "경접형동 수술(Transsphenoidal surgery)"}], "answer": "A", "explanation": "프로락틴 분비 미세선종(microprolactinoma)의 일차 치료는 도파민 작용제인 카베르골린(Cabergoline) 투여이다. 카베르골린은 높은 효능과 적은 부작용으로 브로모크립틴보다 선호된다. 경과 관찰은 증상이 없는 미세선종에서 고려될 수 있으나, 이 환자는 무월경과 유루증이 있으므로 치료가 필요하다. 경구 피임약은 프로락틴 수치를 낮추지 못하며, 수술은 약물 치료에 불응성인 경우에 적응된다. 방사선 치료는 드물게 사용된다. 따라서 정답은 카베르골린(Cabergoline) 투여이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "건강한 성인에서 혈중 프로락틴(prolactin) 수치가 하루 중 가장 높은 시간대는 언제인가?", "options": [{"letter": "A", "text": "밤 10시~자정"}, {"letter": "B", "text": "오전 8~10시"}, {"letter": "C", "text": "새벽 4~6시"}, {"letter": "D", "text": "오후 2~4시"}, {"letter": "E", "text": "새벽 2~4시"}], "answer": "C", "explanation": "프로락틴의 분비는 일중 변동을 보이며, 새벽 4시에서 6시 사이에 최고치(peak)에 도달한다. 이는 수면 중 분비가 증가하는 호르몬의 특성 때문이다. 따라서 고프로락틴혈증 검사 시 채혈 시간을 고려하는 것이 중요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "30세 여성과 32세 남성이 피임 없이 규칙적인 성관계를 11개월 동안 가졌으나 임신에 이르지 못했다. 불안감을 느껴 병원을 방문하였을 때, 가장 적절한 초기 관리 방침은 무엇인가?", "options": [{"letter": "A", "text": "배란 유도제를 처방하고 배란 시기를 확인하며 성관계를 권장한다."}, {"letter": "B", "text": "부부에게 1년까지 시도해 볼 것을 권유하고 경과 관찰한다."}, {"letter": "C", "text": "남성의 정계정맥류 검사를 위해 음낭 초음파를 의뢰한다."}, {"letter": "D", "text": "즉시 정액 검사와 난소 기능 검사를 포함한 불임 정밀 검사를 시작한다."}, {"letter": "E", "text": "항정자 항체 검사와 자궁난관 조영술을 시행한다."}], "answer": "B", "explanation": "불임의 정의는 피임 없이 1년간 규칙적인 성관계 후에도 임신이 되지 않는 경우이다. 따라서 11개월째인 이 부부는 아직 불임 진단 기준에 해당하지 않으므로, 추가적인 검사나 치료 없이 1년까지 기다 ter": "C", "text": "아침 기초체온 상승"}, {"letter": "D", "text": "질초음파에서 더글라스와 액체 저류"}, {"letter": "E", "text": "혈청 프로게스테론 3 ng/mL 이상"}], "answer": "E", "explanation": "혈청 프로게스테론 3 ng/mL 이상은 배란 후 황체에서 분비되는 호르몬 수치로, 중간황체기에 측정하면 배란을 객관적으로 확인할 수 있어 임상에서 널리 사용된다. '아침 기초체온 상승'은 프로게스테론의 발열 효과에 의한 간접 지표로 수면 등 다양한 요인의 영향을 받아 정확도가 낮다. '소변 LH 키트 양성'은 LH 급증을 확인하지만 모든 LH surge가 배란으로 이어지지는 않으므로 결정적 근거가 부족하다. '질초음파에서 더글라스와 액체 저류'는 배란의 간접 소견일 뿐 모든 배란에서 관찰되지 않는다. '자궁내막 조직검사에서 분비기 변화'는 배란을 확진할 수 있는 침습적 방법이나 현재는 거의 시행하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 118}, {"question": "다음 중 시험관 시술(IVF-ET)의 적응증으로 가장 적절하지 않은 것은?", "options": [{"letter": "A", "text": "중증 자궁내막증"}, {"letter": "B", "text": "남성 인자 불임 (중증 핍정자증)"}, {"letter": "C", "text": "양측 난관 폐쇄로 인한 불임"}, {"letter": "D", "text": "정상 배란 주기를 가진 원인 불명 불임"}, {"letter": "E", "text": "자궁내막 용종으로 인한 반복적 유산"}], "answer": "E", "explanation": "시험관 시술의 적응증은 난관 폐쇄, 중증 자궁내막증, 원인 불명 불임, 중증 남성 인자 등입니다. 자궁내막 용종은 수정란의 착상을 방해할 수 있으나, 일반적으로 hysteroscopic polypectomy로 제거 후 자연 임신을 시도하는 것이 우선입니다. 용종만 단독 원인인 경우 IVF가 일차 치료는 아닙니다. 따라서 '자궁내막 용종으로 인한 반복적 유산'은 가장 적절하지 않은 적응증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 118}, {"question": "55세 여성이 폐경 후 간헐적인 vaginal spotting으로 내원하였다. 초음파에서 endometrial thickness 12 mm, endometrial biopsy 결과 complex endometrial hyperplasia without atypia로 진단되었다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "GnRH agonist 투여"}, {"letter": "B", "text": "정기적인 경과 관찰"}, {"letter": "C", "text": "High-dose progestin therapy"}, {"letter": "D", "text": "Total hysterectomy"}, {"letter": "E", "text": "Aromatase inhibitor 투여"}], "answer": "C", "explanation": "Complex endometrial hyperplasia without atypia는 악성화 위험이 5% 미만으로 낮아 progestin therapy로 치료하며, 대부분의 경우 호르몬 치료에 반응하여 퇴행한다. Hysterectomy는 atypical hyperplasia나 cancer가 진단되었거나 medical therapy에 반응하지 않는 경우에 시행한다. 따라서 high-dose progestin therapy가 적절한 일차 치료이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "배란에 대한 황체형성호르몬(LH) 급증의 효과에 관한 설명 중 옳지 않은 것은?", "options": [{"letter": "A", "text": "프로게스테론 분비를 감소시킨다."}, {"letter": "B", "text": "과립막세포의 황체화를 유도한다."}, {"letter": "C", "text": "난모세포의 감수분열 재개를 유도한다."}, {"letter": "D", "text": "프로스타글란딘 합성을 촉진한다."}, {"letter": "E", "text": "난포 파열을 통한 배란을 유발한다."}], "answer": "A", "explanation": "LH 급증은 프로게스테론 분비를 증가시키며, 이는 황체화의 일환으로 에스트로겐 우위에서 프로게스테론 우위로 전환되는 과정이다. 따라서 프로게스테론 분비 감소는 LH 급증의 효과가 아니다. 나머지 보기는 모두 LH 급증의 직접 또는 간접 효과이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "32세 여성이 10주 이내의 임신 초기 유산을 3회 경험하였다. 평소 건강하며 월경은 규칙적이고, 남편 정액 검사 및 자궁초음파, 자궁난관조영술 모두 정상이다. 혈액검사에서 루푸스항응고인자(lupus anticoagulant)가 양성이며 12주 후 재검사에서도 양성이다. 이 환자의 유산 예방을 위한 가장 적절한 처치는?", "options": [{"letter": "A", "text": "항생제 예방 요법"}, {"letter": "B", "text": "프레드니손(prednisone) 면역억제 요법"}, {"letter": "C", "text": "저용량 아스피린과 헤파린 병합 요법"}, {"letter": "D", "text": "고용량 아스피린 단독 요법"}, {"letter": "E", "text": "프로게스테론 보충 요법"}], "answer": "C", "explanation": "항인지질증후군에 의한 반복 유산 환자에서는 저용량 아스피린과 헤파린(LMWH)의 병합 요법이 태아 손실을 유의하게 낮추는 표준 치료이다. 고용량 아스피린 단독이나 스테로이드는 권고되지 않으며, 프로게스테론 보충은 황체기 결핍 시에 적용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "LH 급증(LH surge)이 유발하는 가장 직접적인 생리적 사건은?", "options": [{"letter": "A", "text": "황체 형성"}, {"letter": "B", "text": "배란(ovulation)"}, {"letter": "C", "text": "난포의 초기 성장"}, {"letter": "D", "text": "수정란의 착상"}, {"letter": "E", "text": "자궁내막 증식"}], "answer": "B", "explanation": "The mid-cycle LH surge triggers ovulation: it causes resumption of meiosis I, rupture of the mature Graafian follicle, and release of the secondary oocyte into the peritoneal cavity, typically 34–36 hours after the surge begins. While the LH surge also initiates luteinization (formation of the corpus luteum), ovulation is the most direct and acute event. '난포의 초기 성장' is FSH-driven. '수정란의 착상' occurs days later. '자궁내막 증식' is estrogen-driven. Therefore, '배란(ovulation)' is the correct choice.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "18세 여성이 1년간 무월경과 불임을 주소로 내원하였다. 초음파에서 자궁과 난소는 정상이나 다낭성 난소 소견이 보인다. 혈중 LH 25 mIU/mL, FSH 8 mIU/mL, testosterone 80 ng/dL(정상 20-60)이다. 현재 임신을 원할 때 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경구 피임약"}, {"letter": "B", "text": "Clomiphene citrate"}, {"letter": "C", "text": "GnRH agonist"}, {"letter": "D", "text": "Estrogen therapy"}, {"letter": "E", "text": "Bromocriptine"}], "answer": "B", "explanation": "이 환자는 PCOS의 전형적 호르몬 이상(LH/FSH 비율 역전, 고안드로겐혈증)과 무배란성 무월경을 보이며, 임신을 원하므로 배란 유도가 필요하다. Clomiphene citrate는 선택적 estrogen 수용체 조절제로서 시상하부에의 negative feedback을 차단하여 GnRH 분비를 증가시켜 FSH 상승과 배란을 유도하는 1차 약제이다. GnRH agonist는 중추성 성조숙증, Estrogen은 난소 부전에 사용한다. 경구 피임약은 배란을 억제하므로 피임 목적에 적합하다. Bromocriptine은 고프로락틴혈증에 사용한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "32세 여성이 2년간 임신을 못해 내원하였다. 월경은 3-4개월 간격으로 불규칙하고, 다모증이 있다. BMI 32 kg/m², 양측 난소의 다낭성 소견이 보인다. 클로미펜(clomiphene) 6주기를 투여했으나 배란되지 않았다. 임신을 위해 다음으로 시도할 수 있는 약제는?", "options": [{"letter": "A", "text": "GnRH 작용제 장기 투여"}, {"letter": "B", "text": "에스트로겐 단독 요법"}, {"letter": "C", "text": "경구 피임제 복용"}, {"letter": "D", "text": "레트로졸(letrozole) 투여"}, {"letter": "E", "text": "프로게스테론 보충 요법"}], "answer": "D", "explanation": "클로미펜에 불응성인 PCOS 불임 환자에서 다음 단계로 레트로졸(letrozole)과 같은 아로마타제 억제제를 시도합니다. 레트로졸은 배란율과 생존분만율이 클로미펜보다 우수하며 다태임신 위험도 적습니다. 경구 피임제는 배란을 억제하므로 피임 목적에 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "28세 여성이 1년간 임신을 시도하였으나 실 text": "메트포르민"}], "answer": "B", "explanation": "최근 진료 지침에 따르면 아로마타제 억제제(예: letrozole)가 배란유도의 1차 치료제로 권고된다. 클로미펜은 전통적 1차 약제였으나 다태 임신 및 자궁내막 얇아짐 등의 단점이 있고, 아로마타제 억제제는 단일 난포 성장을 유도하여 다태임신 위험이 적고 자궁내막에 미치는 부정적 영향이 적다. 메트포르민은 PCOS에서 보조적으로, 성선자극호르몬 주사제는 2차 치료나 저성선자극호르몬성 성선저하증에 사용된다. 브로모크립틴은 고프로락틴혈증 치료에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "WHO 제1군 배란장애(저성선자극호르몬성 성선저하증) 환자에게 적절한 치료법은?", "options": [{"letter": "A", "text": "FSH/LH 주사제"}, {"letter": "B", "text": "클로미펜 시트레이트"}, {"letter": "C", "text": "메트포르민"}, {"letter": "D", "text": "난소 천공술"}, {"letter": "E", "text": "아로마타제 억제제"}], "answer": "A", "explanation": "WHO 제1군은 시상하부 또는 뇌하수체 기능 저하로 FSH, LH, 에스트로겐이 모두 낮은 저성선자극호르몬성 성선저하증이다. 난소 자체는 정상이므로 생식샘자극호르몬(FSH/LH)을 외부에서 투여하여 난포 성장과 배란을 유도해야 한다. 클로미펜이나 아로마타제 억제제는 시상하부-뇌하수체 축이 정상적으로 기능해야 효과가 있으므로 이 경우 적절하지 않다. 메트포르민은 PCOS에, 난소 천공술은 주로 클로미펜 저항성 PCOS에서 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "산과력 0-0-3-0인 31세 여성이 임신을 원해서 내원하였다. 8개월 전 계류유산으로 자궁긁어냄술을 받은 후 월경량이 현저히 감소하였다. 골반 진찰은 정상이다. 진단을 위해 우선 시행할 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검"}, {"letter": "B", "text": "자궁난관조영술(HSG)"}, {"letter": "C", "text": "복강경 검사"}, {"letter": "D", "text": "혈중 난포자극호르몬(FSH) 측정"}, {"letter": "E", "text": "자궁경관 점액 검사"}], "answer": "B", "explanation": "아셔만 증후군(Asherman's syndrome)은 자궁 소파술 후 자궁내막 유착으로 발생하며, 월경량 감소가 특징적입니다. 진단을 위한 일차 검사로 자궁난관조영술(HSG)을 시행하여 자궁강 충만 결손을 확인합니다. 자궁경관 점액 검사는 배란 확인, 복강경 검사는 난관/복막 요인 평가, 자궁내막 생검은 황체기 결함이나 감염 진단, 혈중 FSH 측정은 난소 예비능 평가에 사용됩니다. 따라서 가장 적절한 검사는 자궁난관조영술(HSG)입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "배란장애 치료에서 clomiphene citrate 대신 aromatase inhibitor를 1차 치료제로 선택하는 주된 이유는?", "options": [{"letter": "A", "text": "다태 임신 발생이 적고 자궁내막에 미치는 악영향이 적다."}, {"letter": "B", "text": "인슐린 저항성을 개선한다."}, {"letter": "C", "text": "clomiphene citrate보다 배란율이 높다."}, {"letter": "D", "text": "주사제로 투여하여 효과가 빠르다."}, {"letter": "E", "text": "가격이 저렴하다."}], "answer": "A", "explanation": "Clomiphene citrate는 hypothalamic estrogen receptor 길항제로 작용하여 FSH 분비를 촉진하므로 여러 개의 난포가 동시에 성숙하여 다태 임신의 위험이 있고, 자궁내막을 얇게 하는 단점이 있습니다. 반면 aromatase inhibitor는 말초에서 에스트로겐 생성을 감소시켜 FSH 분비를 적절히 증가시키므로 단일 또는 소수 난포 성숙을 유도하여 다태 임신 발생이 적고 자궁내막에 대한 부정적 영향이 거의 없어 1차 치료제로 선호됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "WHO 제3군 배란장애(조기 난소 부전) 환자에서 임신을 위한 가장 효과적인 치료법은?", "options": [{"letter": "A", "text": "프로게스테론 보충 요법"}, {"letter": "B", "text": "난자 공여를 통한 시험관 아기 시술"}, {"letter": "C", "text": "아로마타제 억제제 장기 투여"}, {"letter": "D", "text": "고용량 클로미펜 시트레이트 투여"}, {"letter": "E", "text": "성선자극호르몬 저용량 요법"}], "answer": "B", "explanation": "조기 난소 부전에서는 난소에 남아 있는 난포가 거의 없어 배란 유도제에 반응하지 않습니다. 고용량 성선자극호르몬을 시도하기도 하나 성공률이 매우 낮아, 현재로서는 타인 난자 공여를 통한 시험관 아기 시술이 가장 확실하고 효과적인 치료법입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "원인 불명 불임에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "전체 불임의 약 50%를 차지한다."}, {"letter": "B", "text": "특별한 치료 없이 5년 내 80%가 자연 임신된다."}, {"letter": "C", "text": "클로미펜 단독 요법이 가장 효과적이다."}, {"letter": "D", "text": "배란 유도와 자궁강내 정자 주입술(IUI) 또는 보조생식술(ART)을 시행한다."}, {"letter": "E", "text": "모든 검사가 정상이면 임신이 불가능하다."}], "answer": "D", "explanation": "원인 불명 불임은 전체 불임의 10~30%를 차지하며, 기본적인 불임 검사에서 이상 소견이 발견되지 않습니다. 자연 임신 가능성이 낮기 때문에 배란 유도와 함께 IUI를 시도하거나, 실패 시 ART로 진행하는 것이 표준 치료입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "산과력 0-0-0-0인 36세 여성이 3년간 불임으로 내원하였다. 초음파에서 왼쪽 난소에 10cm의 낭종이 발견되었고, 수술 소견에서 양측 자궁부속기와 자궁, 직장이 심하게 유착되어 있고 오른쪽 난관은 완전 폐쇄되어 있었다. 병리검사에서 자궁내막증으로 확인되었다. 이 환자에서 임신을 위한 가장 적절한 치료는?", "options": [{"letter": "A", "text": "과배란 유도"}, {"letter": "B", "text": "체외수정 및 배아이식(IVF-ET)"}, {"letter": "C", "text": "GnRH agonist 투여"}, {"letter": "D", "text": "자궁강 내 인공수정(IUI)"}, {"letter": "E", "text": "난관 개구술"}], "answer": "B", "explanation": "심한 자궁내막증으로 인해 광범위한 골반 유착과 난관 폐쇄가 동반된 경우, 자연 임신이나 자궁강 내 인공수정(IUI)은 성공률이 매우 낮습니다. 난관 개구술은 난관 말단 폐쇄에는 시도할 수 있으나, 이 경우 이미 심한 유착과 난관 손상이 동반되어 효과를 기대하기 어렵습니다. GnRH agonist는 통증 완화에 사용될 수 있으나 임신을 촉진하지는 않습니다. 따라서 가장 적절한 치료는 '체외수정 및 배아이식(IVF-ET)' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "불임 여성에서 자궁내막증(endometriosis)이 동반될 확률은 어느 정도인가?", "options": [{"letter": "A", "text": "약 70%"}, {"letter": "B", "text": "약 90%"}, {"letter": "C", "text": "약 30%"}, {"letter": "D", "text": "약 10%"}, {"letter": "E", "text": "약 50%"}], "answer": "A", "explanation": "불임을 주소로 내원한 여성에서 자궁내막증이 발견될 확률은 약 70%에 달할 정도로 높다. 자궁내막증은 골반 유착, 염증 환경 등을 통해 난관 기능 및 난자 질에 영향을 미쳐 불임의 주요 원인이 된다. 따라서 불임 환자 평가 시 자궁내막증에 대한 확인이 필수적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 123}, {"question": "난관 요인 불임의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "선천성 난관 기형"}, {"letter": "B", "text": "자궁내막증"}, {"letter": "C", "text": "이전 난관 수술"}, {"letter": "D", "text": "자궁근종"}, {"letter": "E", "text": "클라미디아 골반염증질환"}], "answer": "E", "explanation": "골반염증질환(PID), 특히 Chlamydia trachomatis 감염이 난관 손상의 가장 흔한 원인이다. 클라미디아는 난관 점막의 섬모를 파괴하고 유착을 유발하여 난관 폐쇄 및 불임을 초래하며, 무증상 감염도 약 20% 존재한다. 자궁내막증은 복막 요인의 주된 원인이지만 난관 자체의 폐쇄를 일으키는 가장 흔한 원인은 아니다. 자궁근종은 자궁 요인, 선천적 기형과 이전 수술은 빈도가 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 123}, {"question": "자궁난관조영술(hysterosalpingography, HSG)을 시행하기에 가장 적절한 시기는?", "options": [{"letter": "A", "text": "황체기 중간"}, {"letter": "B", "text": "배란 직전"}, {"letter": "C", "text": "월경 주기 6~10일"}, {"letter": "D", "text": "임신 확인 후"}, {"letter": "E", "text": "월경 중"}], "answer": "C", "explanation": "HSG는 월경이 종료된 후, 배란이 일어나기 전에 시행하여 잠재적 임신에 대한 방사선 노출을 피하고 월경혈이 검사 결과에 영향을 주지 않도록 해야 한다. 따라서 일반적으로 월경 주기 6~10일이 가장 적절하다. '월경 중'은 출혈로 인해 부정확할 수 있고, '배란 직전'은 임신 초기 가능성을 완전히 배제할 수 없어 위험하다. '황체기 중간'은 자궁내막이 두꺼워져 난관 개통성 평가가 어렵다. '임신 확인 후'는 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "불임 검사에서 hysterosalpingography(HSG)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "hydrosalpinx가 있을 때는 나비모양으로 조영제가 퍼진다."}, {"letter": "B", "text": "정상 난관은 조영제가 골반강으로 퍼지는 것이 보이지 않는다."}, {"letter": "C", "text": "자궁내 유착이 있으면 조영제가 난관을 통해 골반강으로 쉽게 빠져나간다."}, {"letter": "D", "text": "생리 중에 시행해야 자궁내막의 병변을 정확히 평가할 수 있다."}, {"letter": "E", "text": "자궁내강과 난관의 개방성 평가에 유용하며, 생리 종료 직후 시행이 권장된다."}], "answer": "E", "explanation": "HSG는 생리 종료 직후(난포기 초기)에 시행하여 자궁내강과 난관의 개방성을 평가하는 검사입니다. 생리 직후이므로 자궁내막이 얇아 자궁강내 병변도 관찰할 수 있고, 임신 초기일 가능성을 배제한 상태에서 안전하게 시행할 수 있습니다. 정상 난관은 조영제가 골반강으로 퍼지는 spillage를 보이며, hydrosalpinx는 막힌 나팔관 끝에 조영제가 고여 둥근 주머니 모양으로 관찰됩니다. 자궁내 유착이 있으면 조영제가 채워지지 않는 결손 부위가 나타납니다. 따라서 '자궁내강과 난관의 개방성 평가에 유용하며, 생리 종료 직후 시행이 권장된다'가 옳은 설명입니다. 나머지 보기들은 시행 시기, 정상 및 이상 소견에 대한 설명이 부정확합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "불임 환자의 자궁내강 평가에서 submucosal myoma에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Submucosal myoma는 대부분 무증상이며 불임과 관련이 없다."}, {"letter": "B", "text": "Submucosal myoma 제거술은 임신율을 약 50% 증가시킬 수 있다."}, {"letter": "C", "text": "Submucosal myoma는 자궁내막의 착상에 영향을 미치지 않는다."}, {"letter": "D", "text": "Submucosal myoma는 hysteroscopy보다 HSG로 더 정확히 진단된다."}, {"letter": "E", "text": "Submucosal myoma 제거는 resectoscope보다 약물 치료가 우선이다."}], "answer": "B", "explanation": "점막하 근종(submucosal myoma)은 자궁내강을 변형시키고 착상 부위인 자궁내막에 영향을 주어 불임 및 유산의 원인이 됩니다. 제거술(대개 hysteroscopic resectoscope)을 시행하면 임신율을 약 50%까지 향상시킬 수 있습니다. 진단은 HSG보다 hysteroscopy나 식염수 주입 초음파가 더 정확하며, 약물 치료는 근종 크기를 줄일 수 있으나 근본적 제거가 우선됩니다. 따라서 'Submucosal myoma 제거술은 임신율을 약 50% 증가시킬 수 있다'가 옳고, 나머지는 임상적 영향과 치료 방침을 잘못 기술했습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "불임 환자에서 자궁내강의 용종이나 점막하 근종을 가장 잘 평가할 수 있는 초음파 검사 시기는?", "options": [{"letter": "A", "text": "인위적으로 에스트로겐을 투여한 후 자궁내막이 증식된 시기"}, {"letter": "B", "text": "황체기 중반 프로게스테론이 최고인 시기"}, {"letter": "C", "text": "임신 초기 융모막이 형성되는 시기"}, {"letter": "D", "text": "배란 직전 난포가 최대로 성장한 시기"}, {"letter": "E", "text": "생리 중 또는 생리 직후 자궁내막이 얇은 시기"}], "answer": "E", "explanation": "생리 중 또는 직후에는 자궁내막이 가장 얇아져 용종이나 점막하 근종 등 자궁내강 병변을 명확하게 관찰할 수 있다. 반면, 배란기나 황체기에는 자궁내막이 두꺼워져 작은 병변이 가려질 수 있다. 따라서 생리 중 또는 생리 직후 자궁내막이 얇은 시기가 가장 적합하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "임신 초기 태반에서 분비되는 human chorionic gonadotropin (hCG)의 주된 역할은?", "options": [{"letter": "A", "text": "태아의 기관 형성 촉진"}, {"letter": "B", "text": "난소에서 새로운 난포 성장을 자극함"}, {"letter": "C", "text": "자궁 평활근 수축 촉진"}, {"letter": "D", "text": "황체를 유지하여 프로게스테론 분비를 지속시킴"}, {"letter": "E", "text": "난자의 감수분열 재개를 유도함"}], "answer": "D", "explanation": "hCG, produced by the syncytiotrophoblast, is structurally similar to LH and binds to LH receptors on the corpus luteum. This rescues the corpus luteum from regression and maintains progesterone secretion, which is essential for sustaining the endometrium and early pregnancy until the placental shift. '태아의 기관 형성 촉진' is not a direct role. '자궁 평활근 수축 촉진' would threaten pregnancy. '난소에서 새로운 난포 성장을 자극함' is incorrect as hCG does not promote new follicular growth during pregnancy. '난자의 감수분열 재개를 유도함' is the role of the LH surge, not hCG.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "난소에서 단 하나의 난포만 성숙하여 배란되는 과정을 설명하는 올바른 용어의 순서는?", "options": [{"letter": "A", "text": "동원(recruitment) → 선발(selection) → 우성화(dominance)"}, {"letter": "B", "text": "선발(selection) → 동원(recruitment) → 우성화(dominance)"}, {"letter": "C", "text": "동원(recruitment) → 우성화(dominance) → 선발(selection)"}, {"letter": "D", "text": "우성화(dominance) → 동원(recruitment) → 선발(selection)"}, {"letter": "E", "text": "무작위 선택(random selection)으로 이루어진다."}], "answer": "A", "explanation": "In each menstrual cycle, a cohort of primordial follicles is recruited to begin growing (recruitment). From this cohort, a single follicle is selected to continue development while the others undergo atresia (selection). The selected follicle then establishes dominance (dominance) and goes on to ovulate. The sequence '동원(recruitment) → 선발(selection) → 우성화(dominance)' accurately reflects this process. The other orders are incorrect; for example, '선발' cannot precede '동원', and '무작위 선택' is not the mechanism.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다음 중 난소 기능 부전을 시사하는 혈중 FSH 농도는 얼마인가?", "options": [{"letter": "A", "text": "10–15 mIU/mL"}, {"letter": "B", "text": "20–30 mIU/mL"}, {"letter": "C", "text": "5 mIU/mL 이하"}, {"letter": "D", "text": "40 mIU/mL 이상"}, {"letter": "E", "text": "30–40 mIU/mL"}], "answer": "D", "explanation": "FSH 농도가 40 mIU/mL 이상이면 폐경 수준으로, 난소 기능 부전을 강력히 시사합니다. 5 mIU/mL 이하는 저성선자극호르몬성 성선기능저하증을 의심합니다. 10-15 mIU/mL은 정상 범위이며, 20-30 mIU/mL은 폐경 전후기일 수 있으나 진단 기준은 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다낭성 난소증후군(PCOS) 환자에서 항뮐러관호르몬(AMH) 수치에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "AMH는 정상 가임기 여성보다 현저히 낮은 경향을 보인다."}, {"letter": "B", "text": "AMH 수치는 난포 수와 반비례한다."}, {"letter": "C", "text": "AMH가 높을수록 난소 예비능이 우수함을 시사한다."}, {"letter": "D", "text": "AMH는 월경 주기에 따라 4~6 ng/mL 범위로 일정하게 유지된다."}, {"letter": "E", "text": "AMH는 매우 높지만 난자 질 저하를 반영할 수 있다."}], "answer": "E", "explanation": "강의에서 PCOS 환자는 AMH가 19~20 ng/mL로 정상 20대 여성(4~6 ng/mL)보다 훨씬 높지만, 이는 작은 난포들이 많기 때문이며 안드로겐 과다 환경으로 인해 난자 질은 오히려 저하된다고 하였습니다. ‘AMH는 매우 높지만 난자 질 저하를 반영할 수 있다.’가 옳습니다. ‘AMH가 높을수록 난소 예비능이 우수함을 시사한다.’는 일반적인 해석일 수 있으나 PCOS에서는 맞지 않으며, ‘AMH는 정상 가임기 여성보다 현저히 낮은 경향을 보인다.’는 반대로 틀렸습니다. ‘AMH 수치는 난포 수와 반비례한다.’는 사실과 다르며(비례 관계), ‘AMH는 월경 주기에 따라 4~6 ng/mL 범위로 일정하게 유지된다.’는 PCOS가 아닌 정상 범위를 설명한 것입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "과배란 유도를 위한 난소 예비능 평가 시, 여성의 나이가 증가함에 따라 일반적으로 증가하는 지표는?", "options": [{"letter": "A", "text": "혈중 에스트라디올(E2)"}, {"letter": "B", "text": "동난포 수(antral follicle count)"}, {"letter": "C", "text": "기저 난포자극호르몬(basal FSH)"}, {"letter": "D", "text": "인히빈 B(Inhibin B)"}, {"letter": "E", "text": "항뮐러리안호르몬(AMH)"}], "answer": "C", "explanation": "난소 예비능이 감소함에 따라 뇌하수체에서 분비되는 FSH는 음성 되먹임 감소로 인해 증가한다. 항뮐러리안호르몬(AMH), 동난포 수, 인히빈 B는 난소 예비능이 좋을수록 높고 나이가 들수록 감소한다. 혈중 에스트라디올(E2)은 초기 난포기에는 변동이 심하지만, 일반적으로 난소 예비능 감소 시 기저 FSH가 가장 일관되게 증가한다. 따라서 나이가 증가함에 따라 증가하는 지표는 기저 난포자극호르몬(basal FSH)이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "난소과자극증후군(ovarian hyperstimulation syndrome, OHSS)의 발생 위험이 가장 높은 경우는?", "options": [{"letter": "A", "text": "원인 불명 난임에서 IUI 시행 시"}, {"letter": "B", "text": "아로마타제 억제제 사용 시"}, {"letter": "C", "text": "클로미펜 시트레이트 사용 시"}, {"letter": "D", "text": "PCOS 환자에서 FSH 주사제 사용 시"}, {"letter": "E", "text": "자궁근종 수술 후"}], "answer": "D", "explanation": "OHSS는 외인성 성선자극호르몬에 의해 다수의 난포가 과도하게 자라면서 발생하는 합병증으로, PCOS 환자는 다수의 전난포를 가지고 있어 FSH에 대한 반응이 높아 위험도가 크다. 클로미펜이나 아로마타제 억제제는 경구 배란유도제로서 OHSS 발생 위험이 극히 낮다. 원인 불명 난임에서 IUI 시행 시에도 일반적으로 저용량 생식샘자극호르몬을 사용하므로 위험이 낮다. 자궁근종 수술은 OHSS와 직접 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다음 중 난소 예비력 평가에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "혈중 AMH는 생리주기에 따라 변동이 크므로 생리 3일째에 측정해야 한다."}, {"letter": "B", "text": "생리 3일째 측정한 FSH가 20 mIU/mL 이상이면 난소 예비력이 저하되었음을 시사한다."}, {"letter": "C", "text": "난소 용적이 클수록 난소 예비력이 저하되어 있음을 의미한다."}, {"letter": "D", "text": "혈중 AMH 농도는 생리 주기 전반에 걸쳐 비교적 일정하여 난소 예비력을 평가하는 신뢰할 수 있는 지표이다."}, {"letter": "E", "text": "초음파를 이용한 antral follicle count(AFC)는 생리 주기 중 언제 시행해도 상관없다."}], "answer": "D", "explanation": "항뮬러관호르몬(AMH)은 생리주기와 무관하게 일정한 농도를 유지하므로, 난소 예비력의 신뢰성 높은 바이오마커입니다. FSH는 생리 3일째 기저치가 중요하지만, 명확한 기준치는 검사실마다 다르며 일반적으로 10~15 mIU/mL 이상을 저하로 봅니다. 20 mIU/mL은 clomiphene citrate challenge test에서 FSH 반응이 과도하게 상승한 경우로, 난소 예비력 저하를 시사하는 별도의 평가법입니다. AFC는 생리 3일째, 이른 난포기에 시행해야 정확하며, 난소 용적은 정상적인 가임기 여성에서 클수록 예비력이 좋음을 의미합니다. 따라서 '혈중 AMH 농도는 생리 주기 전반에 걸쳐 비교적 일정하여 난소 예비력을 평가하는 신뢰할 수 있는 지표이다'가 옳습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "난소 과자극 증후군(OHSS)에 대한 설명으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "심한 OHSS는 전신적인 합병증을 일으켜 생명을 위협할 수 있다."}, {"letter": "B", "text": "난소 과자극 증후군은 과배란 유도 과정에서 발생할 수 있는 중대한 합병증이다."}, {"letter": "C", "text": "과배란 유도 시 FSH 용량을 환자의 난소 예비력에 맞춰 조절하면 위험을 줄일 수 있다."}, {"letter": "D", "text": "다낭성 난소 증후군(PCOS) 환자에서 OHSS의 위험이 높다."}, {"letter": "E", "text": "OHSS가 발생한 경우 임신을 해도 증상이 악화되지 않는다."}], "answer": "E", "explanation": "OHSS는 과배란 유도 중 다수의 난포가 과도하게 발달하여 발생하는 의원성 합병증입니다. PCOS 환자는 많은 antral follicle을 가지고 있어 고위험군이며, 난소 예비력을 고려한 FSH 용량 조절로 예방할 수 있습니다. 심한 경우 혈장 삼투압 변화, 혈전증, 신부전 등으로 사망할 수 있습니다. OHSS가 발생한 상태에서 임신이 되면 태반에서 분비되는 hCG에 의해 증상이 더욱 악화되므로 'OHSS가 발생한 경우 임신을 해도 증상이 악화되지 않는다'는 옳지 않은 설명입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "체외 수정 시술에서 hCG 투여 시기와 난자 채취 시기에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "hCG를 투여한 후에는 난자를 채취하지 않고 자연 배란을 유도해야 한다."}, {"letter": "B", "text": "hCG는 LH surge와 달리 반감기가 길어 투여 후 48시간 이후에 성숙이 가장 활발하다."}, {"letter": "C", "text": "hCG 투여 후 34-36시간에 난자 채취를 시행하는 이유는 배란 전 성숙된 난자를 회수하기 위해서이다."}, {"letter": "D", "text": "hCG 투여 직후 즉시 난자를 채취해야 수정률이 가장 높다."}, {"letter": "E", "text": "hCG 없이도 우성 난포가 20mm 이상이면 자발적인 LH surge만으로 충분하므로 기다린다."}], "answer": "C", "explanation": "체외 수정 시술에서는 다수의 난포를 동시에 조절하기 위해 내인성 LH surge를 차단한 상태이므로, hCG를 외부에서 투여하여 난자의 감수분열 재개와 성숙을 유도합니다. hCG는 LH와 구조적으로 유사하나 반감기가 3~3.5일로 길어 효과적입니다. hCG 주사 후 34~36시간째에 난자가 성숙되고 배란 직전에 도달하므로 이 시기에 난자를 채취해야 성숙 난자를 얻을 수 있습니다. 즉시 채취하면 미성숙 난자일 가능성이 높고, 48시간 이후면 배란이 일어나 난자를 소실할 수 있습니다. 따라서 'hCG 투여 후 34-36시간에 난자 채취를 시행하는 이유는 배란 전 성숙된 난자를 회수하기 위해서이다'가 옳습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "Human chorionic gonadotropin (hCG)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "태반에서 생성되어 난소의 황체를 퇴화시킨다."}, {"letter": "B", "text": "LH와 생물학적 활성이 유사하며, 배란을 억제한다."}, {"letter": "C", "text": "LH 수용체에 결합하여 황체를 유지하고 프로게스테론 생성을 촉진한다."}, {"letter": "D", "text": "임신 초기 태반에서 생성되며, 혈중 농도는 임신 12주까지 지속 상승한다."}, {"letter": "E", "text": "뇌하수체에서 생성되며, 갑상선 자극 호르몬(TSH) 수용체에 결합한다."}], "answer": "C", "explanation": "hCG는 임신 초기 태반의 trophoblast에서 생성되며 LH 수용체에 결합하여 황체를 유지하고 프로게스테론 생성을 촉진합니다. 황체를 퇴화시키지 않고 오히려 유지시키며, 뇌하수체가 아닌 태반에서 생성됩니다. hCG는 배란을 억제하지 않고 LH surge와 유사하게 배란 유도에 사용됩니다. 혈중 농도는 임신 8-10주에 최고치에 도달한 후 감소하므로 12주까지 상승하지 않습니다. 따라서 옳은 설명은 'LH 수용체에 결합하여 황체를 유지하고 프로게스테론 생성을 촉진한다.' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "난소과자극증후군(OHSS)의 치료로 옳은 것은?", "options": [{"letter": "A", "text": "경미한 경우 즉시 입원하여 집중 치료를 시행한다."}, {"letter": "B", "text": "중증의 경우 수액 공급을 제한하여 복수 생성을 억제한다."}, {"letter": "C", "text": "혈전색전증 예방을 위해 항응고제를 금기한다."}, {"letter": "D", "text": "복부 초음파는 난소 손상 위험으로 금기이다."}, {"letter": "E", "text": "중증의 경우 호흡곤란 완화를 위해 복수 천자를 시행할 수 있다."}], "answer": "E", "explanation": "중증 OHSS에서 호흡곤란이나 신장 기능 저하가 동반된 경우 복수 천자를 통해 증상을 완화할 수 있습니다. 경미한 OHSS는 외래에서 보존적 치료가 가능하며, 복부 초음파는 진단 및 모니터링에 필수적입니다. 중증 OHSS에서는 혈관내 용적 감소를 교정하기 위해 충분한 수액 공급이 필요하며 수액 제한은 금기입니다. 또한 혈전색전증 위험이 높으므로 예방적 항응고제 투여가 권장됩니다. 따라서 옳은 것은 '중증의 경우 호흡곤란 완화를 위해 복수 천자를 시행할 수 있다.' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "체외수정 및 배아이식(IVF-ET) 시행 시, 황체기 보완을 위한 프로게스테론 투여의 적절한 시작 시기는?", "options": [{"letter": "A", "text": "hCG 투여 전"}, {"letter": "B", "text": "GnRH agonist 투여 직후"}, {"letter": "C", "text": "난포 성숙 유도 시작 시"}, {"letter": "D", "text": "난자 채취 후"}, {"letter": "E", "text": "배아 이식 후"}], "answer": "D", "explanation": "프로게스테론은 난자 채취 직후부터 투여하여 황체기를 보완합니다. 이는 채취로 인해 손상된 과립막 세포의 황체화를 지원하고 착상에 적합한 자궁내막을 유지하기 위함입니다. GnRH agonist 투여 시기나 난포 성숙 초기에는 필요하지 않으며, 배아 이식 후에는 이미 착상 준비가 늦을 수 있습니다. 따라서 적절한 시기는 '난자 채취 후' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "Clomiphene citrate challenge test(CCCT)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "AMH나 AFC와 달리, CCCT는 생리 주기와 무관하게 시행할 수 있다."}, {"letter": "B", "text": "생리 시작 1일째부터 clomiphene 50mg을 5일간 투여하고 생리 10일째 FSH를 측정한다."}, {"letter": "C", "text": "이 검사는 클로미펜에 대한 배란 반응을 평가하기 위한 검사이다."}, {"letter": "D", "text": "생리 3일째 FSH와 E2를 측정하고, clomiphene 투여 후 생리 10일째 FSH를 측정하여 평가한다."}, {"letter": "E", "text": "Clomiphene 투여 후 생리 10일째 FSH가 20 IU/L 이상이면 난소 예비력이 양호한 것으로 판단한다."}], "answer": "D", "explanation": "CCCT는 난소 예비력을 평가하는 검사로, 생리 3일째 기저 FSH와 E2를 측정한 후, clomiphene 100mg을 생리 5일째부터 9일째까지 투여하고 생리 10일째 FSH를 다시 측정한다. 생리 10일째 FSH가 20 IU/L 이상으로 상승하면 난소 예비력이 감소한 것으로 판단한다. 따라서 생리 3일째 FSH와 E2를 측정하고, clomiphene 투여 후 생리 10일째 FSH를 측정하여 평가한다는 설명이 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "GnRH antagonist protocol에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "이 프로토콜은 과배란 유도 후 발생하는 OHSS의 빈도를 현저히 증가시킨다."}, {"letter": "B", "text": "Agonist protocol과 비교하여 LH surge의 발생 빈도가 높아 취소율이 높다."}, {"letter": "C", "text": "생리 2-3일째부터 gonadotropin을 투여하고, 난포기 후반에 antagonist를 추가하여 endogenous LH surge를 예방한다."}, {"letter": "D", "text": "생리 시작 전부터 GnRH antagonist를 매일 투여하여 뇌하수체를 억제한다."}, {"letter": "E", "text": "GnRH antagonist는 hCG와 구조적 유사성을 이용하여 LH surge를 유도하는 데 사용된다."}], "answer": "C", "explanation": "GnRH antagonist protocol은 생리 2-3일째에 gonadotropin 투여를 시작하고, 난포기 후반(보통 9일째 또는 우성 난포가 14mm 도달 시)에 GnRH antagonist를 추가하여 조기 LH surge를 차단하는 방법이다. 이는 agonist protocol보다 짧은 기간 동안 시행되며, OHSS 위험이 상대적으로 낮다. 따라서 생리 2-3일째부터 gonadotropin을 투여하고, 난포기 후반에 antagonist를 추가하여 endogenous LH surge를 예방한다는 설명이 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "시험관 시술에서 GnRH agonist를 이용한 long protocol의 올바른 과정을 나열한 것은?", "options": [{"letter": "A", "text": "이전 생리 주기의 황체기부터 GnRH agonist 투여 → 뇌하수체 억제 확인 후 gonadotropin 투여 → hCG 투여 → 난자 채취"}, {"letter": "B", "text": "생리 1일째부터 GnRH antagonist 투여 → gonadotropin 투여 → hCG 투여 → 난자 채취"}, {"letter": "C", "text": "생리 1일째부터 GnRH agonist와 gonadotropin을 동시에 투여 → hCG 투여 → 난자 채취"}, {"letter": "D", "text": "생리 5일째부터 clomiphene citrate 투여 → gonadotropin 투여 → GnRH antagonist 투여 → hCG 투여"}, {"letter": "E", "text": "생리 3일째부터 고용량 estradiol 투여 → GnRH agonist 투여 → hCG 투여 → 난자 채취"}], "answer": "A", "explanation": "GnRH agonist long protocol은 내인성 HPO 축을 완전히 억제하여 조기 LH 급증을 막기 위해 고안되었습니다. 일반적으로 이전 주기의 황체기(생리 21일경)부터 GnRH agonist를 투여하여 뇌하수체를 탈감작시키고, 생리 시작 후 호르몬 검사(FSH, LH가 5 mIU/mL 이하)로 억제를 확인한 뒤 gonadotropin(FSH)을 투여하여 난포 발육을 시킵니다. 적절한 난포 크기에 도달하면 hCG를 주사하여 난자의 최종 성숙을 유도하고 34~36시간 후 난자를 채취합니다. 따라서 '이전 생리 주기의 황체기부터 GnRH agonist 투여 → 뇌하수체 억제 확인 후 gonadotropin 투여 → hCG 투여 → 난자 채취'가 올바른 과정입니다. 다른 보기들은 antagonist protocol, 잘못된 병용 요법 등을 기술했습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional
