 "처녀막 폐쇄증"}, {"letter": "C", "text": "자궁 무형성증"}, {"letter": "D", "text": "질 무형성증"}, {"letter": "E", "text": "횡격막 질 중격"}], "answer": "B", "explanation": "처녀막 폐쇄증은 질과 외음부 사이의 얇은 막이 뚫리지 않아 생리혈이 축적되며, Valsalva maneuver 시 팽윤되는 소견이 특징적이다. 자궁 무형성증은 자궁이 없어 생리혈이 축적되지 않고, 횡격막 질 중격은 처녀막이 정상이며 초음파에서 확인된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "원발성 무월경과 주기적 하복통을 호소하는 여성에서 외음부 검사상 처녀막은 정상이나 골반 초음파에서 질 내에 격막과 상부 혈종이 관찰될 때 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "자궁경부 협착"}, {"letter": "B", "text": "난소 기형종"}, {"letter": "C", "text": "횡격막 질 중격"}, {"letter": "D", "text": "MRKH 증후군"}, {"letter": "E", "text": "처녀막 폐쇄증"}], "answer": "C", "explanation": "횡격막 질 중격(transverse vaginal septum)은 질 내부에 수평 격막이 형성된 것으로, 처녀막 폐쇄증과 달리 외음부 검사에서 막이 보이지 않는다. 초음파에서 격막과 혈종이 확인되며, 수술적 절제가 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "25세 여성이 성관계 시 통증과 간헐적 출혈로 내원하였다. 질 검진상 세로 중격(longitudinal vaginal septum)이 관찰되고 자궁초음파는 정상이었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경과 관찰"}, {"letter": "B", "text": "에스트로겐 질정"}, {"letter": "C", "text": "자궁내막 조직검사"}, {"letter": "D", "text": "질 확장기 사용"}, {"letter": "E", "text": "중격의 수술적 제거"}], "answer": "D", "explanation": "증상을 유발하는 세로 질 중격은 수술적 절제가 필요하다. 증상이 없는 경우 경과 관찰할 수 있으나, 성교통이나 출혈이 있으면 중격 제거술을 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "완전 횡 질 중격(complete transverse vaginal septum)이 있는 청소년기 여성에서 가장 특징적인 소견은?", "options": [{"letter": "A", "text": "일차성 무월경만 있고 통증은 없음"}, {"letter": "B", "text": "정상적인 월경 주기와 간헐적 복통"}, {"letter": "C", "text": "초음파상 자궁 내막증만 발견됨"}, {"letter": "D", "text": "외음부에서 중격이 관찰됨"}, {"letter": "E", "text": "hematocolpos와 hematometra가 동시에 관찰됨"}], "answer": "E", "explanation": "정답은 'hematocolpos와 hematometra가 동시에 관찰됨'입니다. 완전 횡 질 중격은 월경혈이 외부로 배출되지 못해 질 내(hematocolpos)와 자궁 내(hematometra)로 역류하여 축적됩니다. 이로 인해 청소년기 이후 주기적인 심한 복통이 발생합니다. 외음부에서는 정상으로 보이거나 상부 질이 막혀 관찰이 어렵고, 중격 자체가 외부에서 보이지 않습니다. 통증이 없는 일차성 무월경은 MRKH나 AIS에서 나타날 수 있으며, 자궁 내막증은 만성 역류의 합병증이지 초기 결정적 소견은 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "일차성 무월경을 주소로 내원한 17세 여성에서 초음파상 자궁강 내 혈액 저류(hematometra)가 확인되고 자궁경부가 관찰되지 않을 때 가장 적절한 치료는 무엇인가?", "options": [{"letter": "A", "text": "질 성형술"}, {"letter": "B", "text": "자궁경부 재건술"}, {"letter": "C", "text": "자궁 절제술"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "호르몬 요법"}], "answer": "C", "explanation": "자궁경부 무발생(cervical agenesis)은 자궁경부 재건술의 실패율과 합병증이 높기 때문에 자궁 절제술이 권장된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "처녀막 폐쇄증(imperforate hymen)을 진단하는 데 가장 특징적인 신체 소견은?", "options": [{"letter": "A", "text": "직장-질 검사에서 자궁 경부가 정상 촉지된다"}, {"letter": "B", "text": "하복부에서 단단한 고정 종괴가 촉지된다"}, {"letter": "C", "text": "양측 서혜부에서 탈장이 촉지된다"}, {"letter": "D", "text": "질 점막 전체에 광범위한 푸른빛 변색이 있다"}, {"letter": "E", "text": "Valsalva 수기 시 질구로 푸른빛의 팽륜된 막이 관찰된다"}], "answer": "E", "explanation": "처녀막 폐쇄증은 질 하부가 막혀 생리혈이 질과 자궁 내에 저류되면서 Valsalva 수기(숨을 참고 힘을 줌) 시 질구에서 푸른빛의 팽륜된 막이 관찰되는 것이 특징적이다. 이는 저류된 혈액 때문이다. 하복부 종괴는 자궁 혈종으로 인해 발생할 수 있으나 단단하고 고정적인 것은 아니다. 질 점막 전체의 변색은 아니다. 자궁 경부는 정상이나 막혀 있어 촉지되지 않는다. 서혜부 탈장은 연관이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "Uterine artery의 가장 흔한 기원 혈관은?", "options": [{"letter": "A", "text": "common iliac artery"}, {"letter": "B", "text": "internal iliac artery의 anterior division"}, {"letter": "C", "text": "abdominal aorta"}, {"letter": "D", "text": "external iliac artery"}, {"letter": "E", "text": "inferior mesenteric artery"}], "answer": "B", "explanation": "Internal iliac artery는 anterior branch와 posterior branch로 나뉘며, anterior branch에서 uterine artery와 vaginal artery가 분지되어 자궁과 질에 혈액을 공급한다. External iliac artery는 주로 하지로, common iliac artery는 internal/external로 분지 전 혈관, abdominal aorta는 ovarian artery의 기원, inferior mesenteric artery는 대장에 분포한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "임신 중 태아의 선천성 기형 발생 위험이 가장 높은 발달 시기는?", "options": [{"letter": "A", "text": "태아기 중기 (임신 13주~20주)"}, {"letter": "B", "text": "태아기 초기 (임신 9주~12주)"}, {"letter": "C", "text": "태아기 후기 (임신 21주 이후)"}, {"letter": "D", "text": "배아기 (임신 2주~8주)"}, {"letter": "E", "text": "수정 후 1주 이내 (포배기)"}], "answer": "D", "explanation": "주요 기관 형성이 활발한 배아기(임신 2~8주)에 약물이나 환경 요인에 노출될 경우 구조적 기형 발생 위험이 가장 높다. 포배기는 세포 분열 단계로 기형 발생이 드물고, 태아기는 이미 주요 장기가 형성되어 큰 기형 위험이 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "American Fertility Society(AFS) 분류에 따르면, diethylstilbestrol(DES) 관련 자궁 기형은 어느 class에 해당하는가?", "options": [{"letter": "A", "text": "Class 3"}, {"letter": "B", "text": "Class 7"}, {"letter": "C", "text": "Class 1"}, {"letter": "D", "text": "Class 5"}, {"letter": "E", "text": "Class 6"}], "answer": "B", "explanation": "정답은 'Class 7'입니다. AFS 분류(1988)는 Class 1부터 7까지 있으며, Class 7은 DES 관련 기형으로 T자형 자궁 내강이 특징입니다. DES는 더 이상 사용되지 않아 새로운 기형은 발생하지 않습니다. Class 1은 무발생/저발생(MRKH), Class 3는 중복자궁(didelphys), Class 5는 중격자궁(septate), Class 6은 공상자궁(arcuate)입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "선천성 자궁 기형 중 가장 높은 빈도를 차지하는 것은?", "options": [{"letter": "A", "text": "쌍각자궁(bicornuate uterus)"}, {"letter": "B", "text": "중격자궁(septate uterus)"}, {"letter": "C", "text": "단각자궁(unicornuate uterus)"}, {"letter": "D", "text": "공상자궁(arcuate uterus)"}, {"letter": "E", "text": "중복자궁(didelphys uterus)"}], "answer": "B", "explanation": "정답은 '중격자궁(septate uterus)'입니다. 강의록에 따르면 자궁 기형 중 septate uterus가 가장 흔하며, 그 다음이 bicornuate, arcuate, unicornuate, didelphys 순입니다. 이는 국내외 문헌과 일치하는 빈도입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "단각자궁(unicornuate uterus)의 가장 특징적인 형태학적 소견은?", "options": [{"letter": "A", "text": "T자형 자궁 내강을 보인다."}, {"letter": "B", "text": "바나나 모양의 한쪽 자궁과 한 개의 나팔관만 존재한다."}, {"letter": "C", "text": "두 개의 자궁경부가 관찰된다."}, {"letter": "D", "text": "자궁 기저부 함몰이 1 cm 이상이다."}, {"letter": "E", "text": "자궁 내 중격이 V자 형태로 관찰된다."}], "answer": "B", "explanation": "정답은 '바나나 모양의 한쪽 자궁과 한 개의 나팔관만 존재한다'입니다. 단각자궁은 한쪽 쪽마다뇨관(paramesonephric duct)만 발달하여 한쪽 나팔관과 바나나 모양의 자궁을 형성합니다. 반대편은 무발생입니다. 자궁 기저부 함몰이 1cm 이상이면 쌍각자궁, 두 개의 자궁경부는 중복자궁에서, T자형 내강은 DES 관련 기형, V자형 중격은 중격자궁의 HSG 소견입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "진찰 소견상 두 개의 자궁경부(cervix)가 확인된 환자에서 가장 의심해야 할 자궁 기형은?", "options": [{"letter": "A", "text": "공상자궁(arcuate uterus)"}, {"letter": "B", "text": "중격자궁(septate uterus)"}, {"letter": "C", "text": "쌍각자궁(bicornuate uterus)"}, {"letter": "D", "text": "단각자궁(unicornuate uterus)"}, {"letter": "E", "text": "중복자궁(didelphys uterus)"}], "answer": "E", "explanation": "정답은 '중복자궁(didelphys uterus)'입니다. 중복자궁은 두 개의 자궁과 자궁경부가 완전히 분리되어 있으며, 종종 세로 질 중격을 동반하여 질 확대경 검사 시 두 개의 질과 자궁경부가 관찰됩니다. 단각자궁은 한쪽만, 쌍각자궁과 중격자궁은 보통 하나의 자궁경부를 가지며, 공상자궁은 정상 변이로 자궁경부는 정상입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "다음 중 대부분 산과적 합병증 없이 정상 변이로 간주되는 자궁 기형은?", "options": [{"letter": "A", "text": "중격자궁(septate uterus)"}, {"letter": "B", "text": "쌍각자궁(bicornuate uterus)"}, {"letter": "C", "text": "단각자궁(unicornuate uterus)"}, {"letter": "D", "text": "공상자궁(arcuate uterus)"}, {"letter": "E", "text": "중복자궁(didelphys uterus)"}], "answer": "D", "explanation": "정답은 '공상자궁(arcuate uterus)'입니다. 공상자궁은 자궁 기저부 내강이 경미하게 함몰된 형태로, 대부분 산과적 예후가 정상 자궁과 동일하여 치료가 필요하지 않은 정상 변이로 분류됩니다. 다른 기형들은 유산, 조산, 태위 이상 등의 위험을 증가시킬 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "쌍각자궁(bicornuate uterus)과 중격자궁(septate uterus)을 감별하는 가장 중요한 영상 소견은?", "options": [{"letter": "A", "text": "자궁강 내 중격의 길이"}, {"letter": "B", "text": "자궁 기저부의 외부 함몰 깊이가 1 cm 초과인지 여부"}, {"letter": "C", "text": "자궁경부의 개수"}, {"letter": "D", "text": "자궁 내강의 V자형 여부"}, {"letter": "E", "text": "나팔관의 발달 양상"}], "answer": "B", "explanation": "정답은 '자궁 기저부의 외부 함몰 깊이가 1 cm 초과인지 여부'입니다. 쌍각자궁은 Müllerian duct 융합 부전으로 자궁 기저부 장막면이 깊게 패여 있으며(>1 cm), 중격자궁은 외부 윤곽이 정상이거나 경미한 함몰만 있습니다. MRI나 3D 초음파로 외부 함몰(indentation)을 평가하여 감별합니다. V자형 내강은 septate에서도 보일 수 있고, 자궁경부 개수로는 감별이 어렵습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 39}, {"question": "16세 여성이 일차성 무월경으로 내원하였다. 이차 성징은 정상적으로 발달하였고, 혈중 FSH 및 estradiol 수치는 정상이다. 자궁난관조영술을 시행한 결과 양쪽 난관은 개통되어 있으나 자궁강 중앙에 격벽이 관찰된다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "무발생자궁 (Müllerian agenesis)"}, {"letter": "B", "text": "단각자궁 (Unicornuate uterus)"}, {"letter": "C", "text": "쌍각자궁 (Bicornuate uterus)"}, {"letter": "D", "text": "중격자궁 (Septated uterus)"}, {"letter": "E", "text": "중복자궁 (Uterus didelphys)"}], "answer": "D", "explanation": "HSG에서 자궁강 중앙에 격벽이 보이는 것은 중격자궁의 전형적인 소견입니다. 이는 뮐러관 융합 후 격벽이 완전히 흡수되지 않은 기형입니다. 정상 난관 개통과 정상 FSH/E2 수치는 다른 해부학적 이상과 감별됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 41}, {"question": "원발성 무월경, 짧은 맹관 질, 서혜부 종괴를 주소로 내원한 18세 여성에서 핵형이 46XY이고 혈중 testosterone이 높게 측정되었다. 이 환자에서 장기적으로 가장 우려되는 합병증은?", "options": [{"letter": "A", "text": "고혈압"}, {"letter": "B", "text": "골다공증"}, {"letter": "C", "text": "유방암"}, {"letter": "D", "text": "gonadoblastoma"}, {"letter": "E", "text": "요실금"}], "answer": "D", "explanation": "Androgen insensitivity syndrome에서는 Y 염색체에 존재하는 고환이 복강 내나 서혜부에 있을 경우 20대 이후 gonadoblastoma 발생 위험이 높아 사춘기 이후 예방적 생식샘 절제술이 필요하다. 다른 합병증은 주된 우려사항이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "생후 6개월 여아가 외음부 유착을 주소로 내원하였다. 출생 시 정상이었으며 현재 소음순이 얇은 막으로 붙어 있고 탐침이 통과된다. 이에 대한 가장 적절한 설명은?", "options": [{"letter": "A", "text": "요로 기형 동반 확인을 위해 복부 초음파를 시행한다"}, {"letter": "B", "text": "대음순 융합이므로 사춘기까지 경과를 관찰한다"}, {"letter": "C", "text": "에스트로겐 결핍에 의한 유착이므로 에스트로겐 연고를 사용한다"}, {"letter": "D", "text": "선천성 기형으로 수술이 필요하다"}, {"letter": "E", "text": "성염색체 이상 동반 가능성이 있어 핵형 분석이 필요하다"}], "answer": "D", "explanation": "이는 선천성이 아닌 영아기 에스트로겐 저하로 인한 소음순 유착(labial adhesion)으로, 에스트로겐 연고 도포나 수동 분리로 치료한다. 선천성 대음순 융합과는 원인과 치료가 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 핵형을 가진 환아에서 모호한 생식기가 있고 사춘기에 남성화 가능성이 높은 질환으로, 진단 즉시 생식샘 절제가 필요한 것은?", "options": [{"letter": "A", "text": "MRKH 증후군"}, {"letter": "B", "text": "선천성 부신 과형성(21-hydroxylase 결핍)"}, {"letter": "C", "text": "Turner 증후군"}, {"letter": "D", "text": "5α-reductase 결핍"}, {"letter": "E", "text": "완전 androgen 불응 증후군(complete AIS)"}], "answer": "D", "explanation": "정답은 '5α-reductase 결핍'입니다. 5α-reductase 결핍은 46,XY에서 DHT 생성 장애로 인해 출생 시 불완전한 남성화를 보이나 사춘기 때 testosterone 작용으로 남성화가 진행될 수 있습니다. 따라서 여성으로 성 결정이 되었다면 빠른 생식샘 절제로 남성화를 막아야 하며, 또한 종양 발생 위험이 높아 즉시 제거해야 합니다. 완전 AIS는 사춘기 후 제거가 권장됩니다. MRKH는 46,XX로 고환 절제가 필요 없고, Turner 증후군은 45,X로 다른 기전이며, CAH는 부신 효소 결핍으로 생식샘 절제가 일차 치료가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "Turner 증후군에서 가장 흔하게 동반되는 심혈관 기형은?", "options": [{"letter": "A", "text": "심실 중격 결손(ventricular septal defect)"}, {"letter": "B", "text": "대혈관 전위(transposition of the great arteries)"}, {"letter": "C", "text": "승모판 탈출증(mitral valve prolapse)"}, {"letter": "D", "text": "Fallot 사징(tetralogy of Fallot)"}, {"letter": "E", "text": "대동맥 축착(coarctation of the aorta)"}], "answer": "E", "explanation": "정답은 '대동맥 축착(coarctation of the aorta)'입니다. Turner 증후군(45,X) 환자는 대동맥 축착의 빈도가 높으며, 그 외에도 이첨성 대동맥판, 대동맥 확장 등이 동반될 수 있어 반드시 심장 초음파 평가가 필요합니다. 다른 심장 기형들은 일반적인 선천성 심질환이지만 Turner 증후군에 특이적이지는 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여자가 초경이 없어서 병원에 왔다. 신장은 150cm, 유방 발달은 Tanner 1기, 음모 발달은 Tanner 1기이다. 골반초음파검사에서 자궁은 작고 양측 난소는 보이지 않았다. 혈액검사: 난포자극호르몬 65 mIU/mL, 황체형성호르몬 55 mIU/mL, 난포호르몬 13 pg/mL, 핵형검사 46,XX. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "46,XX 성선발생장애"}, {"letter": "B", "text": "터너증후군"}, {"letter": "C", "text": "자궁무형성증"}, {"letter": "D", "text": "시상하부성 무월경"}, {"letter": "E", "text": "안드로겐불응증후군"}], "answer": "B", "explanation": "고생식샘자극호르몬성 무월경과 46,XX 핵형, 저신장, 정상 여성 외형을 보이는 46,XX 성선발생장애에 합당하다. 터너증후군은 전형적으로 45,X 핵형이며, 안드로겐불응증후군은 46,XY이다. 시상하부성 무월경은 난포자극호르몬이 낮다. 자궁무형성증은 자궁이 없고 난소기능은 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "Turner 증후군으로 진단된 12세 여아에서 키가 135cm이고 유방 발달이 Tanner 1기일 때 가장 적절한 초기 치료는 무엇인가?", "options": [{"letter": "A", "text": "성장호르몬과 에스트로겐 병합 투여"}, {"letter": "B", "text": "갑상샘 호르몬 투여"}, {"letter": "C", "text": "에스트로겐 단독 투여"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "성장호르몬 단독 투여"}], "answer": "E", "explanation": "Turner 증후군에서는 성장 장애가 주요 문제이므로 초기에는 성장호르몬을 투여하여 키 성장을 도모하고, 적절한 연령이 되면 에스트로겐을 추가하여 성 발달을 유도한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XX 신생아에서 모호한 외부 생식기와 고혈압이 관찰될 때 의심해야 하는 효소 결핍증은 무엇인가?", "options": [{"letter": "A", "text": "17α-hydroxylase 결핍증"}, {"letter": "B", "text": "3β-hydroxysteroid dehydrogenase 결핍증"}, {"letter": "C", "text": "21-hydroxylase 결핍증"}, {"letter": "D", "text": "11β-hydroxylase 결핍증"}, {"letter": "E", "text": "5α-reductase 결핍증"}], "answer": "D", "explanation": "11β-hydroxylase 결핍증은 선천성 부신 과증식의 한 원인으로, 11-deoxycorticosterone 축적에 의해 고혈압이 발생할 수 있다. 46,XX 여아에서 모호한 생식기와 고혈압이 동반될 때 의심한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "여성의 사춘기에서 치모(pubic hair) 발달을 주로 유발하는 호르몬은 어디에서 분비되는가?", "options": [{"letter": "A", "text": "뇌하수체 전엽"}, {"letter": "B", "text": "부신 피질"}, {"letter": "C", "text": "태반"}, {"letter": "D", "text": "시상하부"}, {"letter": "E", "text": "난소의 과립막세포"}], "answer": "B", "explanation": "치모 발달은 부신 피질에서 분비되는 남성 호르몬(androgen)에 의해 유발되며, 이를 부신 사춘기(adrenarche)라고 합니다. 난소의 성숙(gonadarche)과는 별개입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "7세 여아가 질출혈과 유방 발달(Tanner 3기)을 보여 내원하였다. Leuprolide(GnRH agonist) 자극 검사 후 혈중 LH가 5 mIU/mL 이상으로 증가하였다. 이 환아의 성조숙증 원인으로 가장 가능성 높은 것은?", "options": [{"letter": "A", "text": "McCune-Albright 증후군"}, {"letter": "B", "text": "자율성 난소 낭종"}, {"letter": "C", "text": "선천성 부신 과형성"}, {"letter": "D", "text": "시상하부 과오종(hypothalamic hamartoma)"}, {"letter": "E", "text": "외인성 에스트로겐 노출"}], "answer": "D", "explanation": "Leuprolide 자극 후 LH가 유의하게 상승하는 것은 성선자극호르몬 의존성(진성) 성조숙증을 의미하며, 이 경우 가장 흔한 중추신경계 원인은 시상하부 과오종입니다. 선택지의 다른 원인들은 대부분 성선자극호르몬 비의존성(가성) 성조숙증에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여아가 저신장과 무월경으로 내원하였다. 이학적 검사에서 익상경(webbed neck)이 관찰되었고, 혈액 검사 결과 FSH 상승, estradiol 감소가 확인되었다. 핵형 검사에서 예상되는 이상은?", "options": [{"letter": "A", "text": "46,XX"}, {"letter": "B", "text": "47,XXX"}, {"letter": "C", "text": "45,X0"}, {"letter": "D", "text": "47,XXY"}, {"letter": "E", "text": "46,XY"}], "answer": "C", "explanation": "전형적인 터너 증후군의 임상 양상으로, 저신장, 익상경, 조기 난소 부전으로 인한 FSH 상승, estradiol 감소가 특징이며 핵형은 전형적으로 45,X0이다. 47,XXX는 초여성 증후군으로 대개 생리 기능이 정상이고 신체 이상이 거의 없다. 46,XY는 안드로겐 불응 증후군이나 스와이어 증후군에서 나타날 수 있으나, 익상경은 터너 증후군에 특이적이다. 46,XX는 정상 핵형으로 이러한 임상상을 설명할 수 없다. 47,XXY는 클라인펠터 증후군으로 남성 표현형이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "19세 여성이 무월경으로 내원하였다. 이차 성징은 발달하지 않았으며, 혈액 검사에서 FSH와 LH가 현저히 상승하고 estradiol은 낮았다. 핵형 분석 결과 46,XY이며, 복강경 검사에서 자궁과 나팔관은 존재하나 양측 스트릭 고나드(streak gonad)가 관찰되었다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "17-알파 수산화효소 결핍증(17-alpha-hydroxylase deficiency)"}, {"letter": "B", "text": "완전 안드로겐 불응 증후군(complete androgen insensitivity syndrome)"}, {"letter": "C", "text": "칼만 증후군(Kallmann syndrome)"}, {"letter": "D", "text": "터너 증후군(Turner syndrome)"}, {"letter": "E", "text": "스와이어 증후군(Swyer syndrome)"}], "answer": "E", "explanation": "스와이어 증후군은 46,XY 핵형에서 SRY 유전자 돌연변이 등으로 고환 분화가 실패하여 흔적 생식선(streak gonad)이 발생하고, AMH가 분비되지 않아 자궁과 나팔관이 형성된다. 고환 기능 부재로 에스트로겐 분비가 없어 이차 성징 부재, FSH/LH 상승, estradiol 감소의 hypergonadotropic hypogonadism을 보인다. 완전 안드로겐 불응 증후군은 46,XY이나 고환이 존재하고 자궁은 없으며 유방 발달이 있다. 터너 증후군은 45,X0로 저신장, 익상경을 동반한다. 칼만 증후군은 저성선자극호르몬성으로 FSH 감소, 후각 소실이 있다. 17-알파 수산화효소 결핍증은 부신 효소 결함으로 고혈압, 저칼륨혈증, 외부 생식기 여성형이지만 내부 생식기 없음이 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "터너 증후군(Turner syndrome)의 특징적인 임상 양상으로 옳은 것은?", "options": [{"letter": "A", "text": "조기 유방 발달"}, {"letter": "B", "text": "고환 여성화(testicular feminization)"}, {"letter": "C", "text": "저신장과 익상경(webbed neck)"}, {"letter": "D", "text": "정상 이차 성징과 무월경"}, {"letter": "E", "text": "거인증과 비만"}], "answer": "C", "explanation": "터너 증후군은 45,X0 핵형에 의한 질환으로, 단신, 익상경, 외반주, 선천성 심혈관 질환 등이 동반되며, 흔적 생식선으로 인해 일차성 무월경과 이차 성징 결여를 보인다. 거인증과 비만은 말단비대증이나 프래더-윌리 증후군 등에서 나타난다. 정상 이차 성징과 무월경은 뮐러관 무발생이나 안드로겐 불응 증후군에서 나타난다. 고환 여성화는 완전 안드로겐 불응 증후군으로 46,XY이며 유방 발달은 있으나 자궁이 없다. 조기 유방 발달은 성조숙증의 일부로, 터너 증후군에서는 오히려 발달 지연이 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "7세 여아가 키가 작아 병원에 왔다. 성장속도는 5 cm/년으로 유지되고 있으며, 부모의 키는 모두 5 백분위수 미만이다. 골연령은 7세로 역연령과 일치하고, 성장호르몬을 포함한 호르몬 검사는 정상이다. 상절 대 하절의 비율은 1.2이다. 진단은?", "options": [{"letter": "A", "text": "갑상샘저하증"}, {"letter": "B", "text": "성장호르몬 결핍증"}, {"letter": "C", "text": "가족성 저신장증 (familial short stature)"}, {"letter": "D", "text": "체질성 성장지연 및 사춘기지연 (constitutional delay)"}, {"letter": "E", "text": "터너 증후군"}], "answer": "C", "explanation": "부모의 키가 작고(5 백분위수 미만), 성장속도가 정상이며, 골연령이 역연령과 일치하고, 호르몬 검사가 정상인 전형적인 가족성 저신장증의 사례입니다. 체질성 성장지연은 골연령이 역연령보다 지연되고 사춘기 발달이 늦는 것이 특징입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "7세 남아가 범혈구감소증으로 전원되었다. 신체검사에서 저신장과 피부에 여러 개의 카페오레 반점(café-au-lait spots)이 있고, 귀의 기형과 난청이 동반되었다. 말초혈액검사에서 중성구감소증, 빈혈, 혈소판감소증이 확인되었다. 가장 의심되는 질환의 확진을 위해 필요한 검사는?", "options": [{"letter": "A", "text": "골수 흡인 도말 검사"}, {"letter": "B", "text": "혈중 비타민 B12/엽산 측정"}, {"letter": "C", "text": "골수 생검"}, {"letter": "D", "text": "염색체 취약성 검사 (DEB/Mitomycin C 유발)"}, {"letter": "E", "text": "세포면역검사"}], "answer": "D", "explanation": "범혈구감소증, 선천성 기형(귀, 저신장), 카페오레 반점은 판코니 빈혈의 전형적 소견입니다. 확진은 DNA 교차결합제인 DEB(diepoxybutane) 또는 MMC(mitomycin C)에 노출 후 염색체 절단(chromosome breakage)이 증가하는 것을 관찰하여 이루어집니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여성이 유방 발달이 없어 내원하였다. 신체 계측상 신장과 체중은 25백분위수이며, 골연령은 13세이다. 혈중 FSH 1.5 IU/L, LH 1.0 IU/L, estradiol <10 pg/mL, 프로락틴과 TSH는 정상이다. 뇌 MRI도 정상이다. 어머니는 16세에 초경을 시작했다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "체질성 성장 및 사춘기 지연"}, {"letter": "B", "text": "터너 증후군"}, {"letter": "C", "text": "McCune-Albright 증후군"}, {"letter": "D", "text": "칼만 증후군"}, {"letter": "E", "text": "시상하부성 무월경"}], "answer": "A", "explanation": "정상 호르몬 수치, 정상 영상 소견, 가족력 및 골연령 지연은 체질성 지연의 전형적인 특징입니다. 이는 병적인 원인이 배제된 상태에서 진단되며, 강의에서 '체질적'이라고 언급된 바 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여자가 초경이 없어 내원하였다. 유방 발달은 Tanner 1기, 음모 발달은 Tanner 3기이며, 골반 초음파에서 자궁과 난소가 작았다. 혈액검사에서 FSH 0.2 mIU/mL (참고치 3.0-20.0), LH 0.1 mIU/mL (참고치 2.0-15.0), estradiol 15 pg/mL (참고치 20-200)이었다. 염색체 검사는 46XX이다. 진단은?", "options": [{"letter": "A", "text": "저성선자극호르몬 성선기능저하증"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "체질성 사춘기 지연"}, {"letter": "D", "text": "완전 고난포자극호르몬 무감응증"}, {"letter": "E", "text": "고성선자극호르몬 성선기능저하증"}], "answer": "A", "explanation": "FSH와 LH가 낮고 에스트라디올도 낮은 소견은 저성선자극호르몬 성선기능저하증을 의미한다. Turner 증후군은 45,X 핵형을 보이며 FSH가 상승하고, 고성선자극호르몬 성선기능저하증은 FSH가 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "터너증후군이 확인된 14세 여아에 대한 장기적 관리 계획으로 가장 적절하지 않은 것은?", "options": [{"letter": "A", "text": "에스트로겐 치료"}, {"letter": "B", "text": "심초음파 및 신장초음파 검사"}, {"letter": "C", "text": "성장호르몬 치료"}, {"letter": "D", "text": "갑상선 질환 선별검사"}, {"letter": "E", "text": "정기적 CA-125 측정"}], "answer": "E", "explanation": "터너증후군 환자에서는 동반될 수 있는 심혈관 기형(대동맥 축착 등), 신장 기형, 갑상샘 기능 저하증을 선별하고, 저신장 치료를 위해 성장호르몬을 투여하며, 사춘기 유도를 위해 에스트로겐 치료를 합니다. CA-125는 난소암 표지자로 터너증후군의 정기 추적 관찰에는 포함되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "원발성 무월경과 유방 발달이 전혀 없는 18세 여성에서 혈중 FSH가 50 IU/L로 증가되어 있다. 다음으로 가장 우선적으로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "핵형 분석(karyotyping)"}, {"letter": "B", "text": "경구 포도당 부하 검사"}, {"letter": "C", "text": "골반 초음파"}, {"letter": "D", "text": "프로게스테론 부하 검사"}, {"letter": "E", "text": "뇌하수체 MRI"}], "answer": "A", "explanation": "원발성 무월경과 이차 성징 결핍(유방 발달 없음)이 동반된 경우 고생식샘자극호르몬성 성선기능저하증(hypergonadotropic hypogonadism)일 가능성이 높다. FSH가 증가되어 있으면 난소 자체의 기능 부전을 의미하므로, 터너 증후군(45,X)이나 Y 염색체를 포함한 모자이크형, 순수 성선 이형성증(Swyer 증후군 46,XY) 등을 감별하기 위해 핵형 분석이 반드시 필요하다. 뇌하수체 MRI는 저생식샘자극호르몬성 성선기능저하증에서 종양 의심 시 시행한다. 프로게스테론 부하 검사는 자궁내막 반응 평가에 유용하나 원인 감별을 위해 핵형 분석이 우선이다. 골반 초음파는 자궁 유무 확인에 도움이 되나 결정적이지 않다. 경구 포도당 부하 검사는 당뇨 진단을 위한 것으로 무월경과 직접적 연관이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "터너 증후군(Turner syndrome) 환자에서 가장 흔히 동반되는 심혈관 기형은?", "options": [{"letter": "A", "text": "승모판 탈출증"}, {"letter": "B", "text": "동맥관 개존증"}, {"letter": "C", "text": "팔로 사징증"}, {"letter": "D", "text": "심방 중격 결손"}, {"letter": "E", "text": "대동맥 축착(coarctation of the aorta)"}], "answer": "E", "explanation": "터너 증후군(45,X)에서는 대동맥 축착, 이첨 대동맥 판막 등 좌측 심장 기형이 특징적으로 발생한다. 특히 대동맥 축착은 빈도가 높아 진단 시 선별검사가 권고된다. 승모판 탈출증이나 심방 중격 결손 등은 다른 선천성 심질환이나 결체조직 질환에서 더 흔하다. 팔로 사징증과 동맥관 개존증은 터너 증후군의 전형적 동반 기형이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "원발성 무월경 환자에서 핵형이 46,XY이며 자궁이 존재하는 경우로, 생식선 절제술(gonadectomy)이 필요한 질환은?", "options": [{"letter": "A", "text": "Polycystic Ovary Syndrome"}, {"letter": "B", "text": "MRKH syndrome"}, {"letter": "C", "text": "Androgen Insensitivity Syndrome"}, {"letter": "D", "text": "Turner syndrome"}, {"letter": "E", "text": "Swyer syndrome"}], "answer": "E", "explanation": "Swyer syndrome(46,XY)은 Y 염색체는 있으나 고환이 발달하지 않아 자궁과 난관이 형성되며 유방 발달은 없다. streak gonads로 인해 악성 변화 위험이 있어 즉시 생식선 절제술을 시행한다. AIS(46,XY)는 자궁이 없고, MRKH(46,XX)는 자궁이 없으며, Turner와 PCOS는 46,XY가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 유방과 음모 발달은 Tanner 1기이고, 골반 초음파에서 자궁과 난소가 작게 관찰된다. 혈액 검사: FSH 0.2 mIU/mL, LH 0.1 mIU/mL, 에스트라디올 15 pg/mL, 염색체 46,XX. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "안드로겐 불감성 증후군"}, {"letter": "B", "text": "뮐러관 무발생증"}, {"letter": "C", "text": "다낭성 난소 증후군"}, {"letter": "D", "text": "터너 증후군"}, {"letter": "E", "text": "저생식샘자극호르몬성 성선기능저하증"}], "answer": "E", "explanation": "낮은 FSH와 LH, 낮은 에스트로겐, 이차 성징 발달 부재는 시상하부 또는 뇌하수체 기능 부전으로 인한 저생식샘자극호르몬성 성선기능저하증의 특징입니다. 터너 증후군은 FSH가 높고, 다낭성 난소 증후군은 정상 사춘기 발달을 보이며, 안드로겐 불감성 증후군은 유방 발달이 있고 자궁이 없으며, 뮐러관 무발생증은 자궁이 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "완전 androgen 불응 증후군(complete AIS)으로 진단된 14세 환자에게 적절한 생식샘(gonad) 제거 시기는?", "options": [{"letter": "A", "text": "진단 즉시 시행한다."}, {"letter": "B", "text": "환자가 임신을 원할 때까지 지연한다."}, {"letter": "C", "text": "제거하지 않고 정기적 감시만 한다."}, {"letter": "D", "text": "사춘기 시작 전에 시행한다."}, {"letter": "E", "text": "사춘기가 완료된 후(16~18세)에 시행한다."}], "answer": "E", "explanation": "정답은 '사춘기가 완료된 후(16~18세)에 시행한다'입니다. 완전 AIS에서는 정상 고환이 사춘기 동안 에스트로겐으로 전환될 testosterone을 분비하여 유방 발달과 여성형 사춘기 진행을 돕습니다. 조기 제거 시 이러한 자연적 발달이 저해되므로 악성 종양 위험을 고려하여 사춘기 완료 후 제거하는 것이 표준입니다. 진단 즉시 제거하는 것은 5α-reductase 결핍이나 Swyer 증후군과 같은 경우이며, AIS와는 다릅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 44}, {"question": "진성 성조숙증(true precocious puberty)으로 진단된 7세 여아에서, 최종 성인 신장을 개선하기 위해 사용할 수 있는 약물은?", "options": [{"letter": "A", "text": "에스트로겐 제제(estrogen therapy)"}, {"letter": "B", "text": "다나졸(danazol)"}, {"letter": "C", "text": "프로게스테론(progesterone)"}, {"letter": "D", "text": "성장 호르몬(growth hormone)"}, {"letter": "E", "text": "GnRH 작용제(GnRH agonist)"}], "answer": "E", "explanation": "진성 성조숙증은 시상하부-뇌하수체-난소 축의 조기 활성화로 인해 발생하며, GnRH 작용제를 투여하면 뇌하수체의 GnRH 수용체가 지속적 탈감작되어 성선 자극 호르몬(FSH, LH) 분비가 억제된다. 이를 통해 사춘기 진행을 중단시키고 조기 골단 폐쇄를 예방하여 최종 성인 신장을 개선한다. 성장 호르몬은 성장 호르몬 결핍증에 사용되며 성조숙증 자체에는 효과가 제한적이다. 에스트로겐 제제는 오히려 성조숙증을 악화시킨다. 프로게스테론은 배란 억제에 사용되나 성조숙증 억제 효과는 미미하다. 다나졸은 안드로겐 억제 효과가 있으나 성조숙증에 일차적으로 사용되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 45}, {"question": "질 분비물이 thick, white, clumpy하게 나타나는 여성에서 진단을 위해 시행한 KOH 도말검사에서 관찰되는 소견은?", "options": [{"letter": "A", "text": "분지형 균사(hyphae)와 budding yeast"}, {"letter": "B", "text": "다수의 clue cell"}, {"letter": "C", "text": "Lactobacillus 군집"}, {"letter": "D", "text": "편모가 달린 활발한 원충"}, {"letter": "E", "text": "많은 수의 백혈구와 그람음성 쌍구균"}], "answer": "A", "explanation": "Candida 감염에서는 KOH에 저항하는 균사(hyphae)와 budding yeast가 보입니다. Clue cell은 BV, 편모충은 Trichomonas, 백혈구와 그람음성균은 임질 등, Lactobacillus는 정상 소견입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 48}, {"question": "Candida 질염 의심 환자에서 질 분비물에 10% KOH 도말 검사가 유용한 이유는?", "options": [{"letter": "A", "text": "KOH가 Candida의 편모 운동을 억제하여 형태 관찰을 쉽게 하기 때문"}, {"letter": "B", "text": "KOH가 질 분비물의 pH를 알칼리화하여 Candida를 선택적으로 배양하기 때문"}, {"letter": "C", "text": "KOH가 Candida 이외의 세포 및 세균을 용해시키기 때문"}, {"letter": "D", "text": "KOH가 Candida를 염색하여 관찰을 용이하게 하기 때문"}, {"letter": "E", "text": "KOH가 Candida의 증식을 촉진하여 검출률을 높이기 때문"}], "answer": "C", "explanation": "10% KOH는 상피세포와 세균 등을 용해시키지만, Candida는 세포벽 성분으로 인해 저항성을 가져 용해되지 않고 남아 현미경 관찰이 용이해진다. ‘KOH가 Candida를 염색’하거나 ‘증식 촉진’, ‘pH 알칼리화’, ‘운동 억제’ 등은 KOH의 작용 기전과 맞지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 48}, {"question": "정상 질 환경에서 Lactobacillus가 유지하는 산성 pH를 파괴하여 세균성 질염의 위험을 높이는 생활습관으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "경구 피임약 복용"}, {"letter": "B", "text": "면역력 증강을 위한 충분한 수면"}, {"letter": "C", "text": "매일 물로만 외음부 세척"}, {"letter": "D", "text": "호르몬 대체 요법"}, {"letter": "E", "text": "질 세척(douche) 및 비누 사용"}], "answer": "E", "explanation": "잦은 질 세척이나 비누와 같은 알칼리성 제품의 사용은 질 내 정상 산성 환경을 알칼리화하고 Lactobacillus를 제거하여 방어벽을 무너뜨리므로 세균 감염의 위험이 증가합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matche drogen 분비의 갑작스러운 증가"}, {"letter": "D", "text": "난소의 난포 성장 속도 증가"}, {"letter": "E", "text": "시상하부-뇌하수체-난소 축의 중추 억제 감소"}], "answer": "E", "explanation": "사춘기 이전에는 중추신경계에 의해 GnRH 분비가 억제되어 있으나, 사춘기에는 이 억제가 풀리면서 맥동성 GnRH 및 LH 분비가 증가하여 성숙이 시작됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "18세 여성이 무월경과 현저한 체중 감소(체질량지수 16 kg/m²)로 내원하였다. 혈액 검사 결과 FSH 감소, LH 감소, estradiol 감소 소견을 보였으며 뇌 MRI는 정상이다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "조기 난소 부전(premature ovarian failure)"}, {"letter": "B", "text": "프로락틴종(prolactinoma)"}, {"letter": "C", "text": "터너 증후군(Turner syndrome)"}, {"letter": "D", "text": "기능성 시상하부 무월경(anorexia nervosa)"}, {"letter": "E", "text": "뮐러관 무발생(Müllerian agenesis)"}], "answer": "D", "explanation": "신경성 식욕 부진과 같은 기능성 시상하부 무월경은 GnRH 분비 억제로 인해 저성선자극호르몬성 성선저하증을 유발한다. FSH, LH, estradiol이 모두 낮고, 뇌 MRI가 정상인 소견이 이에 부합한다. 조기 난소 부전은 FSH 상승, E2 감소를 보인다. 뮐러관 무발생은 정상 FSH/E2와 정상 이차 성징을 보인다. 터너 증후군은 FSH 상승, 저신장, 익상경 등이 동반된다. 프로락틴종은 고프로락틴혈증으로 FSH 억제를 초래하나 뇌 MRI에서 종양이 확인되고 유즙분비 등이 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "24세 여성이 불규칙 월경과 다모증으로 내원하였다. 초음파에서 양측 난소에 다발성 낭종이 관찰되었다. 혈중 호르몬 검사에서 예상되는 소견은?", "options": [{"letter": "A", "text": "FSH가 LH보다 높음"}, {"letter": "B", "text": "프로락틴이 증가함"}, {"letter": "C", "text": "LH/FSH 비율이 2.5로 역전됨"}, {"letter": "D", "text": "에스트라디올이 현저히 감소함"}, {"letter": "E", "text": "TSH가 증가함"}], "answer": "C", "explanation": "다낭성 난소 증후군(PCOS)의 전형적인 호르몬 이상은 LH 상승과 상대적인 FSH 감소로 인한 LH/FSH 비율이 2 이상으로 역전되는 것이다. 이로 인해 무배란이 발생하고, 안드로겐 과잉으로 다모증이 나타난다. FSH가 LH보다 높은 것은 난소 부전에서 관찰된다. 에스트라디올은 PCOS에서 대개 정상 범위이거나 약간 증가한다(무배란 상태에서는 에스트론이 상승). 프로락틴 증가는 고프로락틴혈증으로 무월경을 유발하나 다낭성 난소 소견은 아니다. TSH 증가는 갑상선 기능 저하증을 의미하며, 무월경을 유발할 수 있으나 다모증과 다낭성 난소는 PCOS에 전형적인 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "36세 여성이 6개월간의 무월경을 주소로 내원하였다. 혈중 FSH 75 mIU/mL, estradiol 15 pg/mL로 측정되었다. 다음으로 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검"}, {"letter": "B", "text": "골반 초음파"}, {"letter": "C", "text": "뇌 MRI"}, {"letter": "D", "text": "TSH와 프로락틴 측정"}, {"letter": "E", "text": "핵형 분석 (Karyotyping)"}], "answer": "E", "explanation": "FSH 상승, estradiol 저하는 고생식샘자극호르몬 생식샘저하증을 의미하며, 이는 난소 기능 부전을 시사합니다. 원인 감별을 위해 핵형 분석을 시행하여 터너 증후군 모자이시즘, Swyer 증후군 등을 확인해야 합니다. 이는 강의에서 제시된 알고리즘의 핵심 단계입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "28세 여성이 무월경과 유즙분비를 주소로 내원하였다. 혈중 FSH 2 IU/L, LH 1.5 IU/L, estradiol 20 pg/mL, 프로락틴 150 ng/mL(정상 <25)이다. TSH는 정상이다. 다음으로 할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "셀라 MRI (Sella MRI)"}, {"letter": "B", "text": "난소 생검"}, {"letter": "C", "text": "에스트로겐/프로게스틴 도전 검사"}, {"letter": "D", "text": "골반 초음파"}, {"letter": "E", "text": "핵형 분석"}], "answer": "A", "explanation": "프로락틴이 높고 FSH가 억제된 저생식샘자극호르몬 생식샘저하증 소견으로, TSH가 정상이므로 일차성 갑상선기능저하증이 배제됩니다. 따라서 프로락틴분비 뇌하수체 선종 가능성을 평가하기 위해 셀라 MRI가 필요합니다. 강의에서 '정상 TSH인 경우 MR scan이나 CT scan을 해봐라'고 언급했습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "30세 여성이 피로감, 체중 증가와 함께 무월경이 발생하였다. 혈중 FSH 4 IU/L, TSH 30 mU/L, free T4 0.5 ng/dL로 측정되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "레보티록신"}, {"letter": "B", "text": "GnRH 효능제"}, {"letter": "C", "text": "에스트로겐 치료"}, {"letter": "D", "text": "클로미펜"}, {"letter": "E", "text": "브로모크립틴"}], "answer": "A", "explanation": "높은 TSH, 낮은 free T4는 일차성 갑상선기능저하증을 진단할 수 있으며, 이는 FSH 분비를 억제하여 무월경을 유발합니다. 강의에서 'TSH가 올라가 있는 경우는 primary hypothyroidism이니까 hypothyroidism을 치료를 해 줘라'고 설명하였으며, 치료는 갑상선 호르몬 보충입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "다음 중 hypergonadotropic hypogonadism을 보일 가능성이 가장 높은 질환은?", "options": [{"letter": "A", "text": "Polycystic ovary syndrome (PCOS)"}, {"letter": "B", "text": "시상하부성 무월경"}, {"letter": "C", "text": "에스트로겐 함유 경구 피임제 복용"}, {"letter": "D", "text": "Turner syndrome"}, {"letter": "E", "text": "FSH 분비 뇌하수체 선종"}], "answer": "D", "explanation": "Turner syndrome은 난소 발육 부전으로 인해 estrogen이 부족하여 FSH가 상승하는 대표적인 hypergonadotropic hypogonadism입니다. PCOS는 estrogen 과잉으로 FSH가 억제된 hypergonadism이며, FSH 분비 뇌하수체 선종은 hypergonadotropic hypergonadism을 일으킵니다. 시상하부성 무월경은 GnRH 저하로 FSH가 낮은 hypogonadotropic hypogonadism이고, 에스트로겐 피임제는 음성 되먹임으로 FSH를 억제합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "다음 중 polycystic ovary syndrome(PCOS)에서 관찰되는 호르몬 변화로 옳은 것은?", "options": [{"letter": "A", "text": "Testosterone 증가와 progesterone 감소"}, {"letter": "B", "text": "Estrogen 증가와 FSH 감소"}, {"letter": "C", "text": "GnRH 증가와 LH 감소"}, {"letter": "D", "text": "Estrogen 감소와 FSH 증가"}, {"letter": "E", "text": "Prolactin 증가와 TSH 감소"}], "answer": "B", "explanation": "PCOS에서는 난소에서 estrogen이 과다 분비되어 음성 되먹임으로 FSH가 억제됩니다. LH는 상대적으로 증가하여 LH/FSH 비가 높아지지만, 본 강의에서는 estrogen 증가와 FSH 감소로 설명했습니다. 다른 선택지들은 PCOS와 일치하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "35세 여성이 6개월째 무월경이고 FSH 수치가 반복적으로 40 mIU/mL 이상이다. 가장 적절한 진단은?", "options": [{"letter": "A", "text": "조기 난소 부전 (Premature Ovarian Insufficiency, POI)"}, {"letter": "B", "text": "뇌하수체 선종"}, {"letter": "C", "text": "Asherman 증후군"}, {"letter": "D", "text": "임신"}, {"letter": "E", "text": "시상하부성 무월경"}], "answer": "A", "explanation": "35세 여성이 6개월 무월경과 함께 FSH가 40 mIU/mL 이상으로 높은 경우 조기 난소 부전(POI)에 해당한다. 이는 과생식샘자극호르몬성(hypogonadotropic이 아니라 hypergonadotropic) 무월경의 전형적인 소견이다. 시상하부성 무월경이나 뇌하수체 선종은 FSH가 낮거나 정상이다. Asherman 증후군은 FSH가 정상이며 자궁내 유착이 원인이다. 임신은 hCG로 감별한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "다낭성 난소 증후군(PCOS)으로 인한 무월경의 주요 기전은?", "options": [{"letter": "A", "text": "시상하부에서 GnRH 분비의 일차적 결핍"}, {"letter": "B", "text": "과도한 프로락틴 분비에 의한 HPO axis 억제"}, {"letter": "C", "text": "자궁내막의 프로게스테론 저항성"}, {"letter": "D", "text": "만성 무배란에 의한 월경 이상"}, {"letter": "E", "text": "난소의 조기 고갈"}], "answer": "D", "explanation": "PCOS에서 무월경 또는 희발월경이 발생하는 주요 기전은 만성 무배란(chronic anovulation)이다. 난소는 다수의 난포를 가지고 있으나 배란이 정상적으로 이루어지지 않아 월경 주기가 불규칙해진다. 프로게스테론 저항성은 PCOS에서 직접적 원인이 아니며, 고프로락틴혈증은 별개 질환이다. 난소 조기 고갈은 POI에 해당하며, GnRH 결핍은 시상하부성 무월경에서 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "무월경 환자에서 채혈한 FSH가 55 mIU/mL로 상승되어 있고 estradiol이 15 pg/mL로 낮다. 이 소견과 가장 일치하는 것은?", "options": [{"letter": "A", "text": "난소 부전 (Ovarian failure)"}, {"letter": "B", "text": "시상하부성 무월경"}, {"letter": "C", "text": "뇌하수체 부전"}, {"letter": "D", "text": "자궁내막 유착"}, {"letter": "E", "text": "기능성 시상하부 무월경"}], "answer": "A", "explanation": "FSH가 폐경 범위(>40 mIU/mL)로 상승하고 estradiol이 낮으면 난소 부전(hypergonadotropic hypogonadism)을 의미한다. 시상하부성 무월경이나 뇌하수체 부전은 FSH가 낮거나 정상이다. 자궁내막 유착은 FSH 수치가 정상이고 무월경이 발생한다. 기능성 시상하부 무월경도 낮은 FSH를 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "속발성 무월경 환자에서 임신, 갑상선 기능 저하증, 고프로락틴혈증을 모두 배제한 후 시행한 프로게스테론 부하 검사에서 소퇴성 출혈이 발생하였다. 이 환자에서 가장 가능성 있는 원인 질환은?", "options": [{"letter": "A", "text": "조기 난소 부전"}, {"letter": "B", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "C", "text": "뇌하수체 종양"}, {"letter": "D", "text": "시상하부 무월경"}, {"letter": "E", "text": "자궁 내 유착증 (Asherman syndrome)"}], "answer": "B", "explanation": "프로게스테론 부하 검사 양성은 혈중 에스트로겐이 적절히 분비되어 자궁내막이 증식되었음을 의미한다. 이 경우 무배란 상태이지만 난소 기능은 상대적으로 보존되어 있으므로 가장 흔한 원인은 PCOS이다. 조기 난소 부전이나 시상하부 무월경은 에스트로겐 저하 상태이므로 프로게스테론 부하 검사에서 출혈이 없거나 미약하다. 자궁 내 유착증은 해부학적 원인으로, ion": "Candida 감염 시 분비물은 수분이 적고 끈적이며 치즈와 같은 형태(curdy/cheese-like discharge)가 특징이다. ‘물 같은 분비물’은 세균성 질염, ‘거품 섞인 분비물’은 Trichomonas, ‘화농성 분비물’은 임질 등의 세균 감염, ‘혈성 분비물’은 여러 원인에서 가능하지만 Candida의 전형적인 양상은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "Candida vulvovaginitis가 진단된 환자에서 질 pH 소견으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "정상 산성 pH를 유지한다 (약 4.0-4.5)"}, {"letter": "B", "text": "강산성 pH로 감소한다 (<3.5)"}, {"letter": "C", "text": "질 pH 측정은 진단적 가치가 없다"}, {"letter": "D", "text": "중성 pH를 보인다 (7.0)"}, {"letter": "E", "text": "약알칼리성 pH로 증가한다 (>4.5)"}], "answer": "A", "explanation": "Candida 질염에서는 질 내 Lactobacillus에 의한 산성 환경이 유지되므로 pH는 정상 산성 범위(4.0~4.5)를 보인다. ‘약알칼리성 pH 증가’는 세균성 질염이나 Trichomonas 감염 시에 나타나며, ‘강산성 감소’는 흔하지 않고, ‘중성’이나 ‘측정 무가치’는 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "폐경 여성에서 발생한 atrophic vaginitis의 근본적인 병태생리와 치료 원칙으로 옳은 것은?", "options": [{"letter": "A", "text": "Estrogen 결핍이 원인이므로 estrogen 보충을 고려한다"}, {"letter": "B", "text": "질 산도의 알칼리화가 원인이므로 질 세척을 권장한다"}, {"letter": "C", "text": "면역 저하가 원인이므로 면역 증강 치료를 한다"}, {"letter": "D", "text": "세균 과증식이 원인이므로 항생제를 사용한다"}, {"letter": "E", "text": "Candida 감염이 원인이므로 항진균제를 사용한다"}], "answer": "A", "explanation": "위축성 질염은 폐경 후 estrogen 부족으로 질 점막이 얇아지고 건조해져 발생하므로, 국소 또는 전신 estrogen 보충이 효과적이다. 감염이 원인이 아니므로 항진균제나 항생제는 불필요하며, 면역 저하나 질 세척도 치료 원칙이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "정상 임신에서 hCG 수치의 변화로 옳은 것은?", "options": [{"letter": "A", "text": "72시간마다 2배 증가한다."}, {"letter": "B", "text": "24시간마다 2배 증가한다."}, {"letter": "C", "text": "48시간마다 66% 이상 증가한다."}, {"letter": "D", "text": "48시간마다 50% 증가한다."}, {"letter": "E", "text": "24시간마다 50% 증가한다."}], "answer": "C", "explanation": "정상 임신 초기 hCG는 48시간마다 최소 66% 이상 증가해야 합니다. 2배까지 증가하는 것이 이상적이나, 1.6배 이상 상승하면 정상으로 간주합니다. '24시간마다 2배 증가', '48시간마다 50% 증가', '72시간마다 2배 증가', '24시간마다 50% 증가'는 모두 실제 doubling time과 맞지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "배란 여부를 확인하기 위해 자궁내막생검(endometrial biopsy)을 시행하기에 가장 적절한 시기는?", "options": [{"letter": "A", "text": "월경 직후면 언제든 가능"}, {"letter": "B", "text": "월경 주기 12~14일"}, {"letter": "C", "text": "월경 주기 5~7일"}, {"letter": "D", "text": "월경 주기 25~27일"}, {"letter": "E", "text": "월경 주기 18~20일"}], "answer": "E", "explanation": "배란 후 약 10~12일이 지난 분비기 후반(일반적으로 28일 주기에서는 25~27일째)에 자궁내막생검을 시행하면 프로게스테론의 영향으로 인한 분비기 변화를 현미경적으로 관찰할 수 있어 배란 여부를 신뢰성 있게 판단할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "질확대경 검사에서 관찰할 수 있는 비정상 소견으로 옳은 것은?", "options": [{"letter": "A", "text": "원주상피세포"}, {"letter": "B", "text": "Acetowhite epithelium"}, {"letter": "C", "text": "자궁경부 점액 분비"}, {"letter": "D", "text": "자궁경부 외구의 작은 낭종"}, {"letter": "E", "text": "정상 편평상피세포"}], "answer": "B", "explanation": "Acetowhite epithelium은 3-5% 초산 도포 후 하얗게 변하는 비정상 소견입니다. 정상 편평상피나 원주상피는 정상 소견이고, 점액이나 낭종은 비정상 소견으로 분류되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "폐경 후 질출혈의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "자궁내막 위축 (endometrial atrophy)"}, {"letter": "B", "text": "자궁경부암 (cervical cancer)"}, {"letter": "C", "text": "자궁내막 증식증 (endometrial hyperplasia)"}, {"letter": "D", "text": "자궁내막암 (endometrial cancer)"}, {"letter": "E", "text": "질 감염 (vaginal infection)"}], "answer": "A", "explanation": "폐경 후 질출혈의 원인 중 가장 흔한 것은 자궁내막 위축으로, 약 60-75%를 차지한다. 자궁내막 증식증이나 암은 5-10%에 불과하지만, 임상적으로 반드시 배제해야 하는 중요 원인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "폐경 후 여성에서 질분비물의 pH가 상승하는 주된 원인은?", "options": [{"letter": "A", "text": "질내 유산균 증가"}, {"letter": "B", "text": "프로게스테론 감소"}, {"letter": "C", "text": "질 혈류량 증가"}, {"letter": "D", "text": "에스트로겐 감소"}, {"letter": "E", "text": "안드로겐 증가"}], "answer": "B", "explanation": "폐경으로 에스트로겐이 감소하면 질 상피 세포 내 글리코겐이 감소하여 유산균이 줄어들고, 그 결과 젖산 생성이 감소하여 질 pH가 상승한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "폐경 후 여성에서 질분비물의 pH가 상승하는 주된 원인은?", "options": [{"letter": "A", "text": "요실금으로 인한 오염"}, {"letter": "B", "text": "에스트로겐 감소로 인한 질 상피 글리코겐 감소"}, {"letter": "C", "text": "프로게스테론 증가로 인한 점액 변화"}, {"letter": "D", "text": "자궁경부 협착"}, {"letter": "E", "text": "유산균 과증식"}], "answer": "B", "explanation": "폐경이 되면 난소의 에스트로겐 분비가 감소하고, 이로 인해 질 상피세포 내 글리코겐 함량이 감소합니다. 글리코겐은 질 내 유산균(Lactobacillus)에 의해 젖산으로 전환되어 산성 환경을 유지하는데, 글리코겐 감소로 젖산 생산이 줄어들면 질 pH가 상승하게 됩니다. 이는 폐경기 여성의 질 건조감 및 위축의 주요 기전입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "질 내 유산균이 감소하고 Gardnerella vaginalis, Bacteroides 등 혐기성 세균이 과증식하여 비린내 분비물을 유발하는 세균성 질증의 일차 치료제로 가장 적절한 것은?", "options": [{"letter": "A", "text": "Doxycycline"}, {"letter": "B", "text": "Fluconazole"}, {"letter": "C", "text": "Acyclovir"}, {"letter": "D", "text": "Clindamycin"}, {"letter": "E", "text": "Metronidazole"}], "answer": "B", "explanation": "세균성 질증(bacterial vaginosis)의 1차 치료제는 metronidazole이며, 경구 또는 질 내 투여가 사용된다. Fluconazole은 칸디다질염, acyclovir는 헤르페스, doxycycline은 클라미디아 등에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "다음 중 bacterial vaginosis를 진단하는 데 가장 특이적인 검사 소견은?", "options": [{"letter": "A", "text": "질 분비물에서 pH 4.0 측정"}, {"letter": "B", "text": "Gram 염색에서 다수의 중성구 관찰"}, {"letter": "C", "text": "질 분비물에서 clue cell 관찰"}, {"letter": "D", "text": "Wet smear에서 활발히 움직이는 편모충 관찰"}, {"letter": "E", "text": "KOH 도말 후 분지형 균사(hyphae) 관찰"}], "answer": "C", "explanation": "BV에서는 정상 편평상피세포에 많은 세균이 부착된 clue cell이 특이적 소견입니다. 움직이는 편모충은 Trichomonas, KOH 도말 균사는 Candida, pH 4.0은 정상 산도이며, 중성구 증가는 비특이적 염증 소견입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "Whiff test에 대한 설명으로 올바른 것은?", "options": [{"letter": "A", "text": "양성일 때 bacterial vaginosis를 시사한다"}, {"letter": "B", "text": "생리식염수를 떨어뜨려 시행한다"}, {"letter": "C", "text": "Trichomonas 질염에서만 양성을 보인다"}, {"letter": "D", "text": "질 분비물의 pH를 측정하는 검사이다"}, {"letter": "E", "text": "Candida 질염에서 특이적으로 양성이다"}], "answer": "A", "explanation": "Whiff test는 질 분비물에 KOH를 떨어뜨렸을 때 amine 냄새가 나는지 확인하는 검사로, BV에서 양성입니다. 생리식염수는 wet smear에 사용되며, Candida는 KOH 도말로 균사를 관찰하고, Trichomonas는 wet smear로 진단합니다. pH 측정은 별도 검사입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "Bacterial vaginosis의 치료 원칙으로 올바른 것은?", "options": [{"letter": "A", "text": "질세척을 매일 시행하여 청결을 유지한다"}, {"letter": "B", "text": "자연 치유되므로 특별한 치료가 필요 없다"}, {"letter": "C", "text": "Metronidazole 경구 투여가 효과적이다"}, {"letter": "D", "text": "항진균제를 7일간 경구 투여한다"}, {"letter": "E", "text": "성관계 파트너를 반드시 같이 치료해야 한다"}], "answer": "C", "explanation": "BV 치료는 metronidazole 또는 clindamycin으로 하며, 성병이 아니므로 파트너 치료는 권장되지 않습니다. 항진균제는 Candida에 사용되고, 질세척은 오히려 정상 세균총을 파괴할 수 있습니다. 증상이 있으면 치료가 필요합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "임신 중 bacterial vaginosis 감염과 관련된 합병증으로 옳은 것은?", "options": [{"letter": "A", "text": "임신성 고혈압"}, {"letter": "B", "text": "태아 기형"}, {"letter": "C", "text": "양수 과다증"}, {"letter": "D", "text": "전치태반"}, {"letter": "E", "text": "조기진통 및 조기양막파수"}], "answer": "E", "explanation": "BV는 조기진통, 조기양막파수, 융모양막염, 제왕절개 후 자궁내막염 등과 관련이 있습니다. 전치태반이나 임신성 고혈압은 다른 원인이며, 태아 기형과의 직접적 연관성은 명확하지 않고, 양수 과다증은 흔한 합병증이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "세균성 질염(bacterial vaginosis)과 관련하여 발생할 수 있는 부인과 합병증 중 하나로, 자궁경부를 통해 상행 감염이 발생하여 골반강 내 장기에 염증을 유발하는 질환은?", "options": [{"letter": "A", "text": "자궁경부이형성증"}, {"letter": "B", "text": "골반염"}, {"letter": "C", "text": "자궁내막증"}, {"letter": "D", "text": "자궁근종"}, {"letter": "E", "text": "난소낭종"}], "answer": "B", "explanation": "세균성 질염의 균주들은 자궁경부를 통과하여 자궁내막, 나팔관, 난소, 골반강까지 상행감염을 일으켜 골반염(pelvic inflammatory disease)을 유발할 수 있습니다. 이는 유산 후 또는 자궁절제술 후에도 발생할 수 있는 중요한 합병증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "임신 20주 여성이 세균성 질염으로 진단되었을 때, 치료에 대한 설명으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "임신 중에는 항생제가 금기이므로 프로바이오틱스만 사용"}, {"letter": "B", "text": "비임신 성인과 동일한 용량의 metronidazole 경구 투여"}, {"letter": "C", "text": "Metronidazole 경구 용량을 줄이거나 대체 국소 약제로 치료"}, {"letter": "D", "text": "태아 기형을 유발하므로 치료하지 않고 경과 관찰"}, {"letter": "E", "text": "Clindamycin 질 크림은 안전하므로 우선 권장"}], "answer": "C", "explanation": "임신 중 세균성 질염은 치료가 필요하지만, metronidazole은 용량을 줄여서 사용하는 것을 고려하며, clindamycin 질 크림은 태아에게 영향을 줄 수 있는 약물로 분류되어 임신 중 사용을 피해야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "34세 여자가 질 분비물 증가와 생선 냄새를 주소로 내원하였다. 현미경 검사에서 clue cell이 관찰되었고, 질 분비물에 10% KOH를 첨가하자 냄새가 심해졌다. 가장 적절한 치료제는?", "options": [{"letter": "A", "text": "Ceftriaxone"}, {"letter": "B", "text": "Fluconazole"}, {"letter": "C", "text": "Azithromycin"}, {"letter": "D", "text": "Metronidazole"}, {"letter": "E", "text": "Acyclovir"}], "answer": "D", "explanation": "BV is characterized by clue cells, positive whiff test, and loss of lactobacilli. Standard treatment is metronidazole or clindamycin. Fluconazole is for candidiasis, azithromycin/ceftriaxone for STIs, and acyclovir f : "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "임신 28주인 32세 여성이 질 소양증과 치즈 양상의 질 분비물을 호소하여 칸디다 외음질염으로 진단되었다. 이 환자에게 적절한 치료 계획은?", "options": [{"letter": "A", "text": "B. butoconazole 질 크림 1일 1회 3일간"}, {"letter": "B", "text": "E. clotrimazole 경구 투여"}, {"letter": "C", "text": "A. fluconazole 150 mg 경구 단회 투여"}, {"letter": "D", "text": "C. metronidazole 경구 투여"}, {"letter": "E", "text": "D. nystatin 경구 투여"}], "answer": "A", "explanation": "임신 중에는 경구 항진균제가 태아에 대한 안전성 문제로 금기이며, 국소 질정 또는 크림 제형의 azole계 약물이 일차 치료로 권장된다. Fluconazole 등 경구 약물은 수유부에서도 주의해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 57}, {"question": "Pelvic inflammatory disease(PID)의 장기적 합병증으로 발생할 수 있는 것은?", "options": [{"letter": "A", "text": "난소 낭종"}, {"letter": "B", "text": "경부 이형성증"}, {"letter": "C", "text": "불임증"}, {"letter": "D", "text": "자궁내막 증식증"}, {"letter": "E", "text": "자궁근종"}], "answer": "C", "explanation": "PID는 나팔관 유착 및 폐쇄를 일으켜 난자와 정자의 이동을 방해하므로 불임증의 주요 원인이 된다. 그 외 자궁 외 임신, 만성 골반통도 합병증이다. 자궁근종, 자궁내막 증식증, 경부 이형성증, 난소 낭종은 PID의 직접적 합병증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "Pelvic inflammatory disease가 의심되는 환자에서 cervical motion tenderness(CMT)가 관찰될 때, 이 소견이 시사하는 것은?", "options": [{"letter": "A", "text": "방광염"}, {"letter": "B", "text": "충수염"}, {"letter": "C", "text": "난소 염전"}, {"letter": "D", "text": "자궁경부의 종양성 병변"}, {"letter": "E", "text": "골반 내 염증"}], "answer": "E", "explanation": "CMT는 자궁경부를 움직일 때 통증이 유발되는 소견으로, 골반 내 염증이 있을 때 복막 자극으로 인해 나타난다. 이는 전형적인 PID의 진찰 소견이며, 단순한 자궁경부 종양, 난소 염전, 방광염, 충수염만으로는 설명되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "상복부 통증을 호소하는 PID 환자에서 시행한 복강경 검사에서 관찰된 Fitz-Hugh-Curtis 증후군의 특징적 소견은?", "options": [{"letter": "A", "text": "간과 횡격막 사이의 유착"}, {" ": "90도"}, {"letter": "C", "text": "130도"}, {"letter": "D", "text": "60도"}, {"letter": "E", "text": "150도"}], "answer": "C", "explanation": "강의에서 소변이 새지 않도록 요도가 적절히 폐쇄되려면 약 130도의 예각이 유지되어야 한다고 하였습니다. 이 각도가 무너지면 요실금이나 요폐가 발생할 수 있습니다. 다른 각도들은 언급되지 않았습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "처녀막 폐쇄증(hymenal atresia)의 적절한 일차 치료로 올바른 것은?", "options": [{"letter": "A", "text": "자궁경부 확장술(cervical dilatation)을 시행한다."}, {"letter": "B", "text": "원형 절제(circular excision)를 시행한다."}, {"letter": "C", "text": "질 성형술(vaginoplasty)을 시행한다."}, {"letter": "D", "text": "십자 절개(cruciate incision)를 시행한다."}, {"letter": "E", "text": "수직 절개(vertical incision)만 시행한다."}], "answer": "D", "explanation": "정답은 '십자 절개(cruciate incision)를 시행한다'입니다. 강의록에 따르면 처녀막 폐쇄증은 외부 폐쇄이므로 단순 절개만으로도 고인 혈액(hematocolpos)을 배출할 수 있으나, 절개 부위가 다시 붙을 수 있어 전통적으로 십자 절개를 시행하며 시험 문제에서도 이를 정답으로 선택해야 합니다. 수직 절개만으로는 재협착 가능성이 있습니다. 원형 절제는 최근 경향이지만 아직 표준 시험 답안은 아닙니다. 질 성형술은 질이 짧은 경우(예: MRKH)에 시행하며, 자궁경부 확장술은 자궁경부 협착에 사용되므로 적절하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 75}, {"question": "초경 후 6개월 이내에 심한 월경통으로 응급실에 내원한 13세 여자 청소년에서 MRI상 한쪽 자궁각에 큰 낭종성 병변이 관찰된다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "진통제 투여 후 경과 관찰"}, {"letter": "B", "text": "복강경 난소 낭종 절제술"}, {"letter": "C", "text": "질 중격 절제술(vaginal septectomy)"}, {"letter": "D", "text": "응급 자궁 적출술"}, {"letter": "E", "text": "양측 자궁 나팔관 조영술(HSG)"}], "answer": "C", "explanation": "정답은 '질 중격 절제술(vaginal septectomy)'입니다. 강의록에서 설명하였듯이 한쪽 질이 폐쇄된 세로 질 중격의 경우, 월경혈이 정체되어 자궁 쪽으로 커다란 낭종처럼 보이게 되고, 초경 직후부터 심한 통증을 유발합니다. 이 경우 응급으로 폐쇄를 해소해 주어야 하며, 청소년기 즉시 septectomy를 시행해야 합니다. 진통제는 증상 완화만 가능하고 근본적 해결이 되지 않습니다. 난소 낭종이 아닌 자궁혈종이므로 난소 절제는 부적절하며, 자궁 적출은 필요하지 않습니다. HSG는 정체된 월경혈 배출 전에는 시행할 수 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "반복적인 10주 이전 자연유산을 경험한 환자에서 중격자궁(septate uterus)으로 진단되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁경하 중격 절제술(hysteroscopic septoplasty)"}, {"letter": "B", "text": "프로게스테론 보충 요법"}, {"letter": "C", "text": "복강경 자궁 근종 절제술"}, {"letter": "D", "text": "정기적인 초음파 추적 관찰"}, {"letter": "E", "text": "자궁 성형술(metroplasty) via wedge resection"}], "answer": "A", "explanation": "정답은 '자궁경하 중격 절제술(hysteroscopic septoplasty)'입니다. 중격자궁은 자궁강 내 혈관 분포가 불량한 섬유성 중격으로 인해 착상 실패와 초기 유산을 유발합니다. 따라서 자궁경을 이용하여 중격을 절제하는 것이 표준 치료이며, 침습이 적고 회복이 빠릅니다. wedge resection을 통한 metroplasty는 쌍각자궁에서 시행하며, 추적 관찰이나 프로게스테론은 근본 치료가 되지 못합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "다음 중 반복유산의 원인과 치료의 조합으로 올바른 것은?", "options": [{"letter": "A", "text": "쌍각자궁 - 자궁경하 중격절제술"}, {"letter": "B", "text": "자궁내막용종 - 항생제 치료"}, {"letter": "C", "text": "항인지질항체증후군 - 저용량 아스피린 단독"}, {"letter": "D", "text": "자궁중격 - 자궁경하 자궁중격절제술"}, {"letter": "E", "text": "자궁근종 - 자궁동맥색전술"}], "answer": "D", "explanation": "자궁중격은 반복유산의 원인이며 자궁경하 중격절제술이 표준 치료이다. 항인지질항체증후군은 저용량 아스피린과 헤파린 병합이 필요하며, 자궁근종은 근종절제술이 우선이다. 쌍각자궁은 중격이 없고, 자궁내막용종은 용종절제술이 필요하며 항생제는 효과가 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "MRKH 증후군으로 진단된 환자에서 반드시 시행해야 하는 검사는 무엇인가?", "options": [{"letter": "A", "text": "신장 초음파 / CT"}, {"letter": "B", "text": "척추 X선"}, {"letter": "C", "text": "갑상샘 초음파"}, {"letter": "D", "text": "심장 초음파"}, {"letter": "E", "text": "골밀도 검사"}], "answer": "A", "explanation": "MRKH 증후군은 신장 기형(일측성 신장 무발생 등)이 동반될 수 있으므로 진단 시 복부 CT 또는 신장 초음파를 통해 비뇨기계 평가가 반드시 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "중격자궁으로 자궁 성형술(metroplasty)을 시행한 후 임신한 환자에게 반드시 설명해야 하는 주요 합병증은 무엇인가?", "options": [{"letter": "A", "text": "전치 태반"}, {"letter": "B", "text": "태반 유착"}, {"letter": "C", "text": "자궁 파열"}, {"letter": "D", "text": "조기 양막 파수"}, {"letter": "E", "text": "산후 출혈"}], "answer": "C", "explanation": "자궁 성형술 후에는 myometrium이 약화되어 임신 중 자궁 파열의 위험이 있으므로, 주의 깊은 산전 관리와 위험 설명이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "임신 6주인 산모가 교통사고 후 좌측 엉덩이 통증으로 단순 X선 촬영을 한 경우, 가장 적절한 조치는?", "options": [{"letter": "A", "text": "즉시 고해상도 초음파로 기형 유무를 확인한다"}, {"letter": "B", "text": "방사선 노출 후 반드시 양수 검사를 시행하여 염색체 이상을 확인한다"}, {"letter": "C", "text": "촬영 부위와 선량을 확인 후 안심시키고 정기 산전 관리를 지속한다"}, {"letter": "D", "text": "방사선 안전 관리 기관에 즉시 신고한다"}, {"letter": "E", "text": "태아 기형 위험을 설명하고 임신 종결을 권유한다"}], "answer": "C", "explanation": "임신 초기 단순 X선 촬영으로 인한 태아 피폭 선량은 매우 낮아(일반적으로 5 rad 미만) 기형 유발 위험이 임상적으로 무시할 만합니다. 따라서 충분한 설명으로 안심시키고 정기적인 산전 관리를 권유하는 것이 적절합니다. 임신 종결이나 추가적인 침습 검사는 필요하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "자궁 내 피임 기구(IUD)를 삽입한 상태로 임신이 확인된 여성의 올바른 관리 방법은?", "options": [{"letter": "A", "text": "IUD 제거 없이 임신을 지속하면 자연 유산율이 증가하므로 예정일보다 일찍 분만 유도한다."}, {"letter": "B", "text": "임신 유지를 위해 프로게스틴 보충 요법을 병행한다."}, {"letter": "C", "text": "IUD 실이 보이면 즉시 조심히 제거하고, 제거가 불가능하면 경과 관찰하며 자연 유산 위험을 설명한다."}, {"letter": "D", "text": "IUD를 그대로 두어도 합병증이 거의 없으므로 기존대로 유지한다."}, {"letter": "E", "text": "태아 기형을 예방하기 위해 반드시 임신 초기에 IUD를 제거해야 한다."}], "answer": "C", "explanation": "IUD가 있는 상태에서 임신이 확인되면 실이 보이면 조심스럽게 제거를 시도하고, 보이지 않으면 초음파로 확인하며 제거를 시도합니다. 제거할 수 없는 경우 그대로 두고 자연 유산(약 50-60%)이나 조산 위험을 설명합니다. IUD 때문에 태아 기형이 발생하는 것은 아니며, 예방적 제거가 불가능할 수 있고, 분만 유도가 일차적 대안은 아닙니다. 프로게스틴 보충은 관련이 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "30세 여성이 1년 전 계류유산으로 자궁소파술을 받은 후 월경량이 현저히 감소하고 임신이 되지 않아 내원하였다. 자궁강내 유착이 의심될 때 우선 시행해야 할 검사는?", "options": [{"letter": "A", "text": "자궁난관조영술"}, {"letter": "B", "text": "혈중 난포자극호르몬 측정"}, {"letter": "C", "text": "복강경검사"}, {"letter": "D", "text": "질 초음파"}, {"letter": "E", "text": "자궁내막생검"}], "answer": "D", "explanation": "자궁난관조영술은 자궁강의 형태를 평가하는 일차 선별검사로, 유착 부위에서 충만 결손을 보일 수 있어 자궁강내 유착이 의심될 때 가장 먼저 시행한다. 질 초음파만으로는 유착을 발견하기 어렵고, 진단적 자궁경술은 확진을 위한 이차 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "다음 중 진단적 자궁경검사(hysteroscopy)의 적응증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "자궁내막증의 복강 내 병변 평가"}, {"letter": "B", "text": "습관성 유산 환자의 자궁 기형 확인"}, {"letter": "C", "text": "임신 초기 출혈의 원인 감별"}, {"letter": "D", "text": "급성 골반염증성 질환의 평가"}, {"letter": "E", "text": "확인된 자궁경부암의 병기 결정"}], "answer": "B", "explanation": "자궁경검사는 자궁강 내를 직접 관찰하여 습관성 유산 시 septate uterus 등의 선천성 기형을 진단하는 데 유용하다. 자궁경부암은 자궁경검사의 금기이며, 급성 PID는 검사로 인해 감염이 확산될 수 있고, 임신 중에는 시행하지 않으며, 복강 내 병변은 복강경으로 평가해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "32세 여성이 급성 골반통으로 내원하여 초음파 검사에서 더글라스 와(pouch of Douglas)에 소량의 액체가 관찰되었다. 이 액체의 성상(혈액, 농, 장액 등)을 감별하기 위한 외래 기반 시술로 가장 적절한 것은 무엇인가?", "options": [{"letter": "A", "text": "경질 초음파 유도 하 세침 흡인"}, {"letter": "B", "text": "질둘레 천자(culdocentesis)"}, {"letter": "C", "text": "질확대경술(colposcopy)"}, {"letter": "D", "text": "복강경(laparoscopy)"}, {"letter": "E", "text": "자궁내막 생검(endometrial biopsy)"}], "answer": "B", "explanation": "Culdocentesis(질둘레 천자)는 더글라스 와(pouch of Douglas)에 저류된 액체를 주사기로 흡인하여 육안적, 현미경적으로 성상을 감별하는 간단한 외래 시술이다. 자궁외 임신 파열 시 혈액, 염증성 질환 시 농 등을 신속히 감별할 수 있다. 복강경은 좀 더 침습적이며, colposcopy는 자궁경부를 관찰하는 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 80}, {"question": "25세 여자가 아랫배 통증과 질출혈로 내원하였다. 마지막 월경 시작일은 6주 전이며, 소변 임신 검사에서 양성이었다. 초음파 검사에서 왼쪽 부속기에 혼합된 음영의 종괴와 골반 내 액체 저류가 관찰된다. 진단을 위해 가장 먼저 시행해야 할 혈액 검사는?", "options": [{"le  검사는?", "options": [{"letter": "A", "text": "성선호르몬방출호르몬 자극 검사"}, {"letter": "B", "text": "프로락틴 측정"}, {"letter": "C", "text": "골밀도 검사"}, {"letter": "D", "text": "뇌하수체 MRI"}, {"letter": "E", "text": "염색체 검사"}], "answer": "E", "explanation": "FSH가 현저히 상승하고 에스트라디올이 낮은 원발성 무월경은 난소 기능 부전을 의미합니다. 이 경우 터너 증후군(45,X)이나 46,XX 순수 성선발생부전 같은 염색체 이상을 확인하기 위해 핵형 분석이 필수적입니다. 다른 검사는 저생식샘자극호르몬성 성선기능저하증 조사에 적합합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "64세 여성이 건강검진에서 혈중 칼슘 11.0 mg/dL, 인 2.1 mg/dL, 부갑상선호르몬(PTH) 105 pg/mL(참고치 8-51)로 확인되었다. 무증상이며, 신장 기능은 정상이다. 원인 감별을 위해 가장 먼저 시행할 검사는?", "options": [{"letter": "A", "text": "부갑상선 스캔(Tc-99m sestamibi)"}, {"letter": "B", "text": "흉부 X선 촬영"}, {"letter": "C", "text": "24시간 소변 칼슘"}, {"letter": "D", "text": "복부 전산화단층촬영(CT)"}, {"letter": "E", "text": "갑상선 초음파"}], "answer": "C", "explanation": "고칼슘혈증과 함께 부적절하게 높은 PTH가 확인되면 일차성 부갑상선기능항진증을 의심할 수 있습니다. 그러나 유전성 질환인 가족성 저칼슘뇨성 고칼슘혈증(FHH)과의 감별이 필요하며, 24시간 소변 칼슘 배설량 측정을 통해 이를 구분할 수 있습니다. 소변 칼슘이 매우 낮다면 FHH를 시사하며, 수술 대신 보존적 치료를 권장합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "조기 난소 부전(premature ovarian insufficiency) 환자에게 에스트로겐을 포함한 호르몬 대체 요법(HRT)을 시행하는 주된 목적은?", "options": [{"letter": "A", "text": "배란 기능을 회복시켜 자연 임신을 유도하기 위해"}, {"letter": "B", "text": "골밀도 감소와 심혈관 질환 위험을 낮추기 위해"}, {"letter": "C", "text": "자궁내막을 위축시켜 악성 변화를 막기 위해"}, {"letter": "D", "text": "체중 증가를 유도하여 대사 지표를 개선하기 위해"}, {"letter": "E", "text": "유방 조직 발달을 촉진하여 여성성을 강화하기 위해"}], "answer": "B", "explanation": "조기 난소 부전으로 인한 에스트로겐 결핍은 골다공증, 심혈관 질환, 인지 기능 저하 등의 위험을 높인다. HRT의 주목적은 이러한 장기적 합병증을 예방하고 삶의 질을 개선하는 것이다. HRT는 배란 기능을 회복시키지 않으며, 자궁내막 위축이 아닌 주기적 탈락을 유도하기 위해 프로게스틴을 병합한다. 유방 발달 촉진이나 체중 증가 유도는 일차 목표가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 103}, {"question": "여성 생식계에서 inhibin의 주요 작용으로 옳은 것은?", "options": [{"letter": "A", "text": "LH와 FSH 분비를 모두 억제한다"}, {"letter": "B", "text": "FSH 분비를 선택적으로 자극한다"}, {"letter": "C", "text": "LH 분비를 선택적으로 억제한다"}, {"letter": "D", "text": "LH 분비를 선택적으로 자극한다"}, {"letter": "E", "text": "FSH 분비를 선택적으로 억제한다"}], "answer": "E", "explanation": "Inhibin은 난소의 과립막 세포에서 생산되어 뇌하수체 전엽에서 FSH의 합성 및 분비를 특이적으로 억제한다. LH 분비에는 큰 영향을 미치지 않으며, activin은 반대로 FSH 분비를 촉진한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "29세 원발성 불임(1년) 여성, 월경은 규칙적(28일 주기), 마지막 생리 시작일이 21일 전이다. 오늘 시행하기에 가장 적절한 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검"}, {"letter": "B", "text": "자궁난관조영술"}, {"letter": "C", "text": "혈중 프로게스테론"}, {"letter": "D", "text": "질식 초음파"}, {"letter": "E", "text": "기초체온표 작성"}], "answer": "C", "explanation": "규칙적 월경 주기에서 21일째는 황체기 중반에 해당한다. 이 시기에 혈중 프로게스테론을 측정하면 배란 여부를 확인할 수 있다. 프로게스테론이 3ng/mL 이상이면 배란이 있었음을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "Y 염색체에서 고환 결정 유전자인 SRY gene이 위치하는 부위는?", "options": [{"letter": "A", "text": "Y 염색체의 긴 팔 근위부"}, {"letter": "B", "text": "Y 염색체의 짧은 팔(short arm)"}, {"letter": "C", "text": "Y 염색체의 동원체(centromere) 부위"}, {"letter": "D", "text": "Y 염색체의 긴 팔(long arm) 원위부"}, {"letter": "E", "text": "Y 염색체에는 SRY gene이 존재하지 않는다"}], "answer": "B", "explanation": "SRY gene은 Y 염색체의 short arm에 위치하며, 이 유전자의 존재 유무에 따라 배아의 성선이 고환 또는 난소로 분화가 결정된다. 다른 부위에는 SRY gene이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "남성 태아의 Sertoli cell에서 분비되는 anti-Müllerian hormone(AMH)의 주된 작용은?", "options": [{"letter": "A", "text": "정원세포의 분열을 촉진한다"}, {"letter": "B", "text": "Wolffian duct의 발달을 촉진한다"}, {"letter": "C", "text": "Müllerian duct의 퇴화를 유도한다"}, {"letter": "D", "text": "외부 생식기를 남성화한다"}, {"letter": "E", "text": "고환의 하강을 유도한다"}], "answer": "C", "explanation": "AMH는 Müllerian duct(paramesonephric duct)의 퇴화를 유도하여 자궁, 나팔관 등의 발생을 억제한다. Wolffian duct의 유지는 Leydig cell에서 분비되는 testosterone에 의한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "남성 태아의 외부 생식기 남성화에 직접적으로 관여하는 호르몬은?", "options": [{"letter": "A", "text": "Anti-Müllerian hormone (AMH)"}, {"letter": "B", "text": "Testosterone"}, {"letter": "C", "text": "Inhibin B"}, {"letter": "D", "text": "Estradiol"}, {"letter": "E", "text": "Dihydrotestosterone (DHT)"}], "answer": "E", "explanation": "Testosterone은 5α-reductase type 2에 의해 DHT로 전환되며, DHT가 genital tubercle과 labioscrotal swelling의 남성화를 유도한다. AMH는 내부 생식관 퇴화에 작용하고, estrogen과 inhibin은 외부 생식기 분화에 관여하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "46,XX 신생아에서 모호한 외부 생식기가 관찰되고 17-hydroxyprogesterone이 상승되어 있다. 가장 가능성이 높은 효소 결핍은?", "options": [{"letter": "A", "text": "5α-reductase 결핍"}, {"letter": "B", "text": "17α-hydroxylase 결핍"}, {"letter": "C", "text": "3β-hydroxysteroid dehydrogenase 결핍"}, {"letter": "D", "text": "21-hydroxylase 결핍"}, {"letter": "E", "text": "11β-hydroxylase 결핍"}], "answer": "D", "explanation": "정답은 '21-hydroxylase 결핍'입니다. 선천성 부신 과형성(CAH)의 약 90% 이상을 차지하는 가장 흔한 원인으로, 21-hydroxylase 결핍 시 cortisol 합성 장애로 인해 ACTH 증가, 부신 증식, 그리고 androgen 과잉이 발생합니다. 이로 인해 46,XX 여아에서 외부 생식기 남성화가 일어납니다. 11β-hydroxylase 결핍도 남성화를 일으키지만 빈도가 낮고 고혈압을 동반합니다. 3β-HSD 결핍은 남녀 모두에서 영향을 주며, 17α-hydroxylase 결핍은 성호르몬 저하를, 5α-reductase 결핍은 46,XY에서 DHT 전환 장애를 일으킵니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "생후 10개월 남아가 음경 이상(요도하열)을 주소로 내원하였다. 양측 고환은 만져지지 않는다. 혈액검사: DHEA-S 상승, 17-hydroxyprogesterone 감소, 테스토스테론 감소. 결핍된 효소는?", "options": [{"letter": "A", "text": "21-hydroxylase"}, {"letter": "B", "text": "17,20-lyase"}, {"letter": "C", "text": "17α-hydroxylase"}, {"letter": "D", "text": "11β-hydroxylase"}, {"letter": "E", "text": "3β-hydroxysteroid dehydrogenase"}], "answer": "C", "explanation": "DHEA-S 상승과 17-hydroxyprogesterone 감소, 테스토스테론 감소는 3β-HSD 결핍의 전형적 소견이다. 21-hydroxylase와 11β-hydroxylase 결핍 시 17-OHP와 안드로겐이 상승하며, 17α-hydroxylase 결핍은 고혈압과 저칼륨혈증을 동반한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "여성 생식기관 내에서 정자의 생존 기간은 일반적으로 어느 정도인가?", "options": [{"letter": "A", "text": "1~2일"}, {"letter": "B", "text": "7~10일"}, {"letter": "C", "text": "3~5일"}, {"letter": "D", "text": "12~24시간"}, {"letter": "E", "text": "6~12시간"}], "answer": "C", "explanation": "정자는 여성 생식기관에서 3~5일까지 생존 가능하여, 배란 3~5일 전 성교로도 임신이 가능합니다. 이는 피임 주기법에서 가임기간을 길게 잡아야 하는 이유입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "난자(N)와 정자(N)의 수정 직후 형성된 접합자(zygote)의 염색체 수는?", "options": [{"letter": "A", "text": "46개"}, {"letter": "B", "text": "92개"}, {"letter": "C", "text": "개인마다 다르다"}, {"letter": "D", "text": "23개"}, {"letter": "E", "text": "69개"}], "answer": "A", "explanation": "정상 인간의 난자와 정자는 각각 23개의 염색체를 가지며, 수정 시 합쳐져 46개 (2N)의 접합자를 형성합니다. 이는 체세포와 동일한 염색체 수입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "출생 시 여성으로 양육되었던 환자가 사춘기에 목소리 굵어짐, 근육 발달, 음핵 비대 등 남성화 징후를 보였다. 염색체 검사는 46,XY이고, 혈중 testosterone 수치는 정상 남성 범위이나 DHT는 낮았다. 진단은?", "options": [{"letter": "A", "text": "터너 증후군(Turner syndrome)"}, {"letter": "B", "text": "17-베타 수산화스테로이드 탈수소효소 결핍증(17-beta-HSD deficiency)"}, {"letter": "C", "text": "5-알파 환원효소 결핍증(5-alpha reductase deficiency)"}, {"letter": "D", "text": "스와이어 증후군(Swyer syndrome)"}, {"letter": "E", "text": "완전 안드로겐 불응 증후군(complete androgen insensitivity syndrome)"}], "answer": "C", "explanation": "5-알파 환원효소 결핍증
