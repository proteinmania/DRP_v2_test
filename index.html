curettage)"}, {"letter": "C", "text": "Methotrexate 전신 투여"}, {"letter": "D", "text": "응급 수술적 치료"}, {"letter": "E", "text": "48시간 후 HCG 추적검사"}], "answer": "B", "explanation": "임신 위치 불명(PUL)에서 HCG가 2,000 IU/L 이상이고 초음파에서 임신낭이 관찰되지 않는 경우, 활력징후가 안정적이라면 자궁내막 소파술을 시행하여 융모조직 유무를 확인함으로써 완전유산과 자궁외임신을 감별한다. 파열 소견이 없으므로 응급 수술은 필요하지 않다. Methotrexate는 확진 전 투여하면 불필요한 치료가 될 수 있다. 단순 추적검사보다 조직학적 확인이 우선이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "30세 여자가 질출혈과 하복부 통증으로 응급실에 왔다. 월경은 규칙적이었으며 마지막 월경 시작일은 7주 전이다. 혈압 100/70 mmHg, 맥박 90회/분. 골반 초음파 검사에서 자궁 내 임신낭이 보이지 않고, 난소 주변에 종물도 관찰되지 않았으며 복강 내 액체 고임도 없었다. 2일 전 자궁내막소파술을 시행하였으나 융모세포가 확인되지 않았다. 혈청 β-hCG 검사 결과는 다음과 같다: 4일 전 1500 mIU/mL, 2일 전 2200 mIU/mL, 당일 3500 mIU/mL. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "전자궁절제술 시행"}, {"letter": "B", "text": "Methotrexate 근육주사 시행"}, {"letter": "C", "text": "자궁내막 재소파술 시행"}, {"letter": "D", "text": "경과 관찰 및 β-hCG 추적 검사"}, {"letter": "E", "text": "진단적 복강경 수술 시행"}], "answer": "B", "explanation": "본 환자는 자궁내 소파술 후에도 융모가 없고 오히려 β-hCG가 상승하며(3500 mIU/mL) 초음파 검사에서 자궁 내 임신낭이 없는 상태로, β-hCG 2000 mIU/mL 이상에서 자궁 내 임신낭이 보이지 않으면 자궁외임신의 가능성이 매우 높다. 환자가 혈역학적으로 안정적이며, β-hCG 5000 mIU/mL 미만, 난소 종양이 없고 태아 심박동이 없는 경우 Methotrexate 근육주사가 1차 치료로 적절하다. 추적 관찰이나 재소파술은 지연을 초래할 수 있으며, 전자궁절제술은 불필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "난소꼬임(ovarian torsion)의 위험인자로 옳은 것은?", "options": [{"letter": "A", "text": "폐경 이후 에스트로겐 분비 감소"}, {"letter": "B", "text": "난소의 크기가 3cm 이하로 작은 경우"}, {"letter": "C", "text": "자궁내막의 기능층 비후"}, {"letter": "D", "text": "자궁경부의 편평원주상피접합부 변성"}, {"letter": "E", "text": "난소 크기가 5cm 이상으로 증가한 경우"}], "answer": "E", "explanation": "난소의 크기가 5cm 이상으로 커지면 무게가 증가하여 혈관 줄기를 중심으로 꼬일 위험이 높아집니다. 작은 난소나 다른 선택지는 난소꼬임의 직접적인 위험인자가 아닙니다. 따라서 정답은 \"난소 크기가 5cm 이상으로 증가한 경우\"입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "42세 여성이 수개월 전부터 발생한 월경과다증과 심한 월경통을 주소로 내원하였다. 골반진찰에서 자궁이 전반적으로 약간 커져 있고 유동성이 있었다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "자궁내막폴립이다"}, {"letter": "B", "text": "자궁근종이다"}, {"letter": "C", "text": "자궁경부상피내종양이다"}, {"letter": "D", "text": "자궁내막증이다"}, {"letter": "E", "text": "자궁선근증이다"}], "answer": "E", "explanation": "자궁선근증은 자궁근층 내 자궁내막 조직의 존재로 인해 자궁이 미만성으로 커지고 월경통과 월경과다가 나타난다. 자궁근종은 보다 국한된 결절성 비대를 보이며, 자궁내막폴립은 대개 부정출혈을 일으키고, 자궁내막증은 골반 통증을 유발하지만 자궁 크기 증가는 두드러지지 않는다. 자궁경부상피내종양은 질출혈을 보일 수 있으나 자궁 크기 변화는 없다. 따라서 가장 가능성 높은 진단은 자궁선근증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "에스트로겐 의존성이 아니므로 폐경 후에도 크기가 증가한다."}, {"letter": "B", "text": "약물 치료로 대부분 완치가 가능하다."}, {"letter": "C", "text": "주로 50대 이후의 여성에서 발생한다."}, {"letter": "D", "text": "월경과다, 골반 압박감 등이 주요 증상이다."}, {"letter": "E", "text": "대부분의 근종은 육종으로 진행한다."}], "answer": "D", "explanation": "자궁근종은 가임기 여성에서 발생하는 가장 흔한 양성 종양으로, 에스트로겐에 의존하여 성장한다. 주요 증상으로는 월경과다, 골반 통증 또는 압박감 등이 있으며, 폐경 후에는 호르몬 감소로 크기가 줄어드는 경향을 보인다. 악성 변화 가능성은 0.1% 미만으로 매우 드물며, 치료는 증상 완화를 목적으로 수술적 제거 등을 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "42세 여성이 월경량 증가와 심한 월경통을 주소로 내원하였다. 초음파에서 자궁근층 내에 경계가 불분명한 저음영 병변이 관찰되고, 조직검사에서 자궁내막 조직이 근층 내에 존재함이 확인되었다. FIGO AUB 분류(PALM-COEIN)에서 이 환자의 상태는 어디에 해당하는가?", "options": [{"letter": "A", "text": "Malignancy (AUB-M)"}, {"letter": "B", "text": "Leiomyoma (AUB-L)"}, {"letter": "C", "text": "Endometrial dysfunction (AUB-E)"}, {"letter": "D", "text": "Polyp (AUB-P)"}, {"letter": "E", "text": "Adenomyosis (AUB-A)"}], "answer": "E", "explanation": "자궁근층 내에 자궁내막 조직이 존재하는 것은 adenomyosis로, PALM-COEIN 중 AUB-A에 해당한다. Polyp은 자궁내강 내 용종, leiomyoma는 평활근종으로 자궁근층 내 발생하지만 경계가 뚜렷한 종괴이다. Malignancy는 암, endometrial dysfunction은 구조적 이상 없이 내막 기능 이상인 COEIN 분류에 속한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "35세 여성이 과다 월경과 불규칙 질출혈로 내원하였다. 골반초음파에서 자궁강 내에 2.5cm 크기의 경계가 명확한 저음영 종괴가 관찰되었다. 자궁내막과 종괴의 기원을 감별하기 위해 saline infusion sonohysterography를 시행하였고, 종괴는 자궁내막 바깥쪽에서 기원하여 자궁근층과 연결된 소견을 보였다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Adenomyosis"}, {"letter": "B", "text": "Endometrial cancer"}, {"letter": "C", "text": "Endometrial polyp"}, {"letter": "D", "text": "Submucosal uterine leiomyoma (fibroid)"}, {"letter": "E", "text": "Endometrial hyperplasia"}], "answer": "D", "explanation": "Saline infusion sonohysterography에서 종괴가 자궁내막이 아닌 자궁근층에서 기원하여 자궁강 내로 돌출된 소견은 Submucosal uterine leiomyoma (fibroid)에 특징적이다. Endometrial polyp은 자궁내막에서 발생하므로 감별된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "40세 여성이 월경과다와 부정출혈로 내원하였다. 질 초음파에서 자궁내막 두께가 12mm로 두꺼워져 있고, 식염수 주입 초음파검사(SIS)에서 자궁 내강에 동글동글한 종괴가 떠 있는 모습이 관찰되었다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "자궁절제술"}, {"letter": "B", "text": "GnRH 효현제 투여"}, {"letter": "C", "text": "자궁내시경하 용종절제술"}, {"letter": "D", "text": "자궁소파술(D&C)"}, {"letter": "E", "text": "경구 피임제 투여"}], "answer": "C", "explanation": "SIS에서 자궁내강에 떠 있는 종괴는 용종(polyp)의 전형적인 소견이다. 용종은 PALM-COEIN 분류 중 P에 해당하며, 진단 및 치료 목적으로 자궁내시경하 용종절제술이 가장 적절하다. 단순 소파술만으로는 완전 제거가 어려울 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "산과력 2-0-1-2인 37세 여성이 한 달간 지속된 질출혈로 내원하였다. 골반검사에서 자궁목은 정상, 초음파에서 자궁강에 인접한 3cm의 저음영 에코 덩이가 관찰되었다. 자궁경검사에서 자궁내강으로 돌출된 종괴가 보였다. 진단은?", "options": [{"letter": "A", "text": "자궁내막 용종 (endometrial polyp)"}, {"letter": "B", "text": "자궁내막 증식증 (endometrial hyperplasia)"}, {"letter": "C", "text": "자궁근종 (leiomyoma)"}, {"letter": "D", "text": "자궁내막증 (endometriosis)"}, {"letter": "E", "text": "자궁선근증 (adenomyosis)"}], "answer": "A", "explanation": "자궁내강 내에 국한된 저음영 에코의 종괴가 자궁경검사에서 자궁내막 용종의 전형적인 소견입니다. 자궁근종은 근층에 발생하며, 특히 점막하근종도 자궁강으로 돌출될 수 있으나 본 사례는 용종이 더 흔합니다. 자궁선근증은 자궁벽이 두꺼워지고, 자궁내막증은 자궁 외에 발생합니다. 자궁내막 증식증은 미만성 비후를 보입니다. 따라서 진단은 '자궁내막 용종 (endometrial polyp)' 입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종(leiomyoma)의 발생 위험을 증가시키는 요인으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "다산(3회 이상의 출산)"}, {"letter": "B", "text": "흡연"}, {"letter": "C", "text": "규칙적 운동"}, {"letter": "D", "text": "늦은 초경(15세 이후)"}, {"letter": "E", "text": "비만 (BMI ≥30)"}], "answer": "E", "explanation": "비만은 체내 estrogen 수준을 상승시켜 자궁근종의 발생 위험을 증가시킨다. '다산'은 출산 경험이 많을수록 위험도가 낮아져 보호 효과가 있다. '늦은 초경'은 에스트로겐 노출 기간이 짧아져 위험을 감소시킨다. '흡연'은 일부 연구에서 위험을 낮추는 방향으로 보고되나 논쟁의 여지가 있으며, 최소한 위험 증가 요인은 아니다. '규칙적 운동'은 전반적으로 보호 효과를 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "월경과다가 있는 38세 여성의 골반 초음파에서 자궁강 내로 돌출된 4cm 근종이 발견되었다. 자궁근종의 70%가 근층 내에 위치하고 30%가 자궁강 내로 나와 있다. FIGO 분류상 이 근종은 어느 유형에 해당하는가?", "options": [{"letter": "A", "text": "Type 0"}, {"letter": "B", "text": "Type 1"}, {"letter": "C", "text": "Type 4"}, {"letter": "D", "text": "Type 2"}, {"letter": "E", "text": "Type 3"}], "answer": "D", "explanation": "FIGO type 2는 점막하 근종의 50% 이상이 자궁근층 내에 잠겨 있는 경우로, 70%가 근층 내이므로 type 2에 해당한다. 'Type 0'은 유경성(pedunculated)으로 완전히 자궁강 내에 있는 경우이다. 'Type 1'은 근층 내로의 확장이 50% 미만일 때이다. 'Type 3'은 자궁근층 내에 위치하여 자궁내막 또는 장막과 닿아 있으나 변형을 일으키지 않는 경우이다. 'Type 4'는 순수한 근층내 근종이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종 환자에서 발생하는 비정상 자궁출혈(AUB)의 기전으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "점막하 근종을 덮는 내막의 궤양"}, {"letter": "B", "text": "자궁내막의 표면적 증가"}, {"letter": "C", "text": "난소에서의 에스트로겐 과잉 분비"}, {"letter": "D", "text": "자궁으로의 혈류 증가"}, {"letter": "E", "text": "자궁근의 정상 수축 방해"}], "answer": "C", "explanation": "자궁근종에 의한 출혈은 주로 국소적 요인(내막 표면적 증가, 혈류 증가, 수축 장애, 궤양)에 기인한다. 난소의 에스트로겐 분비 증가는 근종의 성장과 연관될 수 있으나 직접적인 출혈 기전은 아니다. 따라서 옳지 않은 설명이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다발성 근종이 의심되는 35세 여성에서, 작은 근종까지 정확히 발견하고자 할 때 가장 적절한 영상 검사는?", "options": [{"letter": "A", "text": "경질 초음파"}, {"letter": "B", "text": "자궁난관조영술(hysterosalpingography)"}, {"letter": "C", "text": "MRI"}, {"letter": "D", "text": "CT"}, {"letter": "E", "text": "경복부 초음파"}], "answer": "C", "explanation": "MRI는 연부조직 대비도가 높아 아주 작은 근종도 발견할 수 있어, 수술 전 mapping이나 작은 근종 감별에 유리하다. 경복부 초음파나 경질 초음파는 1차 검사이나 작은 근종을 놓칠 수 있다. CT는 불필요한 방사선 노출이 있고 작은 근종 식별이 어렵다. 자궁난관조영술은 자궁강 및 나팔관 개통성 평가에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다발성 자궁근종의 크기 감소를 위해 GnRH agonist를 6개월간 투여한 후 발생할 수 있는 가장 심각한 부작용은?", "options": [{"letter": "A", "text": "골밀도 감소"}, {"letter": "B", "text": "체중 증가"}, {"letter": "C", "text": "오심과 구토"}, {"letter": "D", "text": "간효소 상승"}, {"letter": "E", "text": "일시적 탈모"}], "answer": "A", "explanation": "GnRH agonist는 에스트로겐을 억제하여 가역적인 가성폐경을 유발한다. 장기 투여 시 폐경기와 유사한 골밀도 감소와 골다공증 위험이 가장 심각한 부작용이며, 이 때문에 add-back therapy가 필요할 수 있다. 오심, 탈모, 체중 증가, 간효소 상승은 GnRH agonist의 주요 부작용이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 자궁근종의 수술적 치료 적응증으로 가장 부적절한 것은?", "options": [{"letter": "A", "text": "3개월간 2cm 이상 자란 7cm 근종"}, {"letter": "B", "text": "우연히 발견된 무증상의 3cm 장막하 근종"}, {"letter": "C", "text": "거대 근종으로 인한 요관 폐색과 수신증"}, {"letter": "D", "text": "자궁강 변형을 유발하여 난임 진단을 받은 점막하 근종"}, {"letter": "E", "text": "약물 치료로 조절되지 않는 빈혈 동반 월경과다"}], "answer": "B", "explanation": "무증상의 작은 장막하 근종은 경과 관찰이 가능하며 수술이 필요하지 않다. 나머지 선택지들(약물 불응성 빈혈, 빠른 성장, 난임, 요관 폐색)은 모두 수술을 고려해야 하는 명확한 적응증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "점막하 자궁근종의 자궁근층 침범 정도를 평가하여 FIGO 분류를 결정하는 데 가장 적절한 영상 검사는 무엇인가?", "options": [{"letter": "A", "text": "복부 초음파 (Transabdominal US)"}, {"letter": "B", "text": "자궁난관조영술 (Hysterosalpingography)"}, {"letter": "C", "text": "자기공명영상 (MRI)"}, {"letter": "D", "text": "식염수 주입 초음파 (Saline infusion sonography)"}, {"letter": "E", "text": "질 초음파 (Transvaginal US)"}], "answer": "D", "explanation": "식염수 주입 초음파(Saline infusion sonography, SIS)는 자궁내강에 생리식염수를 주입하여 자궁내막과 근종의 경계를 명확히 관찰할 수 있게 한다. 이를 통해 점막하 근종이 자궁근층으로 얼마나 잠겨 있는지 정량적으로 평가할 수 있어 FIGO 분류(0-2형)의 결정에 가장 유용하다. 질 초음파만으로는 근종의 자궁강 내 돌출 정도를 정확히 평가하기 어렵다. MRI도 FIGO 분류에 도움이 되나, SIS는 실시간으로 간편하게 시행할 수 있는 일차적 방법이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종의 hysteroscopic resection 시 자궁 천공의 위험이 가장 높은 형태는?", "options": [{"letter": "A", "text": "일부가 자궁벽 내에 파묻힌 Type 1 점막하 근종"}, {"letter": "B", "text": "대부분 자궁벽 내에 위치한 Type 2 점막하 근종"}, {"letter": "C", "text": "장막하 근종 (subserosal myoma)"}, {"letter": "D", "text": "자궁강 내로 완전히 돌출된 Type 0 점막하 근종"}, {"letter": "E", "text": "인대 내 근종 (intraligamentary myoma)"}], "answer": "B", "explanation": "강의에서 'Type 0이 아니라 Type 1, Type 2인 경우에는 자궁 속에 파묻혀있어서 그것을 캐내고 깎아야 하는데, 이 벽을 파내고 파내다 보면 구멍이 날 수 있다'고 하였습니다. Type 2는 대부분 근층 내에 위치하여 절제 시 자궁벽을 깊이 깎아내야 하므로 천공 위험이 가장 높습니다. Type 0는 유경성으로 쉽게 절제되고, 장막하근종과 인대내근종은 대개 복강경이나 개복으로 접근하므로 hysteroscopic resection의 대상이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "35세 여성이 최근 6개월간 지속된 월경 과다를 주소로 내원하였다. 골반 초음파에서 자궁강 내로 돌출한 2×3cm 크기의 저음영 종괴가 관찰되었다. 식염수 주입 초음파검사에서 종괴는 자궁내막과 명확히 구분되었고, 자궁내시경에서 경부가 넓고 표면이 매끈한 구형의 종괴가 확인되었다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "자궁내막암"}, {"letter": "B", "text": "자궁선근증"}, {"letter": "C", "text": "자궁내막 증식증"}, {"letter": "D", "text": "점막하 자궁근종"}, {"letter": "E", "text": "자궁내막 용종"}], "answer": "D", "explanation": "점막하 자궁근종은 자궁근층에서 기원하여 자궁강 내로 돌출하는 종괴로, 초음파에서 저음영으로 보이며 자궁내시경에서 넓은 기저부와 매끈한 표면의 구형 종괴로 관찰된다. 반면 자궁내막 용종은 고음영으로 좁은 줄기에 매달린 모양이 일반적이다. 자궁내막 증식증은 미만성 비후를 보이고, 자궁내막암은 불규칙한 종괴와 조직 괴사가 동반된다. 자궁선근증은 자궁근층 내 에코 변화가 특징이다. 따라서 임상 소견과 영상의학적 소견을 바탕으로 점막하 자궁근종이 가장 의심된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 자궁내시경(hysteroscopy)의 금기에 해당하는 것은?", "options": [{"letter": "A", "text": "자궁경부암"}, {"letter": "B", "text": "점막하 자궁근종"}, {"letter": "C", "text": "자궁내막용종"}, {"letter": "D", "text": "자궁내 유착"}, {"letter": "E", "text": "기능성 자궁내막증식증"}], "answer": "A", "explanation": "자궁경부암이 있을 때 자궁내시경을 시행하면 악성 세포의 확산과 출혈을 유발할 수 있으므로 금기입니다. 자궁내막용종, 기능성 자궁내막증식증, 점막하 자궁근종, 자궁내 유착은 모두 자궁내시경의 적응증에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "40세 여성이 자궁근종으로 인한 심한 월경과다를 호소한다. 환자는 수술을 원하지 않으며, 호르몬 치료를 고려 중이다. 장기적인 가짜 폐경 상태를 유도하여 출혈을 감소시키기 위해 사용할 수 있는 약제는?", "options": [{"letter": "A", "text": "GnRH 효현제"}, {"letter": "B", "text": "경구 피임제"}, {"letter": "C", "text": "NSAIDs"}, {"letter": "D", "text": "트라넥삼산"}, {"letter": "E", "text": "프로게스틴 제제"}], "answer": "A", "explanation": "GnRH 효현제는 지속적으로 투여하면 뇌하수체의 gonadotropin 분비를 억제하여 에스트로겐과 프로게스테론 수치를 떨어뜨려 가짜 폐경 상태를 유도한다. 이를 통해 자궁내막이 증식되지 않아 출혈이 감소하므로, 수술을 원하지 않는 근종 환자에서 일시적인 월경 억제 목적으로 사용할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 131}, {"question": "자궁근종의 크기 감소를 위해 GnRH agonist를 투여할 때, 초기 1-2주 동안 발생할 수 있는 현상과 관련하여 환자에게 가장 중요하게 교육해야 할 내용은 무엇인가?", "options": [{"letter": "A", "text": "혈중 FSH/LH의 일시적 상승으로 배란이 유발되어 임신 가능성이 있다"}, {"letter": "B", "text": "에스트로겐 수치가 급격히 감소하여 골밀도가 감소할 수 있다"}, {"letter": "C", "text": "일시적인 두통과 오심이 발생할 수 있다"}, {"letter": "D", "text": "자궁근종이 오히려 급속히 성장할 수 있다"}, {"letter": "E", "text": "약물에 대한 알레르기 반응이 흔하게 발생한다"}], "answer": "A", "explanation": "GnRH agonist는 투여 초기에 뇌하수체의 GnRH 수용체를 일시적으로 자극하여 FSH와 LH의 급격한 상승(flare-up)을 유발하고, 이로 인해 난소의 에스트로겐 분비가 증가하여 배란이 유도될 수 있다. 따라서 이 기간 중 임신 가능성이 있으므로 환자에게 반드시 피임을 권고하고 이에 대해 교육해야 한다. 나머지 선택지는 GnRH agonist의 주된 초기 반응이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 131}, {"question": "45세 여성이 월경 과다와 골반 압박감을 주소로 내원하였다. 초음파에서 10cm 크기의 근층내 자궁근종이 관찰되었다. 그녀는 수술을 희망하지만, 빈혈(Hb 7.5g/dL)이 심하여 즉시 수술하기 어려운 상태이다. 수술 전 일시적인 증상 완화와 근종 크기 감소를 위해 가장 적절한 약물치료는?", "options": [{"letter": "A", "text": "프로게스테론 근육 주사"}, {"letter": "B", "text": "레보노르게스트렐 분비 자궁내 장치(LNG-IUD)"}, {"letter": "C", "text": "다나졸"}, {"letter": "D", "text": "경구 피임제"}, {"letter": "E", "text": "GnRH 작용제"}], "answer": "E", "explanation": "GnRH 작용제는 하수체를 탈감작시켜 에스트로겐 생성을 억제함으로써 무월경을 유도하고 자궁근종 크기를 약 30–50% 감소시킨다. 이를 통해 수술 전 빈혈을 교정하고 수술 난이도를 낮출 수 있다. 프로게스테론이나 경구 피임제는 출혈량을 줄일 수 있지만 근종 크기 감소 효과는 미미하다. LNG‑IUD는 점막하 근종이 아닌 경우에 효과적이며, 다나졸은 안드로겐 부작용으로 인해 현재는 잘 사용되지 않는다. 따라서 수술 전 최적의 약물은 GnRH 작용제이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 131}, {"question": "임신을 계획 중인 30세 여성이 증상이 있는 다발성 자궁근종으로 진단되었다. 다음 중 이 환자에게 가장 피해야 할 치료법은 무엇인가?", "options": [{"letter": "A", "text": "자궁내시경적 근종절제술"}, {"letter": "B", "text": "개복 근종절제술"}, {"letter": "C", "text": "Levonorgestrel 분비 자궁내 시스템(LNG-IUS)"}, {"letter": "D", "text": "자궁동맥색전술(UAE)"}, {"letter": "E", "text": "GnRH agonist 단기 투여 후 복강경 근종절제술"}], "answer": "D", "explanation": "자궁동맥색전술(UAE)은 자궁과 근종의 혈류를 차단하여 근종 크기를 감소시키나, 자궁내막까지 영향을 주어 자궁내막 괴사나 염증을 유발할 수 있고, 임신 능력을 저하시킬 수 있어 장래 임신을 원하는 여성에게는 권장되지 않는다. 근종절제술은 임신을 원하는 경우 자궁보존을 위해 시행하는 표준 수술이다. LNG-IUS는 임신 계획 시 제거하면 가역적이나, UAE보다는 덜 비가역적이나 활동적으로 임신을 계획하는 경우 일반적으로 피하지만, UAE처럼 절대적 금기는 아니다. 그러나 UAE가 더욱 명백히 금기인 치료이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 132}, {"question": "44세 여성이 과다 월경과 심한 월경통을 주소로 내원하였다. 골반초음파 및 MRI에서 자궁근층 내에 자궁내막 조직이 산재되어 있는 자궁선근증(Adenomyosis)으로 진단되었다. 환자는 자궁 절제를 강력히 거부하며 보존적 치료를 원한다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Combined oral contraceptives (COC) 복용"}, {"letter": "B", "text": "Gonadotropin-releasing hormone (GnRH) agonist 투여"}, {"letter": "C", "text": "Danazol 복용"}, {"letter": "D", "text": "Nonsteroidal anti-inflammatory drugs (NSAIDs) 복용"}, {"letter": "E", "text": "Levonorgestrel-releasing intrauterine system (LNG-IUS) 삽입"}], "answer": "E", "explanation": "자궁선근증으로 진단된 여성이 자궁 보존을 원할 경우, Levonorgestrel-releasing intrauterine system (LNG-IUS) 삽입이 월경량 감소와 통증 완화에 매우 효과적인 보존적 치료이다. GnRH agonist는 일시적인 효과만 있으며, 장기적인 치료로는 LNG-IUS가 선호된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 133}, {"question": "다음 중 adenomyosis에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁내막 조직이 자궁근층 내에 존재하여 자궁이 미만성으로 비대해진다."}, {"letter": "B", "text": "자궁근종과 유사하게 자궁강 내로 돌출되는 종괴 형태를 보인다."}, {"letter": "C", "text": "가임력 보존을 위해 반드시 자궁절제술이 필요하다."}, {"letter": "D", "text": "폐경 후 여성에서 호발하며 에스트로겐 단독 치료로 호전된다."}, {"letter": "E", "text": "복강경 소견에서 나팔관 주위의 밀집된 유착이 특징적이다."}], "answer": "A", "explanation": "Adenomyosis는 자궁내막 조직이 자궁근층 내에 존재하여 자궁이 미만성으로 비대해지는 질환으로, 월경통, 과다월경, 불임 등을 유발한다. 자궁강 내로 돌출되는 종괴는 submucosal myoma의 특징이며, 복강경 소견의 유착은 endometriosis에서 흔하다. Adenomyosis는 가임기 여성에서 호발하며 폐경 후 호전될 수 있고, 불임 치료를 위해 반드시 자궁절제술이 필요한 것은 아니다. 따라서 자궁내막 조직이 자궁근층 내에 존재하여 자궁이 미만성으로 비대해진다는 설명이 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 133}, {"question": "골반 초음파에서 다음과 같은 소견이 관찰되었다면 자궁선근증(adenomyosis)을 가장 강력히 시사하는 것은?", "options": [{"letter": "A", "text": "자궁 후벽의 비대칭적 비후와 불명확한 경계"}, {"letter": "B", "text": "자궁강 내로 돌출된 유경성 종괴"}, { . HPV in situ hybridization 검사에서 음성이었다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "외음부 상피내종양(VIN)"}, {"letter": "B", "text": "외음 파제트병(Paget disease)"}, {"letter": "C", "text": "컨딜로마 아쿠미나툼(condyloma acuminatum)"}, {"letter": "D", "text": "외음 경화 태선(lichen sclerosus)"}, {"letter": "E", "text": "외음 편평세포암"}], "answer": "D", "explanation": "경화 태선은 외음부의 만성 염증성 질환으로, 특징적인 조직 소견으로 표피의 위축, 진피 상부의 교원질 균질화 및 초자화, 그리고 그 아래 띠 모양의 림프구 침윤이 관찰된다. VIN은 상피 내 이형성 세포와 함께 HPV 양성인 경우가 많으며, 편평세포암은 침윤성 종양세포를 보인다. 파제트병은 큰 창백한 세포(Paget cell)가 표피 내에 존재한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 134}, {"question": "외음부 상피내종양(VIN)과 자궁경부 상피내종양(CIN)의 공통된 특징은 무엇인가?", "options": [{"letter": "A", "text": "고위험군 인유두종바이러스(HPV) 감염과 연관된다."}, {"letter": "B", "text": "조직학적으로 선세포(adenocarcinoma)에서 기원한다."}, {"letter": "C", "text": "치료로 방사선치료가 일차적으로 사용된다."}, {"letter": "D", "text": "호발 연령이 60대 이상이다."}, {"letter": "E", "text": "진단 시 파제트 세포(Paget cell)가 관찰된다."}], "answer": "A", "explanation": "\"고위험군 인유두종바이러스(HPV) 감염과 연관된다\"가 옳은 설명이다. VIN과 CIN 모두 고위험군 HPV 감염이 주요 원인이다. \"조직학적으로 선세포에서 기원한다\": 대부분 편평세포에서 기원하므로 틀리다. \"진단 시 파제트 세포가 관찰된다\": 파제트병에서 관찰되는 소견으로 VIN/CIN과 무관하다. \"치료로 방사선치료가 일차적으로 사용된다\": 주로 국소 절제나 레이저 치료를 하며 방사선은 일차 치료가 아니다. \"호발 연령이 60대 이상이다\": CIN은 더 젊은 연령에서 호발하며 VIN도 다양한 연령에서 발생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 134}, {"question": "외음부에 발생한 파제트병(Paget's disease)의 표준 치료로 가장 적절한 것은?", "options": [{"letter": "A", "text": "레이저 소작술(laser ablation)"}, {"letter": "B", "text": "광범위 국소 절제술(wide local excision)"}, {"letter": "C", "text": "이미퀴모드 크림 국소 도포(topical imiquimod)"}, {"letter": "D", "text": "근치적 외음부 절제술 및 양측 서혜부 림프절 절제술(radical vulvectomy with bilateral inguinal lymphadenectomy)"}, {"letter": "E", "text": "사이클로포스파미드 기반 복합항암화학요법(chemotherapy)"}], "answer": "B", "explanation": "\"광범위 국소 절제술(wide local excision)\"이 올바른 치료다. 외음 ext": "근치적 외음부 절제술 및 양측 서혜부 림프절 절제술"}, {"letter": "E", "text": "광범위 국소 절제술 (wide local excision)"}], "answer": "E", "explanation": "FIGO 병기 IA(침윤 깊이 1mm 이하, 종양 직경 2cm 이하)인 미세침윤성 외음부 편평세포암은 림프절 전이 위험이 매우 낮으므로(1% 미만) 광범위 국소 절제술(wide local excision)만으로 충분한 치료가 가능하며, 근치적 외음부 절제술이나 림프절 절제술은 불필요하다. 방사선 치료나 화학요법은 이용되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 135}, {"question": "다음 중 미세침윤성 외음부 편평세포암(T1A)의 올바른 정의는?", "options": [{"letter": "A", "text": "종양 직경 2cm 초과, 기질 침윤 1mm 이하"}, {"letter": "B", "text": "종양 직경 2cm 이하, 기질 침윤 1mm 이하"}, {"letter": "C", "text": "종양 직경 1cm 이하, 기질 침윤 1.5mm 이하"}, {"letter": "D", "text": "종양 직경 2cm 이하, 기질 침윤 2mm 이하"}, {"letter": "E", "text": "종양 직경 2cm 초과, 기질 침윤 2mm 초과"}], "answer": "B", "explanation": "\"종양 직경 2cm 이하, 기질 침윤 1mm 이하\"가 T1A의 정확한 정의이다. 이 기준을 충족해야 림프절 절제술을 생략할 수 있다. 다른 선택지들은 모두 잘못된 수치를 포함한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 136}, {"question": "원발성 질암(primary vaginal cancer)의 가장 흔한 조직학적 유형은?", "options": [{"letter": "A", "text": "악성 흑색종(malignant melanoma)"}, {"letter": "B", "text": "평활근육종(leiomyosarcoma)"}, {"letter": "C", "text": "선암(adenocarcinoma)"}, {"letter": "D", "text": "소세포암(small cell carcinoma)"}, {"letter": "E", "text": "편평세포암(squamous cell carcinoma)"}], "answer": "E", "explanation": "\"편평세포암(squamous cell carcinoma)\"이 정답이다. 원발성 질암의 80% 이상이 편평세포암으로 나타난다. \"선암\"은 자궁경부암이나 자궁내막암의 전이일 가능성이 높다. \"악성 흑색종\", \"평활근육종\", \"소세포암\"은 매우 드문 조직형이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 136}, {"question": "질 상피내종양(VAIN) 2등급으로 진단된 55세 여성에게 가장 적절한 치료는 무엇인가?", "options": [{"letter": "A", "text": "정기적인 질확대경 및 세포검사 추적 관찰"}, {"letter": "B", "text": "국소적 면역반응 유도를 위한 imiquimod 크림 도포"}, {"letter": "C", "text": "전자궁절제술 및 양측 난소난관절제술"}, {"letter": "D", "text": "선행 항암화학요법 후 방사선 치료"}, {"letter": "E", "text": "국소 레이저 소작술 또는 질 부분절제술"}], "answer": "E", "explanation": "VAIN 1은 CIN 1과 마찬가지로 추적 관찰이 가능하지만, VAIN 2 이상에서는 자궁경부 상피내종양과 달리 질 상피의 특성상 적극적인 국소 치료를 권장한다. 국소 레이저 소작술, 질 부분절제술, 또는 병변이 광범위한 경우 항암제(5-FU) 질 내 투여 등이 시행된다. 정기적 추적 관찰은 저등급 병변에 적합하고, 전자궁절제술은 과도한 치료이다. 방사선 치료는 침윤성 질암에서 고려되며, imiquimod는 외음부 상피내종양에 사용되나 질에는 일반적이지 않다. 따라서 국소 레이저 소작술 또는 질 부분절제술이 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 136}, {"question": "25세 여성이 3개월간의 무월경과 간헐적 질출혈로 병원에 왔다. 혈청 β-hCG는 200,000 mIU/mL로 상승되어 있고, 골반 초음파 검사에서 자궁 내에 다수의 작은 낭성 공간이 관찰되며 태아는 보이지 않는다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "자궁동맥색전술"}, {"letter": "B", "text": "Methotrexate 근육주사"}, {"letter": "C", "text": "경과 관찰"}, {"letter": "D", "text": "흡인소파술"}, {"letter": "E", "text": "전자궁절제술"}], "answer": "D", "explanation": "포상기태(complete hydatidiform mole)의 치료는 흡인소파술로 자궁 내용물을 제거하고, 이후 β-hCG 추적 검사를 통해 완전 관해 여부를 확인합니다. Methotrexate는 자궁외임신에 사용되며, 자궁동맥색전술이나 전자궁절제술은 가임기 여성에서 일차 치료가 아닙니다. 경과 관찰은 부적절합니다. 정답은 '흡인소파술'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 137}, {"question": "임신 5주 4일의 27세 초임부가 산전 초음파 검사를 위해 내원하였다. 질초음파에서 자궁 내 평균 직경 8mm의 임신낭과 난황(yolk sac)이 관찰되지만, 태아(pole)와 심박동은 확인되지 않는다. 환자는 통증이나 질출혈이 없다. 적절한 다음 단계는?", "options": [{"letter": "A", "text": "황체호르몬(progesterone) 보충"}, {"letter": "B", "text": "즉시 자궁내막소파술"}, {"letter": "C", "text": "혈청 β-hCG 단일 측정"}, {"letter": "D", "text": "Methotrexate 투여"}, {"letter": "E", "text": "1-2주 후 초음파 재검사"}], "answer": "E", "explanation": "초기 임신에서 태아가 보이지 않는 경우, 임신 주수가 정확하지 않거나 발생 지연일 수 있으므로, 안정적인 환자에서는 1~2주 후 추적 초음파로 심박동을 확인하는 것이 적절합니다. 즉시 소파술은 확진 전에 시행하지 않으며, 혈청 β-hCG 단일 측정은 추세를 알 수 없고, 프로게스테론 보충이나 methotrexate는 적응증이 아닙니다. 정답은 '1-2주 후 초음파 재검사'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 137}, {"question": "완전포상기태(complete hyd : "A", "explanation": "WHO/FIGO 예후 점수는 나이(≥40세 1점), 선행임신 종류(포상기태 0점, 유산 1점, 만삭 2점), 진단까지의 간격(>12개월 4점), 치료 전 hCG(>100,000 IU 4점), 전이 부위(폐 0점, 뇌·간 4점), 전이 개수(1~4개 1점), 이전 항암치료(없음 0점) 등의 합계로 계산한다. 제시된 환자에서 점수를 합산하면 45세(1) + 만삭분만(2) + 간격 14개월(4) + hCG 150,000(4) + 폐전이 3개(1) + 무치료(0) = 12점으로 7점 이상이므로 고위험군에 해당한다. 나머지 보기는 모두 6점 이하로 저위험군이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 138}, {"question": "임신성 융모성 종양(GTN)으로 진단된 28세 여성이다. FIGO 병기 I, WHO/FIGO 예후 점수 3점이며 가임력 보존을 강력히 원하고 있다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "MTX, actinomycin D, cyclophosphamide를 이용한 MAC 복합요법"}, {"letter": "B", "text": "전자궁절제술 및 경기적 추적 관찰"}, {"letter": "C", "text": "흡인소파술 후 정기적 HCG 추적 관찰"}, {"letter": "D", "text": "MTX 또는 actinomycin D 단일제 항암화학요법"}, {"letter": "E", "text": "cisplatin 기반 동시 항암방사선치료"}], "answer": "D", "explanation": "병기 I, 예후 점수 6점 이하의 저위험군 GTN에서 가임력 보존을 원하는 경우 1차 치료로 단일 항암화학요법이 추천된다. MTX 또는 actinomycin D가 대표적이며, 완치율이 높다. 전자궁절제술은 가임력 보존을 원하지 않거나 저항성인 경우 고려되고, 복합 항암요법은 고위험군에 사용된다. 방사선 치료나 소파술은 GTN의 표준 치료가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 138}, {"question": "골반 장기 탈출증을 유발하는 가장 주요한 원인은 무엇인가?", "options": [{"letter": "A", "text": "유전적 결합 조직 질환 (genetic connective tissue disease)"}, {"letter": "B", "text": "만성 변비 (chronic constipation)"}, {"letter": "C", "text": "폐경 (menopause)"}, {"letter": "D", "text": "분만 (childbirth)"}, {"letter": "E", "text": "비만 (obesity)"}], "answer": "D", "explanation": "교수님께서 가장 큰 원인으로 분만을 지목하셨다. 분만 과정에서 골반 기저의 근육, 인대, 근막이 손상되고, 특히 혈류가 부족한 인대와 근막은 완전히 회복되지 못한 채 섬유화만 진행된다. 이후 복압이 증가하면 이 구조물들이 쉽게 찢어져 탈출증이 발생한다. 다른 요인들도 기여할 수 있으나, 분만이 가장 흔하고 결정적인 원인이다. 따라서 '분만'이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "다음 중 골반장기 탈출증의 종류와 탈출하는 장기의 연결이 옳은 것은?", "options": [{"letter": "A", "text": "Enterocele – 소장"}, {"letter": "B", "text": "Rectocele – 방광"}, {"letter": "C", "text": "Urethrocele – 질 천정"}, {"letter": "D", "text": "Cystocele – 자궁"}, {"letter": "E", "text": "Uterine prolapse – 직장"}], "answer": "A", "explanation": "Enterocele은 소장이 질 내로 탈출하는 것을 의미한다. Cystocele은 방광이 질 전벽으로 탈출하는 것이고, Rectocele은 직장이 질 후벽으로 탈출하는 것이다. Uterine prolapse는 자궁이 탈출하는 것이며, Urethrocele은 요도가 탈출하는 것이다. 따라서 Enterocele과 소장을 연결한 것이 옳다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "다회 분만력이 있는 여성에서 자궁의 retroversion이 관찰되는 주된 이유는?", "options": [{"letter": "A", "text": "방광 팽창에 의한 압박"}, {"letter": "B", "text": "자궁근종이 발생하여"}, {"letter": "C", "text": "자궁지지 인대의 이완"}, {"letter": "D", "text": "골반근육의 비대"}, {"letter": "E", "text": "요도 괄약근의 약화"}], "answer": "C", "explanation": "분만 시 자궁을 지지하는 uterosacral ligament, cardinal ligament 등의 인대가 과도하게 늘어나며, 분만 후에도 근육과 달리 인대는 정상 길이로 완전히 회복되지 못한다. 이로 인해 자궁이 후경(retroversion)되는 경우가 흔하다. 다른 선택지는 자궁 위치 변화의 주된 기전이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "골반장기 탈출증으로 인해 질 점막이 장기간 외부로 노출될 때 발생할 수 있는 합병증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "질염"}, {"letter": "B", "text": "질암"}, {"letter": "C", "text": "난소 낭종"}, {"letter": "D", "text": "점막 궤양"}, {"letter": "E", "text": "자궁경부 상피내종양"}], "answer": "D", "explanation": "탈출된 질 점막은 외부 환경에 노출되어 마찰과 자극을 받아 쉽게 손상되고 궤양이 발생할 수 있다. 이는 감염의 위험을 높이지만, 질암이나 자궁경부 상피내종양은 직접적인 합병증이 아니며, 질염은 일차적 원인이라기보다 이차적 감염에 가깝다. 난소 낭종은 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "회음체(perineal body)의 유지 기능 결손으로 인해 요도의 과운동성(urethral hypermobility)이 발생할 때 주로 나타나는 임상 질환은?", "options": [{"letter": "A", "text": "복압성 요실금"}, {"letter": "B", "text": "방광류"}, {"letter": "C", "text": "직장류"}, {"letter": "D", "text": "방광옆결손(paravaginal defect)"}, {"letter": "E", "text": "자궁탈출증"}], "answer": "A", "explanation": "회음체(perineal body)는 골반 바닥의 중요한 지지 구조로, 요도를 후방에서 지지하는 역할을 합니다. 이의 결손은 요도의 과운동성을 초래하여 복압이 증가할 때 요실금이 발생하는 복압성 요실금(stress urinary incontinence)의 주요한 원인이 됩니다. 따라서 '복압성 요실금'이 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "골반장기탈출증의 가장 흔한 원인은 무엇인가?", "options": [{"letter": "A", "text": "만성 변비 (Chronic constipation)"}, {"letter": "B", "text": "자궁절제술 (Hysterectomy)"}, {"letter": "C", "text": "비만 (Obesity)"}, {"letter": "D", "text": "질식 분만 (Vaginal delivery)"}, {"letter": "E", "text": "제왕절개 분만 (Cesarean delivery)"}], "answer": "D", "explanation": "강의에서 ‘가장 흔한 원인은 질식 분만’이라고 명시적으로 언급하였습니다. 비만, 만성 변비, 자궁절제술 등도 위험 인자이지만, 질식 분만이 가장 직접적이고 흔한 기계적 손상 원인입니다. 제왕절개 분만은 질식 분만보다 위험도가 낮을 수 있지만 골반장기탈출증을 완전히 예방하지는 못합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "65세 여성이 질 밖으로 무언가 빠져나오는 느낌을 호소한다. 질 이완 소견은 없으나 자궁경부가 비정상적으로 길게 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Enterocele"}, {"letter": "B", "text": "Cervical elongation"}, {"letter": "C", "text": "Uterine prolapse"}, {"letter": "D", "text": "Cystocele"}, {"letter": "E", "text": "Rectocele"}], "answer": "B", "explanation": "강의에서 자궁경부만 길어져서 질 밖으로 돌출되는 경우(cervical elongation)는 질벽 이완이 동반되지 않아 자궁탈출증과 감별이 필요하다고 하였습니다. Uterine prolapse는 일반적으로 질벽 이완과 함께 자궁 전체가 하강하며, cystocele/rectocele은 전/후벽 팽윤이 관찰됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "골반 지지 구조의 Level 1에 해당하는 인대가 손상되었을 때 가장 흔히 발생하는 골반장기 탈출증은?", "options": [{"letter": "A", "text": "Urethrocele"}, {"letter": "B", "text": "Perineal body defect"}, {"letter": "C", "text": "Uterine prolapse"}, {"letter": "D", "text": "Rectocele"}, {"letter": "E", "text": "Cystocele"}], "answer": "C", "explanation": "Level 1은 질 상부로서 uterosacral ligament와 cardinal ligament에 의해 지지된다. 이 구조물이 손상되면 자궁경부나 자궁이 하강하는 uterine prolapse, 또는 질 천정 탈출(vaginal vault prolapse)이 발생한다. Cystocele과 rectocele은 Level 2, urethrocele과 perineal body defect는 Level 3에서 주로 발생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 140}, {"question": "POP-Q system에서 Aa point에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "질 입구와 요도 사이의 거리를 의미한다."}, {"letter": "B", "text": "Hymen에서 가장 가까운 질 후벽의 점이다."}, {"letter": "C", "text": "Hymen으로부터 질 전벽 3cm 상방에 위치한 고정된 점이다."}, {"letter": "D", "text": "자궁경부의 위치를 나타낸다."}, {"letter": "E", "text": "질 전벽에서 가장 아래로 처진 점이다."}], "answer": "C", "explanation": "Aa point는 처녀막(hymen)으로부터 질 전벽(anterior vaginal wall) 쪽으로 3cm 떨어진 고정된 지점이다. '질 전벽에서 가장 아래로 처진 점'은 Ba point를 의미한다. 자궁경부 위치는 C point로 표기하며, 질 입구와 요도 사이 거리는 genital hiatus를 측정한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "55세 여성의 POP-Q 측정 결과가 다음과 같다: Aa +2, Ba +5, C -3, Ap -3, Bp -2, TVL 8. 이 환자에서 가장 두드러진 골반장기 탈출증은?", "options": [{"letter": "A", "text": "Cystocele"}, {"letter": "B", "text": "Rectocele"}, {"letter": "C", "text": "Enterocele"}, {"letter": "D", "text": "Vaginal vault prolapse"}, {"letter": "E", "text": "Uterine prolapse"}], "answer": "A", "explanation": "Aa +2와 Ba +5는 질 전벽(anterior wall)이 처녀막을 기준으로 상당히 밖으로 돌출되었음을 의미하므로 방광 탈출(cystocele)이 현저하다. C point가 -3으로 정상 범위이므로 자궁 탈출은 없으며, Ap와 Bp가 각각 -3, -2로 후벽 탈출도 경미하다. 따라서 주된 소견은 cystocele이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "골반장기 탈출증의 stage 2에 해당하는 탈출의 범위는?", "options": [{"letter": "A", "text": "Hymen 상방 1cm 이상"}, {"letter": "B", "text": "Total vaginal length의 －2cm까지"}, {"letter": "C", "text": "Hymen 하방 2cm 이상"}, {"letter": "D", "text": "Complete eversion of the vagina"}, {"letter": "E", "text": "Hymen 기준 ±1cm 이내"}], "answer": "E", "explanation": "Stage 2는 탈출이 처녀막(hymen)을 기준으로 -1cm부터 +1cm 사이에 위치하는 상태로 정의된다. Hymen 상방 1cm 이상은 stage 1, hymen 하방 2cm 이상은 stage 3, TVL-2 cm까지는 stage 3, 완전 질 외번은 stage 4이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "요실금에 대한 검사에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Q-tip test에서 30도 이상의 각도는 정상 범위를 의미한다."}, {"letter": "B", "text": "Urodynamic study상 배뇨근 과활동성은 복압성 요실금의 전형적인 소견이다."}, {"letter": "C", "text": "VLPP 검사에서 60 cmH2O 미만은 ISD를 시사한다."}, {"letter": "D", "text": "Pad test는 요실금의 유형을 감별하기 위해 24시간 동안 시행한다."}, {"letter": "E", "text": "Cough stress test는 방경을 삽입하고 방경 내압을 측정하는 검사이다."}], "answer": "C", "explanation": "VLPP(Valsalva leak point pressure)는 복압을 증가시켜 요누출이 시작되는 최소 방광내압을 측정하는 검사로, 60 cmH2O 미만인 경우 내재성 요도괄약근 결함(intrinsic sphincter deficiency, ISD)을 강하게 시사합니다. ISD는 복압성 요실금의 수술적 치료 방침을 결정하는 중요한 지표입니다. 따라서 'VLPP 검사에서 60 cmH2O 미만은 ISD를 시사한다'가 옳은 설명입니다. 다른 검사들은 Q-tip test에서 30도 이상은 urethral hypermobility의 양성 소견이며, 배뇨근 과활동성은 절박성 요실금의 소견, 패드 검사는 요실금의 유형 감별이 아닌 양적 평가, 기침 유발 검사는 방광경 삽입 없이 시행한다는 점에서 틀립니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "POP-Q system에서 자궁천골인대(uterosacral ligament)가 부착되는 부위로, 후질원개(posterior fornix)에 해당하는 지표는 무엇인가?", "options": [{"letter": "A", "text": "Aa"}, {"letter": "B", "text": "Ap"}, {"letter": "C", "text": "Ba"}, {"letter": "D", "text": "C"}, {"letter": "E", "text": "D"}], "answer": "E", "explanation": "POP-Q system에서 D point는 후질원개의 위치를 나타내며, 자궁이 있는 여성에서 자궁천골인대(uterosacral ligament)가 부착되는 부위입니다. 이 지표는 자궁탈출증에서 자궁경부의 신장(elongation)과 인대 손상을 감별하는 데 유용하며, 질의 최상단 위치를 반영합니다. 따라서 'D'가 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "POP-Q 측정 결과: Aa -3, Ba -3, C -6, Ap +2, Bp +5, TVL 8. 이 환자에서 가장 두드러진 탈출증은?", "options": [{"letter": "A", "text": "Enterocele"}, {"letter": "B", "text": "Rectocele"}, {"letter": "C", "text": "Uterine prolapse"}, {"letter": "D", "text": "Cystocele"}, {"letter": "E", "text": "Vaginal vault prolapse"}], "answer": "B", "explanation": "전방 질벽 지표(Aa, Ba)는 정상 범위이나 후방 질벽 지표(Ap, Bp)가 양성으로 돌출되어 있어 직장류(rectocele)에 부합한다. 특히 Bp가 +5로 가장 의존적인 부위가 하이멘 밖으로 상당히 나와 있음을 알 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "복압성 요실금을 호소하는 55세 여성에서 Q-tip test 35°, Valsalva Leak Point Pressure (VLPP) 100 cmH2O 소견을 보였다. 이 환자에게 가장 가능성이 높은 병태생리는?", "options": [{"letter": "A", "text": "Neurogenic bladder"}, {"letter": "B", "text": "Detrusor overactivity"}, {"letter": "C", "text": "Intrinsic sphincter deficiency"}, {"letter": "D", "text": "Overflow incontinence"}, {"letter": "E", "text": "Urethral hypermobility"}], "answer": "E", "explanation": "Q-tip test 35°와 VLPP 100 cmH2O는 요도 과가동성(urethral hypermobility)을 시사합니다. Q-tip 각도가 30° 이상이면 hypermobility, VLPP가 90 cmH2O 이상이면 내인성 괄약근 기능이 보존된 것으로 판단합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "골반장기 탈출증 환자가 “재채기를 하거나 계단을 내려갈 때 소변이 새어 나온다”고 호소한다. 이 증상에 해당하는 것은?", "options": [{"letter": "A", "text": "요폐"}, {"letter": "B", "text": "빈뇨"}, {"letter": "C", "text": "복압성 요실금"}, {"letter": "D", "text": "야간뇨"}, {"letter": "E", "text": "절박성 요실금"}], "answer": "C", "explanation": "재채기, 기침, 계단 보행 등 복압이 증가할 때 불수의적으로 소변이 새는 현상은 복압성 요실금(stress urinary incontinence)의 전형적 증상이다. 절박성 요실금은 강한 요의 후 참지 못하고 배뇨하는 것이며, 빈뇨, 야간뇨, 요폐는 다른 배뇨 양상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "골반장기 탈출증 환자가 갑자기 소변이 마려워 참기 어려운 상태에서 화장실에 도착하기 전에 소변을 지리는 증상을 무엇이라 하는가?", "options": [{"letter": "A", "text": "복압성 요실금"}, {"letter": "B", "text": "야간뇨"}, {"letter": "C", "text": "요폐"}, {"letter": "D", "text": "절박성 요실금"}, {"letter": "E", "text": "빈뇨"}], "answer": "D", "explanation": "절박성 요실금은 갑작스럽고 강한 요의를 느끼며 화장실에 도착하기 전에 소변을 지리는 증상으로, 복압성 요실금과는 달리 방광 충만감이 동반된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "Cystocele가 있는 환자가 소변을 보기 어려워할 때, 일시적으로 배뇨를 가능하게 하는 방법으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "이뇨제 복용"}, {"letter": "B", "text": "이완 운동"}, {"letter": "C", "text": "변비약 복용"}, {"letter": "D", "text": "하복부 마사지"}, {"letter": "E", "text": "손가락으로 탈출된 방광을 질 내로 밀어 넣기"}], "answer": "E", "explanation": "Cystocele로 인해 요도가 꺾여 배뇨가 어려울 때 손가락으로 탈출된 방광을 질 내로 밀어 넣으면 요도의 굴곡이 펴지면서 소변이 나올 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "자궁탈출증 환자에서 흔히 호소하는, 질 쪽으로 무언가 무겁게 내려앉는 듯한 느낌을 가장 적절히 표현한 용어는?", "options": [{"letter": "A", "text": "좌골신경통"}, {"letter": "B", "text": "둔중감 (bearing-down)"}, {"letter": "C", "text": "하지 부종"}, {"letter": "D", "text": "복부 팽만감"}, {"letter": "E", "text": "요통"}], "answer": "B", "explanation": "자궁탈출증 환자에서 나타나는 둔중감(bearing-down)은 질 쪽으로 묵직하게 내려앉는 듯한 느낌을 말하며, 골반 내 장기가 하강함에 따라 발생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "65세 여성이 질 밖으로 빠지는 느낌과 함께 질 내 종괴를 주소로 내원하였다. 검진 상 자궁은 정상 위치에 있고, 질 전벽의 돌출은 경미하였으나, 자궁경부로부터 단단한 종괴가 질 밖으로 돌출되어 있었다. 초음파에서 자궁저부에 위치한 근종이 자궁경관을 통해 질 내로 탈출된 소견을 보였다. 이러한 경우에 해당하는 진단은?", "options": [{"letter": "A", "text": "자궁탈출증(Uterine prolapse)"}, {"letter": "B", "text": "자궁경관 비대증(Cervical elongation)"}, {"letter": "C", "text": "직장류(Rectocele)"}, {"letter": "D", "text": "방광류(Cystocele)"}, {"letter": "E", "text": "점막하 자궁근종 탈출(Prolapsing submucosal myoma)"}], "answer": "E", "explanation": "골반장기탈출증과 유사한 증상을 보이는 질환 중 하나는 점막하 자궁근종의 탈출입니다. 자궁근종이 자궁경관을 통해 질 밖으로 돌출되면 마치 방광류나 자궁탈출처럼 보일 수 있습니다. 초음파 등을 통해 자궁 내에서 기원한 종괴임을 확인하여 감별할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 145}, {"question": "복압성 요실금 환자에게 가장 먼저 권고되는 치료 방법은?", "options": [{"letter": "A", "text": "중부 요도 슬링 수술"}, {"letter": "B", "text": "요도 벌킹제재 주입술"}, {"letter": "C", "text": "Burch 방광경부 현수술"}, {"letter": "D", "text": "골반저근 운동 (Kegel exercise)"}, {"letter": "E", "text": "α-adrenergic agonist 약물 투여"}], "answer": "D", "explanation": "복압성 요실금의 치료는 보존적 요법이 우선이며, 골반저근 운동(Kegel exercise)은 첫 번째로 권고되는 비수술적 치료입니다. 생활 습관 교정, 방광 훈련 등과 병행하며, 증상이 지속되거나 중증인 경우 수술적 치료를 고려할 수 있습니다. 따라서 '골반저근 운동 (Kegel exercise)'가 가장 먼저 권고되는 치료 방법입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "Rectocele이 있는 환자가 배변 시 변이 잘 나오지 않을 때, 배변을 용이하게 하기 위해 시행할 수 있는 방법은?", "options": [{"letter": "A", "text": "관장"}, {"letter": "B", "text": "손가락으로 질 후벽 쪽 탈출된 직장을 밀어 올리기"}, {"letter": "C", "text": "풍선 카테터 삽입"}, {"letter": "D", "text": "복대 착용"}, {"letter": "E", "text": "복근 강화 운동"}], "answer": "B", "explanation": "Rectocele 환자에서 변이 직장류 내에 고여 배변이 어려울 때 손가락으로 질 후벽 쪽으로 탈출된 직장을 밀어 올리면 변 배출이 용이해진다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "골반저근 강화를 위한 Kegel 운동의 올바른 기전은?", "options": [{"letter": "A", "text": "복압을 증가시켜 골반 장기를 상승시킨다"}, {"letter": "B", "text": "유산소 운동으로 체중 감소를 유도한다"}, {"letter": "C", "text": "복근 운동을 통해 전반적인 복근을 강화한다"}, {"letter": "D", "text": "항문괄약근 수축을 통해 질 주위 근육을 간접적으로 강화한다"}, {"letter": "E", "text": "대퇴근육을 강화하여 골반을 안정화한다"}], "answer": "D", "explanation": "강의에서 Kegel 운동은 배변을 참을 때처럼 항문괄약근을 수축함으로써 질 근육과 신경 지배를 공유하는 골반저근(levator ani 등)을 간접적으로 단련시키는 것이라고 설명하였습니다. 직접적인 질 수축은 학습되어 있지 않으므로, 이러한 기전을 이용합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "Vaginal pessary 치료의 금기증으로 옳은 것은?", "options": [{"letter": "A", "text": "수술을 원하지 않는 고령 환자"}, {"letter": "B", "text": "폐경 후 여성"}, {"letter": "C", "text": "경도의 자궁탈출증 (Stage 1–2)"}, {"letter": "D", "text": "질식분만 후 발생한 cystocele"}, {"letter": "E", "text": "활동성 골반염증질환 (Pelvic inflammatory disease)"}], "answer": "E", "explanation": "Pessary는 이물질로 작용하므로, 활동성 감염(골반염증질환, 심한 질염 등)이 있는 경우 염증을 악화시킬 수 있어 금기입니다. 경도의 탈출증, cystocele, 수술 거부, 폐경 상태 자체는 적응증에 해당하며 금기가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "51세 여자 환자가 기침, 무거운 것을 들 때 발생하는 불수의적인 요누출, 빈뇨, 배뇨통을 주소로 내원하였다. 과거력 상 3명의 자연분만 기왕력이 있었다. 소변검사 RBC 1-4/HPF, WBC 1-4/HPF, Q-tip test 40도, VLPP 90cmH2O였다. 적절한 치료는?", "options": [{"letter": "A", "text": "중부요도 슬링 수술(midurethral sling)"}, {"letter": "B", "text": "질내 페서리(pessary)"}, {"letter": "C", "text": "Kegel 운동"}, {"letter": "D", "text": "자궁적출술"}, {"letter": "E", "text": "방광경부 현수술(Burch colposuspension)"}], "answer": "A", "explanation": "Q-tip test 40도는 요도과운동성을, VLPP 90cmH2O는 경증의 요실금을 의미하므로 중부요도 슬링 수술이 가장 적절한 치료이다. Kegel 운동이나 질내 페서리는 1차 치료로 시도할 수 있으나, 증상이 지속될 경우 수술적 치료가 필요하며 Burch colposuspension은 현재 잘 사용되지 않는다. 자궁적출술은 요실금의 직접적인 치료가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "골반장기탈출증 환자에게 비수술적 치료의 일환으로 권장되는 생활 방식 개선으로 옳은 것은?", "options": [{"letter": "A", "text": "변비 예방을 위해 섬유질 섭취를 제한한다"}, {"letter": "B", "text": "쪼그려 앉아서 생활하는 습관을 장려한다"}, {"letter": "C", "text": "복압을 증가시키지 않기 위해 기침을 참는 연습을 한다"}, {"letter": "D", "text": "하체 근육 강화를 위해 무거운 물건 드는 운동을 권장한다"}, {"letter": "E", "text": "비만인 경우 체중 감량을 권장한다"}], "answer": "E", "explanation": "골반장기탈출증의 비수술적 치료 중 생활 방식 개선으로는 비만인 경우 체중 감량이 중요합니다. 비만은 복압을 상승시켜 골반저에 부담을 주므로 체중 감량을 통해 증상 완화와 진행 예방을 도모할 수 있습니다. 반면 기침을 참기보다는 기침의 원인을 치료해야 하며, 변비 예방을 위해서는 섬유질 섭취를 늘려야 합니다. 무거운 물건을 드는 행위나 쪼그려 앉는 자세는 복압을 증가시키므로 피해야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "골반장기탈출증에서 POP-Q 분류상 Stage 2에 해당하는 환자에게 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "Colpocleisis"}, {"letter": "B", "text": "질식 자궁적출술"}, {"letter": "C", "text": "비수술적 치료(생활습관 개선 및 Kegel 운동)"}, {"letter": "D", "text": "전방 질벽 재건술"}, {"letter": "E", "text": "천골가시인대 고정술"}], "answer": "C", "explanation": "POP-Q Stage 1-2에서는 증상이 경미한 경우가 많아 비수술적 치료가 우선 고려됩니다. 생활습관 개선, 체중 감량, Kegel 운동 등이 포함됩니다. Stage 3 이상에서는 수술적 치료가 필요할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "전자궁절제술 후 질봉합부 열개(vaginal cuff dehiscence) 예방을 위한 교육으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "수술 직후부터 가벼운 조깅을 권장한다."}, {"letter": "B", "text": "변비 예방을 위해 하루 3회 관장을 시행한다."}, {"letter": "C", "text": "성관계는 수술 후 2주부터 가능하다."}, {"letter": "D", "text": "수술 후 1주일부터 복압을 높이는 운동을 시작한다."}, {"letter": "E", "text": "6주간 5kg 이상의 무거운 물건을 들지 않도록 한다."}], "answer": "E", "explanation": "전자궁절제술 후 질봉합부 열개를 예방하기 위해서는 5kg(약 10파운드) 이상의 무거운 물건을 들거나 배에 힘을 주는 행위를 6주간 피하도록 교육해야 합니다. 조기 운동이나 성관계, 복압을 높이는 활동은 열개 위험을 높이므로 금기입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "다음 중 colpocleisis의 가장 적절한 적응증은?", "options": [{"letter": "A", "text": "향후 임신을 원하는 40세 여성의 자궁탈출증"}, {"letter": "B", "text": "성생활을 원하지 않는 78세 여성의 중증 자궁탈출증"}, {"letter": "C", "text": "무증상인 65세 여성의 Stage 1 탈출증"}, {"letter": "D", "text": "분만 직후 발생한 30세 여성의 경도 rectocele"}, {"letter": "E", "text": "성생활 유지를 원하는 55세 여성의 cystocele"}], "answer": "B", "explanation": "Colpocleisis는 질을 폐쇄하는 수술이므로, 더 이상 성관계를 원하지 않고 향후 임신 계획이 없는 고령의 중증 탈출증 환자에게 적합합니다. 젊은 여성, 성생활 유지를 원하는 경우, 경미한 탈출증에는 시행하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "전방 질벽 재건술(anterior colporrhaphy)의 재발률에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "재발률은 35~50%이며 주된 원인은 지속적인 노화이다"}, {"letter": "B", "text": "재발률은 약 5~10%로 매우 낮다"}, {"letter": "C", "text": "수술 중 mesh 사용이 재발을 증가시킨다"}, {"letter": "D", "text": "대부분 수술 1년 이내에 발생하며 이후에는 재발하지 않는다"}, {"letter": "E", "text": "posterior colporrhaphy에 비해 재발률이 유의하게 낮다"}], "answer": "A", "explanation": "강의에서 anterior/posterior colporrhaphy의 재발률은 35~50%에 달하며, 원인은 근육과 결합조직의 지속적인 노화 및 복압 상승 인자 제거 실패라고 하였습니다. Mesh는 오히려 미란 등의 문제로 현재 잘 사용하지 않으며, 재발은 장기간에 걸쳐 발생할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "55세 여성이 질 앞벽의 돌출과 잔뇨감을 호소한다. 검사에서 cystocele이 확인되었다. 가장 적절한 수술적 치료는?", "options": [{"letter": "A", "text": "Colpocleisis"}, {"letter": "B", "text": "Sacrospinous suspension"}, {"letter": "C", "text": "Perineorrhaphy"}, {"letter": "D", "text": "Posterior colporrhaphy"}, {"letter": "E", "text": "Anterior colporrhaphy"}], "answer": "E", "explanation": "Cystocele은 방광이 질 전벽으로 탈출된 상태이므로 anterior colporrhaphy를 시행합니다. Posterior colporrhaphy는 rectocele, sacrospinous suspension은 정단부 고정, colpocleisis는 질 폐쇄술, perineorrhaphy는 회음체 결손에 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "골반장기탈출증 수술에서 사용되는 비흡수성 합성 mesh의 대표적인 합병증은?", "options": [{"letter": "A", "text": "감염 위험이 없어 장기간 유지가 가능하다"}, {"letter": "B", "text": "수개월 내 완전 흡수되어 지지력이 소실된다"}, {"letter": "C", "text": "복강 내 주입 시 자연 분해된다"}, {"letter": "D", "text": "모든 stage에서 1차 치료로 권장된다"}, {"letter": "E", "text": "질벽 미란(erosion)으로 인한 통증 및 성교통을 유발할 수 있다"}], "answer": "E", "explanation": "강의에서 비흡수성 mesh는 제거되지 않아 조직을 뚫고 나오는 미란(erosion)을 유발하며, 이로 인해 통증, 성교통, 파트너의 이물감 등을 초래하여 사용이 감소하였다고 설명하였습니다. Mesh는 흡수되지 않고 감염 위험이 있으며, 현재는 1차 치료로 권장되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "폐경 후 여성의 소변에 농도가 높아져 과거 불임 치료용 호르몬 제제의 원료로 사용된 것은?", "options": [{"letter": "A", "text": "난포자극호르몬 (FSH)"}, {"letter": "B", "text": "황체형성호르몬 (LH)"}, {"letter": "C", "text": "프로게스테론 (progesterone)"}, {"letter": "D", "text": "사람융모생식샘자극호르몬 (hCG)"}, {"letter": "E", "text": "에스트로겐 (estrogen)"}], "answer": "A", "explanation": "폐경이 되면 난소 기능 소실로 에스트로겐과 프로게스테론의 음성 되먹임이 사라져 뇌하수체에서 FSH 분비가 현저히 증가하며, 이 FSH가 소변으로 배설된다. LH도 증가하지만 FSH가 더 큰 폭으로 상승하며, 과거에는 폐경 여성의 소변에서 FSH를 추출하여 불임 치료에 사용하였다. 에스트로겐과 프로게스테론은 폐경 후 감소하며, hCG는 임신 시 태반에서 분비된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 148}, {"question": "폐경이 발생하는 주된 생리적 기전으로 가장 타당한 것은?", "options": [{"letter": "A", "text": "자궁내막이 호르몬에 더 이상 반응하지 않기 때문이다."}, {"letter": "B", "text": "난소의 모든 난포가 배란을 통해 소모되기 때문이다."}, {"letter": "C", "text": "난포의 지속적인 폐쇄(atresia)와 고갈이 일어나기 때문이다."}, {"letter": "D", "text": "난관의 섬모 운동이 감소하여 난자가 배출되지 못하기 때문이다."}, {"letter": "E", "text": "시상하부-뇌하수체 축의 기능이 노화로 저하되기 때문이다."}], "answer": "C", "explanation": "Menopause occurs when the ovarian follicle pool is exhausted to a critical level. Although only about 400–500 follicles are ovulated during a woman's reproductive life, the vast majority of follicles (approximately 6–7 million at 20 weeks gestation, 1–2 million at birth, 300,000 at puberty) are lost through a continuous process of atresia (programmed cell death) that occurs throughout life, independent of ovulation. This ongoing atresia leads to depletion of the follicular reserve, eventually resulting in menopause. '난소의 모든 난포가 배란을 통해 소모되기 때문이다' is wrong because only a small fraction are ovulated. '시상하부-뇌하수체 축의 기능이 노화로 저하되기 때문이다' is secondary but not the primary ovarian mechanism. '자궁내막이 호르몬에 더 이상 반응하지 않기 때문이다' is incorrect because the primary failure is ovarian. '난관의 섬모 운동이 감소하여 난자가 배출되지 못하기 때문이다' is unrelated to menopause.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 148}, {"question": "이차난모세포(secondary oocyte)의 제 function buildQuiz() {
  if (IS_V2_SINGLE_SECTION) {
    buildQuizV2();
    return;
  }

  const col = document.getElementById('quiz-col');
  col.innerHTML = '';

  let globalQ = 0;
  SECTIONS.forEach((section, si) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'page-section';
    secDiv.dataset.si = si;

    // Section header (conditional)
    if (section.header) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = section.header;
      secDiv.appendChild(hdr);
    }

    // Inline slides for portrait (conditional)
    if (section.images && section.images.length > 0) {
      secDiv.appendChild(buildInlineSlides(section));
    }

    // Question card with prev/next navigation
    if (section.questions && section.questions.length > 0) {
      const card = buildQuestionCard(section, si, false);
      secDiv.appendChild(card);
    }

    // Key Content (conditional — multiple KCs rendered as separate boxes)
    if (section.keyContent) {
      const kcItems = section.keyContent.split('\n\n').filter(t => t.trim());
      kcItems.forEach((text, idx) => {
        const kcBox = document.createElement('div');
        kcBox.className = 'key-content-box';
        const label = kcItems.length > 1
          ? '📌 Key Content ' + (idx + 1) + '/' + kcItems.length
          : '📌 Key Content';
        kcBox.innerHTML = '<div class="key-content-label">' + label + '</div>' + text;
        secDiv.appendChild(kcBox);
      });
    }

    // totalmesh — show on first section only (lecture-wide MeSH position)
    if (si === 0 && section.totalmesh) {
      const tmBox = document.createElement('div');
      tmBox.className = 'mesh-overlay-box totalmesh-box';
      tmBox.innerHTML = '<div class="mesh-overlay-label">🏛️ 강의 위치 (MeSH)</div><pre class="mesh-overlay-text">' + section.totalmesh + '</pre>';
      secDiv.insertBefore(tmBox, secDiv.firstChild);
    }

    // chunkmesh — show per section (chunk-level MeSH position)
    if (section.chunkmesh) {
      const cmBox = document.createElement('div');
      cmBox.className = 'mesh-overlay-box chunkmesh-box';
      cmBox.innerHTML = '<div class="mesh-overlay-label">📍 Chunk 위치 (MeSH)</div><pre class="mesh-overlay-text">' + section.chunkmesh + '</pre>';
      secDiv.appendChild(cmBox);
    }

    col.appendChild(secDiv);
    globalQ += section.questions.length;
  });

  setupSlideSync();
  updateSlideCol(0);
}
