<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLRF Review — REI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
    --accent: #2563eb; --accent-light: #eff6ff;
    --correct: #16a34a; --wrong: #dc2626;
    --text: #1e293b; --text2: #64748b; --border: #e2e8f0;
    --font-size: 16px;
  }
  html { font-size: var(--font-size); }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ── Header (FTM flex column) ────────────────────────────────────────── */
  #header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center;
    flex-shrink: 0; flex-wrap: wrap;
  }
  #header > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #header { gap: 12px; }
    #header > * + * { margin-left: 0; }
  }
  #header h1 { font-size: 1rem; color: var(--accent); font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #progress-bar-wrap {
    flex: 1; min-width: 120px; height: 6px;
    background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  #progress-bar { height: 100%; width: 0%; background: var(--accent);
    border-radius: 3px; transition: width .3s; }
  #progress-label { font-size: .82rem; color: var(--text2); white-space: nowrap; }
  #wrong-badge {
    background: var(--wrong); color: #fff; border-radius: 12px;
    padding: 2px 10px; font-size: .78rem; font-weight: 600; display: none;
  }
  .font-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: .82rem;
    transition: background .15s, color .15s;
  }
  .font-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .font-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #btn-hide-img, #btn-review {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; font-size: .82rem; white-space: nowrap;
  }
  #btn-hide-img:hover, #btn-review:hover {
    background: var(--accent-light); border-color: var(--accent); color: var(--accent);
  }
  #btn-review.active { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  #gemini-btn {
    padding: 4px 10px; border-radius: 6px; border: none;
    background: #eef2ff; color: #4338ca; cursor: pointer;
    font-size: .78rem; font-weight: 600; white-space: nowrap;
    outline: 1px solid #c7d7fe;
  }
  #gemini-btn:hover { background: #e0e7ff; outline-color: var(--accent); }
  #generated-label { font-size: .72rem; color: var(--text2); margin-left: auto; white-space: nowrap; }

  /* ── Main layout ─────────────────────────────────────────────────────── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: slide panel (DRP scroll-snap, dark bg) ───────────────────── */
  #slide-col {
    width: 42%; min-width: 20%; max-width: 70%;
    background: #1e293b; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  #slide-col::-webkit-scrollbar { display: none; }
  #slide-col { scrollbar-width: none; }
  .slide-page-item {
    height: calc(100vh - 52px); scroll-snap-align: start;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; gap: .5rem; flex-shrink: 0;
    position: relative;
  }
  .slide-canvas-wrap {
    position: relative; display: inline-block; line-height: 0;
  }
  .slide-canvas-wrap img {
    max-width: 100%; max-height: calc(100% - 40px);
    object-fit: contain; border-radius: 6px; cursor: zoom-in;
  }
  .anno-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; border-radius: 6px;
  }
  .anno-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  .slide-page-meta {
    color: #94a3b8; font-size: .75rem; text-align: center;
  }
  .slide-page-badge {
    position: absolute; bottom: 1rem; right: 1rem;
    background: rgba(0,0,0,.5); color: #94a3b8;
    font-size: .7rem; padding: 3px 8px; border-radius: 99px;
  }
  #no-slide-msg {
    color: #94a3b8; font-size: .85rem; text-align: center;
    padding: 40px 0; display: none;
  }

  /* ── Annotation toolbar (vertical bar between slide-col and divider) ── */
  #anno-toolbar {
    width: 44px; flex-shrink: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: #1e293b; color: #cbd5e1;
    padding: 8px 4px; gap: 3px;
    border-right: 1px solid #334155;
  }
  .anno-mode, .anno-tool, #anno-undo, #anno-clear, #anno-clear-all {
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
    font-size: .82rem; display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0;
  }
  .anno-mode:hover, .anno-tool:hover, #anno-undo:hover, #anno-clear:hover, #anno-clear-all:hover {
    background: #334155; color: #e2e8f0;
  }
  .anno-mode.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .anno-tool.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .anno-mode:disabled, .anno-tool:disabled,
  #anno-undo:disabled, #anno-clear:disabled, #anno-clear-all:disabled {
    opacity: .35; cursor: default;
  }
  .anno-sep {
    border: none; border-top: 1px solid #334155;
    width: 28px; margin: 2px 0; padding: 0;
  }
  #anno-color {
    width: 28px; height: 28px; border: 1px solid #334155;
    border-radius: 6px; cursor: pointer; background: none; padding: 1px;
  }
  #anno-size {
    width: 4px; height: 60px; accent-color: #3b82f6; cursor: pointer;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: bt-lr; background: transparent;
  }
  /* Safari / older Samsung Internet: range slider track & thumb */
  #anno-overlay-size::-webkit-slider-runnable-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #3b82f6; border-radius: 50%; margin-top: -5px;
  }
  #anno-overlay-size::-moz-range-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-moz-range-thumb {
    width: 14px; height: 14px; background: #3b82f6;
    border: none; border-radius: 50%;
  }

  /* ── Annotation slide nav (mobile draw mode) ─────────────────────────── */
  #anno-slide-nav {
    position: sticky; top: 0; z-index: 20;
    display: none; justify-content: center; align-items: center;
    padding: 8px;
    background: rgba(15,23,42,.95); flex-shrink: 0;
  }
  #anno-slide-nav > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #anno-slide-nav { gap: 12px; }
    #anno-slide-nav > * + * { margin-left: 0; }
  }
  #anno-slide-nav button {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: .9rem; display: flex; align-items: center; justify-content: center;
  }
  #anno-slide-nav button:hover { background: #334155; }
  #anno-slide-nav button:disabled { opacity: .3; cursor: default; }
  #anno-slide-counter { color: #94a3b8; font-size: .78rem; }

  /* ── Divider (DRP % based + touch) ──────────────────────────────────── */
  #divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
    z-index: 10; display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }
  body.resizing { cursor: col-resize; user-select: none; }
  #divider::after {
    content: '⋮'; color: #94a3b8; font-size: 14px; pointer-events: none;
  }
  #divider:hover::after, #divider.dragging::after { color: #fff; }

  /* ── Right: quiz panel ──────────────────────────────────────────────── */
  #quiz-col {
    flex: 1; min-width: 20%; padding: 1.25rem 1.5rem 50vh;
    overflow-y: auto; overflow-x: hidden;
  }

  /* ── Section ────────────────────────────────────────────────────────── */
  .page-section {
    margin-bottom: 2.5rem;
    scroll-margin-top: 16px;
  }
  .section-header {
    font-size: .75rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 1rem;
  }

  /* ── Question card ──────────────────────────────────────────────────── */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; transition: border-color .2s;
  }
  .q-card.focused { border-color: var(--accent); }
  .q-card.correct-card { border-color: var(--correct); }
  .q-card.wrong-card { border-color: var(--wrong); }
  /* V2 individual question cards: tighter spacing for scrollable list */
  .q-card.v2-card {
    margin-bottom: 0.75rem;
    scroll-margin-top: 1rem;  /* for scrollIntoView */
  }
  .q-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: .75rem; gap: 8px;
  }
  .q-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: .85rem; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .q-nav button:hover { background: var(--accent-light); color: var(--accent); }
  .q-nav button:disabled { opacity: .3; cursor: default; }
  .q-slide-link {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent); font-size: .72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: background .15s, border-color .15s;
  }
  .q-slide-link:hover { background: var(--accent-light); border-color: var(--accent); }
  .q-counter { font-size: .8rem; color: var(--text2); font-weight: 500; }

  /* Card metadata badges */
  .card-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge {
    background: var(--surface2); border-radius: 10px;
    padding: 2px 8px; font-size: .7rem; color: var(--text2);
  }
  .badge-num {
    background: var(--accent); color: #fff;
  }
  .badge-basket-cc {
    background: #f59e0b; color: #fff;
  }
  .badge-basket-mech {
    background: #8b5cf6; color: #fff;
  }
  .badge-basket-diff {
    background: #ec4899; color: #fff;
  }
  .badge-mesh-diff {
    background: #0ea5e9; color: #fff;
  }
  .q-type-divider {
    display: flex; align-items: center;
    margin-bottom: 10px; padding: 6px 0;
    color: #0ea5e9; font-size: .78rem; font-weight: 600;
    letter-spacing: .3px;
  }
  .q-type-divider > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    .q-type-divider { gap: 8px; }
    .q-type-divider > * + * { margin-left: 0; }
  }
  .q-type-divider::before, .q-type-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
  }

  .q-text { font-size: .92rem; line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }

  /* ── Options (FTM: letter + text + exclude X) ───────────────────────── */
  .options { display: flex; flex-direction: column; margin-bottom: .75rem; }
  .options > * + * { margin-top: .45rem; }
  @supports (gap: 0px) {
    .options { gap: .45rem; }
    .options > * + * { margin-top: 0; }
  }
  .option {
    display: flex; align-items: flex-start; gap: 8px;
    padding: .55rem .85rem; border-radius: 7px;
    border: 1.5px solid var(--border); cursor: pointer;
    font-size: .88rem; line-height: 1.45;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .option:hover:not(.locked):not(.excluded) {
    border-color: var(--accent); background: var(--accent-light);
  }
  .option.correct { border-color: var(--correct); background: #f0fdf4;
    color: var(--correct); font-weight: 600; }
  .option.wrong { border-color: var(--wrong); background: #fef2f2;
    color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.excluded {
    background: #fef2f2; border-color: var(--wrong); opacity: .6;
    cursor: default;
  }
  .option.excluded .exclude-btn {
    background: var(--wrong); color: #fff; border-color: var(--wrong);
  }
  .letter { font-weight: 700; color: var(--accent); min-width: 16px; flex-shrink: 0; }
  .opt-text { flex: 1; }
  .exclude-btn {
    margin-left: auto; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .exclude-btn:hover { background: var(--surface2); }

  /* ── Answer box ─────────────────────────────────────────────────────── */
  .answer-box {
    display: none; margin-top: .75rem; padding: .75rem;
    background: var(--accent-light); border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .answer-box.show { display: block; }
  .correct-badge {
    background: var(--correct); color: #fff; border-radius: 10px;
    padding: 2px 10px; font-size: .78rem; display: inline-block;
    margin-bottom: 6px; font-weight: 600;
  }
  .explanation { font-size: .85rem; line-height: 1.55; color: #334155; }

  /* ── Highlighter (text selection → mark) ─────────────────────── */
  .hl-mark {
    background: #fef08a; border-radius: 2px; padding: 0 1px;
    cursor: pointer;
  }
  .hl-mark:hover { opacity: .7; }
  .mesh-path-box {
    margin-top: 8px; padding: 8px 10px;
    background: #fef3c7; border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    font-size: .82rem; line-height: 1.5; color: #92400e;
  }

  /* ── Key Content box (DRP conditional) ──────────────────────────────── */
  .key-content-box {
    margin-top: 1rem; padding: .85rem 1rem;
    background: #fefce8; border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b; border-radius: 0 8px 8px 0;
    font-size: .85rem; line-height: 1.6; color: #78350f;
  }
  .key-content-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #92400e; margin-bottom: .35rem;
  }

  /* ── MeSH overlay (totalmesh / chunkmesh) ────────────────────────────── */
  .mesh-overlay-box {
    margin-top: .7rem; padding: .75rem 1rem;
    border-radius: 0 8px 8px 0;
    font-size: .82rem; line-height: 1.6;
  }
  .totalmesh-box {
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-left: 4px solid #2563eb; color: #1e3a5f;
  }
  .chunkmesh-box {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-left: 4px solid #16a34a; color: #14532d;
  }
  .mesh-overlay-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: .35rem;
  }
  .mesh-overlay-text {
    margin: 0; white-space: pre-wrap; font-family: inherit;
    font-size: .8rem; line-height: 1.5;
  }
  .learning-path-panel {
    margin: .7rem 0; padding: .75rem 1rem;
    background: #fef2f2; border: 1px solid #fecaca;
    border-left: 4px solid #dc2626; border-radius: 0 8px 8px 0;
  }
  .learning-path-title {
    font-size: .75rem; font-weight: 700; color: #991b1b;
    margin-bottom: .5rem;
  }

  /* ── Expandable transcript (FTM conditional) ────────────────────────── */
  .chunk-detail { margin-top: .5rem; }
  .chunk-detail summary {
    font-size: .75rem; color: var(--text2); cursor: pointer;
  }
  .chunk-text {
    font-size: .75rem; color: var(--text2); margin-top: 6px;
    line-height: 1.5; white-space: pre-wrap;
    max-height: 160px; overflow-y: auto;
  }

  /* ── Image fullscreen overlay (DRP) ─────────────────────────────────── */
  #img-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 300;
    cursor: zoom-out; align-items: center; justify-content: center;
  }
  #img-overlay.show { display: flex; }
  #img-container {
    position: relative; display: inline-block; line-height: 0;
  }
  #img-container img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 6px; transition: transform .1s ease;
    transform-origin: center center;
  }
  #anno-overlay-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border-radius: 6px;
    pointer-events: none;
  }
  #anno-overlay-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  #anno-overlay-toolbar {
    display: none; position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 310;
    align-items: center; flex-wrap: wrap;
    background: rgba(15,23,42,.95); color: #cbd5e1;
    padding: 8px 14px; border-radius: 12px; font-size: .78rem;
  }
  #anno-overlay-toolbar.show { display: flex; }
  #anno-overlay-toolbar > * + * { margin-left: 4px; }
  @supports (gap: 0px) {
    #anno-overlay-toolbar { gap: 4px; }
    #anno-overlay-toolbar > * + * { margin-left: 0; }
  }

  /* ── Review overlay (DRP full-screen) ───────────────────────────────── */
  #review-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    z-index: 200; flex-direction: column;
  }
  #review-overlay.show { display: flex; }
  #review-header {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #review-title { font-size: .95rem; font-weight: 700; color: var(--accent); }
  #review-close {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: .85rem;
  }
  #review-close:hover { background: #fef2f2; border-color: var(--wrong); color: var(--wrong); }
  #review-body { flex: 1; display: flex; overflow: hidden; }
  #review-slide-col {
    width: 42%; min-width: 20%; max-width: 70%; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain; background: #1e293b;
    -webkit-overflow-scrolling: touch;
  }
  #review-slide-col::-webkit-scrollbar { display: none; }
  #review-slide-col { scrollbar-width: none; }
  #review-slide-col img {
    width: 100%; height: auto; object-fit: contain; display: block;
  }
  #review-divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
  }
  #review-divider:hover, #review-divider.dragging { background: var(--accent); }
  #review-quiz-col {
    flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem 50vh;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Inline slides (portrait only) ──────────────────────────────────── */
  .inline-slides { display: none; margin-bottom: .75rem; }
  /* Safari < 15 fallback: padding-bottom trick maintains 16:9 ratio */
  .inline-slide-viewer {
    position: relative; background: #1e293b; border-radius: 8px;
    overflow: hidden; width: 100%; padding-bottom: 56.25%; height: 0;
  }
  .inline-slide-viewer > * {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @supports (aspect-ratio: 1) {
    .inline-slide-viewer {
      aspect-ratio: 16/9; padding-bottom: 0; height: auto;
      display: flex; align-items: center; justify-content: center;
    }
    .inline-slide-viewer > * {
      position: static; width: auto; height: auto;
    }
  }
  .inline-slide-img {
    max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;
  }
  .inline-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.45); color: #fff; border: none;
    border-radius: 50%; width: 32px; height: 32px; font-size: .9rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: background .15s;
  }
  .inline-nav-btn:hover { background: rgba(37,99,235,.8); }
  .inline-nav-btn:disabled { opacity: .2; cursor: default; }
  .inline-nav-btn.prev { left: 8px; }
  .inline-nav-btn.next { right: 8px; }
  .inline-slide-counter {
    text-align: center; font-size: .72rem; color: var(--text2); margin-top: 4px;
  }

  /* ── Portrait responsive (DRP) ──────────────────────────────────────── */

e748021734ffe9f6b0363f95e76cc.r2.dev/img/975b238a07fb57ed0e5a2efad5100959.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/836961c777b5152edddb41528ff9e402.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/bf2dbda75bd8018b19041b5883e342c9.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/6a54f33718e50db68ad1df09995ca99f.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/c2c7e895666570aa4adc195aa0022313.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/da3e3a93b89190eb98bc48d77067852b.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/6bebaa7f5cf15e95052e23b7d76257fb.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/0b0562d19dbd115c172fd8e221feb97f.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/d8f6b02aa791b6b59cad672e20b98d42.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/e95022d5212846056fb7aaa20509eb53.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/71f9be941a88f3dc2359558a3cf5cf43.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/14a04b719ce2af05cdf6d1396268cb9a.png"], "questions": [{"question": "Human papillomavirus (HPV) 백신에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "백신은 자궁경부암 발병 후 치료 목적으로 사용된다."}, {"letter": "B", "text": "HPV 아형 중 일부는 자궁경부암의 주요 원인이다."}, {"letter": "C", "text": "백신 접종으로 모든 성매개 감염이 예방된다."}, {"letter": "D", "text": "자궁경부암 자체를 직접 예방하는 백신이다."}, {"letter": "E", "text": "HPV 백신은 남성에게는 효과가 없다."}], "answer": "B", "explanation": "HPV 백신은 자궁경부암을 유발하는 고위험 HPV 아형(예: 16, 18형)의 감염을 예방한다. 암 자체를 직접 예방하거나 치료하지는 않으며, 모든 성매개 감염을 예방하지도 않는다. 남성에서도 효과가 있어 생식기 사마귀 및 항문암 예방에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부(cervix)의 상피 구성에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁경관(endocervical canal)은 non-keratinized stratified squamous epithelium으로 덮여 있다."}, {"letter": "B", "text": "Squamocolumnar junction은 ectocervix와 endocervix가 만나는 부위로, cervical cancer 호발 부위이다."}, {"letter": "C", "text": "자궁경부 상피는 자궁내막과 동일한 simple squamous epithelium이다."}, {"letter": "D", "text": "자궁경부 질부(ectocervix)는 columnar epithelium으로 덮여 있다."}, {"letter": "E", "text": "Squamocolumnar junction은 자궁경부 질부에만 국한되어 존재한다."}], "answer": "B", "explanation": "자궁경부 질부(ectocervix)는 non-keratinized stratified squamous epithelium으로 덮여 있고, 자궁경관(endocervical canal)은 columnar epithelium으로 되어 있습니다. 이 두 상피가 만나는 부위가 squamocolumnar junction이며, 이곳은 cervical cancer(특히 squamous cell carcinoma)의 가장 흔한 발생 부위입니다. '자궁경부 질부(ectocervix)는 columnar epithelium으로 덮여 있다'는 반대입니다. '자궁경관(endocervical canal)은 non-keratinized stratified squamous epithelium으로 덮여 있다'도 반대입니다. '자궁경부 상피는 자궁내막과 동일한 simple squamous epithelium이다'는 자궁내막이 columnar epithelium이고 경부 상피가 혼합되어 있으므로 틀립니다. 'Squamocolumnar junction은 자궁경부 질부에만 국한되어 존재한다'는 접합부가 외자궁경부와 자궁경관 사이에 위치하므로 틀립니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부암의 주요 원인 인자로 가장 옳은 것은?", "options": [{"letter": "A", "text": "거대세포바이러스(CMV) 감염"}, {"letter": "B", "text": "고위험 인유두종바이러스(HPV) 지속 감염"}, {"letter": "C", "text": "단순포진바이러스 2형(HSV-2) 감염"}, {"letter": "D", "text": "클라미디아 트라코마티스(Chlamydia trachomatis) 감염"}, {"letter": "E", "text": "인간면역결핍바이러스(HIV) 감염"}], "answer": "B", "explanation": "고위험 인유두종바이러스(HPV) 지속 감염, 특히 16형과 18형은 자궁경부암 발생의 가장 중요한 원인이다. 다른 바이러스나 세균은 직접적인 발암 요인이 아니거나 보조 인자로 작용한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종바이러스(HPV) 백신에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "HPV 16, 18형은 주로 성기 사마귀를 유발한다."}, {"letter": "B", "text": "만 30세 이상 여성에게 국가필수예방접종으로 지정되어 있다."}, {"letter": "C", "text": "백신 접종은 여성에게만 권장된다."}, {"letter": "D", "text": "자궁경부암 예방 효과는 없고, 첨규 콘딜로마 치료에만 사용된다."}, {"letter": "E", "text": "현재 사용되는 4가 백신은 HPV 6, 11, 16, 18형을 포함한다."}], "answer": "E", "explanation": "4가 HPV 백신은 HPV 6, 11, 16, 18형을 포함하며, 16, 18형은 자궁경부암을, 6, 11형은 성기 사마귀를 예방한다. 자궁경부암 예방 효과가 있고, 남성에게도 접종이 권장되며, 국가예방접종은 주로 청소년 연령대를 대상으로 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종 바이러스(HPV)의 발암 기전에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "E6와 E7 단백질은 모두 p53에 결합하여 세포자멸사를 유도한다."}, {"letter": "B", "text": "E7 단백질은 Rb를 활성화하여 세포 증식을 촉진한다."}, {"letter": "C", "text": "E6 단백질은 Rb와 결합하고, E7 단백질은 p53과 결합한다."}, {"letter": "D", "text": "E6 단백질은 p53과 결합하고, E7 단백질은 Rb와 결합하여 종양억제 기능을 저해한다."}, {"letter": "E", "text": "E6 단백질은 p53의 분해를 억제하여 세포 주기를 정지시킨다."}], "answer": "D", "explanation": "HPV의 발암기전은 E6 종양단백질이 숙주세포의 p53과 결합하여 p53의 분해를 촉진하고, E7이 Rb 단백질과 결합하여 Rb 기능을 불활성화시킴으로써 세포주기 조절을 상실시켜 무제한 증식을 유도하는 것이다. 따라서 'E6 단백질은 p53과 결합하고, E7 단백질은 Rb와 결합하여 종양억제 기능을 저해한다'가 옳다. 'E6 단백질은 Rb와 결합하고, E7 단백질은 p53과 결합한다'는 작용 대상을 반대로 기술한 것으로 틀렸다. 'E6와 E7 단백질은 모두 p53에 결합하여 세포자멸사를 유도한다'는 E7이 p53에 결합하지 않고, 오히려 세포자멸사를 억제하므로 틀렸다. 'E6 단백질은 p53의 분해를 억제하여 세포 주기를 정지시킨다'는 E6가 p53 분해를 촉진하므로 틀렸다. 'E7 단백질은 Rb를 활성화하여 세포 증식을 촉진한다'는 E7이 Rb를 불활성화시키므로 틀렸다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "생식기 사마귀(condyloma acuminata)를 유발하는 저위험군 HPV 유형으로 옳은 것은?", "options": [{"letter": "A", "text": "6형과 11형"}, {"letter": "B", "text": "45형과 52형"}, {"letter": "C", "text": "58형과 68형"}, {"letter": "D", "text": "16형과 18형"}, {"letter": "E", "text": "31형과 33형"}], "answer": "A", "explanation": "HPV 6형과 11형은 생식기 사마귀(condyloma acuminata)의 90% 이상을 유발하는 저위험군 바이러스이다. 16형과 18형은 자궁경부암과 전암병변을 주로 유발하는 고위험군이며, 31형, 33형, 45형, 52형, 58형도 고위험군에 속한다. 68형 역시 고위험군으로 분류된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "고위험군 인유두종 바이러스(HPV)의 발암 기전에서, 바이러스 단백질 E6와 E7의 주된 표적이 되는 인체 종양억제 단백질로 올바르게 짝지어진 것은?", "options": [{"letter": "A", "text": ter": "C", "text": "폐경 후 여성에서는 자연 소실률이 높다"}, {"letter": "D", "text": "대부분의 감염은 1-2년 내 자연 소실된다"}, {"letter": "E", "text": "고위험군 HPV는 자연 소실되지 않는다"}], "answer": "A", "explanation": "HPV 감염은 매우 흔하며, 감염된 여성의 대부분은 면역 반응에 의해 1-2년 내 바이러스가 제거된다. 일부에서만 지속감염으로 인해 CIN과 자궁경부암으로 진행할 수 있다. 고위험군이라도 자연 소실될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "다음 중 자궁경부암(cervical cancer)의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "인유두종바이러스(HPV) 감염"}, {"letter": "B", "text": "흡연"}, {"letter": "C", "text": "비만(Obesity)"}, {"letter": "D", "text": "조기 성경험"}, {"letter": "E", "text": "다산(multiparity)"}], "answer": "C", "explanation": "비만(Obesity)은 자궁경부암의 위험인자가 아니며, 자궁내막암의 잘 알려진 위험인자입니다. 자궁경부암의 주요 위험인자로는 고위험 HPV 감염, 흡연, 조기 성경험, 다수의 성파트너, 다산, 면역억제 상태 등이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "27세 여성이 자궁경부세포검사에서 ASCUS로 판독되었고, 질확대경 검사에서 정상 소견을 보였다. 이 환자에게 시행할 가장 적절한 조치는?", "options": [{"letter": "A", "text": "3개월 후 자궁경부세포검사 반복"}, {"letter": "B", "text": "즉시 전기루프절제술(LEEP)"}, {"letter": "C", "text": "고위험 HPV 검사 시행"}, {"letter": "D", "text": "추가 검사 없이 경과 관찰"}, {"letter": "E", "text": "1년 후 자궁경부세포검사 반복"}], "answer": "C", "explanation": "ASCUS에 대한 표준 처리는 고위험 HPV 검사(분류검사)이며, HPV 양성이면 질확대경 검사, 음성이면 1년 후 공동검사(세포검사+HPV)를 시행한다. 이미 질확대경 검사가 정상이었더라도 HPV 결과에 따라 추적 일정을 결정할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "자궁경부상피내종양(CIN)에 대한 설명 중 옳은 것은?", "options": [{"letter": "A", "text": "경증 CIN도 침윤암으로 빠르게 진행하므로 적극적 치료가 필요하다."}, {"letter": "B", "text": "주로 편평원주상피 접합부의 변형대(transformation zone)에서 발생한다."}, {"letter": "C", "text": "임신 중 발견된 CIN은 조기 치료가 원칙이다."}, {"letter": "D", "text": "치료 후 추적검사에는 질확대경 검사가 불필요하다."}, {"letter": "E", "text": "대부분 성교 후 출혈 같은 증상을 동반한다."}], "answer": "B", "explanation": "CIN은 대부분  "D", "text": "원추절제술을 시행한다."}, {"letter": "E", "text": "6개월 후 세포검사를 반복한다."}], "answer": "C", "explanation": "AGC(atypical glandular cells)는 자궁경부 선상피뿐 아니라 자궁내막, 난소·난관 상피에서 기원한 세포일 가능성이 있어 포괄적 검사가 필요하다. 따라서 질확대경 검사, 자궁경부내 소파술(ECC), HPV 검사, 자궁내막 조직검사를 동시에 시행하여 원인을 규명해야 한다. 질확대경만으로는 자궁내막 병변을 평가할 수 없고, HPV 검사 단독은 선상피 병변을 모두 반영하지 못한다. 원추절제술은 진단 목적으로 시행할 수 있으나 이 경우 선행 검사가 선행되어야 하며, 단순 반복 세포검사는 지연을 초래할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "질확대경 검사에서 비정상 소견으로 옳은 것은?", "options": [{"letter": "A", "text": "원주상피의 포도송이 모양"}, {"letter": "B", "text": "초산 도포 전 정상 편평상피의 분홍빛 소견"}, {"letter": "C", "text": "자궁경부 점막의 투명한 분비물"}, {"letter": "D", "text": "초산 도포 후 나타나는 하얀 상피(acetowhite epithelium)"}, {"letter": "E", "text": "균일하게 분포된 모세혈관"}], "answer": "D", "explanation": "질확대경 검사에서 비정상 소견에는 acetowhite epithelium(초산백 상피), leukoplakia, punctation, mosaic, atypical vessels 등이 있다. 초산 도포 후 하얗게 변하는 상피는 핵과 세포 단백질로 인해 빛이 투과하기 어려워 나타나는 이상 소견이다. 정상 편평상피는 분홍빛, 원주상피는 포도송이 모양으로 보일 수 있고, 투명 분비물이나 균일한 모세혈관은 정상 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "HSIL 세포검사 결과를 보이는 35세 여성에서 환상투열절제술(LEEP)의 적응증으로 옳은 것은?", "options": [{"letter": "A", "text": "환자가 수술을 원하지 않고 추적관찰을 요구하는 경우"}, {"letter": "B", "text": "반복 세포검사에서 LSIL로 재분류된 경우"}, {"letter": "C", "text": "질확대경 검사에서 만족스럽게 관찰되었고 조직검사 결과 CIN 1이 확인된 경우"}, {"letter": "D", "text": "자궁경부내 소파술(ECC)에서 CIN 3가 확인된 경우"}, {"letter": "E", "text": "고위험군 HPV 검사에서 음성인 경우"}], "answer": "D", "explanation": "HSIL 결과에서 환상투열절제술(LEEP)의 적응증은 ① 질확대경이 불충분한 경우 ② ECC에서 CIN 2/3가 진단된 경우 ③ 세포검사-질확대경-조직검사 결과가 불일치하는 경우 ④ 미세침윤이 의심되는 경우 ⑤ 질확대경 전문의가 침윤성 암을 배제할 수 없는 경우 ⑥ 환자가 원하는 경우이다. 따라서 ECC에서 CIN 3가 확인된 것은 적응증에 해당한다. CIN 1은 자연소실 가능성이 높아 추적관찰하며, LSIL로 재분류되면 질확대경을 시행할 수 있지만 LEEP은 통상 시행하지 않는다. HPV 음성은 위험도가 낮으며, 환자 거부만으로 적응증이 되는 것은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "45세 여성이 자궁경부질세포진 검사에서 ASC-H(atypical squamous cells, cannot exclude HSIL) 소견을 보였다. 다음으로 시행할 가장 적절한 조치는?", "options": [{"letter": "A", "text": "질확대경 검사 및 생검"}, {"letter": "B", "text": "환상투열절제술 (LEEP)"}, {"letter": "C", "text": "전자궁절제술"}, {"letter": "D", "text": "1년 후 자궁경부질세포진 추적 검사"}, {"letter": "E", "text": "고위험군 HPV DNA 검사"}], "answer": "A", "explanation": "ASC-H는 고등급 병변을 배제할 수 없는 비정형 편평세포로, 자궁경부암 전구병변의 가능성이 높으므로 바로 '질확대경 검사 및 생검'을 시행해야 합니다. '1년 후 자궁경부질세포진 추적 검사'는 ASC-US의 관리이며, '고위험군 HPV DNA 검사'는 ASC-US에서 선별적으로 사용됩니다. '환상투열절제술 (LEEP)'이나 '전자궁절제술'은 조직검사 결과에 따라 결정됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "35세 여성이 정기검진에서 HSIL 자궁경부질세포진 결과를 보여 질확대경 검사를 시행받았습니다. 질확대경 소견은 거친 모자이크 양상과 점상 출혈이었으나, 조준생검 결과는 만성 자궁경부염(chronic cervicitis)이었습니다. 다음으로 가장 적절한 조치는?", "options": [{"letter": "A", "text": "근치적 전자궁절제술 (hysterectomy)"}, {"letter": "B", "text": "인유두종바이러스(HPV) 유전자형 검사"}, {"letter": "C", "text": "동시 항암화학방사선요법 (chemoradiation)"}, {"letter": "D", "text": "6개월 후 자궁경부질세포진 추적 검사"}, {"letter": "E", "text": "진단적 원추절제술 (conization)"}], "answer": "E", "explanation": "세포검사가 HSIL로 고등급 병변이 강력히 의심되는데 조직검사에서 만성 염증만 확인된 경우, 병변이 깊숙이 있어 생검되지 않았을 가능성(불일치)을 고려하여 '진단적 원추절제술 (conization)'을 시행해야 합니다. '6개월 후 자궁경부질세포진 추적 검사'나 '인유두종바이러스(HPV) 유전자형 검사'는 진단적 가치가 충분하지 않습니다. '근치적 전자궁절제술'이나 '동시 항암화학방사선요법'은 침윤성 암이 확인되지 않은 단계에서는 적절하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "27세 여성이 자궁경부질세포진 검사에서 AGC(atypical glandular cells)가 나와 질확대경 검사 및 자궁목긁어냄술을 시행하였고, 조직검사 결과 자궁경부 제자리 샘암종(AIS)으로 판명되었습니다. 환자는 향후 임신을 원하고 있습니다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "냉동 원추절제술 (cold knife conization)"}, {"letter": "B", "text": "환상투열절제술 (LLETZ/LEEP)"}, {"letter": "C", "text": "동시 항암화학방사선요법 (chemoradiation)"}, {"letter": "D", "text": "근치적 전자궁절제술 (total hysterectomy)"}, {"letter": "E", "text": "반복 자궁목긁어냄술 및 경과 관찰"}], "answer": "A", "explanation": "자궁경부 제자리 샘암종(AIS)은 다발성 및 건너뛰기 병변 가능성이 있어 '냉동 원추절제술 (cold knife conization)'로 충분한 절제연 음성을 확보하는 것이 표준입니다. 환자가 가임력 보존을 원하므로 '근치적 전자궁절제술'은 고려하지 않습니다. '환상투열절제술'은 열손상으로 절제연 판정이 어려울 수 있고, '동시 항암화학방사선요법'이나 '반복 자궁목긁어냄술 및 경과 관찰'은 부적절한 접근법입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "30세 여성이 자궁경부 세포검사에서 LSIL(low-grade squamous intraepithelial lesion)로 보고되었다. 가장 적절한 다음 조치는?", "options": [{"letter": "A", "text": "환상투열절제술(LEEP)"}, {"letter": "B", "text": "전자궁적출술"}, {"letter": "C", "text": "질확대경 검사 및 필요시 생검"}, {"letter": "D", "text": "인유두종 바이러스 DNA 검사"}, {"letter": "E", "text": "6개월 후 자궁경부 세포검사 반복"}], "answer": "E", "explanation": "LSIL이 보고된 경우, 일반적으로 질확대경 검사를 통해 병변을 확인하고 필요하면 조직생검을 시행한다. ASC-US와 달리 6개월 후 세포검사 반복이나 HPV 검사 단독은 권장되지 않으며, LEEP이나 자궁적출술은 고위험 병변에서 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "35세 여성이 자궁경부 조직검사에서 CIN 1(cervical intraepithelial neoplasia 1)로 진단되었다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "자궁절제술"}, {"letter": "B", "text": "동시항암화학방사선요법(CCRT)"}, {"letter": "C", "text": "원추절제술(conization)"}, {"letter": "D", "text": "추적관찰"}, {"letter": "E", "text": "환상투열절제술(LEEP)"}], "answer": "C", "explanation": "CIN 1은 대부분 감염에 의한 형태적 변화로, 2년 내 약 80%에서 자연소실되므로 추적관찰이 원칙이다. LEEP이나 원추절제술은 CIN 2 이상에서, 자궁절제술이나 CCRT는 침윤성 암이나 재발성 질환에서 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "임신 20주에 질출혈로 내원한 33세 여성이 자궁경부 원추절제술 후 조직검사에서 침윤 깊이 4mm의 편평세포암(squamous cell carcinoma)을 진단받았고, 림프혈관 침윤(LVSI)이 양성이다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "질확대경 추적관찰"}, {"letter": "B", "text": "임신 유지하며 만삭 분만 후 치료"}, {"letter": "C", "text": "즉시 방사선치료 시작"}, {"letter": "D", "text": "태아 폐 성숙 후 제왕절개 및 자궁절제술"}, {"letter": "E", "text": "임신 중 용량 조절 항암화학요법"}], "answer": "C", "explanation": "임신 중 자궁경부암 stage IA2이면서 LVSI 양성인 경우, 태아의 폐 성숙이 확인된 시점에 제왕절개와 함께 자궁절제술을 시행한다. 만삭 분만까지 기다리는 것은 진행 위험이 크며, 즉시 방사선치료는 태아 손상을 초래할 수 있다. 임신 중 항암치료나 단순 추적관찰은 권장되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "27세 여성이 질확대경하 조직생검에서 자궁경부상피내암(CIN III)으로 확인되었다. 향후 임신을 원할 경우 적절한 처치는?", "options": [{"letter": "A", "text": "방사선 치료"}, {"letter": "B", "text": "원추절제술(conization) 또는 환상투열절제술(LEEP)"}, {"letter": "C", "text": "6개월 후 세포진 검사 반복"}, {"letter": "D", "text": "전자궁절제술"}, {"letter": "E", "text": "확대 전자궁절제술"}], "answer": "E", "explanation": "'원추절제술(conization) 또는 환상투열절제술(LEEP)'이 CIN III의 표준 치료이며 자궁경부를 보존하므로 향후 임신을 원하는 젊은 여성에게 우선됩니다. '전자궁절제술'은 폐경 후나 추가 적응증이 있을 때 고려되며, '6개월 후 세포진 검사 반복'은 CIN III에서는 부적절합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "27세 여성이 자궁경부 세포진 검사에서 ASCUS(비정형 편평세포)로 판명되어 질확대경 검사를 시행했으며, 결과는 정상이었다. 다음 적절한 조치는?", "options": [{"letter": "A", "text": "광범위 전자궁절제술"}, {"letter": "B", "text": "즉시 LEEP 시행"}, {"letter": "C", "text": "항생제 치료"}, {"letter": "D", "text": "HPV 백신 접종"}, {"letter": "E", "text": "1년 후 세포진 검사 반복"}], "answer": "B", "explanation": "'1년 후 세포진 검사 반복'이 ASCUS 후 질확대경 정상 시 권고되는 추적 관찰입니다. ASCUS는 저위험 소견으로 즉시 LEEP이나 수술이 필요하지 않으며, HPV 백신은 치료 목적이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "45세 여성이 정기 검진 중 시행한 질확대경 검사와 조직생검에서 질상피내종양 2등급(VAIN 2)으로 진단되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "근치적 방사선 치료"}, {"letter": "B", "text": "전자궁절제술"}, {"letter": "C", "text": "전신 항암 화학 요법"}, {"letter": "D", "text": "추적 관찰"}, {"letter": "E", "text": "질 병소 국소 절제술"}], "answer": "D", "explanation": "VAIN 1은 자연 소실 가능성이 있어 추적 관찰이 가능하나, VAIN 2 이상의 고등급 병변은 침윤성 암으로 진행할 위험이 있으므로 적극적인 치료가 필요하다. 국소 절제술, 레이저 치료, 국소 항암제 투여 등이 우선적으로 사용된다. 전자궁절제술이나 방사선 치료는 침윤성 질암에서 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "CIN 3로 자궁절제술을 받은 여성에서 질 세포검사를 지속해야 하는 이유로 가장 타당한 것은?", "options": [{"letter": "A", "text": "자궁절제술 후 질암 발생률이 증가하기 때문에"}, {"letter": "B", "text": "남아있는 자궁경부 조직이 항상 존재하기 때문에"}, {"letter": "C", "text": "난소암의 조기 발견을 위해"}, {"letter": "D", "text": "자궁내막암의 재발을 발견하기 위해"}, {"letter": "E", "text": "HPV 감염이 지속되어 VAIN을 유발할 수 있기 때문에"}], "answer": "E", "explanation": "CIN 치료 후에도 HPV 감염이 지속될 수 있으며, 이로 인해 질상피내 종양(VAIN)이 발생할 수 있으므로 자궁절제술 후에도 정기적인 질 세포검사(Pap smear)가 필요합니다. \"HPV 감염이 지속되어 VAIN을 유발할 수 있기 때문에\"가 정답입니다. 오답 분석: \"자궁절제술 후 질암 발생률이 증가하기 때문에\"는 근거가 부족합니다. \"자궁내막암의 재발을 발견하기 위해\"나 \"난소암의 조기 발견을 위해\"는 목적이 다릅니다. \"남아있는 자궁경부 조직이 항상 존재하기 때문에\"는 불완전 절제 가능성을 의미하나, 주요 원인은 HPV 지속입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 2}, {"question": "골반 림프절 전이가 확인된 자궁경부암의 FIGO 병기로 옳은 것은?", "options": [{"letter": "A", "text": "Stage IVB"}, {"letter": "B", "text": "Stage IVA"}, {"letter": "C", "text": "Stage IIIC"}, {"letter": "D", "text": "Stage IIIB"}, {"letter": "E", "text": "Stage IIIA"}], "answer": "C", "explanation": "2018 개정된 FIGO 자궁경부암 병기 체계에 따르면, 림프절 전이(골반 또는 대동맥 주위)가 확인된 경우 원발 종양의 크기나 국소 침윤 정도와 관계없이 Stage IIIC로 분류한다. Stage IIIA는 질 하부 1/3까지 침윤한 경우, IIIB는 골반벽 침윤 또는 수신증이 동반된 경우, IVA는 방광/직장 점막 침윤, IVB는 원격 전이가 있는 경우이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "다음 중 자궁경부암의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "흡연"}, {"letter": "B", "text": "다수의 성교 대상자"}, {"letter": "C", "text": "비만"}, {"letter": "D", "text": "인유두종 바이러스(HPV) 감염"}, {"letter": "E", "text": "낮은 사회경제적 상태"}], "answer": "C", "explanation": "자궁경부암의 주요 위험인자는 HPV 감염(특히 고위험군 지속 감염), 흡연, 조기 첫 성경험, 다수의 성교 대상자, 높은 출산력, 낮은 사회경제적 상태, 면역억제 상태 등이다. 비만은 자궁내막암의 주요 위험인자로, 자궁경부암과는 독립적인 위험인자로 간주되지 않는다. 따라서 '비만'은 자궁경부암의 위험인자가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "65세 여성이 골반 종괴로 시험적 개복술을 받았습니다. 우측 난소에 8cm 크기의 분화도 좋은 장액성 난소암이 있었고, 종양 피막은 파열되어 있었지만 좌측 난소, 자궁, 골반 및 복강 내 전이는 없었습니다. 복강 세척 세포검사는 음성이었으나, 제거된 후복막 림프절 20개 중 2개에서 전이가 발견되었습니다. 이 환자의 FIGO 수술적 병기는?", "options": [{"letter": "A", "text": "IA"}, {"letter": "B", "text": "IIB"}, {"letter": "C", "text": "IIIA1"}, {"letter": "D", "text": "IC2"}, {"letter": "E", "text": "IC1"}], "answer": "C", "explanation": "난소암 FIGO 병기에서 후복막 림프절 전이가 있는 경우 IIIA1로 분류됩니다. 림프절 전이가 없다면 피막 파열로 IC1이지만, 림프절 전이로 인해 병기가 'IIIA1'으로 상향됩니다. 'IA'는 난소에만 국한되고 피막 파열 없는 경우, 'IC1'은 수술 중 파열만 있는 경우, 'IC2'는 복강 세척 양성, 'IIB'는 골반 장기 침범입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "자궁내막암 FIGO 병기에서 stage II에 해당하는 소견은?", "options": [{"letter": "A", "text": "자궁근층 침범이 50% 이상인 경우"}, {"letter": "B", "text": "난소로의 전이"}, {"letter": "C", "text": "자궁경부 기질 침범"}, {"letter": "D", "text": "자궁근층 침범이 50% 미만인 경우"}, {"letter": "E", "text": "골반 림프절 전이"}], "answer": "C", "explanation": "Stage I은 자궁체부에 국한된 경우로, 근층 침범 정도에 따라 IA(<50%)와 IB(≥50%)로 나뉜다. Stage II는 자궁경부 기질 침범이 있는 경우이다. 난소 전이나 림프절 전이는 stage III에 해당하며, 골반 림프절 전이는 stage IIIC로 분류된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "자궁경부암(cervical cancer)의 FIGO 임상 병기 결정을 위한 기본 검사로 일반적으로 포함되지 않는 것은?", "options": [{"letter": "A", "text": "흉부 X선 촬영(Chest X-ray)"}, {"letter": "B", "text": "직장경 검사(Proctoscopy)"}, {"letter": "C", "text": "마취하 골반 진찰(Examination under anesthesia)"}, {"letter": "D", "text": "골반 자기공명영상(MRI)"}, {"letter": "E", "text": "경정맥 신우조영술(IVP)"}], "answer": "D", "explanation": "자궁경부암은 임상적 병기 결정을 원칙으로 하며, 마취하 진찰, 흉부 X선, IVP, 방광경/직장경 검사 등이 포함됩니다. MRI나 CT는 치료 계획 수립에 유용하나 전통적인 FIGO 병기 결정 검사에는 포함되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "자궁내막암에서 골반 또는 대동맥 주위 림프절 전이가 확인된 경우, FIGO 병기는?", "options": [{"letter": "A", "text": "Stage IIIA"}, {"letter": "B", "text": "Stage IA"}, {"letter": "C", "text": "Stage II"}, {"letter": "D", "text": "Stage IB"}, {"letter": "E", "text": "Stage IIIC"}], "answer": "E", "explanation": "자궁내막암 병기 설정에서 림프절 전이(골반 또는 대동맥 주위)가 있으면 FIGO stage IIIC로 분류됩니다. 골반 림프절 전이는 IIIC1, 대동맥 주위 림프절 전이는 IIIC2입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "다음 중 자궁경부암 (cervical cancer)의 위험인자로 인정되지 않는 것은?", "options": [{"letter": "A", "text": "High parity"}, {"letter": "B", "text": "Breastfeeding"}, {"letter": "C", "text": "Smoking"}, {"letter": "D", "text": "Human papillomavirus (HPV) infection"}, {"letter": "E", "text": "Long-term oral contraceptive use"}], "answer": "B", "explanation": "Breastfeeding is not an established risk factor for cervical cancer. HPV infection, high parity, smoking, and long-term oral contraceptive use are all well-documented risk factors.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 3}, {"question": "자궁경부암 1A1기(침윤 깊이 3mm 미만, 림프혈관 침윤 음성)로 진단된 28세 미혼 여성이 가임력 보존을 원할 때 적절한 치료법은?", "options": [{"letter": "A", "text": "동시항암화학방사선요법(CCRT)"}, {"letter": "B", "text": "전자궁적출술"}, {"letter": "C", "text": "원추절제술(conization)"}, {"letter": "D", "text": "선행 항암화학요법 후 자궁절제술"}, {"letter": "E", "text": "Type 2 광범위 자궁절제술"}], "answer": "C", "explanation": "Stage 1A1(침윤 깊이 3mm 미만, LVSI 음성)인 경우 가임력 보존을 원하면 원추절제술(conization)만으로도 완치가 가능하다. 필요 시 단순 자궁적출술을 할 수 있지만 가임력 보존이 목적일 때는 원추절제술을 선택한다. Type 2 광범위 자궁절제술은 1A2기에 주로 시행하며, CCRT는 진행된 병기에서 사용된다. 전자궁적출술은 가임력을 보존할 수 없으며, 선행 항암화학요법은 국소 진행성 병변에서 수술 전 종양 크기를 줄이기 위해 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "자궁경부암 1B1기로 광범위 자궁절제술 및 골반 림프절 절제술 시행 후 병리검사에서 절제면 양성이 확인되었다. 다음으로 시행해야 할 가장 적절한 치료는?", "options": [{"letter": "A", "text": "방사선 치료 단독"}, {"letter": "B", "text": "동시항암화학방사선요법(CCRT)"}, {"letter": "C", "text": "정기적 추적관찰"}, {"letter": "D", "text": "추가적인 광범위 수술"}, {"letter": "E", "text": "항암화학요법 단독"}], "answer": "B", "explanation": "자궁경부암 근치적 수술 후 림프절 전이, 절제면 양성, 자궁주변부 침윤 등의 고위험 인자가 하나라도 있으면 동시항암화학방사선요법(CCRT)을 시행해야 한다. CCRT는 방사선 치료에 항암제(cisplatin 기반)를 병용하여 치료 효과를 높이는 표준 요법이다. 추가 수술은 일반적으로 권고되지 않으며, 항암 또는 방사선 단독은 CCRT보다 열등하다. 단순 추적관찰은 재발 위험을 높이므로 부적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "38세 여성이 질출혈로 내원하여 자궁경부 조직생검 결과 침윤성 편평세포암으로 진단되었습니다. MRI 검사에서 오른쪽 자궁주위조직(parametrium) 침범이 확인되어 FIGO 임상병기 IIB로 진단되었습니다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "동시 항암화학방사선요법 (concurrent chemoradiation)"}, {"letter": "B", "text": "전자궁절제술 및 양측 자궁부속기 절제술"}, {"letter": "C", "text": "정기적 질확대경 추적 검사"}, {"letter": "D", "text": "선행 항암화학요법 후 광범위 자궁절제술"}, {"letter": "E", "text": "광범위 자궁절제술 및 골반 림프절 절제술"}], "answer": "A", "explanation": "자궁경부암 IIB기(자궁주위조직 침범) 이상에서는 수술이 불완전할 가능성이 높고 합병증 위험이 크므로 '동시 항암화학방사선요법'이 표준 치료입니다. '광범위 자궁절제술 및 골반 림프절 절제술'은 IB1, 일부 IB2에서 시행되며, IIB에서는 수술적 접근이 권장되지 않습니다. '전자궁절제술 및 양측 자궁부속기 절제술'은 불충분하고, '선행 항암화학요법 후 광범위 자궁절제술'은 연구 단계입니다. '정기적 질확대경 추적 검사'는 전암병변에서 적용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "55세 여성이 자궁경부암 IB1로 광범위 자궁절제술 및 골반 림프절 절제술을 시행받았습니다. 병리조직검사에서 골반 림프절 20개 중 2개에서 전이가 발견되었으나, 자궁주위조직과 질 절단면은 모두 음성이었습니다. 이 환자에게 추가로 시행할 가장 적절한 치료는?", "options": [{"letter": "A", "text": "정기적 추적 관찰"}, {"letter": "B", "text": "선행 항암화학요법 (neoadjuvant CT)"}, {"letter": "C", "text": "보조 방사선 치료 (adjuvant RT)"}, {"letter": "D", "text": "동시 항암화학방사선요법 (concurrent chemoradiation)"}, {"letter": "E", "text": "추가 수술적 절제 (re-operation)"}], "answer": "D", "explanation": "림프절 전이는 고위험 인자로, 수술 후 보조 치료로 '동시 항암화학방사선요법'이 생존율을 개선합니다. '정기적 추적 관찰'만으로는 재발 위험이 높고, '보조 방사선 치료' 단독보다 항암화학방사선요법이 더 효과적입니다. '선행 항암화학요법'은 수술 전에 시행하며, '추가 수술적 절제'는 일반적으로 고려되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "자궁경부암 stage IA2(침윤 깊이 3-5mm)로 진단된 45세 여성에게 시행해야 할 가장 적절한 수술은?", "options": [{"letter": "A", "text": "원추절제술(conization)"}, {"letter": "B", "text": "단순 자궁절제술(Type 1)"}, {"letter": "C", "text": "자궁경부 절제술(trachelectomy)"}, {"letter": "D", "text": "변형 광범위 자궁절제술(Type 2)"}, {"letter": "E", "text": "광범위 자궁절제술(Type 3)"}], "answer": "B", "explanation": "Stage IA1은 원추절제술이나 단순 자궁절제술로 충분하지만, IA2에서는 림프절 전이 위험이 증가하므로 변형 광범위 자궁절제술(Type 2)과 골반 림프절 절제술이 필요하다. Type 3 광범위 자궁절제술은 IB1 이상에서 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "65세 여성이 성교 후 출혈로 내원하여 자궁경부 조직검사에서 침윤 깊이 10 mm의 편평상피세포암으로 확인되었다. 골반 MRI에서 자궁주위 침범은 없고 질과 방광은 정상이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁경부 원추절제술"}, {"letter": "B", "text": "동시 항암화학방사선요법"}, {"letter": "C", "text": "전자궁절제술 및 양측 자궁부속기절제술"}, {"letter": "D", "text": "단순 전자궁절제술"}, {"letter": "E", "text": "확대 전자궁절제술(radical hysterectomy) 및 골반 림프절 절제술"}], "answer": "C", "explanation": "'확대 전자궁절제술(radical hysterectomy) 및 골반 림프절 절제술'이 침윤 깊이 3 mm 이상의 stage IB1 자궁경부암 표준 치료입니다. '단순 전자궁절제술'은 자궁주위 조직을 포함하지 않아 부적절하며, '자궁경부 원추절제술'은 미세침윤암(IA기)에서만 적용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 4}, {"question": "다음 중 자궁내막 증식증(endometrial hyperplasia)의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "타목시펜(tamoxifen) 사용"}, {"letter": "B", "text": "조기 폐경 (Early menopause)"}, {"letter": "C", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": ral contraceptive use)"}, {"letter": "C", "text": "다산력 (multiparity)"}, {"letter": "D", "text": "흡연 (cigarette smoking)"}, {"letter": "E", "text": "조기 폐경 (early menopause)"}], "answer": "A", "explanation": "비만은 말초에서 안드로겐이 에스트로겐으로 전환을 증가시켜 자궁내막암의 위험을 높인다. 다산력, 경구피임약, 흡연, 조기 폐경은 자궁내막암의 위험을 감소시킨다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "다음 중 자궁내막암(endometrial cancer)의 위험인자로 옳지 않은 것은?", "options": [{"letter": "A", "text": "무분만력 (nulliparity)"}, {"letter": "B", "text": "당뇨병 (diabetes mellitus)"}, {"letter": "C", "text": "타목시펜 사용 (tamoxifen use)"}, {"letter": "D", "text": "비만 (obesity)"}, {"letter": "E", "text": "다산력 (multiparity)"}], "answer": "E", "explanation": "'다산력 (multiparity)'은 자궁내막암의 위험을 낮추는 보호 인자로 알려져 있습니다. 자궁내막암의 주요 위험인자로는 '비만', '무분만력', '당뇨병', '타목시펜 사용' 등이 있으며, 이들은 대개 만성적인 무배란성 에스트로겐 노출과 관련됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "다음 중 Type 2 자궁내막암의 특징에 해당하는 것은?", "options": [{"letter": "A", "text": "자궁내막양(endometrioid) 조직학적 유형"}, {"letter": "B", "text": "좋지 않은 예후"}, {"letter": "C", "text": "젊은 여성에서 주로 발생"}, {"letter": "D", "text": "전구 병변으로 자궁내막 증식증이 존재"}, {"letter": "E", "text": "에스트로겐 의존성 종양"}], "answer": "B", "explanation": "Type 2 자궁내막암은 에스트로겐과 무관하고, 주로 고령에서 발생하며, 전구 병변이 없고, 장액성 또는 투명세포암 등 비자궁내막양 조직을 보이며 예후가 불량하다. Type 1은 반대로 에스트로겐 의존성이고, 젊은 여성에서 호발하며, 전구 병변인 증식증이 있고, 자궁내막양 유형으로 예후가 좋다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "린치 증후군(Lynch syndrome)에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "DNA 불일치 복구(mismatch repair) 유전자의 변이가 있다."}, {"letter": "B", "text": "정기적인 자궁내막 평가는 권고되지 않는다."}, {"letter": "C", "text": "BRCA1 유전자 변이가 주된 원인이다."}, {"letter": "D", "text": "상염색체 열성 유전된다."}, {"letter": "E", "text": "자궁내막암보다 대장암의 위험도가 낮다."}], "answer": "A", "explanation": "린치 증후군은 상염색체 우성으로 유전되며, MLH1, MSH2 등 DNA 불일치 복구 유전자의 변이로 인해 발생한다. 대장암과 자궁내막암의 위험을 크게 증가시키므로, 정기적인 대장내시경 및 자궁내막 평가가 권고된다. BRCA1 변이는 주로 유방암/난소암과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "가족성 대장 용종증(familial adenomatous polyposis, FAP)에 대한 설명 중 옳지 않은 것은?", "options": [{"letter": "A", "text": "APC 유전자의 생식세포 돌연변이가 원인이다."}, {"letter": "B", "text": "대장 절제술을 시행하지 않으면 거의 100%에서 대장암이 발생한다."}, {"letter": "C", "text": "선천성 망막 색소 상피 비후(CHRPE)를 동반할 수 있다."}, {"letter": "D", "text": "상염색체 우성(autosomal dominant)으로 유전된다."}, {"letter": "E", "text": "환자의 자녀가 동일 질환을 가질 확률은 100%이다."}], "answer": "E", "explanation": "FAP는 상염색체 우성 유전 질환이므로, 자녀에게 유전될 확률은 50%입니다. 자녀가 반드시 이환된다는 '100%'는 옳지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "다음 중 자궁내막암의 예후 인자가 아닌 것은?", "options": [{"letter": "A", "text": "조직학적 등급"}, {"letter": "B", "text": "조직학적 유형"}, {"letter": "C", "text": "림프혈관강 침범 (LVSI)"}, {"letter": "D", "text": "자궁근층 침범"}, {"letter": "E", "text": "자궁내막 두께"}], "answer": "E", "explanation": "자궁내막 두께는 자궁내막 병변의 선별 검사에 사용되는 지표이지만, 진단된 자궁내막암의 예후를 결정하는 인자는 아닙니다. 예후 인자로는 나이, 조직학적 유형, 조직 등급, 자궁근층 침범, LVSI, 호르몬 수용체 등이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "자궁내막암 근치적 치료 후 권고되는 추적 관찰 일정은?", "options": [{"letter": "A", "text": "첫 2년간 매년 1회, 이후 매년 1회"}, {"letter": "B", "text": "증상 발생 시에만 방문"}, {"letter": "C", "text": "첫 2년간 3-6개월 간격, 이후 6개월 간격으로 5년까지"}, {"letter": "D", "text": "5년간 매 6개월마다"}, {"letter": "E", "text": "3년간 매 3개월, 그 이후 매년 1회"}], "answer": "C", "explanation": "자궁내막암은 대부분 3년 이내에 재발하므로, 처음 2년 동안은 3-6개월 간격으로 적극적인 추적 관찰을 하고, 이후 5년까지는 6개월 간격으로 관찰하며, 그 이후에는 재발 위험이 상대적으로 낮아집니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "유방암의 예후 인자에 대한 설명으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "에스트로겐 수용체(ER) 양성은 예후가 양호하다."}, {"letter": "B", "text": "조직학적 등급이 높을수록 예후가 나쁘다."}, {"letter": "C", "text": "종양의 크기가 클수록 예후가 불량하다."}, {"letter": "D", "text": "액와 림프절 전이는 가장 강력한 예후 인자이다."}, {"letter": "E", "text": "HER2 과발현은 좋은 예후와 관련된다."}], "answer": "A", "explanation": "'HER2 과발현은 좋은 예후와 관련된다'는 옳지 않은 설명입니다. HER2 과발현은 공격적인 생물학적 표지자로 나쁜 예후와 연관됩니다. 다른 인자들은 모두 타당한 예후 인자들입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 8}, {"question": "골반 내 림프절이 부인과 종양에서 중요한 이유로 가장 적절한 것은?", "options": [{"letter": "A", "text": "림프절은 통증 수용체가 풍부하여 종양 크기를 알 수 있다."}, {"letter": "B", "text": "림프절은 항상 항암제의 표적이 된다."}, {"letter": "C", "text": "림프절을 따라 종양이 전이되는 주요 경로가 된다."}, {"letter": "D", "text": "림프절 비대는 양성 종양에서만 관찰된다."}, {"letter": "E", "text": "림프절은 종양의 원발 부위를 결정하는 병리학적 표지자이다."}], "answer": "C", "explanation": "골반 림프절은 자궁경부암, 자궁내막암 등 부인암이 림프액을 따라 전이되는 주요 경로이므로 병기 결정과 치료에 중요하다. 림프절은 통증 수용체가 풍부하지 않고, 원발 부위 결정보다는 전이 평가에 사용되며, 양성 질환에서도 비대 가능하고, 항암제 표적이 항상 되는 것은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "자궁저부(uterine fundus)에서 발생한 악성 종양의 림프절 전이를 평가할 때, 가장 먼저 확인해야 할 림프절은?", "options": [{"letter": "A", "text": "서혜림프절 (Inguinal lymph nodes)"}, {"letter": "B", "text": "천골림프절 (Sacral lymph nodes)"}, {"letter": "C", "text": "외장골림프절 (External iliac lymph nodes)"}, {"letter": "D", "text": "내장골림프절 (Internal iliac lymph nodes)"}, {"letter": "E", "text": "대동맥주위림프절 (Para-aortic lymph nodes)"}], "answer": "E", "explanation": "자궁저부의 림프는 주로 난소혈관을 따라 주행하여 대동맥주위림프절(para-aortic)로 유입된다. 자궁경부와 하부 자궁체부는 외장골, 내장골, 천골림프절로 배출된다. 질 하부와 외음부는 서혜림프절로 배출된다. 따라서 자궁저부 종양의 림프절 전이를 평가할 때는 대동맥주위림프절을 우선적으로 확인해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "Estrogen의 과도한 자극이 지속될 때 자궁내막에서 발생할 수 있는 병변은?", "options": [{"letter": "A", "text": "Adenomyosis"}, {"letter": "B", "text": "Endometrial hyperplasia"}, {"letter": "C", "text": "Endometrial atrophy"}, {"letter": "D", "text": "Endometrial polyp"}, {"letter": "E", "text": "Leiomyoma"}], "answer": "B", "explanation": "Estrogen이 과도하게 작용하면 자궁내막 세포의 과증식이 유발되어 endometrial hyperplasia가 발생한다. 이는 abnormal uterine bleeding의 주된 원인 중 하나이다. Endometrial atrophy는 estrogen 부족 시 나타나며, adenomyosis, leiomyoma, endometrial polyp은 estrogen 의존성이 있으나 직접적인 병리 기전이 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "평소 무증상이었던 30세 여성이 갑자기 시작된 심한 하복통으로 내원하였다. 초음파에서 경부가 있는 장막하 근종(pedunculated subserosal myoma) 주변의 혈류 신호가 소실된 소견이 관찰된다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "응급 근종절제술(myomectomy)"}, {"letter": "B", "text": "GnRH agonist 투여"}, {"letter": "C", "text": "High-intensity focused ultrasound (HIFU)"}, {"letter": "D", "text": "진통제 투여 후 경과 관찰"}, {"letter": "E", "text": "Uterine artery embolization (UAE)"}], "answer": "A", "explanation": "경부가 있는 장막하 근종의 혈류 소실은 염전(torsion)을 시사하며, 이는 급성 허혈성 통증을 유발한다. 괴사나 감염을 방지하기 위해 응급 수술로 근종을 절제해야 한다. 진통제만으로 경과 관찰 시 상태 악화 위험이 있고, GnRH agonist는 응급 상황에 부적합하며, UAE나 HIFU는 염전 치료에 적응증이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "48세 여성이 6개월 전 직경 5 cm의 자궁근종을 진단받고 추적 검사 중이었다. 최근 초음파에서 10 cm로 크기가 증가하고 지속적인 골반통을 호소한다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "자궁근종의 적색 변성 (Red degeneration)"}, {"letter": "B", "text": "자궁평활근육종 (Leiomyosarcoma)"}, {"letter": "C", "text": "자궁내막폴립 (Endometrial polyp)"}, {"letter": "D", "text": "자궁내막증식증 (Endometrial hyperplasia)"}, {"letter": "E", "text": "자궁선근증 (Adenomyosis)"}], "answer": "B", "explanation": "자궁근종이 단기간에 2배 이상 자라는 급속 성장은 악성 종양인 평활근육종(leiomyosarcoma) 가능성을 시사한다. 이는 주로 폐경 전후 연령에서 발생할 수 있다. 자궁선근증은 미만성 비후로 나타나며, 적색 보다 짧고, 내강은 H자 모양이다. 질 앞쪽은 방광과의 사이에 vesicovaginal septum, 뒤쪽은 직장과의 사이에 rectovaginal septum이 존재한다. 질은 자궁경부와 연결된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "Douglas pouch (cul-de-sac)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "방광과 자궁 사이의 공간을 의미한다."}, {"letter": "B", "text": "자궁 앞쪽에 위치한 복막 주름이다."}, {"letter": "C", "text": "직장과 자궁 사이의 공간을 의미한다."}, {"letter": "D", "text": "분만 시 태아가 지나가는 통로이다."}, {"letter": "E", "text": "난소의 위치를 확인하는 해부학적 기준점이다."}], "answer": "C", "explanation": "Douglas pouch는 직장자궁오목(rectouterine pouch)으로 직장과 자궁 사이의 복막이 내려와 형성된 공간이다. 방광과 자궁 사이는 vesicouterine pouch, 분만 통로는 질, 난소 기준점은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "더글라스와(pouch of Douglas)에 고인 액체를 검사하기 위해 시행하는 culdocentesis 시, 바늘을 삽입하는 질 부위는?", "options": [{"letter": "A", "text": "Anterior fornix"}, {"letter": "B", "text": "Right lateral fornix"}, {"letter": "C", "text": "Posterior fornix"}, {"letter": "D", "text": "Left lateral fornix"}, {"letter": "E", "text": "Vaginal orifice"}], "answer": "C", "explanation": "Culdocentesis는 posterior fornix를 통해 바늘을 찔러 더글라스와(pouch of Douglas, posterior cul-de-sac)에 고인 액체를 채취하는 검사입니다. Posterior fornix는 질벽 중 복강과 가장 가까워 얇은 벽만 뚫으면 접근할 수 있습니다. Anterior fornix는 방광에 근접하고, lateral fornix는 혈관과 신경이 많아 위험합니다. Vaginal orifice를 통한 접근은 더글라스와에 도달하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "폐경 전 성인 여성의 질 분비물 pH에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "pH 7.2-7.4로 약알칼리성이며 정자 생존에 유리하다."}, {"letter": "B", "text": "pH 6.8-7.0로 중성이며 Lactobacillus에 의해 유지된다."}, {"letter": "C", "text": "pH 6.8-7.0로 중성이며 사춘기 이전과 동일하다."}, {"letter": "D", "text": "pH 4.0-5.0로 산성이며 estrogen 직접 작용에 의한 것이다."}, {"letter": "E", "text": "pH 4.0-5.0로 산성이며 Lactobacillus가 생성하는 lactic acid에 의한 것이다."}], "answer": "E", "explanation": "가임기(reproductive age) 여성의 질 분비물 pH는 4.0-5.0으로 산성이며, 이는 estrogen의 영향을 받아 증식한 Lactobacillus가 lactic acid를 생성하기 때문입니다. 'pH 6.8-7.0로 중성이며 Lactobacillus에 의해 유지된다'는 사춘기 이전의 중성 pH를 설명한 것이므로 틀립니다. 'pH 4.0-5.0로 산성이며 estrogen 직접 작용에 의한 것이다'는 estrogen이 직접 산성을 만드는 것이 아니라 Lactobacillus를 통해 간접적으로 작용하므로 부정확합니다. 'pH 6.8-7.0로 중성이며 사춘기 이전과 동일하다'는 성인 여성의 pH가 산성이므로 틀립니다. 'pH 7.2-7.4로 약알칼리성이며 정자 생존에 유리하다'는 질 pH가 알칼리성이 아니므로 틀립니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질벽(vaginal wall)의 근육층 배열로 옳은 것은?", "options": [{"letter": "A", "text": "단일 종주근(single longitudinal) 층"}, {"letter": "B", "text": "내층 윤상근(inner circular), 외층 종주근(outer longitudinal)"}, {"letter": "C", "text": "내층 종주근(inner longitudinal), 외층 윤상근(outer circular)"}, {"letter": "D", "text": "사근(oblique muscle)만 존재"}, {"letter": "E", "text": "근섬유가 무작위로 배열"}], "answer": "B", "explanation": "질벽을 포함하여 자궁, 방광, 장관 등 부피가 변하는 중공성 장기(hollow organ)는 일반적으로 내층 윤상근(inner circular), 외층 종주근(outer longitudinal)의 이중 근육층을 가집니다. 강의에서도 'inner circular, outer longitudinal'이라고 명시하였습니다. '내층 종주근, 외층 윤상근'은 반대 배열입니다. '사근만 존재', '단일 종주근 층', '근섬유가 무작위로 배열'은 모두 실제 구조와 다릅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질 점막의 상피(epithelium) 구성으로 옳은 것은?", "options": [{"letter": "A", "text": "이행상피 (transitional epithelium)"}, {"letter": "B", "text": "각화 중층편평상피 (keratinized stratified squamous epithelium)"}, {"letter": "C", "text": "중층 원주상피 (stratified columnar epithelium)"}, {"letter": "D", "text": "단층 원주상피 (simple columnar epithelium)"}, {"letter": "E", "text": "비각화 중층편평상피 (non-keratinized stratified squamous epithelium)"}], "answer": "B", "explanation": "질 점막은 비각화 중층편평상피 (non-keratinized stratified squamous epithelium)로 구성되어 있어 피부와 달리 각질층이 없으며, 이는 자궁경부 외부의 상피와 동일한 유형으로 감염 방어와 유연성 유지에 적합하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질주름(vaginal rugae)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "에스트로겐(estrogen)의 영향과 무관하다."}, {"letter": "B", "text": "가임기(reproductive age) 여성에서 현저하게 나타난다."}, {"letter": "C", "text": "연령과 관계없이 일정하게 유지된다."}, {"letter": "D", "text": "폐경 후에 새로 생성된다."}, {"letter": "E", "text": "사춘기 이전에 가장 현저하게 관찰된다."}], "answer": "E", "explanation": "질주름(vaginal rugae)은 가임기 여성에서 현저하게 관찰된다. 이는 에스트로겐(estrogen)의 영향을 받아 질벽이 늘어나면서 형성되는 주름으로, 사춘기 이전이나 폐경 후에는 에스트로겐 부족으로 인해 희미해지거나 사라진다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "대음순(labia majora)의 조직학적 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "모낭(hair follicle)과 지방 조직이 거의 없다."}, {"letter": "B", "text": "모낭과 지방 조직이 풍부하게 존재한다."}, {"letter": "C", "text": "요도(urethra)와 질(vagina) 입구를 포함한다."}, {"letter": "D", "text": "점막으로 덮여 있어 항상 촉촉하게 유지된다."}, {"letter": "E", "text": "소음순(labia minora)보다 결합조직이 적다."}], "answer": "A", "explanation": "대음순(labia majora)은 모낭과 지방 조직이 풍부하게 존재하여 외부 충격을 흡수하는 쿠션 역할을 하며, 이로 인해 소음순과 달리 털이 나 있다. 소음순은 모낭이 없고 지방이 적은 구조이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질(vagina)의 혈액 공급에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "상부, 중부, 하부로 나뉘어 공급되며 풍부한 문합(anastomosis)을 형성한다."}, {"letter": "B", "text": "오직 한 개의 동맥에서만 혈액을 공급받는다."}, {"letter": "C", "text": "해부학적으로 질동맥(vaginal artery)은 존재하지 않는다."}, {"letter": "D", "text": "문합 없이 각 구역이 독립적으로 혈액을 받는다."}, {"letter": "E", "text": "주로 난소동맥(ovarian artery)이 단독으로 공급한다."}], "answer": "B", "explanation": "질의 혈액 공급은 상부, 중부, 하부로 나뉘어 공급되며 풍부한 문합(anastomosis)을 형성한다. 이로 인해 어느 한 구역의 혈류가 차단되어도 다른 구역에서 보충이 가능하여, 출산 시 손상에 대한 치유 능력이 뛰어나다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 17}, {"question": "자궁경부의 편평원주상피 접합부(squamocolumnar junction)의 임상적 중요성으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "생리적 월경 출혈의 주요 근원이다."}, {"letter": "B", "text": "임신 시 가장 먼저 변화하는 부위이다."}, {"letter": "C", "text": "자궁근종의 가장 흔한 발생 부위이다."}, {"letter": "D", "text": "자궁내막증식증의 호발 부위이다."}, {"letter": "E", "text": "Cervical intraepithelial neoplasia (CIN) 및 cervical cancer의 호발 부위이다."}], "answer": "E", "explanation": "Squamocolumnar junction(SCJ)은 ectocervix의 squamous epithelium과 endocervix의 columnar epithelium이 만나는 부위로, 지속적인 metaplasia가 일어나며 인유두종바이러스(HPV) 감염에 취약하여 cervical intraepithelial neoplasia(CIN) 및 cervical cancer가 호발합니다. '자궁내막증식증의 호발 부위'는 자궁내막입니다. '자궁근종의 가장 흔한 발생 부위'는 자궁근층입니다. '생리적 월경 출혈의 주요 근원'은 자궁내막입니다. '임신 시 가장 먼저 변화하는 부위'는 자궁내막입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "자궁의 협부(isthmus)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁체부(corpus)와 자궁경부 사이의 좁아진 부분이다."}, {"letter": "B", "text": "자궁경부(cervix)의 바깥쪽 부분을 가리킨다."}, {"letter": "C", "text": "자궁에서 가장 넓은 부분이다."}, {"letter": "D", "text": "자궁저부(fundus)의 다른 명칭이다."}, {"letter": "E", "text": "난관이 자궁으로 연결되는 부위이다."}], "answer": "B", "explanation": "자궁 협부(isthmus)는 자궁체부(corpus)와 자궁경부 사이의 좁아진 부분으로, 임신 시 자궁하절(lower uterine segment)을 형성하는 중요한 해부학적 경계이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "월경(menstruation) 시 주로 탈락되는 조직은 무엇인가?", "options": [{"letter": "A", "text": "자궁내막 표층(superficial layer of endometrium)"}, {"letter": "B", "text": "자궁근층(myometrium)"}, {"letter": "C", "text": "자궁내막 기저층(basal layer of endometrium)"}, {"letter": "D", "text": "자궁장막(uterine serosa)"}, {"letter": "E", "text": "자궁경부 점막(cervical mucosa)"}], "answer": "C", "explanation": "월경 시에는 자궁내막 표층(superficial layer of endometrium)이 주기적으로 탈락되어 배출된다. 기저층(basal layer)은 남아서 다음 주기 자궁내막 재생의 원천이 된다. 따라서 월경은 단순한 출혈이 아니라 자궁내막 세포의 탈락 현상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "난소(ovary)의 혈액 공급에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "난소는 broad ligament를 통해 영양을 공급받으므로 별도의 동맥이 없다."}, {"letter": "B", "text": "Ovarian artery는 external iliac artery에서, uterine artery는 internal iliac artery에서 분지한다."}, {"letter": "C", "text": "오직 ovarian artery만으로 공급되며, 이는 internal iliac artery에서 분지한다."}, {"letter": "D", "text": "오직 uterine artery의 ovarian branch로만 공급된다."}, {"letter": "E", "text": "Ovarian artery와 uterine artery의 ovarian branch로부터 dual supply를 받는다."}], "answer": "E", "explanation": "난소는 ovarian artery(대동맥에서 직접 분지)와 uterine artery의 ovarian branch로부터 이중 혈액 공급(dual blood supply)을 받습니다. '오직 ovarian artery만으로 공급되며, 이는 internal iliac artery에서 분지한다'는 ovarian artery가 대동맥에서 나오고, 단독 공급이 아니므로 틀립니다. '오직 uterine artery의 ovarian branch로만 공급된다'도 단독 공급이 아닙니다. 'Ovarian artery는 external iliac artery에서, uterine artery는 internal iliac artery에서 분지한다'는 ovarian artery의 기원이 external iliac이 아니므로 틀립니다. '난소는 broad ligament를 통해 영양을 공급받으므로 별도의 동맥이 없다'는 사실과 다릅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "난관(fallopian tube)에서 정자와 난자가 만나 수정이 가장 흔히 일어나는 부위는?", "options": [{"letter": "A", "text": "협부(isthmus)"}, {"letter": "B", "text": "팽대부(ampulla)"}, {"letter": "C", "text": "누두부(infundibulum)"}, {"letter": "D", "text": "간질부(interstitial part)"}, {"letter": "E", "text": "채(fimbriae)"}], "answer": "A", "explanation": "팽대부(ampulla)는 난관의 가장 넓고 긴 부분으로, 난소에서 배출된 난자가 채(fimbriae)에 의해 채취된 후 정자와 만나 수정이 이루어지는 주요 장소이다. 수정란은 이후 섬모 운동과 꿈틀 운동을 통해 자궁으로 이동한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "난소(ovary)의 피질(cortex)에 주로 위치하는 구조물은?", "options": [{"letter": "A", "text": "섬유근육 조직"}, {"letter": "B", "text": "수질(medulla) 조직"}, {"letter": "C", "text": "황체(corpus luteum)만으로 구성"}, {"letter": "D", "text": "혈관과 신경 다발"}, {"letter": "E", "text": "난포(follicle)"}], "answer": "A", "explanation": "난소의 피질(cortex)에는 난포(follicle)가 주로 위치한다. 난포는 난자를 둘러싼 구조로, 성숙하면서 호르몬을 분비하고 배란을 통해 난자를 방출한다. 수질(medulla)은 혈관, 신경 등이 지나는 지지 조직이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "자궁외 임신의 약 95%는 난관 임신이다. 난관 내에서 가장 호발하는 부위는?", "options": [{"letter": "A", "text": "난관채 (fimbria)"}, {"letter": "B", "text": "난간질부 (interstitial)"}, {"letter": "C", "text": "팽대부 (ampulla)"}, {"letter": "D", "text": "난소 (ovary)"}, {"letter": "E", "text": "협부 (isthmus)"}], "answer": "C", "explanation": "난관 임신의 약 70%는 가장 넓은 부분인 팽대부(ampulla)에서 발생한다. 간질부, 협부, 난관채는 각각 10% 미만이며, 난소 임신은 1~3% 정도로 드물다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "True pelvis에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "분만 시 태아가 통과하는 통로와 무관하다."}, {"letter": "B", "text": "난소와 자궁 등 주요 생식기관이 위치한다."}, {"letter": "C", "text": "Greater pelvis라고도 한다."}, {"letter": "D", "text": "주로 대장과 소장 등 위장관계 장기를 포함한다."}, {"letter": "E", "text": "위쪽이 더 넓고 아래쪽이 좁은 깔때기 모양이다."}], "answer": "B", "explanation": "True pelvis(lesser pelvis)는 난소, 자궁 등 주요 생식기관이 위치하는 공간이며 분만 시 태아가 통과하는 산도 역할을 한다. False pelvis(greater pelvis)가 위쪽에 넓게 위치하고 장기들을 포함한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁인대 중 서혜관(inguinal canal)을 지나 대음순(labia majora)에 부착하는 것은?", "options": [{"letter": "A", "text": "Round ligament"}, {"letter": "B", "text": "Uterosacral ligament"}, {"letter": "C", "text": "Cardinal ligament (transverse cervical ligament)"}, {"letter": "D", "text": "Infundibulopelvic ligament"}, {"letter": "E", "text": "Pubocervical ligament"}], "answer": "A", "explanation": "Round ligament(원인대)는 자궁체부 상부에서 시작하여 서혜관(inguinal canal)을 통과한 후 대음순(labia majora)에 부착됩니다. Uterosacral ligament는 천골에, Cardinal ligament는 자궁경부에서 골반벽으로, Pubocervical ligament는 치골에서 자궁경부로 연결됩니다. Infundibulopelvic ligament는 난소를 골반벽에 고정하며 난소혈관을 포함합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "골반 수술 시 중요한 지표인 요관(ureter)과 자궁동맥(uterine artery)의 해부학적 관계로 옳은 것은?", "options": [{"letter": "A", "text": "요관이 자궁동맥 위쪽으로 지나간다."}, {"letter": "B", "text": "요관이 자궁동맥을 관통하여 지나간다."}, {"letter": "C", "text": "요관이 자궁동맥과 나란히 평행하게 주행한다."}, {"letter": "D", "text": "요관과 자궁동맥은 서로 접촉하지 않는다."}, {"letter": "E", "text": "요관이 자궁동맥 아래쪽으로 지나간다."}], "answer": "A", "explanation": "요관이 자궁동맥 아래쪽으로 지나간다. 이는 'water under the bridge'로 비유되는 관계로, 자궁절제술 등 골반 수술 중 자궁동맥 결찰 시 요관 손상을 피하기 위해 반드시 숙지해야 할 해부학적 지식이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "방광(bladder)과 질(vagina) 사이에 존재하는 공간의 명칭은?", "options": [{"letter": "A", "text": "방광측공간(paravesical space)"}, {"letter": "B", "text": "직장질공간(rectovaginal space)"}, {"letter": "C", "text": "방광질공간(vesicovaginal space)"}, {"letter": "D", "text": "후방광공간(retrovesical space)"}, {"letter": "E", "text": "방광자궁와(vesicouterine pouch)"}], "answer": "E", "explanation": "방광과 질 사이의 느슨한 결합조직 공간을 방광질공간(vesicovaginal space)이라고 한다. 이 공간은 골반 수술 시 중요한 박리면으로 사용되며, 임상적으로 방광류(cystocele) 등과 관련된 해부학적 지표이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복강경 자궁절제술에서 사용하는 uterine manipulator의 기능으로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "수술 시야 확보를 위한 자궁 조작"}, {"letter": "B", "text": "자궁 동맥 결찰(ligation)"}, {"letter": "C", "text": "질원개(fornix) 위치를 표시"}, {"letter": "D", "text": "자궁의 앞뒤·좌우 움직임 조절"}, {"letter": "E", "text": "복강 내 가스(CO2) 유출 방지"}], "answer": "B", "explanation": "Uterine manipulator는 자궁을 움직여 시야를 확보하고, cup이 fornix를 표시하여 절개선을 확인하게 하며, balloon이 공기 누출을 막습니다. 그러나 자궁 동맥 결찰은 별도의 지혈 도구나 봉합으로 시행하는 것으로, manipulator의 기능이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복강경 수술 중 하복부에 trocar를 삽입할 때 손상 위험이 가장 높은 혈관은?", "options": [{"letter": "A", "text": "대동맥(aorta)"}, {"letter": "B", "text": "하복벽동맥(inferior epigastric artery)"}, {"letter": "C", "text": "자궁동맥(uterine artery)"}, {"letter": "D", "text": "상장간막동맥(superior mesenteric artery)"}, {"letter": "E", "text": "난소동맥(ovarian artery)"}], "answer": "B", "explanation": "강의에서 복강경 trocar 삽입 시 배꼽 주변과 하복부에서 하복벽동맥(inferior epigastric artery)과 표층장골회선동맥(superficial circumflex iliac artery)을 특히 주의하라고 언급했습니다. 자궁동맥은 broad ligament 내에 있어 직접 trocar 손상을 받지 않으며, 대동맥은 깊은 위치에 있지만 trocar 삽입 시 직접 찔릴 위험보다는 하복벽동맥이 더 흔히 손상됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복식 자궁절제술(abdominal hysterectomy) 중 broad ligament를 박리할 때, 요관(ureter) 손상이 가장 흔히 발생할 수 있는 해부학적 위치는?", "options": [{"letter": "A", "text": "ureter가 방광(bladder)으로 들어가는 부위"}, {"letter": "B", "text": "ureter가 broad ligament 상부에서 난소(ovary)와 인접한 부위"}, {"letter": "C", "text": "ureter가 sacral promontory 주변을 지나는 부위"}, {"letter": "D", "text": "ureter가 uterine artery 아래를 지나가는 부위"}, {"letter": "E", "text": "ureter가 common iliac artery를 가로지르는 부위"}], "answer": "E", "explanation": "자궁절제술 시 broad ligament를 박리할 때, 'ureter가 uterine artery 아래를 지나가는 부위'에서 요관이 uterine artery와 함께 결찰되거나 손상될 위험이 가장 높습니다. 이 해부학적 관계를 'water under the bridge'라고 하며, 부인과 수술에서 요관 손상의 대표적인 위치입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "시상하부의 GnRH 분비는 박동성(pulsatile)으로 이루어지며, 그 빈도에 따라 뇌하수체에서 분비되는 gonadotropin이 달라진다. GnRH 펄스 빈도가 감소할 때 상대적으로 더 분비가 촉진되는 호르몬은?", "options": [{"letter": "A", "text": "Prolactin"}, {"letter": "B", "text": "FSH"}, {"letter": "C", "text": "TSH"}, {"letter": "D", "text": "ACTH"}, {"letter": "E", "text": "LH"}], "answer": "B", "explanation": "GnRH 펄스 빈도가 높으면 LH 분비가 우세하고, 빈도가 낮으면 FSH 분비가 촉진된다. 이러한 차이는 GnRH 수용체의 신호전달 경로에 따라 결정된다. Prolactin, TSH, ACTH는 GnRH에 의해 직접 조절되지 않으므로 틀리다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "난소의 granulosa cell에서 분비되는 inhibin의 주된 작용은?", "options": [{"letter": "A", "text": "FSH 분비 억제"}, {"letter": "B", "text": "LH 분비 촉진"}, {"letter": "C", "text": "Prolactin 분비 억제"}, {"letter": "D", "text": "GnRH 분비 촉진"}, {"letter": "E", "text": "FSH 분비 촉진"}], "answer": "A", "explanation": "Inhibin은 뇌하수체 전엽에 작용하여 FSH의 분비를 선택적으로 억제하는 negative feedback 호르몬이다. 일부 문헌에서 LH 분비 촉진 작용이 보고되나, 주된 생리적 역할은 FSH의 분비 조절이다. Activin은 이와 반대로 FSH 분비를 촉진한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "다음 중 난소의 과립막 세포에서 분비되어 뇌하수체 전엽에서 난포자극호르몬(FSH) 분비를 촉진하는 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Activin"}, {"letter": "B", "text": "Estrogen"}, {"letter": "C", "text": "Follistatin"}, {"letter": "D", "text": "Inhibin"}, {"letter": "E", "text": "Progesterone"}], "answer": "D", "explanation": "Activin은 과립막 세포에서 생성되어 뇌하수체 전엽에 작용하여 FSH 분비를 촉진하는 반면, inhibin은 이와 반대로 FSH 분비를 억제한다. Follistatin은 activin 결합 단백질로 그 작용을 조절한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "사춘기 이전에 시상하부-뇌하수체-난소(HPO) 축이 억제되어 생식 기능이 발현되지 않는 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "시상하부의 GnRH 분비 세포가 완전히 발달하지 않았기 때문이다."}, {"letter": "B", "text": "뇌하수체에서 FSH와 LH를 저장할 수 없기 때문이다."}, {"letter": "C", "text": "태반에서 분비된 호르몬에 의해 지속적으로 억제되기 때문이다."}, {"letter": "D", "text": "저용량의 성호르몬에도 중추신경계의 음성 피드백 감수성이 매우 높기 때문이다."}, {"letter": "E", "text": "난소에 원시난포가 존재하지 않기 때문이다."}], "answer": "E", "explanation": "사춘기 이전에는 성호르몬의 농도가 낮음에도 불구하고 중추신경계의 에스트로겐에 대한 음성 피드백 감수성이 고도로 발달되어 있어, HPO 축이 억제된 상태로 유지되어 생식 기능이 발현되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "사춘기 시상하부-뇌하수체-난소(HPO) 축 활성화에 따른 호르몬 변화로 옳은 것은?", "options": [{"letter": "A", "text": "Estradiol 분비는 아침에 주로 증가한다."}, {"letter": "B", "text": "LH 분비는 주로 낮 동안 규칙적으로 증가한다."}, {"letter": "C", "text": "수면 중 FSH와 LH 분비가 현저히 증가한다."}, {"letter": "D", "text": "HPO 축은 사춘기 이전까지 시상하부에서 분비되는 억제 인자에 의해 지속적으로 억제된다."}, {"letter": "E", "text": "GnRH 맥동성 분비는 사춘기 이후 점차 감소한다."}], "answer": "C", "explanation": "‘수면 중 FSH와 LH 분비가 현저히 증가한다’는 옳다. 사춘기 초기에는 특히 수면 중 LH 맥동 분비가 강화되며, 이는 시상하부-뇌하수체 축 활성화의 특징이다. ‘LH 분비는 주로 낮 동안 규칙적으로 증가한다’는 틀리다. 초기에는 주로 수면 중 증가한다. ‘Estradiol 분비는 아침에 주로 증가한다’는 틀리다. 오히려 오후에 증가하는 경향이 보고된다. ‘GnRH 맥동성 분비는 사춘기 이후 점차 감소한다’는 틀리다. 사춘기에 활성화되어 증가한다. ‘HPO 축은 사춘기 이전까지 시상하부에서 분비되는 억제 인자에 의해 지속적으로 억제된다’는 사춘기 전 상태의 설명으로, 활성화 변화를 묻는 질문에 틀린 답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "태아 시기의 시상하부-뇌하수체-난소(HPO) 축에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "GnRH 분비는 출생 직후부터 시작된다."}, {"letter": "B", "text": "HPO 축의 부성 피드백은 사춘기 이후에 형성된다."}, {"letter": "C", "text": "임신 20주 이전에는 FSH 분비가 활발하다."}, {"letter": "D", "text": "태아 시기에는 난소에서 estrogen 분비가 왕성하다."}, {"letter": "E", "text": "임신 10주경 GnRH가 출현하고, 20주 이후 negative feedback이 완성된다."}], "answer": "E", "explanation": "교수는 '임신 10주경에 이미 GnRH는 출현되어 있고, 임신 20주 이후에 이제 HPO axis의 negative feedback은 완성이 되어 있다'고 명시적으로 설명하였다. 따라서 '임신 10주경 GnRH가 출현하고, 20주 이후 negative feedback이 완성된다'가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "GnRH agonist를 지속적으로 투여하면 초기에는 FSH, LH 분비가 증가하지만, 장기적으로는 오히려 분비가 억제된다. 이러한 억제가 발생하는 주된 기전은?", "options": [{"letter": "A", "text": "뇌하수체 GnRH 수용체의 하향조절(downregulation)"}, {"letter": "B", "text": "난소의 estrogen 과다 분비"}, {"letter": "C", "text": "갑상선 호르몬 분비 감소"}, {"letter": "D", "text": "시상하부의 GnRH 분비 감소"}, {"letter": "E", "text": "Prolactin 분비 증가"}], "answer": "A", "explanation": "GnRH agonist는 GnRH보다 반감기가 길어 지속적으로 뇌하수체 GnRH 수용체에 결합하여 수용체 내재화(internalization)와 하향조절을 유도한다. 그 결과 탈감작(desensitization)이 발생하여 FSH, LH 분비가 억제된다. 다른 기전들은 이 현상의 주된 원인이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH antagonist에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Progesterone 분비를 직접 촉진한다."}, {"letter": "B", "text": "작용 발현이 GnRH agonist보다 느리다."}, {"letter": "C", "text": "지속 투여 시 수용체 하향조절이 필요하다."}, {"letter": "D", "text": "투여 초기에 FSH, LH의 일시적 급증(flare-up)이 나타난다."}, {"letter": "E", "text": "투여 즉시 경쟁적 차단을 통해 FSH, LH 분비를 억제한다."}], "answer": "E", "explanation": "GnRH antagonist는 GnRH 수용체에 경쟁적으로 결합하여 즉각적으로 FSH와 LH 분비를 억제하며, flare-up 효과가 전혀 없다. 반면 GnRH agonist는 초기 flare-up 후 지속 투여 시 하향조절을 통해 억제된다. Progesterone 분비 촉진 효과는 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH agonist와 GnRH의 반감기에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "GnRH agonist의 긴 반감기로 인해 지속 투여 시 뇌하수체 수용체 하향조절을 유발한다."}, {"letter": "B", "text": "GnRH agonist는 짧은 반감기로 인해 박동성 투여에 적합하다."}, {"letter": "C", "text": "GnRH는 반감기가 길어 약물로 적합하다."}, {"letter": "D", "text": "GnRH agonist는 GnRH보다 반감기가 짧다."}, {"letter": "E", "text": "GnRH의 반감기는 약 2-4시간이다."}], "answer": "A", "explanation": "천연 GnRH의 반감기는 약 2-4분으로 매우 짧아 약물화하기 어렵다. 반면 GnRH agonist는 화학적 변형을 통해 반감기를 길게 설계하였으며, 이로 인해 지속 투여 시 수용체에 장기간 결합하여 내재화 및 하향조절을 일으켜 FSH, LH 분비를 억제한다. 1, 2, 4, 5는 모두 반감기에 대한 잘못된 설명이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "배란 후 잔여 난포로부터 형성되는 corpus luteum의 주된 내분비 기능은?", "options": [{"letter": "A", "text": "Inhibin 분비"}, {"letter": "B", "text": "FSH 분비"}, {"letter": "C", "text": "Progesterone 분비"}, {"l 2시간을 분명히 제시하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 27}, {"question": "모유 수유 중인 여성에서 흔히 나타나는 무월경의 주된 발생 기전은?", "options": [{"letter": "A", "text": "Oxytocin 증가에 의한 자궁내막 위축"}, {"letter": "B", "text": "Cortisol 증가에 의한 스트레스 반응"}, {"letter": "C", "text": "Prolactin 증가에 의한 HPO axis 억제"}, {"letter": "D", "text": "TSH 증가로 인한 난소 기능 저하"}, {"letter": "E", "text": "Progesterone 증가에 의한 배란 지연"}], "answer": "C", "explanation": "수유 중 유두 자극은 prolactin 분비를 현저히 증가시키며, prolactin은 시상하부에서 GnRH 박동성 분비를 억제한다. 이로 인해 FSH, LH 분비가 감소하여 배란 및 월경이 중지된다. Oxytocin은 유즙 분출에는 관여하나 무월경 유발과 직접적 연관은 없으며, TSH, cortisol, progesterone은 주된 기전이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 28}, {"question": "일차성 갑상선 기능 저하증(hypothyroidism) 환자에서 무월경이 발생하는 주된 기전은?", "options": [{"letter": "A", "text": "갑상선 자가항체가 난소를 공격함"}, {"letter": "B", "text": "T3, T4 감소가 난소를 직접 억제함"}, {"letter": "C", "text": "TRH 증가가 프로락틴을 증가시킴"}, {"letter": "D", "text": "에스트로겐 대사 장애로 인한 자궁내막 위축"}, {"letter": "E", "text": "TSH의 상승이 FSH와 LH 분비를 억제함"}], "answer": "E", "explanation": "강의에서 설명된 바와 같이, TSH, FSH, LH는 알파 서브유닛이 유사하여, TSH가 과도하게 분비되면 뇌하수체가 마치 FSH/LH가 충분한 것으로 오인하여 분비를 억제함으로써 배란이 억제되고 무월경이 발생할 수 있다. TRH/프로락틴 경로도 영향을 줄 수 있으나, 강의에서는 주로 TSH의 직접 억제 효과를 강조하였으며, 다른 보기들은 주된 기전이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 28}, {"question": "다음 중 prolactin 과잉 분비가 월경에 미치는 가장 주된 영향은?", "options": [{"letter": "A", "text": "정상 월경 유지"}, {"letter": "B", "text": "배란통 증가"}, {"letter": "C", "text": "월경 주기 단축"}, {"letter": "D", "text": "무월경 (amenorrhea)"}, {"letter": "E", "text": "월경과다 (menorrhagia)"}], "answer": "D", "explanation": "Prolactin 과잉은 시상하부에서 GnRH 분비를 억제하여 FSH, LH 분비 저하를 초래하고, 이로 인해 배란 장애와 무월경이 발생합니다. 따라서 월경과다나 주기 단축보다는 무월경이 가장 특징적인 영향입니다.", "chunkTranscript": "", "setName": "REI", "fileName":
