막 (Urogenital diaphragm)"}, {"letter": "B", "text": "외음부 (Vulva)"}, {"letter": "C", "text": "하부 항문관 (Lower anal canal)"}, {"letter": "D", "text": "직장 (Rectum)"}, {"letter": "E", "text": "회음체 (Perineal body)"}], "answer": "B", "explanation": "음부신경은 S2-S4에서 기원하여 외음부, 회음부, 하부 항문관, 비뇨생식격막 등에 분포한다. 그러나 직장의 상부와 자궁, 자궁경부는 음부신경이 지배하지 않으며, 골반 내장 신경의 지배를 받으므로 음부신경차단 후에도 감각이 유지된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반 장기 탈출증의 발생에 가장 큰 영향을 미치는 요인은 무엇인가?", "options": [{"letter": "A", "text": "폐경 이후 에스트로겐 결핍"}, {"letter": "B", "text": "비만으로 인한 골반 내 지방 조직 축적"}, {"letter": "C", "text": "만성 기침과 같은 지속적인 복압 상승"}, {"letter": "D", "text": "질식 분만 과정에서의 골반 기저 손상"}, {"letter": "E", "text": "유전적 결합 조직 이상"}], "answer": "D", "explanation": "강의에서 골반 장기 탈출증의 가장 큰 원인은 분만(특히 질식 분만)으로 인한 골반 기저 근육, 인대, 근막의 손상이라고 명시하였다. 다른 요인들도 악화 요인이 될 수 있으나, 주된 발생 원인은 분만 손상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반 장기 지지를 위한 Level 1 구조물에 해당하는 것은?", "options": [{"letter": "A", "text": "항문 거근 (levator ani muscle)의 치골-직장근 (puborectalis)"}, {"letter": "B", "text": "기 인대 (cardinal ligament)와 자궁-천골 인대 (uterosacral ligament)"}, {"letter": "C", "text": "직장-질 근막 (rectovaginal fascia)"}, {"letter": "D", "text": "치골-경부 근막 (pubocervical fascia)"}, {"letter": "E", "text": "회음체 (perineal body)와 외항문 괄약근"}], "answer": "B", "explanation": "Level 1 지지는 자궁 경부와 질 상부를 지지하는 주요 인대들로, 기 인대(cardinal ligament)와 자궁-천골 인대(uterosacral ligament)가 여기에 속한다. 치골-경부 근막과 직장-질 근막은 Level 2에, 항문 거근과 회음체는 Level 3에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "다음 중 Level 2 지지 구조의 결손 시 직접적으로 발생할 수 있는 질환은 무엇인가?", "options": [{"letter": "A", "text": "복압성 요실금"}, {"letter": "B", "text": "방광류 (cystocele)"}, {"letter": "C", "text": "자궁 탈출증"}, {"letter": "D", "text": "완전 회음 열상"}, {"letter": "E", "text": "질 천장 탈출증"}], "answer": "B", "explanation": "Level 2는 질 중간 부위를 지지하며, 전방의 치골-경부 근막 결손 시 방광류, 후방의 직장-질 근막 결손 시 직장류가 발생한다. 복압성 요실금은 Level 3 결손, 자궁 탈출과 질 천장 탈출은 Level 1 결손과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "항문 거근(levator ani muscle)을 구성하는 근육이 아닌 것은?", "options": [{"letter": "A", "text": "치골-직장근 (puborectalis)"}, {"letter": "B", "text": "장골-미골근 (iliococcygeus)"}, {"letter": "C", "text": "치골-미골근 (pubococcygeus)"}, {"letter": "D", "text": "치골-질근 (pubovaginalis)"}, {"letter": "E", "text": "외항문 괄약근 (external anal sphincter)"}], "answer": "E", "explanation": "항문 거근은 치골-미골근, 치골-직장근, 치골-질근을 포함하는 치골 내장근(pubovisceral muscle)과 장골-미골근으로 구성된다. 외항문 괄약근은 항문을 직접 조이는 별도의 골격근으로, 항문 거근에 포함되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "분만 중 난산으로 levator ani m.이 찢어진 후 변실금이 발생한 산모에서, 이 증상과 가장 관련이 깊은 근육의 마비는?", "options": [{"letter": "A", "text": "Puborectalis m."}, {"letter": "B", "text": "Pubococcygeus m."}, {"letter": "C", "text": "Coccygeus m."}, {"letter": "D", "text": "Iliococcygeus m."}, {"letter": "E", "text": "Piriformis m."}], "answer": "A", "explanation": "Puborectalis m.은 항문직장각(anorectal angle)을 유지하여 변실금 방지에 핵심적인 역할을 합니다. 이 근육이 손상되면 변실금이 발생할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반 장기 지지 구조 중 Level 3 결손과 가장 직접적으로 관련된 질환은?", "options": [{"letter": "A", "text": "자궁경부 하강 (cervical descent)"}, {"letter": "B", "text": "직장류 (rectocele)"}, {"letter": "C", "text": "복압성 요실금 (stress urinary incontinence)"}, {"letter": "D", "text": "방광류 (cystocele)"}, {"letter": "E", "text": "질 천장 탈출 (vaginal vault prolapse)"}], "answer": "C", "explanation": "Level 3 지지 구조는 질 하부와 요도를 지지하는데, 이 부위의 결손은 요도 지지 약화를 유발하여 복압이 상승할 때 소변이 새는 복압성 요실금을 일으킬 수 있다. 방광류와 직장류는 주로 Level 2 결손, 질 천장 탈출과 자궁경부 하강은 Level 1 결손과 연관된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "56세 여성이 무거운 물건을 들 때 소변이 새어나와 내원하였다. 신체검진에서 Q-tip 검사는 40도였고, VLPP(valsalva leak point pressure)는 110 cmH2O였다. 이 환자에 대한 설명으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "즉시 중부요도슬링술(midurethral sling)이 필요하다."}, {"letter": "B", "text": "배뇨근 과활동성(detrusor overactivity)이 주된 원인이다."}, {"letter": "C", "text": "요도괄약근의 내인성 결함(intrinsic sphincter deficiency)이 의심된다."}, {"letter": "D", "text": "약물 치료가 우선이며 수술은 금기이다."}, {"letter": "E", "text": "요도의 과운동성(urethral hypermobility)에 의한 복압성 요실금이다."}], "answer": "E", "explanation": "Q-tip 검사에서 30도 이상의 각도는 요도의 과운동성을 의미하며, VLPP가 60 cmH2O 이상이면 내인성 괄약근 결함을 배제할 수 있다. 따라서 이 환자는 요도과운동성에 의한 복압성 요실금으로 진단할 수 있다. 배뇨근 과활동성은 절박뇨와 관련되며, 내인성 괄약근 결함은 VLPP가 낮을 때 의심한다. 치료는 골반 저근 운동이나 중부요도슬링술을 고려할 수 있으나 즉시 수술이 항상 필요한 것은 아니며 약물 치료가 우선이라는 표현은 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반장기 탈출증(POP)에서 level 1 결손과 관련된 지지 구조물로 옳은 것은?", "options": [{"letter": "A", "text": "Perineal body"}, {"letter": "B", "text": "Levator ani muscle"}, {"letter": "C", "text": "Arcus tendineus levator fascia"}, {"letter": "D", "text": "Uterosacral 및 cardinal ligament"}, {"letter": "E", "text": "Endopelvic fibromuscular connective tissue"}], "answer": "D", "explanation": "Level 1은 uterosacral ligament와 cardinal ligament가 담당하며, 이들의 손상은 자궁경부 탈출이나 자궁탈출증을 유발한다. Levator ani muscle은 주로 level 2, perineal body는 level 3, arcus tendineus와 endopelvic connective tissue는 level 2 지지에 관여한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반장기 탈출증(POP)에서 level 3 결손 시 가장 주된 손상 구조물은 무엇인가?", "options": [{"letter": "A", "text": "골반횡격막(Pelvic diaphragm)"}, {"letter": "B", "text": "항문괄약근(Anal sphincter)"}, {"letter": "C", "text": "회음체(Perineal body)"}, {"letter": "D", "text": "기본인대(Cardinal ligament)"}, {"letter": "E", "text": "자궁천골인대(Uterosacral ligament)"}], "answer": "C", "explanation": "회음체(Perineal body)는 질 입구와 항문 사이에 위치한 섬유근성 구조물로, level 3의 주요 지지 구조입니다. 분만 시 손상되면 질출구가 벌어지고, 직장류나 변실금이 발생할 수 있습니다. 자궁천골인대와 기본인대는 level 1, 골반횡격막은 level 2의 주요 구조물입니다. 항문괄약근도 level 3에서 기능적 영향을 받지만 주된 구조적 손상은 회음체입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반장기탈출증의 해부학적 지지 단계(Level) 중 Level 1 결손에서 주로 손상되는 구조는?", "options": [{"letter": "A", "text": "Perineal body (회음체)"}, {"letter": "B", "text": "Anal sphincter (항문 괄약근)"}, {"letter": "C", "text": "Cardinal ligament (기본인대)"}, {"letter": "D", "text": "Urogenital diaphragm (비뇨생식격막)"}, {"letter": "E", "text": "Levator ani muscle (항문거근)"}], "answer": "C", "explanation": "Level 1은 자궁과 질 상부를 지지하는 cardinal ligament 및 uterosacral ligament의 손상이 주된 결손이다. 강의에서 ‘Level 1에서는 cardinal ligament, uterosacral ligament 이런 것들이 연관이 있다’고 하였다. Perineal body와 anal sphincter는 Level 3 결손, levator ani muscle은 골반저 전체를 지지하지만 Level 분류상 특정 단계에만 국한되지 않으며, urogenital diaphragm은 Level 2 또는 3에 속하는 구조이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "골반장기탈출증 환자에서 골반 지지 조직의 특성에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "골반저근은 운동으로 강화되지만 connective tissue는 자연 치유되지 않는다."}, {"letter": "B", "text": "Levator ani muscle은 손상 시 자연적으로 완전히 회복된다."}, {"letter": "C", "text": "Kegel 운동은 connective tissue를 강화하여 증상을 호전시킨다."}, {"letter": "D", "text": "질벽의 connective tissue는 운동을 통해 재생될 수 있다."}, {"letter": "E", "text": "Connective tissue는 노화에 따라 두꺼워져 prolapse를 예방한다."}], "answer": "A", "explanation": "골반저근은 운동으로 강화되지만 connective tissue는 자연 치유되지 않는다는 설명이 옳다. 강의에서 connective tissue는 스스로 회복되지 않지만, 근육은 운동을 통해 강화될 수 있다고 여러 번 강조하였다. 이러한 치유 능력의 차이는 수술 재발률이 높은 이유와 Kegel 운동의 효과 및 한계를 설명한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "13세 여아가 12세에 초경을 시작한 후 점점 심해지는 주기적 우측 하복통을 호소한다. 골반 진찰에서 세로 질 중격과 두 개의 자궁경부가 확인된다. 골반 초음파에서 자궁이 두 개(didelphys)이고 우측 질강에 액체 저류가 관찰된다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "우측 난관난소절제술"}, {"letter": "B", "text": "두 자궁에 대한 성형술(metroplasty)"}, {"letter": "C", "text": "GnRH 작용제 주사"}, {"letter": "D", "text": "세로 질 중격 절제술(septectomy)"}, {"letter": "E", "text": "질 스텐트 삽입"}], "answer": "D", "explanation": "폐쇄성 편측 질 중격(obstructed hemivagina)은 didelphys 자궁과 동반되어 월경혈이 한쪽에 고여 통증을 유발한다. 치료는 막힌 쪽을 개통시키는 질 중격 절제술(septectomy)이다. 난소절제는 필요 없고, metroplasty는 반복유산 등 적응증이 아니라면 시행하지 않는다. GnRH 작용제는 일시적 증상 완화만 가능하고, 스텐트는 해결책이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "32세 여성이 2년 전 임신 중절 후 월경량이 현저히 줄어 하루 정도만 소량 출혈이 있다. 임신을 원하며, 자궁난관조영술에서 자궁강 내 다발성 충만 결손(filling defects)이 관찰된다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "항응고제 투여"}, {"letter": "B", "text": "복강경 자궁근종절제술"}, {"letter": "C", "text": "자궁절제술"}, {"letter": "D", "text": "자궁강내 유착박리술 (Hysteroscopic adhesiolysis)"}, {"letter": "E", "text": "자궁내막 소파술"}], "answer": "D", "explanation": "자궁강내 유착(intrauterine adhesions), 즉 Asherman 증후군의 치료는 자궁경을 통한 유착박리술(hysteroscopic adhesiolysis)이다. 이후 에스트로겐 요법을 통해 자궁내막 재생을 촉진한다. 소파술은 유착을 악화시키며, 자궁절제술은 가임력 보존을 원하는 환자에게 부적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "15세 여아가 초경 시작 후 주기적인 좌측 하복통을 호소한다. 골반 초음파에서 우측으로 치우친 단각자궁과 좌측에 자궁근층을 포함한 3 cm 종괴가 보이며, 내부에 자궁내막이 추정된다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "흔적각 절제술"}, {"letter": "B", "text": "좌측 난관 난소 절제술"}, {"letter": "C", "text": "주기적 경과 관찰"}, {"letter": "D", "text": "자궁성형술"}, {"letter": "E", "text": "진통제 투여"}], "answer": "A", "explanation": "자궁내막이 있는 기능적 흔적각은 월경혈 저류로 인한 통증과 자궁내막증을 유발할 수 있으므로 절제술이 필요합니다. 단순 진통제 투여는 근본적 해결이 되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "32세 여자가 2년 전 자궁내막 긁어냄술 이후 월경량이 현저히 감소하고 임신이 되지 않아 내원하였다. 자궁난관조영술에서 자궁내강 내에 불규칙한 결손 음영이 관찰되었다. 진단은?", "options": [{"letter": "A", "text": "자궁내유착"}, {"letter": "B", "text": "자궁선근종"}, {"letter": "C", "text": "자궁근종"}, {"letter": "D", "text": "자궁내막용종"}, {"letter": "E", "text": "자궁내막증"}], "answer": "A", "explanation": "The history of uterine curettage followed by hypomenorrhea and HSG showing irregular filling defects is characteristic of intrauterine adhesions (Asherman's syndrome). Endometriosis typically presents with dysmenorrhea and pelvic pain without characteristic HSG findings. Endometrial polyps and myomas may cause menorrhagia rather than hypomenorrhea. Adenomyosis causes dysmenorrhea and menorrhagia, and HSG would not show such defects.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "구리 IUD를 사용 중인 34세 여성이 무월경으로 임신 검사에서 양성 판정을 받았다. 질 초음파에서 자궁 내 태아와 IUD가 함께 관찰되나, 자궁경관 밖으로 연결된 실은 확인되지 않는다. 가장 적절한 다음 조치는?", "options": [{"letter": "A", "text": "자궁소파술을 시행하여 유산시킨다."}, {"letter": "B", "text": "초음파 유도 하에 IUD 제거를 시도한다."}, {"letter": "C", "text": "IUD 제거를 시도하지 않고 임신을 유지한다."}, {"letter": "D", "text": "전신 마취하에 자궁경과 IUD를 함께 제거한다."}, {"letter": "E", "text": "Methotrexate 전신 투여로 자연 배출을 유도한다."}], "answer": "B", "explanation": "IUD 삽입 상태에서 임신이 확인되고 실이 보이지 않을 때는 초음파 유도 하에 조심스럽게 제거를 시도하는 것이 권장됩니다. 제거할 수 없는 경우에는 IUD를 그대로 두고 임신을 유지하면서 자연 유산 등의 위험을 설명합니다. 유산을 강제하는 것은 임신을 원하는 경우에는 먼저 고려되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "향후 임신을 원하는 30세 여성이 난관 팽대부의 자궁외 임신으로 진단받았다. 가장 적절한 수술적 치료는?", "options": [{"letter": "A", "text": "난관 절제술 (salpingectomy)"}, {"letter": "B", "text": "자궁 적출술 (hysterectomy)"}, {"letter": "C", "text": "쐐기 절제술 (cornual resection)"}, {"letter": "D", "text": "난관 개구술 (salpingotomy)"}, {"letter": "E", "text": "난소 절제술 (oophorectomy)"}], "answer": "D", "explanation": "난관 개구술(salpingotomy)은 난관에 선형 절개를 가하여 임신조직만 제거하고 난관을 보존하는 수술법으로, 향후 임신을 원하는 환자에서 선택된다. 난관 절제술은 난관 전체를 제거하므로 가임력 보존에 불리하며, 쐐기 절제술은 간질부 임신에서 시행한다. 자궁 적출술이나 난소 절제술은 이 경우 과도한 처치이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "32세 여성이 무월경과 하복통으로 내원하였으며, 경질 초음파에서 자궁 좌측 나팔관 연결부에 2.5cm의 임신낭이 관찰되어 간질부 임신으로 진단되었다. 활력징후는 안정적이며, 태아 심박동은 없다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "난관 절제술(salpingectomy)"}, {"letter": "B", "text": "methotrexate 단회 투여"}, {"letter": "C", "text": "난관 개구술(salpingotomy)"}, {"letter": "D", "text": "쐐기 절제술(cornual resection)"}, {"letter": "E", "text": "자궁 전절제술(hysterectomy)"}], "answer": "C", "explanation": "간질부 임신(interstitial/cornual pregnancy)은 자궁근층 내에 착상한 것으로, 약물 치료로 해결되지 않을 가능성이 있으며 수술적 치료가 원칙이다. 수술 시 자궁벽 일부를 포함한 쐐기 절제술(cornual resection)을 시행하여 임신낭을 완전히 제거하고 자궁을 복원한다. 난관 절제술만으로는 불완전할 수 있으며, 자궁 전절제술은 가임기 여성에서 과도한 처치이다. MTX는 심박동이 없고 작은 경우 시도할 수 있으나, 간질부 임신은 수술이 더 선호된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "30세 여성이 1년 전 자연유산으로 자궁긁어냄술을 받은 이후 월경량이 뚜렷하게 감소하였다. 자궁난관조영술(HSG)에서 자궁강 내에 여러 군데 조영제 충만결손이 보이고 주입 시 심한 저항이 느껴졌다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "자궁내피종"}, {"letter": "B", "text": "자궁내막증식증"}, {"letter": "C", "text": "Asherman 증후군"}, {"letter": "D", "text": "자궁근종"}, {"letter": "E", "text": "자궁선근증"}], "answer": "C", "explanation": "반복된 자궁 소파술 이후 무월경 또는 희발월경이 나타나고 HSG에서 충만 결손 및 주입 저항이 있을 때 자궁강 내 유착, 즉 Asherman 증후군을 의심합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "자궁경 수술 시 glycine이나 sorbitol 등의 팽창 매체(distension media) 사용으로 인해 발생할 수 있는 심각한 전해질 이상은?", "options": [{"letter": "A", "text": "저나트륨혈증(hyponatremia)"}, {"letter": "B", "text": "고마그네슘혈증(hypermagnesemia)"}, {"letter": "C", "text": "저칼슘혈증(hypocalcemia)"}, {"letter": "D", "text": "고칼륨혈증(hyperkalemia)"}, {"letter": "E", "text": "고나트륨혈증(hypernatremia)"}], "answer": "A", "explanation": "자궁경 수술에서 사용되는 비전해질 팽창 매체(glycine, sorbitol 등)가 혈관 내로 흡수되면 혈액 희석으로 인한 저나트륨혈증과 저삼투압증이 발생할 수 있습니다. 이는 TURP 증후군과 유사하며 심각한 신경학적 증상을 유발할 수 있습니다. 고나트륨혈증이나 다른 전해질 이상은 주된 합병증이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "여성 신생아가 음핵비대와 부분적인 음순융합을 보인다. 혈액 검사에서 17-하이드록시프로게스테론(17-OHP)이 높고 코르티솔은 낮으며 고칼륨혈증이 있다. 가장 가능성이 높은 효소 결핍은?", "options": [{"letter": "A", "text": "21-수산화효소(21-hydroxylase)"}, {"letter": "B", "text": "아로마타제(aromatase)"}, {"letter": "C", "text": "3β-하이드록시스테로이드 디하이드로제나아제(3β-HSD)"}, {"letter": "D", "text": "17α-수산화효소(17α-hydroxylase)"}, {"letter": "E", "text": "11β-수산화효소(11β-hydroxylase)"}], "answer": "A", "explanation": "21-수산화효소 결핍은 선천성 부신 과형성증(CAH)의 가장 흔한 원인(약 90%)으로, 코르티솔과 알도스테론 합성이 감소하고, 부신피질자극호르몬(ACTH) 증가로 인해 스테로이드 전구체(특히 17-OHP)가 축적되어 남성호르몬 과다를 초래한다. 여아에서 외음부 남성화와 염분소실형에서는 고칼륨혈증이 나타난다. 11β-수산화효소 결핍은 고혈압을 동반한다. 17α-수산화효소 결핍도 고혈압이 있으나 남성화는 없다. 아로마타제 결핍은 태반에서 에스트로겐 합성 장애로 모체 남성화가 동반된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 78}, {"question": "32세 여자가 갑작스러운 골반 통증과 함께 초음파 검사에서 더글라스와에 소량의 액체가 관찰되었다. 혈액, 농, 혹은 종양성 장액성 액체를 감별하기 위해 외래에서 간단하게 시행할 수 있는 검사는 무엇인가?", "options": [{"letter": "A", "text": "자궁경부세포검사"}, {"letter": "B", "text": "더글라스와 천자"}, {"letter": "C", "text": "질식초음파"}, {"letter": "D", "text": "골반 CT"}, {"letter": "E", "text": "자궁내막생검"}], "answer": "E", "explanation": "더글라스와 천자(culdocentesis)는 후질원개를 통해 더글라스와에 고인 액체를 흡인하는 간단한 외래 시술로, 골반 내 액체의 성상을 확인하여 자궁외임신에 의한 혈액, 골반염에 의한 농, 난소종양의 장액성 액체 등을 감별할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 80}, {"question": "28세 여자가 2일 전부터 시작된 하복통과 소량의 질출혈로 내원하였다. 평소 월경은 28일로 규칙적이었으며, 마지막 월경 시작일은 6주 전이다. 혈압 100/60 mmHg, 맥박 100회/분, 체온 36.8℃이다. 골반진찰에서 오른쪽 부속기에 압통과 반발압통이 있다. 우선적으로 시행할 검사는?", "options": [{"letter": "A", "text": "소변 hCG 검사"}, {"letter": "B", "text": "혈청 β-hCG 및 transvaginal ultrasound"}, {"letter": "C", "text": "골반 CT 검사"}, {"letter": "D", "text": "복부 ultrasound 검사"}, {"letter": "E", "text": "혈청 progesterone 측정"}], "answer": "B", "explanation": "자궁외임신이 의심되는 가임기 여성(무월경, 하복통, 질출혈, 부속기 압통)에서 최우선 검사는 임신 확인 및 위치 진단을 위한 혈청 β-hCG 측정과 transvaginal ultrasound이다. 소변 hCG 검사는 정성적이며, progesterone 단독 측정은 진단적이지 않고, CT는 방사선 위험이 있으므로 적절하지 않다. 따라서 혈청 β-hCG 및 transvaginal ultrasound가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 80}, {"question": "29세 여자가 6주간의 무월경 후 발생한 하복부 통증과 소량의 질 출혈을 주소로 내원하였다. 활력징후는 정상이며, 골반진찰에서 우측 부속기 압통이 있다. 임신 가능성 확인을 위해 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "소변 hCG 검사"}, {"letter": "B", "text": "자궁경부 세포진 검사"}, {"letter": "C", "text": "골반 초음파"}, {"letter": "D", "text": "질식 천자"}, {"letter": "E", "text": "복강경 검사"}], "answer": "A", "explanation": "In a reproductive-age woman with amenorrhea and abdominal pain, the first step is to establish pregnancy with a urine or serum hCG test. Once pregnancy is confirmed, transvaginal ultrasound is used to determine the location. Culdocentesis and laparoscopy are more invasive and not first-line. Cervical cytology is irrelevant to acute pain.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 80}, {"question": "25세 여성이 갑작스러운 하복부 통증과 복막 자극 증상으로 내원하였다. 초음파에서 골반 내 액체가 관찰된다. 난소낭종 파열과 자궁외임신을 감별하기 위해 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "혈청 beta-hCG"}, {"letter": "B", "text": "골반 CT"}, {"letter": "C", "text": "도플러 초음파"}, {"letter": "D", "text": "Douglas 천자술"}, {"letter": "E", "text": "일 chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "다음 중 부인과 복강경 수술의 절대적 금기증에 해당하는 것은?", "options": [{"letter": "A", "text": "고도 비만 (체질량지수 > 35 kg/m²)"}, {"letter": "B", "text": "횡격막 탈장 (diaphragmatic hernia)"}, {"letter": "C", "text": "이전의 제왕절개술 기왕력"}, {"letter": "D", "text": "광범위한 복강 내 유착 의심"}, {"letter": "E", "text": "14주 크기의 자궁근종"}], "answer": "A", "explanation": "횡격막 탈장이 있는 경우 복강 내 이산화탄소 주입으로 인해 긴장성 기흉(pneumothorax)이 발생할 위험이 있어 복강경 수술의 절대적 금기이다. 이전 제왕절개술, 비만, 큰 자궁근종, 복강 내 유착은 상대적 금기 또는 수술 난이도를 높이는 요소이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "26세 초임부가 분만 중 통증 감소를 위해 pudendal nerve block과 ilioinguinal nerve block을 적절히 시행받았다. 그러나 산모는 자궁수축 시 여전히 심한 통증을 호소하고 있다. 이 통증을 전달하는 가장 주된 신경 구조는?", "options": [{"letter": "A", "text": "외측대퇴피신경 (Lateral femoral cutaneous nerve)"}, {"letter": "B", "text": "생식대퇴신경 (Genitofemoral nerve)"}, {"letter": "C", "text": "하복신경총 (Inferior hypogastric plexus)"}, {"letter": "D", "text": "장골하복신경 (Iliohypogastric nerve)"}, {"letter": "E", "text": "폐쇄신경 (Obturator nerve)"}], "answer": "C", "explanation": "Pudendal nerve block은 회음부의 체성감각을 차단하고, ilioinguinal nerve block은 대음순 및 치골상부 감각을 차단하지만, 자궁수축에 의한 내장통(visceral pain)은 하복신경총(inferior hypogastric plexus)을 통해 교감신경(T10-L1)과 부교감신경(S2-4)으로 전달되므로 국소마취제에 의해 차단되지 않는다. 따라서 하복신경총이 통증 지속의 주된 원인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "난소꼬임(ovarian torsion)의 위험이 증가하기 시작하는 난소 크기의 기준은?", "options": [{"letter": "A", "text": "5 cm 이상"}, {"letter": "B", "text": "10 cm 이상"}, {"letter": "C", "text": "12 cm 이상"}, {"letter": "D", "text": "2 cm 이상"}, {"letter": "E", "text": "8 cm 이상"}], "answer": "D", "explanation": "정상 난소 크기는 약 5x3x3cm로, 낭종이나 종양 등으로 인해 5 cm 이상으로 커지면 무게가 증가하여 난소꼬임(ovarian torsion)이 발생할 수 있다. 이는 급성 복통을 유발할 수 있는 응급 상황이므로 주의가 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "15세 여자가 월경통으로 내원하였다. 초경은 2년 전 있었고, 월경 주기는 규칙적이며 골반진찰 및 초음파에서 특이소견이 없다. 적절한 치료는?", "options": [{"letter": "A", "text": "자궁절제술"}, {"letter": "B", "text": "항생제 투여"}, {"letter": "C", "text": "자궁내막응고술"}, {"letter": "D", "text": "NSAIDs (비스테로이드 소염진통제) 투여"}, {"letter": "E", "text": "프로게스테론 보충"}], "answer": "D", "explanation": "원발성 월경통은 프로스타글란딘에 의해 자궁 수축이 일어나 발생하므로, 프로스타글란딘 합성을 억제하는 NSAIDs (비스테로이드 소염진통제) 투여가 일차 치료이다. 항생제나 프로게스테론 보충은 효과가 입증되지 않았으며, 자궁내막응고술이나 자궁절제술은 보존적 치료에 반응하지 않는 심각한 경우에만 고려된다. 따라서 NSAIDs 투여가 가장 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "15세 여성이 초경 약 1년 후부터 월경 첫날 심한 하복통을 호소한다. 월경 주기는 규칙적이며, 골반 진찰과 초음파에서 이상 소견이 없다. 성경험은 없다. 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "자궁절제술"}, {"letter": "B", "text": "Gonadotropin-releasing hormone agonist 투여"}, {"letter": "C", "text": "비스테로이드성 소염진통제 (NSAIDs) 복용"}, {"letter": "D", "text": "자궁경 확장술"}, {"letter": "E", "text": "경구 피임약 복용"}], "answer": "C", "explanation": "1차성 월경통(primary dysmenorrhea)의 초기 치료는 비스테로이드성 소염진통제(NSAIDs)로, 프로스타글란딘 합성을 억제하여 통증을 완화한다. NSAIDs에 반응이 없으면 경구 피임약을 추가할 수 있다. 자궁경 확장술, GnRH agonist, 자궁절제술은 1차 치료가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "임신 6주에 난소 종양이 발견된 여성에게 수술을 임신 12주 이후로 연기하라고 권고하였다. 그 근거가 되는 생리적 변화는?", "options": [{"letter": "A", "text": "자궁태반 순환의 확립"}, {"letter": "B", "text": "황체-태반 이행(luteoplacental shift)의 완료"}, {"letter": "C", "text": "태아 심장 박동의 시작"}, {"letter": "D", "text": "hCG 최고치 도달"}, {"letter": "E", "text": "난황낭(yolk sac)의 소실"}], "answer": "B", "explanation": "‘황체-태반 이행(luteoplacental shift)의 완료’가 옳다. 임신 10-12주경 태반이 progesterone을 충분히 생산하게 되어 더 이상 황체에 의존하지 않게 된다. 따라서 그 이후 난소를 제거해도 유산되지 않는다. ‘태아 심장 박동의 시작’은 임신 5-6주경으로, 아직 이동이 완료되지 않아 난소 제거 시 유산 위험이 있다. ‘hCG 최고치 도달’은 임신 8-10주경이나, hCG가 최고치에 도달하더라도 태반의 progesterone 생산이 충분히 이루어지지 않았을 수 있다. ‘자궁태반 순환의 확립’은 착상 후 계속 발달하며, 반드시 황체 의존성 소실을 의미하지 않는다. ‘난황낭(yolk sac)의 소실’은 임신 12주경이나, 황체-태반 이행과 직접적인 인과 관계는 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "35세 여자가 만성 골반통과 월경통을 호소한다. 복강경 검사에서 자궁-복막 표면에 착색 병소가 관찰되어 자궁내막증으로 진단되었다. 수술적 치료 대신 약물 치료를 원할 경우, 가장 먼저 시도할 수 있는 약제는?", "options": [{"letter": "A", "text": "아로마타제 억제제"}, {"letter": "B", "text": "다나졸"}, {"letter": "C", "text": "GnRH 작용제"}, {"letter": "D", "text": "프로게스테론 주사"}, {"letter": "E", "text": "경구 피임제"}], "answer": "E", "explanation": "For endometriosis-associated pain, first-line medical therapy includes oral contraceptive pills or progestins. GnRH agonists and danazol are second-line due to side effects and cost. Aromatase inhibitors are considered experimental. Therefore, oral contraceptive pills are the most appropriate initial choice.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "35세 여성이 AUB로 진단받고 호르몬 치료 중이나 월경량 감소 효과가 충분하지 않다. 보조 요법으로 추가할 수 있는 약물은?", "options": [{"letter": "A", "text": "항생제 (antibiotics)"}, {"letter": "B", "text": "항히스타민제 (antihistamines)"}, {"letter": "C", "text": "항우울제 (antidepressants)"}, {"letter": "D", "text": "이뇨제 (diuretics)"}, {"letter": "E", "text": "NSAIDs (비스테로이드성 소염제)"}], "answer": "E", "explanation": "NSAIDs는 프로스타글란딘 합성을 억제하여 월경혈량을 감소시키므로, 호르몬 치료와 함께 보조 요법으로 사용될 수 있다. Tranexamic acid도 지혈제로 효과적이지만 보기에 없으며, 항생제, 이뇨제, 항우울제, 항히스타민제는 AUB 치료에 일반적으로 사용되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "15세 여아가 2주간 지속되는 다량의 월경 출혈로 내원하였다. 초경은 13세, 평소 월경 주기는 불규칙적이었다. 혈압 100/70mmHg, 맥박 90회/분, 혈색소 7.5 g/dL. 초음파 검사에서 자궁과 난소는 정상이다. 우선적으로 시행할 치료는?", "options": [{"letter": "A", "text": "자궁내막 소파술 (dilation and curettage)"}, {"letter": "B", "text": "고용량 복합 경구 피임제 (high-dose combined oral contraceptive)"}, {"letter": "C", "text": "프로제스틴 단독 요법 (progestin-only therapy)"}, {"letter": "D", "text": "경구 철분제 투여 (oral iron supplementation)"}, {"letter": "E", "text": "자궁내 풍선 압박 (intrauterine balloon tamponade)"}], "answer": "B", "explanation": "청소년기의 급성 과다 출혈은 빠른 지혈이 필요하며, 고용량 에스트로겐이 포함된 복합 경구 피임제가 효과적이다. 활력징후가 안정적이라도 중증 빈혈이 동반된 경우, 경구 철분제는 보조적이며 지혈이 우선이다. 자궁내막 소파술이나 풍선 압박은 침습적이므로 약물 치료에 실패 시 고려한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "45세 여성이 2년 전 자궁적출술과 양측 난관난소절제술(BSO)을 받은 후 매월 주기적인 골반통을 호소한다. 통증은 이전의 배란통과 유사하다. 이 환자에게 의심되는 질환을 확인하기 위해 가장 적절한 검사는?", "options": [{"letter": "A", "text": "혈청 CA-125"}, {"letter": "B", "text": "진단 복강경"}, {"letter": "C", "text": "GnRH agonist 투여 시험"}, {"letter": "D", "text": "골반 MRI"}, {"letter": "E", "text": "Clomiphene citrate 투여 후 초음파 검사"}], "answer": "E", "explanation": "골반 MRI는 해부학적 평가에 도움이 될 수 있으나 기능적 난소 조직 확인에는 한계가 있다. CA-125는 난소암 표지자로 특이도가 낮다. 진단 복강경은 직접 육안으로 확인할 수 있지만 작은 잔여 조직을 찾기 어렵고 침습적이다. GnRH agonist 투여 시험은 치료 반응을 볼 뿐 진단적이지 않다. Clomiphene으로 배란을 유도하여 초음파로 난포를 확인하면 남아있는 난소 조직을 증명할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "16세 여성이 초경 2년 후부터 월경 첫날 심한 하복통으로 학업에 지장을 받고 있다. 통증은 월경 시작과 함께 나타나고 둘째 날부터 감소한다. 성경험은 없으며, 골반 초음파 검사는 정상이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "비스테로이드 항염증제(NSAIDs) 복용"}, {"letter": "B", "text": "GnRH agonist 투여"}, {"letter": "C", "text": "자궁내 장치(LNG-IUS) 삽입"}, {"letter": "D", "text": "복강경 수술 시행"}, {"letter": "E", "text": "경구 피임약 복용"}], "answer": "A", "explanation": "원발성 월경통(primary dysmenorrhea)은 프로스타글란딘 과다로 인한 자궁 수축이 원인이며, 성경험 없는 청소년에서 1차 치료는 비스테로이드 항염증제(NSAIDs)이다. 경구 피임약은 피임을 원하는 성인 여성에서 선택할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "23세 여자가 성관계 직후 갑자기 발생한 심한 하복부 통증과 어지럼증으로 응급실에 왔다. 혈압 75/50 mmHg, 맥박 125회/분, 체온 36.8℃이다. 초음파 검사에서 우측 난소에 10cm 크기의 불규칙한 낭종과 다량의 골반 액체저류가 관찰되며, 혈색소는 6.5 g/dL이다. 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "정맥 수액 소생술 및 경과 관찰"}, {"letter": "B", "text": "진통제와 항생제 투여 후 관찰"}, {"letter": "C", "text": "초음파 유도 하 낭종 흡인"}, {"letter": "D", "text": "자궁내막 소파술"}, {"letter": "E", "text": "응급 개복 수술 및 지혈"}], "answer": "E", "explanation": "난소 낭종 파열로 인한 출혈성 쇼크가 의심되는 경우, 즉시 수액 소생과 함께 응급 수술(개복술 또는 복강경)을 통해 지혈을 시행해야 한다. 보존적 치료만으로는 생명을 위협하는 출혈을 조절할 수 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "18세 여성이 우연히 발견된 5cm 난소 낭종으로 내원하였다. 최근 생리 주기가 불규칙하나 통증은 없고, 초음파에서 팽창성의 단순 낭종으로 내부 격막이나 고형 성분은 없다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "종양표지자 패널 검사"}, {"letter": "B", "text": "혈청 CA-125 측정"}, {"letter": "C", "text": "4-8주 후 초음파 추적 검사"}, {"letter": "D", "text": "즉시 복강경 낭종 절제술"}, {"letter": "E", "text": "경구 피임약 복용"}], "answer": "C", "explanation": "무증상의 단순 낭종(simple cyst)은 대개 기능성 낭종이며, 대부분 자연 소실된다. 따라서 4-8주 후 추적 초음파를 통해 크기 변화를 확인하는 것이 가장 적절하다. 수술적 치료나 약물 투여는 일반적으로 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "48세 여자가 자궁근종으로 전자궁절제술을 받은 지 5일 만에 왼쪽 옆구리의 심한 통증과 미열로 내원하였다. 왼쪽 갈비척추각 압통이 있고 배뇨는 정상이다. 가장 적절한 검사는?", "options": [{"letter": "A", "text": "요세포 검사"}, {"letter": "B", "text": "방광경 검사"}, {"letter": "C", "text": "정맥 신우 촬영(IVP) 또는 CT 요로 조영술"}, {"letter": "D", "text": "혈청 BUN/Cr 검사"}, {"letter": "E", "text": "복부 초음파"}], "answer": "C", "explanation": "자궁절제술 후 발생한 옆구리 통증과 갈비척추각 압통은 요관 손상이나 결찰을 의심하게 한다. 정맥 신우 촬영(IVP)이나 CT 요로 조영술을 통해 요관의 손상 여부와 수신증 발생을 평가할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 83}, {"question": "35세 여자가 월경량 증가와 점 uestion": "자궁내막증이 의심되는 환자에서 CA-125 검사의 임상적 의의로 가장 적절한 것은?", "options": [{"letter": "A", "text": "자궁내막증 확진에 높은 특이도를 가진다."}, {"letter": "B", "text": "치료 반응을 모니터링하는 데 보조적으로 사용할 수 있다."}, {"letter": "C", "text": "수술적 치료 후 완치 판정에 사용된다."}, {"letter": "D", "text": "정상 수치인 경우 자궁내막증을 배제할 수 있다."}, {"letter": "E", "text": "자궁내막증 병기와 높은 상관관계를 보인다."}], "answer": "B", "explanation": "강의에서 CA-125는 자궁내막증에서 진단적 효용은 없으며, 임신, 골반염, 근종, 난소암 등 여러 상황에서 상승할 수 있어 특이도가 낮다고 하였습니다. 다만 치료 반응을 평가하는 데 보조적으로 사용할 수 있습니다. 병기와의 상관관계도 낮고, 완치 판정에도 사용되지 않습니다. 따라서 치료 모니터링 목적으로만 제한적으로 활용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "자궁내막종(endometrioma)의 전형적인 초음파 소견은?", "options": [{"letter": "A", "text": "낭종 벽에 혈류가 풍부한 고형 결절"}, {"letter": "B", "text": "내부에 격막과 고형 성분이 혼합된 복합 낭종"}, {"letter": "C", "text": "낭종 내부에 석회화를 동반한 불균일한 에코"}, {"letter": "D", "text": "균일한 고에코의 고형 종괴"}, {"letter": "E", "text": "균일한 저에코의 간유리음영(ground-glass) 낭종"}], "answer": "E", "explanation": "자궁내막종은 초음파에서 전형적으로 균일한 저에코(hypoechoic)의 간유리음영(ground-glass opacity)을 보이는 낭종으로 관찰됩니다. 이는 낭종 내 오래된 혈액 성분 때문입니다. ①은 복합 낭종의 소견이며, ②는 고형 종괴, ④는 기형종 등에서 보일 수 있고, ⑤는 악성 종양의 벽재 결절을 시사합니다. 자궁내막종은 균일한 저에코가 특징입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "자궁내막증이 의심되는 환자에서 확진을 위해 가장 적절한 검사는 무엇인가?", "options": [{"letter": "A", "text": "골반 초음파 검사"}, {"letter": "B", "text": "증상 및 내진 소견 평가"}, {"letter": "C", "text": "혈청 CA-125 측정"}, {"letter": "D", "text": "골반 자기공명영상(MRI)"}, {"letter": "E", "text": "복강경 검사 및 조직 생검"}], "answer": "E", "explanation": "복강경 검사 및 조직 생검을 통해 자궁내막 병소를 직접 관찰하고 병리학적으로 확인하는 것이 자궁내막증 진단의 표준이다. 초음파, CA-125, MRI 등은 보조 도구일 뿐 확진이 불가능하며, 증상 평가만으로는 다른 골반 질환과 감별할 수 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "자궁내막종(endometrioma)을 수술로 절제할 때 내부에서 관찰되는 전형적인 내용물은?", "options": [{"letter": "A", "text": "지방과 모발이 혼합된 덩어리"}, {"letter": "B", "text": "초콜릿색의 진한 액체"}, {"letter": "C", "text": "맑은 장액성 액체"}, {"letter": "D", "text": "혈성 괴사 조직만 단독"}, {"letter": "E", "text": "점액성 젤리 물질"}], "answer": "B", "explanation": "자궁내막종은 난소 내에 이소성 자궁내막 조직이 존재하여 월경 주기에 따라 만성적으로 출혈이 반복되면서 오래된 혈액이 축적·산화되어 초콜릿색의 진한 액체를 형성한다. 이는 자궁내막종의 가장 특징적인 수술 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "2년간의 불임과 심해지는 이차성 월경통을 호소하는 29세 여성이다. 초음파상 자궁과 난소는 정상으로 보인다. 자궁내막증(endometriosis) 진단을 위해 가장 정확한 검사는?", "options": [{"letter": "A", "text": "골반 MRI"}, {"letter": "B", "text": "자궁난관 조영술"}, {"letter": "C", "text": "진단적 복강경술 및 생검"}, {"letter": "D", "text": "혈청 CA-125 측정"}, {"letter": "E", "text": "질초음파 재검사"}], "answer": "C", "explanation": "복강경은 자궁내막증의 확진 방법으로, 초음파에서 정상인 1, 2기 병변도 직접 관찰하고 조직 검사할 수 있다. CA-125는 민감도와 특이도가 낮아 진단적 가치가 떨어진다. MRI는 깊은 침윤성 병변 평가에 도움이 되나 초기 진단에는 제한적이다. 자궁난관 조영술은 난관 개통 여부를 보는 검사이다. 초음파는 작은 복막 병변을 발견하지 못한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "비정상 자궁출혈을 호소하는 폐경 후 여성에서 자궁내막암을 확진하기 위한 가장 정확한 검사는?", "options": [{"letter": "A", "text": "MRI 골반 촬영 (MRI pelvis)"}, {"letter": "B", "text": "CA-125 혈액 검사 (CA-125 blood test)"}, {"letter": "C", "text": "자궁경부 세포검사 (Pap smear)"}, {"letter": "D", "text": "골반 초음파 (Pelvic ultrasound)"}, {"letter": "E", "text": "자궁내막 생검 (Endometrial biopsy)"}], "answer": "E", "explanation": "자궁내막 생검(Pipelle 또는 소파술)은 병리조직학적 진단을 통해 암세포를 직접 확인할 수 있는 유일한 방법이다. 골반 초음파는 자궁내막 두께를 측정해 선별할 수 있으나 확진할 수 없고, 자궁경부 세포검사는 자궁내막암의 진단율이 낮다. CA-125는 종양표지자로 보조적 역할을 하며, MRI는 병기 결정에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 86}, {"question": "미국생식의학회(ASRM)의 개정 자궁내막증 병기 분류에서, 다음 중 중등도(3기)로 바로 분류할 수 있는 소견은?", "options": [{"letter": "A", "text": "더글라스와(cul-de-sac)가 완전히 폐쇄된 경우"}, {"letter": "B", "text": "직장질중격에 1cm 미만의 심부 침윤 병변이 있는 경우"}, {"letter": "C", "text": "양측 난소가 유착으로 고정된 경우"}, {"letter": "D", "text": "한쪽 난소에 3cm 이상의 자궁내막종이 있는 경우"}, {"letter": "E", "text": "자궁천골인대의 표재성 병변만 있는 경우"}], "answer": "D", "explanation": "강의에서는 ‘가장 쉽게 endometrioma가 난소에 몇 cm짜리가 있다 그러면 바로 stage 3이 됩니다’라고 명시하였습니다. ASRM 분류에서 난소의 자궁내막종 크기가 3cm 이상이면 이미 중등도(3기)에 해당합니다. 완전한 cul-de-sac 폐쇄는 40점으로 중증(4기)에 해당하며, 표재성 병변은 경증(1~2기)에 속합니다. 양측 난소 유착은 점수에 따라 3기 이상일 수 있지만 바로 3기로 분류되는 단일 기준은 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 87}, {"question": "자궁내막증의 약물 치료에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "에스트로겐 단독 요법은 1차 치료로 적합하다."}, {"letter": "B", "text": "GnRH 효능제는 골밀도 감소 부작용이 있어 장기간 단독 사용을 권장하지 않는다."}, {"letter": "C", "text": "경구피임약은 자궁내막증 재발 위험을 증가시킨다."}, {"letter": "D", "text": "프로게스틴 제제는 배란을 완전히 억제하므로 피임이 필요 없다."}, {"letter": "E", "text": "다나졸은 부작용이 적어 널리 사용된다."}], "answer": "B", "explanation": "GnRH 효능제는 에스트로겐을 저하시켜 골밀도 감소, 안면홍조, 질건조증 등의 부작용을 일으키므로 장기간 단독 사용은 피하며, add-back therapy를 병행하기도 합니다. ① 에스트로겐 단독 요법은 자궁내막증을 악화시킬 수 있어 금기입니다. ② 다나졸은 남성화 부작용 때문에 현재 거의 사용되지 않습니다. ④ 프로게스틴은 배란을 완전히 억제하지 않을 수 있어 피임이 필요할 수 있습니다. ⑤ 경구피임약은 재발을 억제하는 효과가 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 88}, {"question": "시상하부성 무월경(hypothalamic amenorrhea)의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "Kallmann syndrome"}, {"letter": "B", "text": "과도한 체중 감소"}, {"letter": "C", "text": "갑상선 기능 항진증"}, {"letter": "D", "text": "뇌종양"}, {"letter": "E", "text": "Sheehan syndrome"}], "answer": "B", "explanation": "시상하부성 무월경은 주로 급격한 체중 감소(anorexia nervosa 등), 과도한 운동, 심한 스트레스에 의한 기능적 GnRH 분비 장애로 발생한다. 'Kallmann syndrome'은 GnRH 뉴런의 이동 장애로 발생하는 선천성 질환이지만 빈도가 낮다. '뇌종양'은 시상하부를 침범할 수 있으나 흔하지 않다. '갑상선 기능 항진증'은 대사성 원인으로 분류되며, 'Sheehan syndrome'은 뇌하수체 병변이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 91}, {"question": "31세 여성이 출산 후 대량 출혈을 겪은 이후로 무월경과 모유 수유 장애를 호소한다. 이 환자에서 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "말단 비대증"}, {"letter": "B", "text": "Asherman syndrome"}, {"letter": "C", "text": "Empty sella syndrome"}, {"letter": "D", "text": "Sheehan syndrome"}, {"letter": "E", "text": "Prolactinoma"}], "answer": "D", "explanation": "Sheehan syndrome는 분만 시 대량 출혈로 인한 뇌하수체 허혈성 괴사로 발생하며, 성선자극호르몬 분비 저하로 무월경이, 프로락틴 부족으로 유즙 분비 장애가 나타난다. 'Asherman syndrome'은 자궁내 유착으로 소파술 병력과 관련되며, 'Empty sella syndrome'은 뇌하수체가 압박되어 발생할 수 있으나 전형적 분만 후 출혈과는 무관하다. 'Prolactinoma'는 프로락틴 과잉 분비로 인한 유즙 분비·무월경을 보이지만 분만 후 출혈과 연관성이 적다. '말단 비대증'은 성장호르몬 과잉으로 무월경과는 직접적 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 91}, {"question": "30세 여성이 이차성 무월경으로 내원하였다. 혈액 검사에서 FSH가 상승되어 있을 때 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "조기난소부전 (Premature ovarian insufficiency)"}, {"letter": "B", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "C", "text": "시상하부성 무월경 (Hypothalamic amenorrhea)"}, {"letter": "D", "text": "고프로락틴혈증 (Hyperprolactinemia)"}, {"letter": "E", "text": "아셔만 증후군 (Asherman syndrome)"}], "answer": "A", "explanation": "40세 미만 여성에서 FSH 상승은 난소 기능의 저하를 의미하며 조기난소부전(premature ovarian insufficiency)으로 진단한다. PCOS는 FSH가 정상 범위이거나 LH만 상승한 경우가 많고, 시상하부성 무월경은 FSH가 낮다. 아셔만 증후군(자궁내 유착)은 FSH가 정상이며, 고프로락틴혈증은 FSH가 낮거나 정상인 경우가 대부분이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 92}, {"question": "인공유산 소파술 이후 생리가 없어 내원한 28세 여성이다. 임신 검사는 음성, 혈액검사에서 FSH, LH, 프로락틴, TSH는 모두 정상이며, 프로게스테론 근육주사 후 소퇴출혈이 발생하지 않았다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "다낭성 난소 증후군"}, {"letter": "B", "text": "조기 난소 부전"}, {"letter": "C", "text": "아셔만 증후군"}, {"letter": "D", "text": "고프로락틴혈증"}, {"letter": "E", "text": "시상하부 무월경"}], "answer": "C", "explanation": "소파술 등 자궁내막 손상 후 발생한 이차성 무월경으로, FSH : [{"letter": "A", "text": "성폭력 발생 경위에 대한 자세한 문진을 시행한다."}, {"letter": "B", "text": "임신 여부 확인을 위해 hCG 검사를 즉시 처방한다."}, {"letter": "C", "text": "법적 증거 채취를 위해 피해자의 옷과 신체를 검사한다."}, {"letter": "D", "text": "성병 예방 목적으로 예방적 항생제를 우선 투여한다."}, {"letter": "E", "text": "피해자의 생체징후와 외상 여부를 평가하고 의학적 응급 상황을 확인한다."}], "answer": "E", "explanation": "성폭행 피해자의 경우에도 다른 응급 환자와 동일하게 의학적 안정성 평가가 최우선입니다. 생체징후와 외상 평가를 통해 응급 처치 필요성을 먼저 판단하는 것이 첫 단계이며, 이후 문진, 증거 수집, 예방적 치료 등을 순차적으로 진행합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "14세 여아가 초경이 없어 내원하였다. 신체검사에서 유방 발달은 Tanner stage 2, 음모는 Tanner stage 1로 확인되었고 그 외 특이 소견은 없다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "GnRH agonist 투여"}, {"letter": "B", "text": "estrogen-progesterone challenge test 시행"}, {"letter": "C", "text": "즉시 혈중 FSH, LH 측정"}, {"letter": "D", "text": "염색체 검사 시행"}, {"letter": "E", "text": "정기적 경과 관찰"}], "answer": "E", "explanation": "Primary amenorrhea는 2차 성징이 없는 경우 13세까지, 2차 성징이 있는 경우 15세까지 초경이 없을 때 진단한다. 이 환자는 14세로 2차 성징이 발현 중이므로 아직 진단 기준에 부합하지 않으며, 추가 평가 없이 정기적 경과 관찰이 적절하다. '즉시 혈중 FSH, LH 측정'과 '염색체 검사 시행'은 15세 이후에 무월경이 있을 때 고려하며, 'GnRH agonist 투여'는 치료 목적으로 사용되지 않는다. 'estrogen-progesterone challenge test'는 자궁내막의 반응을 평가하기 위한 2차 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "22세 여성이 2개월간 무월경으로 병원을 방문하였다. 성 경험이 있으며 평소 월경은 규칙적이었다. 가장 먼저 시행해야 하는 검사는?", "options": [{"letter": "A", "text": "혈중 프로락틴"}, {"letter": "B", "text": "혈중 FSH/LH"}, {"letter": "C", "text": "자궁경 검사"}, {"letter": "D", "text": "골반 초음파"}, {"letter": "E", "text": "소변 hCG"}], "answer": "E", "explanation": "가임 여성에서 무월경이 발생하면 첫 단계로 항상 임신을 확인해야 하며, 이를 위해 소변 또는 혈액 hCG 검사를 시행한다. 임신이 배제된 이후에야 FSH, 프로락틴, 초음파 등 추가 검사를 진행할 수 있다. 특히 성 경험이 있는 경우 반드시 확인해야 한다. '자궁경 검사'는 침습적 검사로 초기 평가로는 부적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "16세 여자가 월경이 전혀 없어 내원하였다. 유방 발달은 Tanner 2기, 음모는 Tanner 2기이며, 키는 145cm이다. 골반 초음파에서 자궁은 작고 난소는 보이지 않는다. 혈액검사: FSH 85 mIU/mL, estradiol 10 pg/mL. 다음으로 가장 적절한 검사는?", "options": [{"letter": "A", "text": "TSH 및 prolactin 측정"}, {"letter": "B", "text": "뇌 MRI"}, {"letter": "C", "text": "핵형 분석"}, {"letter": "D", "text": "GnRH 자극 검사"}, {"letter": "E", "text": "골밀도 검사"}], "answer": "C", "explanation": "정답은 '핵형 분석'이다. 난포자극호르몬(FSH)이 85 mIU/mL로 상승하고 에스트라디올이 저하된 소견은 일차성 난소기능부전을 시사한다. 젊은 여성에서 일차성 난소기능부전이 진단되면 다음 단계로 핵형 분석을 시행하여 터너증후군(45,X)이나 다른 염색체 이상 여부를 확인해야 한다. 뇌 MRI나 GnRH 자극 검사는 중추성 성선기능저하증에서 고려하며, TSH 및 prolactin 측정은 무월경의 초기 진단 과정에서 시행되지만, 고성선자극호르몬 상태에서는 핵형 분석이 더 우선된다. 골밀도 검사는 장기적인 에스트로겐 결핍 시 평가할 수 있으나 초기 단계의 필수 검사는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "27세 여자가 4개월 동안 월경이 없고 양측 유방에서 젖이 분비되어 내원하였다. 임신 가능성은 없다. 가장 먼저 측정해야 할 호르몬은?", "options": [{"letter": "A", "text": "FSH"}, {"letter": "B", "text": "Prolactin"}, {"letter": "C", "text": "TSH"}, {"letter": "D", "text": "Estradiol"}, {"letter": "E", "text": "Progesterone"}], "answer": "B", "explanation": "정답은 'Prolactin'이다. 무월경과 유루증이 동반된 경우 가장 먼저 측정해야 할 호르몬은 프로락틴(Prolactin)이다. 고프로락틴혈증이 확인되면 원인 감별을 위해 갑상샘자극호르몬(TSH) 검사도 함께 시행할 수 있으나, 가장 직접적인 진단 검사는 프로락틴이다. 난포자극호르몬(FSH), 에스트라디올, 프로게스테론은 프로락틴 측정 이후에 필요한 경우 평가한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "24세 여성이 3개월 동안 무월경을 주소로 내원하였다. 신체검진 및 골반 초음파상 특이소견이 없으며, 2차 성징은 정상이다. 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "갑상선기능검사"}, {"letter": "B", "text": "프로게스테론 부하검사"}, {"letter": "C", "text": "혈중 프로락틴 측정"}, {"letter": "D", "text": "혈중 FSH 측정"}, {"letter": "E", "text": "소변 hCG 검사"}], "answer": "E", "explanation": "가임기 여성에서 무월경이 있을 때는 반드시 임신을 가장 먼저 배제해야 한다. 강의에서 '임신은 반드시 첫 번째 rule out해야 된다'고 명시하였다. hCG 검사로 임신이 아니라는 것을 확인한 후에야 갑상선 기능, 프로락틴, FSH 등의 검사를 진행한다. 프로게스테론 부하검사는 에스트로겐 상태 평가를 위해 추후에 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "17세 여아가 원발성 무월경과 후각 저하(hyposmia)를 주소로 내원하였다. 혈액검사에서 FSH가 정상 하한치 이하로 감소되어 있다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "터너 증후군"}, {"letter": "B", "text": "뇌하수체 선종"}, {"letter": "C", "text": "다낭성 난소 증후군"}, {"letter": "D", "text": "신경성 식욕부진증"}, {"letter": "E", "text": "칼만 증후군"}], "answer": "E", "explanation": "칼만 증후군은 선천성 저성선자극호르몬성 성선기능저하증으로, 원발성 무월경과 저FSH를 보이며, 후각 망울의 무발생으로 인한 후각 저하 또는 무후각증이 특징적이다. 강의에서 \"Kallmann 증후군은... olfactory 쪽에서도 문제가 있기 때문에 잘 냄새를 못 맡아\"라고 언급하였다. 터너 증후군은 FSH가 상승한다. 다낭성 난소 증후군은 FSH가 보통 정상이다. 뇌하수체 선종은 프로락틴 상승이나 시야 결손을 동반할 수 있으나 후각 저하는 특징적이지 않다. 신경성 식욕부진증은 체중 감소와 연관된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "18세 여성이 정상적인 유방 발달을 보이나 원발성 무월경을 주소로 내원하였다. 골반 초음파 검사에서 자궁이 관찰되지 않았고 양측 난소는 정상 소견이었다. 핵형 분석 결과는 46,XX였다. 이 환자의 평가를 위해 시행해야 할 가장 중요한 추가 검사는?", "options": [{"letter": "A", "text": "난포자극호르몬 측정"}, {"letter": "B", "text": "혈청 테스토스테론 측정"}, {"letter": "C", "text": "뇌하수체 MRI"}, {"letter": "D", "text": "복강경 검사"}, {"letter": "E", "text": "신장 초음파 검사"}], "answer": "E", "explanation": "MRKH 증후군(뮐러관 무발생)은 자궁과 상부 질의 결여를 특징으로 하며, 신장 기형(예: 신장 무발생, 골반 신장)이 약 30~40%에서 동반되므로 신장 초음파 검사가 필요하다. 핵형과 난소 호르몬이 정상이므로 뇌하수체 MRI나 추가 호르몬 검사보다 신장 기형 여부를 확인하는 것이 우선이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "25세 여성이 4개월 동안의 속발성 무월경으로 내원하였다. 신체 검진과 골반 초음파에서 특이 소견이 없었다. 소변 human chorionic gonadotropin (hCG) 검사는 음성이었다. 다음으로 가장 적절한 검사는?", "options": [{"letter": "A", "text": "혈청 FSH 측정"}, {"letter": "B", "text": "혈청 estradiol 측정"}, {"letter": "C", "text": "혈청 TSH와 prolactin 측정"}, {"letter": "D", "text": "Estrogen-progesterone 부하 검사"}, {"letter": "E", "text": "혈청 progesterone 측정"}], "answer": "C", "explanation": "속발성 무월경 환자에서 임신을 배제한 후에는 갑상선 기능장애와 고프로락틴혈증을 평가하기 위해 TSH와 prolactin을 측정해야 한다. 강의에서 '임신이 아니다. 그러면 갑상선하고 prolactin 검사를 해봐요.'라고 명시되어 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "28세 여성이 1년 동안의 무월경과 양쪽 유방에서의 유즙 분비로 내원하였다. 혈청 prolactin이 100 ng/mL로 상승되어 있으며, 갑상선 기능은 정상이다. 다음으로 시행해야 할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "자궁난관조영술 (hysterosalpingography)"}, {"letter": "B", "text": "핵형 분석 (karyotyping)"}, {"letter": "C", "text": "복부 및 골반 전산화단층촬영 (CT)"}, {"letter": "D", "text": "뇌하수체 자기공명영상 (sella MRI)"}, {"letter": "E", "text": "GnRH 자극 검사"}], "answer": "D", "explanation": "무월경과 고프로락틴혈증이 있는 경우 뇌하수체 종양(prolactinoma)을 감별하기 위해 뇌하수체 자기공명영상(sella MRI)을 시행한다. 강의에서 prolactin이 높을 때 시야결손, 두통이 발생할 수 있으며 중추신경계 종양을 확인하기 위해 MRI를 촬영해야 한다고 설명하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "원발성 무월경 환자에서 유방 발달은 정상이지만, 신체검사 및 영상검사에서 자궁이 없음이 확인되었다. 다음 단계로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "프로락틴 검사 (Prolactin level)"}, {"letter": "B", "text": "MRI 뇌하수체 (MRI sella)"}, {"letter": "C", "text": "FSH 측정 (FSH measurement)"}, {"letter": "D", "text": "핵형검사 (Karyotype)"}, {"letter": "E", "text": "골반 초음파 (Pelvic ultrasound)"}], "answer": "D", "explanation": "원발성 무월경에서 유방 발달(에스트로겐 효과)은 있지만 자궁이 없을 때는 MRKH 증후군(46,XX)과 안드로겐불감성증후군(AIS, 46,XY)을 감별해야 한다. 두 질환은 치료와 예후가 다르므로 핵형검사가 필수적이다. 이미 초음파로 자궁 부재를 확인했으므로 추가 골반 초음파는 불필요하며, FSH는 정상 범위일 가능성이 높고, 프로락틴이나 뇌하수체 MRI는 초기 검사로 적합하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 100}, {"question": "이차성 무월경 환자에서 임신 검사가 음성일 때, 다음으로 가장 먼저 시행해야 할 혈액검사는?", "options": [{"letter": "A", "text": "테스토스테론 및 DHEAS (Testosterone and DHEAS)"}, {"letter": "B", "text": "FSH 및 LH (FSH and LH)"}, {"letter": "C", "text" tter": "D", "text": "칼슘 흡수 억제"}, {"letter": "E", "text": "조골세포 파괴"}], "answer": "B", "explanation": "강의자는 \"칼슘을 binding하는 영향(impact)이 가장 많은 것이 바로 estrogen이에요... 그 효과는 70%예요\"라고 강조하였다. 즉, 에스트로겐은 칼슘이 뼈에 결합하는 것을 촉진하여 골밀도를 높이고 골다공증을 예방한다. 따라서 HRT는 조기 폐경 환자에서 골감소증 및 골다공증의 진행을 막는 데 필수적이다. 칼슘 흡수 억제나 부갑상선 호르몬 증가 등은 에스트로겐의 주된 작용이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 103}, {"question": "28세 여성과 30세 남성이 피임 없이 10개월 동안 임신을 시도했으나 성공하지 못했다. 두 사람 모두 특별한 과거력이나 증상은 없다. 다음 중 가장 적절한 조치는 무엇인가?", "options": [{"letter": "A", "text": "현재 상태로는 불임에 해당하지 않으므로 2개월 더 시도 후 검사를 고려한다."}, {"letter": "B", "text": "남성의 정계정맥류 가능성을 평가하기 위해 고환 초음파를 시행한다."}, {"letter": "C", "text": "여성에게 배란 유도를 위한 클로미펜을 처방한다."}, {"letter": "D", "text": "즉시 정액 검사와 난소 기능 검사를 포함한 불임 검사를 시행한다."}, {"letter": "E", "text": "6개월 더 시도한 후에도 실패하면 불임 검사를 시작한다."}], "answer": "A", "explanation": "불임의 정의는 피임 없이 1년간 정기적인 성관계에도 임신이 되지 않는 경우이다. 따라서 10개월째인 이 부부는 아직 불임 기준에 해당하지 않으므로 2개월 더 시도 후에도 임신이 안 되면 검사를 시작하는 것이 적절하다. \"즉시 불임 검사를 시행한다\"는 불필요하게 빠르며, \"6개월 더 시도\"는 지나치게 지연된다. \"클로미펜 처방\"은 배란 장애가 의심될 때 사용하며, \"고환 초음파\"는 정계정맥류 증상이 있을 때 시행하나 현재 근거가 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "35세 남성이 불임을 주소로 내원하였다. 그는 5년 동안 보디빌딩을 위해 단백동화 스테로이드(anabolic steroid)를 사용해 왔다. 신체 검사에서 양측 고환이 작게 만져지고, 혈액 검사에서 테스토스테론(testosterone), LH, FSH가 모두 낮게 측정되었다. 이 환자의 불임 원인으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "클라인펠터 증후군"}, {"letter": "B", "text": "스테로이드에 의한 시상하부-뇌하수체 축 억제 (HPG axis suppression)"}, {"letter": "C", "text": "고프로락틴혈증에 의한 성선자극호르몬 억제"}, {"letter": "D", "text": "일차성 성선기능저하증 (Primary hypogonadism)"}, {"letter": "E", "text": "안드로겐 수용체 돌연변이"}], "answer": "B", "explanation": "외부에서 단백동화 스테로이드를 투여하면 시상하부와 뇌하수체에 음성 피드백을 일으켜 GnRH, LH, FSH 분비가 감소한다. 그 결과 고환의 테스토스테론 생산과 정자 생성 기능이 저하되고 고환 크기가 작아진다. 혈중 LH, FSH, 테스토스테론이 모두 낮은 소견은 이차성 성선기능저하증을 시사한다. \"일차성 성선기능 letter": "D", "text": "2-3개월 후 생활 습관 개선과 함께 정액 검사 재시행"}, {"letter": "E", "text": "공여 정자를 이용한 인공 수정"}], "answer": "D", "explanation": "정액 검사 이상 시 일시적인 요인(감염, 스트레스, 생활 습관 등)을 배제하기 위해 2-3개월의 금욕 및 생활 습관 개선 후 재검사를 시행하는 것이 표준 지침입니다. 바로 ICSI나 공여 정자는 경도-중등도 이상에서 일차적으로 고려되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 105}, {"question": "28세 남성이 불임으로 내원하여 시행한 정액 검사에서 정자 수 8백만/mL, 운동성 25%로 정자 감소증(oligospermia)이 확인되었다. 이 환자에서 가장 먼저 확인해야 할 교정 가능한 원인은?", "options": [{"letter": "A", "text": "정계정맥류"}, {"letter": "B", "text": "칼만 증후군"}, {"letter": "C", "text": "부고환염"}, {"letter": "D", "text": "정관 폐쇄"}, {"letter": "E", "text": "클라인펠터 증후군"}], "answer": "E", "explanation": "정계정맥류(varicocele)는 남성 불임에서 발견되는 가장 흔한 교정 가능한 원인으로, 정자 감소증 및 운동성 저하와 연관된다. 따라서 oligospermia가 확인된 불임 남성에서 신체 검진 및 영상 검사를 통해 정계정맥류 유무를 확인해야 한다. 클라인펠터 증후군과 칼만 증후군은 유전적 원인으로 수술적 교정이 불가능하며, 정관 폐쇄는 주로 무정자증을 유발한다. 부고환염은 염증으로 인한 폐쇄 가능성이 있지만 빈도가 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 106}, {"question": "저테스토스테론혈증과 관련 증상이 있는 70세 남성에게 테스토스테론 보충 요법(TRT)을 고려하고 있다. 다음 중 TRT의 절대적 금기 사항에 해당하는 것은?", "options": [{"letter": "A", "text": "골다공증"}, {"letter": "B", "text": "경미한 하부요로증상"}, {"letter": "C", "text": "70세 이상의 고령"}, {"letter": "D", "text": "중증의 치료되지 않은 폐쇄성 수면무호흡증"}, {"letter": "E", "text": "2년 전 방사선 치료 후 현재 PSA가 측정되지 않는 전립선암 병력"}], "answer": "D", "explanation": "활동성 또는 치료되지 않은 전립선암과 중증의 폐쇄성 수면무호흡증은 테스토스테론 보충 요법의 절대적 금기이다. \"70세 이상 고령\"은 금기가 아니며, 연령 관련 저테스토스테론에 사용될 수 있다. \"치료된 전립선암\"의 경우 재발의 증거가 없으면 조심스럽게 사용할 수 있다. \"경미한 하부요로증상\"은 상대적 금기이나 절대적 금기는 아니다. \"골다공증\"은 오히려 TRT의 적응증이 될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 107}, {"question": "다음 중 진단서 교부와 관련된 의료인의 의무로 옳지 않은 것은?", "options": [{"letter": "A", "text": "의사는 환자의 요청 없이도 중대 질병 발견 시 진단서를 발급하여야 한다."}, {"letter": "B", "text": "진단서에는 환자의 질병명, 진료 소견 등이 포함되어야 한다."}, {"letter": "C", "text": "의사는 환자 본인의 요구가 있을 때 진단서를 발급할 의무가 있다."}, {"letter": "D", "text": "의사는 정당한 사유 없이 진단서 발급을 거부할 수 없다."}, {"letter": "E", "text": "의사는 환자를 직접 진찰한 후에만 진단서를 작성할 수 있다."}], "answer": "A", "explanation": "진단서는 원칙적으로 환자 본인의 요구가 있을 때 발급하는 것이며, 의사가 임의로 발급할 의무는 없습니다. 따라서 환자의 요청 없이도 중대 질병 발견 시 발급하여야 한다는 설명은 옳지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "5-알파 리덕테이스 억제제(5α-reductase inhibitor)에 대한 설명으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "전립선 크기에 관계없이 모든 BPH 환자에서 1차 치료제로 권장된다."}, {"letter": "B", "text": "장기 복용 시 성기능 장애나 불임은 발생하지 않는다."}, {"letter": "C", "text": "테스토스테론 생성을 직접 차단하여 전립선 크기를 줄인다."}, {"letter": "D", "text": "테스토스테론이 DHT로 전환되는 것을 억제하여 전립선 비대증과 탈모에 효과가 있다."}, {"letter": "E", "text": "DHT의 생성을 증가시켜 남성 호르몬 작용을 강화한다."}], "answer": "D", "explanation": "5-알파 리덕테이스는 테스토스테론을 DHT로 전환하는 효소이다. 이 효소를 억제하면 DHT가 감소하여 전립선 크기가 줄고 탈모가 개선된다. \"테스토스테론 생성을 직접 차단\"하는 것은 아니다. \"DHT 생성을 증가시키는\" 것은 반대이다. \"1차 치료제로 모든 BPH 환자에 권장\"되지 않으며, 주로 전립선이 40g 이상인 경우 알파 차단제와 병용하거나 단독 사용된다. \"장기 복용 시 성기능 장애가 없다\"는 틀리다. 성욕 감소, 발기부전, 사정 장애 등이 발생할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "62세 남성이 빈뇨, 야간뇨(2회), 세뇨를 주소로 내원하였다. 전립선 비대증의 증상 정도를 평가하기 위해 가장 먼저 시행해야 할 것은?", "options": [{"letter": "A", "text": "국제 전립선 증상 점수(IPSS) 설문지"}, {"letter": "B", "text": "직장수지검사(DRE)"}, {"letter": "C", "text": "잔뇨량 측정 (post-void residual)"}, {"letter": "D", "text": "전립선 특이 항원(PSA) 검사"}, {"letter": "E", "text": "요속 검사(uroflowmetry)"}], "answer": "A", "explanation": "IPSS는 전립선 비대증의 증상을 정량화하는 표준 도구로, 환자의 주관적 증상을 객관적으로 평가하여 치료 방침 결정에 도움을 준다. 직장수지검사는 전립선 크기, 결절, 경도 등을 평가하는 중요한 신체 검사지만 증상 평가의 첫 단계는 아니다. 요속 검사와 잔뇨량 측정은 객관적 검사로 보조적 진단에 사용된다. PSA는 전립선암 선별 검사로, 증상 평가보다는 감별 진단 목적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "중등도의 BPH 증상(IPSS 19점)을 호소하는 58세 남성에서, 경직장 초음파로 측정한 전립선 크기는 30cc이다. 가장 적절한 1차 약물 치료는?", "options": [{"letter": "A", "text": "피나스테리드(finasteride)"}, {"letter": "B", "text": "실데나필(sildenafil)"}, {"letter": "C", "text": "옥시부티닌(oxybutynin)"}, {"letter": "D", "text": "데스모프레신(desmopressin)"}, {"letter": "E", "text": "탐스로신(tamsulosin)"}], "answer": "E", "explanation": "알파 차단제인 탐스로신은 전립선 및 방광 경부의 평활근을 이완시켜 배뇨를 개선하며, 전립선 크기에 상관없이 BPH의 1차 치료제로 사용된다. 피나스테리드와 같은 5-알파 리덕테이스 억제제는 주로 전립선 크기가 40g 이상일 때 사용한다. 실데나필은 PDE5 억제제로 발기부전 치료제이지만 BPH에도 일부 효과가 있으나 1차 치료제는 아니다. 옥시부티닌은 항무스카린제로 과민성 방광 증상이 동반된 경우 사용한다. 데스모프레신은 항이뇨호르몬 제제로 야간뇨에 사용할 수 있으나 일반적인 BPH 치료제는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "70세 남성이 야간에 소변을 보기 위해 3회 일어난다. 소변을 본 후 바로 잠들 수 있지만, 자기 전에 커피를 한 잔 마시는 습관이 있다. 다음 중 가장 적절한 초기 조치는?", "options": [{"letter": "A", "text": "전립선 비대증을 의심하여 탐스로신을 즉시 시작한다."}, {"letter": "B", "text": "야간뇨 치료를 위해 데스모프레신을 처방한다."}, {"letter": "C", "text": "요도전립선절제술(TURP)을 시행한다."}, {"letter": "D", "text": "저녁 시간 수분 및 카페인 섭취를 줄이도록 생활 습관 교정을 권고한다."}, {"letter": "E", "text": "전립선암 가능성을 평가하기 위해 PSA 검사와 전립선 생검을 시행한다."}], "answer": "D", "explanation": "야간뇨의 정의는 소변을 보기 위해 잠에서 깨었다가 다시 잠드는 것이다(다시 잠들지 못하면 불면증). 노화로 인해 항이뇨호르몬이 감소하면 저녁에 섭취한 수분이 빠르게 배설되어 야간뇨가 생길 수 있다. 따라서 첫 단계는 자기 전 커피나 과도한 수분 섭취를 제한하는 생활 습관 교정이다. 데스모프레신은 항이뇨호르몬 유사체로 중증 야간뇨에 사용될 수 있으나 초기 치료로 권장되지 않는다. 탐스로신은 BPH에 의한 하부요로증상이 명확할 때 사용한다. TURP는 수술적 치료로 보존적 치료에 실패한 경우 적응증이 된다. PSA와 생검은 전립선암이 의심될 때 시행하며, 야간뇨만으로 바로 시행하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "65세 남성이 하부요로증상으로 내원하였다. 과거력에 특이 사항은 없고, 직장수지검사에서 전립선은 약간 비대되었으나 매끄럽고 탄력성이 있었다. 요검사는 정상이고, PSA가 8.5 ng/mL(정상 <4.0)로 측정되었다. 이전에 PSA를 측정한 적은 없다. 다음으로 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "TRUS 유도 전립선 생검"}, {"letter": "B", "text": "한 달 후 PSA 재측정"}, {"letter": "C", "text": "골반 자기공명영상(MRI)"}, {"letter": "D", "text": "경직장전립선초음파(TRUS)"}, {"letter": "E", "text": "혈뇨 유무 확인을 위한 현미경적 요검사 반복"}], "answer": "A", "explanation": "PSA가 4 ng/mL 이상 상승된 경우 전립선암의 가능성이 있으므로 경직장전립선초음파(TRUS) 유도 하에 전립선 생검을 시행해야 한다. 단순 초음파만으로는 진단이 불충분하며, 요검사가 정상이므로 감염에 의한 일시적 상승 가능성은 낮다. 한 달 후 PSA 재측정은 진단을 지연시킬 수 있다. 골반 자기공명영상(MRI)은 생검 전 보조적 역할을 할 수 있으나 일차적 검사는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "30세 남성이 이마선 후퇴(bitemporal recession)와 정수리 탈모(vertex thinning)로 내원하였다. 가족력에서 부계 탈모가 있다. 진단이 남성형 탈모증(androgenetic alopecia)일 때, 치료에 대한 설명으로 가장 옳은 것은?", "options": [{"letter": "A", "text": "피나스테리드는 발기부전을 유발할 수 있으며, 이 부작용은 약물 중단 후에도 대개 회복되지 않는다."}, {"letter": "B", "text": "미녹시딜 경구제가 일차 치료로 권장된다."}, {"letter": "C", "text": "모발 이식 수술은 약물 치료와 절대 병행할 수 없다."}, {"letter": "D", "text": "국소 미녹시딜은 혈관 확장을 통해 모발 성장을 촉진하며 여성에게도 사용할 수 있다."}, {"letter": "E", "text": "경구 피나스테리드는 5-알파 환원효소를 활성화하여 DHT 생성을 증가시킨다."}], "answer": "D", "explanation": "국소 미녹시딜은 모낭으로의 혈류 증가 및 성장기 촉진을 통해 탈모 치료에 사용되며, 남녀 모두 사용 가능하다. 경구 피나스테리드는 5-알파 환원효소를 억제하여 DHT 생성을 감소시킨다. 미녹시딜 경구제는 고혈압 치료제로 탈모에는 국소 제제가 사용된다. 피나스테리드에 의한 발기부전은 약물 중단 시 대개 회복된다. 모발 이식 수술과 약물 치료는 병행 가능하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "전립선비대증(BPH) 환자의 수술적 치료 적응증으로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "경증의 하부요로증상이 약물로 호전된 경우"}, {"letter": "B", "text": "급성 요폐가 발생한 경우"}, {"letter": "C", "text": "반복적인 요로 감염이 있는 경우"}, {"letter": "D", "text": "방광 결석이 동반된 경우"}, {"letter": "E", "text": "신부전이 동반된 경우"}], "answer": "D", "explanation": "전립선비대증의 수술적 치료 적응증은 급성 요폐, 반복적인 요로 감염, 방광 결석, 신부전, 그리고 약물 치료에 반응하지 않는 중증의 하부요로증상이다. 경증의 증상이 약물 치료로 호전된 경우에는 수술이 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, { on of other etiologies)"}, {"letter": "B", "text": "고프로락틴혈증 (Hyperprolactinemia)"}, {"letter": "C", "text": "희발배란 또는 무배란 (Oligo-ovulation or anovulation)"}, {"letter": "D", "text": "임상적/생화학적 안드로겐 과다증 (Clinical/biochemical hyperandrogenism)"}, {"letter": "E", "text": "다낭성 난소 초음파 소견 (Polycystic ovaries on ultrasound)"}], "answer": "B", "explanation": "Rotterdam 기준은 다음 세 가지 중 두 가지 이상에 해당하고, 다른 원인을 배제할 때 PCOS로 진단한다: 1) 희발배란 또는 무배란, 2) 임상적/생화학적 안드로겐 과다증, 3) 다낭성 난소 초음파 소견. '고프로락틴혈증'은 오히려 배제해야 할 다른 원인 중 하나로, 진단 기준 자체가 아니다. 따라서 고프로락틴혈증은 포함되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군 환자에서 장기적으로 발생 위험이 증가하는 악성 종양은?", "options": [{"letter": "A", "text": "자궁내막암 (Endometrial cancer)"}, {"letter": "B", "text": "자궁경부암 (Cervical cancer)"}, {"letter": "C", "text": "유방암 (Breast cancer)"}, {"letter": "D", "text": "난소암 (Ovarian cancer)"}, {"letter": "E", "text": "대장암 (Colon cancer)"}], "answer": "A", "explanation": "PCOS에서는 만성 무배란으로 인해 프로게스테론 분비 없이 에스트로겐이 지속적으로 자궁내막을 자극(unopposed estrogen)하여 자궁내막 증식증과 자궁내막암의 위험을 3~4배 증가시킨다. 자궁경부암은 HPV 감염과, 유방암이나 대장암은 PCOS와의 직접적 연관성이 뚜렷하지 않다. 난소암은 PCOS에서 위험 증가가 일반적으로 인정되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군의 진단을 위한 초음파 소견으로 적합한 것은? (Rotterdam 기준)", "options": [{"letter": "A", "text": "난소에 난포가 전혀 보이지 않음 (Absence of follicles)"}, {"letter": "B", "text": "한쪽 난소에 2-9 mm 난포가 12개 이상 (≥12 follicles of 2-9 mm in one ovary)"}, {"letter": "C", "text": "한쪽 난소에 5 cm 이상의 단일 낭종 (Single cyst >5 cm in one ovary)"}, {"letter": "D", "text": "난소에 고형 종괴가 관찰됨 (Solid mass in ovary)"}, {"letter": "E", "text": "양쪽 난소 부피가 각각 5 mL 미만 (Both ovaries volume <5 mL)"}], "answer": "B", "explanation": "Rotterdam 기준에서 다낭성 난소는 한쪽 난소에 2~9 mm 크기의 난포가 12개 이상이거나 난소 부피가 10 mL 이상인 경우로 정의한다. '5 cm 이상의 단일 낭종'은 단순 물혹이나 난소 종양을 시사하며, '부피 5 mL 미만'은 정상 범위보다 작은 것이다. questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군으로 진단된 34세 비만 여성이 수개월간 무월경을 호소하며 내원하였다. 골반 초음파 검사에서 자궁내막 두께가 28mm로 두껍게 측정되었고, 양측 난소는 다낭성 소견을 보였다. 임신 반응 검사는 음성이었다. 다음으로 시행해야 할 가장 적절한 처치는?", "options": [{"letter": "A", "text": "경구 피임약 복용"}, {"letter": "B", "text": "프로게스틴 투여"}, {"letter": "C", "text": "자궁내막 생검"}, {"letter": "D", "text": "체중 감량 상담"}, {"letter": "E", "text": "자궁내막 소파술"}], "answer": "C", "explanation": "장기간 무배란으로 인한 비대항성 에스트로겐 노출은 자궁내막 증식증이나 자궁내막암의 위험을 높입니다. 자궁내막 두께가 28mm로 현저히 두꺼운 경우, 자궁내막 생검을 통해 자궁내막 병변을 우선적으로 배제해야 합니다. 프로게스틴 투여는 조직 검사에서 악성 또는 전암성 병변이 배제된 후에 고려할 수 있으며, 체중 감량 상담은 장기적 관리의 일부입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "규칙적인 월경 주기를 가진 29세 여성이 다낭성 난소 증후군으로 진단받았다. 이 환자에게 정기적인 산부인과 추적 관찰이 필요한 가장 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "난소 종양 발생 감시"}, {"letter": "B", "text": "자궁경부 이형성증 진행 감시"}, {"letter": "C", "text": "유방암 위험 증가"}, {"letter": "D", "text": "자궁내막 증식증 및 자궁내막암 위험"}, {"letter": "E", "text": "난소의 크기 증가 확인"}], "answer": "D", "explanation": "PCOS 환자에서는 겉보기에 규칙적인 월경을 보이더라도 무배란 주기 또는 부분적인 자궁내막 탈락만 있을 수 있어, 지속적인 에스트로겐 노출로 인해 자궁내막 증식증과 자궁내막암의 위험이 증가하므로 정기적인 추적 관찰이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 성호르몬결합글로불린(Sex hormone-binding globulin, SHBG)의 감소로 인해 장기적으로 발생 위험이 증가하는 악성 종양은?", "options": [{"letter": "A", "text": "유방암"}, {"letter": "B", "text": "대장암"}, {"letter": "C", "text": "자궁내막암"}, {"letter": "D", "text": "위암"}, {"letter": "E", "text": "갑상선암"}], "answer": "A", "explanation": "SHBG 감소는 생물학적 활성 에스트로겐과 안드로겐의 유리형 분율을 높여, 장기적으로 유방암 및 난소암의 발생 위험을 증가시키는 것으로 알려져 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다음 중 다낭성난소증후군(PCOS)의 진단 및 평가와 관련된 검사 소견으로 거짓인 것은?", "options": [{"letter": "A", "text": "혈청 안드로스텐디온 수치 증가"}, {"letter": "B", "text": "공복 혈청 인슐린 수치 감소"}, {"letter": "C", "text": "항뮬러리안호르몬(AMH) 수치 증가"}, {"letter": "D", "text": "황체형성호르몬(LH) / 난포자극호르몬(FSH) 비율의 증가"}, {"letter": "E", "text": "성호르몬결합글로불린(SHBG) 감소"}], "answer": "B", "explanation": "PCOS에서는 인슐린 저항성이 흔하여 공복 인슐린 수치가 증가하는 경향을 보입니다. LH/FSH 비율 증가, 안드로겐 증가, SHBG 감소, AMH 증가는 PCOS에서 관찰될 수 있는 소견입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "25세 여성이 불규칙한 과다 월경과 다모증을 주소로 내원하였다. 임신을 원하지 않으며, 다낭성 난소 증후군으로 진단되었다. 월경 주기를 조절하고 다모증을 개선하기 위해 가장 적절한 치료는?", "options": [{"letter": "A", "text": "GnRH agonist"}, {"letter": "B", "text": "Spironolactone"}, {"letter": "C", "text": "Metformin"}, {"letter": "D", "text": "복합 경구 피임약"}, {"letter": "E", "text": "Clomiphene"}], "answer": "D", "explanation": "복합 경구 피임약(COC)은 PCOS에서 임신을 원하지 않을 때 월경 주기 조절과 다모증 개선을 위한 일차 치료제이다. COC는 난소 안드로겐 생성을 억제하고 주기를 규칙적으로 만든다. Clomiphene은 배란 유도제로 임신을 원할 때 사용한다. Spironolactone은 항안드로겐이지만 단독으로는 주기 조절이 안 되고 다모증에 이차적으로 고려된다. Metformin은 대사 이상 개선과 배란 회복에 도움이 되나 다모증 개선 효과는 제한적이다. GnRH agonist는 골 손실과 비용 문제로 표준 치료가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "28세 여성이 1년간 임신을 원하지만 되지 않아 내원하였다. 월경은 2~3개월에 한 번 불규칙적이고, 얼굴에 여드름과 다모증이 있다. 골반 초음파에서 다낭성 난소가 관찰되었고, 황체형성호르몬/난포자극호르몬 비가 3.2로 증가, 테스토스테론도 상승되어 있다. 갑상선자극호르몬과 프로락틴은 정상이다. 임신을 위해 우선 사용할 약제는?", "options": [{"letter": "A", "text": "클로미펜 구연산염을 투여한다"}, {"letter": "B", "text": "경구 피임제를 투여한다"}, {"letter": "C", "text": "프로게스테론을 주기적으로 투여한다"}, {"letter": "D", "text": "메트포르민을 먼저 사용한다"}, {"letter": "E", "text": "레트로졸을 우선적으로 투여한다"}], "answer": "C", "explanation": "다낭성 난소 증후군 여성에서 배란 유도를 위한 1차 약제는 클로미펜 구연산염이다. 경구 피임제는 임신을 원하지 않을 때 사용하고, 레트로졸은 2차 약제나 특정 상황에서 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 임신을 원하지 않고 무월경이 지속될 때, 주기적 프로게스테론 투여의 주된 목적은?", "options": [{"letter": "A", "text": "체중 감소"}, {"letter": "B", "text": "배란 유도"}, {"letter": "C", "text": "피임"}, {"letter": "D", "text": "여드름 및 다모증 개선"}, {"letter": "E", "text": "자궁내막 과증식 및 암 예방"}], "answer": "E", "explanation": "PCOS의 만성 무배란 상태에서는 에스트로겐이 지속적으로 자궁내막을 자극하여(unopposed estrogen) 과증식이 발생하고, 이는 자궁내막암으로 진행할 수 있다. 강의에서 \"unopposed estrogen에 의해서 endometrium이 굉장히 과증식 된다고... endometrial malignancy가 돼요\"라고 설명하였다. 따라서 주기적 프로게스테론을 투여하여 소퇴성 출혈을 유도함으로써 자궁내막을 주기적으로 탈락시키고 과증식과 암을 예방하는 것이 주된 목적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "다낭성 난소 증후군 환자에서 복합 경구피임약을 처방할 때 기대되는 이점으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "인슐린 저항성의 개선"}, {"letter": "B", "text": "월경 주기의 규칙화"}, {"letter": "C", "text": "여드름의 완화"}, {"letter": "D", "text": "자궁내막 보호 효과"}, {"letter": "E", "text": "다모증의 개선"}], "answer": "A", "explanation": "복합 경구피임약은 난소에서의 안드로겐 생성을 억제하고 성호르몬 결합 글로불린을 증가시켜 다모증과 여드름을 개선하며, 월경 주기를 규칙화하고 자궁내막 증식을 억제하지만, 인슐린 저항성을 개선시키지는 못한다. 인슐린 저항성 개선에는 메트포민이 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "다낭성난소증후군 환자가 임신을 원할 때, 일차적으로 권장되는 치료는?", "options": [{"letter": "A", "text": "체외 수정 (IVF)"}, {"letter": "B", "text": "체중 감량 및 생활 습관 개선"}, {"letter": "C", "text": "자궁경관확장술"}, {"letter": "D", "text": "경구 피임약 복용"}, {"letter": "E", "text": "GnRH 작용제 투여"}], "answer": "B", "explanation": "다낭성난소증후군 환자에서 불임 치료의 첫 단계는 체중 감량과 생활 습관 개선을 통해 인슐린저항성을 낮추고 배란 기능을 회복하는 것이다. 이후 필요시 클로미펜이나 레트로졸 등 배란유도제를 사용할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "PCOS에서 인슐린 저항성이 고안드로겐혈증을 유발하는 주요 기전은?", "options": [{"letter": "A", "text": "인슐린이 뇌하수체에서 FSH 분비를 억제한다"}, {"letter": "B", "text": "인슐린이 시상하부에서 GnRH 분비를 증가시킨다"}, {"letter": "C", "text": "인슐린이 지방조직에서 에스트로겐 전환을 촉진한다"}, {"letter": "D", "text": "인슐린이 SHBG를 증가시켜 유리 안드로겐을 감소시킨다"}, {"letter": "E", "text": "인슐린이 난소의 theca cell을 직접 자극하여 안드로겐 생성을 증가시킨다"}], "answer": "E", "explanation": "강의에서 교수자는 'Insulin이 아까 그 theca cell... androgen을 생성하는데 insulin이 굉장히 그걸 촉발시켜요'라고 설명하여, 인슐린이 난소 theca cell을 직접 자극해 안드로겐 생성을 증가시킨다고 하였습니다. 인슐린은 SHBG를 감소시켜 유리 안드로겐을 증가시키기도 하지만, 직접적인 자극이 주요 기전입니다. FSH 억제나 GnRH 증가는 주된 기전이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "비만을 동반한 PCOS 환자의 인슐린 저항성 개선을 위해 metformin과 비교하여 더 효과적인 것으로 보고된 약물은?", "options": [{"letter": "A", "text": "Semaglutide (Wegovy)"}, {"letter": "B", "text": "Clomiphene citrate"}, {"letter": "C", "text": "Spironolactone"}, {"letter": "D", "text": "Dexamethasone"}, {"letter": "E", "text": "Letrozole"}], "answer": "A", "explanation": "강의에서 교수자는 semaglutide (Wegovy)가 metformin보다 인슐린 저항성을 훨씬 더 감소시킨다는 연구 결과를 소개하며, 향후 더 많이 사용될 것이라고 언급했습니다. Clomiphene과 letrozole은 배란 유도제, spironolactone은 항안드로겐제, dexamethasone은 부신 안드로겐 억제에 사용될 수 있으나 인슐린 저항성 개선 효과는 metformin이나 semaglutide에 비해 적습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "PCOS 환자에서 시행할 수 있는 난소 절개술(ovarian drilling)에 대한 설명으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "영구적인 배란 회복을 기대할 수 있다."}, {"letter": "B", "text": "체중 감량에 실패한 비만 환자의 일차 치료로 권장된다."}, {"letter": "C", "text": "일시적으로 배란을 회복시킬 수 있으나 유착 및 난소 기능 저하 위험이 있어 현재는 잘 시행하지 않는다."}, {"letter": "D", "text": "Clomiphene citrate에 저항성을 보이는 환자에서만 제한적으로 시행하며, 합병증은 거의 없다."}, {"letter": "E", "text": "난소의 안드로겐 생산을 완전히 차단하여 장기적으로 증상을 완화시킨다."}], "answer": "C", "explanation": "강의에서 교수자는 난소 절개술이 일시적으로 배란을 유도할 수 있지만, 효과가 오래가지 않고 상처가 회복되면 다시 PCOS 증상이 나타나며, 유착과 난소 기능 저하를 초래할 수 있어 매우 지양해야 할 치료법이라고 설명했습니다. 약물 치료가 발전한 현재는 거의 시행되지 않습니다. Clomiphene 저항성 환자에서도 다른 배란 유도제나 보조 생식술이 우선됩니다.", "chunkTranscript": "", , "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "28세 여성이 1년간의 무월경과 양측 유즙 분비를 주소로 내원하였다. 혈청 프로락틴 수치가 150 ng/mL로 상승되어 있다. 뇌하수체 병변을 확인하기 위해 다음으로 가장 적절한 검사는?", "options": [{"letter": "A", "text": "골반 초음파 (Pelvic ultrasound)"}, {"letter": "B", "text": "복부 CT (Abdominal CT)"}, {"letter": "C", "text": "흉부 X선 (Chest X-ray)"}, {"letter": "D", "text": "터키안 MRI (Sella MRI)"}, {"letter": "E", "text": "갑상선 초음파 (Thyroid ultrasound)"}], "answer": "D", "explanation": "무월경과 유즙 분비를 동반한 고프로락틴혈증의 가장 흔한 원인은 뇌하수체 선종이며, 이를 확인하기 위해 터키안 자기공명영상(sella MRI)을 시행한다. 갑상선 초음파나 흉부 X선 등은 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "고프로락틴혈증(hyperprolactinemia)의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "만성 신부전"}, {"letter": "B", "text": "뇌하수체 미세선종 (microadenoma)"}, {"letter": "C", "text": "갑상선기능저하증"}, {"letter": "D", "text": "뇌하수체 거대선종 (macroadenoma)"}, {"letter": "E", "text": "항우울제 등 약물"}], "answer": "E", "explanation": "강의에서 '가장 많은 게 사실은 정신과 약이더라고요. 우울증. 그래서 항우울제를 먹고 있으면은 prolactin이 올라가요.'라고 언급했듯이, 도파민 길항 작용을 가진 항우울제, 항정신병약물 등이 가장 흔한 원인입니다. 뇌하수체 선종도 중요하지만 빈도는 약물이 더 높습니다. 갑상선기능저하증이나 신부전도 원인이 될 수 있으나 상대적으로 덜 흔합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 115}, {"question": "다음 약물 중 고프로락틴혈증을 유발하지 않는 것은?", "options": [{"letter": "A", "text": "Bromocriptine"}, {"letter": "B", "text": "Haloperidol"}, {"letter": "C", "text": "Metoclopramide"}, {"letter": "D", "text": "Risperidone"}, {"letter": "E", "text": "Methyldopa"}], "answer": "A", "explanation": "Bromocriptine은 도파민 작용제로서 프로락틴 분비를 억제하여 고프로락틴혈증 치료에 사용됩니다. Metoclopramide, Haloperidol, Risperidone은 도파민 수용체를 차단하고, Methyldopa는 중추 신경계 내 도파민 대사를 억제하여 프로락틴 분비를 증가시킬 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 11 matchedSlide": 117}, {"question": "난관 손상으로 인한 불임의 가장 흔한 원인으로, 무증상 감염도 흔한 균주는?", "options": [{"letter": "A", "text": "Chlamydia trachomatis"}, {"letter": "B", "text": "Ureaplasma urealyticum"}, {"letter": "C", "text": "Neisseria gonorrhoeae"}, {"letter": "D", "text": "Escherichia coli"}, {"letter": "E", "text": "Mycoplasma genitalium"}], "answer": "A", "explanation": "Chlamydia trachomatis는 골반 염증성 질환(PID)을 유발하여 난관의 섬모 손상과 유착을 초래한다. 약 20%는 무증상 감염 상태로 진행하여 난관 폐쇄가 뒤늦게 발견되기도 한다. Neisseria gonorrhoeae도 PID를 일으키지만 Chlamydia가 더 흔한 비임균성 원인이다. Mycoplasma나 Ureaplasma는 일부 연관되지만 대표적 병원체는 아니다. E. coli는 주로 요로 감염과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 117}, {"question": "규칙적인 월경 주기를 가진 30세 여성이 불임으로 내원하였다. 배란 여부를 확인하기 위해 가장 적절한 검사는?", "options": [{"letter": "A", "text": "소변 hCG 검사"}, {"letter": "B", "text": "혈청 progesterone 농도 측정 (월경 주기 21일)"}, {"letter": "C", "text": "기초체온 측정"}, {"letter": "D", "text": "요중 LH kit 검사"}, {"letter": "E", "text": "질초음파를 통한 난포 크기 측정"}], "answer": "B", "explanation": "배란 후 황체에서 분비되는 progesterone은 혈청 농도 3 ng/mL 이상(일반적으로 5 ng/mL 이상)일 때 배란의 확실한 생화학적 증거가 된다. LH kit는 LH surge를 감지하여 배란 시기를 예측하지만 실제 배란을 확인하지는 못한다. 기초체온은 상승 시 배란을 시사하나 정확도가 떨어진다. 초음파는 난포 크기를 보지만 난포 파열(배란)을 직접 확인하기 어렵다. hCG는 임신 검사이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 118}, {"question": "배란 유도제 클로미펜(clomiphene citrate)의 작용 기전에 대한 설명 중 옳지 않은 것은?", "options": [{"letter": "A", "text": "뇌하수체 전엽에서 FSH와 LH의 분비를 자극한다."}, {"letter": "B", "text": "시상하부 에스트로겐 수용체에 길항하여 GnRH 분비를 증가시킨다."}, {"letter": "C", "text": "난소의 과립막세포에서 직접 에스트로겐 합성을 증가시킨다."}, {"letter": "D", "text": "항에스트로겐 작용으로 내인성 에스트로겐의 음성 피드백을 차단한다."}, {"letter": "E", "text": "난포 생장을 촉진하여 배란을 유도한다."}], "answer": "A", "explanation": "클로미펜은 선택적 에스트로겐 수용체 조절제(SERM)로서 시상하부에서 에스트로겐 수용체에 길항하여 음성 피드백을 차단함으로써 GnRH 분비를 증가시키고, 이에 따라 FSH와 LH 분비가 촉진되어 난포 생장과 배란이 유도된다. '난소의 과립막세포에서 직접 에 explanation": "‘1차 난모세포는 감수분열 전기(prophase)의 diplotene stage에서 정지된 상태로 출생하며, 사춘기 이후 LH surge에 의해 1차 감수분열이 재개된다’는 옳다. 태아기에 1차 감수분열이 시작되나 diplotene stage에서 정지되고, LH surge에 의해 재개되어 1차 감수분열이 완료된다. ‘태아기 8주에 1차 난모세포가 형성되고, 즉시 감수분열을 완료하여 2차 난모세포가 된다’는 틀리다. 감수분열은 태아기에 완료되지 않고 정지된다. ‘2차 난모세포는 metaphase II에서 정지되어 있으며, 배란 시 감수분열이 완료된다’는 틀리다. 2차 난모세포는 배란 시에도 metaphase II에서 정지되며, 수정이 일어나야 완료된다. ‘감수분열은 사춘기 이전에는 전혀 일어나지 않는다’는 틀리다. 태아기부터 감수분열이 시작되어 전기 상태로 정지된다. ‘1차 극체(polar body)는 2차 감수분열 후에 생성된다’는 틀리다. 1차 극체는 1차 감수분열 완료 시 생성된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "사춘기 이후 매 월경주기마다 수많은 원시난포 중 단 하나의 난포만 성장하여 배란되는 과정을 설명하는 용어로 옳은 것은?", "options": [{"letter": "A", "text": "Luteinization, vascularization, rupture"}, {"letter": "B", "text": "Recruitment, selection, dominance"}, {"letter": "C", "text": "Atresia, necrosis, phagocytosis"}, {"letter": "D", "text": "Proliferation, differentiation, apoptosis"}, {"letter": "E", "text": "Meiosis, mitosis, syngamy"}], "answer": "B", "explanation": "‘Recruitment, selection, dominance’는 옳은 과정이다. 매 주기 초 다수의 원시난포가 동원(recruitment)되고, 그 중 하나가 선택(selection)되어 우성 난포(dominant follicle)로 성장한 후 배란된다. ‘Proliferation, differentiation, apoptosis’는 세포의 일반적 과정이지만 난포 선택의 특정 용어는 아니다. ‘Meiosis, mitosis, syngamy’는 세포 분열과 수정에 관한 용어로 난포 선택과 무관하다. ‘Luteinization, vascularization, rupture’는 배란 후 황체 형성과 난소 표면 파열 과정이다. ‘Atresia, necrosis, phagocytosis’는 난포의 퇴화 과정을 설명하나, 단일 난포 선택 모델은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "월경 주기가 28일로 규칙적인 32세 여성이 2년간 임신되지 않아 불임 검사를 위해 내원하였다. 오늘은 마지막 월경 시작 21일째이다. 시행할 검사로 가장 적절한 것은?", "options": [{"letter": "A", "text": "Hysterosalpingography (HSG)"}, {"letter": "B", "text": "혈중 progesterone 측정"}, {"letter": "C", "text": "소변 LH 검사"}, {"letter": "D", "text": "혈중 FSH 측정"}, {"letter": "E", "text": "질초음파 난포 관찰"}], "answer": "B", "explanation": "28일 주기의 21일째는 중황체기(mid-luteal phase)에 해당한다. 이 시기 혈중 progesterone 농도를 측정하면 배란 여부를 확인할 수 있다. HSG는 월경 직후(주기 5-10일)에 시행하며, FSH는 주기 2-4일에 측정한다. 소변 LH 검사는 배란 예측용으로 중기 무렵 사용되고, 질초음파 난포 관찰은 배란 전까지 연속적으로 시행한다. 따라서 혈중 progesterone 측정이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "30세 여성이 2년간 피임 없이 임신이 되지 않아 내원하였다. 남편 정액검사, 배란 평가는 정상이었으나, 자궁나팔관조영술에서 양측 난관 근위부 폐쇄 소견을 보였다. 이 환자에게 가장 적절한 치료법은?", "options": [{"letter": "A", "text": "배란유도 후 자연 임신 시도"}, {"letter": "B", "text": "자궁강 내 인공수정 (IUI) 시행"}, {"letter": "C", "text": "미세수술적 난관 재문합술 시행"}, {"letter": "D", "text": "복강경 난관개구술 시행"}, {"letter": "E", "text": "체외수정-배아이식 (IVF-ET) 시행"}], "answer": "E", "explanation": "양측 난관 근위부 폐쇄는 자연 임신이 불가능하며, 체외수정-배아이식(IVF-ET)이 가장 효과적인 치료법으로 권장된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "31세 여성이 2년간 임신이 되지 않아 내원하였다. 4년 전 자궁외 임신으로 오른쪽 난관 절제술을 받았고, 이후 골반염으로 입원한 과거력이 있다. 자궁난관조영술에서 왼쪽 난관의 말단부가 완전히 폐쇄되어 있고, 남편 정액 검사는 정상이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "미세수술 난관 개구술 (microsurgical salpingostomy)"}, {"letter": "B", "text": "레보노르게스트렐 함유 자궁내 장치 (LNG-IUS)"}, {"letter": "C", "text": "과배란 유도 (ovulation induction)"}, {"letter": "D", "text": "체외 수정 및 배아 이식 (in vitro fertilization-embryo transfer, IVF-ET)"}, {"letter": "E", "text": "자궁강 내 인공 수정 (intrauterine insemination, IUI)"}], "answer": "D", "explanation": "양측 난관 손상으로 난관 개통이 불가능한 경우, 또는 수술로 교정할 수 없는 난관 요인의 불임에는 체외 수정이 가장 적절한 치료이다. 이 환자는 반대쪽 난관이 없고 남은 난관이 완전 폐쇄되었으므로 IVF-ET가 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "중증 자궁내막증으로 양측 난소낭종절제술 후 한쪽 난관이 완전 폐쇄된 30세 여성에서 임신을 위해 가장 적절한 방법은?", "options": [{"letter": "A", "text": "자연 임신 기대"}, {"letter": "B", "text": "인공 자궁내 수정"}, {"letter": "C", "text": "난관 성형 수술"}, {"letter": "D", "text": "체외 수정 및 배아 이식"}, {"letter": "E", "text": "배란 유도 후 자연 임신 시도"}], "answer": "D", "explanation": "난관이 완전 폐쇄된 경우 자연 임신은 거의 불가능하므로 체외 수정 및 배아 이식이 가장 효과적인 불임 치료이다. 배란 유도나 인공 수정은 난관 이상을 우회하지 못하며, 난관 성형술보다 IVF의 성공률이 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "24세 여성이 8개월 동안의 무월경을 주소로 내원하였다. 최근 스트레스가 심했고 체중이 5kg 감소하였다. 혈액 검사 결과 FSH 1.2 mIU/mL(참고치, 3.0~20.0), estradiol 11 pg/mL(참고치, 30~200)였다. 에스트로겐-프로게스테론 부하 검사에서 소퇴성 출혈이 관찰되었다. 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "도파민 작용제 경구 투여"}, {"letter": "B", "text": "체중 증가 및 생활 습관 교정"}, {"letter": "C", "text": "저용량 경구 에스트로겐 요법"}, {"letter": "D", "text": "GnRH 작용제 주사"}, {"letter": "E", "text": "클로미펜 구연산염 배란 유도"}], "answer": "B", "explanation": "기능성 시상하부 무월경의 경우, 가장 중요한 치료는 체중 증가, 스트레스 관리, 과도한 운동 제한 등 원인을 교정하는 것이다. 에스트로겐 요법은 골밀도 감소가 동반된 경우에 고려할 수 있으나 일차 치료는 생활습관 교정이다. 클로미펜, GnRH 작용제, 도파민 작용제는 이 상황에 일차적으로 권고되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "30세 여성이 1년간 피임 없이 임신이 되지 않아 내원하였다. 월경 주기는 28일로 규칙적이며, 마지막 월경 시작일이 7일 전이었다. 오늘 시행할 가장 적절한 검사는?", "options": [{"letter": "A", "text": "혈중 프로게스테론 검사"}, {"letter": "B", "text": "성교 후 검사(postcoital test)"}, {"letter": "C", "text": "혈중 항뮐러관호르몬(AMH) 검사"}, {"letter": "D", "text": "자궁난관조영술(hysterosalpingography)"}, {"letter": "E", "text": "자궁내막 조직 생검"}], "answer": "D", "explanation": "월경 시작 7일째인 현재 시점은 난포기로, 자궁난관조영술(HSG)을 시행하기에 적절한 시기(월경 주기 6~12일)이다. 혈중 항뮐러관호르몬(AMH) 검사는 주기 중 언제든지 가능하나 주로 초기 난포기에 시행한다. 혈중 프로게스테론 검사는 황체기(주기 21일경)에 배란 확인을 위해 시행한다. 자궁내막 조직 생검도 황체기에 시행한다. 성교 후 검사는 배란기 즈음에 시행해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "다낭성 난소 증후군으로 진단된 28세 여성이 임신을 위해 내원하였다. 배란 유도를 위해 처음으로 선택할 수 있는 약제는?", "options": [{"letter": "A", "text": "Oral contraceptive"}, {"letter": "B", "text": "Clomiphene"}, {"letter": "C", "text": "Letrozole"}, {"letter": "D", "text": "Gonadotropin"}, {"letter": "E", "text": "Metformin"}], "answer": "B", "explanation": "다낭성 난소 증후군 환자에서 배란 유도를 위한 1차 약제는 Clomiphene입니다. Clomiphene은 에스트로겐 수용체에 길항제로 작용하여 성선자극호르몬 분비를 증가시켜 배란을 유도합니다. Metformin은 인슐린 저항성 개선에 사용되며, Letrozole은 최근 1차로 사용되기도 하지만 전통적 1차 약제는 Clomiphene입니다. Gonadotropin은 Clomiphene에 실패 시 사용하며, Oral contraceptive는 배란 유도 목적이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "다낭성 난소 증후군으로 진단받은 30세 여성이 임신을 시도하기 전에 배란 여부를 확인하고자 한다. 배란을 확진하기 위해 가장 신뢰도 높은 검사는?", "options": [{"letter": "A", "text": "난포 초음파 검사"}, {"letter": "B", "text": "소변 LH 측정"}, {"letter": "C", "text": "혈중 프로게스테론 측정"}, {"letter": "D", "text": "기초체온 측정"}, {"letter": "E", "text": "자궁내막 생검"}], "answer": "C", "explanation": "배란을 확인하는 가장 정확한 방법은 황체기 중반(월경 주기 21~23일경)에 혈중 프로게스테론을 측정하는 것입니다. 프로게스테론 수치가 10 ng/mL 이상이면 배란이 일어난 것으로 확진할 수 있습니다. 기초체온 측정은 변동이 많아 신뢰도가 낮고, 소변 LH 측정은 배란 예측에는 유용하나 확인 검사는 아닙니다. 난포 초음파 검사는 배란 직전 난포 성숙을 평가하지만 배란 자체를 확증하지는 않으며, 자궁내막 생검은 배란 확인에 사용되지만 침습적이므로 일반적인 선별에는 사용되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "2년간의 무월경과 체중 감소(BMI 17)를 호소하는 24세 여성이다. 혈액 검사상 FSH 2.0 mIU/mL, LH 1.5 mIU/mL, estradiol 15 pg/mL로 저하되어 있다. 뇌하수체 MRI는 정상이다. 임신을 원할 때 가장 적절한 배란 유도 방법은?", "options": [{"letter": "A", "text": "Recombinant FSH/LH 주사 요법"}, {"letter": "B", "text": "Oocyte donation"}, {"letter": "C", "text": "Clomiphene citrate 경구 투여"}, {"letter": "D", "text": "Metformin 경구 투여"}, {"letter": "E", "text": "Aromatase inhibitor 경구 투여"}], "answer": "A", "explanation": "저성선자극호르몬성 성선기능저하증(hypogonadotropic hypogonadism, WHO group 1)으로, 시상하부-뇌하수체 기능 부전으로 인해 생식샘자극호르몬이 부족하다. 난소 자체는 정상이므로 외인성 FSH/LH 투여가 효과적이다. Clomiphene과 aromatase inhibitor는 내인성 생식샘자극호르몬 분비가 가능한 경우에만 효과가 있다. Metformin은 PCOS에서 인슐린 저항성 개선을 위해 사용된다. Oocyte donation은 난소 부전(POI, group 3)에서 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "Clomiphene citrate와 비교하여 aromatase inhibitor가 배란 유도에서 선호되는 가장 주요한 이유는?", "options": [{"letter": "A", "text": "다태 임신의 위험을 낮춘다"}, {"letter": "B", "text": "약제 비용이 낮다"}, {"letter": "C", "text": "항암 효과가 있다"}, {"letter": "D", "text": "투여 경로가 간편하다"}, {"letter": "E", "text": "난소 과자극 증후군(OHSS) 예방 효과가 있다"}], "answer": "A", "explanation": "Aromatase inhibitor는 말초에서 에스트로겐 생성을 감소시켜 음성 피드백으로 FSH를 증가시키며, 한두 개의 난포만 자라게 하여 다태 임신 위험이 낮다. 또한 자궁내막 위축을 일으키지 않는다. Clomiphene citrate는 여러 개의 난포를 동시에 성숙시켜 다태 임신을 초래할 수 있다. 비용은 clomiphene이 더 저렴하며, 투여 경로는 둘 다 경구로 동일하다. OHSS는 주로 gonadotropin 요법의 부작용이므로 aromatase inhibitor와 직접적 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "Asherman's syndrome 환자에서 자궁경하 유착 박리술 후 재발 방지를 위해 시행해야 할 가장 중요한 약물 치료는?", "options": [{"letter": "A", "text": "항생제 투여"}, {"letter": "B", "text": "GnRH agonist 투여"}, {"letter": "C", "text": "항응고제 투여"}, {"letter": "D", "text": "고용량 프로게스테론 투여"}, {"letter": "E", "text": "에스트로겐 투여"}], "answer": "E", "explanation": "유착 제거 후 자궁내막 증식을 촉진하기 위해 에스트로겐을 투여하며, 이는 재유착 방지에 중요하다. 프로게스테론은 분비기 내막으로 전환시키므로 오히려 증식을 억제할 수 있다. 항생제는 감염 예방을 위해 사용될 수 있으나 Asherman's syndrome의 주된 치료 원칙은 아니다. GnRH agonist는 에스트로겐을 억제하므로 부적절하다. 항응고제는 사용되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "모든 기본 검사(정액 검사, 배란 확인, 나팔관 개통 검사)가 정상인 원인 불명 불임 부부에서, 불임 기간이 3년일 때 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "정자 기증"}, {"letter": "B", "text": "복강경 및 자궁경 검사"}, {"letter": "C", "text": "시험관 아기 (IVF) 바로 시행"}, {"letter": "D", "text": "배란 유도 약제와 자궁내 정자 주입 (IUI)"}, {"letter": "E", "text": "Clomiphene citrate 복용 후 자연 성교"}], "answer": "D", "explanation": "원인 불명 불임에서는 배란 유도와 함께 IUI를 시행하는 것이 첫 단계 표준 치료이다. 배란 유도는 다수의 난포를 성숙시키고 IUI는 정자의 접근을 도와 임신율을 높인다. 자연 성교만 하는 것보다 IUI를 병행할 때 효과적이다. IVF는 여러 번의 IUI 실패 후 고려한다. 복강경/자궁경은 추가적 진단이 필요할 때 선택적이다. 정자 기증은 남성 요인이 심각할 때 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "30세 여성이 1년간의 불임으로 내원하였다. 월경 주기는 28일로 규칙적이며, 오늘은 월경 주기 3일째이다. 이 환자에게 이번 생리주기 동안 시행할 검사의 적절한 순서는?", "options": [{"letter": "A", "text": "황체기 프로게스테론 검사 → 자궁난관조영술 → 기초 호르몬 검사"}, {"letter": "B", "text": "기초 호르몬 검사 → 자궁난관조영술 → 황체기 프로게스테론 검사"}, {"letter": "C", "text": "자궁난관조영술 → 기초 호르몬 검사 → 황체기 프로게스테론 검사"}, {"letter": "D", "text": "기초 호르몬 검사 → 황체기 프로게스테론 검사 → 자궁난관조영술"}, {"letter": "E", "text": "자궁난관조영술 → 황체기 프로게스테론 검사 → 기초 호르몬 검사"}], "answer": "B", "explanation": "불임 검사는 일반적으로 월경 3일째에 난포자극호르몬, 에스트라디올 등의 기초 호르몬 검사를 먼저 시행하여 난소 예비능을 평가한다. 이후 월경이 끝난 후(주기 6-12일)에 자궁난관조영술을 통해 자궁강 및 난관의 개통성을 확인하고, 배란 후인 주기 21-23일경에 황체기 프로게스테론 검사를 통해 배란 여부를 확인하는 순서가 바람직하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "조기 난소 부전(premature ovarian insufficiency)으로 진단된 25세 여성이 임신을 원합니다. 혈중 FSH는 40 mIU/mL 이상으로 상승되어 있으며, 에스트라디올은 낮습니다. 다음 중 가장 적절한 치료법은 무엇입니까?", "options": [{"letter": "A", "text": "타인 난자 기증(Donor oocyte)을 통한 체외 수정"}, {"letter": "B", "text": "Gonadotropin 단독 요법"}, {"letter": "C", "text": "Clomiphene citrate 투여"}, {"letter": "D", "text": "저용량 경구 피임약 투여"}, {"letter": "E", "text": "자궁내 인공수정(IUI)"}], "answer": "A", "explanation": "조기 난소 부전 환자는 자가 난자를 이용한 임신 가능성이 매우 낮으며, 표준 치료는 타인 난자 기증을 통한 체외 수정입니다. Clomiphene citrate나 gonadotropin 단독 요법은 효과가 미미하며, IUI는 정자 문제에 주로 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 121}, {"question": "성교 후 검사(postcoital test)에서 자궁경관 점액 내 정자 항체(anti-sperm antibody)가 확인된 여성 불임 환자에게 가장 적절한 치료법은 무엇입니까?", "options": [{"letter": "A", "text": "배란 유도제 투여"}, {"letter": "B", "text": "경구
