  const prevBtn = document.createElement('button');
  prevBtn.innerHTML = '&#8592;';
  const counter = document.createElement('span');
  counter.className = 'q-counter';
  const slideLinkBtn = document.createElement('button');
  slideLinkBtn.className = 'q-slide-link';
  slideLinkBtn.style.display = 'none';
  slideLinkBtn.title = '매칭된 슬라이드로 이동';
  const nextBtn = document.createElement('button');
  nextBtn.innerHTML = '&#8594;';

  nav.append(prevBtn, counter, slideLinkBtn, nextBtn);
  card.appendChild(nav);

  // Body (question content, re-rendered per question)
  const body = document.createElement('div');
  card.appendChild(body);

  function renderQ(idx) {
    card.dataset.current = idx;
    const q = section.questions[idx];

    // ── Counter + prev/next: slide-filtered vs full-list mode ──
    const inSlideMode = card._slideFilteredIndices && card._slideFilteredIndices.length > 0;

    if (inSlideMode) {
      const pos = card._slideFilteredIndices.indexOf(idx);
      if (pos >= 0) {
        prevBtn.disabled = pos === 0;
        nextBtn.disabled = pos === card._slideFilteredIndices.length - 1;
        counter.textContent = `${pos + 1} / ${card._slideFilteredIndices.length}`;
      } else {
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        counter.textContent = `${idx + 1} / ${section.questions.length}`;
      }
    } else {
      prevBtn.disabled = idx === 0;
      nextBtn.disabled = idx === section.questions.length - 1;
      counter.textContent = `${idx + 1} / ${section.questions.length}`;
    }

    // ── Slide-link button ──
    if (q.matchedSlide >= 0) {
      slideLinkBtn.style.display = '';
      slideLinkBtn.textContent = '📍 슬라이드 ' + (q.matchedSlide + 1);
      slideLinkBtn.onclick = () => scrollToSlide(q.matchedSlide);
    } else {
      slideLinkBtn.style.display = 'none';
    }

    const key = isReview ? `review-${si}-${idx}` : `${si}-${idx}`;
    const alreadyAnswered = answered[key] !== undefined;
    const userChose = alreadyAnswered ? answered[key] : '';

    // Question type divider (shown when type changes between adjacent questions)
    const prevType = idx > 0 ? (section.questions[idx - 1].questionType || 'conventional') : null;
    const currType = q.questionType || 'conventional';
    let dividerHtml = '';
    if (currType !== prevType) {
      if (currType === 'mesh_differential') {
        dividerHtml = '<div class="q-type-divider">MeSH 감별 문제</div>';
      } else if (prevType !== null) {
        dividerHtml = '<div class="q-type-divider" style="color:var(--accent)">일반 리뷰 문제</div>';
      }
    }

    // Build metadata badges (conditional)
    let metaHtml = '';
    const hasMeta = q.setName || q.fileName || (q.questionType && q.questionType !== 'conventional');
    if (hasMeta) {
      metaHtml = '<div class="card-meta">';
      if (q.setName) metaHtml += `<span class="badge">${q.setName}</span>`;
      if (q.fileName) metaHtml += `<span class="badge">${q.fileName}</span>`;
      if (q.questionType === 'mesh_differential') metaHtml += '<span class="badge badge-mesh-diff">MeSH 감별</span>';
      metaHtml += `<span class="badge badge-num">Q${idx + 1}</span>`;
      metaHtml += '</div>';
    }

    // Build options HTML
    let optsHtml = '';
    q.options.forEach(o => {
      let cls = '';
      if (alreadyAnswered) {
        cls = ' locked';
        if (o.letter === q.answer) cls += ' correct';
        else if (o.letter === userChose) cls += ' wrong';
      }
      optsHtml += `<div class="option${cls}" data-letter="${o.letter}">
        <span class="letter">${o.letter}</span>
        <span class="opt-text">${o.text}</span>
        <button class="exclude-btn" onclick="toggleExclude(event, '${si}-${idx}', '${o.letter}')" title="배제">X</button>
      </div>`;
    });

    body.innerHTML = `${dividerHtml}${metaHtml}
      <div class="q-text">${q.question}</div>
      <div class="options">${optsHtml}</div>
      <div class="answer-box${alreadyAnswered ? ' show' : ''}" id="ans-${key}">
        <span class="correct-badge">정답: ${q.answer}</span>
        <div class="explanation">${q.explanation}</div>
      </div>
      ${
        q.chunkTranscript
          ? `<details class="chunk-detail"><summary>강의 원문 보기</summary>
             <p class="chunk-text">${q.chunkTranscript.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p></details>`
          : ''
      }`;

    // Restore excluded state
    const exKey = `${si}-${idx}`;
    if (excludedOptions.has(exKey)) {
      excludedOptions.get(exKey).forEach(letter => {
        const optEl = body.querySelector(`.option[data-letter="${letter}"]`);
        if (optEl) optEl.classList.add('excluded');
      });
    }

    // Bind click handlers
    if (!alreadyAnswered) {
      body.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', () => {
          if (opt.classList.contains('excluded')) return;
          if (answered[key] !== undefined) return;
          handleAnswer(opt, q, si, idx, body, isReview, section, card);
          if (opt.dataset.letter === q.answer) {
            // Auto-advance: use slide-filtered next if in slide mode, else global next
            if (inSlideMode) {
              const pos = card._slideFilteredIndices.indexOf(idx);
              if (pos >= 0 && pos < card._slideFilteredIndices.length - 1) {
                setTimeout(() => renderQ(card._slideFilteredIndices[pos + 1]), 700);
              }
            } else if (idx < section.questions.length - 1) {
              setTimeout(() => renderQ(idx + 1), 700);
            }
          }
        });
      });
    }
  }

  prevBtn.addEventListener('click', () => {
    const cur = +card.dataset.current;
    if (card._slideFilteredIndices && card._slideFilteredIndices.length > 0) {
      const pos = card._slideFilteredIndices.indexOf(cur);
      if (pos > 0) renderQ(card._slideFilteredIndices[pos - 1]);
    } else if (cur > 0) {
      renderQ(cur - 1);
    }
  });
  nextBtn.addEventListener('click', () => {
    const cur = +card.dataset.current;
    if (card._slideFilteredIndices && card._slideFilteredIndices.length > 0) {
      const pos = card._slideFilteredIndices.indexOf(cur);
      if (pos >= 0 && pos < card._slideFilteredIndices.length - 1) renderQ(card._slideFilteredIndices[pos + 1]);
    } else if (cur < section.questions.length - 1) {
      renderQ(cur + 1);
    }
  });

  // Mobile swipe (DRP)
  let _swipeX = null;
  card.addEventListener('touchstart', e => {
    _swipeX = e.touches[0].clientX;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (_swipeX === null) return;
    const dx = e.changedTouches[0].clientX - _swipeX;
    _swipeX = null;
    if (Math.abs(dx) < 40) return;
    const cur = +card.dataset.current;
    if (card._slideFilteredIndices && card._slideFilteredIndices.length > 0) {
      const pos = card._slideFilteredIndices.indexOf(cur);
      if (dx < 0 && pos >= 0 && pos < card._slideFilteredIndices.length - 1) renderQ(card._slideFilteredIndices[pos + 1]);
      if (dx > 0 && pos > 0) renderQ(card._slideFilteredIndices[pos - 1]);
    } else {
      if (dx < 0 && cur < section.questions.length - 1) renderQ(cur + 1);
      if (dx > 0 && cur > 0) renderQ(cur - 1);
    }
  }, { passive: true });

  // Expose renderQ for SlideObserver
  card._renderQ = renderQ;
  renderQ(0);
  return card;
}

// ── 2. V2 single-section: individual question cards ─────────────────────────
function buildQuestionCardV2(section, qi, poolIndices, isReview) {
  const q = section.questions[qi];
  const card = document.createElement('div');
  card.className = 'q-card v2-card';
  card.dataset.gi = qi;
  card.dataset.slide = q.matchedSlide >= 0 ? q.matchedSlide : -1;

  // ── Navigation bar ──
  const nav = document.createElement('div');
  nav.className = 'q-nav';

  const prevBtn = document.createElement('button');
  prevBtn.innerHTML = '&#8592;';
  const counter = document.createElement('span');
  counter.className = 'q-counter';
  const slideLinkBtn = document.createElement('button');
  slideLinkBtn.className = 'q-slide-link';
  slideLinkBtn.style.display = 'none';
  slideLinkBtn.title = '매칭된 슬라이드로 이동';
  const nextBtn = document.createElement('button');
  nextBtn.innerHTML = '&#8594;';

  nav.append(prevBtn, counter, slideLinkBtn, nextBtn);
  card.appendChild(nav);

  // ── Body ──
  const body = document.createElement('div');
  card.appendChild(body);

  function updateNav() {
    // Find pool cards in DOM (same data-slide)
    const poolCards = Array.from(document.querySelectorAll(
      `.q-card.v2-card[data-slide="${q.matchedSlide >= 0 ? q.matchedSlide : -1}"]`
    ));
    const pos = poolCards.indexOf(card);
    const total = poolCards.length;

    if (total <= 1) {
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      counter.textContent = '1 / 1';
    } else {
      prevBtn.disabled = pos === 0;
      nextBtn.disabled = pos === total - 1;
      counter.textContent = `${pos + 1} / ${total}`;
    }
  }

  function scrollToPoolCard(offset) {
    const poolCards = Array.from(document.querySelectorAll(
      `.q-card.v2-card[data-slide="${q.matchedSlide >= 0 ? q.matchedSlide : -1}"]`
    ));
    const pos = poolCards.indexOf(card);
    const target = pos + offset;
    if (target >= 0 && target < poolCards.length) {
      poolCards[target].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // ── Render question body (once) ──
  function renderBody() {
    // Slide-link button
    if (q.matchedSlide >= 0) {
      slideLinkBtn.style.display = '';
      slideLinkBtn.textContent = '📍 슬라이드 ' + (q.matchedSlide + 1);
      slideLinkBtn.onclick = () => scrollToSlide(q.matchedSlide);
    } else {
      slideLinkBtn.style.display = 'none';
    }

    const key = isReview ? `review-0-${qi}` : `0-${qi}`;
    const alreadyAnswered = answered[key] !== undefined;
    const userChose = alreadyAnswered ? answered[key] : '';

    // Question type divider (check adjacent question in section)
    const prevType = qi > 0 ? (section.questions[qi - 1].questionType || 'conventional') : null;
    const currType = q.questionType || 'conventional';
    let dividerHtml = '';
    if (currType !== prevType) {
      if (currType === 'mesh_differential') {
        dividerHtml = '<div class="q-type-divider">MeSH 감별 문제</div>';
      } else if (prevType !== null) {
        dividerHtml = '<div class="q-type-divider" style="color:var(--accent)">일반 리뷰 문제</div>';
      }
    }

    // Metadata badges
    let metaHtml = '';
    const hasMeta = q.setName || q.fileName || (q.questionType && q.questionType !== 'conventional');
    if (hasMeta) {
      metaHtml = '<div class="card-meta">';
      if (q.setName) metaHtml += `<span class="badge">${q.setName}</span>`;
      if (q.fileName) metaHtml += `<span class="badge">${q.fileName}</span>`;
      if (q.questionType === 'mesh_differential') metaHtml += '<span class="badge badge-mesh-diff">MeSH 감별</span>';
      metaHtml += `<span class="badge badge-num">Q${qi + 1}</span>`;
      metaHtml += '</div>';
    }

    // Options HTML
    let optsHtml = '';
    q.options.forEach(o => {
      let cls = '';
      if (alreadyAnswered) {
        cls = ' locked';
        if (o.letter === q.answer) cls += ' correct';
        else if (o.letter === userChose) cls += ' wrong';
      }
      optsHtml += `<div class="option${cls}" data-letter="${o.letter}">
        <span class="letter">${o.letter}</span>
        <span class="opt-text">${o.text}</span>
        <button class="exclude-btn" onclick="toggleExclude(event, '0-${qi}', '${o.letter}')" title="배제">X</button>
      </div>`;
    });

    body.innerHTML = `${dividerHtml}${metaHtml}
      <div class="q-text">${q.question}</div>
      <div class="options">${optsHtml}</div>
      <div class="answer-box${alreadyAnswered ? ' show' : ''}" id="ans-${key}">
        <span class="correct-badge">정답: ${q.answer}</span>
        <div class="explanation">${q.explanation}</div>
      </div>
      ${
        q.chunkTranscript
          ? `<details class="chunk-detail"><summary>강의 원문 보기</summary>
             <p class="chunk-text">${q.chunkTranscript.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p></details>`
          : ''
      }`;

    // Restore excluded state
    const exKey = `0-${qi}`;
    if (excludedOptions.has(exKey)) {
      excludedOptions.get(exKey).forEach(letter => {
        const optEl = body.querySelector(`.option[data-letter="${letter}"]`);
        if (optEl) optEl.classList.add('excluded');
      });
    }

    // Bind click handlers
    if (!alreadyAnswered) {
      body.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', () => {
          if (opt.classList.contains('excluded')) return;
          if (answered[key] !== undefined) return;
          handleAnswer(opt, q, 0, qi, body, isReview, section, card);
          if (opt.dataset.letter === q.answer) {
            // Auto-advance to next pool card
            setTimeout(() => scrollToPoolCard(1), 700);
          }
        });
      });
    }
  }

  renderBody();

  // Update nav after DOM is built (need cards to exist for pool query)
  setTimeout(updateNav, 0);

  // ── Prev/Next buttons scroll to sibling pool cards ──
  prevBtn.addEventListener('click', () => scrollToPoolCard(-1));
  nextBtn.addEventListener('click', () => scrollToPoolCard(1));

  // ── Mobile swipe ──
  let _swipeX = null;
  card.addEventListener('touchstart', e => {
    _swipeX = e.touches[0].clientX;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (_swipeX === null) return;
    const dx = e.changedTouches[0].clientX - _swipeX;
    _swipeX = null;
    if (Math.abs(dx) < 40) return;
    if (dx < 0) scrollToPoolCard(1);
    if (dx > 0) scrollToPoolCard(-1);
  }, { passive: true });

  return card;
}

// ── 3. V2 single-section quiz builder ──────────────────────────────────────
function buildQuizV2() {
  const col = document.getElementById('quiz-col');
  col.innerHTML = '';

  // v2 single-section: always section 0
  const section = SECTIONS[0];

  // Pre-compute slide-matched pools: slideIdx → [qi, ...]
  const slidePools = {};
  section.questions.forEach((q, qi) => {
    const s = q.matchedSlide >= 0 ? q.matchedSlide : -1;
    if (!slidePools[s]) slidePools[s] = [];
    slidePools[s].push(qi);
  });

  const secDiv = document.createElement('div');
  secDiv.className = 'page-section';
  secDiv.dataset.si = 0;

  // Section header
  if (section.header) {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = section.header;
    secDiv.appendChild(hdr);
  }

  // Inline slides for portrait
  if (section.images && section.images.length > 0) {
    secDiv.appendChild(buildInlineSlides(section));
  }

  // Render each question as an individual card
  section.questions.forEach((q, qi) => {
    const pool = slidePools[q.matchedSlide >= 0 ? q.matchedSlide : -1] || [qi];
    const card = buildQuestionCardV2(section, qi, pool, false);
    secDiv.appendChild(card);
  });

  // Key Content
  if (section.keyContent) {
    const kcItems = section.keyContent.split('\n\n').filter(t => t.trim());
    kcItems.forEach((text, idx) => {
      const kcBox = document.createElement('div');
      kcBox.className = 'key-content-box';
      const label = kcItems.length > 1
        ? '📌 Key Content ' + (idx + 1) + '/' + kcItems.length
        : '📌 Key Content';
      kcBox.innerHTML = '<div class="key-content-label">' + label + '</div>' + text;
      secDiv.appendChild(kcBox);
    });
  }

  // totalmesh (lecture-wide, section 0 only)
  if (section.totalmesh) {
    const meshBox = document.createElement('div');
    meshBox.className = 'mesh-overlay-box totalmesh-box';
    const label = document.createElement('div');
    label.className = 'mesh-overlay-label';
    label.textContent = '전체 MeSH position';
    meshBox.appendChild(label);
    const pre = document.createElement('pre');
    pre.className = 'mesh-overlay-text';
    pre.textContent = section.totalmesh;
    meshBox.appendChild(pre);
    secDiv.appendChild(meshBox);
  }

  // chunkmesh
  if (section.chunkmesh) {
    const meshBox = document.createElement('div');
    meshBox.className = 'mesh-overlay-box chunkmesh-box';
    const label = document.createElement('div');
    label.className = 'mesh-overlay-label';
    label.textContent = 'Chunk MeSH position';
    meshBox.appendChild(label);
    const pre = document.createElement('pre');
    pre.className = 'mesh-overlay-text';
    pre.textContent = section.chunkmesh;
    meshBox.appendChild(pre);
    secDiv.appendChild(meshBox);
  }

  col.appendChild(secDiv);

  currentSectionIdx = 0;  // v2 is always section 0
  setupQuestionToSlideSync();
  updateSlideCol(0);
}

// ── 5. Exclude toggle (FTM) ─────────────────────────────────────────────────
function toggleExclude(event, key, letter) {
  event.stopPropagation();
  event.preventDefault();
  if (!excludedOptions.has(key)) excludedOptions.set(key, new Set());
  const excludedSet = excludedOptions.get(key);
  const optEl = event.target.closest('.option');
  if (excludedSet.has(letter)) {
    excludedSet.delete(letter);
    optEl.classList.remove('excluded');
  } else {
    excludedSet.add(letter);
    optEl.classList.add('excluded');
  }
}

// ── 4. Answer handling ──────────────────────────────────────────────────────
function handleAnswer(opt, q, si, qi, body, isReview, section, card) {
  const chosen = opt.dataset.letter;
  const key = isReview ? `review-${si}-${qi}` : `${si}-${qi}`;
  if (answered[key] !== undefined) return;
  answered[key] = chosen;

  body.querySelectorAll('.option').forEach(o => {
    o.classList.add('locked');
    if (o.dataset.letter === q.answer) o.classList.add('correct');
  });

  if (chosen !== q.answer) {
    opt.classList.add('wrong');
    if (!isReview) wrongCount++;
    updateWrongBadge();
    // Show MeSH learning path on wrong answer
    if (q.meshPath) {
      const ansBox = document.getElementById('ans-' + key);
      if (ansBox) {
        const pathDiv = document.createElement('div');
        pathDiv.className = 'mesh-path-box';
        pathDiv.innerHTML = '<strong>MeSH 학습 경로:</strong> ' + q.meshPath.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        ansBox.appendChild(pathDiv);
      }
    }
  } else {
    card.classList.add('correct-card');
  }
  if (chosen !== q.answer) card.classList.add('wrong-card');

  const ansBox = document.getElementById('ans-' + key);
  if (ansBox) ansBox.classList.add('show');

  if (!isReview) {
    answeredCount++;
    updateProgress();
  }
}

// ── 6. Progress tracking (FTM) ──────────────────────────────────────────────
function updateProgress() {
  const pct = TOTAL_Q > 0 ? (answeredCount / TOTAL_Q * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = answeredCount + ' / ' + TOTAL_Q + ' 답변';
}

function updateWrongBadge() {
  const badge = document.getElementById('wrong-badge');
  if (wrongCount > 0) {
    badge.style.display = 'inline';
    badge.textContent = '오답 ' + wrongCount;
  } else {
    badge.style.display = 'none';
  }
}

// ── 2. Slide sync ─────────────────────────────────────────────────────────────
function setupSlideSync() {
  const quizCol = document.getElementById('quiz-col');

  // A) IntersectionObserver: 섹션이 뷰포트에 들어오면 즉시 슬라이드 갱신
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const si = parseInt(e.target.dataset.si);
        if (si !== currentSectionIdx) {
          updateSlideCol(si);
          document.querySelectorAll('.q-card.focused').forEach(c => c.classList.remove('focused'));
          const card = e.target.querySelector('.q-card');
          if (card) card.classList.add('focused');
        }
      }
    });
  }, { root: quizCol, rootMargin: '-30% 0px -60% 0px' });
  document.querySelectorAll('.page-section').forEach(s => observer.observe(s));

  // B) scroll + center-based focus (보조)
  let _rafPending = false;
  quizCol.addEventListener('scroll', () => {
    if (!_rafPending) {
      _rafPending = true;
      requestAnimationFrame(() => {
        updateFocusedSection();
        _rafPending = false;
      });
    }
  });
}

function updateFocusedSection() {
  const quizCol = document.getElementById('quiz-col');
  const panelRect = quizCol.getBoundingClientRect();
  const panelCenter = panelRect.top + panelRect.height / 2;
  let best = null, bestDist = Infinity;

  document.querySelectorAll('.page-section').forEach(sec => {
    const r = sec.getBoundingClientRect();
    const dist = Math.abs((r.top + r.height / 2) - panelCenter);
    if (dist < bestDist) { bestDist = dist; best = sec; }
  });

  if (!best) return;
  const newIdx = parseInt(best.dataset.si);
  if (newIdx === currentSectionIdx) return;

  document.querySelectorAll('.q-card.focused').forEach(c => c.classList.remove('focused'));
  const card = best.querySelector('.q-card');
  if (card) card.classList.add('focused');

  updateSlideCol(newIdx);
}

function updateSlideCol(si) {
  if (si === currentSectionIdx && document.getElementById('slide-col').querySelector('.slide-page-item')) return;
  // Save annotations before switching section
  _annoSaveToStore();
  currentSectionIdx = si;
  const col = document.getElementById('slide-col');
  const noMsg = document.getElementById('no-slide-msg');

  // Remove old items (keep noMsg, toolbars)
  col.querySelectorAll('.slide-page-item').forEach(el => el.remove());

  const section = SECTIONS[si];
  if (!section || !section.images || section.images.length === 0) {
    noMsg.style.display = 'block';
    _annoUpdateSlideNav(0);
    return;
  }
  noMsg.style.display = 'none';

  section.images.forEach((src, i) => {
    const item = document.createElement('div');
    item.className = 'slide-page-item';
    item.dataset.slideIdx = i;

    // Wrap img + canvas together
    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'slide-canvas-wrap';

    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.addEventListener('click', () => openImgOverlay(src, si, i));
    canvasWrap.appendChild(img);

    const canvas = document.createElement('canvas');
    canvas.className = 'anno-canvas' + (_annoMode ? ' active' : '');
    canvasWrap.appendChild(canvas);

    // Init canvas internal resolution on image load
    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      // Load annotations for first image
      if (i === 0) _annoLoadToCanvas(canvas, si, 0);
    };

    item.appendChild(canvasWrap);

    const meta = document.createElement('div');
    meta.className = 'slide-page-meta';
    meta.textContent = section.header || `섹션 ${si + 1}`;
    item.appendChild(meta);

    if (section.images.length > 1) {
      const badge = document.createElement('div');
      badge.className = 'slide-page-badge';
      badge.textContent = `${i + 1} / ${section.images.length}`;
      item.appendChild(badge);
    }

    col.appendChild(item);
  });

  col.scrollTop = 0;
  _currentAnnoSlideIdx = 0;
  _annoUpdateSlideNav(section.images.length);

  // Set up slide observer for bidirectional linking (DRP v2 single-section)
  setupSlideObserver();
}

// ── Slide ↔ Question bidirectional linking ─────────────────────────────────
function scrollToSlide(slideIdx) {
  const target = document.getElementById('slide-col')
    .querySelector(`.slide-page-item[data-slide-idx="${slideIdx}"]`);
  if (target) {
    _lockSync();
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── V2: question scroll → slide panel auto-sync ───────────────────────────
let _q2sLastSlide = -1;
let _syncDepth = 0;
let _syncFallback = null;

function _lockSync() {
  _syncDepth++;
  clearTimeout(_syncFallback);
  _syncFallback = setTimeout(_unlockSync, 800);
}
function _unlockSync() {
  if (_syncDepth > 0) _syncDepth--;
  if (_syncDepth === 0) clearTimeout(_syncFallback);
}

function setupQuestionToSlideSync() {
  const quizCol = document.getElementById('quiz-col');
  if (!quizCol) return;

  // Throttled RAF scroll handler for center-based detection
  let _raf = false;
  function syncSlideFromScroll() {
    if (_raf) return;
    _raf = true;
    requestAnimationFrame(() => {
      _raf = false;
      if (_syncDepth > 0) return;
      const panelRect = quizCol.getBoundingClientRect();
      const panelCenter = panelRect.top + panelRect.height * 0.35;
      let best = null, bestDist = Infinity;
      quizCol.querySelectorAll('.q-card.v2-card[data-slide]').forEach(card => {
        const slideIdx = parseInt(card.dataset.slide);
        if (slideIdx < 0) return;
        const r = card.getBoundingClientRect();
        if (r.bottom < panelRect.top || r.top > panelRect.bottom) return;
        const cardCenter = r.top + r.height / 2;
        const dist = Math.abs(cardCenter - panelCenter);
        if (dist < bestDist) { bestDist = dist; best = slideIdx; }
      });
      if (best !== null && best !== _q2sLastSlide) {
        _q2sLastSlide = best;
        scrollToSlide(best);
      }
    });
  }

  quizCol.addEventListener('scroll', syncSlideFromScroll, { passive: true });
}

// ── V2: slide scroll → quiz scroll to matching question ───────────────────
function setupSlideToQuestionSyncV2() {
  const slideCol = document.getElementById('slide-col');
  const quizCol = document.getElementById('quiz-col');
  if (!slideCol || !quizCol) return;

  const observer = new IntersectionObserver(entries => {
    if (_syncDepth > 0) return;

    // Pick the single best entry (smallest slideIdx = topmost in view)
    let bestEntry = null, bestIdx = Infinity;
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const idx = parseInt(e.target.dataset.slideIdx);
      if (!isNaN(idx) && idx < bestIdx) { bestIdx = idx; bestEntry = e; }
    });
    if (!bestEntry) return;

    const slideIdx = parseInt(bestEntry.target.dataset.slideIdx);
    const firstCard = quizCol.querySelector(`.q-card.v2-card[data-slide="${slideIdx}"]`);
    if (firstCard) {
      _lockSync();
      _q2sLastSlide = slideIdx;
      firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, { root: slideCol, rootMargin: '-40% 0px -40% 0px' });

  slideCol.querySelectorAll('.slide-page-item').forEach(el => observer.observe(el));
}

function setupSlideObserver() {
  // V2 single-section: use scroll-based bidirectional sync instead
  if (IS_V2_SINGLE_SECTION) {
    setupSlideToQuestionSyncV2();
    return;
  }

  const slideCol = document.getElementById('slide-col');
  if (!slideCol) return;

  const quizCol = document.getElementById('quiz-col');
  // Find the first q-card in the quiz column
  const card = quizCol.querySelector('.q-card');
  if (!card || !card.dataset) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const slideIdx = parseInt(e.target.dataset.slideIdx);
      if (isNaN(slideIdx)) return;

      // Build filtered question list for this slide
      const filtered = [];
      SECTIONS.forEach((section, si) => {
        section.questions.forEach((q, qi) => {
          if (q.matchedSlide === slideIdx) filtered.push(qi);
        });
      });

      if (filtered.length === 0) return;  // no questions match this slide

      // Update card state for slide-filtered mode
      card._slideFilteredIndices = filtered;
      card._activeSlideIdx = slideIdx;

      // Render first matching question
      if (typeof card._renderQ === 'function') {
        card._renderQ(filtered[0]);
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }, { root: slideCol, rootMargin: '-40% 0px -40% 0px' });

  slideCol.querySelectorAll('.slide-page-item').forEach(el => observer.observe(el));
}

// ── Inline slides for portrait (DRP) ────────────────────────────────────────
function buildInlineSlides(section) {
  const wrap = document.createElement('div');
  wrap.className = 'inline-slides';
  const imgs = section.images;
  if (!imgs || imgs.length === 0) return wrap;

  const n = imgs.length;
  let cur = 0;

  const viewer = document.createElement('div');
  viewer.className = 'inline-slide-viewer';

  const img = document.createElement('img');
  img.className = 'inline-slide-img';
  img.addEventListener('click', () => openImgOverlay(imgs[cur], section.idx, cur));
  viewer.appendChild(img);

  const prevBtn = document.createElement('button');
  prevBtn.className = 'inline-nav-btn prev';
  prevBtn.innerHTML = '&#9664;';
  viewer.appendChild(prevBtn);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'inline-nav-btn next';
  nextBtn.innerHTML = '&#9654;';
  viewer.appendChild(nextBtn);

  const counter = document.createElement('div');
  counter.className = 'inline-slide-counter';

  function goTo(idx) {
    cur = idx;
    img.src = imgs[cur];
    prevBtn.disabled = cur === 0;
    nextBtn.disabled = cur === n - 1;
    counter.textContent = n > 1 ? `${cur + 1} / ${n}` : '';
  }

  prevBtn.addEventListener('click', () => { if (cur > 0) goTo(cur - 1); });
  nextBtn.addEventListener('click', () => { if (cur < n - 1) goTo(cur + 1); });

  goTo(0);
  wrap.appendChild(viewer);
  if (n > 1) wrap.appendChild(counter);
  return wrap;
}

// ── 7. Review mode (DRP full overlay) ───────────────────────────────────────
function startReview() {
  excludedOptions.clear();
  // Collect wrong answers
  const wrongSections = {};  // si → [qi, ...]
  Object.entries(answered).forEach(([key, chosen]) => {
    if (key.startsWith('review-')) return;
    const [siStr, qiStr] = key.split('-');
    const si = parseInt(siStr), qi = parseInt(qiStr);
    const q = SECTIONS[si].questions[qi];
    if (chosen !== q.answer) {
      if (!wrongSections[si]) wrongSections[si] = [];
      wrongSections[si].push(qi);
    }
  });

  const total = Object.values(wrongSections).reduce((a, b) => a + b.length, 0);
  if (total === 0) return;

  // ── V2 single-section: individual wrong-question cards ──────────────────
  if (IS_V2_SINGLE_SECTION) {
    startReviewV2(wrongSections, total);
    return;
  }

  document.getElementById('review-title').textContent = `오답 복습 — ${total}문제`;

  // Build review slide col
  const slideCol = document.getElementById('review-slide-col');
  slideCol.innerHTML = '';
  Object.entries(wrongSections).forEach(([si, qis]) => {
    const section = SECTIONS[si];
    if (!section.images) return;
    section.images.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'slide-page-item';
      item.dataset.rsi = si;
      const img = document.createElement('img');
      img.src = src;
      img.addEventListener('click', () => openImgOverlay(src, parseInt(si), i));
      item.appendChild(img);
      const meta = document.createElement('div');
      meta.className = 'slide-page-meta';
      meta.textContent = section.header || `섹션 ${parseInt(si) + 1}`;
      item.appendChild(meta);
      if (section.images.length > 1) {
        const badge = document.createElement('div');
        badge.className = 'slide-page-badge';
        badge.textContent = `${i + 1} / ${section.images.length}`;
        item.appendChild(badge);
      }
      slideCol.appendChild(item);
    });
  });

  // Build review quiz col
  const quizCol = document.getElementById('review-quiz-col');
  quizCol.innerHTML = '';

  // ── Learning path panel from wrong answers' meshPath ──────────────────
  const wrongPaths = new Set();
  Object.entries(wrongSections).forEach(([si, qis]) => {
    const section = SECTIONS[si];
    qis.forEach(qi => {
      const q = section.questions[qi];
      if (q.meshPath) wrongPaths.add(q.meshPath);
    });
  });
  if (wrongPaths.size > 0) {
    const pathPanel = document.createElement('div');
    pathPanel.className = 'learning-path-panel';
    let pathHtml = '<div class="learning-path-title">📚 MeSH 학습 경로 (오답)</div>';
    wrongPaths.forEach(p => {
      pathHtml += '<pre class="mesh-overlay-text">' + p + '</pre>';
    });
    pathPanel.innerHTML = pathHtml;
    quizCol.appendChild(pathPanel);
  }

  Object.entries(wrongSections).forEach(([si, qis]) => {
    const section = SECTIONS[si];
    const wrongQs = qis.map(qi => section.questions[qi]);
    // Build a synthetic section with only wrong questions
    const reviewSection = { ...section, questions: wrongQs };

    const secDiv = document.createElement('div');
    secDiv.className = 'page-section';
    secDiv.dataset.rsi = si;

    if (section.header) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = section.header;
      secDiv.appendChild(hdr);
    }

    if (section.images && section.images.length > 0) {
      secDiv.appendChild(buildInlineSlides(section));
    }

    const card = buildQuestionCard(reviewSection, parseInt(si), true);
    secDiv.appendChild(card);
    quizCol.appendChild(secDiv);
  });

  // ── Review scroll sync: center-based detection + smooth slide scroll
  let _reviewRaf = false;
  let _reviewCurrentSi = -1;
  quizCol.addEventListener('scroll', () => {
    if (!_reviewRaf) {
      _reviewRaf = true;
      requestAnimationFrame(() => {
        const panelRect = quizCol.getBoundingClientRect();
        const panelCenter = panelRect.top + panelRect.height / 2;
        let best = null, bestDist = Infinity;
        quizCol.querySelectorAll('.page-section').forEach(sec => {
          const r = sec.getBoundingClientRect();
          const dist = Math.abs((r.top + r.height / 2) - panelCenter);
          if (dist < bestDist) { bestDist = dist; best = sec; }
        });
        if (best) {
          const si = parseInt(best.dataset.rsi);
          if (si !== _reviewCurrentSi) {
            _reviewCurrentSi = si;
            const target = slideCol.querySelector(`.slide-page-item[data-rsi="${si}"]`);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
        _reviewRaf = false;
      });
    }
  });

  setupReviewDivider();
  document.getElementById('review-overlay').classList.add('show');
  slideCol.scrollTop = 0;
  quizCol.scrollTop = 0;
}

function closeReview() {
  document.getElementById('review-overlay').classList.remove('show');
}

// ── V2 review mode helper ─────────────────────────────────────────────────
function startReviewV2(wrongSections, total) {
  document.getElementById('review-title').textContent = `오답 복습 — ${total}문제`;

  const section = SECTIONS[0];
  const wrongQis = wrongSections['0'] || [];
  // Pre-compute wrong-question pools
  const wrongPools = {};
  wrongQis.forEach(qi => {
    const q = section.questions[qi];
    const s = q.matchedSlide >= 0 ? q.matchedSlide : -1;
    if (!wrongPools[s]) wrongPools[s] = [];
    wrongPools[s].push(qi);
  });

  // ── Build review slide col ──
  const slideCol = document.getElementById('review-slide-col');
  slideCol.innerHTML = '';
  if (section.images && section.images.length > 0) {
    section.images.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'slide-page-item';
      item.dataset.slideIdx = i;
      const img = document.createElement('img');
      img.src = src;
      img.addEventListener('click', () => openImgOverlay(src, 0, i));
      item.appendChild(img);
      const meta = document.createElement('div');
      meta.className = 'slide-page-meta';
      meta.textContent = section.header || '슬라이드 ' + (i + 1);
      item.appendChild(meta);
      if (section.images.length > 1) {
        const badge = document.createElement('div');
        badge.className = 'slide-page-badge';
        badge.textContent = `${i + 1} / ${section.images.length}`;
        item.appendChild(badge);
      }
      slideCol.appendChild(item);
    });
  }

  // ── Build review quiz col ──
  const quizCol = document.getElementById('review-quiz-col');
  quizCol.innerHTML = '';

  // Learning path panel from wrong answers' meshPath
  const wrongPaths = new Set();
  wrongQis.forEach(qi => {
    const q = section.questions[qi];
    if (q.meshPath) wrongPaths.add(q.meshPath);
  });
  if (wrongPaths.size > 0) {
    const pathPanel = document.createElement('div');
    pathPanel.className = 'learning-path-panel';
    let pathHtml = '<div class="learning-path-title">📚 MeSH 학습 경로 (오답)</div>';
    wrongPaths.forEach(p => {
      pathHtml += '<pre class="mesh-overlay-text">' + p + '</pre>';
    });
    pathPanel.innerHTML = pathHtml;
    quizCol.appendChild(pathPanel);
  }

  // Section header
  if (section.header) {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = section.header;
    quizCol.appendChild(hdr);
  }

  // Inline slides for portrait
  if (section.images && section.images.length > 0) {
    quizCol.appendChild(buildInlineSlides(section));
  }

  // Render each wrong question as individual v2 card
  wrongQis.forEach(qi => {
    const q = section.questions[qi];
    const pool = wrongPools[q.matchedSlide >= 0 ? q.matchedSlide : -1] || [qi];
    const card = buildQuestionCardV2(section, qi, pool, true);
    quizCol.appendChild(card);
  });

  // ── Review scroll sync: center-based detection + smooth slide scroll ──
  let _reviewRaf = false;
  let _reviewLastSlide = -1;
  quizCol.addEventListener('scroll', () => {
    if (!_reviewRaf) {
      _reviewRaf = true;
      requestAnimationFrame(() => {
        if (_reviewSyncLock) { _reviewRaf = false; return; }
        const panelRect = quizCol.getBoundingClientRect();
        const panelCenter = panelRect.top + panelRect.height * 0.35;
        let best = null, bestDist = Infinity;
        quizCol.querySelectorAll('.q-card.v2-card[data-slide]').forEach(card => {
          const slideIdx = parseInt(card.dataset.slide);
          if (slideIdx < 0) return;
          const r = card.getBoundingClientRect();
          if (r.bottom < panelRect.top || r.top > panelRect.bottom) return;
          const dist = Math.abs((r.top + r.height / 2) - panelCenter);
          if (dist < bestDist) { bestDist = dist; best = slideIdx; }
        });
        if (best !== null && best !== _reviewLastSlide) {
          _reviewLastSlide = best;
          const target = slideCol.querySelector(`.slide-page-item[data-slide-idx="${best}"]`);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        _reviewRaf = false;
      });
    }
  });

  // ── Slide → question scroll sync for review ──
  let _reviewSyncLock = false;
  const slideObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      if (_reviewSyncLock) return;
      const slideIdx = parseInt(e.target.dataset.slideIdx);
      if (isNaN(slideIdx)) return;
      const firstCard = quizCol.querySelector(`.q-card.v2-card[data-slide="${slideIdx}"]`);
      if (firstCard) {
        _reviewSyncLock = true;
        _reviewLastSlide = slideIdx;
        firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(() => { _reviewSyncLock = false; }, 600);
      }
    });
  }, { root: slideCol, rootMargin: '-40% 0px -40% 0px' });
  slideCol.querySelectorAll('.slide-page-item').forEach(el => slideObserver.observe(el));

  setupReviewDivider();
  document.getElementById('review-overlay').classList.add('show');
  slideCol.scrollTop = 0;
  quizCol.scrollTop = 0;
}

// ── 8. Divider resize (DRP % based + touch) ─────────────────────────────────
(function() {
  const divider = document.getElementById('divider');
  const slideCol = document.getElementById('slide-col');
  const mainEl = document.getElementById('main');
  let _resizing = false;

  function startResize(clientX) {
    _resizing = true;
    divider.classList.add('dragging');
    document.body.classList.add('resizing');
  }
  function doResize(clientX) {
    if (!_resizing) return;
    const mainRect = mainEl.getBoundingClientRect();
    let pct = (clientX - mainRect.left) / mainRect.width * 100;
    pct = Math.min(70, Math.max(20, pct));
    slideCol.style.width = pct + '%';
  }
  function stopResize() {
    if (!_resizing) return;
    _resizing = false;
    divider.classList.remove('dragging');
    document.body.classList.remove('resizing');
  }

  divider.addEventListener('mousedown', e => { startResize(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => doResize(e.clientX));
  window.addEventListener('mouseup', stopResize);
  divider.addEventListener('touchstart', e => { startResize(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchmove', e => { if (_resizing) doResize(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend', stopResize);
})();

  const divider = document.getElementById('review-divider');

  const body = document.getElementById('review-body');
  let _resizing = false;

  const fresh = divider.cloneNode(true);

    let pct = (clientX - rect.left) / rect.width * 100;
    pct = Math.min(70, Math.max(20, pct));
    slideCol.style.width = pct + '%';
  }
  function stopResize() {
    if (!_resizing) return;
    _resizing = false;
    fresh.classList.remove('dragging');
    document.body.classList.remove('resizing');
  }

  fresh.addEventListener('mousedown', e => { startResize(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => doResize(e.clientX));
  window.addEventListener('mouseup', stopResize);
  fresh.addEventListener('touchstart', e => { startResize(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchmove', e => { if (_resizing) doResize(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend', stopResize);
}

// ── 9. Image fullscreen overlay (DRP) ────────────────────────────────────────
let _imgScale = 1.0;
let _imgTx = 0, _imgTy = 0;
let _imgDragging = false, _imgDragMoved = false;
let _imgStartX = 0, _imgStartY = 0;
let _overlayAnnoSi = -1, _overlayAnnoImgIdx = -1;
let _overlayAnnoMode = false;

function _applyImgTransform() {
  const container = document.getElementById('img-container');
  container.style.transform = `translate(${_imgTx}px, ${_imgTy}px) scale(${_imgScale})`;
  container.style.transformOrigin = 'center center';
  container.style.cursor = _imgScale > 1 ? (_imgDragging ? 'grabbing' : 'grab') : 'default';
}

function openImgOverlay(src, si, imgIdx) {
  _imgScale = 1.0; _imgTx = 0; _imgTy = 0;
  const img = document.getElementById('img-overlay-img');
  img.src = src;
  _applyImgTransform();
  document.getElementById('img-overlay').classList.add('show');

  // Save current slide annotation and load for overlay
  _annoSaveToStore();
  _overlayAnnoSi = si !== undefined ? si : currentSectionIdx;
  _overlayAnnoImgIdx = imgIdx !== undefined ? imgIdx : _currentAnnoSlideIdx;
  const overlayCanvas = document.getElementById('anno-overlay-canvas');
  img.onload = () => {
    overlayCanvas.width = img.naturalWidth;
    overlayCanvas.height = img.naturalHeight;
    const key = _annoKey(_overlayAnnoSi, _overlayAnnoImgIdx);
    let strokes = _annoStore.get(key);
    if (!strokes) {
      try {
        const saved = localStorage.getItem('anno_' + key);
        strokes = saved ? JSON.parse(saved) : [];
      } catch(e) { strokes = []; }
    }
    overlayCanvas._annoStrokes = JSON.parse(JSON.stringify(strokes || []));
    overlayCanvas._annoUndone = [];
    _redrawCanvas(overlayCanvas);
  };

  // Always show overlay toolbar — start in view mode
  _overlayAnnoMode = false;
  overlayCanvas.classList.remove('active');
  document.getElementById('anno-overlay-toolbar').classList.add('show');
  // Reset toolbar to view mode UI
  document.querySelectorAll('#anno-overlay-toolbar .anno-mode').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === 'view')
  );
  document.querySelectorAll('#anno-overlay-toolbar .anno-tool, #anno-overlay-color, #anno-overlay-size')
    .forEach(el => el.disabled = true);
  const _ovUndoBtn = document.querySelector('#anno-overlay-toolbar button[onclick="annoUndo()"]');
  const _ovClearBtn = document.querySelector('#anno-overlay-toolbar button[onclick="annoClear()"]');
  if (_ovUndoBtn) _ovUndoBtn.disabled = true;
  if (_ovClearBtn) _ovClearBtn.disabled = true;
}

function closeImgOverlay() {
  // Save overlay annotations back to store
  const overlayCanvas = document.getElementById('anno-overlay-canvas');
  if (overlayCanvas._annoStrokes && overlayCanvas._annoStrokes.length > 0) {
    const key = _annoKey(_overlayAnnoSi, _overlayAnnoImgIdx);
    _annoStore.set(key, JSON.parse(JSON.stringify(overlayCanvas._annoStrokes)));
    try { localStorage.setItem('anno_' + key, JSON.stringify(overlayCanvas._annoStrokes)); } catch(e) {}
  }
  // Restore to slide panel canvas
  const slideCanvas = _getActiveSlideCanvas();
  if (slideCanvas && slideCanvas.width) {
    _annoLoadToCanvas(slideCanvas, _overlayAnnoSi, _overlayAnnoImgIdx);
  }

  overlayCanvas.classList.remove('active');
  document.getElementById('anno-overlay-toolbar').classList.remove('show');
  document.getElementById('img-overlay').classList.remove('show');
  _overlayAnnoMode = false;
}

function toggleOverlayAnnoMode(mode) {
  _overlayAnnoMode = (mode === 'draw');
  const canvas = document.getElementById('anno-overlay-canvas');
  canvas.classList.toggle('active', _overlayAnnoMode);

  // Toggle drawing tool buttons
  document.querySelectorAll('#anno-overlay-toolbar .anno-tool, #anno-overlay-color, #anno-overlay-size')
    .forEach(el => el.disabled = !_overlayAnnoMode);
  const _undoBtn = document.querySelector('#anno-overlay-toolbar button[onclick="annoUndo()"]');
  const _clearBtn = document.querySelector('#anno-overlay-toolbar button[onclick="annoClear()"]');
  if (_undoBtn) _undoBtn.disabled = !_overlayAnnoMode;
  if (_clearBtn) _clearBtn.disabled = !_overlayAnnoMode;

  // Toggle mode buttons
  document.querySelectorAll('#anno-overlay-toolbar .anno-mode')
    .forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  // Auto-select pen when entering draw mode
  if (_overlayAnnoMode) {
    document.querySelectorAll('#anno-overlay-toolbar .anno-tool').forEach(b => b.classList.remove('active'));
    const penBtn = document.querySelector('#anno-overlay-toolbar .anno-tool[data-tool="pen"]');
    if (penBtn) penBtn.classList.add('active');
    canvas.style.cursor = 'crosshair';
  } else {
    canvas.style.cursor = '';
  }
}

(function() {
  const overlay = document.getElementById('img-overlay');

  overlay.addEventListener('click', e => {
    if (_imgDragMoved) { _imgDragMoved = false; return; }
    if (e.target.closest('#anno-overlay-toolbar')) return;
    if (_overlayAnnoMode && e.target.closest('#anno-overlay-canvas.active')) return;
    closeImgOverlay();
  });

  overlay.addEventListener('wheel', e => {
    e.preventDefault();
    _imgScale = Math.min(5, Math.max(0.5, _imgScale - e.deltaY * 0.001));
    if (_imgScale <= 1) { _imgTx = 0; _imgTy = 0; }
    _applyImgTransform();
  }, { passive: false });

  overlay.addEventListener('mousedown', e => {
    if (_overlayAnnoMode && e.target.closest('#anno-overlay-canvas.active')) return;
    if (_imgScale <= 1) return;
    _imgDragging = true; _imgDragMoved = false;
    _imgStartX = e.clientX - _imgTx;
    _imgStartY = e.clientY - _imgTy;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!_imgDragging) return;
    const nx = e.clientX - _imgStartX, ny = e.clientY - _imgStartY;
    if (Math.abs(nx - _imgTx) > 3 || Math.abs(ny - _imgTy) > 3) _imgDragMoved = true;
    _imgTx = nx; _imgTy = ny;
    _applyImgTransform();
  });

  window.addEventListener('mouseup', () => {
    if (_imgDragging) { _imgDragging = false; _applyImgTransform(); }
  });
})();

// ── Overlay annotation pointer events ────────────────────────────────────────
(function() {
  const overlayCanvas = document.getElementById('anno-overlay-canvas');
  let _ovCurrentStroke = null;

  overlayCanvas.addEventListener('pointerdown', e => {
    if (!_overlayAnnoMode) return;
    e.stopPropagation();
    e.preventDefault();
    overlayCanvas.setPointerCapture(e.pointerId);

    const _toolEl = document.querySelector('#anno-overlay-toolbar .anno-tool.active');
    const tool = _toolEl ? _toolEl.dataset.tool : 'pen';
    const _colorEl = document.getElementById('anno-overlay-color');
    const color = _colorEl ? _colorEl.value : '#ef4444';
    const _sizeEl = document.getElementById('anno-overlay-size');
    const size = parseInt(_sizeEl ? _sizeEl.value : '3');

    if (tool === 'eraser') {
      const img = document.getElementById('img-overlay-img');
      const rect = img.getBoundingClientRect();
      const pt = {
        x: (e.clientX - rect.left) / rect.width * img.naturalWidth,
        y: (e.clientY - rect.top) / rect.height * img.naturalHeight,
      };
      _eraseNearestStroke(overlayCanvas, pt);
      return;
    }

    const img = document.getElementById('img-overlay-img');
    const rect = img.getBoundingClientRect();
    const pt = {
      x: (e.clientX - rect.left) / rect.width * img.naturalWidth,
      y: (e.clientY - rect.top) / rect.height * img.naturalHeight,
    };
    const w = tool === 'highlighter' ? size * 5 : size;
    const op = tool === 'highlighter' ? 0.35 : 1.0;
    _ovCurrentStroke = { tool, color, width: w, opacity: op, points: [pt] };
  });

  overlayCanvas.addEventListener('pointermove', e => {
    if (!_ovCurrentStroke) return;
    e.stopPropagation();
    e.preventDefault();
    const img = document.getElementById('img-overlay-img');
    const rect = img.getBoundingClientRect();
    _ovCurrentStroke.points.push({
      x: (e.clientX - rect.left) / rect.width * img.naturalWidth,
      y: (e.clientY - rect.top) / rect.height * img.naturalHeight,
    });
    _redrawCanvas(overlayCanvas);
    _drawStroke(overlayCanvas.getContext('2d'), _ovCurrentStroke);
  });

  window.addEventListener('pointerup', () => {
    if (_ovCurrentStroke && _overlayAnnoMode) {
      if (!overlayCanvas._annoStrokes) overlayCanvas._annoStrokes = [];
      overlayCanvas._annoStrokes.push(_ovCurrentStroke);
      overlayCanvas._annoUndone = [];
      _ovCurrentStroke = null;
    }
  });

  // Overlay toolbar tool selection
  document.querySelectorAll('#anno-overlay-toolbar .anno-tool').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('#anno-overlay-toolbar .anno-tool').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  // Set default active tool
  const _defaultPenBtn = document.querySelector('#anno-overlay-toolbar .anno-tool[data-tool="pen"]');
  if (_defaultPenBtn) _defaultPenBtn.classList.add('active');
})();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeImgOverlay();
});

// ── 10. Font size (FTM px + html root) ───────────────────────────────────────
function setFont(px) {
  document.documentElement.style.setProperty('--font-size', px + 'px');
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── 11. Slide panel toggle (FTM) ─────────────────────────────────────────────
function toggleSlidePanel() {
  const panel = document.getElementById('slide-col');
  const divider = document.getElementById('divider');
  const btn = document.getElementById('btn-hide-img');
  const hiding = panel.style.display !== 'none';
  panel.style.display = hiding ? 'none' : '';
  divider.style.display = hiding ? 'none' : '';
  btn.textContent = hiding ? '🖼 이미지 보기' : '🖼 이미지 숨기기';
}

// ── 12. Gemini button (DRP) ──────────────────────────────────────────────────
const _GEMINI_PROMPT = `You will be helping a medical student understand and solve a medical problem. The student needs comprehensive explanation including vocabulary, taxonomy, problem-solving approach, and underlying principles.

Here is the problem:

<problem>
{{PROBLEM}}
</problem>

Your task is to provide a thorough educational explanation. Structure your response with:
- **핵심 용어 정의 (Key Vocabulary Definitions)**
- **분류 체계 설명 (Taxonomy/Classification)**
- **문제의 핵심 단서 (Key Clues)**
- **문제 접근 방식 (Problem-Solving Approach)**
- **기본 원리 (Underlying Principles)**
- **추가 학습 권장사항 (Recommended Further Study)**

Write your analysis in a scratchpad first, then provide the structured explanation.`;

async function openGeminiWithContext() {
  const section = SECTIONS[currentSectionIdx];
  if (!section || !section.questions.length) return;

  let qi = 0;
  if (IS_V2_SINGLE_SECTION) {
    // In v2 mode, find the most visible question card
    const quizCol = document.getElementById('quiz-col');
    const v2Cards = quizCol.querySelectorAll('.q-card.v2-card');
    if (v2Cards.length > 0) {
      const panelRect = quizCol.getBoundingClientRect();
      const panelCenter = panelRect.top + panelRect.height * 0.35;
      let best = null, bestDist = Infinity;
      v2Cards.forEach(card => {
        const r = card.getBoundingClientRect();
        const dist = Math.abs((r.top + r.height / 2) - panelCenter);
        if (dist < bestDist) { bestDist = dist; best = card; }
      });
      if (best) qi = parseInt(best.dataset.gi) || 0;
    }
  } else {
    const qCard = document.querySelector(`.page-section[data-si="${currentSectionIdx}"] .q-card`);
    qi = qCard ? +qCard.dataset.current : 0;
  }

  const q = section.questions[qi];
  if (!q) return;

  const problemText = q.question + '\n\n' + q.options.map(o => o.letter + '. ' + o.text).join('\n');
  const prompt = _GEMINI_PROMPT.replace('{{PROBLEM}}', problemText);

  try { await navigator.clipboard.writeText(prompt); } catch(e) {}

  window.open('https://gemini.google.com', '_blank');
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildQuiz();
updateProgress();

// ══════════════════════════════════════════════════════════════════════════════
//  Annotation Engine (state variables declared at top of script)
// ══════════════════════════════════════════════════════════════════════════════

function _annoKey(si, imgIdx) { return `${si}-${imgIdx}`; }
function _currentKey() { return _annoKey(currentSectionIdx, _currentAnnoSlideIdx); }

// ── Mode / Tool ──────────────────────────────────────────────────────────────
function setAnnoMode(mode) {
  _annoMode = mode === 'draw';
  const slideCol = document.getElementById('slide-col');
  // Toggle all slide panel canvases
  slideCol.querySelectorAll('.anno-canvas').forEach(c =>
    c.classList.toggle('active', _annoMode)
  );
  // Toggle tool buttons
  document.querySelectorAll('#anno-toolbar .anno-tool, #anno-color, #anno-size, #anno-undo, #anno-clear, #anno-clear-all')
    .forEach(el => el.disabled = !_annoMode);
  // Toggle mode buttons
  document.querySelectorAll('#anno-toolbar .anno-mode').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );
  // Auto-select pen when entering draw mode
  if (_annoMode && !_annoTool) setAnnoTool('pen');
  // Mobile: lock scroll in draw mode
  if ('ontouchstart' in window) {
    slideCol.style.overflowY = _annoMode ? 'hidden' : '';
    slideCol.style.scrollSnapType = _annoMode ? 'none' : '';
    document.getElementById('anno-slide-nav').style.display = _annoMode ? 'flex' : 'none';
    if (_annoMode) { var _ms = SECTIONS[currentSectionIdx]; _annoUpdateSlideNav((_ms && _ms.images) ? _ms.images.length : 0); }
  }
}

function setAnnoTool(tool) {
  _annoTool = tool;
  _annoColor = document.getElementById('anno-color').value;
  _annoSize = parseInt(document.getElementById('anno-size').value);
  document.querySelectorAll('#anno-toolbar .anno-tool').forEach(b =>
    b.classList.toggle('active', b.dataset.tool === tool)
  );
  // Update cursor
  document.querySelectorAll('.anno-canvas.active').forEach(c => {
    c.style.cursor = tool === 'eraser' ? 'not-allowed' : 'crosshair';
  });
}

// ── Store: save / load ───────────────────────────────────────────────────────
function _annoSaveToStore() {
  if (!_currentKey()) return;
  const canvas = _getActiveSlideCanvas();
  if (!canvas) return;
  const strokes = canvas._annoStrokes || [];
  if (strokes.length > 0) {
    _annoStore.set(_currentKey(), JSON.parse(JSON.stringify(strokes)));
  } else {
    _annoStore.delete(_currentKey());
  }
}

function _annoLoadToCanvas(canvas, si, imgIdx) {
  const key = _annoKey(si, imgIdx);
  let strokes = _annoStore.get(key) || [];
  if (!Array.isArray(strokes)) strokes = [];
  canvas._annoStrokes = JSON.parse(JSON.stringify(strokes));
  canvas._annoUndone = [];
  _redrawCanvas(canvas);
}

function _getActiveSlideCanvas() {
  const items = document.querySelectorAll('#slide-col .slide-page-item');
  if (items[_currentAnnoSlideIdx]) return items[_currentAnnoSlideIdx].querySelector('.anno-canvas');
  return null;
}

// ── Drawing ──────────────────────────────────────────────────────────────────
function _screenToImage(clientX, clientY, canvas) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height),
  };
}

function _redrawCanvas(canvas) {
  if (!canvas || !canvas.width) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const strokes = canvas._annoStrokes || [];
  strokes.forEach(s => _drawStroke(ctx, s));
}

function _drawStroke(ctx, s) {
  if (!s || !s.points || s.points.length < 2) return;
  ctx.save();
  ctx.globalAlpha = s.opacity;
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s.points[0].x, s.points[0].y);
  for (let i = 1; i < s.points.length; i++) {
    // Simple smoothing: midpoints
    if (i < s.points.length - 1) {
      const mx = (s.points[i].x + s.points[i + 1].x) / 2;
      const my = (s.points[i].y + s.points[i + 1].y) / 2;
      ctx.quadraticCurveTo(s.points[i].x, s.points[i].y, mx, my);
    } else {
      ctx.lineTo(s.points[i].x, s.points[i].y);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function _eraseNearestStroke(canvas, pt) {
  const strokes = canvas._annoStrokes || [];
  let bestIdx = -1, bestDist = Infinity;
  strokes.forEach((s, idx) => {
    if (!s.points) return;
    for (const p of s.points) {
      const d = Math.hypot(p.x - pt.x, p.y - pt.y);
      if (d < s.width / 2 + 20 && d < bestDist) {
        bestDist = d; bestIdx = idx;
      }
    }
  });
  if (bestIdx >= 0) {
    strokes.splice(bestIdx, 1);
    _redrawCanvas(canvas);
    _annoSaveToStore();
  }
}

// ── Pointer events on slide panel canvases ───────────────────────────────────
document.getElementById('slide-col').addEventListener('pointerdown', e => {
  if (!_annoMode) return;
  const canvas = e.target.closest('.anno-canvas');
  if (!canvas || !canvas.classList.contains('active')) return;
  // Update current slide index based on actually clicked canvas
  const clickedItem = canvas.closest('.slide-page-item');
  const allItems = Array.from(document.querySelectorAll('#slide-col .slide-page-item'));
  const newIdx = allItems.indexOf(clickedItem);
  if (newIdx >= 0 && newIdx !== _currentAnnoSlideIdx) {
    _annoSaveToStore();
    _currentAnnoSlideIdx = newIdx;
    _annoLoadToCanvas(canvas, currentSectionIdx, newIdx);
  }
  e.stopPropagation();
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);

  if (_annoTool === 'eraser') {
    const pt = _screenToImage(e.clientX, e.clientY, canvas);
    _eraseNearestStroke(canvas, pt);
    return;
  }

  const pt = _screenToImage(e.clientX, e.clientY, canvas);
  const w = _annoTool === 'highlighter' ? _annoSize * 5 : _annoSize;
  const op = _annoTool === 'highlighter' ? 0.35 : 1.0;
  _currentStroke = {
    tool: _annoTool, color: _annoColor, width: w, opacity: op,
    points: [pt]
  };
});

document.getElementById('slide-col').addEventListener('pointermove', e => {
  if (!_currentStroke) return;
  const canvas = e.target.closest('.anno-canvas');
  if (!canvas) return;
  e.stopPropagation();
  e.preventDefault();
  const pt = _screenToImage(e.clientX, e.clientY, canvas);
  _currentStroke.points.push(pt);
  _redrawCanvas(canvas);
  _drawStroke(canvas.getContext('2d'), _currentStroke);
});

window.addEventListener('pointerup', () => {
  if (_currentStroke) {
    const canvas = _getActiveSlideCanvas();
    if (canvas) {
      if (!canvas._annoStrokes) canvas._annoStrokes = [];
      canvas._annoStrokes.push(_currentStroke);
      canvas._annoUndone = [];
    }
    _currentStroke = null;
    _annoSaveToStore();
  }
});

// ── Undo / Clear ─────────────────────────────────────────────────────────────
function annoUndo() {
  const canvas = _getActiveSlideCanvas();
  if (!canvas || !canvas._annoStrokes || canvas._annoStrokes.length === 0) return;
  if (!canvas._annoUndone) canvas._annoUndone = [];
  canvas._annoUndone.push(canvas._annoStrokes.pop());
  _redrawCanvas(canvas);
  _annoSaveToStore();
}

function annoClear() {
  const canvas = _getActiveSlideCanvas();
  if (!canvas) return;
  if (!canvas._annoUndone) canvas._annoUndone = [];
  canvas._annoUndone.push(...(canvas._annoStrokes || []));
  canvas._annoStrokes = [];
  _redrawCanvas(canvas);
  _annoSaveToStore();
}

function annoClearAll() {
  _annoStore.clear();
  document.querySelectorAll('#slide-col .anno-canvas').forEach(c => {
    c._annoStrokes = [];
    c._annoUndone = [];
    _redrawCanvas(c);
  });
  const oc = document.getElementById('anno-overlay-canvas');
  if (oc) { oc._annoStrokes = []; oc._annoUndone = []; _redrawCanvas(oc); }
}

// ── Scroll → annotation swap ────────────────────────────────────────────────
(function() {
  const slideCol = document.getElementById('slide-col');
  let _scrollRaf = false;
  slideCol.addEventListener('scroll', () => {
    if (_scrollRaf) return;
    _scrollRaf = true;
    requestAnimationFrame(() => {
      _scrollRaf = false;
      if (_annoMode) return; // In draw mode on mobile, scroll is locked
      const items = slideCol.querySelectorAll('.slide-page-item');
      if (items.length === 0) return;
      const itemH = slideCol.clientHeight;
      const newIdx = Math.min(items.length - 1, Math.round(slideCol.scrollTop / itemH));
      if (newIdx !== _currentAnnoSlideIdx) {
        _annoSaveToStore();
        _currentAnnoSlideIdx = newIdx;
        const canvas = items[newIdx] && items[newIdx].querySelector('.anno-canvas');
        if (canvas && canvas.width) _annoLoadToCanvas(canvas, currentSectionIdx, newIdx);
        var _cs = SECTIONS[currentSectionIdx]; _annoUpdateSlideNav((_cs && _cs.images) ? _cs.images.length : 0);
      }
    });
  });
})();

// ── Mobile slide nav (draw mode) ─────────────────────────────────────────────
function _annoUpdateSlideNav(total) {
  const counter = document.getElementById('anno-slide-counter');
  const prevBtn = document.getElementById('anno-slide-prev');
  const nextBtn = document.getElementById('anno-slide-next');
  if (counter) counter.textContent = total > 0 ? `${_currentAnnoSlideIdx + 1} / ${total}` : '';
  if (prevBtn) prevBtn.disabled = _currentAnnoSlideIdx <= 0;
  if (nextBtn) nextBtn.disabled = _currentAnnoSlideIdx >= total - 1;
}

var _annoPrevBtn = document.getElementById('anno-slide-prev');
if (_annoPrevBtn) _annoPrevBtn.addEventListener('click', function() {
  var _prevSec = SECTIONS[currentSectionIdx];
  var total = (_prevSec && _prevSec.images) ? _prevSec.images.length : 0;
  if (_currentAnnoSlideIdx > 0) _annoGoToSlide(_currentAnnoSlideIdx - 1, total);
});
var _annoNextBtn = document.getElementById('anno-slide-next');
if (_annoNextBtn) _annoNextBtn.addEventListener('click', function() {
  var _nextSec = SECTIONS[currentSectionIdx];
  var total = (_nextSec && _nextSec.images) ? _nextSec.images.length : 0;
  if (_currentAnnoSlideIdx < total - 1) _annoGoToSlide(_currentAnnoSlideIdx + 1, total);
});

function _annoGoToSlide(idx, total) {
  _annoSaveToStore();
  _currentAnnoSlideIdx = idx;
  const slideCol = document.getElementById('slide-col');
  const items = slideCol.querySelectorAll('.slide-page-item');
  if (items[idx]) {
    slideCol.scrollTop = items[idx].offsetTop;
    const canvas = items[idx].querySelector('.anno-canvas');
    if (canvas && canvas.width) _annoLoadToCanvas(canvas, currentSectionIdx, idx);
  }
  _annoUpdateSlideNav(total);
}

// ── Color / size sync ────────────────────────────────────────────────────────
var _annoColorInput = document.getElementById('anno-color');
if (_annoColorInput) _annoColorInput.addEventListener('input', function(e) { _annoColor = e.target.value; });
var _annoSizeInput = document.getElementById('anno-size');
if (_annoSizeInput) _annoSizeInput.addEventListener('input', function(e) { _annoSize = parseInt(e.target.value); });

// Auto-hide slide panel if no slides at all
if (!HAS_ANY_SLIDES) toggleSlidePanel();

// ── Highlighter: drag-select → mark, click-mark → remove ────────────────
document.addEventListener('mouseup', function() {
  var sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  var ct = range.commonAncestorContainer;
  var card = (ct.nodeType === 1 ? ct : ct.parentNode).closest('.q-card');
  if (!card) return;
  try {
    var span = document.createElement('span');
    span.className = 'hl-mark';
    range.surroundContents(span);
  } catch(_) {
    try {
      var span = document.createElement('span');
      span.className = 'hl-mark';
      var frag = range.extractContents();
      span.appendChild(frag);
      range.insertNode(span);
    } catch(__) {}
  }
  sel.removeAllRanges();
});
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('hl-mark')) {
    var p = e.target.parentNode;
    while (e.target.firstChild) p.insertBefore(e.target.firstChild, e.target);
    p.removeChild(e.target);
  }
});

// ── Question search: jump to question by number ──────────────────────────
(function() {
  const input = document.getElementById('q-search-input');
  const btn = document.getElementById('q-search-btn');
  const totalLabel = document.getElementById('q-search-total');
  if (!input || !btn) return;
  let totalQ = 0;
  if (typeof SECTIONS !== 'undefined') { SECTIONS.forEach(function(s) { totalQ += (s.questions || []).length; }); }
  if (totalQ === 0) { totalQ = document.querySelectorAll('.q-card.v2-card').length; }
  totalLabel.textContent = '/ ' + totalQ + ' Q';
  input.max = totalQ;
  function jumpToQuestion() {
    const n = parseInt(input.value, 10);
    if (isNaN(n) || n < 1 || n > totalQ) { input.style.borderColor = 'var(--wrong)'; setTimeout(function() { input.style.borderColor = ''; }, 800); return; }
    const cards = document.querySelectorAll('.q-card.v2-card');
    let target = null;
    for (let i = 0; i < cards.length; i++) { if (parseInt(cards[i].dataset.gi, 10) === n - 1) { target = cards[i]; break; } }
    if (!target && n - 1 < cards.length) { target = cards[n - 1]; }
    if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); target.classList.add('focused'); setTimeout(function() { target.classList.remove('focused'); }, 2000); }
  }
  btn.addEventListener('click', jumpToQuestion);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); jumpToQuestion(); } });
})();

</script>
