"letter": "D", "text": "복강경 검사"}, {"letter": "E", "text": "질 초음파 검사"}], "answer": "B", "explanation": "Asherman 증후군이 의심될 때 진단의 표준 기준은 자궁경 검사로, 유착을 직접 시각화하고 동시에 유착박리술을 시행할 수 있다. 자궁난관조영술은 선별검사로 유용하지만 위양성 또는 위음성이 있을 수 있어 자궁경을 통한 확진이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "자궁난관 조영술(hysterosalpingography)을 시행하기에 가장 적절한 시기는?", "options": [{"letter": "A", "text": "월경 주기 6-10일"}, {"letter": "B", "text": "월경 주기 14-16일"}, {"letter": "C", "text": "월경 주기 21-23일"}, {"letter": "D", "text": "월경 주기 1-5일"}, {"letter": "E", "text": "황체기 중 언제든지"}], "answer": "A", "explanation": "월경이 끝난 직후인 주기 6-10일에 시행하는 것이 원칙이다. 이 시기는 임신 가능성이 없고, 자궁내막이 얇아 조영제의 통과를 명확히 볼 수 있으며, 배란 전이라 정확한 나팔관 개통 여부를 평가하기에 적합하다. 월경 중(1-5일)에는 감염 위험과 혈액 역류 우려가 있다. 배란기(14-16일)나 황체기(21-23일)는 임신 초기일 가능성이 있어 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "31세 여성이 소파술 후 월경량이 현저히 감소하고 임신이 되지 않아 내원하였다. 골반 초음파 검사에서 자궁내막은 얇았으나 다른 이상 소견은 없었다. 우선적으로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "자궁내막 조직 검사 (Endometrial biopsy)"}, {"letter": "B", "text": "자궁난관 조영술 (Hysterosalpingography)"}, {"letter": "C", "text": "골반 자기공명영상 (Pelvic MRI)"}, {"letter": "D", "text": "자궁경 검사 (Hysteroscopy)"}, {"letter": "E", "text": "진단적 복강경술 (Diagnostic laparoscopy)"}], "answer": "D", "explanation": "소파술 후 무월경이나 월경량 감소는 자궁강 내 유착(Asherman's syndrome)을 시사한다. 진단을 위한 가장 정확한 검사는 자궁경 검사로, 유착 부위를 직접 눈으로 확인할 수 있다. 자궁난관 조영술은 충만 결손을 통해 유착을 의심할 수 있으나 확진적이지 않으며, 치료 계획을 위해서는 자궁경 검사가 우선된다. 복강경은 골반 유착이나 난관 상태 평가에 유용하지만 자궁강 내부를 평가하는 데는 적합하지 않다. 자궁내막 조직 검사는 자궁내막염이나 결핵 등의 진단에 도움이 되나 유착 진단에는 민감도가 떨어진다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 124}, {"question": "자궁내막 용종 또는 점막하 근종이 의심되는 불임 환자에서 외래에서 간편하게 시행할 수 있는 초기 검사는 무엇입니까?", "options": [{"letter": "A", "text": "골반 자기공명영상 (MRI) "}, {"letter": "C", "text": "극체 (Polar body)"}, {"letter": "D", "text": "할구 (Blastomere)"}, {"letter": "E", "text": "난황주위강 (Perivitelline space)"}], "answer": "B", "explanation": "보조부화술은 투명대(zona pellucida)가 비정상적으로 두꺼운 배아에서 착상을 돕기 위해 투명대를 일부 얇게 하거나 절개하는 술기이다. 강의에서 'Zona pellucida가 이게 좀 특징적인 게 되게 두꺼워져. 그래서 이거를 조금 레이저로 좀 깎아줘가지고 assisted hatching, 딱 착상이 되게 endometrium이 이렇게 invasive하게 쉽게 되게 이렇게 도와주는 수술'이라고 설명하였다. 세포막이나 할구 등은 배아의 생존에 직접적으로 영향을 주므로 절대 손상시켜서는 안 된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "다음 중 ICSI(intracytoplasmic sperm injection)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "배아의 투명대를 레이저로 일부 제거하여 착상을 돕는다."}, {"letter": "B", "text": "한 개의 정자를 현미경적 조작으로 난자의 세포질 내에 직접 주입하는 방법이다."}, {"letter": "C", "text": "체외에서 배양된 배아를 자궁내로 이식하는 과정이다."}, {"letter": "D", "text": "여러 개의 정자를 난자의 투명대 주위에 놓아 수정을 유도한다."}, {"letter": "E", "text": "정자의 DNA fragmentation을 평가하는 검사법이다."}], "answer": "B", "explanation": "옳은 설명은 '한 개의 정자를 현미경적 조작으로 난자의 세포질 내에 직접 주입하는 방법이다' 이다. ICSI는 중증 남성 인자 불임에서 시행되는 미세조작술로, 정자를 난자의 세포질에 직접 주입하여 수정을 유도한다. 다른 보기는 각각 정자 기능 검사, 일반적 체외수정, assisted hatching, 배아 이식에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "자궁외 임신이 의심되어 경질 초음파를 시행하였으나 자궁내 임신낭이 관찰되지 않았다. 정상 자궁내 임신을 확인하기 위한 혈청 hCG의 판별 기준치(discriminatory zone)로 가장 최근에 권고되는 수치는?", "options": [{"letter": "A", "text": "10,000 mIU/mL"}, {"letter": "B", "text": "1,000 mIU/mL"}, {"letter": "C", "text": "1,500-2,000 mIU/mL"}, {"letter": "D", "text": "3,510 mIU/mL"}, {"letter": "E", "text": "500 mIU/mL"}], "answer": "D", "explanation": "전통적으로 hCG 1,500-2,000 mIU/mL를 기준으로 사용했으나, 최근 연구와 Novak 교과서에서는 경질 초음파상 정상 임신낭이 관찰되어야 하는 기준치를 3,510 mIU/mL로 제시하고 있다. 이 수치 이상에서 임신낭이 보이지 않으면 자궁외 임신이나 비정상 임신을 강력히 의심한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "28세 여성이 혈청 hCG 2,500 IU/L이나 경질 초음파에서 자궁내 및 자궁외 임신낭이 모두 관찰되지 않아 PUL로 분류되었다. 다음 중 가장 우선적으로 시행해야 할 조치는?", "options": [{"letter": "A", "text": "48시간 후 혈청 hCG 재측정"}, {"letter": "B", "text": "진단적 복강경 수술"}, {"letter": "C", "text": "즉시 자궁내막 소파술(D&C)"}, {"letter": "D", "text": "MTX 전신 투여"}, {"letter": "E", "text": "복부 전산화단층촬영(CT)"}], "answer": "B", "explanation": "PUL에서는 체외 임신 여부를 확인하기 위해 추적 관찰이 필요하다. 우선 48시간 간격으로 혈청 hCG를 측정하여 상승률을 평가한다. hCG가 적절히 상승하면 정상 임신 가능성이 있어 경과 관찰하고, 상승이 미약하거나 감소하면 자궁내막 소파술을 통해 융모를 확인하여 자궁내 유산과 자궁외 임신을 감별한다. 수술적 치료나 약물 치료는 진단이 명확해진 후 결정한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "무월경 6주와 하복부 통증으로 내원한 28세 여성의 혈청 hCG가 1500 mIU/mL였고, 48시간 후 1800 mIU/mL로 측정되었다. 가장 의심해야 할 진단은?", "options": [{"letter": "A", "text": "불완전 유산"}, {"letter": "B", "text": "포상기태"}, {"letter": "C", "text": "정상 자궁내 임신"}, {"letter": "D", "text": "난소낭종 파열"}, {"letter": "E", "text": "자궁외임신"}], "answer": "E", "explanation": "정상 자궁내 임신은 hCG가 48시간마다 60% 이상 상승한다. 불완전 유산은 hCG가 감소하는 경우가 많고, 포상기태는 hCG가 오히려 매우 높다. 난소낭종 파열은 임신 관련 질환이 아니므로 hCG가 상승하지 않거나 정상 임신 패턴을 보인다. 이 환자는 완만한 상승(20%)을 보여 자궁외임신의 전형적 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "임신 7주인 26세 여자가 소량의 질출혈로 병원에 왔다. 자궁경부는 닫혀 있으며, 경한 하복부 불편감이 있다. 질 초음파에서 태아 심박동이 정상적으로 확인되고, 태아 크기는 임신 주수에 적합하다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "옥시토신 투여"}, {"letter": "B", "text": "항생제 투여"}, {"letter": "C", "text": "메토트렉세이트 투여"}, {"letter": "D", "text": "자궁내 소파술"}, {"letter": "E", "text": "안정 및 경과 관찰"}], "answer": "E", "explanation": "절박 유산(threatened abortion)은 자궁경부가 닫혀 있고 태아 생존이 확인된 상태로, 특별한 약물 치료 없이 안정과 추적 관찰이 우선이다. 프로게스테론 투여는 논란이 있으나 일반적인 초치료는 안정 및 경과 관찰이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "26세 여성이 무월경 7주, 질출혈 및 하복부 통증으로 내원하였다. 혈압 110/70 mmHg, 맥박 88회/분. 소변 HCG 양성, 경질 초음파에서 자궁 내 gestational sac은 보이지 않고 cul-de-sac에 free fluid가 관찰된다. 혈청 HCG 5500 mIU/mL일 때 가장 적절한 처치는?", "options": [{"letter": "A", "text": "48시간 후 혈청 HCG 추적 검사"}, {"letter": "B", "text": "Methotrexate 근육주사"}, {"letter": "C", "text": "진단적 자궁 소파술(curettage)"}, {"letter": "D", "text": "경과 관찰 및 외래 추적"}, {"letter": "E", "text": "응급 수술적 치료(개복술 또는 복강경)"}], "answer": "E", "explanation": "Cul-de-sac free fluid는 헤모페이토니움(hemoperitoneum)을 시사하여 자궁 외 임신 파열 가능성이 높다. HCG 5000 mIU/mL 이상에서도 자궁 내 gestational sac이 보이지 않는 것은 정상 임신이라면 보여야 할 시기이므로 자궁 외 임신을 강력히 시사한다. 이에 활력징후가 안정적이더라도 파열이 의심되면 응급 수술이 필요하다. 48시간 후 HCG 추적 검사는 파열 가능성이 없는 pregnancy of unknown location(PUL)에서 시행하고, 진단적 자궁 소파술은 HCG 2000 이상에 자궁 내 sac이 없으면서 파열 증거가 없을 때 고려한다. Methotrexate는 비파열 안정적 자궁 외 임신에서 사용하며, 경과 관찰은 위험을 초래할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "28세 여성이 6주 무월경, 소량 질출혈 및 하복부 불편감으로 내원하였다. 혈청 HCG 2800 mIU/mL, 경질 초음파에서 자궁강 내 gestational sac과 부속기 종괴 모두 관찰되지 않고, cul-de-sac free fluid도 없다. 활력징후 정상일 때 다음 단계로 가장 적절한 것은?", "options": [{"letter": "A", "text": "48시간 후 혈청 HCG 추적 검사"}, {"letter": "B", "text": "항생제 투여"}, {"letter": "C", "text": "응급 개복술"}, {"letter": "D", "text": "Methotrexate 근육주사"}, {"letter": "E", "text": "진단적 자궁 소파술 (D&C)"}], "answer": "E", "explanation": "HCG 농도가 1500~2000 mIU/mL 이상의 discriminatory zone 넘었는데도 임신낭이 확인되지 않으면 pregnancy of unknown location(PUL)로 진단한다. 파열 소견 없고 활력징후가 안정적일 때는 자궁 소파술을 시행하여 융모 조직 존재 여부로 자연 유산과 자궁 외 임신을 감별하고, 이후 HCG 추이로 자궁 외 임신을 확진할 수 있다. Methotrexate는 확진된 자궁 외 임신이나 지속성 PUL에서 사용하며, 수술은 파열 시에 필요하다. 단순 HCG 추적은 진단 지연을 초래할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "28세 여성이 6주 무월경 후 소량의 질출혈로 내원하였다. 초음파에서 자궁 내부는 비어 있고 자궁부속기 종괴는 보이지 않았다. 진단적 소파술에서 융모세포는 관찰되지 않았다. 혈중 β-hCG는 48시간 전 2500 mIU/mL에서 현재 3000 m  "options": [{"letter": "A", "text": "Type 0"}, {"letter": "B", "text": "Type 5"}, {"letter": "C", "text": "Type 6"}, {"letter": "D", "text": "Type 1"}, {"letter": "E", "text": "Type 2"}], "answer": "D", "explanation": "FIGO 점막하 근종 분류: Type 0은 유경성인 경우, Type 1은 근층 내 침범이 50% 미만, Type 2는 50% 이상 침범이다. 근종의 30%가 근층 내에 위치하면 50% 미만이므로 Type 1이다. Type 5와 6은 장막하 근종 분류에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁평활근종(leiomyoma)의 위험인자에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "경구피임약 복용은 위험을 감소시킨다."}, {"letter": "B", "text": "흡연은 위험을 증가시킨다."}, {"letter": "C", "text": "다산력(parity)은 위험을 증가시킨다."}, {"letter": "D", "text": "조기 초경(early menarche)은 위험을 증가시킨다."}, {"letter": "E", "text": "이른 폐경(early menopause)은 위험을 증가시킨다."}], "answer": "D", "explanation": "자궁근종은 에스트로겐 의존성 종양으로, 평생 에스트로겐 노출 기간이 길수록 위험도 증가한다. 조기 초경은 에스트로겐 노출 기간을 늘려 위험을 증가시킨다. 다산력은 보호 효과, 흡연은 감소 효과(논란 있음), 이른 폐경은 위험 감소, 경구피임약은 중립 또는 약간의 감소 효과를 보일 수 있으나 명확한 위험 감소 요인은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "점막하 근종의 자궁강 내 돌출 정도와 근층 침범 비율을 평가하기 위해 특별히 유용한 검사는?", "options": [{"letter": "A", "text": "복부 초음파"}, {"letter": "B", "text": "Saline infusion sonography (SIS)"}, {"letter": "C", "text": "Magnetic resonance imaging (MRI)"}, {"letter": "D", "text": "Computed tomography (CT)"}, {"letter": "E", "text": "질 초음파"}], "answer": "B", "explanation": "Saline infusion sonography (SIS)는 자궁강 내 생리식염수를 주입하여 자궁내막과 근종의 경계를 명확히 보여줌으로써 FIGO 분류를 위한 정확한 정보를 제공한다. 질 초음파만으로는 정밀한 분류가 어렵고, CT는 작은 근종 구별에 부적합하다. MRI도 가능하지만 SIS가 더 간편하고 비용 효율적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "30세 산과력 0-0-0-0인 여성이 건강검진 초음파에서 발견된 자궁근종으로 내원하였다. 평소 월경은 규칙적이고 월경량은 정상이며, 월경통, 빈뇨, 변비 등의 증상은 없다. 골반 초음파에서 4 cm 크기의 장막밑근종과 2 cm 크기의 벽내근종이 관찰되며, 부속 : 137}, {"question": "완전 포상기태 치료 후 임신성 융모 종양(GTN)으로 진행할 위험을 높이는 요인으로 옳은 것은?", "options": [{"letter": "A", "text": "흡인 소파술 후 hCG가 정상으로 빠르게 감소"}, {"letter": "B", "text": "자궁 크기가 임신 주수보다 작음"}, {"letter": "C", "text": "난포막 황체낭종이 동반되지 않음"}, {"letter": "D", "text": "치료 전 hCG 수치가 10,000 mIU/mL 미만"}, {"letter": "E", "text": "환자 나이가 40세 이상"}], "answer": "B", "explanation": "완전 포상기태 후 지속성 GTN으로의 진행 위험은 치료 전 hCG >100,000 mIU/mL, 자궁이 임신 주수보다 과도하게 큰 경우, 난포막 황체낭종 동반, 40세 이상의 연령에서 높다. 따라서 40세 이상은 잘 알려진 고위험 요인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 137}, {"question": "자궁외 임신 환자에서 methotrexate(MTX) 치료를 고려할 수 있는 조건은?", "options": [{"letter": "A", "text": "혈역학적 불안정"}, {"letter": "B", "text": "태아 심박동이 확인되는 경우"}, {"letter": "C", "text": "임신낭 최대 직경이 50mm 이상"}, {"letter": "D", "text": "환자가 혈역학적으로 안정되고, 임신낭 크기가 작으며 추적관찰이 가능한 경우"}, {"letter": "E", "text": "hCG가 15,000 mIU/mL"}], "answer": "D", "explanation": "MTX 치료는 혈역학적으로 안정되고, 임신낭 크기가 작고(보통 40mm 미만), 태아 심박동이 없으며, hCG가 매우 높지 않고, 신뢰할 수 있는 추적관찰이 가능한 환자에서 사용한다. 보기 (1), (2), (3), (4)는 모두 MTX 치료의 금기 또는 상대적 금기에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 138}, {"question": "Stage II GTN으로 진단된 30세 여성의 WHO prognostic score가 5점일 때, 가장 적절한 일차 치료는?", "options": [{"letter": "A", "text": "경과 관찰"}, {"letter": "B", "text": "자궁절제술 단독"}, {"letter": "C", "text": "단일 항암 화학 요법"}, {"letter": "D", "text": "골반 방사선 치료"}, {"letter": "E", "text": "복합 항암 화학 요법"}], "answer": "C", "explanation": "GTN에서 WHO 예후 점수가 7점 미만인 저위험군은 단일 항암 화학요법(예: methotrexate 또는 actinomycin D)이 일차 치료입니다. Stage II라도 점수가 5점이면 저위험이므로 \"단일 항암 화학 요법\"이 정답입니다. 오답 분석: 자궁절제술은 가임력 보존을 원치 않을 때 보조적으로 고려하나 단독 치료는 아닙니다. 복합 항암 화학 요법은 고위험군(7점 이상)에 사용됩니다. 골반 방사선 치료는 전이 부위에 제한적으로 사용합니다. 경과 관찰은 GTN 진단 시 적절치 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 138}, {"question": "GTN의 WHO Prognostic Scoring System에서 평가하는 항목에 해당하는 것은?", "options": [{"letter": "A", "text": "환자의 혈액형"}, {"letter": "B", "text": "포상기태의 조직학적 아형"}, {"letter": "C", "text": "선행 임신으로부터 진단까지의 기간"}, {"letter": "D", "text": "난포막 황체낭종의 존재 여부"}, {"letter": "E", "text": "환자의 분만력 (parity)"}], "answer": "C", "explanation": "WHO 예후 점수 체계에는 선행 임신 종결 후 GTN 진단까지의 기간(개월 수)이 포함됩니다. 기간이 길수록 점수가 높아집니다. 따라서 \"선행 임신으로부터 진단까지의 기간\"이 정답입니다. 오답 분석: 분만력(parity)은 점수에 포함되지 않으며, 선행 임신 유형(기태, 유산, 만삭)은 포함됩니다. 조직학적 아형은 직접적인 점수 항목이 아닙니다. 난포막 황체낭종은 hCG 상승의 부수적 소견일 뿐 점수 요소가 아닙니다. 혈액형은 고려되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 138}, {"question": "65세 여성 환자가 질 쪽으로 무언가 튀어나오는 느낌과 함께 배뇨 시 불편감을 호소한다. 질 진찰에서 질 전벽이 방광을 포함하여 풍선처럼 돌출된 소견을 보인다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Cystocele"}, {"letter": "B", "text": "Uterine prolapse"}, {"letter": "C", "text": "Rectocele"}, {"letter": "D", "text": "Enterocele"}, {"letter": "E", "text": "Vaginal vault prolapse"}], "answer": "A", "explanation": "질 전벽의 돌출과 방광이 함께 관찰되므로 cystocele이다. Rectocele은 후벽과 직장이, uterine prolapse는 자궁이, enterocele는 소장이, vaginal vault prolapse는 자궁 제거 후 질 천정이 탈출하는 것이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "POP에서 level 2 결손 시 발생할 수 있는 대표적인 탈출증은?", "options": [{"letter": "A", "text": "Vaginal vault prolapse"}, {"letter": "B", "text": "Cystocele"}, {"letter": "C", "text": "Uterine prolapse"}, {"letter": "D", "text": "Enterocele"}, {"letter": "E", "text": "Cervical prolapse"}], "answer": "B", "explanation": "Level 2 결손은 방광과 직장 주변의 지지 구조물(근막, 인대 등)이 약해져 cystocele 또는 rectocele을 발생시킨다. Cervical prolapse, uterine prolapse, vaginal vault prolapse, enterocele은 모두 level 1 결손과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "자궁절제술을 e": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "60세 여성이 배변 시 과도하게 힘을 주어야 하고, 손가락으로 질 뒤쪽을 눌러야 배변이 가능하다고 호소한다. 질 진찰에서 질 후벽이 풍선처럼 앞으로 돌출된 소견이 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "소장류(Enterocele)"}, {"letter": "B", "text": "방광류(Cystocele)"}, {"letter": "C", "text": "자궁탈출증(Uterine prolapse)"}, {"letter": "D", "text": "직장류(Rectocele)"}, {"letter": "E", "text": "요도탈출증(Urethrocele)"}], "answer": "D", "explanation": "질 후벽의 풍선 같은 돌출과 손가락으로 질을 밀어 넣어 배변을 돕는 증상(splinting)은 직장류(Rectocele)의 전형적인 임상 양상입니다. 이는 직장이 질 후벽을 통해 돌출되어 변이 고이기 때문에 발생합니다. 방광류는 전벽, 자궁탈출은 자궁경부 돌출, 소장류는 천정 탈출과 함께 나타납니다. 요도탈출은 전벽의 요도 부위에 국한됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "72세 여성이 ‘질 밖으로 무언가 빠져나온다’고 호소하였다. 진찰 시 질 벽 지지는 정상이나 자궁경부가 현저히 길어져 외음부 밖으로 돌출되어 있다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "Rectocele (직장류)"}, {"letter": "B", "text": "Cervical elongation (자궁경부 비대/연장)"}, {"letter": "C", "text": "Enterocele (소장류)"}, {"letter": "D", "text": "Cystocele (방광류)"}, {"letter": "E", "text": "Vaginal carcinoma (질암)"}], "answer": "B", "explanation": "질 벽이 정상적으로 지지되어 있으면서 자궁경부만 길게 돌출된 경우 자궁경부 비대(cervical elongation)를 의심해야 한다. 강의에서 ‘질 이완이 없는데 단순히 자궁경부가 길어져서 질 밖으로 튀어나온 사람이 있다’고 하였다. Cystocele, rectocele, enterocele은 각각 전·후방 질벽의 탈출을 동반하므로 질벽 이완 소견이 관찰된다. 질암은 궤양성 병변이나 종괴를 형성하므로 본 증례와 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "65세 여성이 질 쪽으로 무언가 빠져나오는 느낌으로 내원하였다. 골반진찰에서 질 후벽의 돌출이 관찰되었으나 anal canal 및 anal sphincter는 정상이었다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "Urethrocele"}, {"letter": "B", "text": "Cystocele"}, {"letter": "C", "text": "Enterocele"}, {"letter": "D", "text": "Rectocele"}, {"letter": "E", "text": "Uterine prolapse"}], "answer": "C", "explanation": "Enterocele is herniation of the posterior vaginal wall containing peritoneum and small bowel, often presenting as a posterior bulge without significant rectal involvement. A normal anal canal and sphincter make enterocele more likely than rectocele, which typically involves the rectum and may have associated sphincter dysfunction.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "질 밖으로 돌출된 덩어리를 주소로 내원한 여성에서 골반장기탈출증과 감별해야 할 질환으로, 자궁경부가 정상이며 덩어리가 자궁 내강에서 유래한 경우 가장 의심되는 것은?", "options": [{"letter": "A", "text": "Rectocele"}, {"letter": "B", "text": "Cystocele"}, {"letter": "C", "text": "Submucosal myoma"}, {"letter": "D", "text": "Enterocele"}, {"letter": "E", "text": "Cervical elongation"}], "answer": "C", "explanation": "Submucosal myoma는 자궁 내강에서 발생한 근종이 자궁경부를 통해 질 밖으로 돌출될 수 있으며, 골반장기탈출증과 유사한 증상을 보인다. 강의에서도 cystocele로 오인했지만 나중에 자궁 근종으로 밝혀진 사례를 언급하며 감별의 중요성을 강조했다. 자궁경부가 정상이고 덩어리가 자궁 내강에서 유래한 경우 가장 의심해야 할 진단은 submucosal myoma 또는 cervical polyp이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "다음 중 질식 자궁절제술(vaginal hysterectomy)을 시행하기 부적절한 경우는?", "options": [{"letter": "A", "text": "이전 제왕절개 1회"}, {"letter": "B", "text": "자궁탈출(prolapse)"}, {"letter": "C", "text": "직경 4cm 난소낭종"}, {"letter": "D", "text": "자궁근종 크기 임신 10주 해당"}, {"letter": "E", "text": "골반염(PID) 과거력이 있는 경우"}], "answer": "E", "explanation": "골반염 과거력은 골반 내 유착을 유발하여 질식 접근 시야 제한 및 주변 장기 손상 위험을 높이므로 질식 자궁절제술의 금기입니다. 자궁근종 10주 크기는 비교적 크지 않고 질식 절제가 가능하며, 이전 제왕절개 1회는 광범위한 유착이 아니라면 절대적 금기가 아닙니다. 4cm 난소낭종은 작아 질식 접근이 가능하고, 자궁탈출은 오히려 질식 수술의 적응증입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "다음 중 선행 제왕절개술 후 질식분만(TOLAC)을 시도하기에 가장 적합한 대상자는?", "options": [{"letter": "A", "text": "이전에 저위 횡절개(low transverse) 제왕절개 1회, 현재 단태아 두위 임신 39주로 분만 진통이 시작된 33세 여성"}, {"letter": "B", "text": "이전 제왕절개 반흔이 얇아 자궁파열 위험이 높다고 평가된 40세 여성"}, {"letter": "C", "text": "이전에 제왕절개 2회, 현재 단태아 두위, 분만 진통이 없는 30세 여성"}, {"letter": "D", "text": "이전 제왕절개가 classical incision으로 시행된 35세 여성"}, {"letter": "E", "text": "전치태반으로 인해 금번 반드시 제왕절개가 필요한 38세 여성"}], "answer": "C", "explanation": "TOLAC의 이상적인 대상자는 이전에 1회의 저위 횡절개 반흔이 있고, 자궁반흔 열개 또는 파열의 위험이 낮으며, 현재 단태아 두위, 분만 진통이 자연적으로 시작된 경우이다. Classical incision, 다태임신, 전치태반, 자궁반흔이 약한 경우는 TOLAC에 부적절하거나 상대적 금기에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "정상 자궁의 anteversion에 대한 설명으로 옳지 않은 것은?", "options": [{"letter": "A", "text": "자궁후굴(retroflexion)과는 다른 개념이다."}, {"letter": "B", "text": "정상 분만을 위해 모든 여성에서 반드시 필요한 위치이다."}, {"letter": "C", "text": "자궁경부는 질에 대해 약 90도 각도로 기울어져 있다."}, {"letter": "D", "text": "골반 염증 질환 후 유착으로 인해 후굴(retroversion)이 발생할 수 있다."}, {"letter": "E", "text": "자궁체부가 앞으로 경사져 있어 방광 위에 위치한다."}], "answer": "D", "explanation": "Anteversion은 자궁의 정상적인 위치로서 분만에 유리하지만, 후굴이 있는 여성도 정상 질식분만이 가능하므로 반드시 필요한 요소는 아니다. 나머지 설명들은 anteversion의 해부학적 특징이나 연관된 임상 양상으로 타당하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 139}, {"question": "POP-Q(Pelvic Organ Prolapse Quantification) system에서 Aa 지점의 위치는?", "options": [{"letter": "A", "text": "Hymen에서 3cm 상방의 질 전벽"}, {"letter": "B", "text": "Hymen에서 가장 가까운 전벽 지점"}, {"letter": "C", "text": "질 후벽의 hymen에서 3cm 상방"}, {"letter": "D", "text": "가장 많이 처진 질 전벽의 지점"}, {"letter": "E", "text": "Hymen에서 3cm 하방의 질 전벽"}], "answer": "A", "explanation": "Aa 지점은 anterior wall에서 hymen으로부터 3cm 상방에 고정된 점이다. Ba가 전벽의 가장 처진(dependent) 지점이고, Ap는 후벽의 3cm 상방 지점이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "POP-Q system에서 Ba 지점의 정의는?", "options": [{"letter": "A", "text": "Anterior wall의 가장 돌출된 지점"}, {"letter": "B", "text": "Hymen에서 3cm 상방의 posterior wall"}, {"letter": "C", "text": "Hymen에서 3cm 상방의 anterior wall"}, {"letter": "D", "text": "Posterior wall의 가장 돌출된 지점"}, {"letter": "E", "text": "Cervix의 가장 하방 지점"}], "answer": "A", "explanation": "Ba는 anterior wall 중 가장 많이 하강하여 돌출된 지점을 측정한 값이다. 정상에서는 -3 cm (Aa와 동일)이나 탈출 시 hymen 아래로 +값을 가질 수 있다. Bp는 posterior wall의 가장 처진 지점, C는 cervix의 가장 원위부이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "POP-Q 검사 결과 Aa: +3 cm, Ba: +6 cm, C: -2 cm, Ap: -3 cm, Bp: -2 cm, TVL: 8 cm일 때, 진단할 수 있는 것은?", "options": [{"letter": "A", "text": "Cystocele"}, {"letter": "B", "text": "Enterocele"}, {"letter": "C", "text": "Rectocele"}, {"letter": "D", "text": "Total uterine prolapse"}, {"letter": "E", "text": "Vaginal vault prolapse"}], "answer": "A", "explanation": "Aa와 Ba가 크게 양성(+)으로 anterior wall의 심한 탈출을 나타내지만, C point는 -2 cm로 정상 범위이므로 자궁 탈출은 없다. Ap와 Bp도 경미한 음성 또는 정상이므로 rectocele은 주된 소견이 아니다. 따라서 전형적인 cystocele (방광류)이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "요실금의 진단을 위한 검사들에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "방광내압측정(cystometry)은 복압성 요실금을 진단하는 데 일차적으로 사용된다."}, {"letter": "B", "text": "발살바요누출압(VLPP)이 90 cmH2O 이상이면 내인성 요도괄약근 기능부전(ISD)을 의미한다."}, {"letter": "C", "text": "패드테스트(pad test)는 절박성 요실금의 중증도 평가에 가장 유용하다."}, {"letter": "D", "text": "Q-tip test에서 30도 이상의 각도 변화는 요도과운동성(urethral hypermobility)을 시사한다."}, {"letter": "E", "text": "요역동학검사(urodynamic study)는 모든 요실금 환자에서 반드시 시행해야 한다."}], "answer": "D", "explanation": "Q-tip test에서 30도 이상의 각도 변화는 요도과운동성(urethral hypermobility)을 시사한다. 패드테스트는 요실금의 양을 객관적으로 측정하는 방법으로 특정 유형에 국한되지 않는다. VLPP가 60 cmH2O 미만일 때 내인성 요도괄약근 기능부전(ISD)을 시사하며, 90 이상은 정상 또는 과운동성에 가깝다. 방광내압측정은 배뇨근과활동성(절박성 요실금)을 진단하는 데 유용하다. 요역동학검사는 복잡한 경우에 선택적으로 시행하며 모든 환자에서 필수적이지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "골반장기 탈출증을 평가하는 POP-Q system에서 자궁천골인대(uterosacral ligament)가 부착되는 부위로, 자궁적출술을 시행하지 않은 여성에서 질의 최상단의 위치를 나타내는 지표는?", "options": [{"letter": "A", "text": "Ba"}, {"letter": "B", "text": "Ap"}, {"letter": "C", "text": "Aa"}, {"letter": "D", "text": "D"}, {"letter": "E", "text": "C"}], "answer": "D", "explanation": "POP-Q system에서 D 지점은 자궁천골인대(uterosacral ligament)가 부착되는 후방 질원개(posterior fornix)의 위치를 나타낸다. 자궁적출술을 시행한 경우에는 D 지점이 생략된다. Aa와 Ba는 질 전벽, Ap는 질 후벽, C는 자궁경부 또는 질 천정(vaginal cuff)을 나타낸다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "다음 POP-Q 검사 결과를 가진 환자에서 가장 가능성 있는 진단은? Aa: -3cm, Ba: -3cm, C: -5cm, Ap: -3cm, Bp: +5cm, TVL: 9cm", "options": [{"letter": "A", "text": "정상 소견"}, {"letter": "B", "text": "자궁탈출증(Uterine prolapse)"}, {"letter": "C", "text": "질천정탈출증(Vaginal vault prolapse)"}, {"letter": "D", "text": "직장류(Rectocele)"}, {"letter": "E", "text": "방광류(Cystocele)"}], "answer": "D", "explanation": "이 환자는 Aa/Ba가 -3cm로 정상이고 C점이 -5cm로 자궁이 정상 위치에 있습니다. 그러나 Bp가 +5cm로 처녀막 밖으로 크게 돌출되어 있어 후벽의 탈출을 의미합니다. 따라서 이는 직장류(Rectocele)로 진단할 수 있습니다. 방광류는 전벽 지표(Aa, Ba)가 양성인 경우, 자궁탈출증은 C점이 양성인 경우, 질천정탈출은 C=D이면서 양성인 경우에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "골반장기탈출증의 POP-Q 검사에서 Point D가 가리키는 해부학적 위치는?", "options": [{"letter": "A", "text": "Cervix의 가장 먼 끝부분 (most distal edge of cervix)"}, {"letter": "B", "text": "Vaginal anterior wall의 최대 탈출점"}, {"letter": "C", "text": "External urethral meatus (외요도구)"}, {"letter": "D", "text": "Vaginal posterior wall의 최대 탈출점"}, {"letter": "E", "text": "Posterior fornix (질 후원개)"}], "answer": "E", "explanation": "In the POP-Q system, Point D represents the posterior fornix, which is the level of the uterosacral ligament attachment, and is measured only in patients with a cervix. Point C is the most distal edge of the cervix.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "골반장기탈출증으로 의심되는 58세 여성의 POP-Q 측정값이다. 환자의 병기는?\n\nAa +2cm, Ba +3cm, C -6cm, D -5cm, Ap -2cm, Bp -2cm, Total vaginal length 11cm.", "options": [{"letter": "A", "text": "Stage 0"}, {"letter": "B", "text": "Stage 1"}, {"letter": "C", "text": "Stage 3"}, {"letter": "D", "text": "Stage 4"}, {"letter": "E", "text": "Stage 2"}], "answer": "C", "explanation": "The most distal (protruding) point is Ba at +3 cm, which is greater than +1 cm. According to the POP-Q staging system, Stage 3 is defined as the most distal portion of the prolapse being more than 1 cm beyond the hymen but not total vaginal eversion (total vaginal length - 2 cm).", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 141}, {"question": "골반장기 탈출증의 병기 설정에서 stage 2의 기준은 hymen을 기준으로 얼마인가?", "options": [{"letter": "A", "text": "-3 cm ~ -1 cm"}, {"letter": "B", "text": "+1 cm ~ +3 cm"}, {"letter": "C", "text": "TVL의 절반 이상"}, {"letter": "D", "text": "TVL 전체 길이만큼 돌출"}, {"letter": "E", "text": "-1 cm ~ +1 cm"}], "answer": "E", "explanation": "Stage 2는 탈출된 부위의 가장 하방 지점이 hymen으로부터 -1 cm에서 +1 cm 사이에 위치하는 경우이다. Stage 1은 -1 cm보다 상방, stage 3는 +1 cm보다 하방이지만 완전 탈출(TVL)에는 못 미치는 상태, stage 4는 완전 탈출(TVL)에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 142}, {"question": "방광류(cystocele)가 있는 환자에서 요폐(urinary retention)가 발생하는 주된 기전은?", "options": [{"letter": "A", "text": "변비로 인한 직장 압박"}, {"letter": "B", "text": "방광 탈출로 인한 요도-방광 접합부의 꺾임(kinking)"}, {"letter": "C", "text": "요도 괄약근의 강한 수축"}, {"letter": "D", "text": "착탈장에 의한 요관 폐쇄"}, {"letter": "E", "text": "방광 배뇨근의 과도한 수축"}], "answer": "B", "explanation": "방광이 질 밖으로 돌출되면 요도가 꺾이면서 요도-방광 접합부에 기계적 폐색이 발생한다. 많은 환자가 손가락으로 탈출된 방광을 밀어 넣으면 소변이 시원하게 나온다고 호소한다. 다른 보기들은 주요 기전이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "골반장기 탈출증 환자에서 빈뇨(urinary frequency)가 발생하는 병태생리로 가장 적절한 것은?", "options": [{"letter": "A", "text": "방광 점막의 위축성 변화"}, {"letter": "B", "text": "방광 근층의 섬유화"}, {"letter": "C", "text": "불완전 배뇨로 인한 잔뇨량 증가"}, {"letter": "D", "text": "요도 괄약근의 과민성"}, {"letter": "E", "text": "소변 농축 능력 저하"}], "answer": "C", "explanation": "방광 탈출이나 요도 꺾임 등으로 방광이 완전히 비워지지 못해 잔뇨량이 증가한다. 이로 인해 기능적 방광 용적이 감소하고, 조금만 소변이 차도 배뇨 욕구를 느껴 빈뇨가 발생한다. 방광 점막 위축이나 근층 섬유화는 직접적인 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "55세 여자 환자가 갑작스러운 요의를 느끼면 참지 못하고 화장실에 가야 하며, 기침이나 웃을 때 소변이 조금씩 새는 증상을 호소한다. 과거력: 2회 자연분만. 신경학적 검사 정상. 요검사 정상. 이 환자의 요실금 유형으로 적절한 것은?", "options": [{"letter": "A", "text": "혼합성 요실금 (Mixed urinary incontinence)"}, {"letter": "B", "text": "긴장성 요실금 (Stress urinary incontinence)"}, {"letter": "C", "text": "기능성 요실금 (Functional incontinence)"}, {"letter": "D", "text": "일류성 요실금 (Overflow incontinence)"}, {"letter": "E", "text": "절박성 요실금 (Urge urinary incontinence)"}], "answer": "A", "explanation": "혼합성 요실금 (Mixed urinary incontinence)은 복압성 요실금(기침, 웃을 때 요누출)과 절박성 요실금(갑작스러운 요의로 참지 못함) 증상이 공존하는 상태이다. 긴장성 또는 절박성 단독으로는 양쪽 증상을 설명할 수 없으며, 일류성 요실금은 배뇨 후 잔여뇨로 인한 넘침, 기능성은 신체·인지 장애로 인한 요실금을 의미한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 143}, {"question": "51세 여자 환자가 기침, 무거운 것을 들 때 발생하는 불수의적인 요누출을 주소로 내원하였다. 3명의 자연분만 기왕력이 있다. 케겔운동을 3개월간 시행하였으나 증상이 호전되지 않았다. Q-tip test 40도, VLPP 95cmH2O였다. 적절한 치료는?", "options": [{"letter": "A", "text": "방광훈련(bladder training)"}, {"letter": "B", "text": "미라베그론(mirabegron) 투여"}, {"letter": "C", "text": "항콜린제(anticholinergics) 투여"}, {"letter": "D", "text": "요도 팽대제 주입술(urethral bulking agent injection)"}, {"letter": "E", "text": "중부요도슬링 수술(midurethral sling surgery)"}], "answer": "E", "explanation": "중부요도슬링 수술(midurethral sling surgery)은 복압성 요실금에서 보존적 치료에 실패한 경우 시행하는 표준 수술이다. Q-tip test 40도(30도 이상)와 VLPP 95cmH2O(>90)는 요도과운동성을 시사하여 슬링 수술이 효과적이다. 방광훈련, 항콜린제, 미라베그론은 절박성 요실금에 사용된다. 요도 팽대제 주입술은 내인성 요도괄약근 기능부전(ISD)에서 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "다음 중 골반장기탈출증의 위험인자로 인정되지 않는 것은?", "options": [{"letter": "A", "text": "전신적 에스트로겐 대체 요법 (systemic estrogen replacement therapy)"}, {"letter": "B", "text": "선천성 결합조직 약화 (congenital weakness of connective tissue, e.g., Ehlers-Danlos syndrome)"}, {"letter": "C", "text": "만성폐쇄성폐질환 (chronic obstructive pulmonary disease)"}, {"letter": "D", "text": "질식분만 (vaginal delivery)"}, {"letter": "E", "text": "비만 (obesity)"}], "answer": "A", "explanation": "전신적 에스트로겐 대체 요법은 골반장기탈출증의 위험인자가 아니다. 오히려 폐경 후 에스트로겐 부족이 근육 약화를 초래하여 위험을 높이므로, 에스트로겐 보충은 일부 보호 효과를 나타낼 수 있다. 질식분만은 가장 흔한 원인이며, 비만과 만성폐쇄성폐질환(만성 기침)은 복압을 상승시켜 위험을 증가시킨다. Ehlers-Danlos 증후군 등 선천성 결합조직 이상도 명백한 위험인자이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "Kegel 운동이 골반장기탈출증 환자에서 골반저근을 효과적으로 강화하는 이유로 가장 적절한 것은?", "options": [{"letter": "A", "text": "항문 괄약근 수축과 질 괄약근 수축이 동일한 신경 지배를 공유하므로"}, {"letter": "B", "text": "Kegel 운동은 요도 괄약근만을 선택적으로 강화하므로"}, {"letter": "C", "text": "질 근육의 직접적인 수축을 학습하기 쉬우므로"}, {"letter": "D", "text": "복압을 낮추어 자궁이 아래로 밀리는 것을 방지하므로"}, {"letter": "E", "text": "항문 수축 시 자동으로 질 근육이 이완되므로"}], "answer": "A", "explanation": "Kegel 운동은 항문 괄약근 수축을 통해 질을 포함한 골반저근 전체를 운동시키는데, 이는 두 근육이 동일한 신경 지배를 공유하기 때문이다. 강의에서 'anal sphincter를 수축시키는 것은 vaginal sphincter를 수축시키는 것과 같은 운동을 하더라'고 설명하였다. 직접적인 질 수축은 학습이 어려운 반면 항문 수축은 이미 학습되어 있어 이를 이용한다. 복압을 낮추는 효과는 미미하며, 이완이 아닌 수축을 유발한다. 요도뿐 아니라 질과 골반저 전체를 강화하므로 요도 괄약근만 강화한다는 설명도 틀리다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "다음 중 질 pessary 사용의 절대적 금기증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "중증 질염 또는 골반염증 (severe vaginal infection or pelvic inflammation)"}, {"letter": "B", "text": "무증상의 경미한 방광류 (mild cystocele without symptoms)"}, {"letter": "C", "text": "수술 전 일시적 증상 완화 목적 (temporary symptom relief before scheduled surgery)"}, {"letter": "D", "text": "수술을 거부한 환자 (patient refusing surgical treatment)"}, {"letter": "E", "text": "Stage 1 자궁탈출증 (stage 1 uterine prolapse)"}], "answer": "A", "explanation": "활동성 감염이나 중증 염증이 있는 경우 pessary를 삽입하면 염증을 더 악화시키고, 주변 조직으로의 파급 위험이 있으므로 금기이다. 강의에서 '염증이 심한 사람들한테는 쓰지 않는다'고 강조하였다. Stage 1 탈출증이나 무증상 방광류는 pessary의 적응증이 될 수 있으며, 수술 거부나 수술 전 일시적 사용 모두 pessary의 주요 적응증에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "Stage 2 골반장기탈출증 환자에서 우선적으로 고려할 비수술적(보존적) 치료로 적절하지 않은 것은?", "options": [{"letter": "A", "text": "Kegel 운동 (pelvic floor muscle exercise)"}, {"letter": "B", "text": "질 pessary 삽입 (vaginal pessary insertion)"}, {"letter": "C", "text": "체중 감량 (weight reduction)"}, {"letter": "D", "text": "전신적 에스트로겐 투여 (systemic estrogen administration)"}, {"letter": "E", "text": "변비 치료 (management of constipation)"}], "answer": "D", "explanation": "전신적 에스트로겐 투여는 골반장기탈출증의 표준 비수술적 치료가 아니다. 폐경 후 국소 에스트로겐 크림이 질 점막 위축 개선에 도움이 될 수 있으나, 탈출 자체를 치료하지는 않으며 강의에서도 언급되지 않았다. Kegel 운동, 체중 감량, 변비 치료, pessary는 모두 강의에서 설명된 1차적 보존 치료 옵션이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "51세 여성 환자가 기침, 무거운 물건을 들 때 발생하는 불수의적 요누출을 주소로 내원하였다. 3명의 자연분만 기왕력이 있다. 요검사에서 RBC 1-4/HPF, WBC 1-4/HPF, Q-tip test 35°, VLPP 100 cmH₂O로 측정되었다. 3개월간의 골반저근 운동에도 호전이 없어 수술적 치료를 계획하였다. 가장 적절한 수술 방법은?", "options": [{"letter": "A", "text": "Periurethral collagen injection"}, {"letter": "B", "text": "Artificial urinary sphincter implantation"}, {"letter": "C", "text": "Mid-urethral sling (tension-free vaginal tape)"}, {"letter": "D", "text": "Pubovaginal sling (autologous rectus fascia)"}, {"letter": "E", "text": "Burch colposuspension"}], "answer": "C", "explanation": "Stress urinary incontinence with urethral hypermobility (Q-tip >30°) and without intrinsic sphincter deficiency (VLPP >60 cmH₂O) is best treated with mid-urethral sling, which is the first-line surgical therapy. Burch colposuspension is an older technique; pubovaginal sling is used for intrinsic sphincter deficiency; artificial sphincter for severe ISD; bulking agents for ISD in poor surgical candidates.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "질 pessary를 장기간 사용할 때 발생할 수 있는 합병증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "복압성 요실금의 악화"}, {"letter": "B", "text": "질 점막의 궤양 및 미란"}, {"letter": "C", "text": "자궁경부암의 위험 감소"}, {"letter": "D", "text": "골반저근의 비대"}, {"letter": "E", "text": "요실금의 완전한 회복"}], "answer": "B", "explanation": "질 pessary를 장기간 사용하면 이물질 반응과 지속적인 압박으로 인해 질 점막의 궤양 및 미란, 분비물 증가, 누공 형성 등의 합병증이 발생할 수 있다. 강의에서는 이러한 합병증을 상세히 설명하며, 특히 궤양과 염증을 주의해야 한다고 하였다. 다른 보기들은 일반적으로 해당되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "전자궁절제술(total hysterectomy) 후 vaginal cuff dehiscence를 예방하기 위해 환자에게 교육할 내용으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "5kg 이상의 무거운 물건을 들지 않도록 한다"}, {"letter": "B", "text": "수술 후 2주간 절대 침상 안정을 취하도록 한다"}, {"letter": "C", "text": "소량의 질 출혈은 자연적으로 지혈되므로 경과 관찰한다"}, {"letter": "D", "text": "수술 후 일주일부터 가벼운 조깅을 시작하도록 권장한다"}, {"letter": "E", "text": "배변 시 힘주는 것이 오히려 회복에 도움이 된다고 설명한다"}], "answer": "B", "explanation": "전자궁절제술 후 vaginal cuff dehiscence를 예방하기 위해서는 복압을 상승시키는 행위를 피해야 하므로, '5kg 이상의 무거운 물건을 들지 않도록 한다'는 교육이 적절합니다. 또한 변비 예방과 출혈 시 즉시 병원 방문을 교육합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 146}, {"question": "다음 환자 중 colpocleisis (질폐쇄술)의 가장 적절한 수술 대상자는?", "options": [{"letter": "A", "text": "78세 여성, 전자궁탈출증(procidentia), 배우자와 더 이상 성관계 원하지 않음에 동의"}, {"letter": "B", "text": "65세 여성, 복압성 요실금만 단독으로 존재하는 경우"}, {"letter": "C", "text": "50세 여성, 직장류와 심한 성교통 호소"}, {"letter": "D", "text": "40세 여성, stage 2 자궁탈출증, 향후 임신 계획 있음"}, {"letter": "E", "text": "55세 여성, 방광류와 변비, 성생활 유지 중이며 배우자 동의 없음"}], "answer": "A", "explanation": "Colpocleisis는 질을 폐쇄하는 수술로, 향후 성생활이 불필요하고 동의한 폐경기 이후 고령 여성에게 적합하다. 강의에서 '더 이상 월경도 없고, 분비물도 나오지 않으며, 애기도 낳을 일 없고, 남편과 성관계를 하지 않는다는 보장이 있다면 colpocleisis를 권한다'고 설명하였다. 첫 번째 환자는 가임력 보존이 필요하고, 두 번째 환자는 성생활 유지가 중요하며, 네 번째는 적응증이 아니고, 다섯 번째 환자는 성교통의 원인 해결이 우선이므로 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "골반장기탈출증에 대한 anterior colporrhaphy 및 posterior colporrhaphy 후 장기적으로 보고되는 재발률은 약 얼마인가?", "options": [{"letter": "A", "text": "35~50%"}, {"letter": "B", "text": "5~10%"}, {"letter": "C", "text": "80~95%"}, {"letter": "D", "text": "15~25%"}, {"letter": "E", "text": "60~75%"}], "answer": "A", "explanation": "강의에서 '재발율이 35%에서 50%예요'라고 직접 언급하였다. 이는 노화, 생활습관 지속 등으로 인해 수술 후에도 지지 조직 약화가 진행되기 때문이다. 다른 비율은 실제 통계와 맞지 않으며, 특히 5~25%는 지나치게 낮고 60% 이상은 과장된 수치이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 147}, {"question": "골반장기탈출증 수술 중 apical suspension (정상부 현수) 방법에 해당하지 않는 것은?", "options": [{"letter": "A", "text": "High uterosacral ligament suspension (고위 자궁천골인대 현수술)"}, {"letter": "B", "text": "Abdominal sacrocolpopexy (복식 천골질고정술)"}, {"letter": "C", "text": "Uterosacral ligament suspension (자궁천골인대 현수술)"}, {"letter": "D", "text": "Sacrospinous ligament fixation (천골가시인대 고정술)"}, {"letter": "E", "text": "Colpocleisis (질폐쇄술)"}], "answer": "E", "explanation": "Colpocleisis는 질 전벽과 후벽을 봉합하여 질을 폐쇄하는 수술로, 자궁이나 질 정상부를 원래 위치로 끌어올려 고정하는 현수(suspension) 개념과는 다르다. 나머지 수술들은 모두 인대나 mesh를 이용하여 정상부를 지지하는 현수술에 해당 ation": "임상 연구에서 폐경 여성에게 에스트로겐을 투여한 결과 알츠하이머병 위험을 증가시켰다. 따라서 에스트로겐 요법은 알츠하이머병 예방 목적으로 권장되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 149}, {"question": "52세 여자가 안면홍조, 야간발한, 불면증으로 병원에 왔다. 폐경 후 상태이며, 6개월 전 하지 정맥혈전증을 진단받았다. 갱년기 증상 완화를 위한 가장 적절한 치료는?", "options": [{"letter": "A", "text": "고용량 이소플라본 보충제"}, {"letter": "B", "text": "경구 에스트로겐-프로게스테론 병합요법"}, {"letter": "C", "text": "경피적 에스트로겐 단독요법"}, {"letter": "D", "text": "질 내 에스트로겐 크림"}, {"letter": "E", "text": "저용량 paroxetine"}], "answer": "E", "explanation": "Systemic hormone therapy (oral or transdermal) is relatively contraindicated in women with a history of venous thromboembolism. Topical estrogen is used only for vaginal symptoms. Paroxetine, an SSRI, is FDA-approved for vasomotor symptoms and is a safe non-hormonal alternative. Isoflavone supplements have limited evidence. Therefore, low-dose paroxetine is the most appropriate choice.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 150}, {"question": "다음 중 폐경 호르몬 치료의 절대적 금기증에 해당하지 않는 것은?", "options": [{"letter": "A", "text": "중증의 조절되지 않는 간질환"}, {"letter": "B", "text": "원인을 알 수 없는 자궁 출혈"}, {"letter": "C", "text": "에스트로겐 수용체 양성 유방암 병력"}, {"letter": "D", "text": "급성 심부정맥 혈전증"}, {"letter": "E", "text": "심한 편두통(migraine) 병력"}], "answer": "E", "explanation": "유방암 병력, 원인 불명의 자궁 출혈, 급성 혈전증, 중증 간질환은 모두 절대적 금기증이다. 편두통은 과거력이 있더라도 심하지 않다면 주의하여 사용할 수 있는 상대적 금기증에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 150}, {"question": "폐경 호르몬 치료 시 혈전색전증(thromboembolism) 위험을 최소화하기 위해 우선적으로 권장되는 투여 경로는?", "options": [{"letter": "A", "text": "피하 이식(implant)"}, {"letter": "B", "text": "근육 주사(intramuscular)"}, {"letter": "C", "text": "질내(vaginal) 제제"}, {"letter": "D", "text": "경구(oral) 제제"}, {"letter": "E", "text": "경피(transdermal) 패치"}], "answer": "E function buildQuiz() {
  if (IS_V2_SINGLE_SECTION) {
    buildQuizV2();
    return;
  }

  const col = document.getElementById('quiz-col');
  col.innerHTML = '';

  let globalQ = 0;
  SECTIONS.forEach((section, si) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'page-section';
    secDiv.dataset.si = si;

    // Section header (conditional)
    if (section.header) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = section.header;
      secDiv.appendChild(hdr);
    }

    // Inline slides for portrait (conditional)
    if (section.images && section.images.length > 0) {
      secDiv.appendChild(buildInlineSlides(section));
    }

    // Question card with prev/next navigation
    if (section.questions && section.questions.length > 0) {
      const card = buildQuestionCard(section, si, false);
      secDiv.appendChild(card);
    }

    // Key Content (conditional — multiple KCs rendered as separate boxes)
    if (section.keyContent) {
      const kcItems = section.keyContent.split('\n\n').filter(t => t.trim());
      kcItems.forEach((text, idx) => {
        const kcBox = document.createElement('div');
        kcBox.className = 'key-content-box';
        const label = kcItems.length > 1
          ? '📌 Key Content ' + (idx + 1) + '/' + kcItems.length
          : '📌 Key Content';
        kcBox.innerHTML = '<div class="key-content-label">' + label + '</div>' + text;
        secDiv.appendChild(kcBox);
      });
    }

    // totalmesh — show on first section only (lecture-wide MeSH position)
    if (si === 0 && section.totalmesh) {
      const tmBox = document.createElement('div');
      tmBox.className = 'mesh-overlay-box totalmesh-box';
      tmBox.innerHTML = '<div class="mesh-overlay-label">🏛️ 강의 위치 (MeSH)</div><pre class="mesh-overlay-text">' + section.totalmesh + '</pre>';
      secDiv.insertBefore(tmBox, secDiv.firstChild);
    }

    // chunkmesh — show per section (chunk-level MeSH position)
    if (section.chunkmesh) {
      const cmBox = document.createElement('div');
      cmBox.className = 'mesh-overlay-box chunkmesh-box';
      cmBox.innerHTML = '<div class="mesh-overlay-label">📍 Chunk 위치 (MeSH)</div><pre class="mesh-overlay-text">' + section.chunkmesh + '</pre>';
      secDiv.appendChild(cmBox);
    }

    col.appendChild(secDiv);
    globalQ += section.questions.length;
