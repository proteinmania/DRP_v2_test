": "월경 기간이 7일 이상 지속"}, {"letter": "D", "text": "월경 주기가 21일 미만"}, {"letter": "E", "text": "1회 월경당 출혈량이 100ml 초과"}], "answer": "A", "explanation": "강의에 따르면, 평균 월경량은 약 30ml이고 정상 상한선은 60ml이며, 80ml를 초과하는 경우 월경과다로 진단한다. 60ml는 정상 범위 내이며, 100ml는 중증을 나타낼 수 있으나 진단 기준은 80ml이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 29}, {"question": "25세 여성이 수개월간 불규칙한 자궁출혈로 내원하였다. 자궁내막 생검에서 비정형이 없는 단순 자궁내막증식증(simple endometrial hyperplasia without atypia)으로 진단되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "프로게스틴 요법"}, {"letter": "B", "text": "자궁절제술"}, {"letter": "C", "text": "자궁내막 소파술만 시행"}, {"letter": "D", "text": "고용량 에스트로겐 요법"}, {"letter": "E", "text": "GnRH 작용제"}], "answer": "A", "explanation": "비정형이 없는 자궁내막증식증은 에스트로겐 과다에 의한 양성 병변으로, 프로게스틴 요법으로 대부분 정상 자궁내막으로 호전된다. 자궁절제술은 비정형 증식증이나 약물 치료 실패 시 고려한다. 고용량 에스트로겐은 증식을 악화시킬 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 29}, {"question": "수정란의 자궁내막 착상이 주로 일어나는 시기는?", "options": [{"letter": "A", "text": "배란 후 3-5일"}, {"letter": "B", "text": "배란 후 15-20일"}, {"letter": "C", "text": "배란 후 11-14일"}, {"letter": "D", "text": "배란 후 1-2일"}, {"letter": "E", "text": "배란 후 6-10일"}], "answer": "E", "explanation": "‘배란 후 6-10일’이 옳다. 수정은 배란 후 12-24시간 내에 일어나며, 이후 접합자가 분열하며 자궁으로 이동하여 약 6-10일경 자궁내막에 착상한다. ‘배란 후 1-2일’은 너무 이르다. 이 시기에는 아직 난관 내에 있다. ‘배란 후 3-5일’은 상실배에서 포배로 발달하는 시기로 아직 자궁 도달 전일 수 있다. ‘배란 후 11-14일’은 이미 착상이 완료된 후이며, 월경 예정일 무렵이다. ‘배란 후 15-20일’은 훨씬 늦어 정상 임신에서는 가능하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 29}, {"question": "22세 여성이 최근 10kg 체중 증가 후 월경 주기가 3~4개월로 불규칙해지고, 지난 3주간 소량의 질출혈이 지속되어 내원하였다. 골반 초음파에서 자궁내막 두께가 18mm로 두꺼워져 있고, 자궁내막 흡인생검 결과 비정형성이 없는 단순 자궁내막 증식증으로 진단되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "전자궁절제술을 바로 시행한다"}, {"letter": "B", "text": "프로게스테론 제제를 주기적으로 투여한다"}, {"letter": "C sion)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "출생 시부터 관찰된다."}, {"letter": "B", "text": "선천성 기형의 일종이다."}, {"letter": "C", "text": "에스트로겐 과잉이 주요 원인이다."}, {"letter": "D", "text": "저에스트로겐 상태가 원인이며, 국소 에스트로겐 연고로 치료할 수 있다."}, {"letter": "E", "text": "주로 신생아기에 호발한다."}], "answer": "E", "explanation": "소음순 유착은 선천성이 아니며, 출생 후 모체 에스트로겐 감소로 인해 발생하는 후천적 질환입니다. 영아기에 주로 발생하며, 에스트로겐 연고 도포나 부드러운 분리로 치료합니다. 신생아기에는 발생하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 33}, {"question": "14세 여아가 주기적인 하복부 통증을 호소하나 아직 초경은 없다. 외음부 검사에서 처녀막이 부풀어 올라 있으며 푸르스름하게 보인다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "Transverse vaginal septum(횡질 중격)"}, {"letter": "B", "text": "Androgen insensitivity syndrome"}, {"letter": "C", "text": "Mayer-Rokitansky-Küster-Hauser(MRKH) 증후군"}, {"letter": "D", "text": "Longitudinal vaginal septum(종질 중격)"}, {"letter": "E", "text": "Imperforate hymen(처녀막 폐쇄증)"}], "answer": "E", "explanation": "처녀막 폐쇄증은 초경 이후 막힌 처녀막 때문에 생리혈이 배출되지 못해 자궁 및 질 내에 혈종(hematocolpos, hematometra)이 발생하고, 이로 인해 주기적인 하복통이 생긴다. 특징적으로 처녀막이 팽대되어 푸르스름하게 관찰된다. MRKH 증후군은 자궁이 없어 통증이 없고, androgen insensitivity syndrome도 자궁이 없으며 질은 맹관 형태이다. Transverse vaginal septum은 처녀막이 정상으로 보일 수 있고 팽대가 뚜렷하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "14세 여아가 초경이 없고 주기적인 하복통을 호소한다. 외음부 검사에서 처녀막이 부풀어 올라 있으며 푸르스름하게 보인다. 적절한 처치는?", "options": [{"letter": "A", "text": "에스트로겐 크림 도포"}, {"letter": "B", "text": "경과 관찰"}, {"letter": "C", "text": "복강경 생식샘 절제"}, {"letter": "D", "text": "처녀막 절개술"}, {"letter": "E", "text": "질 확장술"}], "answer": "D", "explanation": "처녀막 폐쇄로 인한 질혈종(hematocolpos)이 의심되므로, 외과적으로 처녀막 절개술을 시행하여 폐쇄를 해소하고 축적된 경혈을 배출해야 한다. 경과 관찰이나 에스트로겐 크림은 치료 효과가 없고, 질 확장술은 폐쇄가 두꺼운 경우 불충분하다. 복강경 생식샘 절제는 성선이형성증 등의 다른 상황에서 적용된다. 따라서 처녀막 절개술이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "15세 여아가 초경이 없고 매달 반복되는 하복통을 호소한다. 외음부 검사에서 처녀막은 정상이고, Valsalva maneuver에서도 돌출이 없다. 골반 초음파에서 질 중간부에 두꺼운 막이 관찰되고, 그 위로 혈종이 차 있다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "Androgen insensitivity syndrome"}, {"letter": "B", "text": "Imperforate hymen"}, {"letter": "C", "text": "Longitudinal vaginal septum"}, {"letter": "D", "text": "MRKH syndrome"}, {"letter": "E", "text": "Transverse vaginal septum"}], "answer": "B", "explanation": "외음부 검사에서 처녀막 돌출이 없고, 질 내 격벽이 확인되므로 횡질중격(transverse vaginal septum)이 의심됩니다. Imperforate hymen은 처녀막이 부풀어 오르는 소견이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "12세 여아가 3개월간의 주기적 하복통을 호소하지만 초경은 없었다. 외음부 검사에서 청색으로 팽대된 막이 질 입구를 막고 있는 것이 관찰된다. 가장 적절한 즉시 처치는?", "options": [{"letter": "A", "text": "진단적 복강경술"}, {"letter": "B", "text": "자궁경을 이용한 처녀막절제술"}, {"letter": "C", "text": "경구 피임제 투여"}, {"letter": "D", "text": "십자절개를 통한 처녀막절개술"}, {"letter": "E", "text": "질 확장기 사용"}], "answer": "D", "explanation": "처녀막폐쇄증(imperforate hymen)은 질 입구를 막아 생리혈이 고여 혈류(hydrocolpos/hematocolpos)를 형성하고 주기적 통증을 유발한다. 고전적 치료는 십자절개(cruciate incision)를 통해 막을 열어 고인 혈액을 배출시키는 처녀막절개술(hymenotomy)이다. 최근에는 원형 절제 후 봉합하기도 하지만 시험적 정답은 십자절개이다. 자궁경적 절제, 복강경, 호르몬 억제, 질 확장기는 이 상황에 적용되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "14세 여아가 초경 없이 주기적인 하복통으로 내원하였다. 외음부 검사에서 처녀막은 정상이나 질 상부에서 압통과 팽만감을 보이는 종괴가 촉지된다. 복부 초음파에서 질 상부와 자궁강 내 액체 저류 소견을 보인다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Transverse vaginal septum"}, {"letter": "B", "text": "Cervical agenesis"}, {"letter": "C", "text": "Müllerian agenesis"}, {"letter": "D", "text": "Longitudinal vaginal septum"}, {"letter": "E", "text": "Imperforate hymen"}], "answer": "A", "explanation": "처녀막은 정상이고 질 상부에 종괴가 있으며 월경혈이 질과 자궁에 저류되는 소견은 transverse vaginal septum에 합당합니다. Imperforate hymen은 외음부에서 처녀막이 청색으로 돌출됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "15세 여아가 한 번도 생리를 하지 않았으나 최근 수개월간 주기적인 하복부 통증을 호소한다. 신체검사에서 유방 발달은 정상 범위이며, 회음부 검사에서 돌출된 막이 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Asherman syndrome"}, {"letter": "B", "text": "Androgen insensitivity syndrome"}, {"letter": "C", "text": "PCOS"}, {"letter": "D", "text": "Imperforate hymen"}, {"letter": "E", "text": "Müllerian agenesis"}], "answer": "D", "explanation": "Imperforate hymen은 outflow obstruction의 일종으로, 난소 기능이 정상이므로 2차 성징은 정상 발현되나 월경혈이 배출되지 못해 주기적 복통과 팽창된 질 및 돌출 처녀막이 관찰된다. 'Müllerian agenesis'는 자궁 자체가 없으므로 주기적 통증이 드물고, 'Asherman syndrome'은 자궁내 유착으로 2차적 무월경이 주로 발생한다. 'PCOS'는 무배란성 희발월경을 유발하며 outflow obstruction은 아니다. 'Androgen insensitivity syndrome'은 자궁 부재와 음모 감소가 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "15세 여아가 초경 없이 반복적인 하복통을 호소한다. 유방 발달은 Tanner 4단계이며, 골반 진찰에서 푸른색으로 팽창된 질 입구가 관찰되고 Valsalva maneuver 시 더욱 돌출된다. 초음파에서 질 내 액체 저류가 확인된다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "십자형 절개술"}, {"letter": "B", "text": "질 확장기 사용"}, {"letter": "C", "text": "자궁경 유착 박리술"}, {"letter": "D", "text": "질성형술"}, {"letter": "E", "text": "경구 피임약 투여"}], "answer": "A", "explanation": "Imperforate hymen은 처녀막이 완전히 막혀 생리혈이 질 내에 저류되는 질환으로, 십자형 절개(cruciate incision)를 통해 막을 뚫어주는 수술적 치료가 필요하다. 강의에서도 '십자형 incision을 가해서 구멍을 뚫어주는 것'으로 설명되었다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "16세 여성이 원발성 무월경과 주기적인 하복통을 호소한다. 유방 발달은 정상이고, 골반 초음파에서 자궁과 난소는 정상이다. 신체검사에서 질 입구에 얇은 막이 팽대되어 보인다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "뮐러관 무발생"}, {"letter": "B", "text": "질 중격"}, {"letter": "C", "text": "처녀막 폐쇄"}, {"letter": "D", "text": "자궁경부 협착"}, {"letter": "E", "text": "안드로겐 불응성 증후군"}], "answer": "C", "explanation": "원발성 무월경과 주기적 복통을 호소하고 질 입구에 팽대된 막이 관찰되면 처녀막 폐쇄(imperforate hymen)가 의심된다. 이는 수술적 처녀막 절개술로 치료하며, 즉시 증상이 해소된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "생후 18개월 남아가 무통성 왼쪽 음낭 부종으로 내원하였다. 신체검진에서 투과조명검사(transillumination)에 빛이 통과하고, 고환은 만져지지 않았다. 초음파에서 교통성 수신증(communicating hydrocele)으로 진단되었다. 수술적 치료 시 결찰해야 하는 가장 중요한 구조물은?", "options": [{"letter": "A", "text": "서혜인대(inguinal ligament)"}, {"letter": "B", "text": "초상돌기(processus vaginalis)"}, {"letter": "C", "text": "고환인대(gubernaculum)"}, {"letter": "D", "text": "정삭(spermatic cord)"}, {"letter": "E", "text": "고환초(tunica vaginalis)"}], "answer": "B", "explanation": "교통성 수신증은 초상돌기(processus vaginalis)의 개존으로 인해 복수와 교통이 이루어지는 상태이다. 따라서 수술 시 개존된 초상돌기를 고위 결찰(high ligation)하는 것이 중요하다. 고환초를 결찰하는 것은 아니며, 정삭 구조물을 함께 결찰하지 않도록 주의한다. 서혜인대나 고환인대는 교통성 수신증의 주된 원인이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 36}, {"question": "선천성 자궁 기형 중 가장 높은 빈도를 차지하는 것은?", "options": [{"letter": "A", "text": "쌍각자궁(bicornuate uterus)"}, {"letter": "B", "text": "공상자궁(arcuate uterus)"}, {"letter": "C", "text": "단각자궁(unicornuate uterus)"}, {"letter": "D", "text": "중복자궁(didelphys uterus)"}, {"letter": "E", "text": "중격자궁(septate uterus)"}], "answer": "E", "explanation": "자궁 기형 중 가장 흔한 것은 중격자궁(septate uterus)이며, 그 다음이 쌍각자궁(bicornuate), 공상자궁(arcuate), 단각자궁(unicornuate), 중복자궁(didelphys) 순이다. 중격자궁은 반복 유산의 주요 원인이 되므로 임상적 중요성이 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "32세 여성이 3회의 1삼분기 유산 병력이 있다. MRI에서 자궁강을 거의 완전히 나누는 중격(septum)이 발견되었다. 유산 위험을 낮추기 위한 가장 효과적인 치료는?", "options": [{"letter": "A", "text": "초기 임신 중 프로게스테론 보충"}, {"letter": "B", "text": "12주에 자궁경관 원형결찰술(cerclage)"}, {"letter": "C", "text": "자궁경하 중격절제술(hysteroscopic septoplasty)"}, {"letter": "D", "text": "착상 전 유전검사를 동반한 시험관아기"}, {"letter": "E", "text": "복강경하 자궁성형술(metroplasty)"}], "answer": "C", "explanation": "중격자궁은 중격 부위의 혈류 부족으로 착상 실패와 조기 유산을 유발한다. 치료는 자궁경을 이용하여 중격을 절제하는 중격절제술(septoplasty)로, 정상 자궁강을 만들어 유산율을 낮춘다. Metroplasty는 쌍각자궁에서 고려되며, 프로게스테론, cerclage는 효과가 없고, 시험관아기도 기형을 교정하지 않으면 유산 위험이 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "28세 여성의 자궁난관조영술(HSG)에서 두 개의 자궁강이 넓은 각도로 분리되어 보인다. 쌍각자궁과 중격자궁을 감별하기 위해 다음으로 가장 적합한 검사는?", "options": [{"letter": "A", "text": "진단적 자궁경술"}, {"letter": "B", "text": "일반 질식 초음파"}, {"letter": "C", "text": "추가적인 다른 기법의 HSG"}, {"letter": "D", "text": "골반 MRI"}, {"letter": "E", "text": "식염수 주입 초음파(SIS)"}], "answer": "D", "explanation": "쌍각자궁은 자궁바닥(fundus)이 1 cm 이상 깊게 함몰된 외형을 보이는 반면, 중격자궁은 외형이 정상이거나 약간만 함몰된다. HSG나 자궁경은 내부 형태만 보여주므로 외부 윤곽을 평가하려면 MRI나 3D 초음파가 필요하다. MRI는 자궁의 장막면 함몰 정도를 명확히 보여주어 감별에 가장 적합하다. 복강경도 확진 가능하나 비침습적으로 MRI가 우선된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "쌍각자궁으로 반복 유산을 경험한 30세 여성이 자궁성형술(metroplasty)을 고려 중이다. 수술 전 상담 시 반드시 언급해야 할 주요 합병증은?", "options": [{"letter": "A", "text": "자궁내막 유착"}, {"letter": "B", "text": "차후 임신 시 자궁파열"}, {"letter": "C", "text": "월경 과다"}, {"letter": "D", "text": "만성 골반통"}, {"letter": "E", "text": "수술 후 불임"}], "answer": "B", "explanation": "쌍각자궁 성형술은 절제된 자궁벽이 약해져 차후 임신 중 자궁파열의 위험을 높이므로, 환자에게 이에 대한 충분한 설명과 동의가 필요합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "다음 중 자궁 기형 중 일반적으로 산과적 합병증을 유발하지 않아 정상 변이로 간주되는 것은?", "options": [{"letter": "A", "text": "중격자궁"}, {"letter": "B", "text": "중복자궁"}, {"letter": "C", "text": "공상자궁"}, {"letter": "D", "text": "쌍각자궁"}, {"letter": "E", "text": "단각자궁"}], "answer": "C", "explanation": "공상자궁(arcuate uterus)은 자궁저의 경미한 함몰만 있으며 임신 결과에 부정적 영향을 미치지 않아 정상 변이로 분류됩니다. 중격자궁, 쌍각자궁 등은 유산, 조산 등의 위험이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "임신 32주인 30세 미분만부가 5분 간격의 규칙적인 자궁수축을 주소로 내원하였다. 자궁목은 2cm 개대, 80% 소실되었으며, 니트라진 검사는 음성이다. 태아는 둔위이고, 양수지수는 10 cm이다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "옥시토신 정주"}, {"letter": "B", "text": "베타메타손 근육주사"}, {"letter": "C", "text": "질분만"}, {"letter": "D", "text": "황산마그네슘 정주"}, {"letter": "E", "text": "제왕절개술"}], "answer": "B", "explanation": "At 32 weeks gestation with preterm labor and cervical changes, administration of corticosteroids (betamethasone) to accelerate fetal lung maturity is indicated. While magnesium sulfate may be used for neuroprotection if delivery is imminent, the initial priority is corticosteroid therapy. Tocolysis may be considered to delay delivery for the corticosteroids to take effect. Oxytocin is contraindicated, and delivery (vaginal or cesarean) is not the immediate management before fetal lung maturation is addressed.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "질식 자궁절제술(vaginal hysterectomy)이 복식 자궁절제술(abdominal hysterectomy)에 비해 갖는 장점으로 옳은 것은?", "options": [{"letter": "A", "text": "큰 자궁근종의 안전한 제거가 가능하다."}, {"letter": "B", "text": "환자의 임신 능력을 보존할 수 있다."}, {"letter": "C", "text": "방광 손상 위험이 복식 접근법보다 낮다."}, {"letter": "D", "text": "수술 후 통증이 적고 회복이 빠르다."}, {"letter": "E", "text": "난소 종양 평가에 적합한 접근법이다."}], "answer": "E", "explanation": "질식 자궁절제술은 복부 절개가 없으므로 수술 후 통증이 적고 회복이 빨라 입원 기간이 짧다. 큰 자궁근종이나 난소 종양의 평가가 필요한 경우에는 복식 접근이 선호되며, 자궁절제술은 임신 능력을 제거한다. 방광 손상의 위험은 질식 접근에서 더 높을 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "다음 중 고전적 제왕절개술(classical cesarean section)을 시행해야 하는 가장 적절한 적응증은?", "options": [{"letter": "A", "text": "제왕절개 후 자궁근종 절제술을 동시에 시행하려는 경우"}, {"letter": "B", "text": "임신 28주의 미숙아로 자궁 하절부가 형성되지 않은 경우"}, {"letter": "C", "text": "이전에 저위 횡절개 제왕절개를 2회 시행한 산모"}, {"letter": "D", "text": "태아가 두위이고 분만 진통이 진행 중인 경우"}, {"letter": "E", "text": "산모의 요청에 의한 선택적 제왕절개인 경우"}], "answer": "D", "explanation": "고전적 제왕절개술은 자궁 체부에 수직 절개를 가하는 방법으로, 자궁 하절부가 충분히 형성되지 않은 극소 저출생 체중아 분만이나 전치 태반, 횡위 등의 경우에 시행될 수 있다. 특히 28주 이전인 경우 하절부가 얇고 발달되지 않아 고전적 절개가 필요할 수 있다. 다른 상황에서는 저위 횡절개가 일반적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "다음 중 자궁경 수술(hysteroscopy)의 절대적 금기에 해당하는 경우는?", "options": [{"letter": "A", "text": "중격자궁(septate uterus)"}, {"letter": "B", "text": "자궁내 유착(intrauterine adhesion)"}, {"letter": "C", "text": "임신 6주"}, {"letter": "D", "text": "점막하 근종(submucosal myoma) Type 0"}, {"letter": "E", "text": "자궁내막 용종(endometrial polyp)"}], "answer": "C", "explanation": "임신 6주는 hysteroscopy의 절대적 금기입니다. 강의에서 '임신이면 당연히 시행하면 안 된다'고 강조했습니다. 자궁내막 용종, 점막하 근종, 자궁내 유착, 중격자궁은 hysteroscopy의 진단 및 치료적 적응증에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 39}, {"question": "성 결정에 가장 중요한 역할을 하는 SRY 유전자는 Y chromosome의 어느 부위에 위치하는가?", "options": [{"letter": "A", "text": "Heterochromatin region"}, {"letter": "B", "text": "Pseudoautosomal region"}, {"letter": "C", "text": "Centromere"}, {"letter": "D", "text": "Long arm (q arm)"}, {"letter": "E", "text": "Short arm (p arm)"}], "answer": "E", "explanation": "SRY 유전자는 Y chromosome의 short arm(p arm)에 위치한다. 강의에서 'SRY gene은 Y chromosome의 long arm과 short arm 중에 짧은 쪽 short arm에 있습니다'라고 설명하였다. Long arm이나 centromere 등 다른 부위는 SRY의 위치가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 일차성 무월경을 주소로 내원하였다. 신체검사에서 유방 발달과 음모는 정상이고, 외음부에 짧은 맹관(blind pouch) 질이 관찰된다. 초음파에서 자궁과 나팔관이 보이지 않으며 난소는 정상적으로 관찰된다. 핵형 분석 결과 46,XX이다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "질 확장술 또는 수술적 질 재건"}, {"letter": "B", "text": "양측 고환 절제술 후 에스트로겐 투여"}, {"letter": "C", "text": "GnRH agonist 주사"}, {"letter": "D", "text": "항안드로겐 치료"}, {"letter": "E", "text": "에스트로겐-프로게스테론 주기 요법"}], "answer": "A", "explanation": "이 환자는 전형적인 MRKH 증후군으로, 46XX 핵형, 정상 난소 기능(정상 유방 발달), 자궁과 나팔관 부재, 짧은 질을 특징으로 한다. 난소가 정상이므로 호르몬 치료는 필요 없으며, 주된 치료는 질을 길게 하여 성생활을 가능하게 하는 것으로, 질 확장기 사용이나 McIndoe 수술과 같은 재건술이 적응증이다. 고환 절제술은 androgen insensitivity(46XY)에서 시행하며, GnRH agonist나 항안드로겐은 도움이 되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "18세 여성이 일차성 무월경을 주소로 내원하였다. 신체검사에서 유방 발달은 정상이나 액와부와 음모가 거의 없다. 외음부는 여성형이나 짧은 맹관이 있고, 내진상 자궁은 촉지되지 않는다. 혈중 testosterone이 정상 남성 수준으로 상승되어 있다. 이 환자에서 향후 시행해야 할 가장 중요한 조치는?", "options": [{"letter": "A", "text": "즉시 양측 고환 절제술"}, {"letter": "B", "text": "항안드로겐 치료"}, {"letter": "C", "text": "에스트로겐 투여로 자궁 발달 유도"}, {"letter": "D", "text": "주기적 프로게스테론 투여"}, {"letter": "E", "text": "사춘기 이후에 양측 고환 절제술 후 에스트로겐 대체 요법"}], "answer": "E", "explanation": "완전형 안드로겐 불감성 증후군(complete androgen insensitivity syndrome, CAIS)은 46XY, 여성 표현형, 무모증, 자궁 부재, 높은 testosterone을 특징으로 한다. 복강 내 고환은 20대 이후 생식세포종(gonadoblastoma) 위험이 높아 사춘기 이후 절제해야 하며, 그 후 여성 호르몬(에스트로겐) 대체 요법을 시작한다. 즉시 절제는 사춘기 발달을 저해하므로 권장되지 않으며, 에스트로겐 투여로 자궁이 생기지 않는다. 프로게스테론이나 항안드로겐은 일차 치료가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여자가 초경이 없어 내원하였다. 유방 발달은 Tanner 1기, 음모 발달은 Tanner 3기이며, 외음부는 정상이다. 골반초음파에서 자궁과 난소가 작게 관찰된다. 혈액검사: TSH 2.4 mIU/L, prolactin 12 ng/mL, FSH 70 mIU/mL, LH 50 mIU/mL, estradiol 8 pg/mL. 핵형은 46,XX이다. 적절한 처치는?", "options": [{"letter": "A", "text": "뇌하수체 MRI 촬영"}, {"letter": "B", "text": "인공수정"}, {"letter": "C", "text": "에스트로겐-프로게스테론 순차 요법"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "복강경 생식샘 절제"}], "answer": "C", "explanation": "이 환자는 높은 FSH와 LH, 낮은 estradiol, 정상 핵형을 보여 난소기능부전에 의한 원발성 무월경(hypergonadotropic hypogonadism)으로 진단된다. 이차성징 유도와 뼈 건강 유지를 위해 에스트로겐-프로게스테론 순차 요법으로 호르몬 대체를 시작해야 한다. 경과 관찰은 호르몬 결핍을 해결하지 못하며, 복강경 생식샘 절제는 Y 염색체가 있는 경우 적용한다. 인공수정은 불가능하고, 뇌하수체 MRI는 성선자극호르몬이 낮을 때 시행한다. 따라서 에스트로겐-프로게스테론 순차 요법이 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "18세의 표현형 여성이 원발성 무월경과 목소리 굵어짐, 체모 증가를 주소로 내원하였다. 음핵비대가 있고 질은 맹낭이다. 서혜부에서 고환이 촉지된다. 핵형은 46,XY, 혈중 테스토스테론은 700 ng/dL로 높고, 디하이드로테스토스테론(DHT)은 8 ng/dL로 낮다. 이 환자의 성선(고환)에 대한 가장 적절한 처치는?", "options": [{"letter": "A", "text": "일측만 성선절제술"}, {"letter": "B", "text": "성선절제술은 필요 없음"}, {"letter": "C", "text": "성선 생검 후 주기적 감시"}, {"letter": "D", "text": "즉시 양측 성선절제술"}, {"letter": "E", "text": "사춘기 이후 양측 성선절제술"}], "answer": "D", "explanation": "5α-리덕타제 결핍증은 테스토스테론이 DHT로 전환되지 못해 외성기 남성화가 불완전하다. 사춘기에 남은 테스토스테론에 의해 남성화가 진행되므로, 여성으로 성 정체성이 확립된 경우 진단 즉시 성선절제술을 시행한다. 또한 고환아세포종(gonadoblastoma) 위험도 높기 때문이다. AIS에서는 사춘기 후 절제가 가능하지만(내인성 에스트로겐으로 유방 발달을 위해), 5α-리덕타제 결핍은 즉시 절제가 원칙이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여아가 저신장(키 132 cm, 3백분위 미만)과 사춘기 지연으로 내원하였다. 익상경(물갈퀴 목), 방패형 가슴, 양쪽 유두 간격이 넓다. 초경은 아직 없다. 이 환자에서 동반될 가능성이 가장 높은 심장 기형은?", "options": [{"letter": "A", "text": "심실 중격 결손(Ventricular septal defect)"}, {"letter": "B", "text": "대동맥 협착증(Coarctation of the aorta)"}, {"letter": "C", "text": "팔로 사징증(Tetralogy of Fallot)"}, {"letter": "D", "text": "동맥관 개존증(Patent ductus arteriosus)"}, {"letter": "E", "text": "폐동맥 판막 협착(Pulmonary valve stenosis)"}], "answer": "B", "explanation": "터너 증후군(45,X)은 저신장, 익상경, 방패형 가슴, 외반주(cubitus valgus), 림프부종 등의 특징과 함께 약 30%에서 대동맥 협착증이나 이첨판 대동맥 판막(bicuspid aortic valve)이 동반된다. 신장 기형(마제신)도 흔하다. 다른 심장 기형들은 터너 증후군의 주요 심장 기형으로 꼽히지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "20세 여성이 원발성 무월경으로 내원하였다. 유방 발달이 없고 음모는 드문드문하다. 초음파에서 작은 자궁과 흔적 성선(streak gonads)이 관찰된다. 혈중 FSH가 90 IU/L로 현저히 높고, 핵형은 46,XY이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "뮐러관 무발생(MRKH 증후군)"}, {"letter": "B", "text": "선천성 부신 과형성증(CAH)"}, {"letter": "C", "text": "스와이어 증후군(Swyer syndrome, 46,XY 성선발달장애)"}, {"letter": "D", "text": "완전형 안드로겐 불응 증후군(AIS)"}, {"letter": "E", "text": "5α-리덕타제 결핍증"}], "answer": "C", "explanation": "스와이어 증후군은 46,XY 핵형에도 불구하고 성선이 발달하지 않아 테스토스테론과 항뮐러관호르몬(AMH)이 모두 분비되지 않는다. AMH가 없으므로 뮐러관이 잔존하여 자궁과 상부 질이 존재한다. 에스트로겐이 낮아 유방 발달이 없고, 성선의 음성 피드백이 없어 FSH가 매우 높다. MRKH는 46,XX이고 난소 기능은 정상이다. AIS는 자궁이 없고 테스토스테론은 정상이다. 5α-리덕타제 결핍은 DHT가 낮고, CAH는 46,XX이며 남성화를 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 Tanner 1단계이나 음모는 Tanner 3단계이며, 외음부는 정상이다. 골반 초음파에서 자궁은 있으나 작고, 난소는 보이지 않는다. 혈액 검사: FSH 60 mIU/mL (참고치 3-20), LH 45 mIU/mL (참고치 2-15), estradiol 15 pg/mL (참고치 30-200). 핵형은 46,XX이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Complete androgen insensitivity syndrome"}, {"letter": "B", "text": "Turner syndrome"}, {"letter": "C", "text": "Hypogonadotropic hypogonadism"}, {"letter": "D", "text": "Swyer syndrome"}, {"letter": "E", "text": "46,XX primary ovarian insufficiency"}], "answer": "E", "explanation": "46,XX primary ovarian insufficiency (원발성 난소부전)는 46,XX 핵형에서 난소의 조기 소실로 인해 높은 FSH, 낮은 estradiol, 사춘기 발달 장애가 나타난다. Turner syndrome은 전형적으로 45,X이며 웹목, 방패가슴 같은 특징이 있다. Swyer syndrome은 46,XY로 조기 성선제거술이 필요하다. Complete androgen insensitivity syndrome은 46,XY이며 유방 발달이 있고 자궁이 없다. Hypogonadotropic hypogonadism은 낮은 FSH, LH를 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 Tanner 1단계, 음모는 Tanner 2단계로 미약하다. 골반 초음파에서 자궁과 난소가 작지만 정상 형태로 관찰된다. 혈액 검사: FSH 0.3 mIU/mL (참고치 3-20), LH 0.1 mIU/mL (참고치 2-15), estradiol 12 pg/mL (참고치 30-200). 프로락틴과 갑상선 기능은 정상이다. 핵형은 46,XX이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Hypogonadotropic hypogonadism"}, {"letter": "B", "text": "Complete androgen insensitivity syndrome"}, {"letter": "C", "text": "46,XX primary ovarian insufficiency"}, {"letter": "D", "text": "Turner syndrome (mosaic)"}, {"letter": "E", "text": "Constitutional delay of growth and puberty"}], "answer": "A", "explanation": "Hypogonadotropic hypogonadism (저생식샘자극호르몬 성선저하증)은 시상하부-뇌하수체 기능 저하로 인해 FSH, LH가 낮고 이차 성징이 발달하지 않는다. 46,XX primary ovarian insufficiency는 높은 FSH를 보인다. Turner syndrome은 전형적인 신체 특징이 동반되고, Complete androgen insensitivity syndrome은 46,XY에 유방 발달이 있다. Constitutional delay는 성장과 사춘기가 지연되지만 점진적 발달을 보이며 이 환자는 17세에도 Tanner 1기로 병적 상태에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 성선발육이상(Swyer syndrome)으로 진단된 16세 여성에서 가장 적절한 다음 단계는?", "options": [{"letter": "A", "text": "자궁 절제술"}, {"letter": "B", "text": "에스트로겐 투여 시작"}, {"letter": "C", "text": "성장호르몬 투여"}, {"letter": "D", "text": "성선 절제술 시행"}, {"letter": "E", "text": "정기적 추적 관찰"}], "answer": "D", "explanation": "Swyer 증후군은 Y 염색체 물질로 인해 성선아세포종 발생 위험이 높아 진단 즉시 예방적 성선 절제술이 필요하며, 이후 호르몬 대체 요법을 시행합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "전형적 21-hydroxylase 결핍증으로 진단된 신생아의 장기 치료로 가장 중요한 것은?", "options": [{"letter": "A", "text": "글루코코르티코이드와 염류코르티코이드 보충"}, {"letter": "B", "text": "에스트로겐 투여"}, {"letter": "C", "text": "무염식이"}, {"letter": "D", "text": "성선 절제술"}, {"letter": "E", "text": "성장호르몬 투여"}], "answer": "A", "explanation": "21-hydroxylase 결핍증은 코르티솔과 알도스테론 합성 장애를 초래하므로 글루코코르티코이드와 염류코르티코이드를 보충하여 부신 부전과 전해질 이상을 교정해야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 핵형을 가진 안드로겐 불응 증후군(AIS) 환자에서 성선 절제술의 가장 적절한 시기는?", "options": [{"letter": "A", "text": "사춘기 이전"}, {"letter": "B", "text": "진단 즉시"}, {"letter": "C", "text": "폐경 이후"}, {"letter": "D", "text": "20세 이후"}, {"letter": "E", "text": "사춘기 완료 후"}], "answer": "E", "explanation": "AIS 환자에서는 사춘기 동안 고환이 생성하는 에스트로겐이 유방 발달을 촉진하므로 성선 절제술은 2차 성징이 완료된 사춘기 이후로 지연합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "여성 사춘기에서 음모(pubic hair) 발달을 주도하는 호르몬의 주된 분비 기관은?", "options": [{"letter": "A", "text": "부신 (adrenal gland)"}, {"letter": "B", "text": "태반 (placenta)"}, {"letter": "C", "text": "뇌하수체 (pituitary gland)"}, {"letter": "D", "text": "난소 (ovary)"}, {"letter": "E", "text": "자궁 (uterus)"}], "answer": "A", "explanation": "‘부신 (adrenal gland)’이 옳다. 음모 발달(pubarche)은 주로 부신에서 분비되는 androgen에 의해 시작된다. 이를 adrenarche라고 하며, 난소의 estrogen과는 독립적으로 일어나므로 유방 발달과 다른 호르몬 축에 의해 조절된다. ‘난소’는 estrogen을 분비하여 유방 발달 등 다른 2차 성징에 관여하나 음모 발달의 주된 원인은 아니다. ‘뇌하수체’는 FSH, LH를 분비하여 난소 기능을 조절하지만, 직접 음모 발달에 관여하는 androgen을 분비하지는 않는다. ‘자궁’과 ‘태반’은 음모 발달과 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여자가 초경이 없어 내원하였다. Tanner stage: breast 1, pubic hair 2. 골반 ultrasound에서 자궁은 작고 양측 난소는 보이지 않는다. 혈액검사: FSH 0.3 mIU/mL (참고 3-20), LH 0.1 mIU/mL (2-15), estradiol <10 pg/mL (30-200), TSH, prolactin 정상. Karyotype 46,XX. GnRH agonist 자극검사에서 LH, FSH 상승 반응을 보였다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "Hypothalamic amenorrhea"}, {"letter": "B", "text": "Müllerian agenesis"}, {"letter": "C", "text": "Polycystic ovary syndrome"}, {"letter": "D", "text": "Complete androgen insensitivity syndrome"}, {"letter": "E", "text": "Ovarian insufficiency"}], "answer": "A", "explanation": "원발성 무월경과 성적 유치증(breast Tanner 1), 낮은 FSH/LH/estradiol, 46,XX 핵형을 보이며 GnRH 자극에 뇌하수체 반응(LH, FSH 상승)이 있으면 hypothalamic amenorrhea를 진단할 수 있다. Ovarian insufficiency는 FSH가 상승한다. Polycystic ovary syndrome은 유방 발달이 있고 LH가 정상이거나 상승한다. Complete androgen insensitivity syndrome은 46,XY이고 유방 발달이 있다. Müllerian agenesis는 난소 기능이 정상이다. 따라서 hypothalamic amenorrhea가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 무월경을 주소로 내원하였다. 신체검사에서 유방 발달은 Tanner stage 4이나, 음모는 관찰되지 않았다. 골반 초음파에서 자궁은 발견되지 않았고, 질은 맹관으로 끝나 있었다. 혈액 검사에서 FSH와 estradiol은 정상 범위였다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Kallmann syndrome"}, {"letter": "B", "text": "Müllerian agenesis"}, {"letter": "C", "text": "Swyer syndrome"}, {"letter": "D", "text": "Androgen insensitivity syndrome"}, {"letter": "E", "text": "Turner syndrome"}], "answer": "D", "explanation": "Androgen insensitivity syndrome (AIS)에서는 46,XY 핵형을 가지며, 안드로겐 수용체 기능 장애로 인해 외성기는 여성형, 유방은 발달하지만(안드로겐이 말초에서 에스트로겐으로 전환) 음모와 액모는 없거나 드물다. 자궁은 고환에서 분비되는 Anti-Müllerian hormone에 의해 발달하지 않는다. FSH와 estradiol은 정상일 수 있다. Müllerian agenesis도 자궁이 없으나 음모는 정상이며 46,XX 핵형이다. Turner syndrome과 Swyer syndrome은 FSH가 높고 에스트로겐이 낮다. Kallmann syndrome은 FSH가 낮고 유방 발달이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여아가 저신장과 원발성 무월경으로 병원에 왔다. 신체검사에서 경부에 익상경(webbed neck)이 관찰되고 유방 발달은 Tanner stage 1이었다. 혈액검사 결과 FSH는 현저히 증가되어 있었고 estradiol은 낮았다. 이 환자의 핵형(karyotype)으로 가장 가능성이 높은 것은?", "options": [{"letter": "A", "text": "47,XXX"}, {"letter": "B", "text": "46,XY"}, {"letter": "C", "text": "45,X0"}, {"letter": "D", "text": "46,XX/46,XY"}, {"letter": "E", "text": "46,XX"}], "answer": "C", "explanation": "Turner syndrome의 전형적인 핵형은 45,X0이며, 저신장, 익상경, 고gonadotropin성 저gonadism(FSH↑, estradiol↓)을 특징으로 한다. 46,XX는 정상 여성, 46,XY는 남성, 47,XXX는 삼중 X 증후군으로 대개 사춘기 발달이 정상이다. 46,XX/46,XY는 키메라로 이 증례와 맞지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성 표현형 환자가 원발성 무월경과 유방 발달 부족으로 내원하였다. 핵형은 46,XY이고, 골반 초음파에서 자궁은 없고 미발달된 성선(streak gonads)이 관찰되었다. FSH는 증가되어 있었다. 성선에 대해 가장 적절한 처치는?", "options": [{"letter": "A", "text": "GnRH agonist 투여"}, {"letter": "B", "text": "악성 종양 위험 때문에 성선 절제술"}, {"letter": "C", "text": "에스트로겐 투여 및 경과 관찰"}, {"letter": "D", "text": "테스토스테론 투여"}, {"letter": "E", "text": "초음파로 정기적 감시"}], "answer": "B", "explanation": "Swyer syndrome은 46,XY 완전 성선발생장애로, 미발달 성선(streak gonad)에 악성 종양(성선모세포종, 미분화세포종) 발생 위험이 높으므로 예방적 성선 절제술이 필수적이다. 여성화를 위해 에스트로겐 대체요법이 필요하지만 악성 위험을 해결하지 않는다. 초음파 감시만으로는 불충분하다. 테스토스테론은 여성 표현형에 부적절하며, GnRH agonist는 적응증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여성이 정상적인 유방과 음모 발달을 보였으나 초경이 없어 내원하였다. 골반 초음파에서 자궁이 관찰되지 않았고 양쪽 난소는 정상이었다. FSH와 estradiol은 정상 범위였다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Kallmann syndrome"}, {"letter": "B", "text": "Turner syndrome"}, {"letter": "C", "text": "Androgen insensitivity syndrome"}, {"letter": "D", "text": "Swyer syndrome"}, {"letter": "E", "text": "Müllerian agenesis"}], "answer": "E", "explanation": "Müllerian agenesis (MRKH syndrome)은 자궁과 상부 질의 선천적 결여, 정상 난소와 외성기, 정상 2차 성징을 특징으로 한다. FSH와 estradiol이 정상이다. AIS는 자궁이 없으나 음모가 없거나 드물고 핵형이 46,XY이다. Turner와 Swyer는 FSH가 높고 에스트로겐이 낮아 유방 발달이 없다. Kallmann은 FSH가 낮고 유방 발달이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "35세 여성이 10개월 동안 무월경을 호소하였다. 혈액 검사에서 FSH가 45 mIU/mL로 상승되어 있었고, estradiol은 낮았다. 1개월 후 재검사에서도 FSH 50 mIU/mL로 확인되었다. 환자는 안면 홍조나 질 건조감은 없었다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "시상하부성 무월경"}, {"letter": "B", "text": "다낭성 난소 증후군"}, {"letter": "C", "text": "자연 폐경 (Menopause)"}, {"letter": "D", "text": "조기 난소 부전 (Premature ovarian failure)"}, {"letter": "E", "text": "Asherman 증후군"}], "answer": "D", "explanation": "조기 난소 부전(POF)은 40세 이전에 FSH가 2회 이상(최소 1개월 간격) 상승하고 무월경이 발생하는 상태로, 35세는 이에 해당한다. 자연 폐경은 평균 50세 전후에 발생하며, 같은 호르몬 소견이지만 나이가 40세 이상일 때 진단한다. PCOS는 FSH가 정상이거나 낮다. 시상하부성 무월경은 FSH가 낮다. Asherman 증후군(자궁내 유착)은 대개 FSH가 정상이며 자궁내 시술 과거력이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 소녀가 저신장을 주소로 내원하였다. 키는 2백분위수, 체중은 35백분위수이며, 유방 발달은 태너 2기, 음모와 액모는 관찰되지 않는다. 골연령은 11세이다. 아버지는 10대에 키가 작았으나 현재 키는 177cm로 정상이다. 가장 적절한 관리는?", "options": [{"letter": "A", "text": "GnRH 작용제를 투여한다"}, {"letter": "B", "text": "성장호르몬 치료를 시작한다"}, {"letter": "C", "text": "경과 관찰과 재확신을 시행한다"}, {"letter": "D", "text": "저용량 에스트로겐을 투여한다"}, {"letter": "E", "text": "뇌 자기공명영상을 촬영한다"}], "answer": "D", "explanation": "가족력과 신체검사에서 전형적인 사춘기 지연-성장 지체(constitutional delay of growth and puberty)에 합당하며, 이 경우 특정 치료 없이 경과 관찰과 안심시키는 것이 적절하다. 아버지의 정상 키 도달은 좋은 예후 인자이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 무월경과 성장 지연으로 내원하였다. 신체검사에서 유방 발달은 Tanner 1이고 골연령은 11세이다. 혈액검사에서 FSH 1.5 mIU/mL, LH 1.0 mIU/mL, TSH 30 mIU/mL (상승), free T4 0.5 ng/dL (감소) 소견을 보였다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "브로모크립틴 투여"}, {"letter": "B", "text": "경과 관찰"}, {"letter": "C", "text": "GnRH 작용제 투여"}, {"letter": "D", "text": "갑상선 호르몬 투여"}, {"letter": "E", "text": "에스트로겐 투여"}], "answer": "D", "explanation": "원발성 갑상선 기능 저하증은 TRH 상승으로 인한 고프로락틴혈증 또는 직접적 영향으로 시상하부-뇌하수체-난소 축을 억제하여 지연 사춘기를 유발할 수 있다. 레보티록신 투여로 갑상선 기능을 정상화하면 사춘기 발달이 회복될 수 있다. 경과 관찰이나 성호르몬 투여는 원인 치료가 되지 않으며, GnRH 작용제는 성조숙증에 사용한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "3세 여아가 2개월 전부터 유방이 커지는 것을 주소로 내원하였다. 신체검사에서 유방 발달은 Tanner 2이나 음모는 없고, 성장 속도 및 골연령은 정상이다. 혈액 검사상 FSH, LH, estradiol 모두 정상 범위이다. 가장 적절한 관리는?", "options": [{"letter": "A", "text": "경과 관찰"}, {"letter": "B", "text": "뇌 MRI 촬영"}, {"letter": "C", "text": "GnRH 작용제 투여"}, {"letter": "D", "text": "난소 초음파 검사"}, {"letter": "E", "text": "성선 절제술"}], "answer": "A", "explanation": "이 증례는 단독 유방 조기 발달(isolated premature thelarche)의 전형적 예로, 보통 3세 이하에서 발생하며 다른 사춘기 징후가 동반되지 않고 성장 속도와 골연령이 정상이다. 이는 양성 상태로 저절로 퇴행하므로 경과 관찰이 적절하다. 뇌 MRI나 GnRH 작용제는 진성 성조숙증이 의심될 때, 난소 초음파는 말초성 원인 배제, 성선 절제술은 종양 시 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "20세 여성이 원발성 무월경과 유방 발달 부족으로 내원하였다. 혈액검사에서 FSH 60 mIU/mL (상승), estradiol 10 pg/mL (감소)이며, 핵형은 46,XX이다. 골반 초음파에서 난소는 보이지 않았다. 진단은?", "options": [{"letter": "A", "text": "다낭성 난소 증후군"}, {"letter": "B", "text": "순수 생식샘 발생이상 (pure gonadal dysgenesis)"}, {"letter": "C", "text": "터너 증후군"}, {"letter": "D", "text": "안드로겐 불감성 증후군"}, {"letter": "E", "text": "스와이어 증후군"}], "answer": "B", "explanation": "46,XX 순수 생식샘 발생이상은 정상 여성 핵형임에도 불구하고 생식샘이 흔적으로만 존재하여 고생식샘자극호르몬성 성선기능저하증을 나타낸다. 터너 증후군은 45,X0, 스와이어 증후군은 46,XY, 다낭성 난소 증후군은 정상적인 사춘기 발달과 에스트로겐 증가를 보이며, 안드로겐 불감성 증후군은 46,XY로 유방 발달이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "폐경 전 여성에서 무월경을 평가하기 위해 FSH, LH, estradiol을 측정한 결과 FSH와 LH는 높고 estradiol은 낮았다. 다음 중 가장 가능성이 높은 원인은?", "options": [{"letter": "A", "text": "뇌하수체 종양"}, {"letter": "B", "text": "프로락틴 분비 종양"}, {"letter": "C", "text": "난소 부전"}, {"letter": "D", "text": "갑상선 기능 저하증"}, {"letter": "E", "text": "시상하부 기능 저하"}], "answer": "C", "explanation": "FSH와 LH 상승, estradiol 저하는 난소 자체의 기능 부전을 의미하며, 이는 hypergonadotropic hypogonadism에 해당한다. 난소가 FSH에 반응하지 못해 estradiol이 낮고, negative feedback이 약화되어 gonadotropin이 상승한다. 시상하부 기능 저하나 뇌하수체 종양은 hypogonadotropic hypogonadism을 유발하여 FSH, LH가 낮게 측정된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 신장 145 cm, 체중 44 kg, 유방 발달 태너 1기, 음모 발달 태너 2기이다. 골반 초음파에서 작은 자궁과 띠 모양의 난소가 관찰되었으며, 혈액검사 결과 FSH 80 mIU/mL, LH 65 mIU/mL, 에스트라디올 8 pg/mL이었다. 진단을 위해 가장 필요한 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검"}, {"letter": "B", "text": "프로게스테론 부하 검사"}, {"letter": "C", "text": "에스트로겐 부하 검사"}, {"letter": "D", "text": "염색체 검사"}, {"letter": "E", "text": "뇌하수체 자기공명영상"}], "answer": "D", "explanation": "일차성 무월경과 과성선자극호르몬 성선기능저하증(매우 높은 FSH/LH, 낮은 에스트라디올), 저신장, 성적 유치증을 보이는 전형적인 터너증후군 의심 사례로, 진단을 위해 염색체 검사가 필수적이다. 뇌 영상은 성선자극호르몬 저하성 무월경의 검사이고, 자궁내막 생검이나 호르몬 부하 검사는 이미 난소 부전이 명확할 때 불필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "다음 중 FSH와 에스트라디올이 모두 높게 측정되는 경우는?", "options": [{"letter": "A", "text": "기능성 시상하부 무월경"}, {"letter": "B", "text": "조기 난소 부전"}, {"letter": "C", "text": "뇌하수체 FSH 분비 선종"}, {"letter": "D", "text": "다낭성 난소 증후군"}, {"letter": "E", "text": "시상하부 기능 부전"}], "answer": "D", "explanation": "FSH를 과잉 분비하는 뇌하수체 선종의 경우 FSH가 높고, 난소가 이에 반응하여 에스트라디올도 상승하게 됩니다. 반면 조기 난소 부전과 기능성 시상하부 무월경은 FSH가 높지만 에스트라디올은 낮으며, 시상하부 기능 부전은 FSH 자체가 낮고, PCOS에서는 LH가 주로 높고 FSH는 정상이거나 낮습니다. 따라서 정답은 '뇌하수체 FSH 분비 선종'입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 초경 이후 지속되는 과다 월경 출혈로 내원하였다. 어머니도 월경 과다의 병력이 있다. 혈소판 수 250,000/μL, PT 12.5초(참고치 11.0-13.5), APTT 42초(참고치 28-38), factor VIII 활성도 35%, von Willebrand factor antigen 30%, ristocetin cofactor activity 25%. 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "폰 빌레브란트병 (von Willebrand disease)"}, {"letter": "B", "text": "혈우병 A (hemophilia A)"}, {"letter": "C", "text": "혈우병 B (hemophilia B)"}, {"letter": "D", "text": "특발성 혈소판 감소성 자반증 (immune thrombocytopenic purpura)"}, {"letter": "E", "text": "글란츠만 혈소판 무력증 (Glanzmann thrombasthenia)"}], "answer": "A", "explanation": "APTT 연장, factor VIII 감소, VWF 항원 및 활성도 감소는 폰 빌레브란트병의 전형적인 검사 소견이다. 여성 환자에서 출혈 경향을 유발하는 유전성 질환으로 가장 흔하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "다음 중 난소 기능 부전(ovarian failure)을 시사하는 검사 소견은?", "options": [{"letter": "A", "text": "혈중 FSH 15 mIU/mL, estradiol 80 pg/mL"}, {"letter": "B", "text": "혈중 FSH 10 mIU/mL, estradiol 50 pg/mL"}, {"letter": "C", "text": "혈중 FSH 2 mIU/mL, estradiol 10 pg/mL"}, {"letter": "D", "text": "혈중 FSH 65 mIU/mL, estradiol 12 pg/mL"}, {"letter": "E", "text": "혈중 FSH 5 mIU/mL, estradiol 25 pg/mL"}], "answer": "D", "explanation": "난소 기능 부전(hypergonadotropic hypogonadism) 시에는 난소의 estrogen 생산 저하로 인해 뇌하수체로의 negative feedback이 소실되어 FSH가 폐경 수준(>40 mIU/mL)으로 상승하고 estradiol은 낮다(<20 pg/mL). 따라서 FSH 65/estradiol 12가 전형적이다. 나머지 선택지에서 FSH가 낮거나 정상 범위이면서 estradiol도 낮으면 시상하부-뇌하수체 원인(hypogonadotropic hypogonadism)을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "13세 여아가 저신장과 무월경을 주소로 내원하였다. 이학적 검사에서 익상경(webbed neck), 방순형 흉곽(shield chest)이 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Kallmann syndrome"}, {"letter": "B", "text": "PCOS"}, {"letter": "C", "text": "Turner syndrome"}, {"letter": "D", "text": "Noonan syndrome"}, {"letter": "E", "text": "Androgen insensitivity syndrome"}], "answer": "C", "explanation": "Turner syndrome은 45X 핵형이 가장 흔하며, 저신장, 익상경, 방순형 흉곽, 외반주 등의 신체적 특징과 성선 이형성(gonadal dysgenesis)으로 인한 원발성 무월경 및 조기 난소 부전이 나타난다. 'Noonan syndrome'은 유사한 체형을 보일 수 있으나 정상 핵형과 정상 생식 능력을 가지는 경우가 많다. 'PCOS'는 2차 성징이 정상적으로 발현된 후 희발월경을 보인다. 'Androgen insensitivity syndrome'은 46XY 핵형으로 자궁이 없고 유방 발달과 음모 감소를 특징으로 한다. 'Kallmann syndrome'은 무후각증을 동반한 저성선자극호르몬성 성선기능저하증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 무월경으로 내원하였다. 유방 발달은 있으나 음모가 거의 없고, 서혜부에서 종괴가 촉지된다. 골반 초음파에서 자궁이 관찰되지 않는다. 이 환자의 핵형으로 가장 가능성 있는 것은?", "options": [{"letter": "A", "text": "45X"}, {"letter": "B", "text": "47XXY"}, {"letter": "C", "text": "46XY"}, {"letter": "D", "text": "47XXX"}, {"letter": "E", "text": "46XX"}], "answer": "C", "explanation": "Androgen Insensitivity Syndrome(AIS)은 46XY 핵형을 가진 개체에서 androgen receptor의 기능 상실로 인해 말단 조직이 testosterone에 반응하지 못해 여성 표현형을 나타낸다. 자궁과 난소가 없고 고환이 서혜부 등에 존재하며, 음모는 거의 없고 유방은 androgen의 aromatization에 의한 estrogen 전환으로 일부 발달한다. '46XX'는 정상 여성 핵형, '45X'는 Turner syndrome, '47XXX'와 '47XXY'는 각각 triple X syndrome과 Klinefelter syndrome이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 초경이 없어 내원하였다. 유방 발달은 정상(Tanner 5)이고, 회음부 검사에서 질은 짧은 맹관 형태이며, 골반 초음파에서 자궁이 관찰되지 않지만 양측 난소는 정상이다. 핵형 검사 결과 46,XX이다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "터너 증후군 (Turner syndrome)"}, {"letter": "B", "text": "뮬러관 무형성증 (Müllerian agenesis / MRKH syndrome)"}, {"letter": "C", "text": "질 횡격막증 (Transverse vaginal septum)"}, {"letter": "D", "text": "안드로겐 불감성 증후군 (Androgen insensitivity syndrome)"}, {"letter": "E", "text": "쿨만 증후군 (Kallmann syndrome)"}], "answer": "B", "explanation": "46,XX 핵형, 정상 난소, 자궁 부재, 짧은 질은 MRKH 증후군의 전형적인 소견이다. 안드로겐 불감성 증후군(AIS)은 46,XY 핵형을 보이며, 터너 증후군은 저신장과 익상경, 난소 미발달이 특징이다. 질 횡격막증은 자궁이 정상이고 출구 폐쇄로 주기적 통증이 발생한다. 쿨만 증후군은 후각 저하와 저생식샘자극호르몬성 성선기능저하증을 보인다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "22세 여성이 6개월 동안 무월경을 호소한다. 임신 반응 검사는 음성이다. 혈액 검사 결과: FSH 2.5 mIU/mL, LH 1.8 mIU/mL, estradiol 15 pg/mL. 이 결과가 시사하는 병변의 가장 가능성 있는 위치는?", "options": [{"letter": "A", "text": "부신 (Adrenal gland)"}, {"letter": "B", "text": "자궁경부 (Cervix)"}, {"letter": "C", "text": "시상하부 또는 뇌하수체 (Hypothalamus or pituitary)"}, {"letter": "D", "text": "자궁내막 (Endometrium)"}, {"letter": "E", "text": "난소 (Ovary)"}], "answer": "C", "explanation": "낮은 FSH/LH와 낮은 estradiol은 시상하부-뇌하수체 축의 기능 저하를 시사하며, 이는 저생식샘자극호르몬성 성선기능저하증(hypogonadotropic hypogonadism)의 전형적인 소견이다. 난소 기능 부전의 경우 FSH가 상승하므로 이와 대비된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 초경이 없고 이차 성징 발현도 전혀 없다며 내원하였다. 가족력 조사 결과 어머니와 언니 모두 15~16세에 초경을 시작하였다. 신체 검진과 호르몬 검사는 모두 정상 범위이다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "시상하부 종양 (Hypothalamic tumor)"}, {"letter": "B", "text": "사춘기 지연 (Constitutional delay of puberty)"}, {"letter": "C", "text": "난소 부전 (Premature ovarian insufficiency)"}, {"letter": "D", "text": "뮬러관 무형성증 (Müllerian agenesis / MRKH syndrome)"}, {"letter": "E", "text": "터너 증후군 (Turner syndrome)"}], "answer": "B", "explanation": "가족력에서 사춘기 지연의 경향이 있고, 모든 검사가 정상인 경우 특발성 사춘기 지연(constitutional delay of puberty)으로 진단하며, 특별한 치료 없이 경과 관찰이 권장된다. 터너 증후군은 저신장과 특징적 기형을 동반하고, 난소 부전은 FSH가 상승한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "28세 여성이 6개월 무월경으로 방문하였다. 프로게스테론 부하검사(progesterone challenge test)를 시행하였으나 소퇴성 출혈(withdrawal bleeding)이 발생하지 않았다. 이 소견이 시사하는 것은?", "options": [{"letter": "A", "text": "난소의 다낭성 형태"}, {"letter": "B", "text": "불충분한 에스트로겐 자극으로 인한 자궁내막 증식 부족"}, {"letter": "C", "text": "프로게스테론 수용체 이상"}, {"letter": "D", "text": "시상하부 기능 부전"}, {"letter": "E", "text": "프로락틴분비 뇌하수체 선종"}], "answer": "B", "explanation": "프로게스테론 부하검사는 자궁내막이 에스트로겐에 의해 적절히 증식되었는지 평가하는 검사이다. 프로게스테론 투여 후 출혈이 없으면 에스트로겐 부족으로 자궁내막이 증식되지 않았거나(예: 저에스트로겐혈증) 유출로 폐쇄가 있음을 시사한다. 강의에서도 \"progesterone을 줘서 생리가 안 나온다면... estrogen이 분비가 되지 않는 상태\"라고 설명하였다. 따라서 직접적인 해석은 에스트로겐 자극 부족이다. 시상하부 기능 부전이나 프로락틴 선종은 저에스트로겐혈증의 원인이 될 수 있으나 검사 소견 자체의 직접적 의미는 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여아가 원발성 무월경과 유방 발달 부재로 내원하였다. 혈청 FSH가 85 mIU/mL로 상승되어 있다. 이 환자에서 핵형 분석(karyotyping)을 시행하는 주된 이유는?", "options": [{"letter": "A", "text": "터너 증후군 진단을 위해"}, {"letter": "B", "text": "클라인펠터 증후군 배제"}, {"letter": "C", "text": "안드로겐 불감성 증후군 확진"}, {"letter": "D", "text": "난소 기능 평가를 위해"}, {"letter": "E", "text": "Y 염색체 물질 확인 및 성선모세포종(gonadoblastoma) 위험 평가"}], "answer": "E", "explanation": "원발성 무월경과 에스트로겐 결핍(유방 발달 없음) + FSH 상승은 고성선자극호르몬성 성선기능저하증(난소 부전)을 의미한다. 강의에서 강조하였듯이, 이때 핵형 분석을 하는 주된 목적은 Y 염색체 물질의 존재 여부를 확인하여 성선모세포종 발생 위험을 평가하기 위함이다. Y 염색체가 있다면 성선 절제술이 필요하다. 터너 증후군 진단 자체보다 Y 염색체 검출이 치료 방침 결정에 더 중요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "18세 여성이 정상 유방 발달과 무월경을 주소로 내원하였다. 초음파에서 자궁이 없으며, 치모(pubic hair)가 관찰되지 않는다. 핵형 분석 결과는 46,XY이다. 진단은?", "options": [{"letter": "A", "text": "5-알파 환원효소 결핍증"}, {"letter": "B", "text": "뮐러관 무발생(MRKH) 증후군"}, {"letter": "C", "text": "안드로겐 불감성 증후군"}, {"letter": "D", "text": "순수 성선발육부전"}, {"letter": "E", "text": "터너 증후군"}], "answer": "C", "explanation": "완전 안드로겐 불감성 증후군(AIS)은 46,XY 핵형을 가지며, 안드로겐 수용체 이상으로 인해 외성기는 여성으로 발달하고 유방도 발달하지만, 자궁과 자궁관이 없고 치모도 결여된다. 강의에서 \"AIS에서는 치모가 없어요. Pubic hair가 없다\"고 하였다. MRKH는 46,XX에 자궁 무발생이지만 치모는 정상이다. 5-알파 환원효소 결핍증도 46,XY이나 외성기가 모호하고 치모가 있을 수 있다. 순수 성선발육부전은 자궁이 존재한다. 터너 증후군은 45,X이며 자궁이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여아가 유방 발달 없이 원발성 무월경으로 내원하였다. 혈청 FSH가 80 IU/L로 상승되어 있다. 다음으로 시행해야 할 검사는?", "options": [{"letter": "A", "text": "골반 초음파"}, {"letter": "B", "text": "뇌 자기공명영상"}, {"letter": "C", "text": "핵형 분석"}, {"letter": "D", "text": "혈청 프로락틴 측정"}, {"letter": "E", "text": "프로게스테론 부하검사"}], "answer": "C", "explanation": "유방 발달이 없는 원발성 무월경에서 FSH 상승은 고성선자극호르몬성 성선기능저하증(난소 부전)을 의미한다. 이 경우 반드시 핵형 분석을 시행하여 터너 증후군(45,X)이나 Y 염색체 보유 여부를 확인하여야 한다. 강의에서 \"유방발달이 없으면 혈중 FSH를 검사해서 FSH가 증가되어 있다면 ovarian failure이니까 핵형검사, chromosomal study가 필요한 것이고\"라고 하였다. 뇌 MRI는 FSH가 낮을 때, 프로락틴은 유즙 분비 등이 있을 때, 골반 초음파는 보조적 수단이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "무월경을 호소하는 24세 여성에서 GnRH 자극검사(GnRH stimulation test)를 시행한 결과, LH가 기저치에서 3배로 증가하였다. 이 결과가 시사하는 바는?", "options": [{"letter": "A", "text": "뇌하수체 기능 부전"}, {"letter": "B", "text": "난소 기능 부전"}, {"letter": "C", "text": "안드로겐 불감성 증후군"}, {"letter": "D", "text": "프로락틴 분비 종양"}, {"letter": "E", "text": "시상하부 기능 부전"}], "answer": "E", "explanation": "GnRH 자극검사에서 LH가 기저치의 1.7배 이상 상승하면 뇌하수체의 성선자극호르몬 분비능은 정상임을 뜻한다. 이는 무월경의 원인이 뇌하수체가 아닌 시상하부의 GnRH 분비 장애에 있음을 시사한다. 강의에서 \"LH가 basal level 1.7배 이상 상승하면 pituitary에는 문제가 없는데, 그래서 hypothalamus에서 FSH가 문제가 있구나\"라고 설명하였다. 난소 부전은 기저 FSH가 높을 때, 프로락틴 분비 종양은 고프로락틴혈증이 있을 때 의심한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "30세 여성이 1년 전부터 시작된 무월경으로 방문했다. 혈액검사 결과 FSH 55 mIU/mL, estradiol 10 pg/mL이며, 갑상선 기능과 prolactin은 정상이다. 과거력상 생리 주기는 규칙적이었고 골반 수술력은 없다. 이 환자에게 고려해야 할 검사는?", "options": [{"letter": "A", "text": "자궁경 검사"}, {"letter": "B", "text": "부신 호르몬 검사"}, {"letter": "C", "text": "GnRH 자극 검사"}, {"letter": "D", "text": "Clomiphene citrate 부하 검사"}, {"letter": "E", "text": "핵형 분석 (karyotyping)"}], "answer": "E", "explanation": "30세 이전의 조기 난소 부전 환자에서는 Y 염색체 모자이크 가능성으로 인해 성선모세포종(gonadoblastoma) 위험을 평가하기 위해 핵형 분석(karyotyping)이 필요하다. 강의에서 '30세 이전에 폐경이 됐다면 FSH가 올라갔으면 바로 chromosomal study를 해야 된다'고 강조하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "자궁이 있는 조기 난소 부전 환자에게 에스트로겐과 프로게스테론을 주기적으로 투여하는 호르몬 대체 요법에서, 프로게스테론을 추가하는 주된 목적은?", "options": [{"letter": "A", "text": "성욕 개선"}, {"letter": "B", "text": "골밀도 증가"}, {"letter": "C", "text": "인지 기능 개선"}, {"letter": "D", "text": "심혈관 질환 예방"}, {"letter": "E", "text": "자궁내막증식증 예방"}], "answer": "E", "explanation": "에스트로겐 단독 지속 투여는 자궁내막의 과증식을 초래하여 자궁내막암의 위험을 높이므로, 자궁이 있는 여성에서는 주기적 프로게스테론을 추가하여 자궁내막증식증을 예방한다. 강의에서 'continuous estrogen으로 주면 cancer 가능성이 있기 때문에 반드시 progesterone withdrawal bleeding을 유도해야 된다'고 설명하였다.", "chunkTranscript": "", "setName": "REI", "fileName  [{"letter": "A", "text": "시상하부 무월경"}, {"letter": "B", "text": "다낭성 난소 증후군"}, {"letter": "C", "text": "원발성 난소 기능 저하"}, {"letter": "D", "text": "고프로락틴혈증"}, {"letter": "E", "text": "뇌하수체 기능 저하증"}], "answer": "C", "explanation": "난포자극호르몬과 황체형성호르몬이 폐경기 수준으로 상승하고 에스트라디올이 낮은 것은 원발성 난소 기능 저하(과성선자극호르몬성 성선저하증)를 시사합니다. 이는 난소 자체의 기능 부전으로 인해 시상하부-뇌하수체의 부정적 되먹임이 감소하여 성선자극호르몬 분비가 증가한 상태입니다. 다낭성 난소 증후군에서는 LH/FSH 비율이 증가하지만 FSH 자체는 보통 정상 범위이며, 시상하부 무월경과 뇌하수체 기능 저하증에서는 성선자극호르몬이 낮습니다. 고프로락틴혈증은 프로락틴 수치가 높아야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 Tanner 5단계이나 액취와 음모가 거의 없고, 질은 약 3 cm의 맹낭으로 관찰된다. 자궁은 초음파에서 보이지 않는다. 핵형은 46,XY이며 혈중 테스토스테론은 650 ng/dL(남성 정상 범위)이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "스와이어 증후군(46,XY 성선발달장애)"}, {"letter": "B", "text": "뮐러관 무발생(MRKH 증후군)"}, {"letter": "C", "text": "안드로겐 불응 증후군(AIS) 완전형"}, {"letter": "D", "text": "5α-리덕타제 결핍증"}, {"letter": "E", "text": "선천성 부신 과형성증(21-수산화효소 결핍)"}], "answer": "C", "explanation": "완전형 안드로겐 불응 증후군(AIS)은 46,XY 핵형, 정상 남성 범위의 테스토스테론, 유방 발달(테스토스테론의 에스트로겐 전환), 음모와 액취의 결핍, 자궁과 상부 질의 부재, 맹낭으로 끝나는 질을 특징으로 한다. MRKH는 46,XX이고 난소 기능은 정상이므로 유방과 음모 발달이 정상이다. 스와이어 증후군은 FSH가 높고 자궁이 존재한다. 부신 과형성증은 46,XX이고 음핵비대 등 남성화를 보인다. 5α-리덕타제 결핍은 DHT가 낮고 사춘기에 남성화가 진행된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 44}, {"question": "다음 중 비동시성 사춘기(asynchronous puberty)의 예로 가장 적절한 것은?", "options": [{"letter": "A", "text": "6세에 음모 단독 발달이 나타난 경우"}, {"letter": "B", "text": "16세까지 초경이 없는 경우"}, {"letter": "C", "text": "정상 순서로 사춘기가 진행된 경우"}, {"letter": "D", "text": "8세 이전 유방 발달이 나타난 경우"}, {"letter": "E", "text": "유방 발달은 있으나 음모 발달이 전혀 없는 경우"}], "answer": "E", "explanation": "비동시성 사춘기란 사춘기 발달 순서가 정상과 다르게 나타나는 것으로, 예를 들어 유방 발달은 있지만 음모 발달이 없는 경우가 대표적이며 이는 안드로겐 불감성 증후군에서 볼 수 있다. 다른 선택지: 8세 이전 유방 발달은 조기 성숙증, 16세까지 초경 없음은 지연 사춘기, 정상 순서는 정상, 6세 tName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "30세 여성이 회색빛의 악취 나는 질분비물을 주소로 내원하였다. 현미경 검사에서 다수의 편평상피세포 주위에 작은 간균들이 붙어 있는 clue cell이 관찰되었다. 가장 적절한 치료 약제는?", "options": [{"letter": "A", "text": "Metronidazole 경구 투여"}, {"letter": "B", "text": "Acyclovir 경구 투여"}, {"letter": "C", "text": "Estrogen 질크림 도포"}, {"letter": "D", "text": "Doxycycline 경구 투여"}, {"letter": "E", "text": "Fluconazole 경구 투여"}], "answer": "A", "explanation": "Clue cell이 관찰되는 세균성 질증(bacterial vaginosis)의 치료로 Metronidazole 경구 투여가 1차 권고된다. Fluconazole은 진균, Doxycycline은 클라미디아 등에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "임신 중 bacterial vaginosis가 확인된 경우, 주의해야 할 합병증으로 가장 타당한 것은?", "options": [{"letter": "A", "text": "임신성 고혈압"}, {"letter": "B", "text": "태아 기형"}, {"letter": "C", "text": "조산"}, {"letter": "D", "text": "거대아"}, {"letter": "E", "text": "임신성 당뇨"}], "answer": "C", "explanation": "BV는 조기 양막 파수, 조산, 양수 내 감염(chorioamnionitis), 산후 자궁내막염 등의 위험을 증가시킨다. 태아 기형은 주로 임신 초기 바이러스 감염이나 유전적 요인과 관련되며, 거대아, 임신성 고혈압, 임신성 당뇨는 BV와의 직접적인 연관성이 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "27세 여성이 악취를 동반한 회색의 질 분비물을 주소로 내원하였다. 질 pH는 5.5이며, KOH 첨가 시 심한 비린내가 발생하였고 현미경 검사에서 clue cell이 관찰되었다. 가장 적절한 치료제는?", "options": [{"letter": "A", "text": "Doxycycline 경구"}, {"letter": "B", "text": "Fluconazole 경구"}, {"letter": "C", "text": "Metronidazole 경구"}, {"letter": "D", "text": "Erythromycin 경구"}, {"letter": "E", "text": "Azithromycin 경구"}], "answer": "C", "explanation": "환자는 Amsel 기준(회색 분비물, pH>4.5, 양성 whiff test, clue cell)에 근거하여 세균성 질증으로 진단할 수 있다. 일차 치료제는 Metronidazole 경구이다. Fluconazole은 칸디다 질염, Doxycycline과 Azithromycin은 클라미디아 감염, Erythromycin은 특정 피부 감염 등에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "화농성 질 분비물과 작열감을 호소하는 40세 여성에서 식염수 도말, KOH 도말, 배양 검사가 모두 음성이고 질 pH가 4.5일 때, 배제성 염증성 질염으로 진단하였다. 초기 치료로 가장 적절한 것은?", "options": [{"letter": "A", "text": "국소 estrogen 도포"}, {"letter": "B", "text": "경구 metronidazole 투여"}, {"letter": "C", "text": "국소 clindamycin 도포"}, {"letter": "D", "text": "국소 clotrimazole 도포"}, {"letter": "E", "text": "경구 fluconazole 투여"}], "answer": "D", "explanation": "배제성 염증성 질염(DIV)은 감염 증상이 있으나 균이 검출되지 않는 경우로, 초기 치료로 국소 clindamycin을 시도해볼 수 있다. 따라서 '국소 clindamycin 도포'가 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 54}, {"question": "Trichomonas vaginalis 질염으로 진단된 35세 여성에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경구 metronidazole을 환자와 성파트너에게 모두 투여한다"}, {"letter": "B", "text": "질정 metronidazole을 환자에게만 투여한다"}, {"letter": "C", "text": "경구 fluconazole을 환자에게 투여하고 파트너는 치료하지 않는다"}, {"letter": "D", "text": "경구 metronidazole을 환자에게만 투여한다"}, {"letter": "E", "text": "경구 clindamycin을 환자에게 투여하고 파트너는 치료한다"}], "answer": "B", "explanation": "트리코모나스 질염은 대표적인 성매개질환으로, 재발 방지를 위해 성파트너의 동시 치료가 반드시 필요합니다. 또한 원충에 효과적인 metronidazole 경구 투여가 표준 치료이며, 국소 크림이나 질정 단독 요법은 완치율이 낮아 권장되지 않습니다. 따라서 '경구 metronidazole을 환자와 성파트너에게 모두 투여한다'가 가장 적절합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "25세 여자가 질 가려움증과 악취를 동반한 거품 섞인 황록색 질 분비물을 주소로 내원하였다. 식염수 도말검사에서 편모를 가진 원충이 활발히 움직이는 것이 관찰되었다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Acyclovir 400 mg 1일 3회 7일간 경구 투여"}, {"letter": "B", "text": "Metronidazole 500 mg 1일 2회 7일간 경구 투여"}, {"letter": "C", "text": "Clindamycin 2% 질크림 1일 1회 7일간 질내 적용"}, {"letter": "D", "text": "Doxycycline 100 mg 1일 2회 7일간 경구 투여"}, {"letter": "E", "text": "Fluconazole 150 mg 단회 경구 투여"}], "answer": "B", "explanation": "The patient has trichomoniasis, confirmed by wet mount showing motile trichomonads with flagella. The standard treatment is metronidazole or tinidazole. Metronidazole 500 mg twice daily for 7 days is an effective regimen. Fluconazole is for candidiasis, clindamycin cream for bacterial vaginosis, doxycycline for chlamydia, and acyclovir for herpes.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "20세 여성이 성관계 후 화농성 질 분비물과 배뇨통으로 내원하였다. 자궁경부 분비물 배양에서 Neisseria gonorrhoeae가 동정되었다. 이 균의 주요 독성 인자에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "편모는 세균의 운동성을 부여하여 점막 침입을 돕는다."}, {"letter": "B", "text": "피막 다당체는 항탐식 작용을 한다."}, {"letter": "C", "text": "IgA protease는 분비형 IgA1을 분해한다."}, {"letter": "D", "text": "펩티도글리칸은 내독소 활성을 보인다."}, {"letter": "E", "text": "내열성 외독소는 체온 조절 중추에 작용해 발열을 유발한다."}], "answer": "C", "explanation": "Neisseria gonorrhoeae produces IgA1 protease that cleaves secretory IgA1, aiding in immune evasion. It does not have a capsule (unlike N. meningitidis), its endotoxin is lipooligosaccharide (LOS) not peptidoglycan, it has pili not flagella, and it does not produce a heat-stable exotoxin. Therefore, the statement about IgA protease is correct.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 60}, {"question": "임신 28주인 32세 여성이 산전 진찰을 위해 내원하였다. 현재까지 인플루엔자 백신과 Tdap 백신을 접종하지 않았다. 이 환자에게 적절한 예방접종 권고는?", "options": [{"letter": "A", "text": "인플루엔자 사백신과 MMR 백신 접종"}, {"letter": "B", "text": "Tdap 백신만 접종"}, {"letter": "C", "text": "인플루엔자 생백신과 Tdap 백신 접종"}, {"letter": "D", "text": "모든 백신 접종을 산후까지 연기한다."}, {"letter": "E", "text": "인플루엔자 사백신과 Tdap 백신 접종"}], "answer": "E", "explanation": "임신부는 인플루엔자 불활성화 백신(사백신)을 임신 주수에 관계없이 접종해야 하며, Tdap 백신은 임신 27-36주에 접종하여 태아에게 수동면역을 전달하고 신생아 백일해를 예방한다. 생백신(예: MMR)은 임신 중 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "25세 여성이 배뇨통과 화농성 질 분비물을 주소로 내원하였다. 자궁경부 검사에서 점액화농성 분비물이 관찰되었고, 분비물의 그람 염색에서 다수의 중성구와 그람 음성 쌍구균이 확인되었다. 다음 중 가장 가능성이 높은 원인균과 적절한 치료제는?", "options": [{"letter": "A", "text": "Gardnerella vaginalis – Clindamycin"}, {"letter": "B", "text": "Trichomonas vaginalis – Metronidazole"}, {"letter": "C", "text": "Neisseria gonorrhoeae – Ceftriaxone"}, {"letter": "D", "text": "Chlamydia trachomatis – Doxycycline"}, {"letter": "E", "text": "Candida albicans – Fluconazole"}], "answer": "C", "explanation": "자궁경부 분비물의 그람 염색에서 다수의 중성구와 함께 그람 음성 쌍구균이 확인되면 Neisseria gonorrhoeae 감염을 시사한다. 치료는 Ceftriaxone 주사가 일차 권장된다. 다른 선택지의 병원체는 이와 같은 현미경 소견을 보이지 않으며, 각각 다른 치료제를 사용한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "22세 성적으로 활동적인 여성이 화농성 자궁경부 분비물과 성교 후 출혈을 주소로 내원하였다. 감별진단을 위해 검사를 시행하는 동안, 경험적 항생제 치료로 가장 먼저 포함되어야 할 균주는?", "options": [{"letter": "A", "text": "Neisseria gonorrhoeae와 Chlamydia trachomatis"}, {"letter": "B", "text": "Herpes simplex virus와 Human papillomavirus"}, {"letter": "C", "text": "Candida albicans와 Trichomonas vaginalis"}, {"letter": "D", "text": "Escherichia coli와 Bacteroides fragilis"}, {"letter": "E", "text": "Gardnerella vaginalis와 Mycoplasma hominis"}], "answer": "A", "explanation": "화농성 자궁경부염의 가장 흔한 원인은 임균(Neisseria gonorrhoeae)과 클라미디아(Chlamydia trachomatis)이므로, 경험적 치료는 이 두 균주를 목표로 한다. 'Candida albicans와 Trichomonas vaginalis'는 질염의 흔한 원인이지만 화농성 경부염의 주된 원인은 아니다. 'Gardnerella vaginalis와 Mycoplasma hominis'는 세균성 질염과 연관되며, 'Herpes simplex virus와 Human papillomavirus'는 궤양이나 병변을 유발한다. 'Escherichia coli와 Bacteroides fragilis'는 주로 상부 생식기 감염(PID)에서 관여한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID)의 병력이 있는 30세 여자가 우상복부 통증을 호소하며, 숨을 깊이 들이쉴 때 통증이 악화된다. 복강경에서 간 피막과 횡격막 사이에 유착이 관찰된다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Fitz-Hugh-Curtis 증후군"}, {"letter": "B", "text": "췌장염"}, {"letter": "C", "text": "바이러스성 간염"}, {"letter": "D", "text": "소화성 궤양"}, {"letter": "E", "text": "급성 담낭염"}], "answer": "A", "explanation": "Fitz-Hugh-Curtis 증후군은 PID 합병증으로, 간 주위염(perihepatitis)에 의해 간과 횡격막 사이에 바이올린 현 모양 유착이 생기고 우상복부 통증이 발생한다. '급성 담낭염'은 우상복부 통증을 유발하나 간 피막 유착은 동반하지 않으며, '췌장염'은 주로 명치 부위 통증과 췌장효소 상승을 보인다. '바이러스성 간염'은 간 실질의 미만성 염증이고, '소화성 궤양'은 식사 관련 상복부 통증이 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "24세 여자가 하복부 통증과 발열로 골반염증성질환(PID)이 의심된다. 다음 중 입원 치료의 적응증에 해당하는 것은?", "options": [{"letter": "A", "text": "자궁외 임신 가능성을 배제한 경우"}, {"letter": "B", "text": "성 파트너가 치료를 거부한 경우"}, {"letter": "C", "text": "체온 37.8°C"}, {"letter": "D", "text": "경구 항생제 복용이 가능한 경우"}, {"letter": "E", "text": "골반 내 고름집(tubo-ovarian abscess)이 의심되는 경우"}], "answer": "E", "explanation": "골반 내 tubo-ovarian abscess가 의심되면 항생제의 침투가 어렵고 외래 치료 실패 가능성이 높아 입원이 필요하다. 일반적으로 입원 기준은 체온 38°C 이상, abscess 동반, 임신, 경구 약제 불내약, 외래 치료 실패 등이다. '체온 37.8°C'는 기준 이하이며, '경구 항생제 복용 가능' 및 '자궁외 임신 배제'는 오히려 외래 치료를 고려할 조건이다. '성 파트너 치료 거부'는 입원 적응증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "35세 여자가 2년간의 불임 및 만성 골반통을 주소로 내원하였다. 자궁내막 조직검사에서 건락 괴사를 동반한 육아종과 랑한스 거대세포가 관찰되었다. 다음 중 가장 적절한 치료는?", "options": [{"letter": "A", "text": "수술적 자궁절제술"}, {"letter": "B", "text": "Miconazole 질 내 주입"}, {"letter": "C", "text": "Isoniazid, Rifampin, Pyrazinamide 병합요법"}, {"letter": "D", "text": "경구 Fluconazole 장기 복용"}, {"letter": "E", "text": "Ceftriaxone과 Azithromycin 병합요법"}], "answer": "C", "explanation": "골반 결핵은 Mycobacterium tuberculosis에 의한 감염으로, 치료는 폐결핵과 동일하게 Isoniazid, Rifampin, Pyrazinamide 등 표준 항결핵제 병합요법을 시행한다. 'Ceftriaxone과 Azithromycin'은 임질과 클라미디아에 사용되며, '수술적 자궁절제술'은 필요하지 않다. '경구 Fluconazole'은 진균 감염, 'Miconazole 질 주입'은 칸디다 질염에 국한된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "35세 초임부가 제왕절개술 후 3일째 발열과 복통을 호소한다. 체온 38.5°C, 압통이 있는 자궁퇴축, 악취가 나는 오로가 관찰된다. 진단은?", "options": [{"letter": "A", "text": "폐렴"}, {"letter": "B", "text": "요로감염"}, {"letter": "C", "text": "폐색전증"}, {"letter": "D", "text": "자궁내막염"}, {"letter": "E", "text": "수술 부위 감염"}], "answer": "D", "explanation": "Postpartum fever accompanied by uterine tenderness and foul-smelling lochia is classic for endometritis. Other causes of postpartum fever include urinary tract infection, pneumonia, and wound infection, but the presence of uterine tenderness and abnormal lochia points to endometrial infection.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환으로 항생제 치료 중인 35세 여성에서 72시간 후에도 발열과 복통이 지속되고, 초음파에서 6cm 크기의 난소난관 농양이 관찰된다. 다음 단계로 가장 적절한 조치는?", "options": [{"letter": "A", "text": "추가적인 경과 관찰"}, {"letter": "B", "text": "경피적 또는 수술적 배농"}, {"letter": "C", "text": "현재 항생제의 용량을 증량"}, {"letter": "D", "text": "면역글로불린 정맥 투여"}, {"letter": "E", "text": "항생제를 다른 계열로 변경"}], "answer": "A", "explanation": "골반 내 농양은 항생제 침투가 어려워 치료 반응이 느리거나 실패할 수 있다. 적절한 항생제 치료에도 불구하고 호전이 없거나 농양이 지속되면 '경피적 또는 수술적 배농'이 필요한 경우가 많다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "임신 39주 미분만부가 규칙적 진통으로 내원하였다. 진찰상 질 입구 주변에 통증을 동반한 군집성 수포가 관찰되고, 환자는 임신 전부터 반복적인 Herpes simplex virus 감염 병력이 있다. 자궁목은 3 cm 확장되어 있으며, 양막은 아직 파수되지 않았다. 가장 적절한 분만 방식은?", "options": [{"letter": "A", "text": "제왕절개술 (Cesarean section) 시행"}, {"letter": "B", "text": "경막외 마취 아래 질식 분만 진행"}, {"letter": "C", "text": "항바이러스 연고 바른 후 질식 분만 시도"}, {"letter": "D", "text": "Oxytocin 투여 후 분만 유도"}, {"letter": "E", "text": "항바이러스제 주사 후 질식 분만 시도"}], "answer": "A", "explanation": "활동성 Herpes simplex virus 병변이 분만 시 존재하면 신생아 감염 위험을 줄이기 위해 제왕절개술(Cesarean section)을 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "24세 남성이 작열감을 동반한 배뇨통과 요도 입구에서 다량의 황색 분비물을 주소로 내원하였다. 5일 전 성 접촉력이 있으며, 분비물 그람염색에서 다형핵백혈구 내 그람음성쌍구균이 관찰되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Acyclovir 400 mg PO tid 7일간"}, {"letter": "B", "text": "Doxycycline 100 mg PO bid 7일간"}, {"letter": "C", "text": "Ceftriaxone 250 mg IM 단회 투여 + Azithromycin 1 g PO 단회 투여"}, {"letter": "D", "text": "Benzathine penicillin G 2.4 million units IM 단회 투여"}, {"letter": "E", "text": "Metronidazole 500 mg PO tid 7일간"}], "answer": "D", "explanation": "임질균(Neisseria gonorrhoeae)에 의한 전형적 임질 요도염으로, Ceftriaxone 250 mg IM 단회 투여와 Azithromycin 1 g PO 단회 투여의 병합요법이 권장된다. Benzathine penicillin G는 매독 치료제이며, Metronidazole은 트리코모나스증이나 세균성 질증에, Acyclovir는 헤르페스, Doxycycline은 비임균성 요도염에 주로 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "성폭행 피해자에게 시행하는 성병 예방 조치로 가장 적절한 것은?", "options": [{"letter": "A", "text": "B형 간염 면역글로불린만 단독 투여한다"}, {"letter": "B", "text": "모든 피해자에게 HIV 예방적 화학요법을 시행한다"}, {"letter": "C", "text": "인유두종바이러스(HPV) 백신을 즉시 접종한다"}, {"letter": "D", "text": "클라미디아, 임질, 매독에 대한 항생제 예방 요법을 시행한다"}, {"letter": "E", "text": "트리코모나스 예방을 위해 메트로니다졸을 투여한다"}], "answer": "D", "explanation": "성폭행 피해자에게는 임질, 클라미디아, 매독에 대한 예방적 항생제 치료가 권장된다. HIV 예방요법은 CDC 지침에 따라 위험도를 평가하여 선택적으로 고려하며, B형 간염은 항체 검사 후 필요 시 면역글로불린과 백신을 함께 접종한다. HPV 백신이나 트리코모나스 예방 치료는 일반적인 프로토콜에 포함되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "성폭행 피해자가 내원 당일 시행한 HIV 검사에서 양성 결과가 나왔다. 이에 대한 올바른 해석은?", "options": [{"letter": "A", "text": "성폭행 이전에 이미 HIV 보균자였음을 의미한다"}, {"letter": "B", "text": "이번 성폭행으로 인해 HIV에 감염되었음을 시사한다"}, {"letter": "C", "text": "무조건 항레트로바이러스 치료를 시작해야 한다"}, {"letter": "D", "text": "검사실 오류일 가능성이 가장 높다"}, {"letter": "E", "text": "3개월 후 재검사에서 음성으로 전환될 가능성이 크다"}], "answer": "A", "explanation": "성폭행 피해 초기(당일)에 시행하는 검사는 피해 이전의 상태를 반영한다. 따라서 HIV 양성은 이번 사건과 무관하게 이전부터 감염되어 있었음을 의미한다. 새로운 감염 여부는 추후 추적 검사(4주, 3개월, 6개월 등)에서 확인한다. 검사실 오류 가능성은 낮으며, 양성 시 감염내과 협의 하에 치료 방침을 결정한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "22세 성경험이 있는 여성이 하복부 통증, 발열, 화농성 질 분비물로 내원하였다. 내진에서 cervical motion tenderness와 양측 adnexa 압통이 관찰된다. 골반염증질환(PID) 진단에 가장 특이적인 소견은?", "options": [{"letter": "A", "text": "자궁경부 PCR에서 Chlamydia 양성"}, {"letter": "B", "text": "초음파상 adnexa 종괴"}, {"letter": "C", "text": "백혈구 증가와 ESR 상승"}, {"letter": "D", "text": "Cervical motion tenderness와 adnexa 압통"}, {"letter": "E", "text": "초음파상 Douglas pouch 내 액체 고임"}], "answer": "D", "explanation": "백혈구 증가와 ESR 상승은 염증을 시사하지만 PID에 특이적이지 않다. 초음파상 adnexa 종괴는 TOA로 진행된 경우에만 나타나며, 초기 PID에서는 없을 수 있다. Chlamydia PCR 양성은 원인균을 시사하지만 단독으로 진단 기준이 되지 않는다. Douglas pouch 액체는 PID 외에도 여러 원인으로 발생한다. 질확대경 검사에서 cervical motion tenderness와 adnexa tenderness는 PID의 가장 중요한 임상적 진단 기준이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "30세 골반염증질환(PID) 환자의 치료 방법을 결정할 때, 입원 치료의 적응증에 해당하는 것은?", "options": [{"letter": "A", "text": "백혈구 12,000/mm³"}, {"letter": "B", "text": "경미한 cervical motion tenderness"}, {"letter": "C", "text": "자궁경부 PCR에서 Chlamydia 양성"}, {"letter": "D", "text": "자궁내 피임장치(IUD)를 삽입 중인 경우"}, {"letter": "E", "text": "체온 38.0°C의 발열"}], "answer": "D", "explanation": "체온 38°C 발열, 경미한 cervical motion tenderness, 백혈구 증가는 경한 PID에서도 나타날 수 있으며, 경구 항생제 치료가 가능하다면 입원이 필수는 아니다. Chlamydia PCR 양성도 중증도를 반영하지 않는다. IUD가 삽입된 경우는 감염의 근원이 될 수 있고, 제거가 필요하며 중증으로 진행될 위험이 높아 입원 치료의 적응증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "24세 여성이 배뇨통, 질 분비물 증가, 하복부 통증으로 내원하였다. 자궁경부에서 화농성 분비물이 관찰되고 Gram 염색 결과 세포 내에 많은 그람음성 쌍알균이 확인되었다. 가장 가능성이 높은 원인균은?", "options": [{"letter": "A", "text": "Mycoplasma hominis"}, {"letter": "B", "text": "Gardnerella vaginalis"}, {"letter": "C", "text": "Chlamydia trachomatis"}, {"letter": "D", "text": "Escherichia coli"}, {"letter": "E", "text": "Neisseria gonorrhoeae"}], "answer": "E", "explanation": "자궁경부 분비물의 Gram 염색에서 그람음성 세포 내 쌍알균(intracellular diplococci)은 임균(Neisseria gonorrhoeae)의 특징적인 소견이다. 클라미디아는 세포 내 봉입체를 형성하지만 Gram 염색으로 관찰되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "26세 여자가 심한 하복부 통증, 발열, 화농성 질 분비물로 내원하였다. 골반 초음파에서 난소 주변에 6cm 크기의 복잡한 액체 저류가 관찰되어 난관난소농양(TOA)이 의심된다. 이 환자에게 가장 적절한 초기 치료는?", "options": [{"letter": "A", "text": "혈관 중재적 색전술"}, {"letter": "B", "text": "전자궁절제술 및 양측 난관난소절제술"}, {"letter": "C", "text": "광범위 항생제 투여 후 반응 평가"}, {"letter": "D", "text": "즉시 복강경하 농양 배액술"}, {"letter": "E", "text": "경구 진통제와 경과 관찰"}], "answer": "C", "explanation": "난관난소농양(TOA)은 복강 내 농양이므로, 일반적인 체외 농양과 달리 항생제 치료가 우선됩니다. 광범위 항생제로 혐기성균을 포함한 원인균을 치료한 후 반응이 없으면 배액이나 수술적 처치를 고려합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "Total laparoscopic hysterectomy 시 salpingectomy(난관절제술)를 함께 시행하는 주된 근거는?", "options": [{"letter": "A", "text": "난소암 발생 위험 감소"}, {"letter": "B", "text": "수술 시간 단축"}, {"letter": "C", "text": "호르몬 분비 보존"}, {"letter": "D", "text": "골반염(PID) 예방"}, {"letter": "E", "text": "자궁내막증(endometriosis) 예방"}], "answer": "A", "explanation": "일부 난소암이 난관에서 기원한다는 연구 결과에 근거하여, 자궁절제 시 난관을 함께 절제하면 난소암 위험을 줄일 수 있습니다. 자궁내막증이나 골반염 예방이 주목적이 아니며, 수술 시간이 단축되지 않고 오히려 추가 과정이 필요합니다. 호르몬 분비는 난소에서 주로 이루어지므로 난관절제와 무관합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "임신 32주인 28세 여자가 칸디다 질염으로 진단되었다. 다음 중 이 환자에게 금기인 치료는?", "options": [{"letter": "A", "text": "Miconazole 질 크림"}, {"letter": "B", "text": "Clotrimazole 질 정제"}, {"letter": "C", "text": "Butoconazole 질 크림"}, {"letter": "D", "text": "Nystatin 질 좌약"}, {"letter": "E", "text": "경구 Fluconazole"}], "answer": "E", "explanation": "경구 Fluconazole은 임신 중 FDA 범주 D로, 기형을 유발할 위험이 있어 금기이다. 반면 Miconazole, Clotrimazole, Butoconazole은 국소 아졸 항진균제로 임신 중 사용해도 안전하며, Nystatin 역시 국소 진균 치료제로 안전하게 사용할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 62}, {"question": "35세 여자가 최근 1년간 4회의 외음질 칸디다증을 앓았다. 다음 중 가장 적절한 치료 전략은?", "options": [{"letter": "A", "text": "경구 Fluconazole 1회 투여"}, {"letter": "B", "text": "6개월간 주 1회 Fluconazole 경구 유지 요법"}, {"letter": "C", "text": "Miconazole 질 크림 7일간 투여"}, {"letter": "D", "text": "성 파트너 치료"}, {"letter": "E", "text": "경구 피임약 중단"}], "answer": "B", "explanation": "재발성 칸디다증에서는 유지 억제 요법(maintenance suppressive therapy)이 필요하며, 6개월간 주 1회 경구 Fluconazole 복용이 표준적이다. '경구 Fluconazole 1회 투여'는 단순 칸디다증에만 효과적이며, 'Miconazole 크림 7일'은 급성 치료에 해당한다. 칸디다는 성병이 아니므로 '성 파트너 치료'는 필요 없고, '경구 피임약 중단'만으로는 재발을 막기 어렵다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 62}, {"question": "30세 여자가 칸디다 외음질염으로 진단되었다. 성적 파트너의 치료 필요성에 대해 문의할 때, 의사의 적절한 설명은?", "options": [{"letter": "A", "text": "파트너는 검사 후 양성인 경우에만 치료합니다."}, {"letter": "B", "text": "파트너도 반드시 항진균제 치료를 받아야 합니다."}, {"letter": "C", "text": "재발 방지를 위해 파트너도 함께 치료하는 것이 좋습니다."}, {"letter": "D", "text": "파트너의 증상 여부에 따라 치료를 결정합니다."}, {"letter": "E", "text": "칸디다는 성병이 아니므로 파트너 치료는 필요하지 않습니다."}], "answer": "D", "explanation": "칸디다 질염은 성매개 질환이 아니므로, 무증상 성적 파트너를 일상적으로 치료할 필요는 없다. 따라서 '칸디다는 성병이 아니므로 파트너 치료는 필요하지 않습니다'가 적절한 설명이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 62}, {"question": "칸디다 외음질염 환자가 항진균제 치료 중에도 극심한 외음부 소양증을 호소할 때, 증상 완화를 위해 즉각 병용할 수 있는 국소 약제는?", "options": [{"letter": "A", "text": "국소 에스트로겐 도포"}, {"letter": "B", "text": "국소 항히스타민제 도포"}, {"letter": "C", "text": "국소 항생제 도포"}, {"letter": "D", "text": "국소 보습제 도포"}, {"letter": "E", "text": "국소 스테로이드 도포"}], "answer": "C", "explanation": "심한 소양증이 동반된 칸디다 외음질염에서는 단기간 국소 스테로이드를 병용하여 빠른 증상 완화를 도모할 수 있다. '국소 스테로이드 도포'가 적절한 옵션이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 62}, {"question": "65세 폐경 여성이 외음부 건조감과 따끔거림, 성교통을 호소한다. 진찰상 질점막은 얇고 발적되어 있으며, 주름(rugae)이 소실되어 있고 질분비물은 거의 없다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "박리성 염증성 질염 (Desquamative inflammatory vaginitis)"}, {"letter": "B", "text": "외음질 칸디다증 (Vulvovaginal candidiasis)"}, {"letter": "C", "text": "위축성 질염 (Atrophic vaginitis)"}, {"letter": "D", "text": "트리코모나스 질염 (Trichomoniasis)"}, {"letter": "E", "text": "세균성 질증 (Bacterial vaginosis)"}], "answer": "C", "explanation": "위축성 질염 (Atrophic vaginitis)은 폐경 후 에스트로겐 결핍으로 질점막이 얇아지고 주름이 소실되며 건조감, 작열감, 성교통을 유발한다. 세균성 질증은 악취 나는 분비물, 칸디다증은 두꺼운 백색 분비물과 소양감, 트리코모나스는 거품 있는 악취 분비물, 박리성 염증성 질염은 화농성 분비물과 미란이 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 63}, {"question": "임신 8주인 29세 초임부의 산전 검사에서 VDRL 검사가 1:16 역가로 양성이며, TPHA 검사도 양성이다. 이전에 매독 치료를 받은 적이 없다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Metronidazole 500 mg 1일 2회 7일간 경구투여"}, {"letter": "B", "text": "Ceftriaxone 250 mg 단회 근육주사"}, {"letter": "C", "text": "Doxycycline 100 mg 1일 2회 14일간 경구투여"}, {"letter": "D", "text": "Acyclovir 400 mg 1일 3회 7일간 경구투여"}, {"letter": "E", "text": "Benzathine penicillin G 240만 단위 근육주사"}], "answer": "E", "explanation": "Penicillin is the only recommended treatment for syphilis during pregnancy. Doxycycline is contraindicated due to fetal adverse effects. Metronidazole is for trichomoniasis or bacterial vaginosis, acyclovir for herpes, and ceftriaxone is not first-line for syphilis. Benzathine penicillin G 2.4 million units intramuscularly is the standard regimen for early syphilis.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedS 피임법 시행 후 3주에 임신 여부를 반드시 확인하라고 강조하였다. 약 25%에서는 임신이 지속될 수 있으므로, 예정 월경이 없으면 반드시 확인해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "응급 피임약 투여의 금기증으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "임신 (pregnancy)"}, {"letter": "B", "text": "35세 이상 흡연자 (smoker aged ≥35)"}, {"letter": "C", "text": "경증 편두통 (mild migraine)"}, {"letter": "D", "text": "모유 수유 중 (breastfeeding)"}, {"letter": "E", "text": "비만 (BMI > 30, obesity)"}], "answer": "A", "explanation": "응급 피임약은 임신이 확인되었거나 의심되는 경우 사용해서는 안 된다. 에스트로겐과 프로게스테론 성분의 고용량 제제이므로 태아에 유해할 수 있기 때문이다. 또한, 심한 편두통이 있는 경우에도 금기이다. 경증 편두통은 금기 사항이 아니다. 모유 수유, 35세 이상 흡연자, 비만은 일반적인 경구 피임제의 상대적 금기일 수 있으나 응급 피임약의 절대적 금기증은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "응급 피임약 복용 후 2시간 이내에 구토가 발생한 경우 가장 적절한 조치는?", "options": [{"letter": "A", "text": "항구토제를 투여하고 경과를 본다"}, {"letter": "B", "text": "동일 용량의 약을 다시 복용한다"}, {"letter": "C", "text": "프로게스테론 단독 제제로 대체한다"}, {"letter": "D", "text": "경과 관찰하며 증상이 호전되길 기다린다"}, {"letter": "E", "text": "즉시 구리 함유 자궁 내 장치를 삽입한다"}], "answer": "B", "explanation": "응급 피임약 복용 후 2시간 이내에 구토가 발생하면 약물이 충분히 흡수되지 못했을 가능성이 높다. 따라서 동일 용량의 약을 다시 복용하는 것이 권장된다. 약을 다시 복용할 수 없는 경우 자궁 내 장치와 같은 다른 응급 피임 방법을 고려할 수 있으나, 우선 재복용이 일차적 권고이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 72}, {"question": "성폭행 피해자 진료 시 의사의 의무로 옳지 않은 것은?", "options": [{"letter": "A", "text": "향후 법적 조치 가능성에 대비해 환자의 동의 없이 신속히 증거를 채취한다."}, {"letter": "B", "text": "법적 고발 여부는 환자 스스로 결정할 수 있도록 돕는다."}, {"letter": "C", "text": "진료실에 환자와 의사만 있는 상황을 피하고, 제3자를 입회시킨다."}, {"letter": "D", "text": "객관적이고 무비판적인 태도로 문진과 검진을 시행한다."}, {"letter": "E", "text": "피해자의 진술을 준비될 때까지 기다리며, 비판적인 질문을 하지 않는다."}], "answer": "A", "explanation": "증거 채취는 반드시 충분한 설명 후 환자의 동의를 얻은 상태에서 시행해야 한다. 환자의 동의 없이 신체 검사나 증거 채취를 강행하는 것은 인권 침해이며 의료 윤리에 위배된다. 다른 보기들은 강의에서 강조된 올바른 지침이다: 제3자 입회, 비판적 질문 금지, 환자 결정 존중, 객관적 태도 유지.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 73}, {"question": "성폭력(sexual violence)에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "성희롱(sexual harassment)은 상호 존중 관계에서는 성립하지 않는다."}, {"letter": "B", "text": "성추행(molestation)은 반드시 신체적 접촉을 수반해야 한다."}, {"letter": "C", "text": "성폭행(sexual assault) 피해자의 대부분은 낯선 사람에 의해 발생한다."}, {"letter": "D", "text": "성폭력은 신체적, 언어적, 정신적 폭력을 모두 포괄하며 동의가 없는 모든 행위를 포함한다."}, {"letter": "E", "text": "강간(rape)은 전체 성폭력의 약 50%를 차지한다."}], "answer": "D", "explanation": "강의에 따르면 성폭력은 성을 매개로 상대방의 동의 없이 가해지는 모든 신체적·언어적·정신적 폭력을 포괄한다. 강간은 전체의 약 7%에 불과하며, 성추행은 육체적 접촉 없이 성적 수치심을 유발하는 행위도 포함된다. 성희롱은 상하관계뿐 아니라 동등한 관계에서도 성립할 수 있고, 대부분의 성폭행은 아는 사람에 의해 발생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 73}, {"question": "다음 중 14~16세 청소년에게 가장 적절한 성교육 내용은?", "options": [{"letter": "A", "text": "남성과 여성의 성별 차이와 기본적인 성 역할 이해"}, {"letter": "B", "text": "영유아기 성적 행동과 자위행위의 정상 발달적 이해"}, {"letter": "C", "text": "생명이 탄생하고 태어나는 과정에 대한 설명"}, {"letter": "D", "text": "혼전 성관계, 매춘, 성병 등 사회적 책임에 대한 교육"}, {"letter": "E", "text": "2차 성징의 발현과 몽정 등 신체 변화에 대한 설명"}], "answer": "D", "explanation": "14~16세는 성적으로 활발해지는 시기이므로, 혼전 성관계, 매춘, 성병과 같은 사회적 책임에 대한 교육이 필요하다. 생명 탄생 과정은 7~10세, 2차 성징에 대한 설명은 11~13세, 성별 차이 인지는 3~4세, 영유아기 성적 행동 이해는 영아기에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 73}, {"question": "Pelvic diaphragm을 구성하는 근육으로 옳은 것은?", "options": [{"letter": "A", "text": "Urethral sphincter와 anal sphincter"}, {"letter": "B", "text": "Levator ani와 coccygeus"}, {"letter": "C", "text": "Piriformis와 obturator internus"}, {"letter": "D", "text": "Iliopsoas와 rectus abdominis"}, {"letter": "E", "text": "Superficial transverse perineal과 bulbospongiosus"}], "
