tchedSlide": 109}, {"question": "원발성 무월경 환자에서 프로게스틴 챌린지 검사 시 철회 출혈이 없었지만, 에스트로겐-프로게스틴 챌린지 검사에서는 철회 출혈이 나타났다. 이 소견이 시사하는 것은?", "options": [{"letter": "A", "text": "난소기능부전"}, {"letter": "B", "text": "뇌하수체 기능저하"}, {"letter": "C", "text": "시상하부 이상"}, {"letter": "D", "text": "자궁경부 폐쇄"}, {"letter": "E", "text": "자궁내막의 이상"}], "answer": "A", "explanation": "프로게스틴 단독으로는 철회 출혈이 없으나 에스트로겐을 추가하면 출혈이 있다는 것은 자궁내막은 정상이지만 에스트로겐이 부족한 상태를 의미하므로 난소부전을 시사합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "일차성 무월경을 주소로 내원한 여성에서 초음파상 자궁이 존재하나 46,XY 핵형 및 상승된 FSH가 확인되었다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Turner 증후군"}, {"letter": "B", "text": "Swyer 증후군(46,XY 완전 성선 발육 부전)"}, {"letter": "C", "text": "5α-reductase 결핍"}, {"letter": "D", "text": "MRKH 증후군"}, {"letter": "E", "text": "완전 androgen 불응 증후군(complete AIS)"}], "answer": "B", "explanation": "정답은 'Swyer 증후군(46,XY 완전 성선 발육 부전)'입니다. Swyer 증후군은 46,XY 핵형이나 성선이 발달하지 않아(streak gonad) AMH와 testosterone이 분비되지 않으므로 Müllerian 구조가 퇴화되지 않아 자궁과 나팔관이 존재합니다. FSH는 높고 testosterone은 낮습니다. MRKH는 46,XX이고 자궁이 없으며, 완전 AIS는 자궁이 없고 testosterone이 남성 수준입니다. Turner 증후군은 45,X로 특징적인 체형 이상을 동반합니다. 5α-reductase 결핍은 자궁이 없고 사춘기에 남성화가 가능합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "여성의 정상적인 사춘기 발달 순서로 올바른 것은?", "options": [{"letter": "A", "text": "유방 발아 → 성장 급진 → 초경 → 음모 출현 → 최고 성장 속도"}, {"letter": "B", "text": "초경 → 성장 급진 → 유방 발아 → 최고 성장 속도 → 음모 출현"}, {"letter": "C", "text": "최고 성장 속도 → 유방 발아 → 성장 급진 → 음모 출현 → 초경"}, {"letter": "D", "text": "성장 급진 → 유방 발아 → 음모 출현 → 최고 성장 속도 → 초경"}, {"letter": "E", "text": "음모 출현 → 유방 발아 → 성장 급진 → 초경 → 최고 성장 속도"}], "answer": "D", "explanation": "여성 사춘기는 일반적으로 성장 급진 개시, 유방 발아(thelarche), 음모 출현(pubarche), 최고 성장 속도 도달, 초경(menarche) 순으로 진행됩니다. 이 순서는 M자 형태로 암기됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여성이 무월경으로 내원하였다. 이차 성징은 정상적으로 발달하였고, 혈중 FSH와 estradiol 수치는 정상 범위이다. 가장 가능성이 높은 원인은?", "options": [{"letter": "A", "text": "완전 안드로겐 불응 증후군(complete androgen insensitivity syndrome)"}, {"letter": "B", "text": "칼만 증후군(Kallmann syndrome)"}, {"letter": "C", "text": "뮐러관 무발생(Müllerian agenesis)"}, {"letter": "D", "text": "조기 난소 부전(premature ovarian failure)"}, {"letter": "E", "text": "터너 증후군(Turner syndrome)"}], "answer": "C", "explanation": "이 환자는 정상 이차 성징과 정상 FSH, estradiol 수치를 보여 eugonadotropic 상태로, 뮐러관 무발생과 같은 자궁이나 질의 해부학적 이상을 의심할 수 있다. 뮐러관 무발생은 자궁과 질의 발달 부전을 초래하며 난소 기능은 정상이다. 조기 난소 부전은 FSH 상승, estradiol 감소를 보인다. 칼만 증후군은 저성선자극호르몬성 성선저하증으로 FSH 감소와 이차 성징 부재를 보인다. 터너 증후군은 FSH 상승, 저신장, 익상경 등이 동반된다. 완전 안드로겐 불응 증후군은 46,XY 핵형으로 유방 발달은 있으나 자궁이 없고 음모가 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "6세 여아가 한쪽 유방이 약간 발달하여 내원하였다. 다른 이차 성징은 없고 성장 속도는 정상이며, 골연령도 실제 연령과 일치한다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "말초성 성조숙증(peripheral precocious puberty)"}, {"letter": "B", "text": "맥큔-올브라이트 증후군(McCune-Albright syndrome)"}, {"letter": "C", "text": "단순 유방 조기 발육(premature thelarche)"}, {"letter": "D", "text": "조기 음모 발생(premature pubarche)"}, {"letter": "E", "text": "진성 성조숙증(true precocious puberty)"}], "answer": "C", "explanation": "premature thelarche는 8세 이전 여아에서 유방 발달만 나타나는 양성 상태로, 다른 이차 성징이나 성장 가속화, 골연령 진전이 없어 성조숙증과 감별된다. 진성 성조숙증은 모든 이차 성징이 순차적으로 나타나고 골연령이 증가한다. 말초성 성조숙증은 에스트로겐 과잉에 의한 유방 발달과 질 출혈이 동반된다. 맥큔-올브라이트 증후군은 골병변, 카페오레 반점 등이 동반된다. 조기 음모 발생은 유방 발달 없이 음모만 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여성이 일차 무월경으로 내원하였다. 유방 발달은 Tanner 4단계이나 음모는 거의 없으며 서혜부에서 종물이 촉지된다. 염색체 검사는 46,XY이고 혈중 testosterone 수치는 정상 남성 범위이다. 진단은?", "options": [{"letter": "A", "text": "클라인펠터 증후군(Klinefelter syndrome)"}, {"letter": "B", "text": "뮐러관 무발생(Müllerian agenesis)"}, {"letter": "C", "text": "완전 안드로겐 불응 증후군(complete androgen insensitivity syndrome)"}, {"letter": "D", "text": "5-알파 환원효소 결핍증(5-alpha reductase deficiency)"}, {"letter": "E", "text": "스와이어 증후군(Swyer syndrome)"}], "answer": "C", "explanation": "완전 안드로겐 불응 증후군은 안드로겐 수용체 유전자 돌연변이로 인해 46,XY 핵형임에도 불구하고 표적 조직이 안드로겐에 반응하지 않아 외성기는 여성형으로 발달한다. 정상 고환에서 testosterone이 분비되나 작용하지 못하며, AMH 작용으로 뮐러관이 퇴화하여 자궁이 없다. 에스트로겐에 의한 유방 발달은 있지만 음모는 적다. 5-알파 환원효소 결핍증은 사춘기에 남성화가 진행된다. 스와이어 증후군은 46,XY이지만 고환 미발달로 testosterone이 낮고 자궁이 존재한다. 뮐러관 무발생은 46,XX이며, 정상 난소 기능을 갖는다. 클라인펠터 증후군은 47,XXY로 남성 표현형이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "13세 여아가 초경이 없어 내원하였다. 신체검진에서 유방발달이 관찰되지 않았다. 원발성 무월경을 진단하기 위한 연령 기준으로 옳은 것은?", "options": [{"letter": "A", "text": "2차 성징 유무와 관계없이 14세까지 초경이 없으면 원발성 무월경이다"}, {"letter": "B", "text": "2차 성징이 없더라도 15세까지 초경이 없으면 원발성 무월경이다"}, {"letter": "C", "text": "2차 성징이 없으므로 13세에 원발성 무월경에 해당한다"}, {"letter": "D", "text": "2차 성징이 관찰되지 않으므로 속발성 무월경으로 분류한다"}, {"letter": "E", "text": "2차 성징이 없으면 16세까지 초경이 없을 때 원발성 무월경으로 진단한다"}], "answer": "C", "explanation": "원발성 무월경은 2차 성징 발현이 없는 경우 13세까지 초경이 없을 때 진단한다. 2차 성징이 있지만 15세까지 초경이 없는 경우도 원발성 무월경에 해당한다. 이 환아는 유방발달이 없는 상태이므로 13세에 원발성 무월경에 해당한다. '2차 성징이 없더라도 15세까지 초경이 없으면'은 잘못된 기준이며, '14세까지'도 아니고 '16세까지'도 아니다. '속발성 무월경'은 이전에 월경이 있었던 경우에만 해당하므로 틀리다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "원발성 무월경을 주소로 내원한 17세 여성의 키가 또래보다 작고 외형적 이상이 의심된다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "Androgen Insensitivity Syndrome (AIS)"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "Kallmann 증후군"}, {"letter": "D", "text": "다낭성 난소 증후군 (PCOS)"}, {"letter": "E", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군"}], "answer": "B", "explanation": "Turner 증후군은 45X 핵형을 가지며 저신장, 원발성 무월경, 성선이상발생(gonadal dysgenesis)이 특징이다. MRKH 증후군은 자궁과 질 상부의 무발생이 있으나 난소와 2차 성징은 정상이다. AIS는 46XY로 고환은 있으나 자궁이 없고 여성 외형을 보인다. PCOS는 흔히 속발성 무월경/희발월경을 유발한다. Kallmann 증후군은 저생식샘자극호르몬성 성선저하증으로 후각 장애가 동반된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "15세 여아가 초경이 없고 주기적인 하복부 통증을 호소한다. 유방 및 음모 발달은 정상이다. 내진에서 질 입구에 팽대된 푸른빛의 막이 관찰된다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Asherman 증후군"}, {"letter": "B", "text": "처녀막 폐쇄증 (Imperforate hymen)"}, {"letter": "C", "text": "Androgen Insensitivity Syndrome (AIS)"}, {"letter": "D", "text": "Müllerian 무발생증 (MRKH 증후군)"}, {"letter": "E", "text": "Turner 증후군"}], "answer": "B", "explanation": "처녀막 폐쇄증은 원발성 무월경과 주기적 골반통을 유발하며, 내진 시 질 입구에 푸르게 팽대된 막(월경혈 저류로 인한 혈종)이 관찰된다. 2차 성징은 정상이다. MRKH 증후군은 자궁과 질 상부가 없어 월경이 없지만 통증은 동반되지 않는다. AIS는 46XY로 자궁이 없고 질은 맹단이다. Turner 증후군은 저신장과 2차 성징 발달 부족이 특징이다. Asherman 증후군은 보통 속발성 무월경을 유발한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여아가 초경이 없어 내원하였다. 유방발달은 정상이나 초음파에서 자궁이 관찰되지 않고 난소는 정상적으로 보인다. 염색체 검사가 46,XX이며, 혈청 테스토스테론은 여성 범위이다. 가장 적합한 진단은?", "options": [{"letter": "A", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "난소 무발생증"}, {"letter": "D", "text": "Androgen Insensitivity Syndrome (AIS)"}, {"letter": "E", "text": "5α-reductase 결핍증"}], "answer": "A", "explanation": "MRKH 증후군은 46,XX 여성에서 자궁과 질 상부가 없고 난소와 2차 성징은 정상인 질환으로, 원발성 무월경을 유발한다. AIS는 46,XY로 테스토스테론이 높으며 자궁이 없다. Turner 증후군은 45X이고 저신장과 성선무발생이 동반된다. 난소 무발생증은 난소 자체가 없을 때이며, 5α-reductase 결핍증은 46,XY이지만 외부 성기가 여성화되는 질환이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 46,XY 환자가 무월경을 주소로 내원하였다. 유방발달은 있으나 겨드랑이 및 음모가 거의 없고, 초음파에서 자궁이 보이지 않으며 질이 짧게 막혀 있다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "Turner 증후군"}, {"letter": "B", "text": "5α-reductase 결핍증"}, {"letter": "C", "text": "Androgen Insensitivity Syndrome (AIS)"}, {"letter": "D", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군"}, {"letter": "E", "text": "Kallmann 증후군"}], "answer": "C", "explanation": "AIS는 46,XY 환자에서 androgen 수용체 이상으로 인해 말단 조직에서 androgen이 작용하지 못해 여성 표현형을 보이지만 자궁이 없고 음모가 거의 없다. 유방발달은 말초에서 androgen이 estrogen으로 전환되어 발생한다. MRKH 증후군은 46,XX로 자궁이 없지만 음모는 정상이다. Turner 증후군은 45X로 저신장이 동반된다. 5α-reductase 결핍증은 46,XY로 출생 시 외부 성기가 여성화되나 사춘기 때 남성화가 진행된다. Kallmann 증후군은 후각 소실과 성선자극호르몬 저하가 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "15세 여아가 초경이 없지만 유방발달과 음모는 Tanner stage 3이다. 어머니와 언니도 만 15세 이후 초경이 있었다. 신체검진 및 기본 호르몬 검사는 정상이다. 가장 적합한 진단은?", "options": [{"letter": "A", "text": "체질성 사춘기 지연 (Constitutional delay of puberty)"}, {"letter": "B", "text": "원발성 생식샘 저하증"}, {"letter": "C", "text": "처녀막 폐쇄증"}, {"letter": "D", "text": "뇌하수체 미세선종"}, {"letter": "E", "text": "시상하부 기능 부전"}], "answer": "A", "explanation": "체질성 사춘기 지연은 가족력이 흔하고, 다른 원인이 배제된 경우 진단할 수 있다. 2차 성징이 진행 중이고 호르몬 검사가 정상이면 지켜볼 수 있다. 원발성 생식샘 저하증은 FSH가 상승하며, 시상하부 기능 부전은 FSH/LH가 낮다. 뇌하수체 미세선종은 프로락틴 상승이 있을 수 있다. 처녀막 폐쇄증은 진찰에서 확인된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "무월경 환자를 유방과 자궁의 존재 여부로 분류할 때, 유방 발달이 없고 자궁도 없는 경우 가장 가능성 있는 핵형은?", "options": [{"letter": "A", "text": "47,XXY"}, {"letter": "B", "text": "46,XX"}, {"letter": "C", "text": "46,XY"}, {"letter": "D", "text": "45,X"}, {"letter": "E", "text": "47,XXX"}], "answer": "C", "explanation": "유방 발달이 없다는 것은 에스트로겐이 부족하다는 의미이며, 자궁이 없는 여성 표현형은 대부분 46,XY 핵형의 안드로겐 불응 증후군(AIS)이나 성선 발생 이상이다. 45,X 터너증후군은 자궁이 존재하고, 46,XX는 MRKH 증후군으로 유방 발달이 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "15세 여아가 원발성 무월경과 주기적인 하복부 통증으로 내원하였다. 유방과 음모 발달은 정상이며, 초음파에서 질 내 혈액 저류(hematocolpos) 소견이다. 예상되는 혈액 검사 결과로 가장 적절한 것은?", "options": [{"letter": "A", "text": "FSH 5 mIU/mL, 에스트라다이올 50 pg/mL"}, {"letter": "B", "text": "FSH 60 mIU/mL, 에스트라다이올 10 pg/mL 미만"}, {"letter": "C", "text": "프로락틴 100 ng/mL"}, {"letter": "D", "text": "FSH 3 mIU/mL, 에스트라다이올 10 pg/mL 미만"}, {"letter": "E", "text": "TSH 20 mIU/L"}], "answer": "A", "explanation": "처녀막 폐쇄 등 유출로 폐쇄로 인한 무월경은 난소 기능이 정상이므로 FSH와 에스트라다이올이 정상 범위인 진성선자극호르몬성 무월경에 해당한다. 다른 선택지는 각각 난소 부전, 시상하부성, 고프로락틴혈증, 갑상선 이상을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "원발성 무월경으로 내원한 17세 여성에서 유방 발달은 정상이고 초음파상 자궁이 관찰되지 않으며 음모는 정상적으로 발달하였다. 가장 의심되는 질환은?", "options": [{"letter": "A", "text": "뮐러관 무발생증(MRKH 증후군)"}, {"letter": "B", "text": "안드로겐 불감성 증후군"}, {"letter": "C", "text": "처녀막 폐쇄증"}, {"letter": "D", "text": "스와이어 증후군"}, {"letter": "E", "text": "완전 고환성 여성화 증후군"}], "answer": "A", "explanation": "MRKH 증후군은 46,XX 핵형으로 난소 기능은 정상이므로 유방 발달과 음모는 정상적으로 나타나지만, 뮐러관 발달 저하로 자궁과 질 상부가 결여된다. 안드로겐 불감성 증후군(AIS)이나 완전 고환성 여성화 증후군은 46,XY로 음모가 없거나 매우 드물다. 스와이어 증후군은 46,XY로 자궁이 존재하는 경우가 많다. 처녀막 폐쇄증은 자궁이 있으나 하부 폐쇄로 인해 자궁 내 혈액 저류가 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "Y 염색체를 가진 무월경 환자에서 생식선 절제술을 진단 즉시 시행해야 하는 경우는?", "options": [{"letter": "A", "text": "5-알파 환원 효소 결핍증"}, {"letter": "B", "text": "뮐러관 무발생증 (MRKH 증후군)"}, {"letter": "C", "text": "완전 안드로겐 불감성 증후군"}, {"letter": "D", "text": "다낭성 난소 증후군"}, {"letter": "E", "text": "터너 증후군 (45,X)"}], "answer": "A", "explanation": "5-알파 환원효소 결핍증은 46,XY 개체로 테스토스테론은 정상이지만 DHT 전환이 안 되어 외성기가 여성형이 된다. 그러나 이들 고환은 여성 이차 성징에 전혀 도움이 되지 않고 악성화 위험이 있어 진단 즉시 절제한다. 반면 완전 안드로겐 불감성 증후군(AIS)은 고환에서 생성된 안드로겐이 에스트로겐으로 전환되어 유방 발달에 기여하므로 이차 성징 후 지연 절제가 가능하다. 터너 증후군(45,X)과 MRKH는 Y 염색체가 없으므로 생식선 절제 대상이 아니다. PCOS도 Y 염색체와 무관하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "다음 중 핵형 분석(karyotyping)이 가장 우선적으로 필요한 무월경 환자는?", "options": [{"letter": "A", "text": "22세, 원발성 무월경, 유방 발달 정상, 자궁 없음, 음모 정상"}, {"letter": "B", "text": "17세, 원발성 무월경, 유방 발달 없음, FSH 45 IU/L"}, {"letter": "C", "text": "25세, 속발성 무월경, 과도한 운동과 체중 감소, FSH 2.5 IU/L"}, {"letter": "D", "text": "15세, 원발성 무월경, 유방 발달 정상, 극심한 주기적 복통"}, {"letter": "E", "text": "30세, 속발성 무월경, 다모증과 비만, 초음파상 다낭성 난소"}], "answer": "B", "explanation": "원발성 무월경과 유방 발달이 없으며 FSH가 상승한 경우(>30 IU/L)는 고생식샘자극호르몬성 성선기능저하증으로 난소 기능 부전을 의미한다. 이때 반드시 핵형 분석을 시행하여 터너 증후군(45,X)이나 Y 염색체 모자이크 여부를 확인해야 한다. 22세 자궁 없는 환자도 핵형 분석이 필요하나(46,XX vs 46,XY) FSH 정상인 경우 생명을 위협하는 악성 위험도는 상대적으로 낮다. 다낭성 난소 증후군, 기능성 시상하부 무월경, 처녀막 폐쇄 의심 환자는 핵형 분석이 우선적이지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "다음 중 원발성 무월경(primary amenorrhea)의 진단 기준으로 옳은 것은?", "options": [{"letter": "A", "text": "이차성징 유무와 관계없이 만 16세까지 초경이 없는 경우"}, {"letter": "B", "text": "이차성징이 있는 경우 만 14세, 없는 경우 만 16세까지 초경이 없는 경우"}, {"letter": "C", "text": "이차성징이 없는 경우 만 13세, 있는 경우 만 15세까지 초경이 없는 경우"}, {"letter": "D", "text": "이차성징이 없는 경우 만 14세, 있는 경우 만 16세까지 초경이 없는 경우"}, {"letter": "E", "text": "이차성징 유무와 관계없이 만 15세까지 초경이 없는 경우"}], "answer": "C", "explanation": "원발성 무월경은 이차성징이 없는 경우 만 13세까지, 이차성징이 있는 경우 만 15세까지 초경이 없을 때 진단한다. 따라서 '이차성징이 없는 경우 만 13세, 있는 경우 만 15세까지 초경이 없는 경우'가 옳다. 나머지 옵션은 연령 기준이 잘못되었거나 이차성징 유무를 고려하지 않아 부정확하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 정상이며, 초음파에서 자궁이 관찰되지 않는다. 다음 중 가장 적절한 검사는?", "options": [{"letter": "A", "text": "혈청 FSH 측정"}, {"letter": "B", "text": "골반 MRI"}, {"letter": "C", "text": "진단적 자궁경 검사"}, {"letter": "D", "text": "혈청 testosterone 측정"}, {"letter": "E", "text": "핵형 검사(karyotype)"}], "answer": "E", "explanation": "자궁이 없고 유방 발달이 있는 원발성 무월경에서는 핵형 검사를 통해 46,XX(MRKH 증후군)와 46,XY(Androgen Insensitivity Syndrome)를 구별해야 한다. FSH나 testosterone은 감별에 도움이 될 수 있으나 확진은 핵형 검사이다. 골반 MRI와 자궁경 검사는 이미 자궁 부재가 확인된 상황에서 불필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "원발성 무월경으로 내원한 15세 여성에서 FSH가 상승되어 있고, 작은 키와 익상경(webbed neck) 등의 특징을 보인다. 다음 중 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Androgen Insensitivity Syndrome"}, {"letter": "B", "text": "Swyer syndrome"}, {"letter": "C", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) syndrome"}, {"letter": "D", "text": "Turner syndrome"}, {"letter": "E", "text": "Polycystic Ovary Syndrome (PCOS)"}], "answer": "D", "explanation": "Turner syndrome(45,X)은 원발성 무월경, FSH 상승, 작은 키, 익상경 등으로 나타나는 질환이다. Swyer syndrome(46,XY)은 자궁이 있고 유방 발달이 없으며, AIS는 46,XY로 자궁이 없고 유방 발달이 있다. MRKH는 46,XX로 자궁이 없고 유방 발달이 정상이며, PCOS는 희발월경과 안드로겐 과잉을 보이는 속발성 무월경의 원인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "원발성 무월경 환자에서 분류를 위해 가장 먼저 확인해야 하는 것은?", "options": [{"letter": "A", "text": "핵형 검사"}, {"letter": "B", "text": "골반 초음파"}, {"letter": "C", "text": "신장과 체중"}, {"letter": "D", "text": "FSH 혈중 농도"}, {"letter": "E", "text": "유방 발달 여부 (이차성징 유무)"}], "answer": "E", "explanation": "원발성 무월경의 분류에서 에스트로겐 작용 여부를 나타내는 이차성징(특히 유방 발달)의 존재 유무가 매우 중요하며, 이는 진단 알고리즘의 첫 단계이다. 유방 발달이 없으면 자궁 유무와 FSH로 진행하고, 있으면 자궁 유무에 따라 다른 검사를 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 Tanner 5기이고, 골반 초음파에서 자궁은 정상이며 난소도 관찰된다. 다음 중 가장 의심해야 할 원인은?", "options": [{"letter": "A", "text": "Swyer 증후군"}, {"letter": "B", "text": "안드로겐 불감성 증후군"}, {"letter": "C", "text": "터너 증후군"}, {"letter": "D", "text": "처녀막 폐쇄증 (imperforate hymen)"}, {"letter": "E", "text": "뇌하수체 선종"}], "answer": "D", "explanation": "원발성 무월경에서 유방 발달과 자궁이 모두 정상이면 outflow obstruction(처녀막 폐쇄나 질중격)과 같은 기계적 원인을 반드시 확인해야 한다. 신체 검진 후 수술적 교정이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "속발성 무월경으로 내원한 여성에서 임신이 배제된 경우, 가장 먼저 시행해야 할 검사는?", "options": [{"letter": "A", "text": "골반 초음파"}, {"letter": "B", "text": "핵형 분석"}, {"letter": "C", "text": "프로게스테론 부하 검사"}, {"letter": "D", "text": "혈중 TSH와 prolactin 측정"}, {"letter": "E", "text": "혈중 FSH 측정"}], "answer": "D", "explanation": "교수님은 속발성 무월경 환자에서 임신 검사 후 갑상선기능저하증과 고프로락틴혈증을 배제하기 위해 TSH와 prolactin을 가장 먼저 측정해야 한다고 강조하셨습니다. 이는 무월경 진단 알고리즘의 첫 단계로, 흔한 내분비 원인을 우선 감별하기 위함입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "난소에서 에스트로겐 생산에 관한 두-세포 두-생식샘자극호르몬 이론에 대한 설명 중 옳은 것은?", "options": [{"letter": "A", "text": "과립막세포가 황체형성호르몬(LH)의 자극으로 안드로겐을 생산한다."}, {"letter": "B", "text": "과립막세포는 LH 수용체를 통해서만 에스트로겐 합성이 조절된다."}, {"letter": "C", "text": "난포막세포가 난포자극호르몬(FSH)의 자극으로 안드로겐을 에스트로겐으로 전환한다."}, {"letter": "D", "text": "난포막세포에서 생산된 안드로겐이 과립막세포로 이동하여 에스트로겐으로 전환된다."}, {"letter": "E", "text": "두 세포 모두 에스트로겐을 생산하는 능력이 있다."}], "answer": "D", "explanation": "두-세포 두-생식샘자극호르몬 이론에 따르면, 난포막세포(theca cell)는 LH 자극으로 안드로겐을 생산하고, 과립막세포(granulosa cell)는 FSH 자극으로 아로마타제 활성을 증가시켜 안드로겐을 에스트로겐으로 전환한다. 즉, 안드로겐 생산과 에스트로겐 전환이 서로 다른 세포에서 일어난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "PCOS에서 안드로겐 과다의 주된 기전으로 옳은 것은?", "options": [{"letter": "A", "text": "FSH 과다로 인한 theca cell 증식"}, {"letter": "B", "text": "난소 종양에서 직접 testosterone 분비"}, {"letter": "C", "text": "LH 맥동 빈도 증가로 인한 theca cell의 안드로스테네디온 과다 생성"}, {"letter": "D", "text": "LH 저하로 인한 granulosa cell 기능 부전"}, {"letter": "E", "text": "인슐린 저항성으로 인한 SHBG 증가"}], "answer": "C", "explanation": "PCOS에서는 시상하 estionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "PCOS 환자의 인슐린 저항성 치료에 관한 최근 지견으로 옳은 것은?", "options": [{"letter": "A", "text": "Metformin은 체중 감량 효과가 가장 우수하다"}, {"letter": "B", "text": "Insulin sensitizer는 배란 유도에 효과가 없다"}, {"letter": "C", "text": "Wegovy (semaglutide)는 metformin보다 인슐린 저항성 개선 효과가 우수하다"}, {"letter": "D", "text": "Mounjaro (tirzepatide)는 GLP-1 수용체 작용제가 아니다"}, {"letter": "E", "text": "OCPs는 인슐린 저항성을 직접 개선한다"}], "answer": "C", "explanation": "Transcript에서 Wegovy(semaglutide)가 metformin보다 인슐린 저항성을 더 많이 감소시켰다고 보고하였다. Mounjaro는 GLP-1과 GIP 이중 작용제이다. Insulin sensitizer는 배란 유도에 사용되며, OCPs는 안드로겐 감소 효과가 있으나 직접적으로 인슐린 저항성을 개선하지는 않는다. 따라서 'Wegovy (semaglutide)는 metformin보다 인슐린 저항성 개선 효과가 우수하다'가 정답.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "PCOS의 수술적 치료인 난소 절개술(ovarian drilling)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "난소 기능 보존에 효과적이다"}, {"letter": "B", "text": "영구적인 생리 주기 정상화를 가져온다"}, {"letter": "C", "text": "약물 치료보다 우선적으로 고려된다"}, {"letter": "D", "text": "난소암 예방 효과가 있다"}, {"letter": "E", "text": "시술 후 일시적으로 배란이 유도될 수 있다"}], "answer": "E", "explanation": "난소 절개술은 한시적으로 배란을 유도하지만, 상처가 아물면 다시 증상이 재발하며 난소기능 저하와 유착을 초래할 수 있어 현재는 약물 치료가 우선이다. 따라서 '시술 후 일시적으로 배란이 유도될 수 있다'가 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 114}, {"question": "PCOS 환자의 불임 치료 순서로 옳은 것은?", "options": [{"letter": "A", "text": "IVF-ET를 먼저 시행한다"}, {"letter": "B", "text": "배란 유도 후 바로 IVF-ET를 시행한다"}, {"letter": "C", "text": "약물 치료 없이 바로 인공수정을 시행한다"}, {"letter": "D", "text": "배란 유도를 약 6개월 시행 후, IUI를 3회 정도 시행한 뒤 IVF-ET로 진행한다"}, {"letter": "E", "text": "IUI를 먼저 시행하고 실패 시 배란 유도를 한다"}], "answer": "D", "explanation": "Transcript에 따르면, 먼저 배란 유도를 약 6개월 시행하고, 이후 실패 시 IUI를 3회 정도 시도한 후에도 임신이 되지 않으면 IVF-ET로 넘어가는 것이 routine이다. 따라서 '배란 유도를 약 6개월 시행 후, IUI를 3회 정도 시행한 뒤 IVF-ET로 진행한다'가 정답이다." ide": 125}, {"question": "불임 환자에서 생식샘자극호르몬(FSH/LH)으로 배란유도를 시행할 때, 난포 발육을 감시하고 hCG 주사 시기를 결정하기 위해 가장 유용한 검사는?", "options": [{"letter": "A", "text": "기초체온 측정"}, {"letter": "B", "text": "소변 황체형성호르몬 검사"}, {"letter": "C", "text": "자궁내막생검"}, {"letter": "D", "text": "혈중 에스트라디올 측정"}, {"letter": "E", "text": "질 초음파"}], "answer": "C", "explanation": "질 초음파는 난포의 크기와 수를 실시간으로 측정할 수 있어, 적절한 난포 성숙 시점에 hCG를 투여하여 배란을 유도하는 데 가장 유용하다. 에스트라디올도 보조적으로 사용되지만, 단독으로는 정확한 난포 성숙도를 판단하기 어렵다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다음 중 난소과자극증후군(OHSS)의 위험인자가 아닌 것은?", "options": [{"letter": "A", "text": "젊은 연령"}, {"letter": "B", "text": "복강 내 유착의 과거력"}, {"letter": "C", "text": "낮은 체질량지수"}, {"letter": "D", "text": "높은 혈중 에스트라디올 수치"}, {"letter": "E", "text": "다낭성 난소 증후군"}], "answer": "D", "explanation": "복강 내 유착은 OHSS의 위험인자로 알려져 있지 않다. 반면 PCOS, 35세 미만의 나이, 저체중, 과거 OHSS 병력, 다수의 난포 발육 및 높은 에스트라디올 수치 등이 주요 위험인자이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다음 중 과배란 유도 시 난소 과자극 증후군(OHSS) 발생 위험이 가장 높은 환자는?", "options": [{"letter": "A", "text": "30세 남성 요인 불임 여성"}, {"letter": "B", "text": "32세 자궁내막증 여성"}, {"letter": "C", "text": "35세 난관 요인 불임 여성"}, {"letter": "D", "text": "40세 난소 예비력 저하 여성"}, {"letter": "E", "text": "28세 다낭성 난소 증후군 여성"}], "answer": "E", "explanation": "PCOS 환자는 높은 난포 수와 과배란 유도에 대한 과도한 반응으로 인해 OHSS 위험이 가장 높다. 젊은 연령 또한 위험 요인이며, 난관 요인이나 자궁내막증, 남성 요인 환자는 상대적으로 위험이 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다음 중 생리 주기와 관계없이 일정한 농도를 유지하여 난소 예비력 평가에 가장 신뢰할 수 있는 생체표지자는?", "options": [{"letter": "A", "text": "혈중 AMH"}, {"letter": "B", "text": "인히빈 B"}, {"letter": "C", "text": "혈중 에스트라디올"}, {"letter": "D", "text": "생리 3일째 FSH"}, {"letter": "E", "text": "프로게스테론"}], "answer": "A", "explanation": " ranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "자궁외 임신에서 methotrexate(MTX) 치료의 적응증으로 옳은 것은?", "options": [{"letter": "A", "text": "혈역학적 불안정 상태"}, {"letter": "B", "text": "hCG 수치 6,000 mIU/mL"}, {"letter": "C", "text": "태아 심박동 확인됨"}, {"letter": "D", "text": "혈역학적 안정, 임신낭 크기 30mm, 심박동 없음"}, {"letter": "E", "text": "임신낭 크기 45mm"}], "answer": "D", "explanation": "MTX는 혈역학적으로 안정되고, 임신낭 크기가 작으며(일반적으로 <40mm), 태아 심박동이 없을 때 사용할 수 있습니다. '혈역학적 불안정 상태'는 수술적 치료가 필요합니다. '임신낭 크기 45mm'는 크기가 커서 실패율이 높습니다. '태아 심박동 확인됨'도 실패 요인입니다. 'hCG 6,000 mIU/mL'는 높은 수치로 약물 실패 가능성이 큽니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "혈청 hCG가 서서히 상승하는 임신 초기 여성에서 자궁내 임신과 구분이 어려울 때 시행하는 검사는?", "options": [{"letter": "A", "text": "자궁경부 세포검사"}, {"letter": "B", "text": "복강경"}, {"letter": "C", "text": "자궁경 검사"}, {"letter": "D", "text": "자궁내막 소파술"}, {"letter": "E", "text": "질 초음파"}], "answer": "D", "explanation": "Pregnancy of unknown location에서 자궁내막 소파술(D&C)을 시행하여 조직에서 chorionic villi를 확인하면 자궁내 유산으로 진단할 수 있고, 없으면 자궁외 임신으로 진단을 진행합니다. '복강경'은 확실한 자궁외 임신 진단 후 치료 목적으로 사용됩니다. '자궁경부 세포검사'는 자궁경부암 선별 검사입니다. '자궁경 검사'는 자궁내 병변을 직접 보는 검사입니다. '질 초음파'는 기본 검사이지만 이 상황에서는 결정적이지 않을 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "다음 중 메토트렉세이트(Methotrexate)를 이용한 자궁외 임신의 약물 치료에 적합한 환자는?", "options": [{"letter": "A", "text": "혈청 β-hCG 6,000 mIU/mL, 복강 내 출혈이 의심되는 환자"}, {"letter": "B", "text": "혈청 β-hCG 2,500 mIU/mL, 자궁외 임신낭이 4 cm으로 관찰되는 환자"}, {"letter": "C", "text": "혈청 β-hCG 1,800 mIU/mL, 복통 없이 활력징후가 안정적이며 초음파에서 태아 심장 활동이 없는 환자"}, {"letter": "D", "text": "혈청 β-hCG 500 mIU/mL, 초음파에서 자궁내 임신이 불확실한 환자"}, {"letter": "E", "text": "혈청 β-hCG 5,000 mIU/mL, 자궁내 동반 임신이 확인된 환자"}], "answer": "C", "explanation": "메토트렉세이트 치료의 이상적 대상자는 혈역학적으로 안정되고, β-hCG가 낮으며(일반적으로 5,000 mIU/mL 미만), 난관 파열의 증거가 없고, 태아 심장 활동이 없는 경우이다. 복강 내 출혈, 높은 β-hCG, 큰 종괴, 태아 심장 활동, 또는 자궁내 동반 임신은 금기증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "월경 지연 7주, 질출혈 및 하복부 통증을 호소하는 26세 여성에서 소변 hCG 양성, 혈청 β-hCG 5200 mIU/mL, 질식 초음파에서 자궁 내 gestational sac은 보이지 않으며 cul-de-sac에 free fluid가 관찰된다. 활력징후는 정상이다. 가장 적절한 다음 처치는 무엇인가?", "options": [{"letter": "A", "text": "48시간 후 β-hCG 재측정"}, {"letter": "B", "text": "즉시 개복술 또는 복강경 수술"}, {"letter": "C", "text": "경과 관찰"}, {"letter": "D", "text": "Methotrexate 근주"}, {"letter": "E", "text": "진단적 자궁내막 소파술 (curettage)"}], "answer": "B", "explanation": "정답은 '즉시 개복술 또는 복강경 수술'이다. 자궁외 임신(ectopic pregnancy)에서 cul-de-sac free fluid와 하복부 통증은 rupture를 시사하며, β-hCG가 5000 mIU/mL 이상이고 자궁 내 gestational sac이 없으면 rupture 가능성이 높다. Rupture가 의심되면 48시간 hCG 추적 관찰이나 약물 치료(methotrexate)를 기다리지 않고 즉시 수술을 시행해야 한다. 자궁내막 소파술은 pregnancy of unknown location에서 완전 유산을 감별할 때 사용되며, rupture가 의심되는 상황에서는 부적절하다. 경과 관찰은 출혈과 통증이 있고 rupture 위험이 있을 때 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "월경 지연 6주, 경미한 질출혈을 주소로 내원한 30세 여성에서 소변 hCG 양성, 혈청 β-hCG 2500 mIU/mL, 질식 초음파에서 자궁 내외 어디에도 gestational sac 및 abnormal mass가 관찰되지 않으며 cul-de-sac free fluid도 없다. 활력징후는 안정적이다. 다음으로 시행할 가장 적절한 처치는?", "options": [{"letter": "A", "text": "Methotrexate 근주"}, {"letter": "B", "text": "자궁내막 소파술 (curettage)"}, {"letter": "C", "text": "GnRH agonist 투여"}, {"letter": "D", "text": "48시간 후 β-hCG 재측정"}, {"letter": "E", "text": "진단적 복강경 검사"}], "answer": "B", "explanation": "정답은 '자궁내막 소파술 (curettage)'이다. 이 환자는 pregnancy of unknown location(PUL)이며 β-hCG가 2000 mIU/mL 이상으로 자궁 내 gestational sac이 보여야 할 수준이나 보이지 않고, ectopic rupture를 의심할 만한 free fluid가 없다. 강의에서 언급한 바와 같이, 이러한 경우에는 자궁내막을 긁어서 chorionic villi를 확인하여 완전 유산(complete abortion)인지 확인하는 것이 우선이다. 48시간 β-hCG 추적은 하강하는 추세를 확인하기 위함이나 여기서는 조직 진단이 먼저 필요하다. 진단적 복강경은 rupture가 의심될 때 시행하며, methotrexate는 ectopic이 확인된 후에 고려한다. GnRH agonist는 무관하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "29세 여성이 질출혈과 하복통으로 병원에 왔다. 임신 6주로 추정되며, 2일 전 시행한 자궁내막흡인술에서 융모조직이 관찰되지 않았다. β-hCG 수치는 4일 전 2,400 mIU/mL, 2일 전 3,200 mIU/mL, 당일 4,100 mIU/mL로 상승 추세이다. 혈색소 11.0 g/dL, 혈압 110/70 mmHg, 맥박 88회/분으로 안정적이다. 골반초음파에서 자궁 내 임신낭은 없고, 오른쪽 난관에 2cm 종괴가 관찰된다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "기대요법(경과 관찰)"}, {"letter": "B", "text": "개복 난관절제술"}, {"letter": "C", "text": "골반경 난관개술"}, {"letter": "D", "text": "자궁내막 재소파술"}, {"letter": "E", "text": "메토트렉세이트(Methotrexate) 근주"}], "answer": "B", "explanation": "자궁내막 소파술 후 융모가 없고 β-hCG가 상승하면 자궁외임신을 의심해야 합니다. 본 환자는 종괴가 2cm, 태아 심장활동 없음, 혈역학적 안정, β-hCG 5,000 mIU/mL 미만으로 메토트렉세이트 근주 적응증입니다. 수술은 일차 치료가 아니며, 기대요법은 hCG가 감소할 때 고려합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "자궁체부의 가장 바깥층을 형성하는 구조물은 무엇인가?", "options": [{"letter": "A", "text": "Myometrium"}, {"letter": "B", "text": "Parametrium"}, {"letter": "C", "text": "Endometrium"}, {"letter": "D", "text": "Cervical stroma"}, {"letter": "E", "text": "Serosa (perimetrium)"}], "answer": "E", "explanation": "자궁벽은 가장 바깥쪽에 serosa (perimetrium), 중간에 근육층인 myometrium, 가장 안쪽에 점막층인 endometrium으로 구성된다. Cervical stroma는 자궁경부의 결합조직, parametrium은 자궁 주변 결합조직이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "에스트로겐이 지속적으로 과도하게 작용하고 프로게스테론의 길항 효과가 부족할 때 자궁내막에 발생할 수 있는 병변은 무엇인가?", "options": [{"letter": "A", "text": "자궁내막 증식증(endometrial hyperplasia)"}, {"letter": "B", "text": "자궁내막 용종(endometrial polyp)"}, {"letter": "C", "text": "자궁내막 위축(endometrial atrophy)"}, {"letter": "D", "text": "자궁내막 섬유화(endometrial fibrosis)"}, {"letter": "E", "text": "자궁선근증(adenomyosis)"}], "answer": "A", "explanation": "에스트로겐은 자궁내막 세포의 증식을 촉진하고, 프로게스테론은 이를 길항하여 분화를 유도한다. 따라서 프로게스테론의 균형 없이 에스트로겐만 지속되면 자궁내막이 과다 증식하여 자궁내막 증식증이 발생한다. 이는 비정상 자궁출혈의 원인이 되며, 장기적으로 자궁내막암의 전구 병변이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "27세 여성이 불규칙한 질출혈로 내원하였다. 자궁내막생검에서 비정형이 없는 단순 자궁내막증식증으로 진단되었다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경구 피임제"}, {"letter": "B", "text": "자궁절제술"}, {"letter": "C", "text": "면밀 관찰"}, {"letter": "D", "text": "GnRH 작용제"}, {"letter": "E", "text": "고용량 프로게스틴"}], "answer": "E", "explanation": "비정형이 없는 자궁내막증식증은 프로게스틴 치료로 대부분 호전된다. 자궁절제술은 비정형을 동반한 증식증이나 약물 치료 실패 시 고려한다. GnRH 작용제나 경구 피임제는 이 경우 일차 선택이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "17세 여자가 월경량이 많아 내원하였다. 14세 초경 후 1-3개월 간격 월경. 키 163cm, 체중 49kg, 활력징후 정상. 골반초음파: 자궁과 난소 정상. 혈액검사: TSH, 프로락틴, FSH, LH 정상, 혈색소 12.5g/dL. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "GnRH 작용제 투여"}, {"letter": "B", "text": "에스트로겐 단독 투여"}, {"letter": "C", "text": "철분 보충만 하고 경과 관찰"}, {"letter": "D", "text": "자궁내막소파술"}, {"letter": "E", "text": "주기적 프로게스테론 투여"}], "answer": "E", "explanation": "사춘기 무배란성 출혈은 무배란으로 인해 자궁내막이 에스트로겐에 지속적으로 노출되어 불규칙하게 탈락하는 출혈이다. 혈역학적으로 안정적인 경우 주기적 프로게스테론(예: 메드록시프로게스테론)을 10-14일간 투여하여 정기적인 쇠퇴성 출혈을 유도하고 자궁내막을 보호하는 것이 적절하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "35세 여성이 체중 증가 후 불규칙 출혈을 주소로 내원하였다. 자궁내막 생검 결과 비정형을 동반하지 않은 자궁내막증식증(endometrial hyperplasia without atypia)으로 진단되었다. 적절한 치료는?", "options": [{"letter": "A", "text": "프로게스테론 요법"}, {"letter": "B", "text": "자궁적출술"}, {"letter": "C", "text": "경구 피임제"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "자궁내막 소파술"}], "answer": "A", "explanation": "비정형이 없는 자궁내막증식증은 진행 위험이 낮으므로 프로게스테론 요법(주사용 또는 자궁내 프로게스테론 분비 장치)을 통해 자궁내막을 안정시킨다. 비만이 동반된 경우 체중 감량도 중요하지만, 직접적인 치료는 프로게스테론이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "47세 여성이 월경과다와 빈혈로 내원하였다. 골반진찰: 자궁은 임신 4개월 크기. 초음파: 10cm 크기의 자궁근종 확인. 향후 임신을 원하지 않는다. 혈색소 8.0g/dL. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁동맥색전술"}, {"letter": "B", "text": "자궁절제술"}, {"letter": "C", "text": "프로게스테론 요법"}, {"letter": "D", "text": "근종절제술"}, {"letter": "E", "text": "GnRH 작용제 투여"}], "answer": "B", "explanation": "증상을 동반한 자궁근종에서 임신을 원하지 않는 환자에게는 자궁절제술이 근본적 치료법이다. 빈혈이 동반되어 있으므로 수술 전 교정이 필요할 수 있다. 근종절제술은 가임력 보존이 필요한 경우에 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "15세 여자가 초경 후 1년 후부터 시작된 주기적인 심한 월경통으로 병원에 왔다. 통증은 월경 첫째 날에 심하며 둘째 날에 감소한다. 골반 진찰과 초음파검사는 정상이다. 가장 적절한 치료는?", "options": [{"letter": "A", "text": "자궁경하 근종절제술"}, {"letter": "B", "text": "비스테로이드성 소염제(NSAIDs) 복용"}, {"letter": "C", "text": "경구피임약 복용"}, {"letter": "D", "text": "GnRH 작용제 주사"}, {"letter": "E", "text": "진통제 없이 경과관찰"}], "answer": "D", "explanation": "일차성 월경통의 1차 치료는 프로스타글란딘 합성 억제제인 NSAIDs이다. 검사상 이상이 없으므로 경구피임약은 2차로 고려하며, 수술이나 GnRH 작용제는 적응증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "임신 6주 산모가 난소 종양으로 인해 반드시 편측 난소절제술이 필요한 상태이다. 담당 의사가 수술 시기를 10~12주 이후로 연기하려는 가장 타당한 이유는 무엇인가?", "options": [{"letter": "A", "text": "태반이 충분히 성숙하여 progesterone을 생산하므로"}, {"letter": "B", "text": "종양이 악성일 가능성이 낮아지므로"}, {"letter": "C", "text": "항체 생성으로 유산 위험이 감소하므로"}, {"letter": "D", "text": "마취 위험이 감소하므로"}, {"letter": "E", "text": "수술 후 통증이 덜하므로"}], "answer": "A", "explanation": "임신 5주까지는 황체가 progesterone을 주로 생산하므로 난소 제거 시 유산될 수 있으나, 임신 10~12주경 황체-태반 이행(luteoplacental shift)이 완성되면 태반이 주된 progesterone 생산원이 되어 난소 제거 후에도 임신 유지가 가능합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "배아가 자궁 내에서 가장 흔히 착상하는 부위는?", "options": [{"letter": "A", "text": "자궁경부 상부"}, {"letter": "B", "text": "자궁체부의 측벽"}, {"letter": "C", "text": "자궁 하부 분절"}, {"letter": "D", "text": "자궁저부의 후벽"}, {"letter": "E", "text": "자궁각 부위"}], "answer": "D", "explanation": "정상적인 배아 착상은 주로 자궁저부(fundus), 특히 후벽(posterior wall)에 발생합니다. 이 부위는 혈관 분포가 풍부하고 태반 형성에 유리합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "5세 여아가 질 출혈과 유방 발달로 내원하였다. 피부에 밀크커피색 반점(café-au-lait spots)과 다발성 골 병변이 발견되었다. 가장 가능한 진단은?", "options": [{"letter": "A", "text": "맥큔-올브라이트 증후군(McCune-Albright syndrome)"}, {"letter": "B", "text": "난소 낭종(ovarian cyst)"}, {"letter": "C", "text": "특발성 진성 성조숙증(idiopathic central precocious puberty)"}, {"letter": "D", "text": "성선 자극 호르몬 분비 종양(gonadotropin-secreting tumor)"}, {"letter": "E", "text": "선천성 부신 과형성(congenital adrenal hyperplasia)"}], "answer": "A", "explanation": "맥큔-올브라이트 증후군은 GNAS 유전자 돌연변이로 인한 말초성 성조숙증, 다골성 섬유성 이형성, 카페오레 반점의 3징을 특징으로 한다. 에스트로겐 과잉에 의한 성조숙증이 나타난다. 특발성 진성 성조숙증은 HPO 축 조기 활성화로 발생하나 골병변이나 반점이 없다. 선천성 부신 과형성은 고안드로겐혈증으로 이성 징후 및 음핵 비대가 나타난다. 성선 자극 호르몬 분비 종양은 중추성 성조숙증을 유발하며 LH, FSH 상승이 동반된다. 난소 낭종은 일시적인 에스트로겐 상승을 초래할 수 있으나 골병변과 반점은 동반되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "45세 남성이 전신에 여러 개의 카페오레 반점(café-au-lait spots)이 있어 신경섬유종증 제1형(NF1)이 의심된다. 다음 중 NF1 진단기준에 포함되지 않는 것은?", "options": [{"letter": "A", "text": "양측 청신경초종 (acoustic neuroma)"}, {"letter": "B", "text": "시신경교종 (optic glioma)"}, {"letter": "C", "text": "6개 이상의 카페오레 반점 (성인 기준 최소 15 mm)"}, {"letter": "D", "text": "2개 이상의 리쉬 결절 (Lisch nodules)"}, {"letter": "E", "text": "1개 이상의 총상 신경섬유종 (plexiform neurofibroma)"}], "answer": "A", "explanation": "양측 청신경초종은 신경섬유종증 제2형(NF2)의 특징적인 소견입니다. NF1 진단기준은 ① 6개 이상의 카페오레 반점, ② 2개 이상의 신경섬유종 또는 1개의 총상 신경섬유종, ③ 겨드랑이/서혜부 주근깨, ④ 시신경교종, ⑤ 2개 이상의 리쉬 결절, ⑥ 특징적 골병변, ⑦ 직계 가족력 중 2개 이상 충족 시 진단합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "불임을 주소로 내원한 여성에서 시행한 자궁내막 조직검사에서 관찰된 골반 결핵(pelvic tuberculosis)의 진단적 소견은?", "options": [{"letter": "A", "text": "사이토메갈로 바이러스 포함체"}, {"letter": "B", "text": "코일세포와 핵의 이형성"}, {"letter": "C", "text": "건락성 육아종과 다핵 거대세포"}, {"letter": "D", "text": "중성구 침윤과 미세농양"}, {"letter": "E", "text": "비정형 증식과 유사분열 증가"}], "answer": "C", "explanation": "골반 결핵은 Mycobacterium tuberculosis에 의해 발생하며, 조직검사에서 중심부 괴사를 동반한 건락성 육아종과 Langhans 거대세포가 특징적이다. 중성구 침윤은 급성 염증, 사이토메갈로 바이러스는 바이러스 감염, 코일세포는 HPV 감염, 비정형 증식은 악성 종양을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "외음부에 손가락 모양의 증식성 병변을 보이는 환자에서 가장 가능성이 높은 원인 바이러스 아형은?", "options": [{"letter": "A", "text": "Epstein-Barr virus"}, {"letter": "B", "text": "Human papillomavirus 6, 11형"}, {"letter": "C", "text": "Molluscum contagiosum virus"}, {"letter": "D", "text": "Herpes simplex virus 2형"}, {"letter": "E", "text": "Human papillomavirus 16, 18형"}], "answer": "B", "explanation": "외음부의 손가락 모양 증식성 병변은 콘딜로마(genital warts)이며, 주로 HPV 6형과 11형에 의해 발생합니다. HPV 16,18형은 자궁경부암과 관련되어 있습니다. HSV-2는 포진, Molluscum contagiosum virus는 물사마귀, EBV는 성병과 무관합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "임신 20주의 28세 여성이 외음부에 커다란 콘딜로마 병변으로 내원했다. 약물 치료로 가장 안전한 것은?", "options": [{"letter": "A", "text": "트리클로로아세트산 국소 도포"}, {"letter": "B", "text": "경구 아시클로버"}, {"letter": "C", "text": "이미퀴모드 크림"}, {"letter": "D", "text": "인터페론 주사"}, {"letter": "E", "text": "포도필린 국소 도포"}], "answer": "A", "explanation": "임산부에서 콘딜로마 치료 시 태아 기형 가능성이 있는 포도필린, 이미퀴모드 등은 피하고, 트리클로로아세트산(TCA)이나 냉동치료, 수술적 절제가 안전하게 사용될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "m : "A", "explanation": "자궁선근증은 자궁근층 내 자궁내막 조직이 존재하는 질환으로, 월경통과 월경과다를 유발하고 진찰 시 대칭적으로 커진 유동성 자궁이 만져집니다. 자궁근종은 비대칭적일 수 있고, 자궁내막증은 부속기 종괴나 자궁고정을 동반하는 경우가 많습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁내막증(endometriosis)의 정의로 가장 올바른 것은?", "options": [{"letter": "A", "text": "자궁내막 조직이 난소 내에만 국한되어 존재하는 상태"}, {"letter": "B", "text": "자궁내막 조직이 자궁경부관 내로 확장되어 용종을 형성한 상태"}, {"letter": "C", "text": "자궁내막의 비정상적인 증식으로 인해 자궁내막이 두꺼워진 상태"}, {"letter": "D", "text": "자궁내막 조직(자궁내막샘과 기질)이 자궁 외부에 존재하는 상태"}, {"letter": "E", "text": "자궁내막 조직이 자궁근층(myometrium) 내에 침윤되어 있는 상태"}], "answer": "D", "explanation": "자궁내막증은 자궁내막 조직(자궁내막샘과 기질)이 자궁 외부에 존재하는 질환입니다. '자궁내막 조직이 자궁근층 내에 침윤'은 자궁선근증(adenomyosis), '자궁내막의 비정상적 증식으로 두꺼워진 상태'는 자궁내막증식증(endometrial hyperplasia), '자궁경부관 내 용종 형성'은 자궁내막용종, '난소 내에만 국한'은 잘못된 정의이며 자궁내막증은 다발성으로 발생합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁내막증 병변의 조직검사에서 관찰되는 전형적인 소견은?", "options": [{"letter": "A", "text": "섬유화 조직과 만성 염증세포 침윤만 관찰"}, {"letter": "B", "text": "평활근 다발이 증식된 양상"}, {"letter": "C", "text": "호산구성 침윤물과 림프구 집합체"}, {"letter": "D", "text": "자궁내막샘과 기질, 그리고 헤모시데린이 침착된 대식세포"}, {"letter": "E", "text": "비정형 상피세포와 심한 핵 이형성"}], "answer": "D", "explanation": "자궁내막증의 확진은 자궁내막샘(endometrial gland)과 기질(stroma)이 이소성으로 존재하며, 헤모시데린을 탐식한 대식세포(hemosiderin-laden macrophage)가 함께 관찰됩니다. 비정형 상피세포와 핵 이형성은 암성 변화를 시사하고, 섬유화와 만성 염증만으로는 진단에 불충분하며, 평활근 증식은 자궁근종, 호산구 침윤은 다른 염증성 질환에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁내막종의 MRI 소견으로 올바른 것은?", "options": [{"letter": "A", "text": "T1 강조영상에서 저신호, T2 강조영상에서 고신호"}, {"letter": "B", "text": "조영증강되는 고형 성분"}, {"letter": "C", "text": "T1과 T2 모두에서 고신호를 보이는 단순 낭종"}, {"letter": "D", "text": "낭종 내 공기-액체 층(air-fluid level) 형성"}, {"letter": "E", "text": "T1 강조영상에서 고신호를 보이며 중력에 의한 혈액-액체 층(fluid-fluid level)이 관찰될 수 있다"}], "answer": "E", "explanation": "자궁내막종은 혈액 성분 때문에 T1 강조영상에서 고신호를 띠며, 오래된 혈액과 신선한 혈액이 층을 이루어 fluid-fluid level을 형성할 수 있습니다. T2에서는 저신호(shading)를 보이는 경우가 많습니다. 공기-액체 층은 농양, 조영증강 고형 성분은 종양의 소견입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 자궁내막증식증(단순 증식증, 이형성 없음)으로 진단된 35세 여성에게 가장 적절한 치료 방침은?", "options": [{"letter": "A", "text": "프로게스틴 치료"}, {"letter": "B", "text": "에스트로겐 보충"}, {"letter": "C", "text": "대증적 진통제"}, {"letter": "D", "text": "전자궁절제술"}, {"letter": "E", "text": "GnRH agonist 치료"}], "answer": "A", "explanation": "비정형성이 없는 자궁내막증식증은 에스트로겐 과잉 상태이므로 프로게스틴을 투여하여 자궁내막을 분비기로 전환시키고 증식증을 퇴행시킬 수 있다. 전자궁절제술은 비정형 증식증이나 치료에 반응하지 않는 경우, 또는 악성 위험성이 높을 때 고려한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 자궁선근증(adenomyosis)의 임상적 특징으로 가장 올바른 것은?", "options": [{"letter": "A", "text": "자궁이 비대해지고 월경통이 심하며, GnRH agonist에 호전될 수 있다"}, {"letter": "B", "text": "진단은 복강경 검사로만 확진할 수 있다"}, {"letter": "C", "text": "자궁내막증과 동반되는 경우가 드물다"}, {"letter": "D", "text": "초음파에서 난소 낭종 소견이 특징적이다"}, {"letter": "E", "text": "주로 무증상이다"}], "answer": "A", "explanation": "자궁선근증은 자궁근층 내에 이소성 자궁내막이 존재하여 자궁 확대와 심한 월경통, 과다월경을 일으킨다. GnRH agonist는 일시적으로 무월경을 유도해 증상을 완화시킬 수 있다. 초음파나 MRI로 근층 내 특징적 소견을 확인하며, 복강경보다는 영상 검사가 우선 진단 도구다. 자궁내막증과 흔히 동반될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 20세 여성에서 운동성이 있고 통증이 없는 4cm 크기의 균질한 무에코 낭종이 우연히 발견된 경우, 가장 적절한 처치는?", "options": [{"letter": "A", "text": "즉시 복강경 낭종절제술"}, {"letter": "B", "text": "GnRH agonist 투여"}, {"letter": "C", "text": "혈청 CA-125 및 MRI 촬영"}, {"letter": "D", "text": "경구피임약 처방"}, {"letter": "E", "text": "4~8주 후 초음파 재검사"}], "answer": "E", "explanation": "가임기 여성의 단순 낭종은 대부분 난 과소월경이 발생한 경우 자궁내 유착, 즉 Asherman 증후군을 의심해야 한다. 이는 자궁내막의 손상으로 자궁벽이 유착되어 발생한다. 난소 부전은 FSH 상승을 동반하며, 뇌하수체 선종은 고프로락틴혈증이나 두통 등을 유발할 수 있다. PCOS는 불규칙 월경의 병력이 있고, 임신은 hCG 검사로 감별한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁 내 유착증(Asherman syndrome)의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "과거 자궁경부 소파 수술(curettage)력"}, {"letter": "B", "text": "자궁근종 절제술(myomectomy)"}, {"letter": "C", "text": "장기간의 경구 피임약 복용"}, {"letter": "D", "text": "선천성 자궁 기형"}, {"letter": "E", "text": "만성 자궁내막염"}], "answer": "A", "explanation": "Asherman 증후군은 대부분 임신 관련 소파 수술(유산이나 분만 후) 후 자궁내막 기저층 손상으로 인해 발생한다. 만성 자궁내막염(특히 결핵)도 드물게 유착을 일으킬 수 있지만, 소파 수술이 가장 흔한 원인이다. 선천성 기형이나 근종 절제술, 피임약 복용은 직접적인 원인이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "30세 여성이 3개월간의 무월경 후 지속적 질출혈로 내원하였다. 초음파검사에서 자궁내막두께가 16mm로 두꺼워져 있었고, 자궁내막생검 결과 '비정형이 없는 단순 자궁내막증식증(simple endometrial hyperplasia without atypia)'으로 진단되었다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경구용 프로게스틴(예: 메드록시프로게스테론 아세테이트)"}, {"letter": "B", "text": "에스트로겐 단독 요법"}, {"letter": "C", "text": "정기적 경과 관찰"}, {"letter": "D", "text": "항에스트로겐 제제"}, {"letter": "E", "text": "자궁절제술"}], "answer": "A", "explanation": "비정형이 없는 자궁내막증식증은 자궁내막암으로 진행할 위험이 낮으며, 프로게스틴 치료(경구 또는 LNG-IUS)로 대부분 호전됩니다. 에스트로겐 단독 요법은 오히려 병변을 악화시키므로 금기이며, 자궁절제술은 비정형이 없는 경우 과잉 치료입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁내막암 발생 위험을 높이는 인자로 옳은 것은?", "options": [{"letter": "A", "text": "다낭성 난소 증후군"}, {"letter": "B", "text": "타목시펜 사용"}, {"letter": "C", "text": "장기간 무배란 주기"}, {"letter": "D", "text": "비만"}, {"letter": "E", "text": "경구 피임약 복용"}], "answer": "E", "explanation": "경구 피임약은 자궁내막암 위험을 감소시킵니다. 나머지 선택지(비만, 다낭성 난소 증후군, 타목시펜, 장기간 무배란 주기)는 모두 비대항성 에스트로겐 노출을 증가시켜 자궁내막 증식증과 암 위험을 높입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "34세 불임 여성에서 자궁내시경 검사 상 자궁강을 변형시키는 점막하 근종이 발견되었다. 다음 중 가장 적절한 치료는?", "options": [{"letter": "A", "text": "GnRH 작용제 투여"}, {"letter": "B", "text": "기대 요법"}, {"letter": "C", "text": "자궁근종절제술"}, {"letter": "D", "text": "클로미펜 투여"}, {"letter": "E", "text": "체외수정 시술"}], "answer": "C", "explanation": "자궁강을 변형시키는 점막하 근종은 착상을 방해하므로, 이를 절제하면 임신율을 약 50% 향상시킬 수 있다. 다른 치료는 근종을 제거하지 않으므로 효과가 제한적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "다음 중 자궁선근증(adenomyosis)의 영상 소견으로 가장 특징적인 것은?", "options": [{"letter": "A", "text": "자궁내막 용종"}, {"letter": "B", "text": "근층 내 경계가 명확한 종괴"}, {"letter": "C", "text": "나팔관 확장"}, {"letter": "D", "text": "접합부(junctional zone) 비후"}, {"letter": "E", "text": "난소 낭종"}], "answer": "D", "explanation": "자궁선근증은 자궁내막 조직이 근층 내로 침윤한 상태로, MRI에서 접합부 비후(>12mm)가 특징적이다. 근종은 경계가 명확한 종괴로 보이며, 나머지는 자궁선근증과 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "32세 여성이 과거 소파수술 후 월경량이 현저히 감소하였다. 자궁난관조영술에서 자궁강 내 충만결손이 관찰되고, 조영제 주입 시 심한 저항이 있었다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "자궁근종"}, {"letter": "B", "text": "자궁내막증"}, {"letter": "C", "text": "자궁내막용종"}, {"letter": "D", "text": "자궁선근증"}, {"letter": "E", "text": "아셔만증후군"}], "answer": "E", "explanation": "소파술 후 무월경 또는 월경량 감소, 자궁난관조영술상 충만결손과 저항은 자궁내강 유착을 시사하며, 이는 아셔만증후군의 전형적 소견입니다. 진단은 자궁경검사로 확진합니다. 자궁근종이나 용종은 주로 충만결손을 보이나 저항은 드물고, 자궁선근증은 MRI 소견이 다릅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "33세 여성이 임신을 계획 중이며 건강검진에서 골반초음파 결과 자궁에 4cm 점막밑이 아닌 근층내 근종이 발견되었다. 월경은 규칙적이고 통증이나 과다 출혈은 없다. 이 여성에게 가장 적절한 조치는?", "options": [{"letter": "A", "text": "경과 관찰"}, {"letter": "B", "text": "자궁동맥색전술"}, {"letter": "C", "text": "근종절제술 후 임신 시도"}, {"letter": "D", "text": "자궁절제술"}, {"letter": "E", "text": "GnRH 작용제 치료 후 임신 시도"}], "answer": "A", "explanation": "증상이 없는 근층내 근종은 임신에 큰 영향을 주지 않으므로 수술 없이 경과 관찰이 권장됩니다. 근종절제술은 자궁강 변형, 통증, 과다출혈 등 증상이 있거나 불임의 원인으로 밝혀진 경우에 시행합니다. GnRH 작용제는 일시적 폐경 유도로 근종 크기 감소를 목적으로 하나 임신 전에는 권장되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "44세 여성이 월경과다와 심한 월경통으로 내원하였다. 골반 MRI에서 자궁 후벽이 비대칭적으로 두꺼워져 있고 경계가 불분명한 저음영 병변이 관찰되어 자궁선근증으로 진단되었다. 자궁보존을 원할 때 가장 적절한 치료는?", "options": [{"letter": "A", "text": "경구피임약"}, {"letter": "B", "text": "자궁동맥색전술"}, {"letter": "C", "text": "레보놀게스트렐 분비 자궁내 장치(LNG-IUD)"}, {"letter": "D", "text": "GnRH 작용제"}, {"letter": "E", "text": "자궁근종절제술"}], "answer": "C", "explanation": "자궁선근증에서 자궁을 보존하며 월경과다와 월경통을 조절하는 1차 치료는 레보놀게스트렐 분비 자궁내 장치(LNG-IUD)입니다. GnRH 작용제는 일시적인 효과만 있고, 자궁근종절제술은 근종이 아니므로 부적절합니다. 자궁동맥색전술은 시도할 수 있으나 LNG-IUD가 우선 권고됩니다. 경구피임약도 증상 조절에 사용되나 LNG-IUD가 더 효과적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종(leiomyoma)의 유병률에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "가임기 여성의 5~10%에서 발견된다"}, {"letter": "B", "text": "35세 이상 여성의 40~50%에서 발견된다"}, {"letter": "C", "text": "연령 증가에 따라 유병률이 감소한다"}, {"letter": "D", "text": "흑인보다 백인에서 유병률이 높다"}, {"letter": "E", "text": "폐경 후 여성에서 가장 흔하게 진단된다"}], "answer": "B", "explanation": "정답은 '35세 이상 여성의 40~50%에서 발견된다'이다. 강의에서 가임기 여성에서는 20~30%, 35세 이상에서는 40~50%로 언급되었다. 가임기 5~10%는 너무 낮으며, 폐경 후에는 근종이 쇠퇴하므로 가장 흔히 진단되는 시기는 가임기 후반~폐경 이행기이다. 흑인에서 유병률이 높고, 연령 증가에 따라 폐경 전까지는 증가 추세이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "FIGO 분류에 따르면, 점막하근종 중 자궁근층에 50% 이상 묻혀 있는 형태는 어느 것인가?", "options": [{"letter": "A", "text": "FIGO 6형"}, {"letter": "B", "text": "FIGO 1형"}, {"letter": "C", "text": "FIGO 7형"}, {"letter": "D", "text": "FIGO 2형"}, {"letter": "E", "text": "FIGO 0형"}], "answer": "D", "explanation": "정답은 'FIGO 2형'이다. 강의에서 언급된 FIGO 분류: 0형은 pedunculated submucosal, 1형은 <50% intramural, 2형은 ≥50% intramural, 6형은 <50% subserosal, 7형은 pedunculated subserosal. 따라서 50% 이상 근층에 묻힌 점막하근종은 2형이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종 환자에서 점막하근종(submucosal myoma)이 유발하는 가장 특징적인 증상은 무엇인가?", "options": [{"letter": "A", "text": "성교통 (dyspareunia)"}, {"letter": "B", "text": "만성 골반통"}, {"letter": "C", "text": "배뇨 곤란과 빈뇨"}, {"letter": "D", "text": "무증상 골반 종괴"}, {"letter": "E", "text": "월경과다 (menorrhagia)"}], "answer": "E", "explanation": "정답은 '월경과다 (menorrhagia)'이다. 강의에서는 점막하근종이 자궁강 안으로 돌출되어 내막 표면적 증가, 자궁 수축 방해, 혈류 증가 등으로 과다월경을 주로 유발한다고 설명한다. 배뇨 증상은 큰 장막하근종이 방광을 압박할 때 발생하며, 성교통이나 만성 골반통은 선근증에서 더 두드러질 수 있다. 무증상 종괴는 근종의 크기가 작거나 장막하일 때 가능하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종으로 인한 월경과다 환자에게 NSAID를 투여할 때 기대할 수 있는 출혈량 감소 효과는 어느 정도인가?", "options": [{"letter": "A", "text": "약 70% 감소"}, {"letter": "B", "text": "약 30% 감소"}, {"letter": "C", "text": "약 10% 감소"}, {"letter": "D", "text": "출혈량 변화 없음"}, {"letter": "E", "text": "약 50% 감소"}], "answer": "B", "explanation": "정답은 '약 30% 감소'이다. 강의에서 월경과다에서 NSAID를 투약하면 약 30%의 출혈량 감소 효과를 기대할 수 있다고 명시되었다. 10%는 너무 낮고, 50% 이상은 과장된 수치이며, 출혈량 변화가 없다는 것은 임상 경험과 맞지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종의 수술 적응증에 해당하는 것은?", "options": [{"letter": "A", "text": "3cm 크기의 무증상 근종"}, {"letter": "B", "text": "1년간 최대 직경이 1cm에서 3cm로 증가"}, {"letter": "C", "text": "폐경 후 근종 크기가 약간 감소"}, {"letter": "D", "text": "6개월간 크기 변화 없이 관찰"}, {"letter": "E", "text": "경미한 생리통이 월 1회 발생"}], "answer": "B", "explanation": "정답은 '1년간 최대 직경이 1cm에서 3cm로 증가'이다. 강의에서는 1년 안에 2배로 커지거나 단기간에 급격히 성장하는 경우 unusual, 혹은 악성 변성(leiomyosarcoma) 가능성을 시사하므로 수술 적응증으로 강조한다. 경미한 통증이나 3cm 무증상, 폐경 후 감소하는 경우는 수술하지 않는다. 6개월간 변화 없음도 경과 관찰 대상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁선근증(adenomyosis)의 병리학적 진단 기준은 무엇인가?", "options": [{"letter": "A", "text": "자궁근층 내 자궁내막 선(gland)과 기질(stroma)의 존재"}, {"letter": "B", "text": "자궁강 내막의 국소적 비후"}, {"letter": "C", "text": "자궁근층 내 평활근의 양성 증식"}, {"letter": "D", "text": "복막 표면에 자궁내막 조직의 착상"}, {"letter": "E", "text": "자궁근층 내 섬유화 조직의 증식"}], "answer": "A", "explanation": "정답은 '자궁근층 내 자궁내막 선(gland)과 기질(stroma)의 존재'이다. 선근증은 자궁내막 선과 기질이 자궁근층 내로 침윤하는 질환으로, 강의에서도 '내막샘과 기질 조직이 자궁근층 속에서 생기는 것'이라고 설명했다. 섬유화 조직 증식이나 평활근 증식은 근종에 해당하며, 복막 표면 착상은 endometriosis이다. 내막의 국소 비후는 진단 기준이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁선근증을 시사하는 초음파 소견으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "자궁내막 라인의 균일한 비후"}, {"letter": "B", "text": "자궁근층의 비대칭적 두께 증가"}, {"letter": "C", "text": "자궁근층 내 명확한 경계의 저에코 종괴"}, {"letter": "D", "text": "자궁강 내부의 유경성(pedunculated) 종괴"}, {"letter": "E", "text": "cul-de-sac에 다량의 free fluid"}], "answer": "B", "explanation": "정답은 '자궁근층의 비대칭적 두께 증가'이다. 강의에서 초음파 사진을 설명할 때 anterior wall보다 posterior wall이 훨씬 두꺼워진 것을 보여주며, 국소적(focal)인 선근증을 시사한다고 하였다. 경계가 명확한 종괴는 근종의 특징이고, 균일한 내막 비후는 hyperplasia, cul-de-sac free fluid는 ectopic rupture에서 보인다. 유경성 종괴는 점막하근종에 해당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "증상이 심한 자궁선근증 환자에서 병변을 완전히 제거할 수 있는 가장 확실한 치료법은 무엇인가?", "options": [{"letter": "A", "text": "자궁근종절제술 (myomectomy)"}, {"letter": "B", "text": "GnRH agonist 주사"}, {"letter": "C", "text": "자궁동맥색전술 (UAE)"}, {"letter": "D", "text": "자궁적출술 (hysterectomy)"}, {"letter": "E", "text": "경구피임제 복용"}], "answer": "D", "explanation": "정답은 '자궁적출술 (hysterectomy)'이다. 선근증은 병변이 불분명한 경계로 근층 전체에 산재하므로 근종처럼 절제가 불가능하며, 자궁을 통째로 적출해야 병변을 완전히 없앨 수 있다고 강의에서 명시되었다. 약물치료(경구피임제, GnRH agonist)는 증상 완화 목적이며, myomectomy는 선근증에 적용되지 않는다. UAE는 출혈을 줄일 수 있으나 병변을 없애지는 못하고 효과가 떨어진다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종의 위험인자에 해당하는 것은?", "options": [{"letter": "A", "text": "후기 초경"}, {"letter": "B", "text": "금주"}, {"letter": "C", "text": "다산력"}, {"letter": "D", "text": "저체중"}, {"letter": "E", "text": "빠른 초경 연령"}], "answer": "E", "explanation": "정답은 '빠른 초경 연령'이다. 강의에서 초경이 빠르면 월경 횟수가 늘어나 에스트로겐 노출이 증가하고 근종 발생 위험이 커진다고 하였다. 다산력은 오히려 위험을 감소시키며, 후기 초경과 저체중은 위험 감소 인자이다. 금주는 근종과 직접적 관련이 적고, 오히려 음주가 위험을 높일 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "점막하근종이 자궁근층 내로 어느 정도 침범했는지 평가하기에 가장 적합한 영상 검사는?", "options": [{"letter": "A", "text": "골반 MRI"}, {"letter": "B", "text": "생리식염수 주입 초음파 (SIS)"}, {"letter": "C", "text": "복부 초음파"}, {"letter": "D", "text": "골반 CT"}, {"letter": "E", "text": "자궁난관조영술 (HSG)"}], "answer": "B", "explanation": "정답은 '생리식염수 주입 초음파 (SIS)'이다. 강의에서 saline을 자궁 내 주입하여 근종이 근층 밖으로 튀어나온 정도를 직접 확인함으로써 FIGO 분류에 도움을 준다고 설명했다. 일반 복부 초음파는 장막하 근종 관찰에 유리하고, CT는 작은 근종 감별이 어려우며, MRI는 비싸고 모든 환자에게 1차적으로 사용하지 않는다. HSG는 자궁강 내 윤곽을 보지만 근층 내 비율 평가에는 부적합하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종 치료를 위한 자궁동맥색전술(UAE)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "정상 자궁조직의 혈류에는 영향을 주지 않는다"}, {"letter": "B", "text": "임신을 희망하는 환자에게 1차 치료로 권장된다"}, {"letter": "C", "text": "점막하근종에 가장 효과적인 치료법이다"}, {"letter": "D", "text": "임신을 원하는 환자에게는 권장되지 않는다"}, {"letter": "E", "text": "근종을 완전히 제거하여 재발이 없다"}], "answer": "D", "explanation": "정답은 '임신을 원하는 환자에게는 권장되지 않는다'이다. 강의에서 UAE는 자궁 전체 혈류를 차단하여 정상 내막에도 const TOTAL_Q = 752;
const HAS_ANY_SLIDES = true;
const IS_V2_SINGLE_SECTION = true;

// ── State ───────────────────────────────────────────────────────────────────
let answeredCount = 0;
let wrongCount = 0;
let answered = {};          // "si-qi" → true
let currentSectionIdx = -1;
let excludedOptions = new Map();  // Map<"si-qi", Set<letter>>

// Annotation engine state (declared early — accessed by updateSlideCol/_annoSaveToStore)
let _annoMode = false;
let _annoTool = 'pen';
let _annoColor = '#ef4444';

let _currentAnnoSlideIdx = 0;
