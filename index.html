<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLRF Review — REI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
    --accent: #2563eb; --accent-light: #eff6ff;
    --correct: #16a34a; --wrong: #dc2626;
    --text: #1e293b; --text2: #64748b; --border: #e2e8f0;
    --font-size: 16px;
  }
  html { font-size: var(--font-size); }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ── Header (FTM flex column) ────────────────────────────────────────── */
  #header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center;
    flex-shrink: 0; flex-wrap: wrap;
  }
  #header > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #header { gap: 12px; }
    #header > * + * { margin-left: 0; }
  }
  #header h1 { font-size: 1rem; color: var(--accent); font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #progress-bar-wrap {
    flex: 1; min-width: 120px; height: 6px;
    background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  #progress-bar { height: 100%; width: 0%; background: var(--accent);
    border-radius: 3px; transition: width .3s; }
  #progress-label { font-size: .82rem; color: var(--text2); white-space: nowrap; }
  #wrong-badge {
    background: var(--wrong); color: #fff; border-radius: 12px;
    padding: 2px 10px; font-size: .78rem; font-weight: 600; display: none;
  }
  .font-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: .82rem;
    transition: background .15s, color .15s;
  }
  .font-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .font-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #btn-hide-img, #btn-review {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; font-size: .82rem; white-space: nowrap;
  }
  #btn-hide-img:hover, #btn-review:hover {
    background: var(--accent-light); border-color: var(--accent); color: var(--accent);
  }
  #btn-review.active { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  #gemini-btn {
    padding: 4px 10px; border-radius: 6px; border: none;
    background: #eef2ff; color: #4338ca; cursor: pointer;
    font-size: .78rem; font-weight: 600; white-space: nowrap;
    outline: 1px solid #c7d7fe;
  }
  #gemini-btn:hover { background: #e0e7ff; outline-color: var(--accent); }
  #generated-label { font-size: .72rem; color: var(--text2); margin-left: auto; white-space: nowrap; }

  /* ── Main layout ─────────────────────────────────────────────────────── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: slide panel (DRP scroll-snap, dark bg) ───────────────────── */
  #slide-col {
    width: 42%; min-width: 20%; max-width: 70%;
    background: #1e293b; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  #slide-col::-webkit-scrollbar { display: none; }
  #slide-col { scrollbar-width: none; }
  .slide-page-item {
    height: calc(100vh - 52px); scroll-snap-align: start;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; gap: .5rem; flex-shrink: 0;
    position: relative;
  }
  .slide-canvas-wrap {
    position: relative; display: inline-block; line-height: 0;
  }
  .slide-canvas-wrap img {
    max-width: 100%; max-height: calc(100% - 40px);
    object-fit: contain; border-radius: 6px; cursor: zoom-in;
  }
  .anno-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; border-radius: 6px;
  }
  .anno-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  .slide-page-meta {
    color: #94a3b8; font-size: .75rem; text-align: center;
  }
  .slide-page-badge {
    position: absolute; bottom: 1rem; right: 1rem;
    background: rgba(0,0,0,.5); color: #94a3b8;
    font-size: .7rem; padding: 3px 8px; border-radius: 99px;
  }
  #no-slide-msg {
    color: #94a3b8; font-size: .85rem; text-align: center;
    padding: 40px 0; display: none;
  }

  /* ── Annotation toolbar (vertical bar between slide-col and divider) ── */
  #anno-toolbar {
    width: 44px; flex-shrink: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: #1e293b; color: #cbd5e1;
    padding: 8px 4px; gap: 3px;
    border-right: 1px solid #334155;
  }
  .anno-mode, .anno-tool, #anno-undo, #anno-clear, #anno-clear-all {
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
    font-size: .82rem; display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0;
  }
  .anno-mode:hover, .anno-tool:hover, #anno-undo:hover, #anno-clear:hover, #anno-clear-all:hover {
    background: #334155; color: #e2e8f0;
  }
  .anno-mode.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .anno-tool.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .anno-mode:disabled, .anno-tool:disabled,
  #anno-undo:disabled, #anno-clear:disabled, #anno-clear-all:disabled {
    opacity: .35; cursor: default;
  }
  .anno-sep {
    border: none; border-top: 1px solid #334155;
    width: 28px; margin: 2px 0; padding: 0;
  }
  #anno-color {
    width: 28px; height: 28px; border: 1px solid #334155;
    border-radius: 6px; cursor: pointer; background: none; padding: 1px;
  }
  #anno-size {
    width: 4px; height: 60px; accent-color: #3b82f6; cursor: pointer;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: bt-lr; background: transparent;
  }
  /* Safari / older Samsung Internet: range slider track & thumb */
  #anno-overlay-size::-webkit-slider-runnable-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #3b82f6; border-radius: 50%; margin-top: -5px;
  }
  #anno-overlay-size::-moz-range-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-moz-range-thumb {
    width: 14px; height: 14px; background: #3b82f6;
    border: none; border-radius: 50%;
  }

  /* ── Annotation slide nav (mobile draw mode) ─────────────────────────── */
  #anno-slide-nav {
    position: sticky; top: 0; z-index: 20;
    display: none; justify-content: center; align-items: center;
    padding: 8px;
    background: rgba(15,23,42,.95); flex-shrink: 0;
  }
  #anno-slide-nav > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #anno-slide-nav { gap: 12px; }
    #anno-slide-nav > * + * { margin-left: 0; }
  }
  #anno-slide-nav button {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: .9rem; display: flex; align-items: center; justify-content: center;
  }
  #anno-slide-nav button:hover { background: #334155; }
  #anno-slide-nav button:disabled { opacity: .3; cursor: default; }
  #anno-slide-counter { color: #94a3b8; font-size: .78rem; }

  /* ── Divider (DRP % based + touch) ──────────────────────────────────── */
  #divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
    z-index: 10; display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }
  body.resizing { cursor: col-resize; user-select: none; }
  #divider::after {
    content: '⋮'; color: #94a3b8; font-size: 14px; pointer-events: none;
  }
  #divider:hover::after, #divider.dragging::after { color: #fff; }

  /* ── Right: quiz panel ──────────────────────────────────────────────── */
  #quiz-col {
    flex: 1; min-width: 20%; padding: 1.25rem 1.5rem 50vh;
    overflow-y: auto; overflow-x: hidden;
  }

  /* ── Section ────────────────────────────────────────────────────────── */
  .page-section {
    margin-bottom: 2.5rem;
    scroll-margin-top: 16px;
  }
  .section-header {
    font-size: .75rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 1rem;
  }

  /* ── Question card ──────────────────────────────────────────────────── */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; transition: border-color .2s;
  }
  .q-card.focused { border-color: var(--accent); }
  .q-card.correct-card { border-color: var(--correct); }
  .q-card.wrong-card { border-color: var(--wrong); }
  /* V2 individual question cards: tighter spacing for scrollable list */
  .q-card.v2-card {
    margin-bottom: 0.75rem;
    scroll-margin-top: 1rem;  /* for scrollIntoView */
  }
  .q-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: .75rem; gap: 8px;
  }
  .q-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: .85rem; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .q-nav button:hover { background: var(--accent-light); color: var(--accent); }
  .q-nav button:disabled { opacity: .3; cursor: default; }
  .q-slide-link {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent); font-size: .72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: background .15s, border-color .15s;
  }
  .q-slide-link:hover { background: var(--accent-light); border-color: var(--accent); }
  .q-counter { font-size: .8rem; color: var(--text2); font-weight: 500; }

  /* Card metadata badges */
  .card-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge {
    background: var(--surface2); border-radius: 10px;
    padding: 2px 8px; font-size: .7rem; color: var(--text2);
  }
  .badge-num {
    background: var(--accent); color: #fff;
  }
  .badge-basket-cc {
    background: #f59e0b; color: #fff;
  }
  .badge-basket-mech {
    background: #8b5cf6; color: #fff;
  }
  .badge-basket-diff {
    background: #ec4899; color: #fff;
  }
  .badge-mesh-diff {
    background: #0ea5e9; color: #fff;
  }
  .q-type-divider {
    display: flex; align-items: center;
    margin-bottom: 10px; padding: 6px 0;
    color: #0ea5e9; font-size: .78rem; font-weight: 600;
    letter-spacing: .3px;
  }
  .q-type-divider > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    .q-type-divider { gap: 8px; }
    .q-type-divider > * + * { margin-left: 0; }
  }
  .q-type-divider::before, .q-type-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
  }

  .q-text { font-size: .92rem; line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }

  /* ── Options (FTM: letter + text + exclude X) ───────────────────────── */
  .options { display: flex; flex-direction: column; margin-bottom: .75rem; }
  .options > * + * { margin-top: .45rem; }
  @supports (gap: 0px) {
    .options { gap: .45rem; }
    .options > * + * { margin-top: 0; }
  }
  .option {
    display: flex; align-items: flex-start; gap: 8px;
    padding: .55rem .85rem; border-radius: 7px;
    border: 1.5px solid var(--border); cursor: pointer;
    font-size: .88rem; line-height: 1.45;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .option:hover:not(.locked):not(.excluded) {
    border-color: var(--accent); background: var(--accent-light);
  }
  .option.correct { border-color: var(--correct); background: #f0fdf4;
    color: var(--correct); font-weight: 600; }
  .option.wrong { border-color: var(--wrong); background: #fef2f2;
    color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.excluded {
    background: #fef2f2; border-color: var(--wrong); opacity: .6;
    cursor: default;
  }
  .option.excluded .exclude-btn {
    background: var(--wrong); color: #fff; border-color: var(--wrong);
  }
  .letter { font-weight: 700; color: var(--accent); min-width: 16px; flex-shrink: 0; }
  .opt-text { flex: 1; }
  .exclude-btn {
    margin-left: auto; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .exclude-btn:hover { background: var(--surface2); }

  /* ── Answer box ─────────────────────────────────────────────────────── */
  .answer-box {
    display: none; margin-top: .75rem; padding: .75rem;
    background: var(--accent-light); border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .answer-box.show { display: block; }
  .correct-badge {
    background: var(--correct); color: #fff; border-radius: 10px;
    padding: 2px 10px; font-size: .78rem; display: inline-block;
    margin-bottom: 6px; font-weight: 600;
  }
  .explanation { font-size: .85rem; line-height: 1.55; color: #334155; }

  /* ── Highlighter (text selection → mark) ─────────────────────── */
  .hl-mark {
    background: #fef08a; border-radius: 2px; padding: 0 1px;
    cursor: pointer;
  }
  .hl-mark:hover { opacity: .7; }
  .mesh-path-box {
    margin-top: 8px; padding: 8px 10px;
    background: #fef3c7; border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    font-size: .82rem; line-height: 1.5; color: #92400e;
  }

  /* ── Key Content box (DRP conditional) ──────────────────────────────── */
  .key-content-box {
    margin-top: 1rem; padding: .85rem 1rem;
    background: #fefce8; border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b; border-radius: 0 8px 8px 0;
    font-size: .85rem; line-height: 1.6; color: #78350f;
  }
  .key-content-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #92400e; margin-bottom: .35rem;
  }

  /* ── MeSH overlay (totalmesh / chunkmesh) ────────────────────────────── */
  .mesh-overlay-box {
    margin-top: .7rem; padding: .75rem 1rem;
    border-radius: 0 8px 8px 0;
    font-size: .82rem; line-height: 1.6;
  }
  .totalmesh-box {
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-left: 4px solid #2563eb; color: #1e3a5f;
  }
  .chunkmesh-box {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-left: 4px solid #16a34a; color: #14532d;
  }
  .mesh-overlay-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: .35rem;
  }
  .mesh-overlay-text {
    margin: 0; white-space: pre-wrap; font-family: inherit;
    font-size: .8rem; line-height: 1.5;
  }
  .learning-path-panel {
    margin: .7rem 0; padding: .75rem 1rem;
    background: #fef2f2; border: 1px solid #fecaca;
    border-left: 4px solid #dc2626; border-radius: 0 8px 8px 0;
  }
  .learning-path-title {
    font-size: .75rem; font-weight: 700; color: #991b1b;
    margin-bottom: .5rem;
  }

  /* ── Expandable transcript (FTM conditional) ────────────────────────── */
  .chunk-detail { margin-top: .5rem; }
  .chunk-detail summary {
    font-size: .75rem; color: var(--text2); cursor: pointer;
  }
  .chunk-text {
    font-size: .75rem; color: var(--text2); margin-top: 6px;
    line-height: 1.5; white-space: pre-wrap;
    max-height: 160px; overflow-y: auto;
  }

  /* ── Image fullscreen overlay (DRP) ─────────────────────────────────── */
  #img-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 300;
    cursor: zoom-out; align-items: center; justify-content: center;
  }
  #img-overlay.show { display: flex; }
  #img-container {
    position: relative; display: inline-block; line-height: 0;
  }
  #img-container img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 6px; transition: transform .1s ease;
    transform-origin: center center;
  }
  #anno-overlay-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border-radius: 6px;
    pointer-events: none;
  }
  #anno-overlay-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  #anno-overlay-toolbar {
    display: none; position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 310;
    align-items: center; flex-wrap: wrap;
    background: rgba(15,23,42,.95); color: #cbd5e1;
    padding: 8px 14px; border-radius: 12px; font-size: .78rem;
  }
  #anno-overlay-toolbar.show { display: flex; }
  #anno-overlay-toolbar > * + * { margin-left: 4px; }
  @supports (gap: 0px) {
    #anno-overlay-toolbar { gap: 4px; }
    #anno-overlay-toolbar > * + * { margin-left: 0; }
  }

  /* ── Review overlay (DRP full-screen) ───────────────────────────────── */
  #review-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    z-index: 200; flex-direction: column;
  }
  #review-overlay.show { display: flex; }
  #review-header {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #review-title { font-size: .95rem; font-weight: 700; color: var(--accent); }
  #review-close {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: .85rem;
  }
  #review-close:hover { background: #fef2f2; border-color: var(--wrong); color: var(--wrong); }
  #review-body { flex: 1; display: flex; overflow: hidden; }
  #review-slide-col {
    width: 42%; min-width: 20%; max-width: 70%; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain; background: #1e293b;
    -webkit-overflow-scrolling: touch;
  }
  #review-slide-col::-webkit-scrollbar { display: none; }
  #review-slide-col { scrollbar-width: none; }
  #review-slide-col img {
    width: 100%; height: auto; object-fit: contain; display: block;
  }
  #review-divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
  }
  #review-divider:hover, #review-divider.dragging { background: var(--accent); }
  #review-quiz-col {
    flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem 50vh;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Inline slides (portrait only) ──────────────────────────────────── */
  .inline-slides { display: none; margin-bottom: .75rem; }
  /* Safari < 15 fallback: padding-bottom trick maintains 16:9 ratio */
  .inline-slide-viewer {
    position: relative; background: #1e293b; border-radius: 8px;
    overflow: hidden; width: 100%; padding-bottom: 56.25%; height: 0;
  }
  .inline-slide-viewer > * {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @supports (aspect-ratio: 1) {
    .inline-slide-viewer {
      aspect-ratio: 16/9; padding-bottom: 0; height: auto;
      display: flex; align-items: center; justify-content: center;
    }
    .inline-slide-viewer > * {
      position: static; width: auto; height: auto;
    }
  }
  .inline-slide-img {
    max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;
  }
  .inline-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.45); color: #fff; border: none;
    border-radius: 50%; width: 32px; height: 32px; font-size: .9rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: background .15s;
  }
  .inline-nav-btn:hover { background: rgba(37,99,235,.8); }
  .inline-nav-btn:disabled { opacity: .2; cursor: default; }
  .inline-nav-btn.prev { left: 8px; }
  .inline-nav-btn.next { right: 8px; }
  .inline-slide-counter {
    text-align: center; font-size: .72rem; color: var(--text2); margin-top: 4px;
  }

  /* ── Portrait responsive (DRP) ──────────────────────────────────────── */

e748021734ffe9f6b0363f95e76cc.r2.dev/img/975b238a07fb57ed0e5a2efad5100959.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/836961c777b5152edddb41528ff9e402.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/bf2dbda75bd8018b19041b5883e342c9.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/6a54f33718e50db68ad1df09995ca99f.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/c2c7e895666570aa4adc195aa0022313.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/da3e3a93b89190eb98bc48d77067852b.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/6bebaa7f5cf15e95052e23b7d76257fb.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/0b0562d19dbd115c172fd8e221feb97f.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/d8f6b02aa791b6b59cad672e20b98d42.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/e95022d5212846056fb7aaa20509eb53.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/71f9be941a88f3dc2359558a3cf5cf43.png", "https://pub-81ee748021734ffe9f6b0363f95e76cc.r2.dev/img/14a04b719ce2af05cdf6d1396268cb9a.png"], "questions": [{"question": "Human papillomavirus (HPV) 백신 접종의 주된 목적으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁경부암 예방"}, {"letter": "B", "text": "질암 예방"}, {"letter": "C", "text": "유방암 예방"}, {"letter": "D", "text": "자궁내막암 예방"}, {"letter": "E", "text": "난소암 예방"}], "answer": "A", "explanation": "HPV 백신은 특히 HPV 16, 18형 등 고위험 유형의 감염을 막아 자궁경부암 및 전암 병변의 발생을 예방한다. 난소암, 자궁내막암, 유방암, 질암은 HPV와 직접적인 연관성이 낮거나 다른 병인이 주원인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부암 발생에서 인유두종 바이러스(HPV)의 발암 기전으로 옳은 것은?", "options": [{"letter": "A", "text": "E6 단백질이 retinoblastoma(Rb) 단백질과 결합하여 종양 억제 기능을 저해한다."}, {"letter": "B", "text": "HPV의 late protein인 L1과 L2가 숙주 세포의 종양 억제 유전자를 불활성화시킨다."}, {"letter": "C", "text": "E6와 E7 단백질이 함께 DNA 손상 복구를 촉진하여 발암을 유도한다."}, {"letter": "D", "text": "E7 단백질이 p53 단백질과 결합하여 세포 주기 조절을 방해한다."}, {"letter": "E", "text": "E6 단백질이 p53과, E7 단백질이 Rb와 각각 결합하여 종양 억제 유전자의 기능을 억제한다."}], "answer": "E", "explanation": "HPV의 발암 기전은 E6 단백질이 p53과 결합하여 p53의 종양 억제 기능을 방해하고, E7 단백질이 Rb 단백질과 결합하여 Rb의 세포 주기 조절 기능을 억제하는 것입니다. 다른 선택지는 각각 E6와 E7의 표적을 바꾸거나, 다른 기전을 설명하므로 틀렸습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종 바이러스(HPV)의 아형 중 자궁경부 상피내 종양과 자궁경부암을 가장 흔히 유발하는 고위험군은?", "options": [{"letter": "A", "text": "HPV 45형, 52형"}, {"letter": "B", "text": "HPV 58형, 59형"}, {"letter": "C", "text": "HPV 6형, 11형"}, {"letter": "D", "text": "HPV 16형, 18형"}, {"letter": "E", "text": "HPV 31형, 33형"}], "answer": "D", "explanation": "HPV 16형과 18형은 전 세계적으로 자궁경부암과 고등급 자궁경부 상피내 종양의 약 70%를 차지하는 가장 흔한 고위험군입니다. HPV 6형과 11형은 저위험군으로 첨규콘딜로마를 유발합니다. 나머지 31, 33, 45, 52, 58형도 고위험군이지만 빈도가 낮습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종 바이러스(HPV) 예방 백신 중 9가 백신이 포함하지 않는 HPV 아형은?", "options": [{"letter": "A", "text": "16형, 18형"}, {"letter": "B", "text": "45형, 52형"}, {"letter": "C", "text": "56형, 59형"}, {"letter": "D", "text": "6형, 11형"}, {"letter": "E", "text": "31형, 33형"}], "answer": "C", "explanation": "9가 백신은 HPV 6, 11, 16, 18, 31, 33, 45, 52, 58형을 포함합니다. 56형과 59형은 포함되지 않습니다. 16/18, 6/11, 31/33, 45/52/58은 모두 포함되므로 나머지가 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "고위험 인유두종 바이러스(HPV)의 발암 기전에서 종양단백질 E6와 E7이 각각 분해하거나 불활성화하는 주요 숙주 단백질은?", "options": [{"letter": "A", "text": "E6: telomerase, E7: p21"}, {"letter": "B", "text": "E6: Rb, E7: p53"}, {"letter": "C", "text": "E6: p16, E7: p53"}, {"letter": "D", "text": "E6: p21, E7: p16"}, {"letter": "E", "text": "E6: p53, E7: Rb"}], "answer": "E", "explanation": "고위험 HPV의 E6 단백질은 p53에 결합하여 유비퀴틴화를 통한 분해를 촉진하고, E7 단백질은 저인산화된 Rb 단백질에 결합하여 Rb-E2F 복합체를 해리시킴으로써 세포주기를 비정상적으로 진행시킨다. 이로 인해 세포의 불멸화와 암화가 유발된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부 상피내 종양(CIN)과 자궁경부암의 호발 부위로, 편평상피와 원주상피의 경계인 해부학적 구조는 무엇인가?", "options": [{"letter": "A", "text": "편평원주 이행대(Transformation zone)"}, {"letter": "B", "text": "골반저"}, {"letter": "C", "text": "외자궁경부"}, {"letter": "D", "text": "자궁경관"}, {"letter": "E", "text": "내자궁경부"}], "answer": "E", "explanation": "자궁경부의 편평원주 이행대(transformation zone)는 편평상피와 원주상피가 만나는 부위로, 지속적인 편평상피화생(squamous metaplasia)이 일어나며, HPV 감염과 이형성(dysplasia)이 주로 발생하여 CIN과 자궁경부암으로 진행하는 중요한 해부학적 위치입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종 바이러스(HPV) 감염의 자연 경과에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "HPV 16, 18형은 다른 고위험군에 비해 자연 소실률이 높다."}, {"letter": "B", "text": "폐경 후 여성에서는 감염이 잘 발생하지 않는다."}, {"letter": "C", "text": "감염된 대부분의 여성에서 1~2년 이내에 바이러스가 소실된다."}, {"letter": "D", "text": "감염 후 즉시 CIN 2,3으로 진행한다."}, {"letter": "E", "text": "저위험군 바이러스 감염은 저절로 소실되지 않는다."}], "answer": "C", "explanation": "HPV 감염은 매우 흔하며, 대부분의 감염은 자연 면역에 의해 1~2년 내에 소실됩니다. 소수에서만 지속 감염으로 진행하여 CIN과 암을 유발할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부 세포검사 결과 ASC-US(atypical squamous cells of undetermined significance)로 보고된 30세 여성에게 권장할 수 있는 적절한 추적 관리 방법은?", "options": [{"letter": "A", "text": "6개월 후 자궁경부 세포검사를 반복하거나 HPV DNA 검사를 시행한다."}, {"letter": "B", "text": "즉시 자궁경부 원추절제술을 시행한다."}, {"letter": "C", "text": "질확대경 검사, 내자궁경부 소파술, HPV 검사, 자궁내막 조직검사를 모두 시행한다."}, {"letter": "D", "text": "별도의 추적 검사 없이 1년 후 정기 검진을 권유한다."}, {"letter": "E", "text": "환자의 연령을 고려하여 LEEP을 우선 시행한다."}], "answer": "A", "explanation": "ASC-US의 표준 추적 관리로는 6개월 후 세포검사 반복, 고위험 HPV 검사, 또는 질확대경 검사가 있습니다. 즉시 원추절제술은 HSIL 등에서 시행합니다. AGC가 아닌 경우 광범위한 검사는 필요하지 않으며, 무조건 1년 후 관찰은 부적절합니다. LEEP은 치료 수단이므로 먼저 선택하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "자궁경부 세포검사에서 비정형 선세포(AGC, atypical glandular cells)가 발견된 경우 권장되는 평가 방법은?", "options": [{"letter": "A", "text": "질확대경 검사만 시행하여 병변 유무를 확인한다."}, {"letter": "B", "text": "HPV DNA 검사 양성이면 원추절제술을 시행한다."}, {"letter": "C", "text": "질확대경 검사, 내자궁경부 소파술, HPV 검사, 자궁내막 조직검사를 모두 시행한다."}, {"letter": "D", "text": "연령에 관계없이 진단적 자궁절제술을 고려한다."}, {"letter": "E", "text": "6개월 간격으로 자궁경부 세포검사만 추적 관찰한다."}], "answer": "C", "explanation": "AGC는 자궁경부뿐 아니라 자궁내막, 난관, 난소암의 가능성도 있으므로 질확대경, ECC, HPV 검사, 자궁내막 조직검사를 포함한 종합적인 평가가 필요합니다. 단순 추적 관찰이나 HPV 검사만으로는 불충분하며, 진단적 자궁절제술은 최종 수단입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "자궁경부 세포검사에서 HSIL(high-grade squamous intraepithelial lesion)이 확인된 환자에게 시행할 수 있는 적절한 처치는?", "options": [{"letter": "A", "text": "진단 확정을 위해 자궁절제술을 우선 권고한다."}, {"letter": "B", "text": "1년 후 자궁경부 세포검사 재검을 통해 추적한다."}, {"letter": "C", "text": "질확대경 검사 또는 환상투열절제술(LEEP)을 시행한다."}, {"letter": "D", "text": "질확대경 검사 없이 냉동치료를 먼저 적용한다."}, {"letter": "E", "text": "인유두종 바이러스 검사 후 이상 없으면 추적 관찰한다."}], "answer": "C", "explanation": "HSIL에서는 질확대경 검사를 통해 병변을 확인하고 필요 시 조직 검사나 LEEP(환상투열절제술)을 시행합니다. HPV 검사로 음성이 나와도 HSIL이면 질확대경이 필요합니다. 질확대경 없는 냉동치료나 단순 관찰은 부적절하며, 자궁절제술은 최후 수단입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "경증 자궁경부 상피내 종양(CIN 1)으로 진단된 환자에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "2년 내 자연 소실률이 약 80%에 달하므로 추적 관찰이 권장된다."}, {"letter": "B", "text": "즉시 환상투열절제술(LEEP)을 시행하여 병변을 완전히 제거해야 한다."}, {"letter": "C", "text": "고위험군 HPV가 동반된 경우 자궁절제술이 필요하다."}, {"letter": "D", "text": "6개월 간격으로 반복적인 세포검사만으로 충분하다."}, {"letter": "E", "text": "치료하지 않으면 대부분 1-2년 내 침윤성 암으로 진행한다."}], "answer": "A", "explanation": "CIN 1은 대부분 일과성 감염으로, 2년 내 약 80%에서 자연 소실되므로 추적 관찰이 원칙입니다. 즉시 LEEP이나 자궁절제술은 과잉 치료입니다. 세포검사만이 아닌 질확대경 등 포괄적 추적이 필요할 수 있으며, 침윤암으로의 진행률은 낮습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "HSIL 세포검사 결과를 보이는 환자에서 환상투열절제술(LEEP)의 적응증으로 옳은 것은?", "options": [{"letter": "A", "text": "세포검사, 질확대경 소견, 조직검사 결과가 모두 일치하는 경우"}, {"letter": "B", "text": "질확대경 검사에서 병변이 명확하게 확인되고 경계가 뚜렷한 경우"}, {"letter": "C", "text": "환자가 20세 미만인 경우"}, {"letter": "D", "text": "내자궁경부 소파술(ECC)에서 CIN 2 또는 CIN 3가 확인된 경우"}, {"letter": "E", "text": "HPV 16형, 18형이 검출되지 않은 경우"}], "answer": "D", "explanation": "HSIL에서 LEEP의 적응증은 질확대경 검사가 불만족스럽거나, ECC에서 CIN2/3 확인, 세포검사-질확대경-조직검사 불일치, 미세침윤 의심, 침윤성 암 배제 불가, 환자 요청이 있을 때입니다. 따라서 ECC에서 CIN2/3이 확인된 경우는 적응증에 해당합니다. 다른 선택지는 적응증이 아니거나 금기에 가깝습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "자궁경부 세포검사에서 고위험 인유두종 바이러스(HPV) 감염 시 관찰되는 특징적인 세포 소견은?", "options": [{"letter": "A", "text": "핵주위 공포와 핵비대를 보이는 세포(koilocyte)"}, {"letter": "B", "text": "세포질이 풍부한 성숙 편평세포"}, {"letter": "C", "text": "중층화된 기저세포 증식"}, {"letter": "D", "text": "각화된 이상세포(parakeratosis)"}, {"letter": "E", "text": "림프구 침윤을 동반한 상피세포 변성"}], "answer": "B", "explanation": "Koilocyte는 중층 편평상피의 중간층 및 표층에서 관찰되며, 핵 주위에 투명한 공포(perinuclear halo)와 함께 핵비대, 과색소성, 불규칙한 핵막 등의 이형성을 보이는 세포로, HPV 감염의 특징적인 세포 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 1}, {"question": "자궁경부 세포검사에서 저등급 편평상피내 병변(LSIL)이 확인된 35세 여성에게 가장 적절한 처치는?", "options": [{"letter": "A", "text": "전자궁적출술"}, {"letter": "B", "text": "1년 후 세포검사 반복"}, {"letter": "C", "text": "인유두종 바이러스(HPV) DNA 검사"}, {"letter": "D", "text": "환상투열절제술(LEEP)"}, {"letter": "E", "text": "질확대경 검사 및 필요 시 조직검사"}], "answer": "C", "explanation": "LSIL의 경우 질확대경 검사를 통해 병변을 확인하고, 필요하면 생검을 시행하는 것이 표준입니다. 단 e": "conventional", "meshPath": "", "matchedSlide": 9}, {"question": "자궁경부 세포진 검사(Pap smear)에서 검체 채취의 주요 표적 부위는?", "options": [{"letter": "A", "text": "endometrium"}, {"letter": "B", "text": "vaginal fornix"}, {"letter": "C", "text": "squamo-columnar junction"}, {"letter": "D", "text": "external os"}, {"letter": "E", "text": "endocervical canal"}], "answer": "C", "explanation": "자궁경부의 squamo-columnar junction은 편평상피세포와 원주상피세포가 만나는 부위로, HPV 감염 및 이형성증이 가장 흔히 발생하는 곳이므로 Pap smear 시 반드시 포함되어야 한다. External os는 자궁경부 입구, endocervical canal은 내경관, vaginal fornix는 질 천장, endometrium은 자궁내막으로 세포검사의 주요 표적이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "산부인과적 골반 진찰을 위한 표준 환자 체위로 가장 적합한 것은?", "options": [{"letter": "A", "text": "Fowler's position"}, {"letter": "B", "text": "prone position"}, {"letter": "C", "text": "left lateral decubitus position"}, {"letter": "D", "text": "supine position"}, {"letter": "E", "text": "lithotomy position"}], "answer": "E", "explanation": "Lithotomy position은 환자가 등을 대고 누워 고관절과 슬관절을 90도로 굴곡시키고 발을 지지대에 올리는 자세로, 외음부와 질을 쉽게 노출시켜 진찰 및 시술에 용이하다. Supine position은 일반 앙와위, prone은 복와위, left lateral decubitus는 좌측와위, Fowler's position은 상체를 올린 반좌위로 골반 진찰에 적합하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 12}, {"question": "태아 시기 골반뼈(hip bone)의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "sacrum과 coccyx가 포함된다"}, {"letter": "B", "text": "femur와 관절을 형성한다"}, {"letter": "C", "text": "성인과 동일한 구조이다"}, {"letter": "D", "text": "ilium, ischium, pubis가 분리되어 있다"}, {"letter": "E", "text": "ilium, ischium, pubis가 하나로 융합되어 있다"}], "answer": "D", "explanation": "태아 시기에는 ilium, ischium, pubis가 각각 분리된 연골성 뼈로 존재하며, 성장하면서 서로 융합되어 하나의 hip bone을 형성한다. 따라서 \"ilium, ischium, pubis가 분리되어 있다\"가 옳다. 다른 선택지들은 성인 골반의 특징이거나 해부학적 오류이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "분만 시 태아 하강(descent) 정도를 평가할 때 기준점(station 0)으로 사용되는 해부학적 구조물은?", "options": [{"letter": "A", "text": "ischial spine"}, {"letter": "B", "text": "sacral promontory"}, {"letter": "C", "text": "coccyx"}, {"letter": "D", "text": "pubic symphysis"}, {"letter": "E", "text": "iliac crest"}], "answer": "A", "explanation": "Ischial spine은 질을 통해 손가락으로 촉지할 수 있는 명확한 뼈 돌기로, 태아 선진부가 이 부위에 도달했을 때 station 0으로 정의한다. Sacral promontory는 골반 입구의 뒤쪽 경계, iliac crest는 장골의 가장 높은 부분, pubic symphysis는 앞쪽 결합부, coccyx는 꼬리뼈로 descent 평가 기준이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "Obturator foramen을 통과하는 구조물로 옳은 것은?", "options": [{"letter": "A", "text": "obturator artery와 nerve"}, {"letter": "B", "text": "pudendal nerve"}, {"letter": "C", "text": "femoral artery와 nerve"}, {"letter": "D", "text": "inferior gluteal artery"}, {"letter": "E", "text": "sciatic nerve"}], "answer": "A", "explanation": "Obturator foramen은 obturator artery, vein, nerve가 지나가는 구멍이다. TOT 수술 시 이 부위를 통해 mesh를 통과시키므로 임상적으로 중요하다. Femoral artery와 nerve는 서혜부 아래로, sciatic nerve는 greater sciatic foramen으로, pudendal nerve는 ischial spine 주변으로, inferior gluteal artery는 둔부로 주행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "Pudendal nerve block 시 마취제를 주입하는 해부학적 landmark로 가장 적절한 것은?", "options": [{"letter": "A", "text": "sacral promontory"}, {"letter": "B", "text": "pubic tubercle"}, {"letter": "C", "text": "greater trochanter"}, {"letter": "D", "text": "ischial spine"}, {"letter": "E", "text": "iliac crest"}], "answer": "D", "explanation": "Pudendal nerve block은 질 내 진찰을 통해 ischial spine을 촉지하고, 그 부위를 향해 바늘을 삽입하여 마취제를 주입한다. 이는 pudendal nerve가 ischial spine 주변을 지나가기 때문이다. 다른 뼈 landmark들은 pudendal nerve와 직접적인 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "다음 중 levator ani muscle에 속하는 근육으로 옳은 것은?", "options": [{"letter": "A", "text": "piriformis"}, {"letter": "B", "text": "obturator internus"}, {"letter": "C", "text": "coccygeus"}, {"letter": "D", "text": "pubococcygeus"}, {"letter": "E", "text": "iliopsoas"}], "answer": "D", "explanation": "Levator ani muscle은 pubococcygeus, pubovaginalis, puborectalis, iliococcygeus로 구성된다. 따라서 pubococcygeus는 levator ani의 일부이다. Coccygeus는 별도의 근육으로 pelvic diaphragm을 이루는 또 다른 구성 요소이며, piriformis, obturator internus, iliopsoas는 골반 벽 근육이지만 pelvic diaphragm에는 속하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "Pudendal nerve가 주로 지배하는 영역으로 옳은 것은?", "options": [{"letter": "A", "text": "둔부 상부"}, {"letter": "B", "text": "외부 생식기와 회음부"}, {"letter": "C", "text": "복벽 하부"}, {"letter": "D", "text": "요추부"}, {"letter": "E", "text": "대퇴부 내측"}], "answer": "B", "explanation": "Pudendal nerve는 S2-S4 신경근에서 기원하여 perineum, external genitalia, anal sphincter 등에 분포한다. 대퇴부 내측은 obturator nerve, 복벽 하부는 ilioinguinal/iliohypogastric nerve, 둔부 상부는 superior gluteal nerve, 요추부는 lumbar plexus가 지배한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "분만 통증 완화를 위해 음부신경차단(pudendal nerve block)과 장골서혜신경차단(ilioinguinal nerve block)을 시행한 후에도 산모가 계속 통증을 호소할 때, 남아있는 통증의 가장 가능성 높은 원인 신경은?", "options": [{"letter": "A", "text": "골반내장신경(pelvic splanchnic nerve)"}, {"letter": "B", "text": "상둔신경"}, {"letter": "C", "text": "대퇴신경"}, {"letter": "D", "text": "폐쇄신경"}, {"letter": "E", "text": "좌골신경"}], "answer": "D", "explanation": "음부신경과 장골서혜신경은 체성신경으로 회음부의 통증을 차단하지만, 자궁수축과 자궁경부 개대에 의한 내장성 통증은 골반내장신경(S2-4)을 통해 전달되므로 이 차단으로는 충분히 완화되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "큰궁둥구멍(greater sciatic foramen)과 작은궁둥구멍(lesser sciatic foramen)을 모두 통과하는 구조물은?", "options": [{"letter": "A", "text": "음부신경(pudendal nerve)"}, {"letter": "B", "text": "폐쇄신경(obturator nerve)"}, {"letter": "C", "text": "궁둥신경(sciatic nerve)"}, {"letter": "D", "text": "아래볼기신경(inferior gluteal nerve)"}, {"letter": "E", "text": "위볼기동맥(superior gluteal artery)"}], "answer": "E", "explanation": "음부신경과 내음부동맥은 큰궁둥구멍을 통해 골반을 빠져나온 후, 작은궁둥구멍을 통해 다시 골반 내로 들어와 음부신경관으로 주행한다. 따라서 두 구멍을 모두 통과한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "참골반(true pelvis)에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "거짓골반(false pelvis)보다 위쪽에 위치한다."}, {"letter": "B", "text": "분만 시 태아가 통과하는 산도의 일부를 구성한다."}, {"letter": "C", "text": "골반바닥근(pelvic diaphragm)이 부착되지 않는 공간이다."}, {"letter": "D", "text": "골반입구(pelvic inlet)를 통해 복강과 직접 연결된다."}, {"letter": "E", "text": "주로 소장과 대장이 위치하는 공간이다."}], "answer": "B", "explanation": "참골반(작은골반, lesser pelvis)은 자궁, 난소 등 중요한 생식기관이 위치하는 공간이며, 하방의 골반출구(pelvic outlet)를 통해 분만 시 태아가 통과하는 산도의 일부를 구성합니다. 거짓골반(큰골반, greater pelvis)은 주로 소장, 대장 등 위장관이 차지하고 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "진통 중인 28세 산모가 회음부 통증 완화를 위해 국소 마취를 요청한다. 질을 통한 접근법으로 음부 신경 차단(pudendal nerve block)을 시행할 때, 바늘 방향의 지표로 질을 통해 촉지해야 할 골성 구조물은 무엇인가?", "options": [{"letter": "A", "text": "치골 결합(pubic symphysis)"}, {"letter": "B", "text": "미골(coccyx)"}, {"letter": "C", "text": "좌골 가시(ischial spine)"}, {"letter": "D", "text": "좌골 결절(ischial tuberosity)"}, {"letter": "E", "text": "천골갑(sacral promontory)"}], "answer": "C", "explanation": "음부 신경(pudendal nerve)은 좌골 가시(ischial spine) 주변을 지나므로, 질을 통해 좌골 가시를 촉지하고 그 방향으로 바늘을 삽입하여 국소 마취제를 주입하면 효과적인 음부 신경 차단이 가능하다. 좌골 결절은 더 바깥쪽에 위치하며, 천골갑이나 치골 결합은 신경과 거리가 멀다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "분만 중 levator ani 근육이 손상되었을 때 마비될 가능성이 가장 큰 근육은?", "options": [{"letter": "A", "text": "D. obturator internus"}, {"letter": "B", "text": "B. iliococcygeus"}, {"letter": "C", "text": "E. piriformis"}, {"letter": "D", "text": "C. coccygeus"}, {"letter": "E", "text": "A. pubococcygeus"}], "answer": "E", "explanation": "Levator ani는 pubococcygeus, iliococcygeus, puborectalis 등으로 구성되며, 분만 시 가장 흔히 손상되는 부분은 pubococcygeus이다. 이 근육은 질 분만 중 압박과 신장에 취약하여 골반 장기 탈출증의 원인이 된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "질식 접근을 통한 음부신경차단술(pudendal nerve block) 시 가장 신뢰할 수 있는 골성 표지점(landmark)은 무엇인가?", "options": [{"letter": "A", "text": "미골 (coccyx)"}, {"letter": "B", "text": "장골능 (iliac crest)"}, {"letter": "C", "text": "좌골극 (ischial spine)"}, {"letter": "D", "text": "천골곶 (sacral promontory)"}, {"letter": "E", "text": "치골결합 (pubic symphysis)"}], "answer": "C", "explanation": "음부신경차단술 시 바늘을 좌골극(ischial spine)을 향해 진입시키고, 천골가시인대(sacrospinous ligament) 바로 안쪽에 국소마취제를 주입한다. 좌골극은 질을 통해 쉽게 촉지되어 신뢰할 수 있는 표지점이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "질(vagina)의 횡단면 모양으로 가장 특징적인 것은?", "options": [{"letter": "A", "text": "원형"}, {"letter": "B", "text": "타원형"}, {"letter": "C", "text": "H자형"}, {"letter": "D", "text": "사각형"}, {"letter": "E", "text": "삼각형"}], "answer": "C", "explanation": "질은 섬유근육성 관으로, 앞쪽의 방광과 뒤쪽의 직장에 압박되어 내강이 전후로 좁아져 H자형을 나타낸다. 원형, 삼각형, 사각형, 타원형은 질의 정상 단면 형태가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "성인 여성 질(vagina)의 전벽과 후벽 길이에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "전벽이 후벽보다 길다"}, {"letter": "B", "text": "전벽과 후벽의 길이가 동일하다"}, {"letter": "C", "text": "자궁경부 길이와 같다"}, {"letter": "D", "text": "질입구로부터 자궁까지 일정하다"}, {"letter": "E", "text": "후벽이 전벽보다 길다"}], "answer": "E", "explanation": "질의 후벽은 자궁경부 후방으로 깊게 파인 posterior fornix를 형성하므로 전벽보다 약 2cm 정도 더 길다. 이는 피임 기구 삽입이나 검사 시 고려해야 할 해부학적 특징이다. 다른 선택지는 사실과 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "복강 내 액체 성분을 확인하기 위해 시행하는 culdocentesis의 이상적인 접근 부위는 질의 어느 부분인가?", "options": [{"letter": "A", "text": "Vaginal orifice 근처"}, {"letter": "B", "text": "Posterior fornix"}, {"letter": "C", "text": "Right lateral fornix"}, {"letter": "D", "text": "Left lateral fornix"}, {"letter": "E", "text": "Anterior fornix"}], "answer": "B", "explanation": "Posterior fornix는 Douglas pouch (posterior cul-de-sac)에 인접해 있어 바늘을 찔러 복강 내 액체를 비교적 안전하게 채취할 수 있다. Anterior fornix는 방광 손상 위험이 있고, lateral fornix는 혈관과 신경이 많아 위험하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "Culdocentesis를 시행할 때 후방 질원개(posterior fornix)를 선택하는 주된 해부학적 이유로 가장 적절한 것은?", "options": [{"letter": "A", "text": "자궁과 직장 사이의 더글라스와(Douglas pouch)에 가장 근접하여 쉽게 접근할 수 있기 때문이다."}, {"letter": "B", "text": "질벽이 가장 얇아 통증이 적기 때문이다."}, {"letter": "C", "text": "방광 손상을 피할 수 있기 때문이다."}, {"letter": "D", "text": "질 내 pH가 가장 적절한 부위이기 때문이다."}, {"letter": "E", "text": "주요 혈관과 신경이 없어 출혈 위험이 낮기 때문이다."}], "answer": "A", "explanation": "후방 질원개는 자궁과 직장 사이의 복막강인 더글라스와에 직접 접근할 수 있는 가장 안전한 경로이다. 전방 질원개로 접근 시 방광 손상 위험이 있고, 측방 질원개는 주요 혈관과 신경이 주행하여 위험하다. 후방 질원개는 질벽과 복막만 통과하면 복강 내 액체 채취가 가능하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "성인 여성의 질에서 rugae가 뚜렷하게 관찰되는 주된 생리적 원인은 무엇인가?", "options": [{"letter": "A", "text": "Estrogen의 영향으로 질벽이 증식하여 주름을 형성한다."}, {"letter": "B", "text": "Relaxin의 영향으로 결합조직이 이완되어 주름이 형성된다."}, {"letter": "C", "text": "Progesterone의 영향으로 평활근이 비후되어 주름이 생긴다."}, {"letter": "D", "text": "출산 경험으로 인해 질벽이 회복되면서 주름이 형성된다."}, {"letter": "E", "text": "자궁경부의 압력에 의해 질벽이 접히면서 주름이 생긴다."}], "answer": "A", "explanation": "질의 rugae는 estrogen의 영향으로 가임기 여성에서 뚜렷하게 나타나는 가로 주름이다. 사춘기 전이나 폐경 후 estrogen이 감소하면 rugae는 희미해진다. Progesterone, relaxin, 자궁경부 압력, 출산 경험은 rugae 형성과 직접적인 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질 점막을 구성하는 상피의 조직학적 유형은 무엇인가?", "options": [{"letter": "A", "text": "Pseudostratified columnar epithelium"}, {"letter": "B", "text": "Transitional epithelium"}, {"letter": "C", "text": "Non-keratinized stratified squamous epithelium"}, {"letter": "D", "text": "Simple columnar epithelium"}, {"letter": "E", "text": "Keratinized stratified squamous epithelium"}], "answer": "C", "explanation": "질 점막은 non-keratinized stratified squamous epithelium으로 이루어져 있어 피부와 달리 각질층이 없다. Keratinized stratified squamous epithelium는 피부에, simple columnar epithelium은 자궁경관이나 위장관에, pseudostratified columnar epithelium은 기도에, transitional epithelium은 요로에 존재한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "질의 해부학적 특성 중 분만 시 발생한 열상의 자연 치유에 가장 크게 기여하는 요소는 무엇인가?", "options": [{"letter": "A", "text": "질 내 분비물에 포함된 항균 물질의 작용"}, {"letter": "B", "text": "질벽에 분포하는 민무늬근의 빠른 재생 능력"}, {"letter": "C", "text": "자궁경부에서 분비되는 점액이 상처 회복을 촉진하는 점"}, {"letter": "D", "text": "질 점막의 중층편평상피세포의 빠른 탈락과 교체 주기"}, {"letter": "E", "text": "상부, 중부, 하부가 서로 다른 동맥에서 혈액을 공급받아 풍부한 측부순환이 발달된 점"}], "answer": "E", "explanation": "질은 상부(자궁동맥), 중부(방광동맥), 하부(내음부동맥)에서 혈액을 공급받으며 이들 간에 풍부한 문합이 있어 출산 손상 시 자연 치유를 촉진한다. 근육 재생, 상피 교체, 분비물의 항균 작용이나 점액은 직접적인 치유 촉진의 주된 요인이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 16}, {"question": "자궁에서 체부와 경부 사이의 좁아진 부위를 가리키는 해부학 용어는 무엇인가?", "options": [{"letter": "A", "text": "Fundus"}, {"letter": "B", "text": "Isthmus"}, {"letter": "C", "text": "Ampulla"}, {"letter": "D", "text": "Cornu"}, {"letter": "E", "text": "Infundibulum"}], "answer": "B", "explanation": "자궁협부(isthmus)는 체부와 경부 사이의 좁아진 부분으로, 분만 시 하부 자궁분절을 형성한다. Fundus는 자궁저, cornu는 자궁각, ampulla와 infundibulum은 나팔관의 부위이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "월경 주기 동안 주기적으로 탈락되는 자궁내막의 층은 다음 중 어느 것인가?", "options": [{"letter": "A", "text": "기저층 (basal layer)"}, {"letter": "B", "text": "자궁경부 점막 (cervical mucosa)"}, {"letter": "C", "text": "장막층 (serosa)"}, {"letter": "D", "text": "근층 (myometrium)"}, {"letter": "E", "text": "기능층 (functional layer)"}], "answer": "E", "explanation": "자궁내막은 기저층(basal layer)과 기능층(functional layer)으로 나뉘며, 월경 주기에 따라 기능층이 호르몬의 영향을 받아 증식하다가 월경 시 탈락된다. 기저층은 탈락되지 않고 새로운 기능층을 재생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 18}, {"question": "Ovarian artery가 직접 분지하는 혈관은?", "options": [{"letter": "A", "text": "uterine artery"}, {"letter": "B", "text": "internal iliac artery"}, {"letter": "C", "text": "external iliac artery"}, {"letter": "D", "text": "abdominal aorta"}, {"letter": "E", "text": "common iliac artery"}], "answer": "D", "explanation": "Ovarian artery는 abdominal aorta에서 직접 기시하는 동맥으로, 이는 태아 발생학적 기원과 관련이 있다. Common iliac artery는 internal/ external iliac으로 분지되며, internal iliac artery는 자궁, 방광 등 골반 장기에 혈액을 공급한다. Uterine artery는 internal iliac artery의 anterior division에서 분지한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "나팔관에서 난소로부터 배출된 난자를 포획하는 역할을 하는 구조물은 무엇인가?", "options": [{"letter": "A", "text": "Isthmus"}, {"letter": "B", "text": "Infundibulum"}, {"letter": "C", "text": "Ampulla"}, {"letter": "D", "text": "Fimbriae"}, {"letter": "E", "text": "Interstitial portion"}], "answer": "D", "explanation": "Fimbriae는 나팔관 끝에 있는 손가락 모양의 돌기로, 배란 시 난자를 쓸어 담아 난관 내로 유도한다. Ampulla는 수정이 일어나는 부위, isthmus는 좁은 부위, infundibulum은 깔때기 모양의 부분, interstitial portion은 자궁벽 내 일부이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "정자와 난자의 수정이 가장 일반적으로 일어나는 나팔관의 해부학적 위치는 어디인가?", "options": [{"letter": "A", "text": "Interstitial part"}, {"letter": "B", "text": "Fimbriae"}, {"letter": "C", "text": "Isthmus"}, {"letter": "D", "text": "Ampulla"}, {"letter": "E", "text": "Infundibulum"}], "answer": "D", "explanation": "Ampulla는 나팔관에서 가장 넓은 부분으로, 정자와 난자가 만나 수정이 이루어지는 주된 장소이다. Isthmus는 좁아져 이송에 관여하고, infundibulum은 난자 채취, interstitial part는 자궁벽 내 통로, fimbriae는 포획 구조이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "난소에서 난포(ovarian follicles)가 주로 위치하는 해부학적 영역은 어디인가?", "options": [{"letter": "A", "text": "피질 (cortex)"}, {"letter": "B", "text": "생식상피 (germinal epithelium)"}, {"letter": "C", "text": "백막 (tunica albuginea)"}, {"letter": "D", "text": "난소문 (hilum)"}, {"letter": "E", "text": "수질 (medulla)"}], "answer": "A", "explanation": "난소의 피질(cortex)은 바깥쪽 부분으로 난포들이 존재하는 곳이다. 수질(medulla)은 혈관, 신경, 림프관이 지나는 안쪽 부분이다. 난소문은 혈관 출입부, 생식상피는 표면을 덮는 단층 입방상피, 백막은 그 아래 결합조직층이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "난소의 혈액 공급에 관한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "난소동맥은 자궁동맥보다 가늘다."}, {"letter": "B", "text": "난소동맥은 속엉덩동맥(internal iliac artery)에서 기원한다."}, {"letter": "C", "text": "난소의 정맥혈은 문정맥(portal vein)으로 배출된다."}, {"letter": "D", "text": "난소는 오직 난소동맥(ovarian artery)에서만 혈액을 공급받는다."}, {"letter": "E", "text": "난소는 난소동맥과 자궁동맥의 난소분지에서 이중 혈액 공급을 받는다."}], "answer": "E", "explanation": "난소는 복대동맥에서 직접 분지하는 난소동맥과 자궁동맥에서 분지하는 난소분지의 이중 혈액 공급을 받는다. 이는 난소의 혈류를 풍부하게 유지시켜 준다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 19}, {"question": "자궁절제술 중 자궁동맥을 결찰할 때 실수로 같이 결찰될 가능성이 가장 높은 구조물은?", "options": [{"letter": "A", "text": "요관"}, {"letter": "B", "text": "질"}, {"letter": "C", "text": "직장"}, {"letter": "D", "text": "난소동맥"}, {"letter": "E", "text": "방광"}], "answer": "E", "explanation": "자궁동맥은 자궁경부의 옆쪽에서 요관을 위에서 가로지르므로, 자궁동맥 결찰 시 요관이 함께 결찰될 위험이 높다. 수술 후 옆구리 통증이 발생하면 수신증을 의심해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁외 임신이 의심되어 질천자(culdocentesis)를 시행할 때 바늘을 삽입하는 가장 적절한 해부학적 위치는?", "options": [{"letter": "A", "text": "질 전원개"}, {"letter": "B", "text": "자궁경부 외구"}, {"letter": "C", "text": "자궁경관"}, {"letter": "D", "text": "질 후원개"}, {"letter": "E", "text": "요도구"}], "answer": "A", "explanation": "더글라스와(직장자궁오목)는 질 후원개를 통해 접근할 수 있으므로, 자궁외 임신으로 인한 복강 내 출혈 시 질천자를 시행하여 응고되지 않은 혈액을 확인한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "전자궁절제술 시 요관 손상을 예방하기 위해 숙지해야 할 요관과 자궁동맥의 해부학적 관계로 옳은 것은?", "options": [{"letter": "A", "text": "요관이 자궁동맥의 위쪽을 지나 난소로 주행한다."}, {"letter": "B", "text": "요관이 자궁동맥의 아래쪽을 지나 방광으로 진입한다."}, {"letter": "C", "text": "요관이 자궁동맥의 앞쪽에서 교차한다."}, {"letter": "D", "text": "요관이 자궁동맥과 나란히 주행하며 방광으로 간다."}, {"letter": "E", "text": "요관이 방광에서 나와 자궁동맥의 뒤쪽으로 주행한다."}], "answer": "B", "explanation": "요관은 골반 내에서 자궁동맥의 아래쪽을 지나 방광으로 진입하는데, 이를 'water under the bridge'라 부른다. 자궁절제술 시 자궁동맥을 결찰할 때 요관이 바로 아래에 있어 손상되기 쉽다. 다른 선택지는 실제 해부학적 관계와 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "대음순(labia majora)과 소음순(labia minora)을 비교한 설명 중 해부학적으로 올바른 것은?", "options": [{"letter": "A", "text": "대음순에는 모낭과 지방이 풍부하나, 소음순에는 모낭이 없고 지방이 적다."}, {"letter": "B", "text": "대음순은 피부로 덮여 있지 않고 점막으로만 구성된다."}, {"letter": "C", "text": "소음순에는 대음순보다 지방과 모낭이 더 많이 분포한다."}, {"letter": "D", "text": "대음순과 소음순 모두 동일한 조직학적 구조를 가진다."}, {"letter": "E", "text": "대음순에는 피지선이 없으나 소음순에는 피지선이 풍부하다."}], "answer": "A", "explanation": "대음순은 지방이 많은 피부 주름으로 모낭과 털이 있지만, 소음순은 민무론 피부로 모낭이 없고 지방이 적다. 대음순에는 피지선이 있으며, 대음순은 피부로 덮여 있고, 소음순이 지방과 모낭이 더 많다는 것은 틀리며, 두 구조는 조직학적으로 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁동맥(uterine artery)이 속엉덩동맥(internal iliac artery)에서 기원하여 자궁으로 주행할 때 반드시 통과하는 골반 내 인대 구조물은 무엇인가?", "options": [{"letter": "A", "text": "자궁원인대(Uterosacral ligament)"}, {"letter": "B", "text": "기인대(Cardinal ligament)"}, {"letter": "C", "text": "원인대(Round ligament)"}, {"letter": "D", "text": "광인대(Broad ligament)"}, {"letter": "E", "text": "넝쿨인대(Suspensory ligament of ovary)"}], "answer": "A", "explanation": "자궁동맥은 자궁경부 가쪽의 기인대(자궁가로목인대, cardinal ligament) 속을 주행하며, 이 인대는 자궁을 지지하고 주요 혈관을 포함한다. 골반 수술 시 이 부위에서 자궁동맥 결찰 시 실수로 기인대가 함께 묶이거나 요관이 손상될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "여성의 바깥생식기관(external genitalia)에서 가장 앞쪽(치골 전방)에 위치하며, 치골 위 지방층으로 덮여 있는 구조물은?", "options": [{"letter": "A", "text": "음핵(Clitoris)"}, {"letter": "B", "text": "대음순(Labia majora)"}, {"letter": "C", "text": "요도구(Urethral meatus)"}, {"letter": "D", "text": "치구(Mons pubis)"}, {"letter": "E", "text": "소음순(Labia minora)"}], "answer": "A", "explanation": "치구는 치골결합 전면의 피하지방 조직이 둥글게 융기된 부분으로, 외부생식기 중 가장 앞쪽에 위치한다. 사춘기 이후 음모가 나며, 배아발생학적으로 남성의 음부 곡과 상동이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "방광과 질 사이의 느슨한 결합조직 공간을 지칭하는 해부학적 명칭은?", "options": [{"letter": "A", "text": "방광자궁공간(vesicouterine space)"}, {"letter": "B", "text": "방광질공간(vesicovaginal space)"}, {"letter": "C", "text": "더글라스와(Douglas pouch)"}, {"letter": "D", "text": "직장질공간(rectovaginal space)"}, {"letter": "E", "text": "치골후공간(retropubic space of Retzius)"}], "answer": "B", "explanation": "방광과 질 사이의 공간을 방광질공간(vesicovaginal space)이라고 하며, 수술 시 중요한 해부학적 층으로 이용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "자궁외 임신이 의심되는 여성에서 골반 내 출혈을 확인하기 위한 천자술(culdocentesis)을 시행할 때 바늘을 삽입하는 해부학적 부위는?", "options": [{"letter": "A", "text": "질후벽(posterior vaginal fornix)"}, {"letter": "B", "text": "방광 전벽"}, {"letter": "C", "text": "자궁경부"}, {"letter": "D", "text": "질전벽(anterior vaginal fornix)"}, {"letter": "E", "text": "직장 전벽"}], "answer": "A", "explanation": "자궁외 임신 파열 시 혈액이 직장자궁오목(cul-de-sac)에 고이므로, 질후벽을 통해 천자를 시행하여 응고되지 않은 혈액을 흡인할 수 있다. 질전벽은 방광 손상 위험이 있으며, 다른 부위는 접근이 어렵거나 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "골반 수술 중 자궁동맥(uterine artery)을 결찰할 때 함께 손상될 수 있는 구조물은 무엇인가?", "options": [{"letter": "A", "text": "음부신경 (pudendal nerve)"}, {"letter": "B", "text": "난소동맥 (ovarian artery)"}, {"letter": "C", "text": "방광 (bladder)"}, {"letter": "D", "text": "직장 (rectum)"}, {"letter": "E", "text": "요관 (ureter)"}], "answer": "E", "explanation": "자궁동맥은 수술 중 결찰 시 요관과 교차하는 부위('water under the bridge')에서 요관을 함께 결찰하거나 손상시킬 수 있다. 요관은 자궁동맥의 하방으로 주행하므로 주의가 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복식 자궁절제술 중 uterine artery 결찰 시 가장 손상되기 쉬운 구조물은 무엇인가?", "options": [{"letter": "A", "text": "요관"}, {"letter": "B", "text": "요도"}, {"letter": "C", "text": "난소동맥"}, {"letter": "D", "text": "자궁원인대"}, {"letter": "E", "text": "방광"}], "answer": "A", "explanation": "요관은 자궁동맥 하부를 가로지르므로, 자궁동맥 결찰 시 함께 묶이거나 손상될 위험이 가장 높다. 방광은 전방에 위치하나 요관보다 손상 빈도가 낮다. 요도, 난소동맥, 자궁원인대는 자궁동맥 결찰 부위에서 떨어져 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "복강경 수술 시 하복부 외측에 trocar를 삽입할 때 손상될 수 있는 동맥으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "대퇴동맥 (femoral artery)"}, {"letter": "B", "text": "장골동맥 (iliac artery)"}, {"letter": "C", "text": "하복벽동맥 (inferior epigastric artery)"}, {"letter": "D", "text": "복재동맥 (saphenous artery)"}, {"letter": "E", "text": "천장골회선동맥 (superficial circumflex iliac artery)"}], "answer": "C", "explanation": "하복벽동맥은 복직근의 외측을 따라 주행하므로 외측 trocar 삽입 시 손상 위험이 높다. 복재동맥은 하퇴부, 대퇴동맥과 장골동맥은 더 깊고 큰 혈관이며, 천장골회선동맥은 더 표층에 있어 상대적으로 손상 빈도가 낮다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "전자궁절제술 후 환자에게 5kg 이상의 물건을 들지 않도록 교육하는 주된 이유는?", "options": [{"letter": "A", "text": "요실금을 예방하기 위해"}, {"letter": "B", "text": "Vaginal cuff의 벌어짐을 방지하기 위해"}, {"letter": "C", "text": "수술 부위 감염 예방을 위해"}, {"letter": "D", "text": "복벽 탈장 예방을 위해"}, {"letter": "E", "text": "하지 정맥 혈전증 예방을 위해"}], "answer": "B", "explanation": "자궁절제술 후 복압이 상승하면 봉합된 vaginal cuff 부위에 장력이 가해져 벌어질(dehiscence) 위험이 있다. 따라서 일정 기간 무거운 물건을 들지 않도록 주의해야 한다. 감염, 복벽 탈장, 요실금, 혈전증과는 직접적인 관련이 적다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 20}, {"question": "시상하부-뇌하수체-난소 축에서 에스트로겐과 프로게스테론이 시상하부와 뇌하수체에 작용하여 FSH와 LH 분비를 억제하는 되먹임은 다음 중 무엇인가?", "options": [{"letter": "A", "text": "자가분비 되먹임(autocrine feedback)"}, {"letter": "B", "text": "주변분비 되먹임(paracrine feedback)"}, {"letter": "C", "text": "단-loop 되먹임(short-loop feedback)"}, {"letter": "D", "text": "장-loop 되먹임(long-loop feedback)"}, {"letter": "E", "text": "초단-loop 되먹임(ultra-short-loop feedback)"}], "answer": "D", "explanation": "난소에서 분비된 성호르몬은 혈류를 통해 먼 거리의 시상하부와 뇌하수체에 도달하여 억제 효과를 나타내므로 이를 장-loop 되먹임이라고 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 22}, {"question": "시상하부에서 분비되는 GnRH의 박동성 분비가 뇌하수체에서 LH 또는 FSH 분비를 결정하는 주요 인자는 무엇인가?", "options": [{"letter": "A", "text": "GnRH의 일일 총 분비량(total daily amount)"}, {"letter": "B", "text": "GnRH 갖는다. 천연 GnRH를 그대로 약물로 사용할 수 없는 가장 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "혈액-뇌 장벽을 통과하지 못하기 때문"}, {"letter": "B", "text": "면역반응을 유발할 가능성이 높기 때문"}, {"letter": "C", "text": "뇌하수체 이외의 조직에 심한 부작용을 일으키기 때문"}, {"letter": "D", "text": "경구 투여 시 흡수율이 낮기 때문"}, {"letter": "E", "text": "반감기가 2-4분으로 매우 짧기 때문"}], "answer": "E", "explanation": "천연 GnRH는 펩티드 호르몬으로 체내에서 효소 분해가 빨라 반감기가 2-4분에 불과하여 충분한 작용 시간을 확보할 수 없다. 따라서 작용 지속을 위해 D-아미노산 등의 변형을 통해 GnRH agonist를 합성한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH agonist의 add-back therapy로 estrogen을 함께 투여하는 주된 목적은?", "options": [{"letter": "A", "text": "GnRH agonist의 작용을 길항하여 치료 기간을 단축하기 위해"}, {"letter": "B", "text": "저에스트로겐으로 인한 부작용(안면홍조, 골밀도 감소 등)을 완화하기 위해"}, {"letter": "C", "text": "배란을 유도하여 불임을 치료하기 위해"}, {"letter": "D", "text": "면역 반응을 증강시켜 자궁내막증 재발을 억제하기 위해"}, {"letter": "E", "text": "자궁내막증 병변의 완전 퇴화를 촉진하기 위해"}], "answer": "B", "explanation": "GnRH agonist는 지속 투여 시 뇌하수체를 탈감작시켜 저에스트로겐 상태를 유발하고, 이로 인해 안면홍조, 골밀도 감소, 질건조증 등의 폐경 유사 증상이 발생합니다. Add-back therapy로 소량의 estrogen을 추가하면 이러한 부작용을 경감시키면서도 자궁내막증 억제 효과는 유지할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH agonist를 자궁근종 치료 목적으로 지속 투여할 때 초기 1~2주에 나타나는 내분비적 반응은 무엇인가?", "options": [{"letter": "A", "text": "LH/FSH 분비의 지속적 억제"}, {"letter": "B", "text": "LH/FSH 수용체의 up-regulation"}, {"letter": "C", "text": "LH/FSH 분비의 일시적 증가 (flare-up)"}, {"letter": "D", "text": "프로게스테론 농도 급증"}, {"letter": "E", "text": "에스트로겐 농도 즉시 저하"}], "answer": "C", "explanation": "정답은 'LH/FSH 분비의 일시적 증가 (flare-up)'이다. GnRH agonist는 처음에 수용체를 자극하여 LH, FSH가 일시적으로 급증(flare-up)한 후, 지속 자극에 의해 수용체가 down-regulation되면서 억제 효과가 나타난다. 이 초기 flare-up 때문에 치료 초기에는 오히려 에스트로겐이 증가할 수 있고, 임신 가능성도 있어 주의가 필요하다. '즉시 저하'나 '지속적 억제'는 만성적인 효과이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "난소의 과립막 세포에서 분비되어 뇌하수체 전엽에서 FSH 분비를 선택적으로 억제하는 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Progesterone"}, {"letter": "B", "text": "Inhibin"}, {"letter": "C", "text": "Estrogen"}, {"letter": "D", "text": "Activin"}, {"letter": "E", "text": "LH"}], "answer": "B", "explanation": "Inhibin은 난소의 과립막 세포에서 생성되어 뇌하수체 전엽에서 FSH의 분비를 특이적으로 억제하는 호르몬이다. Estrogen과 progesterone도 FSH 억제에 관여하지만, inhibin만이 선택적으로 FSH를 억제한다. Activin은 오히려 FSH 분비를 촉진하며, LH는 FSH 분비에 직접적인 억제 효과가 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "정상 월경 주기에서 자궁내막의 증식기(proliferative phase)에 주로 관여하는 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Inhibin"}, {"letter": "B", "text": "LH"}, {"letter": "C", "text": "Estrogen"}, {"letter": "D", "text": "Progesterone"}, {"letter": "E", "text": "FSH"}], "answer": "C", "explanation": "Estrogen은 난포기에서 성장하는 난포에서 분비되어 자궁내막의 기저층으로부터 세포 분열과 증식을 촉진하여 자궁내막을 두껍게 만든다. Progesterone은 배란 후 황체기에서 분비되며 분비기 변화를 유도하고, FSH와 LH는 난소를 자극하는 호르몬이지 직접 자궁내막에 작용하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "월경 시 자궁내막의 나선 동맥(spiral artery) 수축과 파열을 유발하는 직접적인 호르몬 변화는 무엇인가?", "options": [{"letter": "A", "text": "Estrogen의 급격한 상승"}, {"letter": "B", "text": "Inhibin의 감소"}, {"letter": "C", "text": "FSH의 급격한 감소"}, {"letter": "D", "text": "LH의 급격한 상승"}, {"letter": "E", "text": "Progesterone의 급격한 감소"}], "answer": "E", "explanation": "황체가 퇴화하면 progesterone 분비가 급격히 감소한다. Progesterone은 자궁내막을 안정화하고 혈관을 유지하는 작용이 있으므로, 그 감소는 나선 동맥의 수축과 허혈을 일으키고 결국 동맥 파열로 출혈이 발생한다. Estrogen은 주로 증식기에 작용하며, LH나 FSH 변화는 직접적인 혈관 변화를 유발하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "난포기 중반(mid-follicular phase)에 FSH 농도가 지나치게 상승하지 않도록 억제하는 주된 기전은 무엇인가?", "options": [{"letter": "A", "text": "발육 난포에서 분비되는 Estrogen에 의한 음성 되먹임"}, {"letter": "B", "text": "LH surge에 의한 FSH 억제"}, {"letter": "C", "text": "GnRH 분비 감소에 의한 FSH 억제"}, {"letter": "D", "text": "Inhibin에 의한 FSH 억제"}, {"letter": "E", "text": "Progesterone에 의한 FSH 억제"}], "answer": "A", "explanation": "난포기 중반에 성장하는 난포에서 분비되는 estrogen의 농도가 상승하면 시상하부-뇌하수체에 음성 되먹임으로 작용하여 FSH 분비를 억제한다. 이로써 우세 난포 하나만 선택적으로 성장하게 된다. Inhibin도 FSH를 억제하지만, 중반 시점에는 estrogen의 되먹임이 더 큰 역할을 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "자궁내막에 대한 에스트로겐과 프로게스테론의 작용을 바르게 설명한 것은?", "options": [{"letter": "A", "text": "에스트로겐은 억제, 프로게스테론은 증식을 촉진한다"}, {"letter": "B", "text": "에스트로겐은 증식을, 프로게스테론은 안정화 및 탈락막화를 촉진한다"}, {"letter": "C", "text": "에스트로겐은 기초 체온을 낮추고, 프로게스테론은 낮춘다"}, {"letter": "D", "text": "에스트로겐과 프로게스테론 모두 혈관 생성을 억제한다"}, {"letter": "E", "text": "에스트로겐은 증식을, 프로게스테론도 증식을 촉진한다"}], "answer": "B", "explanation": "에스트로겐은 자궁내막의 증식을 유도하는 반면, 프로게스테론은 증식을 억제하고 분비기 변화와 탈락막화를 일으켜 착상을 가능하게 한다. 다른 보기들은 두 호르몬의 역할을 오인한 것이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "임신 초기에 수정란이 착상 후 황체 퇴화를 방지하여 프로게스테론 분비를 지속하게 하는 주요 물질은?", "options": [{"letter": "A", "text": "LH"}, {"letter": "B", "text": "hCG"}, {"letter": "C", "text": "에스트로겐"}, {"letter": "D", "text": "FSH"}, {"letter": "E", "text": "프로락틴"}], "answer": "B", "explanation": "수정란이 착상하면 융모에서 human chorionic gonadotropin (hCG)를 분비하여 황체의 수명을 연장시킨다. hCG는 LH와 수용체를 공유하므로 황체가 퇴화하지 않고 프로게스테론을 계속 생산하게 한다. 다른 호르몬들은 이 기능이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "자궁내막의 탈락막화(decidualization)를 유도하는 데 필수적인 호르몬은?", "options": [{"letter": "A", "text": "FSH"}, {"letter": "B", "text": "프로게스테론"}, {"letter": "C", "text": "에스트로겐"}, {"letter": "D", "text": "LH"}, {"letter": "E", "text": "프로락틴"}], "answer": "B", "explanation": "탈락막화는 프로게스테론의 주요 작용 중 하나로, 자궁내막 간질세포가 분화하여 영양 공급을 담당하는 탈락막으로 변하는 과정이다. 이 과정 없이는 착상이 불가능하다. 에스트로겐은 증식을, FSH와 LH는 난소 자극을, 프로락틴은 유즙 분비를 담당한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "월경 주기 중 자궁내막 증식기(proliferative phase)를 주로 조절하는 호르몬은?", "options": [{"letter": "A", "text": "hCG"}, {"letter": "B", "text": "LH"}, {"letter": "C", "text": "FSH"}, {"letter": "D", "text": "에스트로겐"}, {"letter": "E", "text": "프로게스테론"}], "answer": "D", "explanation": "증식기는 난포에서 분비되는 에스트로겐의 영향을 받아 자궁내막이 두꺼워지는 시기이다. LH는 배란을 유발하고, 프로게스테론은 분비기를 조절한다. FSH는 난포 발육을 촉진하지만 자궁내막 증식에 직접 작용하지 않는다. hCG는 임신 시 황체를 유지한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "초기 임신에서 황체 퇴화를 막고 progesterone 분비를 지속시키는 주요 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "FSH"}, {"letter": "B", "text": "Progesterone"}, {"letter": "C", "text": "Estrogen"}, {"letter": "D", "text": "hCG"}, {"letter": "E", "text": "LH"}], "answer": "D", "explanation": "수정 후 배반포의 영양막에서 분비되는 human chorionic gonadotropin (hCG)은 LH와 유사하게 황체를 유지하여 임신 5주까지 progesterone을 분비하게 합니다. 이후 태반이 그 역할을 대신합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "수정이 일어나지 않은 월경주기에서 월경이 시작되는 직접적인 기전은 무엇인가?", "options": [{"letter": "A", "text": "LH의 지속적 상승"}, {"letter": "B", "text": "Progesterone의 급격한 감소"}, {"letter": "C", "text": "hCG의 증가"}, {"letter": "D", "text": "Estrogen의 급격한 상승"}, {"letter": "E", "text": "FSH의 감소"}], "answer": "B", "explanation": "황체가 퇴화하면 progesterone 분비가 중단되어 자궁내막의 탈락과 출혈이 시작됩니다. 이른바 progesterone withdrawal bleeding입니다. Estrogen 감소도 동반되지만, progesterone의 급감이 결정적인 원인입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 무배란으로 인해 에스트로겐이 지속적으로 분비될 때 나타나는 비정상 자궁출혈의 기전은 무엇인가?", "options": [{"letter": "A", "text": "에스트로겐 breakthrough bleeding"}, {"letter": "B", "text": "프로게스테론 withdrawal bleeding"}, {"letter": "C", "text": "프로게스테론 breakthrough bleeding"}, {"letter": "D", "text": "배란 출혈"}, {"letter": "E", "text": "에스트로겐 withdrawal bleeding"}], "answer": "A", "explanation": "PCOS에서는 배란이 일어나지 않아 황체가 형성되지 않으므로 프로게스테론이 분비되지 않는다. 이로 인해 에스트로겐만 지속적으로 자궁내막을 증식시키고, 과증식된 내막이 불안정해져 파괴되면서 출혈이 발생하는데, 이를 에스트로겐 breakthrough bleeding이라고 한다. '프로게스테론 breakthrough bleeding'은 프로게스테론 단독 과잉 시 발생하지만 PCOS와는 무관하다. '에스트로겐 withdrawal bleeding'은 에스트로겐 농도가 급격히 감소할 때 발생하는데, PCOS에서는 에스트로겐이 지속적으로 높다. '프로게스테론 withdrawal bleeding'은 정상 월경이나 프로게스테론 중단 시 발생한다. '배란 출혈'은 배란 시 에스트로겐이 일시적으로 저하되어 나타나며, PCOS에서는 배란이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 26}, {"question": "임신이 되지 않은 정상 월경 주기에서 월경 출혈이 발생하는 주된 기전은 무엇인가?", "options": [{"letter": "A", "text": "난포기 에스트로겐 상승에 의한 breakthrough"}, {"letter": "B", "text": "황체기 프로게스테론 상승에 의한 breakthrough"}, {"letter": "C", "text": "황체 퇴화로 인한 프로게스테론 withdrawal"}, {"letter": "D", "text": "뇌하수체 호르몬의 직접적인 자궁내막 파괴"}, {"letter": "E", "text": "배란 시 에스트로겐 일시적 감소"}], "answer": "C", "explanation": "정상 월경은 황체가 수명을 다하여 퇴화하면 프로게스테론 분비가 급격히 감소하고, 이로 인해 자궁내막이 안정성을 잃고 탈락하면서 발생한다. 이를 프로게스테론 withdrawal bleeding이라 한다. '난포기 에스트로겐 상승'은 자궁내막 증식을 유도하나 출혈을 일으키지 않는다. '황체기 프로게스테론 상승'은 내막을 안정화시키므로 오히려 출혈을 막는다. '배란 시 에스트로겐 감소'는 일부 여성에서 소량의 출혈을 일으키지만 주된 월경 기전은 아니다. '뇌하수체 호르몬'은 간접적으로 난소를 자극할 뿐 직접 내막을 파괴하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 26}, {"question": "일부 여성에서 월경 중간쯤(배란 시기)에 소량의 질 출혈이 나타나는 주된 이유는?", "options": [{"letter": "A", "text": "프로게스테론 withdrawal bleeding"}, {"letter": "B", "text": "에스트로겐 withdrawal bleeding"}, {"letter": "C", "text": "프로게스테론 breakthrough bleeding"}, {"letter": "D", "text": "난포자극호르몬의 직접적인 자궁내막 자극"}, {"letter": "E", "te
