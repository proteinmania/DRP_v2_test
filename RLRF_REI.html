<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLRF Review — REI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
    --accent: #2563eb; --accent-light: #eff6ff;
    --correct: #16a34a; --wrong: #dc2626;
    --text: #1e293b; --text2: #64748b; --border: #e2e8f0;
    --font-size: 16px;
  }
  html { font-size: var(--font-size); }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ── Header (FTM flex column) ────────────────────────────────────────── */
  #header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center;
    flex-shrink: 0; flex-wrap: wrap;
  }
  #header > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #header { gap: 12px; }
    #header > * + * { margin-left: 0; }
  }
  #header h1 { font-size: 1rem; color: var(--accent); font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #progress-bar-wrap {
    flex: 1; min-width: 120px; height: 6px;
    background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  #progress-bar { height: 100%; width: 0%; background: var(--accent);
    border-radius: 3px; transition: width .3s; }
  #progress-label { font-size: .82rem; color: var(--text2); white-space: nowrap; }
  #wrong-badge {
    background: var(--wrong); color: #fff; border-radius: 12px;
    padding: 2px 10px; font-size: .78rem; font-weight: 600; display: none;
  }
  .font-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: .82rem;
    transition: background .15s, color .15s;
  }
  .font-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .font-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #btn-hide-img, #btn-review {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; font-size: .82rem; white-space: nowrap;
  }
  #btn-hide-img:hover, #btn-review:hover {
    background: var(--accent-light); border-color: var(--accent); color: var(--accent);
  }
  #btn-review.active { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  #gemini-btn {
    padding: 4px 10px; border-radius: 6px; border: none;
    background: #eef2ff; color: #4338ca; cursor: pointer;
    font-size: .78rem; font-weight: 600; white-space: nowrap;
    outline: 1px solid #c7d7fe;
  }
  #gemini-btn:hover { background: #e0e7ff; outline-color: var(--accent); }
  #generated-label { font-size: .72rem; color: var(--text2); margin-left: auto; white-space: nowrap; }

  /* ── Main layout ─────────────────────────────────────────────────────── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: slide panel (DRP scroll-snap, dark bg) ───────────────────── */
  #slide-col {
    width: 42%; min-width: 20%; max-width: 70%;
    background: #1e293b; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  #slide-col::-webkit-scrollbar { display: none; }
  #slide-col { scrollbar-width: none; }
  .slide-page-item {
    height: calc(100vh - 52px); scroll-snap-align: start;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; gap: .5rem; flex-shrink: 0;
    position: relative;
  }
  .slide-canvas-wrap {
    position: relative; display: inline-block; line-height: 0;
  }
  .slide-canvas-wrap img {
    max-width: 100%; max-height: calc(100% - 40px);
    object-fit: contain; border-radius: 6px; cursor: zoom-in;
  }
  .anno-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; border-radius: 6px;
  }
  .anno-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  .slide-page-meta {
    color: #94a3b8; font-size: .75rem; text-align: center;
  }
  .slide-page-badge {
    position: absolute; bottom: 1rem; right: 1rem;
    background: rgba(0,0,0,.5); color: #94a3b8;
    font-size: .7rem; padding: 3px 8px; border-radius: 99px;
  }
  #no-slide-msg {
    color: #94a3b8; font-size: .85rem; text-align: center;
    padding: 40px 0; display: none;
  }

  /* ── Annotation toolbar (vertical bar between slide-col and divider) ── */
  #anno-toolbar {
    width: 44px; flex-shrink: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: #1e293b; color: #cbd5e1;
    padding: 8px 4px; gap: 3px;
    border-right: 1px solid #334155;
  }
  .anno-mode, .anno-tool, #anno-undo, #anno-clear, #anno-clear-all {
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
    font-size: .82rem; display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0;
  }
  .anno-mode:hover, .anno-tool:hover, #anno-undo:hover, #anno-clear:hover, #anno-clear-all:hover {
    background: #334155; color: #e2e8f0;
  }
  .anno-mode.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .anno-tool.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .anno-mode:disabled, .anno-tool:disabled,
  #anno-undo:disabled, #anno-clear:disabled, #anno-clear-all:disabled {
    opacity: .35; cursor: default;
  }
  .anno-sep {
    border: none; border-top: 1px solid #334155;
    width: 28px; margin: 2px 0; padding: 0;
  }
  #anno-color {
    width: 28px; height: 28px; border: 1px solid #334155;
    border-radius: 6px; cursor: pointer; background: none; padding: 1px;
  }
  #anno-size {
    width: 4px; height: 60px; accent-color: #3b82f6; cursor: pointer;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: bt-lr; background: transparent;
  }
  /* Safari / older Samsung Internet: range slider track & thumb */
  #anno-overlay-size::-webkit-slider-runnable-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #3b82f6; border-radius: 50%; margin-top: -5px;
  }
  #anno-overlay-size::-moz-range-track {
    height: 4px; background: #475569; border-radius: 2px;
  }
  #anno-overlay-size::-moz-range-thumb {
    width: 14px; height: 14px; background: #3b82f6;
    border: none; border-radius: 50%;
  }

  /* ── Annotation slide nav (mobile draw mode) ─────────────────────────── */
  #anno-slide-nav {
    position: sticky; top: 0; z-index: 20;
    display: none; justify-content: center; align-items: center;
    padding: 8px;
    background: rgba(15,23,42,.95); flex-shrink: 0;
  }
  #anno-slide-nav > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    #anno-slide-nav { gap: 12px; }
    #anno-slide-nav > * + * { margin-left: 0; }
  }
  #anno-slide-nav button {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: .9rem; display: flex; align-items: center; justify-content: center;
  }
  #anno-slide-nav button:hover { background: #334155; }
  #anno-slide-nav button:disabled { opacity: .3; cursor: default; }
  #anno-slide-counter { color: #94a3b8; font-size: .78rem; }

  /* ── Divider (DRP % based + touch) ──────────────────────────────────── */
  #divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
    z-index: 10; display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }
  body.resizing { cursor: col-resize; user-select: none; }
  #divider::after {
    content: '⋮'; color: #94a3b8; font-size: 14px; pointer-events: none;
  }
  #divider:hover::after, #divider.dragging::after { color: #fff; }

  /* ── Right: quiz panel ──────────────────────────────────────────────── */
  #quiz-col {
    flex: 1; min-width: 20%; padding: 1.25rem 1.5rem 50vh;
    overflow-y: auto; overflow-x: hidden;
  }

  /* ── Section ────────────────────────────────────────────────────────── */
  .page-section {
    margin-bottom: 2.5rem;
    scroll-margin-top: 16px;
  }
  .section-header {
    font-size: .75rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 1rem;
  }

  /* ── Question card ──────────────────────────────────────────────────── */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; transition: border-color .2s;
  }
  .q-card.focused { border-color: var(--accent); }
  .q-card.correct-card { border-color: var(--correct); }
  .q-card.wrong-card { border-color: var(--wrong); }
  /* V2 individual question cards: tighter spacing for scrollable list */
  .q-card.v2-card {
    margin-bottom: 0.75rem;
    scroll-margin-top: 1rem;  /* for scrollIntoView */
  }
  .q-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: .75rem; gap: 8px;
  }
  .q-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: .85rem; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .q-nav button:hover { background: var(--accent-light); color: var(--accent); }
  .q-nav button:disabled { opacity: .3; cursor: default; }
  .q-slide-link {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent); font-size: .72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: background .15s, border-color .15s;
  }
  .q-slide-link:hover { background: var(--accent-light); border-color: var(--accent); }
  .q-counter { font-size: .8rem; color: var(--text2); font-weight: 500; }

  /* Card metadata badges */
  .card-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge {
    background: var(--surface2); border-radius: 10px;
    padding: 2px 8px; font-size: .7rem; color: var(--text2);
  }
  .badge-num {
    background: var(--accent); color: #fff;
  }
  .badge-basket-cc {
    background: #f59e0b; color: #fff;
  }
  .badge-basket-mech {
    background: #8b5cf6; color: #fff;
  }
  .badge-basket-diff {
    background: #ec4899; color: #fff;
  }
  .badge-mesh-diff {
    background: #0ea5e9; color: #fff;
  }
  .q-type-divider {
    display: flex; align-items: center;
    margin-bottom: 10px; padding: 6px 0;
    color: #0ea5e9; font-size: .78rem; font-weight: 600;
    letter-spacing: .3px;
  }
  .q-type-divider > * + * { margin-left: 8px; }
  @supports (gap: 0px) {
    .q-type-divider { gap: 8px; }
    .q-type-divider > * + * { margin-left: 0; }
  }
  .q-type-divider::before, .q-type-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
  }

  .q-text { font-size: .92rem; line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }

  /* ── Options (FTM: letter + text + exclude X) ───────────────────────── */
  .options { display: flex; flex-direction: column; margin-bottom: .75rem; }
  .options > * + * { margin-top: .45rem; }
  @supports (gap: 0px) {
    .options { gap: .45rem; }
    .options > * + * { margin-top: 0; }
  }
  .option {
    display: flex; align-items: flex-start; gap: 8px;
    padding: .55rem .85rem; border-radius: 7px;
    border: 1.5px solid var(--border); cursor: pointer;
    font-size: .88rem; line-height: 1.45;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .option:hover:not(.locked):not(.excluded) {
    border-color: var(--accent); background: var(--accent-light);
  }
  .option.correct { border-color: var(--correct); background: #f0fdf4;
    color: var(--correct); font-weight: 600; }
  .option.wrong { border-color: var(--wrong); background: #fef2f2;
    color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.excluded {
    background: #fef2f2; border-color: var(--wrong); opacity: .6;
    cursor: default;
  }
  .option.excluded .exclude-btn {
    background: var(--wrong); color: #fff; border-color: var(--wrong);
  }
  .letter { font-weight: 700; color: var(--accent); min-width: 16px; flex-shrink: 0; }
  .opt-text { flex: 1; }
  .exclude-btn {
    margin-left: auto; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .exclude-btn:hover { background: var(--surface2); }

  /* ── Answer box ─────────────────────────────────────────────────────── */
  .answer-box {
    display: none; margin-top: .75rem; padding: .75rem;
    background: var(--accent-light); border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .answer-box.show { display: block; }
  .correct-badge {
    background: var(--correct); color: #fff; border-radius: 10px;
    padding: 2px 10px; font-size: .78rem; display: inline-block;
    margin-bottom: 6px; font-weight: 600;
  }
  .explanation { font-size: .85rem; line-height: 1.55; color: #334155; }

  /* ── Highlighter (text selection → mark) ─────────────────────── */
  .hl-mark {
    background: #fef08a; border-radius: 2px; padding: 0 1px;
    cursor: pointer;
  }
  .hl-mark:hover { opacity: .7; }
  .mesh-path-box {
    margin-top: 8px; padding: 8px 10px;
    background: #fef3c7; border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    font-size: .82rem; line-height: 1.5; color: #92400e;
  }

  /* ── Key Content box (DRP conditional) ──────────────────────────────── */
  .key-content-box {
    margin-top: 1rem; padding: .85rem 1rem;
    background: #fefce8; border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b; border-radius: 0 8px 8px 0;
    font-size: .85rem; line-height: 1.6; color: #78350f;
  }
  .key-content-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #92400e; margin-bottom: .35rem;
  }

  /* ── MeSH overlay (totalmesh / chunkmesh) ────────────────────────────── */
  .mesh-overlay-box {
    margin-top: .7rem; padding: .75rem 1rem;
    border-radius: 0 8px 8px 0;
    font-size: .82rem; line-height: 1.6;
  }
  .totalmesh-box {
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-left: 4px solid #2563eb; color: #1e3a5f;
  }
  .chunkmesh-box {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-left: 4px solid #16a34a; color: #14532d;
  }
  .mesh-overlay-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: .35rem;
  }
  .mesh-overlay-text {
    margin: 0; white-space: pre-wrap; font-family: inherit;
    font-size: .8rem; line-height: 1.5;
  }
  .learning-path-panel {
    margin: .7rem 0; padding: .75rem 1rem;
    background: #fef2f2; border: 1px solid #fecaca;
    border-left: 4px solid #dc2626; border-radius: 0 8px 8px 0;
  }
  .learning-path-title {
    font-size: .75rem; font-weight: 700; color: #991b1b;
    margin-bottom: .5rem;
  }

  /* ── Expandable transcript (FTM conditional) ────────────────────────── */
  .chunk-detail { margin-top: .5rem; }
  .chunk-detail summary {
    font-size: .75rem; color: var(--text2); cursor: pointer;
  }
  .chunk-text {
    font-size: .75rem; color: var(--text2); margin-top: 6px;
    line-height: 1.5; white-space: pre-wrap;
    max-height: 160px; overflow-y: auto;
  }

  /* ── Image fullscreen overlay (DRP) ─────────────────────────────────── */
  #img-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 300;
    cursor: zoom-out; align-items: center; justify-content: center;
  }
  #img-overlay.show { display: flex; }
  #img-container {
    position: relative; display: inline-block; line-height: 0;
  }
  #img-container img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 6px; transition: transform .1s ease;
    transform-origin: center center;
  }
  #anno-overlay-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border-radius: 6px;
    pointer-events: none;
  }
  #anno-overlay-canvas.active {
    pointer-events: auto; cursor: crosshair;
    touch-action: none;
  }
  #anno-overlay-toolbar {
    display: none; position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 310;
    align-items: center; flex-wrap: wrap;
    background: rgba(15,23,42,.95); color: #cbd5e1;
    padding: 8px 14px; border-radius: 12px; font-size: .78rem;
  }
  #anno-overlay-toolbar.show { display: flex; }
  #anno-overlay-toolbar > * + * { margin-left: 4px; }
  @supports (gap: 0px) {
    #anno-overlay-toolbar { gap: 4px; }
    #anno-overlay-toolbar > * + * { margin-left: 0; }
  }

  /* ── Review overlay (DRP full-screen) ───────────────────────────────── */
  #review-overlay {
    display: none; position: fixed; inset: 0; background: var(--bg);
    z-index: 200; flex-direction: column;
  }
  #review-overlay.show { display: flex; }
  #review-header {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #review-title { font-size: .95rem; font-weight: 700; color: var(--accent); }
  #review-close {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: .85rem;
  }
  #review-close:hover { background: #fef2f2; border-color: var(--wrong); color: var(--wrong); }
  #review-body { flex: 1; display: flex; overflow: hidden; }
  #review-slide-col {
    width: 42%; min-width: 20%; max-width: 70%; flex-shrink: 0;
    overflow-y: scroll; scroll-snap-type: y proximity;
    overscroll-behavior: contain; background: #1e293b;
    -webkit-overflow-scrolling: touch;
  }
  #review-slide-col::-webkit-scrollbar { display: none; }
  #review-slide-col { scrollbar-width: none; }
  #review-slide-col img {
    width: 100%; height: auto; object-fit: contain; display: block;
  }
  #review-divider {
    width: 5px; flex-shrink: 0; cursor: col-resize;
    background: #334155; transition: background .15s;
  }
  #review-divider:hover, #review-divider.dragging { background: var(--accent); }
  #review-quiz-col {
    flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem 50vh;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Inline slides (portrait only) ──────────────────────────────────── */
  .inline-slides { display: none; margin-bottom: .75rem; }
  /* Safari < 15 fallback: padding-bottom trick maintains 16:9 ratio */
  .inline-slide-viewer {
    position: relative; background: #1e293b; border-radius: 8px;
    overflow: hidden; width: 100%; padding-bottom: 56.25%; height: 0;
  }
  .inline-slide-viewer > * {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @supports (aspect-ratio: 1) {
    .inline-slide-viewer {
      aspect-ratio: 16/9; padding-bottom: 0; height: auto;
      display: flex; align-items: center; justify-content: center;
    }
    .inline-slide-viewer > * {
      position: static; width: auto; height: auto;
    }
  }
  .inline-slide-img {
    max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;
  }
  .inline-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.45); color: #fff; border: none;
    border-radius: 50%; width: 32px; height: 32px; font-size: .9rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 2; transition: background .15s;
  }
  .inline-nav-btn:hover { background: rgba(37,99,235,.8); }
  .inline-nav-btn:disabled { opacity: .2; cursor: default; }
  .inline-nav-btn.prev { left: 8px; }
  .inline-nav-btn.next { right: 8px; }
  .inline-slide-counter {
    text-align: center; font-size: .72rem; color: var(--text2); margin-top: 4px;
  }

  /* ── Portrait responsive (DRP) ──────────────────────────────────────── */

"C", "text": "E6는 Rb와, E7은 p53과 각각 결합하여 기능을 억제한다."}, {"letter": "D", "text": "E6와 E7 모두 p53과 결합하여 기능을 억제한다."}, {"letter": "E", "text": "E6와 E7 모두 Rb와 결합하여 기능을 억제한다."}], "answer": "A", "explanation": "HPV의 발암기전에서 조기 단백질 E6는 종양억제유전자 p53과 결합하여 p53의 기능을 억제하고, E7은 Rb 단백질과 결합하여 Rb의 기능을 억제함으로써 세포의 무한증식을 유발한다. 따라서 정답은 'E6는 p53과, E7은 Rb와 각각 결합하여 기능을 억제한다.'이다. 'E6는 Rb와, E7은 p53과 각각 결합하여 기능을 억제한다.'는 결합 상대가 반대로 되어 있어 틀리다. 나머지 보기들은 모두 E6와 E7의 실제 표적 단백질이 아니며, 특히 p16과 cyclin D1은 HPV 발암기전과 직접적 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "자궁경부 상피내 종양과 자궁경부암을 가장 흔히 유발하는 고위험군 인유두종 바이러스(HPV)의 아형으로 옳은 것은?", "options": [{"letter": "A", "text": "35형과 58형"}, {"letter": "B", "text": "31형과 45형"}, {"letter": "C", "text": "6형과 11형"}, {"letter": "D", "text": "33형과 52형"}, {"letter": "E", "text": "16형과 18형"}], "answer": "E", "explanation": "자궁경부암 및 고등급 상피내 종양(CIN)의 가장 흔한 원인은 고위험군 HPV 16형과 18형이며, 이 두 아형이 전체 자궁경부암의 약 70%를 차지한다. '6형과 11형'은 첨규콘딜로마를 유발하는 저위험군이다. '31형과 45형', '33형과 52형', '35형과 58형'도 고위험군이지만 16·18형만큼 흔하지 않다. 따라서 가장 흔한 아형을 묻는 이 문제에서는 16형과 18형이 정답이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "9가 인유두종 바이러스(HPV) 백신이 예방하는 고위험군 HPV 유형으로 옳은 것은?", "options": [{"letter": "A", "text": "6, 11, 16, 18"}, {"letter": "B", "text": "16, 18, 31, 33, 35, 45"}, {"letter": "C", "text": "16, 18, 31, 33, 45, 52, 58"}, {"letter": "D", "text": "16, 18, 31, 33, 35, 45, 52, 58"}, {"letter": "E", "text": "16, 18"}], "answer": "C", "explanation": "9가 HPV 백신은 저위험군인 6, 11형과 고위험군인 16, 18, 31, 33, 45, 52, 58형을 포함합니다. 고위험군만을 묻는 문제이므로 16, 18, 31, 33, 45, 52, 58이 정답입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 0}, {"question": "인유두종바이러스(HPV) 백신의 주요 목적은?", "options": [{"letter": "A", "text": "고위험 HPV 유형의 감염 예방"}, {"letter": "B", "text": "유방암 위험 unkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "골반 바닥을 지지하는 항문거근(levator ani muscle)을 구성하는 근육으로 옳은 것은?", "options": [{"letter": "A", "text": "치골직장근(puborectalis)"}, {"letter": "B", "text": "대요근(psoas major)"}, {"letter": "C", "text": "폐쇄근(obturator internus)"}, {"letter": "D", "text": "미골근(coccygeus)"}, {"letter": "E", "text": "이상근(piriformis)"}], "answer": "A", "explanation": "항문거근은 크게 치골내장근(pubovisceral portion: 치골직장근, 치골질근, 치골미골근)과 장골미골근(iliococcygeus)으로 구성됩니다. 폐쇄근과 이상근은 골반 측벽의 외측 회전근이며, 미골근은 항문거근과 별개의 근육이고, 대요근은 골반 후복벽 근육입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 13}, {"question": "자궁에 혈액을 공급하는 uterine artery는 주로 어느 혈관에서 기시하는가?", "options": [{"letter": "A", "text": "Ovarian artery"}, {"letter": "B", "text": "Abdominal aorta"}, {"letter": "C", "text": "Common iliac artery"}, {"letter": "D", "text": "Internal iliac artery의 anterior branch"}, {"letter": "E", "text": "External iliac artery"}], "answer": "D", "explanation": "Uterine artery는 일반적으로 internal iliac artery의 anterior branch에서 기시하여 자궁으로 주행한다. 따라서 'Internal iliac artery의 anterior branch'가 정답이다. Abdominal aorta에서는 ovarian artery가 직접 기시한다. Common iliac artery는 internal과 external로 나뉘기 전의 혈관이다. External iliac artery는 주로 하지로 가는 혈관으로 자궁에 혈액을 공급하지 않는다. Ovarian artery는 난소로 가는 혈관으로 자궁동맥과는 다르다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 14}, {"question": "난소동맥(ovarian artery)은 어디에서 직접 기시하는가?", "options": [{"letter": "A", "text": "외장골동맥(external iliac artery)"}, {"letter": "B", "text": "상장간막동맥(superior mesenteric artery)"}, {"letter": "C", "text": "복부 대동맥(abdominal aorta)"}, {"letter": "D", "text": "내장골동맥(internal iliac artery)"}, {"letter": "E", "text": "총장골동맥(common iliac artery)"}], "answer": "C", "explanation": "난소동맥은 복부 대동맥에서 직접 기시한다. 이는 내장골동맥의 분지로 공급받는 다른 골반 장기와 달 : "질은 전벽과 후벽이 밀착되어 있어 단면이 H자 모양을 보인다. 또한 후벽이 전벽보다 길어 posterior fornix가 더 깊다. '전벽과 후벽이 접촉하여 H자 형태를 이룬다'가 정답이다. 단면이 원형이라는 것은 틀렸다. 전벽이 후벽보다 길다는 것과 posterior fornix가 anterior fornix보다 얕다는 것은 실제 해부와 반대이다. 방광은 질의 앞쪽, 직장은 뒤쪽에 인접해 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "Vesicovaginal septum에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "질의 측벽을 형성하는 근육이다."}, {"letter": "B", "text": "자궁과 직장 사이에 위치한다."}, {"letter": "C", "text": "이 격벽의 결손은 방광질루(vesicovaginal fistula)를 유발할 수 있다."}, {"letter": "D", "text": "방광과 자궁 사이의 격벽이다."}, {"letter": "E", "text": "방광과 요도 사이의 격벽이다."}], "answer": "C", "explanation": "Vesicovaginal septum은 방광과 질 사이의 결합조직 격벽으로, 손상 시 소변이 질로 누출되는 vesicovaginal fistula가 발생할 수 있다. '이 격벽의 결손은 방광질루를 유발할 수 있다'가 정답이다. 방광과 자궁 사이의 격벽이라는 것은 해부학적 위치를 잘못 기술하였다. 자궁과 직장 사이는 rectovaginal septum이다. 질의 측벽 근육은 paravaginal tissue 등이다. 방광과 요도 사이는 urethrovesical junction이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "Culdocentesis 시 천자 부위로 가장 적절한 곳은?", "options": [{"letter": "A", "text": "Anterior fornix"}, {"letter": "B", "text": "Cervical os"}, {"letter": "C", "text": "Lateral fornix"}, {"letter": "D", "text": "Urogenital diaphragm"}, {"letter": "E", "text": "Posterior fornix"}], "answer": "E", "explanation": "Culdocentesis는 질의 posterior fornix를 통해 막힌 공간인 Douglas pouch (cul-de-sac)로 바늘을 찔러 액체를 흡인하는 검사법이다. Posterior fornix가 가장 깊고 접근이 용이하다. Anterior fornix와 lateral fornix는 깊지 않고 주요 장기에 인접하여 적절하지 않다. Cervical os는 자궁경관 입구로 천자 부위가 아니다. Urogenital diaphragm은 근막 구조로 외부에서 접근할 수 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "질의 해부학적 구조 중 전벽과 후벽의 길이에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "후벽이 전벽보다 길며, 이는 후질원개의 깊이와 관련된다"}, {"letter": "B", "text": "나이가 들수록 전벽의 길이가 후벽보다 길어진다"}, {"letter": "C", "text": "길이 차이는 개체 변이가 아주 적어 측정할 필요가 없다"}, {"letter": "D", "text": "전벽과 후벽의 길이는 항상 동일하다"}, {"letter": "E", "text": "전벽이 후벽보다 유의하게 길다"}], "answer": "E", "explanation": "질의 후벽은 전벽보다 약간 길다(약 1~2cm 차이). 이러한 해부학적 특징 때문에 후질원개(posterior fornix)가 더 깊게 형성되며, culdocentesis 등 임상 시술 시 중요한 해부학적 이정표가 된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "질(vagina)의 앞벽과 뒤벽 길이에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "뒤벽이 앞벽보다 길다"}, {"letter": "B", "text": "앞벽과 뒤벽의 길이는 같다"}, {"letter": "C", "text": "개인차가 없이 항상 일정하다"}, {"letter": "D", "text": "자세에 따라 달라진다"}, {"letter": "E", "text": "앞벽이 뒤벽보다 길다"}], "answer": "A", "explanation": "질의 뒤벽은 앞벽보다 길어서 성인 여성에서 약 7-8cm와 6-7cm로 각각 측정된다. 이러한 차이는 자궁경부의 위치와 더글라스와의 형성에 기여한다. 앞벽이 더 길거나 같지 않으며, 개인차는 존재하지만 기본적인 길이 관계는 일정하다. 자세에 따른 변화는 미미하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "자궁경부 주변의 질 원개(fornix) 중 가장 깊고, 복강 천자(culdocentesis) 시 이용되는 부위는?", "options": [{"letter": "A", "text": "뒤원개(posterior fornix)"}, {"letter": "B", "text": "왼쪽원개(left fornix)"}, {"letter": "C", "text": "자궁경부 바로 아래(directly below the cervix)"}, {"letter": "D", "text": "앞원개(anterior fornix)"}, {"letter": "E", "text": "오른쪽원개(right fornix)"}], "answer": "A", "explanation": "뒤원개는 질의 가장 깊은 함요부로, 더글라스와에 인접해 있어 복강 내 액체를 흡인하기 위해 culdocentesis 시 이용된다. 앞원개는 뒤원개보다 얕고, 외측 원개도 상대적으로 깊지 않다. 자궁경부 바로 아래는 검체 채취 부위가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 15}, {"question": "복강 내 액체를 검사하기 위해 culdocentesis를 시행할 때 바늘을 삽입하는 해부학적 지점은?", "options": [{"letter": "A", "text": "posterior fornix"}, {"letter": "B", "text": "cervical os"}, {"letter": "C", "text": "uterine fundus"}, {"letter": "D", "text": "lateral fornix"}, {"letter": "E", "text": "anterior fornix"}], "answer": "A", "explanation": "cul hPath": "", "matchedSlide": 22}, {"question": "GnRH agonist를 처음으로 투여했을 때 예상되는 초기 반응은?", "options": [{"letter": "A", "text": "prolactin level의 급격한 상승"}, {"letter": "B", "text": "LH와 FSH의 지속적인 감소"}, {"letter": "C", "text": "FSH와 LH 수치의 일시적 상승"}, {"letter": "D", "text": "estrogen 수치의 즉각적인 감소"}, {"letter": "E", "text": "vaginal dryness와 열감"}], "answer": "C", "explanation": "GnRH agonist는 GnRH 수용체에 결합하여 초기에 LH와 FSH 분비를 급격히 증가시키는 flare effect를 나타냅니다. 지속 투여 시 down-regulation으로 분비가 억제되지만 처음에는 일시적 상승이 관찰됩니다. prolactin 상승이나 폐경 증상은 장기적인 억제 효과로 인해 나타나며 flare effect 직후에는 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH agonist를 지속적으로 반복 투여하였을 때 나타나는 기전으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "시상하부의 GnRH 생성 증가"}, {"letter": "B", "text": "난소의 GnRH 수용체 차단"}, {"letter": "C", "text": "FSH와 LH의 합성 증가"}, {"letter": "D", "text": "뇌하수체 GnRH 수용체의 down-regulation"}, {"letter": "E", "text": "GnRH 수용체의 affinity 감소"}], "answer": "D", "explanation": "GnRH agonist를 지속 투여하면 처음에는 flare 효과로 FSH/LH 분비가 촉진되지만, 반복 투여 시 뇌하수체 전엽의 GnRH 수용체가 감소(down-regulation)하고 탈감작되어 결과적으로 FSH, LH 분비가 억제됩니다. 이는 수용체 internalization 및 uncoupling과 관련이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "GnRH antagonist의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "progesterone 분비를 촉진한다"}, {"letter": "B", "text": "초기 flare 효과가 있다"}, {"letter": "C", "text": "LH 수치가 일시적으로 상승한다"}, {"letter": "D", "text": "투여 즉시 FSH와 LH 분비를 억제한다"}, {"letter": "E", "text": "estrogen synthesis를 증가시킨다"}], "answer": "D", "explanation": "GnRH antagonist는 GnRH 수용체에 경쟁적으로 결합하여 GnRH의 작용을 차단하므로 투여 즉시 FSH와 LH 분비가 억제됩니다. agonist와 달리 flare-up 효과가 없으며, 이로 인해 초기 호르몬 상승 없이 바로 hypogonadotropic 상태를 유도할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question":  {"letter": "C", "text": "혈관 신생을 촉진하여 내막 재생을 돕는다."}, {"letter": "D", "text": "자궁 평활근 수축을 강화하여 출혈을 감소시킨다."}, {"letter": "E", "text": "뇌하수체 성선자극호르몬 분비를 억제하여 가폐경 상태를 유도한다."}], "answer": "E", "explanation": "GnRH 작용제는 지속 투여 시 뇌하수체의 GnRH 수용체를 탈감작시켜 LH, FSH 분비를 억제하고, 결과적으로 난소의 estrogen 생성을 차단하여 가역적인 폐경 상태를 만든다. 이로 인해 월경이 억제된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 23}, {"question": "황체호르몬(progesterone)이 자궁내막에 미치는 가장 중요한 역할은?", "options": [{"letter": "A", "text": "자궁내막을 분비기로 전환하고 안정화시킨다"}, {"letter": "B", "text": "혈관 생성을 억제한다"}, {"letter": "C", "text": "월경 출혈을 유도한다"}, {"letter": "D", "text": "자궁내막 증식을 촉진한다"}, {"letter": "E", "text": "자궁내막을 탈락시킨다"}], "answer": "D", "explanation": "프로게스테론은 에스트로겐에 의해 증식된 자궁내막을 분비기로 전환시켜 착상에 적합하게 만들고, 과도한 증식을 방지하여 자궁내막을 안정화시킨다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "28일 주기의 정상 월경 주기에서, 혈중 progesterone 농도가 급격히 감소하기 시작하는 시점과 가장 관련이 깊은 것은?", "options": [{"letter": "A", "text": "황체의 수명이 종료되는 시점"}, {"letter": "B", "text": "자궁내막 증식이 가장 활발한 시점"}, {"letter": "C", "text": "수정란이 자궁내막에 착상하는 시점"}, {"letter": "D", "text": "배란 직후 난포의 estrogen 분비가 증가하는 시점"}, {"letter": "E", "text": "LH surge가 최고치에 도달하는 시점"}], "answer": "A", "explanation": "Progesterone은 배란 후 형성된 황체(corpus luteum)에서 분비되어 자궁내막을 안정화시킵니다. 황체의 수명은 약 10일로, 임신이 되지 않으면 황체가 퇴화하여 혈중 progesterone 농도가 급격히 감소하고, 이로 인해 progesterone withdrawal bleeding(월경)이 발생합니다. 따라서 정답은 '황체의 수명이 종료되는 시점'입니다. '배란 직후 난포의 estrogen 분비가 증가하는 시점'은 오히려 follicular phase에 해당하며, 'LH surge가 최고치에 도달하는 시점'은 배란을 유발하지만 progesterone 감소와 직접적 연관은 없습니다. '자궁내막 증식이 가장 활발한 시점'은 estrogen에 의한 proliferative phase이며, '수정란이 자궁내막에 착상하는 시점'은 오히려 progesterone 유지가 필요한 때입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 25}, {"question": "자궁내막의 증식기(proliferative phase)에 직접적으로 관여하는 호르몬의 주요 생성 성숙 난자와 제2극체"}, {"letter": "C", "text": "제1차 난모세포와 제2차 난모세포"}, {"letter": "D", "text": "난모세포와 난포세포"}, {"letter": "E", "text": "수정란과 제1극체"}], "answer": "A", "explanation": "강의에서 LH surge가 발생하면 정지되어 있던 제1감수분열이 완료되어 2차 난모세포와 1차 극체(polar body)가 만들어진다고 설명하였다. 성숙 난자와 제2극체는 수정 시 완성되며, 나머지 보기는 올바른 산물이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 27}, {"question": "갑상선기능저하증(hypothyroidism)이 있는 여성에서 무월경(amenorrhea)이 발생하는 기전으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "TSH와 FSH/LH의 알파 소단위체 유사성으로 인한 FSH, LH 분비 억제"}, {"letter": "B", "text": "에스트로겐 과잉으로 인한 자궁내막 과증식"}, {"letter": "C", "text": "프로락틴 분비 증가로 인한 배란 억제"}, {"letter": "D", "text": "갑상선호르몬 결핍으로 인한 자궁내막 위축"}, {"letter": "E", "text": "TRH의 직접적인 난소 기능 억제"}], "answer": "A", "explanation": "갑상선기능저하증에서는 갑상선호르몬 부족으로 TSH가 증가합니다. TSH의 알파 소단위체는 FSH, LH, hCG의 알파 소단위체와 유사하기 때문에, 높은 TSH가 뇌하수체에 부정적 피드백을 주어 FSH와 LH 분비를 억제하게 됩니다. 이로 인해 난포 발달과 배란이 저해되어 무월경이 발생합니다. '에스트로겐 과잉'은 반대 개념이며, '프로락틴 분비 증가'도 무월경을 유발할 수 있지만 hypothyroidism에서는 일차적으로 TSH 경로입니다. 'TRH의 직접적인 난소 기능 억제'는 근거가 없고, '자궁내막 위축'은 이차적 현상입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 28}, {"question": "갑상선 기능 저하증(hypothyroidism)이 무월경의 원인으로 의심될 때 환자에게 확인할 수 있는 증상으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "유즙 분비, 두통, 시야 결손"}, {"letter": "B", "text": "다모증, 여드름, 음성 저하"}, {"letter": "C", "text": "근육 경련, 테타니, 저칼슘혈증"}, {"letter": "D", "text": "피로감, 추위 민감성, 탈모, 체중 증가"}, {"letter": "E", "text": "심계항진, 체중 감소, 불면증, 열 불내성"}], "answer": "D", "explanation": "갑상선 기능 저하증은 대사 저하로 인해 피로감, 추위 민감성, 체중 증가, 탈모, 부종 등의 증상이 나타난다. '심계항진, 체중 감소, 불면증, 열 불내성'은 갑상선 기능 항진증의 증상이며, '유즙 분비, 두통, 시야 결손'은 고프로락틴혈증, '다모증, 여드름, 음성 저하'는 남성 호르몬 과다, '근육 경련, 테타니, 저칼슘혈증'은 부갑상선 기능 저하증의 증상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 28}, {"question": "정상 월경량에 관한 설명으로 옳은 것은 단독"}, {"letter": "B", "text": "hematocolpos와 hematometra 동반"}, {"letter": "C", "text": "hematometra 단독"}, {"letter": "D", "text": "자궁내막증"}, {"letter": "E", "text": "hemoperitoneum"}], "answer": "B", "explanation": "완전한 질 횡격막은 외부로 배출되지 못한 월경혈이 질(hematocolpos)과 자궁(hematometra)에 모두 저류되므로 'hematocolpos와 hematometra 동반'이 가장 흔하다. 'hematocolpos 단독'이나 'hematometra 단독'은 불완전 폐쇄일 때, 'hemoperitoneum'은 복강 내 출혈을 의미하며, '자궁내막증'은 만성 합병증이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "13세 여아가 심한 월경통으로 내원하여 중복자궁과 한쪽 질 폐쇄로 인한 혈종이 확인되었다. 이 환자에게 시행할 초기 치료 단계로 가장 적절한 것은?", "options": [{"letter": "A", "text": "성인이 될 때까지 추적 관찰"}, {"letter": "B", "text": "양측 난소절제술"}, {"letter": "C", "text": "폐쇄된 쪽의 절개 및 배액"}, {"letter": "D", "text": "자궁적출술"}, {"letter": "E", "text": "완전한 질중격절제술"}], "answer": "C", "explanation": "폐쇄성 편측 질중격의 초기 응급 치료는 막힌 쪽의 중격을 절개하여 고인 월경혈을 배액하고 증상을 완화시키는 것이 우선이다. '완전한 질중격절제술'은 성인이 되어 성생활 고려 시 시행할 수 있으며, '성인이 될 때까지 추적 관찰'은 통증이 심해 불가능하다. '자궁적출술'이나 '난소절제술'은 적응증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "초경을 경험한 적이 없는 15세 여성이 주기적인 하복부 통증과 질 입구가 막힌 것 같은 느낌을 호소한다. 진찰 소견상 외음부에 bulging mass가 관찰된다. 가장 적절한 초기 치료는 무엇인가?", "options": [{"letter": "A", "text": "원형 절제를 통한 hymen 성형술"}, {"letter": "B", "text": "복강경을 통한 hymen 절제술"}, {"letter": "C", "text": "십자절개를 통한 hymen 개방술"}, {"letter": "D", "text": "Estrogen 크림 도포 후 자연 개방 유도"}, {"letter": "E", "text": "질 확장기를 이용한 점진적 확장"}], "answer": "C", "explanation": "Hymenal atresia로 인한 hematocolpos의 치료는 외과적 절개입니다. 전통적으로 십자절개(cruciate incision)를 시행하여 재유착을 방지합니다. 최근에는 원형 절제술도 시행되지만, 시험 정답은 십자절개입니다. '복강경을 통한 hymen 절제술'은 불필요한 복강 내 접근입니다. '질 확장기를 이용한 점진적 확장'은 효과가 없습니다. 'Estrogen 크림 도포 후 자연 개방 유도'는 적절한 치료가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "12세 여아가 3개월 전 초경을 시작한 이후로 생리량이 점차 줄고 주기적인 골반통이 악화되어 내원하였다. 외부 생식기는 정상 소견이며 질 입구에서 막힌 구조물은 관찰되지 않는다. 복부 CT에서 hematocolpos와 hematometra가 관찰되었다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Imperforate cervix"}, {"letter": "B", "text": "Hymenal atresia"}, {"letter": "C", "text": "Uterus didelphys with obstructed hemivagina"}, {"letter": "D", "text": "Transverse vaginal septum"}, {"letter": "E", "text": "Longitudinal vaginal septum"}], "answer": "D", "explanation": "Transverse vaginal septum은 질 내에 가로막이 형성되어 완전 폐쇄를 유발하며, hematocolpos와 hematometra를 모두 일으킬 수 있습니다. 외음부에서 bulging이 관찰되지 않은 점이 hymenal atresia와의 감별점입니다. 'Longitudinal vaginal septum'은 보통 완전 폐쇄를 일으키지 않습니다. 'Imperforate cervix'는 hematometra만 발생시킵니다. 'Uterus didelphys with obstructed hemivagina'는 편측성 폐쇄로, 편측에만 hematocolpos가 생깁니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "14세 여아가 매달 반복되는 심한 아랫배 통증을 호소하며 초경이 없다. 신체 검사에서 유방 발달과 치모는 정상이고, 질 입구에 팽창된 푸른빛 막이 관찰된다. 초음파에서 질과 자궁강에 혈액 저류가 보인다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "원발성 월경곤란증"}, {"letter": "B", "text": "자궁내막증"}, {"letter": "C", "text": "뮐러관 무발생증"}, {"letter": "D", "text": "질 횡격막"}, {"letter": "E", "text": "처녀막 폐쇄증"}], "answer": "E", "explanation": "처녀막 폐쇄증은 자궁과 질은 정상적으로 존재하지만 처녀막이 막혀 월경혈이 배출되지 못해 주기적 통증과 혈종을 형성한다. 질 입구의 팽창된 푸른빛 막은 전형적인 소견이다. 질 횡격막도 유사한 증상을 일으킬 수 있으나 질 안쪽에 존재하며 외부에서 관찰되지 않을 수 있다. 뮐러관 무발생증은 자궁이 없으므로 혈액 저류가 생기지 않는다. 자궁내막증과 원발성 월경곤란증은 무월경보다는 생리통과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "처녀막 폐쇄증(imperforate hymen)을 진단하기 위한 신체 검진 방법으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "경질 초음파를 통해 자궁내막 두께를 측정"}, {"letter": "B", "text": "직장-복부 이중 합진으로 자궁의 크기와 위치 확인"}, {"letter": "C", "text": "환자에게 숨을 참고 복압을 가하도록 하여 질구의 팽륭을 관찰"}, {"letter": "D", "text": "골반 MRI를 촬영하여 자궁과 난소의 기형 여부 평가"}, {"letter": "E", "text": "자궁난관 조영술을 시행하여 나팔관 개통성 확인"}], "answer": "C", "explanation": "처녀막 폐쇄증에서는 질구가 막혀 월경혈이 질 내에 저류되므로, 발살바 수기를 시키면 막이 풍선처럼 늘어나 푸른빛으로 관찰되는 팽륭이 나타난다. 이는 간단하고 특이적인 소견이다. '골반 MRI'는 보조적 검사이나 일차적으로 시행하지 않으며, '직장-복부 합진'은 자궁 경부 폐쇄 등에서 시행할 수 있다. '자궁난관 조영술'은 난관 개통성 평가에, '경질 초음파'는 내막 두께 평가에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 34}, {"question": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "원발성 무월경이 있으나 유방 발달은 정상이다"}, {"letter": "B", "text": "성생활을 위해 호르몬 치료가 필수적이다"}, {"letter": "C", "text": "핵형은 46XY이다"}, {"letter": "D", "text": "안드로겐 불응성 증후군과 감별이 불필요하다"}, {"letter": "E", "text": "자궁과 난소가 모두 결여된다"}], "answer": "A", "explanation": "MRKH 증후군은 46XX 핵형으로 자궁과 상부 질이 결여되지만 난소는 정상이므로 유방 발달은 정상이다. 따라서 '원발성 무월경이 있으나 유방 발달은 정상이다'가 옳다. '핵형은 46XY이다'는 안드로겐 불응성 증후군이다. '자궁과 난소가 모두 결여된다'는 난소가 정상이므로 틀리다. '안드로겐 불응성 증후군과 감별이 불필요하다'가 아니라 반드시 감별해야 한다. '성생활을 위해 호르몬 치료가 필수적이다'가 아니라 질 확장술이 필요하고 호르몬 치료는 불필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 35}, {"question": "MRKH 증후군에서 흔히 동반될 수 있는 기형으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "사지 기형"}, {"letter": "B", "text": "뇌 기형"}, {"letter": "C", "text": "심장 기형"}, {"letter": "D", "text": "위장관 기형"}, {"letter": "E", "text": "신장 기형"}], "answer": "E", "explanation": "MRKH 증후군은 Müllerian duct의 발생 부전으로, 자궁과 질 상부가 결여됩니다. 배아학적으로 신장과 생식계가 가까이 발생하므로 신장 기형(신무발생, 융합신, 이상 위치 등)이 흔히 동반됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "American Fertility Society 분류에 따른 자궁 기형 중 가장 흔한 유형은?", "options": [{"letter": "A", "text": "공상자궁"}, {"letter": "B", "text": "쌍각자궁"}, {"letter": "C", "text": "중복자궁"}, {"letter": "D", "text": "단각자궁"}, {"letter": "E", "text": "중격자궁"}], "answer": "E", "explanation": "중격자궁(septate uterus)은 전체 자궁 기형 중 가장 높은 빈도를 차지하며, 그 다음으로 쌍각자궁, 공상자궁, 단각자궁, 중복자궁 순으로 흔하다. 강의에서 'septate uterus가 제일 기형 중에 많이 있고, bicornuate uterus가 그 다음'이라고 설명했다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "28세 여성이 습관성 유산(3회)으로 불임 클리닉에 내원하였다. 자궁난관조영술(hysterosalpingogram) 시행 결과 자궁강 내에 중앙으로부터 돌출된 하나의 격벽이 관찰되어 자궁강이 두 개로 나뉘어 보였다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "단각자궁 (Unicornuate uterus)"}, {"letter": "B", "text": "궁상자궁 (Arcuate uterus)"}, {"letter": "C", "text": "중격자궁 (Septate uterus)"}, {"letter": "D", "text": "쌍각자궁 (Bicornuate uterus)"}, {"letter": "E", "text": "중복자궁 (Uterus didelphys)"}], "answer": "C", "explanation": "자궁난관조영술에서 자궁강 내 격벽(septum)이 보여 두 개의 자궁강처럼 나타나는 것은 중격자궁(septate uterus)의 전형적 소견이다. 쌍각자궁은 자궁저부의 외측 함몰이 함께 관찰되며, 단각자궁은 한쪽 뮐러관의 발달 부전으로 작은 자궁강 하나만 보인다. 중복자궁은 두 개의 완전히 분리된 자궁과 질을 갖는다. 궁상자궁은 자궁저부가 약간 오목할 뿐 정상에 가깝다. 중격자궁은 유산의 위험이 높으므로 적극적 교정이 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "다음 중 자궁 기형 중 가장 높은 빈도를 차지하는 것은?", "options": [{"letter": "A", "text": "A. 단각자궁 (Unicornuate uterus)"}, {"letter": "B", "text": "D. 중격자궁 (Septate uterus)"}, {"letter": "C", "text": "E. 공상자궁 (Arcuate uterus)"}, {"letter": "D", "text": "C. 쌍각자궁 (Bicornuate uterus)"}, {"letter": "E", "text": "B. 중복자궁 (Uterus didelphys)"}], "answer": "B", "explanation": "강의에서 '자궁 기형의 빈도만 보면, 사이에 막이 있는 septate uterus가 제일 기형 중에 많이 있고, 합쳐지다가 만, 쌍각 양쪽으로 뿔이 있는 형태로 있는 bicornuate uterus가 그 다음입니다. 그리고 세 번째로 공상자궁...'이라고 하였으므로 중격자궁이 가장 흔합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 37}, {"question": "30세 초임부가 임신 32주에 태아 횡위로 내원하였다. 이전 초음파에서 자궁 기형이 의심되어 시행한 MRI에서 자궁 저부가 양쪽으로 깊게 함몰된 형태(>1cm)를 보이고, 내부는 두 개의 자궁강이 나뉘어 있다. 다음 중 가장 가능성 있는 기형은?", "options": [{"letter": "A", "text": "중복자궁"}, {"letter": "B", "text": "중격자궁"}, {"letter": "C", "text": "공상자궁"}, {"letter": "D", "text": "단각자궁"}, {"letter": "E", "text": "쌍각자궁"}], "answer": "E", "explanation": "쌍각자궁은 저부의 깊은 함몰(indentation >1cm)과 두 개의 자궁강을 특징으로 하며, 자궁강이 좁아 태아가 횡위나 둔위를 취하기 쉽다. '중격자궁'은 외형이 정상이고, '공상자궁'은 함몰이 경미하며, '단각자궁'은 한쪽만 발달, '중복자궁'은 자궁경부도 완전히 두 개이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 38}, {"question": "자궁 기형 평가를 위해 MRI를 시행할 때, bicornuate uterus와 septate uterus를 감별하는 가장 중요한 소견은?", "options": [{"letter": "A", "text": "자궁강의 V-shape 형태"}, {"letter": "B", "text": "Endometrial cavity의 각도"}, {"letter": "C", "text": "자궁강 내 septum의 길이"}, {"letter": "D", "text": "Cervix의 개수"}, {"letter": "E", "text": "자궁 fundus의 indentation 유무"}], "answer": "E", "explanation": "Bicornuate uterus는 자궁 fundus가 깊게 함몰된 외형을 가지며(indentation >1cm), septate uterus는 fundus가 평활하거나 정상적인 외형을 가집니다. 이 차이를 MRI로 확인할 수 있습니다. 'Septum의 길이'나 '자궁강의 V-shape'은 두 질환 모두에서 나타날 수 있습니다. 'Cervix의 개수'는 둘 다 하나인 경우가 대부분입니다. 'Endometrial cavity의 각도'는 감별에 주요 소견이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 39}, {"question": "자궁의 internal cavity shape 평가를 위해 시행하는 hysterosalpingography(HSG)의 한계점으로, 자궁 기형 감별 진단에서 추가적인 MRI 촬영이 필요한 이유는?", "options": [{"letter": "A", "text": "자궁내 septum의 길이 측정이 불가능하기 때문에"}, {"letter": "B", "text": "Endometrial cavity의 용적을 측정할 수 없기 때문에"}, {"letter": "C", "text": "자궁 fundus의 외부 윤곽을 평가할 수 없기 때문에"}, {"letter": "D", "text": "난관 개통 여부를 확인할 수 없기 때문에"}, {"letter": "E", "text": "Cervix의 개수를 정확히 알 수 없기 때문에"}], "answer": "C", "explanation": "HSG는 자궁 내강 형태는 보여주지만, 자궁 바깥쪽 fundus의 윤곽은 평가할 수 없습니다. Bicornuate와 septate uterus의 감별은 fundal indentation 유무가 결정적이므로, MRI 또는 3D 초음파가 필요합니다. 다른 선택지는 HSG의 주된 한계가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 39}, {"question": "MRKH 증후군(Mayer-Rokitansky-Küster-Hauser syndrome) 환자에게서 흔히 동반될 수 있는 이상으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "신장 무발생이나 골반 신장과 같은 비뇨기계 기형"}, {"letter": "B", "text": "Y 염색체로 인한 생식선 모세포종 발생"}, {"letter": "C", "text": "후각 신경 무발생으로 인한 무후각증"}, {"letter": "D", "text": "시야 결손을 유발하는 뇌하수체 종양"}, {"letter": "E", "text": "대동맥 협착 및 이첨판 대동맥 판막 질환"}], "answer": "A", "explanation": "MRKH 증후군은 뮐러관 무발생으로 자궁과 질 상부가 없고 난소는 정상인 46,XX 환자에서 발생하며, 편측 신장 무발생, 골반 신장 등 비뇨기계 기형을 약 30%에서 동반한다. '대동맥 협착'은 터너 증후군, '뇌하수체 종양으로 인한 시야 결손'은 프로락틴종, '무후각증'은 Kallmann 증후군, 'Y 염색체로 인한 모세포종'은 AIS나 Swyer 증후군과 관련된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 41}, {"question": "17세 여성이 초경이 없고 성관계 시 통증을 호소하여 내원하였다. 외부 생식기는 정상 여성형이나 질 길이가 2cm 정도의 맹낭이며, 초음파에서 자궁이 보이지 않고 양측 난소는 정상이다. 핵형은 46,XX이다. 다음 중 이 환자의 진단으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "5α-reductase 결핍"}, {"letter": "B", "text": "Mayer-Rokitansky-Küster-Hauser 증후군"}, {"letter": "C", "text": "Swyer 증후군"}, {"letter": "D", "text": "Turner 증후군"}, {"letter": "E", "text": "Androgen Insensitivity Syndrome"}], "answer": "B", "explanation": "MRKH 증후군은 46,XX 여성에서 뮐러관 발달 부전으로 자궁과 질 상부가 없으나 난소는 정상 기능을 한다. 'Androgen Insensitivity Syndrome'은 46,XY, 고환 존재, 자궁 없음, 유방 발달이 있고, 'Turner 증후군'은 45,X로 저신장과 신체 이상, '5α-reductase 결핍'과 'Swyer 증후군'은 모두 46,XY이므로 핵형과 임상 소견으로 배제된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "신생아가 출생 직후 외성기가 모호하여 정밀 검사를 시행하였다. 핵형은 46,XX이며, 골반 초음파에서 자궁과 난소는 정상적으로 관찰된다. 부신 효소 검사 결과 21-hydroxylase 결핍이 확인되었다. 이 환아에서 예상되는 가장 주된 신체 소견은?", "options": [{"letter": "A", "text": "남성화된 외부 생식기"}, {"letter": "B", "text": "생식샘 발달 장애"}, {"letter": "C", "text": "Müllerian duct 억제 부전"}, {"letter": "D", "text": "자궁과 질의 무발생"}, {"letter": "E", "text": "정상 남성 외성기"}], "answer": "A", "explanation": "21-hydroxylase 결핍은 부신에서 코르티솔 합성 저하로 안드로겐 과잉을 초래하며, 여성 태아에서 외성기 남성화(ambiguous genitalia)를 일으킨다. '자궁과 질의 무발생'은 MRKH, '정상 남성 외성기'는 46,XY에서 가능, '생식샘 발달 장애'는 Swyer 등, 'Müllerian duct 억제 부전'은 남성에서 지속 뮐러관 증후군으로 해당되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "16세 여성이 초경이 없고 유방 발달은 정상이나 음모가 거의 없어 내원하였다. 검사상 핵형은 46,XY, 자궁은 관찰되지 않으며 복강 내 고환이 확인되었다. testosterone 수치는 정상 남성 수준이다. 이 환자의 고환 절제술 시점으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "임신 계획 시"}, {"letter": "B", "text": "사춘기 완료 후"}, {"letter": "C", "text": "진단 즉시"}, {"letter": "D", "text": "사춘기 징후 시작 전"}, {"letter": "E", "text": "20세 이후"}], "answer": "B", "explanation": "Androgen Insensitivity Syndrome에서는 고환에서 분비된 호르몬이 유방 발달을 유도하므로, 자발적 사춘기 발달을 위해 사춘기 완료 후 고환절제술을 시행한다. 이후 에스트로겐 보충을 시작한다. '진단 즉시' 제거는 5α-reductase 결핍 등에서 필요하며, '사춘기 징후 시작 전' 제거 시 유방 발달이 저해될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "18세 여성이 무월경과 2차 성징 미발달로 내원하였다. 신체 검진에서 음모는 거의 없으며, 골반 초음파에서 자궁이 관찰되나 양측 난소는 보이지 않고 끈 모양의 생식샘이 확인되었다. 핵형은 46,XY이고, 혈중 FSH는 상승되어 있다. 다음 중 진단은?", "options": [{"letter": "A", "text": "Androgen Insensitivity Syndrome"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "Swyer 증후군"}, {"letter": "D", "text": "5α-reductase 결핍"}, {"letter": "E", "text": "Mayer-Rokitansky-Küster-Hauser 증후군"}], "answer": "C", "explanation": "Swyer 증후군은 46,XY에서 고환 발달 실패로 인해 AMH 분비가 없어 자궁이 형성되고, 여성 외부 생식기를 가지나 사춘기 발달이 없으며, 성선 스테로이드 호르몬 부족으로 FSH가 높다. 'MRKH'는 46,XX에 자궁 없음, 'AIS'는 자궁 없고 유방 발달, 'Turner'는 45,X, '5α-reductase 결핍'은 자궁 없고 DHT 저하로 구분된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 저신장과 2차 성징 지연으로 내원하였다. 신체 검진에서 익상경, 방패형 흉곽, 외반주(팔꿈치 바깥쪽 굽음)가 관찰된다. 혈액 검사에서 FSH가 상승되어 있다. 다음 중 가능성이 가장 높은 핵형은?", "options": [{"letter": "A", "text": "46,XY"}, {"letter": "B", "text": "47,XXX"}, {"letter": "C", "text": "46,XX/46,XY mosaic"}, {"letter": "D", "text": "45,X"}, {"letter": "E", "text": "46,XX"}], "answer": "D", "explanation": "저신장, 익상경, 방패형 흉곽, 외반주, 2차 성징 지연, 고 FSH는 Turner 증후군(45,X)의 전형적 소견이다. FSH 상승은 난소 무발생으로 인한 성선자극호르몬 과잉을 의미한다. 다른 핵형은 해당 임상 양상과 맞지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 여아가 저신장과 초경 지연으로 병원에 왔다. 신체검사에서 익상경(webbed neck)이 관찰되었고, 혈액검사 결과 FSH가 현저히 증가되어 있었다. 다음 중 가장 예상되는 핵형은?", "options": [{"letter": "A", "text": "46,XX/46,XY 모자이시즘"}, {"letter": "B", "text": "46,XX"}, {"letter": "C", "text": "46,XY"}, {"letter": "D", "text": "47,XXX"}, {"letter": "E", "text": "45,X0"}], "answer": "E", "explanation": "터너 증후군(Turner syndrome)은 단신, 익상경, 샘창자 형태의 난소(streak gonads)로 인한 일차성 무월경과 높은 FSH가 특징이며, 전형적인 핵형은 45,X0이다. 46,XX는 정상 여성 핵형이며, 46,XY는 안드로겐 불감성 증후군 등에서 보일 수 있다. 47,XXX는 삼중 X 증후군으로 생리 기능은 대체로 정상이다. 모자이시즘은 터너 증후군의 변이형으로 가능하나 가장 대표적인 것은 45,X0이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "5세 여아가 3개월 전부터 시작된 유방 발달을 주소로 내원하였다. 피부에는 커피색 반점(café-au-lait spots)이 엉덩이에 크게 관찰되었다. 혈액 검사상 FSH는 정상이었다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "특발성 진성 성조숙증 (Idiopathic central precocious puberty)"}, {"letter": "B", "text": "맥큔-올브라이트 증후군 (McCune-Albright syndrome)"}, {"letter": "C", "text": "선천성 부신증식증 (Congenital adrenal hyperplasia)"}, {"letter": "D", "text": "그라눌로사 세포종 (Granulosa cell tumor)"}, {"letter": "E", "text": "뇌종양에 의한 성조숙증"}], "answer": "B", "explanation": "맥큔-올브라이트 증후군은 성선자극호르몬 비의존성(말초성) 성조숙증의 대표적 질환으로, 카페오레 반점(café-au-lait spots)과 섬유성 골이형성증을 동반한다. FSH가 정상인 것은 GnRH-independent임을 시사한다. 특발성 진성 성조숙증은 카페오레 반점 없이 발생하며 FSH/LH 반응이 증가한다. 뇌종양은 두통, 신경 증상 등을 동반한다. 선천성 부신증식증은 여아의 경우 이성(heterosexual) 성조숙증을 일으킨다. 그라눌로사 세포종은 에스트로겐 분비 난소 종양으로 피부 소견은 동반되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "4세 여아가 치모(pubic hair) 발생과 음핵 비대(clitoromegaly)를 보여 내원하였다. 유방 발달은 없었다. 혈액 검사에서 17-히드록시프로게스테론(17-OHP)이 높았다. 가장 적합한 진단은?", "options": [{"letter": "A", "text": "선천성 부신증식증 (21-수산화효소 결핍)"}, {"letter": "B", "text": "안드로겐 불감성 증후군"}, {"letter": "C", "text": "그라눌로사 세포종"}, {"letter": "D", "text": "맥큔-올브라이트 증후군"}, {"letter": "E", "text": "조기 유방 발육 (Premature thelarche)"}], "answer": "A", "explanation": "여아에서 이성(heterosexual) 성조숙증, 즉 안드로겐 과잉으로 인한 음성화 징후(치모, 음핵 비대)가 나타나고 유방 발달이 동반되지 않는 경우, 선천성 부신증식증(CAH) 중 21-수산화효소 결핍이 가장 흔한 원인이다. 이 질환은 코티솔 합성 장애로 인해 부신에서 안드로겐이 과잉 생성되며, 선별 검사로 17-OHP의 상승이 진단적이다. 조기 유방 발육은 단독 유방 발육으로 음모가 없고 호르몬 검사가 정상이다. 안드로겐 불감성 증후군은 46,XY 핵형이며 테스토스테론에 대한 저항성으로 여성화된다. 그라눌로사 세포종은 에스트로겐 분비 종양이다. 맥큔-올브라이트 증후군은 주로 등성 성조숙증으로 여성화, 카페오레 반점이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "25세 여성이 정상 핵형(46,XX)의 성선 발달 부전(gonadal dysgenesis)으로 인한 원발성 무월경으로 진단받았다. 그녀는 임신을 강력히 원한다. 가장 적절한 치료 옵션은?", "options": [{"letter": "A", "text": "성선자극호르몬(Gonadotropin) 주사 요법"}, {"letter": "B", "text": "저용량 경구 피임약"}, {"letter": "C", "text": "고용량 에스트로겐 대체 요법"}, {"letter": "D", "text": "GnRH 효능제 투여"}, {"letter": "E", "text": "공여 난자(Donor oocyte)를 이용한 체외수정"}], "answer": "E", "explanation": "46,XX 성선 발달 부전에서는 난소가 없거나 기능이 거의 없어 자가 난자를 이용한 임신이 불가능하다. 따라서 제3자로부터 난자를 공여받아 체외수정(IVF)을 통해 임신을 시도하는 것이 유일한 방법이다. 이후 자궁 내막을 준비하기 위해 에스트로겐과 프로게스테론 대체 요법이 병행된다. 경구 피임약은 배란을 억제하여 임신을 방해한다. GnRH 효능제는 성선자극호르몬을 억제한다. 성선자극호르몬 주사는 난소가 기능할 때 배란 유도에 쓰인다. 고용량 에스트로겐은 임신 보조가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "14세 여아가 2차 성징 발달이 전혀 없어 내원하였다. 신장은 또래보다 작지만 성장 속도는 정상이다. 골연령은 11세로 측정되었고, FSH와 에스트라디올은 낮았다. 어머니도 초경이 16세에 있었다고 한다. 가장 적절한 조치는?", "options": [{"letter": "A", "text": "GnRH 자극 검사"}, {"letter": "B", "text": "갑상선 호르몬 검사"}, {"letter": "C", "text": "경과 관찰 및 안심시키기"}, {"letter": "D", "text": "즉시 에스트로겐 투여"}, {"letter": "E", "text": "성선 스테로이드 투여"}], "answer": "C", "explanation": "체질성 지연(constitutional delay)은 골연령 지연, 가족력, 정상 성장 속도를 특징으로 하는 흔한 사춘기 지연 원인입니다. 자연적으로 사춘기가 시작되므로 경과 관찰과 안심시키기가 적절합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "신생아에서 외부 생식기가 모호하고, 음핵 비대와 부분적인 음순 융합이 관찰된다. 핵형은 46,XX이며, 생식샘은 촉지되지 않는다. 가장 가능성 있는 진단은?", "options": [{"letter": "A", "text": "Congenital adrenal hyperplasia"}, {"letter": "B", "text": "Androgen insensitivity syndrome"}, {"letter": "C", "text": "5α-reductase deficiency"}, {"letter": "D", "text": "True hermaphroditism"}, {"letter": "E", "text": "Gonadal dysgenesis"}], "answer": "A", "explanation": "Congenital adrenal hyperplasia (CAH)는 46,XX에서 과도한 androgen 노출로 외성기 남성화를 초래합니다. 핵형이 46,XX이고 생식샘이 촉지되지 않는 점이 46,XY인 다른 선택지와 감별됩니다. 'Androgen insensitivity syndrome'은 46,XY로 여성 외형입니다. '5α-reductase deficiency'도 46,XY입니다. 'True hermaphroditism'은 극히 드뭅니다. 'Gonadal dysgenesis'는 남성화되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 환자가 초경 없이 내원하였다. 유방 발달은 미약하고, 외부 생식기는 여성형이며 질은 정상 길이이다. 복부 초음파에서 자궁은 존재하나 양측 streak gonad가 관찰되고 혈청 FSH는 높다. 진단은?", "options": [{"letter": "A", "text": "5α-reductase deficiency"}, {"letter": "B", "text": "Complete androgen insensitivity syndrome"}, {"letter": "C", "text": "Swyer syndrome"}, {"letter": "D", "text": "Congenital adrenal hyperplasia"}, {"letter": "E", "text": "Turner syndrome"}], "answer": "C", "explanation": "Swyer syndrome (XY gonadal dysgenesis)은 46,XY에서 고환 대신 흔적 생식샘(streak gonad)이 형성되어 AMH와 testosterone이 생성되지 않습니다. 따라서 자궁과 질이 존재하고, 유방 발달이 없으며, FSH가 높습니다. 'Turner syndrome'은 45,X입니다. 'AIS'는 유방 발달이 있고 자궁이 없습니다. '5α-reductase deficiency'는 사춘기 남성화가 있습니다. 'CAH'는 46,XX에서 남성화를 보입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "전형적인 Turner syndrome(45,X) 환자에서 반드시 평가해야 할 심혈관 기형은?", "options": [{"letter": "A", "text": "Ventricular septal defect"}, {"letter": "B", "text": "Transposition of the great arteries"}, {"letter": "C", "text": "Mitral valve prolapse"}, {"letter": "D", "text": "Coarctation of the aorta"}, {"letter": "E", "text": "Tetralogy of Fallot"}], "answer": "D", "explanation": "Turner syndrome은 대동맥 축착(coarctation of the aorta)과 이첨 대동맥 판막의 빈도가 높습니다. 따라서 심장 평가를 위해 echocardiogram이 필요합니다. 다른 기형들은 Turner syndrome과의 특이적 연관성이 낮습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 성 발달 장애 환자에서 혈청 FSH가 현저히 상승하는 질환은?", "options": [{"letter": "A", "text": "C. 스와이어 증후군 (Swyer syndrome)"}, {"letter": "B", "text": "A. 완전형 안드로겐 불감성 증후군 (Complete AIS)"}, {"letter": "C", "text": "D. 뮐러관 무발생증 (MRKH syndrome)"}, {"letter": "D", "text": "E. 부분형 안드로겐 불감성 증후군 (Partial AIS)"}, {"letter": "E", "text": "B. 5α-환원효소 결핍증 (5α-reductase deficiency)"}], "answer": "A", "explanation": "강의에서 'FSH는... gondal dysgenesis인 Swyer syndrome에서만, 이제 gonad가 없기 때문에, 그러니까 생성이 안 되기 때문에, 뇌하수체에서의 신호가 올라가서 FSH가 높게 나옵니다'라고 설명하였습니다. AIS에서는 고환이 정상적으로 기능하므로 FSH가 상승하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "Turner syndrome 환자에서 정상적인 성장과 사춘기 발달을 위해 가장 적절한 치료는?", "options": [{"letter": "A", "text": "C. 성장호르몬을 먼저 투여하고 이후 에스트로겐을 추가한다."}, {"letter": "B", "text": "E. 성장호르몬과 에스트로겐을 동시에 투여한다."}, {"letter": "C", "text": "A. 조기에 에스트로겐을 투여하고 이후 성장호르몬을 추가한다."}, {"letter": "D", "text": "B. 성장호르몬 투여 없이 에스트로겐만 사춘기 연령에 투여한다."}, {"letter": "E", "text": "D. 평생 에스트로겐과 성장호르몬을 병합 투여한다."}], "answer": "A", "explanation": "강의에서 '미리 진단한 경우에는 성장기의 성장호르몬부터 하고, 성장이 어느 정도 이루어지고 나면 성호르몬 투약을 해서, 성 발달, pubertal development를 도와주게 됩니다'라고 설명하여, 최종 신장을 위해 성장호르몬을 먼저 사용한 후 사춘기 유도를 위해 에스트로겐을 추가하는 순차적 치료가 적절합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "15세 환자가 원발성 무월경으로 내원하였다. 외음부는 여성형이나 음핵비대가 있고 서혜부에서 고환이 촉지된다. 핵형은 46,XY이며, 사춘기 이후 남성화 징후가 뚜렷해졌다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "D. 터너 증후군"}, {"letter": "B", "text": "C. 칼만 증후군"}, {"letter": "C", "text": "A. 안드로겐 무감수성 증후군"}, {"letter": "D", "text": "E. 뮐러관 무발생증"}, {"letter": "E", "text": "B. 5α-환원효소 결핍증"}], "answer": "C", "explanation": "5α-환원효소 결핍증(5α-reductase deficiency)은 테스토스테론이 DHT로 전환되는 것을 방해하여 출생 시 여성 혹은 모호한 외부 생식기를 가지지만, 사춘기에 테스토스테론 증가로 인한 남성화(체모, 음성 변화 등)가 진행된다. 안드로겐 무감수성 증후군은 외전상 여성에서 유방 발달은 있고 사춘기 남성화는 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "염색체 핵형 검사(chromosomal study)가 가장 우선적으로 필요한 무월경 환자는?", "options": [{"letter": "A", "text": "갑상선 기능 저하증이 의심되는 이차성 무월경 환자"}, {"letter": "B", "text": "시상하부 종양이 MRI에서 발견된 환자"}, {"letter": "C", "text": "혈중 FSH가 30 mIU/mL 이상으로 상승된 조기 난소부전 환자"}, {"letter": "D", "text": "혈중 프로락틴이 100 ng/mL 이상으로 증가된 무월경 환자"}, {"letter": "E", "text": "자궁내 유착이 의심되어 자궁경 검사 예정인 환자"}], "answer": "C", "explanation": "FSH가 30 mIU/mL 이상으로 상승된 경우 난소 기능 부전(hypergonadotropic hypogonadism)을 의미하며, Y 염색체를 포함한 염색체 이상이 동반될 수 있으므로 생식선 모세포종(gonadoblastoma) 위험 평가를 위해 핵형 검사가 필요하다. '혈중 프로락틴이 증가된 환자'는 MRI 검사가 우선이며, '갑상선 기능 저하증'은 갑상선 치료 후에도 무월경 지속 시 검사한다. '자궁내 유착'은 자궁경으로 진단하고, '시상하부 종양'은 이미 영상 검사로 발견된 경우이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "터너 증후군(Turner syndrome) 환자에서 관찰될 수 있는 소견으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "후각 저하와 동반된 성선자극호르몬 저하"}, {"letter": "B", "text": "자궁 무발생과 그로 인한 원발성 무월경"}, {"letter": "C", "text": "안드로겐 과다로 인한 다모증과 여드름"}, {"letter": "D", "text": "고신장 및 긴 사지로 나타나는 체형 이상"}, {"letter": "E", "text": "대동맥 협착(coarctation of aorta)과 같은 심혈관 기형"}], "answer": "E", "explanation": "터너 증후군은 전형적으로 저신장, 방패흉, 외반주 등의 특징과 함께 대동맥 협착, 이첨판 대동맥 판막 등의 심혈관 기형이 동반될 수 있다. '고신장 및 긴 사지'는 Marfan 증후군 등에서 나타나며, '안드로겐 과다로 인한 다모증'은 다낭성 난소 증후군의 특징이다. '자궁 무발생'은 MRKH 증후군, '후각 저하와 성선자극호르몬 저하'는 Kallmann 증후군에서 관찰된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "칼만 증후군(Kallmann syndrome) 환자에서 특징적으로 나타나는 증상은?", "options": [{"letter": "A", "text": "성선자극호르몬 상승과 난소 기능 부전"}, {"letter": "B", "text": "저성선자극호르몬성 성선기능저하증과 무후각증"}, {"letter": "C", "text": "고프로락틴혈증으로 인한 유즙 분비와 시야 결손"}, {"letter": "D", "text": "자궁 무발생과 정상 난소 기능"}, {"letter": "E", "text": "Y 염색체 존재로 인한 생식선 제거 필요"}], "answer": "B", "explanation": "Kallmann 증후군은 선천성 저성선자극호르몬성 성선기능저하증의 대표적인 원인으로, GnRH 뉴런의 이동 장애로 인해 FSH, LH가 낮고 무후각증(후각 저하)이 동반된다. '성선자극호르몬 상승'은 난소 부전을 의미하여 터너 증후군 등에서 보이며, 'Y 염색체 존재'는 AIS나 Swyer 증후군에서 중요하다. '자궁 무발생'은 MRKH, '고프로락틴혈증'은 프로락틴종의 특징이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "Turner 증후군 (45,X) 환자에서 동반될 위험이 높은 심장 기형은?", "options": [{"letter": "A", "text": "심실 중격 결손 (Ventricular septal defect)"}, {"letter": "B", "text": "대동맥 축착증 (Coarctation of the aorta)"}, {"letter": "C", "text": "팔로 사징증 (Tetralogy of Fallot)"}, {"letter": "D", "text": "심방 중격 결손 (Atrial septal defect)"}, {"letter": "E", "text": "동맥관 개존증 (Patent ductus arteriosus)"}], "answer": "B", "explanation": "Turner 증후군은 대동맥 축착증, 이첨 대동맥판, 대동맥 확장 등의 심혈관 기형과 연관이 높다. 특히 coarctation of the aorta가 특징적이다. 다른 심기형들도 가능하나 빈도와 특징으로 볼 때 coarctation이 가장 대표적이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 핵형의 순수 성선발육부전증(Swyer 증후군) 환자에서 생식선 절제술 시기는 언제인가?", "options": [{"letter": "A", "text": "2차 성징 발현 후"}, {"letter": "B", "text": "사춘기 이후"}, {"letter": "C", "text": "정기적 추적 관찰"}, {"letter": "D", "text": "진단 즉시"}, {"letter": "E", "text": "임신 계획 시"}], "answer": "D", "explanation": "Swyer 증후군은 Y 염색체를 보유하여 성선모세포종(gonadoblastoma)의 악성 잠재성이 높기 때문에 진단 즉시 생식선 절제술을 시행해야 합니다. 이는 안드로겐 불감성 증후군(AIS)에서 2차 성징 발현 후 지연 절제가 가능한 것과 대조적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "46,XY 핵형을 가진 Swyer 증후군 환자에서 생식샘절제술(gonadectomy)을 시행하는 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "성선자극호르몬 과잉 억제"}, {"letter": "B", "text": "자궁내막증 예방"}, {"letter": "C", "text": "악성 종양 발생 위험 감소"}, {"letter": "D", "text": "호르몬 대체 요법을 위한 전처치"}, {"letter": "E", "text": "골밀도 유지"}], "answer": "C", "explanation": "Swyer 증후군은 Y 염색체 이상으로 기능적인 고환이 형성되지 못해 AMH가 분비되지 않고 여성 내부 생식기를 가지나, 성선은 흔적성선(streak gonad)으로 남아 있다. 흔적성선은 생식세포종양(gonadoblastoma) 등 악성 종양으로 진행할 위험이 높기 때문에 예방적으로 생식샘절제술을 시행한다. 호르몬 대체 요법은 수술 후 시행할 수 있으나 수술의 주된 목적은 아니다. 자궁내막증 예방이나 성선자극호르몬 억제가 목적이 아니며, 골밀도 유지는 에스트로겐 투여로 관리한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "유방 발달이 없는 15세 여아에서 FSH가 상승되어 있고 핵형 분석 결과 45,X로 확인되었다. 가장 가능성 있는 진단은 무엇인가?", "options": [{"letter": "A", "text": "MRKH 증후군"}, {"letter": "B", "text": "Pure gonadal dysgenesis"}, {"letter": "C", "text": "Swyer 증후군"}, {"letter": "D", "text": "Turner 증후군"}, {"letter": "E", "text": "Androgen Insensitivity Syndrome"}], "answer": "D", "explanation": "45,X 핵형은 전형적인 Turner 증후군을 의미하며, 원발성 무월경과 유방 발달 부재의 가장 흔한 원인이다. Swyer 증후군은 46,XY, pure gonadal dysgenesis는 46,XX 또는 46,XY, AIS는 46,XY, MRKH는 46,XX이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 42}, {"question": "완전형 안드로겐 불응성 증후군(CAIS) 환자의 관리로 옳은 것은?", "options": [{"letter": "A", "text": "자궁이 있으므로 월경을 유도한다"}, {"letter": "B", "text": "진단 즉시 생식샘을 제거한다"}, {"letter": "C", "text": "생식샘을 보존하며 경과 관찰한다"}, {"letter": "D", "text": "음모 발달을 위해 테스토스테론을 투여한다"}, {"letter": "E", "text": "사춘기 이후 생식샘 제거를 고려하고 에스트로겐을 투여한다"}], "answer": "E", "explanation": "CAIS 환자의 고환은 악성화 위험이 있어 사춘기 이후 제거하는 것이 권장되며, 이후 에스트로겐을 투여한다. '생식샘을 보존하며 경과 관찰한다'는 악성 위험을 무시한 것. '진단 즉시 생식샘을 제거한다'는 사춘기 이전 제거로 불필요하게 호르몬 결핍을 초래할 수 있다. '자궁이 있으므로 월경을 유도한다 text": "다낭성 난소 증후군"}, {"letter": "B", "text": "시상하부 무월경"}, {"letter": "C", "text": "자궁 내 유착"}, {"letter": "D", "text": "조기 난소 부전"}, {"letter": "E", "text": "뇌하수체 종양"}], "answer": "B", "explanation": "의미 있는 체중 감소와 낮은 BMI는 시상하부 기능을 억제하여 기능성 시상하부 무월경을 유발합니다. FSH와 에스트라디올 저하, 정상 프로락틴과 갑상선 기능, 저체중 병력이 이를 시사합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "다음 중 hypergonadotropic hypogonadism의 원인으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "수유 중 prolactin 상승에 의한 억제"}, {"letter": "B", "text": "뇌하수체 종양에 의한 FSH 과잉분비"}, {"letter": "C", "text": "Turner syndrome에 의한 난소 부전"}, {"letter": "D", "text": "시상하부 기능 저하로 인한 GnRH 분비 감소"}, {"letter": "E", "text": "GnRH 수용체 돌연변이"}], "answer": "C", "explanation": "Turner syndrome은 대표적인 원발성 난소 부전 질환으로, 난소로부터의 estrogen 분비 부족으로 음성 되먹임이 소실되어 FSH/LH가 상승하는 hypergonadotropic hypogonadism을 유발한다. GnRH 수용체 돌연변이와 시상하부 기능 저하는 GnRH 분비 또는 작용 장애로 hypogonadotropic hypogonadism을 일으킨다. 뇌하수체 종양에 의한 FSH 과잉분비는 hypergonadotropic hypergonadism에 해당한다. Prolactin 상승은 GnRH 분비를 억제하여 hypogonadotropic hypogonadism을 유발한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "다음 중 혈중 FSH 농도가 감소하는 hypogonadotropic hypogonadism의 원인으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "방사선 치료"}, {"letter": "B", "text": "항암화학요법"}, {"letter": "C", "text": "난소절제술"}, {"letter": "D", "text": "시상하부 기능 저하"}, {"letter": "E", "text": "터너 증후군"}], "answer": "D", "explanation": "Hypogonadotropic hypogonadism은 시상하부-뇌하수체 기능 저하로 인해 FSH/LH 분비가 감소하여 발생한다. 반면 난소 자체의 문제(난소절제술, 방사선 치료, 터너 증후군, 항암화학요법)는 난소 부전을 유발하여 negative feedback 소실로 FSH가 증가하는 hypergonadotropic hypogonadism을 초래한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "28세 여성이 무월경을 주소로 내원하였다. 검사 결과 FSH 증가, LH 증가, estradiol 감소 소견을 보였다. 가장 가능성이 높은 상태는?", "opti ter": "B", "text": "FSH와 LH 모두 현저한 감소"}, {"letter": "C", "text": "LH 상승과 FSH 상대적 감소"}, {"letter": "D", "text": "FSH 상승과 LH 정상"}, {"letter": "E", "text": "LH 정상과 FSH 상승"}], "answer": "C", "explanation": "PCOS에서는 GnRH pulse frequency 증가로 인해 LH 분비가 비정상적으로 증가하고, FSH 분비는 상대적으로 감소하여 LH/FSH 비율이 흔히 2:1 이상으로 증가한다. LH 상승은 theca cell을 자극하여 androstenedione 생성을 증가시키며, FSH 부족은 aromatase 활성을 저하시켜 에스트로겐 전환을 감소시킨다. 이로 인해 고안드로겐혈증이 발생한다. FSH 상승은 난소 부전(POI)에서, 두 호르몬 모두 감소는 시상하부성 무월경에서 관찰된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "25세 여성이 최근 6개월간 빠르게 진행된 심한 다모증과 남성형 탈모를 보여 내원하였다. 혈청 total testosterone이 250 ng/dL(정상 <70)로 매우 높고 DHEAS는 정상이다. 가장 의심되는 원인은 무엇인가?", "options": [{"letter": "A", "text": "선천성 부신 과형성(CAH)"}, {"letter": "B", "text": "고프로락틴혈증"}, {"letter": "C", "text": "부신 androgen 과잉"}, {"letter": "D", "text": "안드로겐 분비 난소 종양"}, {"letter": "E", "text": "다낭성 난소 증후군(PCOS)"}], "answer": "D", "explanation": "급격히 진행되는 심한 다모증과 매우 높은 testosterone 수치(일반적으로 200 ng/dL 초과 시 의심)는 안드로겐 분비 종양을 시사한다. PCOS는 보통 경도에서 중등도의 testosterone 상승을 보이며, DHEAS가 정상이면 부신 원인보다 난소 원인을 의심한다. 고프로락틴혈증이나 CAH는 다른 양상을 보인다. 영상 검사로 난소 종양을 확인해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "23세 여성이 6개월간의 속발성 무월경으로 내원하였다. 임신 검사 음성, prolactin과 TSH 정상, FSH가 85 mIU/mL로 상승되어 있다. 다음으로 시행해야 할 가장 적절한 검사는 무엇인가?", "options": [{"letter": "A", "text": "경구 당부하 검사"}, {"letter": "B", "text": "혈청 testosterone 검사"}, {"letter": "C", "text": "Sella MRI 촬영"}, {"letter": "D", "text": "핵형 분석 (chromosomal study)"}, {"letter": "E", "text": "부신 androgen 검사"}], "answer": "D", "explanation": "젊은 여성에서 FSH가 상승된 경우 난소 부전(POI)을 의심할 수 있으며, 특히 30세 미만에서는 염색체 이상(예: Turner 모자이시즘, 45,X/46,XX 등) 가능성이 있으므로 핵형 분석을 시행해야 한다. Sella MRI는 FSH가 낮을 때 시행한다. Testosterone이나 부신 androgen 검사는 고안드로겐혈증 의심 시에, 경구 당부하 검사는 PCOS에서 인슐린저항성 평가 시 시행할 수 있으나 우선 순위가 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "PCOS 환자에서 clomiphene citrate에 반응이 없어 FSH 주사 치료를 시작한 후 갑자기 심한 복통, 복수, 그리고 난소의 현저한 비대가 발생하였다. 이 상황에 가장 합당한 진단은?", "options": [{"letter": "A", "text": "난소 과자극 증후군(OHSS)"}, {"letter": "B", "text": "과립막세포종"}, {"letter": "C", "text": "국소적 자궁내막증"}, {"letter": "D", "text": "골반 염증성 질환"}, {"letter": "E", "text": "난소 염전"}], "answer": "A", "explanation": "난소 과자극 증후군은 외인성 FSH에 의해 난소가 과도하게 자극되어 발생하는 의인성 합병증으로, 특히 다낭성 난소를 가진 환자에서 위험합니다. 복수, 복통, 난소 비대는 전형적인 증상입니다. 난소 염전은 갑작스러운 편측 통증을 보이지만 복수는 드뭅니다. 골반 염증은 감염 징후가 동반되고, 자궁내막증은 만성 통증과 초음파 소견이 다릅니다. 과립막세포종은 에스트로겐 분비 종양으로 서서히 진행합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 51}, {"question": "가임기 여성의 정상 질 분비물 pH 범위는?", "options": [{"letter": "A", "text": "2.0-3.0"}, {"letter": "B", "text": "5.5-6.5"}, {"letter": "C", "text": "6.8-7.0"}, {"letter": "D", "text": "4.0-5.0"}, {"letter": "E", "text": "7.2-7.4"}], "answer": "D", "explanation": "가임기에는 Lactobacillus에 의해 lactic acid가 생성되어 pH 4.0-5.0의 산성을 유지합니다. 사춘기 이전은 6.8-7.0으로 중성에 가깝습니다. pH 2.0-3.0은 위산에 해당합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "정상 월경 주기에서 자궁내막의 분비기(secretory phase)를 유지하는 데 가장 중요한 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Human chorionic gonadotropin (hCG)"}, {"letter": "B", "text": "Progesterone"}, {"letter": "C", "text": "Estrogen"}, {"letter": "D", "text": "Luteinizing hormone (LH)"}, {"letter": "E", "text": "Follicle-stimulating hormone (FSH)"}], "answer": "B", "explanation": "분비기(secretory phase)는 배란 후부터 월경 시작까지로, 황체에서 분비되는 progesterone이 자궁내막을 안정화하고 분비 변화를 유도합니다. Estrogen은 주로 증식기(proliferative phase)에 작용하며, FSH와 LH는 난포 발육과 배란에 관여하지만 자궁내막의 분비기 유지에 직접적이지 않습니다. hCG는 임신 시 황체 유지에 필요하지만 정상 월경 주기에는 관여하지 않습니다. 따라서 정답은 'Progesterone'입니다.", "chunkTranscript": "", "setNam ", "explanation": "칸디다 질염은 보통 정상 질 pH(4.0-4.5)를 유지하며, Whiff test 음성, KOH 도말에서 효모나 위균사가 관찰된다. 세균성 질증과 트리코모나스 질염은 pH 상승과 Whiff test 양성을, 위축성 질염은 pH 상승과 기저 세포 증가, DIV는 pH 정상이지만 진균은 검출되지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "누런 고름 같은 화농성 분비물을 보이는 경관염 환자에서 가장 의심되는 원인균은?", "options": [{"letter": "A", "text": "Candida albicans"}, {"letter": "B", "text": "Chlamydia trachomatis"}, {"letter": "C", "text": "Trichomonas vaginalis"}, {"letter": "D", "text": "Neisseria gonorrhoeae"}, {"letter": "E", "text": "Gardnerella vaginalis"}], "answer": "D", "explanation": "강의에서 '누런, 고름 같은 분비물이 나오는 현상을 보면서 원인균으로 Neisseria gonorrhoeae를 선택하라'고 강조하였습니다. 임균은 화농성 경관염을 일으키는 대표적인 강력한 병원균입니다. Chlamydia도 경관염을 일으키지만, 분비물은 상대적으로 경미할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "정상 월경에서 progesterone의 역할에 대한 옳은 설명은?", "options": [{"letter": "A", "text": "자궁혈류를 증가시켜 내막을 유지한다."}, {"letter": "B", "text": "Progesterone 감소가 자궁내막 탈락을 유발한다."}, {"letter": "C", "text": "난포기 동안 자궁내막 증식을 촉진한다."}, {"letter": "D", "text": "배란 직후 최고치에 이른 후 급격히 감소한다."}, {"letter": "E", "text": "난포막세포(theca cell)에서 주로 생성된다."}], "answer": "B", "explanation": "정상 월경은 progesterone이 감소하면서 자궁내막이 탈락하여 발생한다. Estrogen이 증식을 촉진하며, progesterone은 황체에서 생성되고, 배란 후 서서히 상승하여 황체기 중반에 최고치를 보인다. 자궁내막 유지는 혈류 증가보다는 progesterone의 분비촉진 및 구조적 지지 기전이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 52}, {"question": "정상 질 분비물을 구성하는 Bartholin's gland 분비물이 주로 배출되는 해부학적 위치는 어디인가?", "options": [{"letter": "A", "text": "요도구 양옆"}, {"letter": "B", "text": "난관 말단"}, {"letter": "C", "text": "자궁내막 표면"}, {"letter": "D", "text": "자궁경부 내부"}, {"letter": "E", "text": "질 입구 주변"}], "answer": "E", "explanation": "Bartholin's gland는 질 입구 주변에 위치하여 성적 흥분 시 점액성 분비물을 질 전정으로 배출한다. Skene's gland는 요도구
