스 질염은 성매개 질환이므로 성 파트너가 무증상이라도 반드시 함께 치료해야 재감염을 막을 수 있다. 국소 치료만으로는 완치가 어렵고, 항진균제는 칸디다에만 효과적이다. 치료 후에도 재발 가능성이 있으므로 추적 검사가 필요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "트리코모나스 질염에서 나타나는 전형적인 자궁경부 소견은 무엇인가?", "options": [{"letter": "A", "text": "미란"}, {"letter": "B", "text": "낭종"}, {"letter": "C", "text": "딸기 자궁경부"}, {"letter": "D", "text": "폴립"}, {"letter": "E", "text": "궤양"}], "answer": "E", "explanation": "트리코모나스 감염 시 자궁경부에 점상 출혈이 생겨 딸기 모양으로 보이는 '딸기 자궁경부' 소견이 특징적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "25세 여성이 심한 질 소양감과 거품이 섞인 악취 분비물을 주소로 내원하였다. 습식 도말 검사에서 편모가 있는 원충이 관찰되었다. 이 환자에게 가장 적절한 치료 약제는?", "options": [{"letter": "A", "text": "Doxycycline"}, {"letter": "B", "text": "Azithromycin"}, {"letter": "C", "text": "Ceftriaxone"}, {"letter": "D", "text": "Metronidazole"}, {"letter": "E", "text": "Acyclovir"}], "answer": "D", "explanation": "트리코모나스 질염(Trichomonas vaginitis)은 Trichomonas vaginalis 원충에 의해 발생하며, 전형적인 증상으로 거품이 있는 악취 분비물(frothy discharge)과 소양감이 있습니다. 진단은 습식 도말 검사에서 편모충을 확인합니다. 치료는 Metronidazole이 가장 효과적입니다. Ceftriaxone은 임질(gonorrhea), Doxycycline과 Azithromycin은 클라미디아(Chlamydia) 치료에 사용되며, Acyclovir는 헤르페스(Herpes) 바이러스 감염에 사용됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 55}, {"question": "다음 중 desquamative inflammatory vaginitis(DIV)의 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "E. 폐경 후 에스트로겐 부족이 주 원인이다"}, {"letter": "B", "text": "D. 원인은 자가면역 가능성이 있으며 증상으로 화농성 분비물이 나타난다"}, {"letter": "C", "text": "B. 질 pH가 알칼리성으로 상승한다"}, {"letter": "D", "text": "A. 곰팡이균 감염에 의해 발생한다"}, {"letter": "E", "text": "C. 경구 항진균제가 1차 치료이다"}], "answer": "E", "explanation": "DIV는 감염성 질환이 아니며, 자가면역 기전이 의심되고, 화농성 질 분비물, 작열감, 성교통 등이 나타나며, 질 산도는 정상이고, 초기 치료는 클린다마이신 도포이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 58}, {"question": "영아기에 발생한 소음순 유착(labial adhesion)의 일차 치료로 적절한 것은?", "options": [{"letter": "A", "text": "수술적 절제"}, {"letter": "B", "text": "에스트로겐 연고"}, {"letter": "C", "text": "경과 관찰"}, {"letter": "D", "text": "경구 항진균제"}, {"letter": "E", "text": "항생제 연고"}], "answer": "B", "explanation": "소음순 유착은 생후 에스트로겐 저하로 인한 후천적 유착으로, 에스트로겐 연고 도포가 일차 치료이다. '경과 관찰'만으로는 해결되지 않을 수 있으며, '항생제 연고'나 '경구 항진균제'는 감염이 원인이 아니므로 부적절하다. '수술적 절제'는 약물 치료 실패 시 이차적으로 고려된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID)을 의심할 수 있는 가장 특징적인 진찰 소견은?", "options": [{"letter": "A", "text": "질 내 pH 4.0 이하의 산성"}, {"letter": "B", "text": "질 분비물의 악취"}, {"letter": "C", "text": "자궁경부 운동성 압통(cervical motion tenderness)"}, {"letter": "D", "text": "자궁경부의 미란 및 출혈"}, {"letter": "E", "text": "외음부의 심한 소양감"}], "answer": "C", "explanation": "자궁경부 운동성 압통(CMT)은 골반 내 염증을 시사하는 중요한 징후로, 양손 진찰 시 자궁경부를 움직일 때 심한 통증이 유발된다. 소양감은 칸디다 질염, 미란은 자궁경부염, 악취는 세균성 질증에서 흔하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID)의 장기 합병증으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁근종"}, {"letter": "B", "text": "자궁경부 이형성증"}, {"letter": "C", "text": "기능성 난소낭종"}, {"letter": "D", "text": "자궁내막 용종"}, {"letter": "E", "text": "자궁외임신"}], "answer": "E", "explanation": "PID 후 난관의 유착이나 폐쇄로 인해 수정란이 자궁 내막이 아닌 곳에 착상할 위험이 증가하여 자궁외임신이 잘 발생할 수 있다. 자궁근종, 이형성증, 용종, 기능성 난소낭종 등은 PID와 직접적인 관련이 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "난관-난소 농양(tubo-ovarian abscess, TOA)을 동반한 PID 환자에서 적절한 항생제 치료 후에도 농양이 지속될 때 고려해야 할 치료로 가장 적합한 것은?", "options": [{"letter": "A", "text": "항진균제 병용"}, {"letter": "B", "text": "경과 관찰"}, {"letter": "C", "text": "수술적 배액"}, {"letter": "D", "text": "전신 스테로이드 추가"}, {"letter": "E", "text": "면역글로불린 정맥 투여"}], "answer": "C", "explanation": "TOA는 항생제가 농양 내로 침투하기 어려워 보존적 치료에 반응하지 않을 수 있다. 이 경우 경피적 배액술이나 복강경 수술로 배농을 시행해야 한다. 스테로이드나 면역글로불린은 염증을 완화시킬 수 있으나 농양 제거에는 효과적이지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "PID 이후 발생한 우상복부 통증으로 내원한 환자에서 복강경 소견상 간 표면과 횡경막 사이에 유착(bow-string adhesions)이 관찰되었다. 이 합병증으로 옳은 것은?", "options": [{"letter": "A", "text": "Meigs' syndrome"}, {"letter": "B", "text": "Asherman's syndrome"}, {"letter": "C", "text": "Fitz-Hugh-Curtis syndrome"}, {"letter": "D", "text": "Rokitansky-Kuster-Hauser syndrome"}, {"letter": "E", "text": "Budd-Chiari syndrome"}], "answer": "C", "explanation": "Fitz-Hugh-Curtis 증후군은 PID의 합병증으로, 급성 또는 만성 간주위염(perihepatitis)을 일으켜 간과 횡경막 사이의 유착을 형성한다. 주로 N. gonorrhoeae나 C. trachomatis 감염 후 발생한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반 결핵이 의심되는 불임 여성에서 자궁내막 조직검사를 시행하였을 때 진단적 가치가 있는 특징적인 조직 소견은?", "options": [{"letter": "A", "text": "건락 괴사를 동반한 육아종"}, {"letter": "B", "text": "비정형 샘세포의 증식"}, {"letter": "C", "text": "호산구 침윤을 동반한 괴사"}, {"letter": "D", "text": "풍부한 섬유소성 삼출물"}, {"letter": "E", "text": "혈관 주변 림프구 침윤"}], "answer": "A", "explanation": "골반 결핵의 전형적인 조직 소견은 중심부 건락 괴사(caseation necrosis)를 동반한 육아종(granuloma)이다. 호산구 침윤은 알레르기나 기생충 질환, 비정형 세포 증식은 악성 종양, 섬유소성 삼출물은 급성 염증, 혈관 주변 림프구 침윤은 만성 염증에서 흔하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "24세 여성이 복통과 발열로 내원하여 PID로 진단되었다. 다음 중 입원 치료의 적응증으로 옳은 것은?", "options": [{"letter": "A", "text": "38도 이상의 고열 지속"}, {"letter": "B", "text": "경구 항생제 복용 가능"}, {"letter": "C", "text": "혈중 백혈구 수치 10,000/μL"}, {"letter": "D", "text": "37.0도 이상의 발열"}, {"letter": "E", "text": "초음파에서 소량의 골반 액체 저류"}], "answer": "A", "explanation": "PID 입원 치료 적응증에는 38℃ 이상의 고열 지속, 경구 투약 불가능, 임신, 골반 내 농양, 외래 치료 실패 등이 있다. 37도 발열이나 약간의 백혈구 증가, 소량의 액체 저류만으로는 입원이 반드시 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "Neisseria gonorrhoeae와 Chlamydia trachomatis 혼합 감염이 의심되는 자궁경부염 환자에게 권장되는 일차 치료 요법으로 가장 적합한 것은?", "options": [{"letter": "A", "text": "Ceftriaxone 단회 근육 주사 + Doxycycline 경구 1주일"}, {"letter": "B", "text": "Acyclovir 경구 1주일"}, {"letter": "C", "text": "Metronidazole 경구 1주일"}, {"letter": "D", "text": "Fluconazole 경구 단회 투여"}, {"letter": "E", "text": "Clindamycin 질 크림 1주일"}], "answer": "A", "explanation": "임균과 클라미디아 동시 감염 시 ceftriaxone(임균)과 doxycycline(클라미디아)을 함께 사용하는 것이 표준 치료이다. Metronidazole은 세균성 질증이나 트리코모나스, fluconazole은 진균, acyclovir는 헤르페스, clindamycin 질 크림은 세균성 질증에 사용된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "24세 여성이 하복통과 발열로 내원하여 골반염증성질환(PID)으로 진단되었다. 다음 중 입원 치료가 필요한 적응증은?", "options": [{"letter": "A", "text": "임신 중인 경우"}, {"letter": "B", "text": "환자가 외래 추적을 원하는 경우"}, {"letter": "C", "text": "체온이 37.5도인 경우"}, {"letter": "D", "text": "초음파에서 소량의 골반액이 관찰된 경우"}, {"letter": "E", "text": "경구 항생제를 잘 복용할 수 있는 경우"}], "answer": "C", "explanation": "PID 환자에서 임신과 관련된 경우는 입원 치료가 필요하다. 기타 적응증으로는 38도 이상의 고열, 경구 복약 불가, 골반 고름집, 항생제 정맥주사 필요 등이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID) 진단 시, 환자의 성적 파트너 치료에 대한 원칙으로 옳은 것은?", "options": [{"letter": "A", "text": "파트너 치료는 증상 발생 후 2주 뒤에 시작한다"}, {"letter": "B", "text": "파트너가 무증상이면 치료할 필요가 없다"}, {"letter": "C", "text": "모든 PID 환자의 파트너는 반드시 치료해야 한다"}, {"letter": "D", "text": "파트너는 환자와 동일한 항생제를 복용해야 한다"}, {"letter": "E", "text": "Neisseria gonorrhoeae나 Chlamydia trachomatis 감염이 확인되면 치료한다"}], "answer": "C", "explanation": "PID의 원인균이 성매개 병원체(임균, 클라미디아)인 경우 성적 파트너의 동시 치료가 필요하다. 그 외의 균이거나 성매개가 아니면 파트너 치료가 필요하지 않았다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "폐경 후 질 건조감, 작열감, 성교통이 있고 질 점막이 얇아진 60세 여성에게 가장 적합한 치료는?", "options": [{"letter": "A", "text": "전신 항결핵제"}, {"letter": "B", "text": "국소 estrogen 크림 도포"}, {"letter": "C", "text": "소염 진통제"}, {"letter": "D", "text": "경구 항생제"}, {"letter": "E", "text": "질 내 항진균제"}], "answer": "B", "explanation": "위축성 질염(atrophic vaginitis)은 폐경 후 에스트로겐 결핍으로 인해 질 상피가 위축되고 분비물이 감소하여 발생합니다. 원인 치료는 부족한 에스트로겐을 보충해 주는 것으로, 강의에서 '부족한 estrogen을 채워주면 어느 정도 효과가 나타난다'고 설명하였습니다. 다른 약제는 원인에 부합하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID)을 의심할 때 이학적 검사에서 가장 특이적으로 나타나는 소견은?", "options": [{"letter": "A", "text": "고막 팽만"}, {"letter": "B", "text": "장음 항진"}, {"letter": "C", "text": "외음부 부종"}, {"letter": "D", "text": "자궁목 운동성 압통(cervical motion tenderness)"}, {"letter": "E", "text": "배꼽 주위 청색증"}], "answer": "D", "explanation": "PID의 진단 기준 중 하나인 자궁목 운동성 압통(cervical motion tenderness, CMT)은 골반 내 염증을 시사하는 중요한 소견입니다. 강의에서도 '자궁경부를 건드렸더니 아프다고 하는 것은 주변에 염증이 있다는 뜻'이라고 설명하였습니다. 다른 보기들은 PID와 직접적인 연관이 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "중증 골반염증성질환(PID)으로 입원한 환자에게 경험적으로 권고되는 항생제 병합 요법은?", "options": [{"letter": "A", "text": "fluconazole + erythromycin"}, {"letter": "B", "text": "penicillin + tetracycline"}, {"letter": "C", "text": "vancomycin + clindamycin"}, {"letter": "D", "text": "metronidazole + doxycycline"}, {"letter": "E", "text": "cefotetan + doxycycline"}], "answer": "E", "explanation": "강의에서 PID 치료로 cefotetan + doxycycline 병합요법을 언급하며, 광범위 항생제를 사용해야 한다고 하였습니다. Cefotetan은 cephalosporin 계열로 임균 등에 효과적이며, doxycycline은 Chlamydia를 포함한 비정형 균을 cover합니다. Metronidazole + doxycycline은 혐기성 균을 추가로 cover하지 못해 불충분합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "다음 중 골반염증성질환(PID)으로 진단된 환자에서 입원 치료의 적응증에 해당하는 것은?", "options": [{"letter": "A", "text": "경구 항생제를 잘 복용할 수 있는 경우"}, {"letter": "B", "text": "임신이 확인된 경우"}, {"letter": "C", "text": "체온이 37.5℃인 경우"}, {"letter": "D", "text": "1주일 이내에 자연 호전된 경우"}, {"letter": "E", "text": "경미한 하복부 통증만 있는 경우"}], "answer": "B", "explanation": "PID 입원 치료 적응증으로는 임신, 정맥주사 필요, 38℃ 이상의 고열, 상복부 내 염증 소견(배꼽을 넘는 경우), 골반 내 고름집(TOA) 관찰, 경구 복약이 힘든 경우 등이 있습니다. 임신 중 PID는 합병증 위험이 높아 입원 치료가 원칙입니다. 강의에서도 여러 적응증을 나열하며 임신을 포함시켰습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "PID 환자가 우상복부 통증을 호소하며, 복강경상 간 표면과 복벽 사이의 바이올린 줄 같은 유착이 관찰될 때 진단할 수 있는 증후군은?", "options": [{"letter": "A", "text": "Asherman syndrome"}, {"letter": "B", "text": "Meigs syndrome"}, {"letter": "C", "text": "Fitz-Hugh-Curtis syndrome"}, {"letter": "D", "text": "Reiter syndrome"}, {"letter": "E", "text": "Stevens-Johnson syndrome"}], "answer": "C", "explanation": "Fitz-Hugh-Curtis 증후군은 골반염증성질환의 합병증으로, 주로 Chlamydia나 임균에 의해 횡격막 아래까지 염증이 파급되어 간 피막에 유착을 일으킵니다. 강의에서 PID 후 상복부 통증과 유착을 보이는 증례를 이 증후군으로 소개하였습니다. 다른 증후군들은 부인과와 관련이 없습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 61}, {"question": "골반염증성질환(PID) 후 발생할 수 있는 나팔관 합병증 중 나팔관이 액체로 채워져 막히는 상태를 무엇이라고 하는가?", "options": [{"letter": "A", "text": "C. Endometritis"}, {"letter": "B", "text": "B. Hydrosalpinx"}, {"letter": "C", "text": "D. Pelvic tuberculosis"}, {"letter": "D", "text": "A. Fitz-Hugh-Curtis syndrome"}, {"letter": "E", "text": "E. Atrophic vaginitis"}], "answer": "D", "explanation": "Hydrosalpinx는 PID로 인한 나팔관 유착과 섬모 손상으로 말단이 막혀 내강에 장액성 액체가 저류되는 상태이며, 감염이 지속되면 고름이 차는 pyosalpinx로 발전할 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": ntional", "meshPath": "", "matchedSlide": 74}, {"question": "Level 2 결손으로 인해 발생할 수 있는 요실금의 유형으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "Functional incontinence"}, {"letter": "B", "text": "Reflex incontinence"}, {"letter": "C", "text": "Overflow incontinence"}, {"letter": "D", "text": "Stress urinary incontinence"}, {"letter": "E", "text": "Urgency urinary incontinence"}], "answer": "D", "explanation": "Level 2 결손은 질 중간 부위의 지지 조직(paravaginal connective tissue 등)이 약해져 방광과 요도의 지지가 소실되며, 이로 인해 요도가 과도하게 움직이면서 복압 증가 시 소변이 새는 stress urinary incontinence가 발생합니다. Urgency incontinence는 배뇨근 과활동성, overflow는 방광 출구 폐색, reflex는 신경인성 원인, functional은 신체적/인지적 장애와 관련됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "Level 3 결손으로 인해 발생할 수 있는 증상으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "Fecal incontinence"}, {"letter": "B", "text": "Pelvic pain"}, {"letter": "C", "text": "Dyspareunia"}, {"letter": "D", "text": "Urinary frequency"}, {"letter": "E", "text": "Dysuria"}], "answer": "A", "explanation": "Level 3는 질 입구부로, 특히 perineal body의 손상이 흔하며 이 부위가 약해지면 외항문 괄약근 기능이 저하되어 fecal incontinence가 발생할 수 있습니다. Urinary frequency나 dysuria는 level 2 또는 방광 관련, dyspareunia는 탈출로 인한 성교통이지만 level 3 특이적이지는 않으며, pelvic pain도 비특이적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 74}, {"question": "15세 여아가 지속적인 하복부 통증과 무월경으로 내원하였다. 외음부 검진에서 막혀 있는 처녀막이 팽창되어 보이며, 초음파에서 질과 자궁에 혈액이 차 있다. 다음 중 수술적 치료로 가장 적절한 것은?", "options": [{"letter": "A", "text": "복식 자궁 적출술"}, {"letter": "B", "text": "단순 수직 절개 후 배액"}, {"letter": "C", "text": "원형 절제 후 일차 봉합"}, {"letter": "D", "text": "후천적 질 확장술"}, {"letter": "E", "text": "십자 절개 후 배액"}], "answer": "E", "explanation": "처녀막 폐쇄증의 고전적인 치료는 십자 절개(cruciate incision)를 통해 고여 있는 월경혈을 배액하는 것이다. '단순 수직 절개 후 배액'은 재협착 가능성이 높고, '원형 절제 후 일차 봉합'은 최근 시도되지만 표준 답안은 아니며, '후천적 질 확장술'이나 '복식 자궁 적출술'은 부적절하다.", "ch : "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "자궁각 임신 (Cornual pregnancy)에 가장 적절한 수술적 치료는?", "options": [{"letter": "A", "text": "난관난소절제술 (Salpingo-oophorectomy)"}, {"letter": "B", "text": "난관절개술 (Salpingostomy)"}, {"letter": "C", "text": "자궁절제술 (Hysterectomy)"}, {"letter": "D", "text": "나팔관 짜내기 (Milking)"}, {"letter": "E", "text": "자궁각 절제술 (Cornual resection)"}], "answer": "E", "explanation": "자궁각 임신은 난관이 자궁으로 들어가는 간질부에 착상한 것으로, 쐐기 절제술인 자궁각 절제술이 필요하다. 난관절개술이나 짜내기는 난관 임신의 보존적 수술이며, 난소절제나 자궁절제는 일반적으로 과도한 처치이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "초음파 검사에서 자궁이 한쪽으로 치우쳐 있고, 반대쪽 난관은 관찰되지 않으며, 동측 신장 무형성증이 동반된 경우 의심할 수 있는 자궁 기형은?", "options": [{"letter": "A", "text": "Septate uterus"}, {"letter": "B", "text": "Unicornuate uterus"}, {"letter": "C", "text": "Bicornuate uterus"}, {"letter": "D", "text": "Arcuate uterus"}, {"letter": "E", "text": "Uterus didelphys"}], "answer": "B", "explanation": "Unicornuate uterus는 한쪽 Müllerian duct의 발달 실패로 인해 반대쪽 자궁, 난관이 없어지고, 종종 동측 신장 무형성증을 동반합니다. 'Septate uterus'는 자궁 외형은 정상이고 내부에 격벽이 있습니다. 'Bicornuate uterus'는 fundal indentation이 있고 두 개의 자궁각을 가집니다. 'Uterus didelphys'는 완전히 분리된 두 개의 자궁과 자궁경부를 가집니다. 'Arcuate uterus'는 fundus의 mild indentation만 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 77}, {"question": "반복적인 조기 유산(임신 10주 이전 3회)을 경험한 여성에서 septate uterus가 진단되었다. 이 환자에게 가장 적절한 치료는?", "options": [{"letter": "A", "text": "Metroplasty를 통한 wedge resection"}, {"letter": "B", "text": "복강경을 통한 자궁 성형술"}, {"letter": "C", "text": "Progesterone 보충 요법"}, {"letter": "D", "text": "Hysteroscopic septoplasty"}, {"letter": "E", "text": "자궁 경부 봉합술"}], "answer": "D", "explanation": "Septate uterus는 자궁내 septum에 착상이 되면 혈류 부족으로 조기 유산이 반복됩니다. 치료로 hysteroscopic septoplasty를 통해 avascular septum을 절제하면 정상 자궁강을 회복할 수 있습니다. swer": "C", "explanation": "가임기 여성의 급성 골반통은 자궁외임신의 가능성을 반드시 배제해야 한다. 임신 검사는 비침습적이고 신속하게 초기 평가가 가능하므로 가장 우선적으로 시행한다. 이후 일반 혈액검사, 소변검사, 감염 지표, 초음파 등을 단계적으로 진행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 80}, {"question": "부인과 수술을 계획할 때 병력 청취에서 혈소판 응집 억제제 복용 여부를 반드시 확인해야 하는 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "지혈을 방해하여 출혈 위험을 증가시키기 때문"}, {"letter": "B", "text": "수술 후 감염 위험을 증가시키기 때문"}, {"letter": "C", "text": "마취제와 상호작용을 일으키기 때문"}, {"letter": "D", "text": "수술 부위 통증을 악화시키기 때문"}, {"letter": "E", "text": "혈전증 발생 위험을 높이기 때문"}], "answer": "B", "explanation": "혈소판 응집 억제제(항혈소판제)는 혈소판 기능을 저해하여 지혈을 어렵게 만든다. 따라서 수술 전에 복용 여부를 확인하지 않으면 수술 중 또는 수술 후 과다 출혈의 위험이 커진다. 필요 시 수술 전 약물 중단이나 대체 요법을 고려해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "급성 골반통의 임상적 특징으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "오심, 구토, 발한 등의 자율신경 증상이 동반될 수 있다"}, {"letter": "B", "text": "자율신경 반사 반응이 동반되지 않는다"}, {"letter": "C", "text": "6개월 이상 지속되는 하복부 통증을 보인다"}, {"letter": "D", "text": "생리 주기에 맞춰 주기적으로 발생한다"}, {"letter": "E", "text": "원인 질환이 대부분 명확하게 진단된다"}], "answer": "A", "explanation": "급성 골반통은 갑작스럽게 발생하며, 통증과 함께 오심·구토·발한·불안 등의 자율신경 반사 증상이 동반될 수 있다. 만성 골반통은 6개월 이상 지속되며 자율신경 반사 반응이 없는 경우가 많고, 주기적 통증(월경통)은 생리 주기에 따라 발생한다. 원인이 불분명한 경우도 많으므로 진단에 주의해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 82}, {"question": "속발성 월경통을 유발하는 가장 흔한 원인 질환은?", "options": [{"letter": "A", "text": "자궁근종"}, {"letter": "B", "text": "자궁내막증"}, {"letter": "C", "text": "골반염증성 질환"}, {"letter": "D", "text": "자궁경부 협착"}, {"letter": "E", "text": "자궁선근증"}], "answer": "B", "explanation": "자궁내막증은 속발성 월경통의 가장 흔한 원인으로, 자궁 외부에 존재하는 자궁내막 조직이 주기적으로 출혈과 염증을 일으켜 통증을 유발한다. 자궁선근증과 자궁근종도 흔하지만, 자궁내막증이 가장 빈도가 높다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "quest 한다."}, {"letter": "D", "text": "야간뇨의 약물 치료로는 알파 차단제가 항무스카린제보다 더 효과적이다."}, {"letter": "E", "text": "생활습관 교정으로 저녁 시간 수분 및 카페인 섭취를 제한하는 것이 권고된다."}], "answer": "E", "explanation": "강의에서 야뇨증(야간뇨)의 정의는 '소변을 보러 깼다가 바로 다시 잠드는 것'이며, 깨고 나서 잠이 오지 않으면 수면 장애로 간주합니다. 또한 야뇨증 치료의 첫걸음은 생활 습관 교정, 즉 저녁 물과 카페인 섭취 제한이라고 하였습니다. 따라서 생활습관 교정이 우선이며, 약물 치료가 항상 우선은 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "전립선 비대증의 약물 치료에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "알파 차단제는 전립선 평활근을 이완시키고 전립선 크기를 점진적으로 줄여 증상을 완화시킨다."}, {"letter": "B", "text": "5-알파 리덕테이스 억제제는 주로 전립선의 평활근 긴장을 감소시켜 소변 줄기를 개선한다."}, {"letter": "C", "text": "PDE5 억제제인 타다라필은 발기부전 치료에만 효과적이며 전립선 비대증에는 사용할 수 없다."}, {"letter": "D", "text": "5-알파 리덕테이스 억제제는 전립선 크기와 무관하게 모든 환자에게 1차 약제로 권고된다."}, {"letter": "E", "text": "항무스카린제는 과민성 방광 증상이 동반된 경우 배뇨 증상 완화에 도움이 될 수 있다."}], "answer": "E", "explanation": "강의 내용에 따르면, 알파 차단제(예: 탐스로신)는 평활근을 이완시켜 증상을 빠르게 완화하지만 전립선 크기를 줄이지는 않습니다. 5-알파 리덕테이스 억제제는 DHT 생성을 막아 전립선 크기를 감소시키며 주로 40g 이상의 큰 전립선에 사용됩니다. 항무스카린제는 과민성 방광 증상에 사용될 수 있습니다. PDE5 억제제인 타다라필(시알리스)은 FDA 승인을 받아 BPH와 발기부전 모두에 사용됩니다. 따라서 정답은 항무스카린제 관련 설명입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "전립선 비대증 환자에서 수술적 치료를 고려해야 하는 경우로 옳은 것은?", "options": [{"letter": "A", "text": "약물 치료를 시작한 지 1년이 경과한 모든 환자"}, {"letter": "B", "text": "국제 전립선 증상 점수(IPSS)가 8점인 경우"}, {"letter": "C", "text": "반복적인 요로 감염이나 방광 결석이 동반된 경우"}, {"letter": "D", "text": "전립선 크기가 40g 미만인 경우"}, {"letter": "E", "text": "혈중 전립선특이항원(PSA) 수치가 4.0ng/mL 이하로 낮은 경우"}], "answer": "C", "explanation": "강의에서 수술 적응증으로 급성 요폐, 반복적 요로 감염, 방광 결석, 신장 기능 저하, 심각한 증상으로 삶의 질이 저하된 경우를 제시했습니다. 따라서 반복적인 요로 감염은 수술적 치료의 적응증이 됩니다. IPSS 8점은 중등도 증상의 시작점일 뿐 수술의 절대적 기준이 아니며, 전립선 크기나 PSA 수치만으로 수술을 결정하지는 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "전립선의 해부학적 영역에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "전립선암은 주로 이행대(transitional zone)에서 발생한다."}, {"letter": "B", "text": "중심대(central zone)는 전립선암의 가장 흔한 호발 부위이다."}, {"letter": "C", "text": "이행대 비대는 요도를 직접 압박하여 배뇨 증상을 유발한다."}, {"letter": "D", "text": "전립선 비대증은 주로 말초대(peripheral zone)에서 발생한다."}, {"letter": "E", "text": "말초대는 직장수지검사에서 만져지지 않는다."}], "answer": "D", "explanation": "전립선 비대증(BPH)은 주로 요도를 감싸고 있는 이행대(transitional zone)가 비대해지면서 발생하며, 이로 인해 요도가 압박되어 하부요로증상이 나타납니다. 반면 전립선암은 대부분 말초대(peripheral zone)에서 발생하며, 직장수지검사에서 경결이나 결절로 촉지될 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 108}, {"question": "원발성 무월경을 호소하는 17세 여성의 진찰에서 유방 발달은 있으나 음모가 전혀 없고, 질은 짧은 맹관이며 자궁과 난소가 보이지 않는다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "횡질중격"}, {"letter": "B", "text": "난소 무발생"}, {"letter": "C", "text": "완전형 안드로겐 불응성 증후군"}, {"letter": "D", "text": "MRKH 증후군"}, {"letter": "E", "text": "처녀막 폐쇄증"}], "answer": "C", "explanation": "음모가 없는 것은 안드로겐 불응성 증후군의 특징이며, MRKH는 정상적인 음모와 유방 발달을 보입니다. 또한 karyotyping에서 46XY 확인이 진단적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여자가 2차 성징은 있으나 초경이 없어 병원에 왔다. 신체검사에서 유방 발달은 Tanner 4단계이고 음모도 발달하였다. 골반 초음파 검사상 자궁이 보이지 않았고, 혈중 FSH는 정상 범위였다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "뮐러관 무발생 (Müllerian agenesis)"}, {"letter": "B", "text": "시상하부성 성선자극호르몬 결핍증 (Hypogonadotropic hypogonadism)"}, {"letter": "C", "text": "완전 안드로겐 불감성 증후군 (Complete androgen insensitivity syndrome)"}, {"letter": "D", "text": "난소 부전 (Ovarian failure)"}, {"letter": "E", "text": "체질성 사춘기 지연 (Constitutional delay of puberty)"}], "answer": "A", "explanation": "정상 2차 성징 발달 후에도 초경이 없고 FSH가 정상인 eugonadotropic 상태에서는 HPO 축은 정상이지만 자궁이나 질의 해부학적 이상을 의심한다. 뮐러관 무발생(Müllerian agenesis)은 자궁과 질 상부가 형성되지 않는 대표적인 원인이다. 체질성 사춘기 지연은 2차 성징의 발현 자체가 늦어지며, 완전 안드로겐 불감성 증후군은 46,XY 핵형으로 자궁이 없고 유방 발달은 있으나 음모가 적으며 FSH는 정상일 수 있으나 핵형 검사가 필요하다. 난소 부전이면 FSH가 상승하며, 시상하부성 성선자극호르몬 결핍증은 2차 성징 발달이 전혀 없으므로 제외된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여자가 초경이 없어 내원하였다. 신체검사상 유방 발달은 정상이지만 겨드랑이 및 음모가 거의 없었다. 초음파에서 자궁은 보이지 않고, 질은 맹관(blind pouch)이었다. 핵형 분석 결과 46,XY로 확인되었다. 향후 가장 중요한 치료 방침은?", "options": [{"letter": "A", "text": "성선 절제술 (Gonadectomy)"}, {"letter": "B", "text": "에스트로겐 요법"}, {"letter": "C", "text": "질 재건술"}, {"letter": "D", "text": "성선자극호르몬 투여"}, {"letter": "E", "text": "저용량 경구 피임약 복용"}], "answer": "A", "explanation": "46,XY 핵형에 여성 외형, 자궁 부재, 정상 유방 발달은 완전 안드로겐 불감성 증후군(complete androgen insensitivity syndrome)의 전형적 소견이다. 복강 내에 잔존하는 고환은 악성 종양(성선모세포종 등)의 위험이 있으므로 사춘기 이후 성선 절제술(gonadectomy)이 필수적이다. 이후 여성화를 위해 에스트로겐 요법을 지속할 수 있다. 질 재건술은 질 길이가 짧은 경우 선택적으로 시행하며, 성선자극호르몬 투여나 경구 피임약은 이 질환에서 효과가 없다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여자가 초경이 없어 내원하였다. 신체검사상 유방은 Tanner 4단계로 정상 발달하였고, 음모도 정상이었다. 골반 초음파 검사에서 자궁과 질 상부가 보이지 않았고, 양측 난소는 정상이었다. 혈액 FSH 농도는 정상이었다. 가장 적합한 진단은?", "options": [{"letter": "A", "text": "난소 부전"}, {"letter": "B", "text": "진성 성조숙증"}, {"letter": "C", "text": "중격자궁"}, {"letter": "D", "text": "뮐러관 무발생 (Mayer-Rokitansky-Küster-Hauser syndrome)"}, {"letter": "E", "text": "완전 안드로겐 불감성 증후군"}], "answer": "D", "explanation": "정상 2차 성징 발달과 원발성 무월경, 정상 FSH, 자궁 및 질 상부 부재는 뮐러관 무발생(Müllerian agenesis, MRKH 증후군)을 시사한다. 난소는 정상이므로 FSH가 정상이다. 완전 안드로겐 불감성 증후군은 46,XY 핵형이며, 유방 발달은 있으나 겨드랑이 및 음모가 적고 대개 자궁이 없다. 중격자궁은 자궁이 존재하지만 내부 격벽이 있는 경우이다. 진성 성조숙증은 8세 이전 사춘기 발현을 의미한다. 난소 부전은 FSH가 상승한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 신체검사상 유방 발달은 없고 음모는 정상이었다. 초음파 검사에서 자궁은 정상적으로 관찰되었으나 양측 난소는 줄무늬 성선(streak gonads)으로 보였다. 혈액 검사에서 FSH는 상승, 에스트라디올은 저하되어 있었고 핵형 분석은 46,XY였다. 이 환자에게 가장 필요한 조치는?", "options": [{"letter": "A", "text": "에스트로겐 요법"}, {"letter": "B", "text": "테스토스테론 요법"}, {"letter": "C", "text": "주기적 프로게스테론 요법"}, {"letter": "D", "text": "성선 절제술"}, {"letter": "E", "text": "고나도트로핀 치료"}], "answer": "D", "explanation": "Swyer 증후군(46,XY 완전 성선발육부전)은 줄무늬 성선에 악성 변화(성선아세포종) 위험이 높으므로 예방적 성선 절제술이 필수적입니다. 이후 여성 호르몬 투여로 사춘기를 유도합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "46,XX 여성이 초경이 전혀 없어 내원하였다. 외음부는 정상이고 질은 짧은 맹낭으로 끝난다. 복부 초음파에서 자궁이 보이지 않으나 양측 난소는 정상이다. 진단은?", "options": [{"letter": "A", "text": "Androgen insensitivity syndrome"}, {"letter": "B", "text": "5α-reductase deficiency"}, {"letter": "C", "text": "Turner syndrome"}, {"letter": "D", "text": "Swyer syndrome"}, {"letter": "E", "text": "Mayer-Rokitansky-Küster-Hauser syndrome"}], "answer": "E", "explanation": "Mayer-Rokitansky-Küster-Hauser (MRKH) syndrome은 46,XX 여성에서 Müllerian duct 발달 부전으로 자궁과 상부 질이 무형성이며, 난소는 정상입니다. 'Androgen insensitivity syndrome'과 '5α-reductase deficiency'는 46,XY이며 고환이 있습니다. 'Swyer syndrome'은 46,XY로 흔적 생식샘을 가지지만 자궁은 존재할 수 있습니다. 'Turner syndrome'은 45,X로 저신장 등 특징이 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "46,XY 환자가 사춘기까지 무월경으로 내원하였다. 유방 발달은 정상이나, 음모와 겨드랑이 털이 거의 없으며, 외음부는 여성형이고 질은 맹낭으로 짧다. 초음파에서 자궁은 없고, 서혜부에서 고환으로 의심되는 종괴가 촉진된다. 진단은?", "options": [{"letter": "A", "text": "5α-reductase deficiency"}, {"letter": "B", "text": "Swyer syndrome"}, {"letter": "C", "text": "Mayer-Rokitansky-Küster-Hauser syndrome"}, {"letter": "D", "text": "Complete androgen insensitivity syndrome"}, {"letter": "E", "text": "Turner syndrome"}], "answer": "D", "explanation": "Complete androgen insensitivity syndrome (CAIS)은 androgen receptor 돌연변이로 46,XY에서 여성 표현형, 유방 발달(androgen의 estrogen 전환), 음모와 액모 부족, 무자궁, 정상 ional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여성이 원발성 무월경으로 내원하였다. 유방과 음모 발달은 정상이며, 골반 초음파에서 자궁이 보이지 않고 양측 난소는 정상이며 핵형은 46,XX이다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "Turner 증후군"}, {"letter": "B", "text": "Kallmann 증후군"}, {"letter": "C", "text": "Imperforate hymen"}, {"letter": "D", "text": "Müllerian agenesis (MRKH)"}, {"letter": "E", "text": "Androgen insensitivity syndrome"}], "answer": "D", "explanation": "MRKH (Müllerian duct agenesis)는 46,XX이고 자궁/상부 질이 없지만 난소와 이차성징이 정상인 질환이다. Turner 증후군은 45,X로 난소 부전이 있어 FSH가 높고 유방 발달이 없다. AIS는 46,XY로 자궁이 없고 음모가 적으며 서혜부 고환이 있다. Kallmann 증후군은 저 gonadotropin성 성선기능저하증으로 유방 발달이 없고 후각 이상이 동반된다. Imperforate hymen은 자궁이 있고 outflow obstruction이 있어 주기적 통증이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "13세 여아가 원발성 무월경과 주기적인 하복통을 호소한다. 골반 진찰에서 Valsalva 수기 시 질구에 푸른빛의 팽대된 막이 관찰된다. 가장 적절한 처치는?", "options": [{"letter": "A", "text": "Gonadotropin 치료"}, {"letter": "B", "text": "복강경적 난소 낭종 절제술"}, {"letter": "C", "text": "뇌하수체 MRI"}, {"letter": "D", "text": "Estrogen 호르몬 요법"}, {"letter": "E", "text": "처녀막 절개술"}], "answer": "E", "explanation": "전형적인 imperforate hymen (처녀막 폐쇄증)으로, 폐쇄된 처녀막 때문에 생리혈이 저류되어 hematocolpos를 형성하며 푸르게 보인다. 절개로 폐색을 해소한다. Estrogen 투여나 gonadotropin 요법은 필요하지 않으며, 난소 낭종이 아니며 뇌하수체 영상이 필요하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여아가 원발성 무월경과 유방 발달 부재로 내원하였다. 어려서부터 냄새를 잘 맡지 못했다고 한다. 혈액 검사상 FSH와 LH가 낮다. 가장 가능성이 높은 진단은?", "options": [{"letter": "A", "text": "PCOS"}, {"letter": "B", "text": "Turner 증후군"}, {"letter": "C", "text": "Androgen insensitivity syndrome"}, {"letter": "D", "text": "Pure gonadal dysgenesis"}, {"letter": "E", "text": "Kallmann 증후군"}], "answer": "E", "explanation": "Kallmann 증후군은 선천성 저 gonadotropin성 성선기능저하증과 후각 소실(anosmia)을 특징으로 하며, GnRH 신경세포의 이동 장애로 발생한다. FSH와 LH가 낮고 이차성징 발현이 없다. Turner는 FSH가 높고 저신장 등의 특징이 있다. AIS는 46,XY에 유방 발달이 있고 자궁이 없다. Pure gonadal dysgenesis는 FSH가 높다. PCOS는 다모증, 불규칙 월경 등을 보이며 FSH는 보통 정상이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "15세 여아가 원발성 무월경으로 내원하였다. 유방 발달은 정상이나 골반 진찰상 자궁이 촉지되지 않고, 초음파에서도 자궁이 보이지 않으며 난소는 정상으로 보인다. 음모는 정상이다. 다음으로 가장 먼저 시행해야 할 것은?", "options": [{"letter": "A", "text": "뇌하수체 MRI"}, {"letter": "B", "text": "복강경 검사"}, {"letter": "C", "text": "FSH와 LH 측정"}, {"letter": "D", "text": "Progesterone challenge test"}, {"letter": "E", "text": "핵형 분석 (karyotyping)"}], "answer": "E", "explanation": "자궁이 없으면서 이차성징이 정상인 경우 MRKH (46,XX)와 AIS (46,XY)를 감별해야 하며, 핵형 검사가 가장 기본적이다. FSH/LH는 두 질환 모두 정상일 수 있다. Progesterone challenge test는 자궁이 없어 시행할 수 없다. MRI는 해부학적 평가에 도움되나 핵형이 우선이다. 복강경은 침습적이므로 일차적이지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "유방 발달이 없는 16세 여아가 원발성 무월경으로 내원하였다. FSH가 상승되어 있을 때, 다음 중 시행해야 할 가장 적절한 검사는 무엇인가?", "options": [{"letter": "A", "text": "혈청 prolactin 검사"}, {"letter": "B", "text": "골반 초음파 검사"}, {"letter": "C", "text": "핵형 분석 (chromosomal study)"}, {"letter": "D", "text": "Sella MRI 촬영"}, {"letter": "E", "text": "부신 androgen 검사"}], "answer": "C", "explanation": "유방 발달이 없는 원발성 무월경에서 FSH가 상승되어 있다면 난소 기능 부전을 의미하며, 가장 흔한 원인은 Turner 증후군(45,X)이다. 따라서 확진을 위해 핵형 분석을 시행해야 한다. 혈청 prolactin 검사는 속발성 무월경에서 임신, TSH와 함께 우선 시행하는 검사이다. 부신 androgen 검사는 다모증 평가 시 사용된다. 골반 초음파는 자궁 유무 확인에 유용하지만 핵형 분석이 더 우선이다. Sella MRI는 FSH가 낮을 때 시상하부-뇌하수체 병변 감별을 위해 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "유방 발달은 있으나 자궁이 없는 18세 여성의 원발성 무월경을 평가하기 위해 핵형 분석을 시행하였다. 결과가 46,XY일 때, 가장 가능성이 높은 진단은 무엇인가?", "options": [{"letter": "A", "text": "Turner 증후군"}, {"letter": "B", "text": "Androgen Insensitivity Syndrome (AIS)"}, {"letter": "C", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군"}, {"letter": "D", "text": "Pure gonadal dysgenesis"}, {"letter": "E", "text": "Swyer 증후군"}], "answer": "B", "explanation": "원발성 무월경에서 유방 발달(estrogen 작용)이 있고 자궁이 없으며 핵형이 46,XY인 경우 Androgen Insensitivity Syndrome (AIS)에 해당한다. AIS는 androgen 수용체 이상으로 XY 염색체를 가지나 표현형은 여성이며, 정상 고환에서 분비되는 anti-Müllerian hormone (AMH)으로 인해 자궁이 형성되지 않는다. MRKH 증후군은 46,XX에서 자궁 무형성을 보인다. Swyer 증후군은 46,XY에서 자궁과 난관은 있으나 성선이 미발달된 경우이다. Turner 증후군은 45,X이며 유방 발달이 없다. Pure gonadal dysgenesis는 46,XX 또는 46,XY에서 성선이 퇴화된 경우로 유방 발달이 없거나 저하된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "17세 여성이 원발성 무월경을 주소로 내원하였다. 유방 발달은 정상이었으나 자궁이 없고 핵형이 46,XX로 확인되었다. 가장 가능성 있는 진단은 무엇인가?", "options": [{"letter": "A", "text": "Swyer 증후군"}, {"letter": "B", "text": "Pure gonadal dysgenesis"}, {"letter": "C", "text": "Mayer-Rokitansky-Küster-Hauser (MRKH) 증후군"}, {"letter": "D", "text": "Turner 증후군"}, {"letter": "E", "text": "Androgen Insensitivity Syndrome (AIS)"}], "answer": "C", "explanation": "유방 발달(정상 에스트로겐 작용)이 있고 자궁이 없으며 46,XX 핵형인 경우 MRKH 증후군에 해당한다. 이는 뮐러관 발달 이상으로 자궁과 질 상부가 무형성이나 난소 기능은 정상이다. AIS는 46,XY에서, Swyer 증후군은 46,XY로 자궁과 난관이 존재한다. Turner 증후군은 45,X로 유방 발달이 없으며, pure gonadal dysgenesis는 유방 발달이 없거나 저하된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "16세 여성이 원발성 무월경으로 내원하였다. 유방 발달은 정상이고 초음파에서 자궁이 확인되었을 때, 가장 먼저 시행할 진단적 접근은?", "options": [{"letter": "A", "text": "외부 생식기 및 질구 검진"}, {"letter": "B", "text": "FSH 측정"}, {"letter": "C", "text": "복강경 검사"}, {"letter": "D", "text": "프로락틴 측정"}, {"letter": "E", "text": "핵형 분석"}], "answer": "D", "explanation": "에스트로겐 효과(유방 발달)와 자궁이 존재하는 원발성 무월경에서는 처녀막 폐쇄나 가로 질 중격 같은 유출로 폐쇄를 먼저 감별하기 위해 신체 검진(외부 생식기 및 질구 검진)을 시행합니다. 이상이 없으면 속발성 무월경에 준해 검사합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 109}, {"question": "이차성 무월경 환자의 진단 접근에서 임신 검사 후 가장 먼저 시행해야 할 혈액 검사는?", "options": [{"letter": "A", "text": "TSH와 프로락틴(prolactin)을 측정"}, {"letter": "B", "text": "에스트라디올(E2)과 프로게스테론을 측정"}, {"letter": "C", "text": "FSH와 LH를 측정하여 난소 기능 평가"}, {"letter": "D", "text": "항뮐러관 호르몬(AMH)을 측정하여 난소 예비능 확인"}, {"letter": "E", "text": "유리 테스토스테론과 DHEA-S를 측정"}], "answer": "A", "explanation": "이차성 무월경의 표준 진단 접근법은 먼저 임신을 배제한 후 갑상선 기능(TSh)과 프로락틴을 검사하는 것이다. 이 두 가지는 비교적 흔한 무월경의 원인이면서 비교적 간단히 교정 가능하기 때문이다. 'FSH와 LH 측정'은 이 검사들이 정상일 때 난소 기능 평가를 위해 시행하며, 'E2와 프로게스테론'은 즉시 측정할 필요가 없다. 'AMH'는 난소 예비능 검사로 선별 검사가 아니며, '테스토스테론'은 다모증 등이 있을 때 검사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "26세 여성에서 이차성 무월경과 유즙 분비가 있고 혈청 prolactin이 높게 측정되었다. 고 prolactin 혈증 확진 후 가장 적절한 다음 평가 단계는?", "options": [{"letter": "A", "text": "Progesterone challenge test"}, {"letter": "B", "text": "갑상선 기능 검사"}, {"letter": "C", "text": "Sella turcica MRI"}, {"letter": "D", "text": "Dexamethasone 억제 검사"}, {"letter": "E", "text": "복강경 난소 생검"}], "answer": "C", "explanation": "임신, 약물, 갑상선 기능 저하증을 배제한 후 고 prolactin 혈증이 확인되면 뇌하수체 선종(prolactinoma)을 감별하기 위해 sella MRI를 시행한다. 갑상선 기능은 초기 선별 검사로 이미 시행되었을 수 있지만, prolactin 상승이 확 진된 상황에서는 MRI가 우선이다. Progesterone challenge test는 불필요하며, 난소 생검이나 dexamethasone 검사는 적응증이 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "속발성 무월경을 주소로 내원한 28세 여성에서 가장 먼저 시행해야 할 검사는 무엇인가?", "options": [{"letter": "A", "text": "소변 임신 검사"}, {"letter": "B", "text": "갑상선 자극 호르몬(TSH) 검사"}, {"letter": "C", "text": "Sella MRI 촬영"}, {"letter": "D", "text": "혈청 FSH 농도 측정"}, {"letter": "E", "text": "혈청 prolactin 농도 측정"}], "answer": "A", "explanation": "속발성 무월경의 원인 중 가장 먼저 배제해야 할 것은 임신이므로, 가장 우선적으로 소변 또는 혈청 임신 검사를 시행한다. 임신이 배제된 후 prolactin과 TSH를 검사하여 고프로락틴혈증이나 갑상선 기능 이상을 평가한다. FSH는 임신, prolactin, TSH가 정상일 때 측정하여 난소 부전과 시상하부-뇌하수체 원인을 감별한다. Sella MRI는 prolactin 상승 시 미세선종 확인을 위해, 또는 낮은 FSH 소견 시 시상하부-뇌하수체 병변 감별을 위해 시행한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "속발성 무월경으로 내원한 30세 여성에서 소변 임신 검사가 음성이다. 다음으로 가장 적절한 조치는?", "options": [{"letter": "A", "text": "셀라 MRI"}, {"letter": "B", "text": "자궁내막 생검"}, {"letter": "C", "text": "경질 초음파"}, {"letter": "D", "text": "FSH 측정"}, {"letter": "E", "text": "프로락틴과 TSH 측정"}], "answer": "E", "explanation": "속발성 무월경 진단 알고리즘에서, 임신을 배제한 후에는 프로락틴과 TSH를 측정하여 고프로락틴혈증이나 갑상선 기능 이상을 먼저 평가해야 합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "속발성 무월경 환자에서 임신 검사 음성, 프로락틴과 TSH 정상, FSH가 낮게 측정되었다. 가장 적절한 다음 단계는?", "options": [{"letter": "A", "text": "경질 초음파"}, {"letter": "B", "text": "셀라 MRI"}, {"letter": "C", "text": "복강경 검사"}, {"letter": "D", "text": "자궁내막 생검"}, {"letter": "E", "text": "골밀도 검사"}], "answer": "D", "explanation": "FSH가 낮은 속발성 무월경은 시상하부-뇌하수체 기능 저하(hypogonadotropic hypogonadism)를 의심하므로, 뇌하수체 종양 등 구조적 병변을 확인하기 위해 셀라 MRI가 필요합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 110}, {"question": "난포에서 에스트로겐 합성을 설명하는 two-cell two-gonadotropin 이론에서, theca cell에 작용하여 androstenedione 생성을 자극하는 호르몬은 무엇인가?", "options": [{"letter": "A", "text": "Follicle-stimulating hormone (FSH)"}, {"letter": "B", "text": "Anti-Müllerian hormone (AMH)"}, {"letter": "C", "text": "Progesterone"}, {"letter": "D", "text": "Luteinizing hormone (LH)"}, {"letter": "E", "text": "Estradiol"}], "answer": "D", "explanation": "Two-cell two-gonadotropin 이론에 따르면, LH는 theca cell의 수용체에 결합하여 cholesterol을 androstenedione으로 변환시킨다. 이렇게 생성된 androstenedione은 확산을 통해 granulosa cell로 이동한 후, FSH에 의해 유도된 aromatase 효소에 의해 estradiol로 전환된다. FSH는 granulosa cell에 작용한다. Estradiol, progesterone, AMH는 이 과정의 상위 조절자나 다른 역할을 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 흔히 관찰되는 성호르몬결합글로불린(SHBG)의 변화와 그로 인한 임상적 결과를 옳게 설명한 것은?", "options": [{"letter": "A", "text": "SHBG가 증가하지만 간에서 대사가 빨라져 효과가 없다"}, {"letter": "B", "text": "SHBG 변화는 없으나 testosterone receptor 민감도가 증가한다"}, {"letter": "C", "text": "SHBG가 감소하지만 testosterone 총량도 함께 감소하여 증상이 없다"}, {"letter": "D", "text": "SHBG가 감소하여 free testosterone이 증가하고 다모증이 악화된다"}, {"letter": "E", "text": "SHBG가 증가하여 free testosterone이 감소하고 다모증이 완화된다"}], "answer": "D", "explanation": "PCOS에서 SHBG는 간에서의 생성이 감소되어 혈중 농도가 낮아진다. SHBG는 testosterone과 결합하여 비활성화시키므로, SHBG 감소 시 free testosterone이 증가하여 다모증, 여드름 등의 고안드로겐혈증 증상이 악화된다. 경구 피임약은 SHBG를 증가시켜 free testosterone을 낮춤으로써 치료 효과를 나타낸다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "다낭성 난소 증후군(PCOS) 환자의 다모증 치료에 경구 피임약(OCP)이 효과적인 기전으로 가장 타당한 것은?", "options": [{"letter": "A", "text": "말초 조직에서 androgen 수용체를 차단한다"}, {"letter": "B", "text": "LH 분비를 억제하고 SHBG를 증가시켜 free testosterone을 감소시킨다"}, {"letter": "C", "text": "시상하부-뇌하수체 축을 차단하지 않고 에스트로겐 효과만 증대시킨다"}, {"letter": "D", "text": "5-alpha reductase를 직접 억제하여 다이하이드로테스토스테론(DHT) 생성을 차단한다"}, {"letter": "E", "text": "부신에서의 androgen 합성을 선택적으로 차단한다"}], "answer": "B", "explanation": "경구 피임약은 에스트로겐과 프로게스틴 성분이 뇌하수체에 음성 피드백을 주어 LH 분비를 억제함으로써 난소의 androgen 생성을 감소시킨다. 또한 간에서 SHBG 합성을 증가시켜 free testosterone을 낮춘다. 5-alpha reductase 억제는 일부 약제(예: finasteride)의 작용이며, 부신 androgen 선택적 차단은 스테로이드 합성 억제제(예: ketoconazole)의 작용이다. OCP는 androgen 수용체 차단 효과는 미미하며, 시상하부-뇌하수체 축에 작용하여 LH를 감소시킨다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 111}, {"question": "난소 꼬임(ovarian torsion)의 위험성이 증가하는 난소 크기의 기준은?", "options": [{"letter": "A", "text": "10 cm"}, {"letter": "B", "text": "3 cm"}, {"letter": "C", "text": "12 cm"}, {"letter": "D", "text": "7 cm"}, {"letter": "E", "text": "5 cm"}], "answer": "B", "explanation": "정상 난소 크기는 약 5x3x3cm이다. 난소가 5cm 이상으로 커지면 무게가 증가하여 꼬임이 발생할 수 있다. 이는 급성 복통의 원인이 될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군(PCOS)의 초음파 소견으로 가장 특징적인 것은?", "options": [{"letter": "A", "text": "난소 부피가 유의하게 감소되어 있음"}, {"letter": "B", "text": "다수의 작은 난포들이 균일하게 발달한 난소"}, {"letter": "C", "text": "단일한 대형 난소 낭종이 관찰됨"}, {"letter": "D", "text": "난소 내 석회화 음영이 다수 관찰됨"}, {"letter": "E", "text": "하나의 우성 난포만 관찰되며 나머지는 위축됨"}], "answer": "B", "explanation": "PCOS에서는 folliculogenesis 이상으로 하나의 우성 난포로 성장하지 못하고 다수의 작은 난포(주로 말초에 위치)가 관찰된다. 우성 난포만 보이는 소견은 정상 배란 주기이다. 난소 내 석회화나 부피 감소는 PCOS의 특징이 아니며, 단일 대형 낭종은 기능성 낭종 등 다른 병변을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "다낭성 난소 증후군(polycystic ovary syndrome, PCOS)의 진단에 부합하는 초음파 소견은 무엇인가?", "options": [{"letter": "A", "text": "난소 표면에 석회화 병변이 산재되어 있다"}, {"letter": "B", "text": "난소가 현저히 위축되어 난포가 거의 보이지 않는다"}, {"letter": "C", "text": "한 개의 우성 난포와 다수의 작은 난포가 함께 관찰된다"}, {"letter": "D", "text": "난소 내에 출혈성 낭종이 반복적으로 발생한다"}, {"letter": "E", "text": "크기가 균일한 여러 개의 난포가 관찰된다"}], "answer": "E", "explanation": "PCOS의 전형적인 초음파 소견은 난소 내에 균일한 크기의 난포들이 여러 개 관찰되는 것이다. 이는 하나의 우성 난포가 성장하고 나머지는 작은 난포로 남는 정상 난소 주기와 대조적이다. '한 개의 우성 난포와 다수의 작은 난포가 함께 관찰된다'는 배란 주기의 일부에서 관찰될 수 있는 소견이다. '난소 내에 출혈성 낭종이 반복적으로 발생한다'는 자궁내막증 등에서 가능한 소견이며, '난소가 현저히 위축되어 난포가 거의 보이지 않는다'는 조기 난소 부전에서 볼 수 있다. '난소 표면에 석회화 병변이 산재되어 있다'는 만성 염증이나 종양에서 관찰될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 112}, {"question": "난소 염전(adnexal torsion)을 시사하는 도플러 초음파 소견으로 가장 적절한 것은?", "options": [{"letter": "A", "text": "도플러 검사상 난소 내 혈류 신호가 감소하거나 소실된다"}, {"letter": "B", "text": "난소 내부에 다양한 격벽이 관찰된다"}, {"letter": "C", "text": "난소 보충한다."}, {"letter": "C", "text": "난소 예비력을 평가하여 FSH 용량을 조절한다."}, {"letter": "D", "text": "hCG 투여 후 36시간에 난자 채취를 진행한다."}, {"letter": "E", "text": "과배란 유도 중 매일 초음파를 시행한다."}], "answer": "C", "explanation": "OHSS 예방을 위해 가장 중요한 것은 환자의 난소 예비력(ovarian reserve)을 평가하여 개별화된 FSH 용량을 사용하는 것입니다. 특히 PCOS 환자처럼 난소 반응이 높을 것으로 예상되는 경우에는 낮은 용량으로 시작하여 OHSS 위험을 줄입니다. \"hCG 투여 후 36시간에 난자 채취를 진행한다\"는 정해진 채취 시기로, OHSS 예방과 직접적 연관이 없습니다. \"주기 중반부터 GnRH antagonist를 투여한다\"는 LH surge 억제를 위한 방법이며, antagonist 사용 자체가 OHSS 위험을 낮출 수는 있으나 가장 중요하다고 보기는 어렵습니다. \"배아 이식 후 프로게스테론을 보충한다\"는 황체기 지지를 위한 것으로 OHSS와 무관합니다. \"과배란 유도 중 매일 초음파를 시행한다\"는 난포 성장 모니터링의 일부이나, 위험도 예측에는 환자 기저 특성이 더 중요합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "불임 환자의 난소 예비력(ovarian reserve)을 평가하는 지표 중 생리주기에 관계없이 가장 신뢰도가 높은 검사는 무엇인가?", "options": [{"letter": "A", "text": "동난포 수(AFC)"}, {"letter": "B", "text": "생리 3일차 estradiol"}, {"letter": "C", "text": "생리 3일차 FSH"}, {"letter": "D", "text": "clomiphene citrate challenge test (CCCT)"}, {"letter": "E", "text": "항뮬러관호르몬(AMH)"}], "answer": "E", "explanation": "AMH는 생리주기 전반에 걸쳐 비교적 일정한 농도를 유지하므로 주기 어느 날이든 측정할 수 있어 신뢰도가 높습니다. 생리 3일차 FSH와 estradiol은 검사 시기에 민감하고, FSH는 특히 주기 초기에만 정확도가 높습니다. CCCT는 clomiphene 투여 후 FSH 반응을 보는 예비력 검사이지만 상대적으로 민감도가 낮습니다. AFC는 초음파로 동난포를 세는 검사로 유용하지만 검사자 간 변이와 주기 의존성이 있으며, AMH보다 객관성이 떨어질 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "난소 예비력 평가를 위해 clomiphene citrate challenge test(CCCT)를 시행하였다. 생리 5일차부터 9일차까지 clomiphene 100 mg을 복용 후 10일차에 측정한 FSH가 25 mIU/mL로 상승한 35세 불임 환자에서 이 결과가 의미하는 것은 무엇인가?", "options": [{"letter": "A", "text": "체외수정 시 OHSS 위험이 높다."}, {"letter": "B", "text": "시상하부 기능 부전을 시사한다."}, {"letter": "C", "text": "불임의 원인이 남성 요인일 가능성이 높다."}, {"letter": "D", "text": "난소 예비력이 저하된 상태이다."}, {"letter": "E", "text": "다낭성난소증후군에 합당한 소견이다."}], "answer": "D", "explanati ide": 125}, {"question": "체외수정 후 황체기 보강(luteal phase support)으로 프로게스테론을 투여하는 주된 이유는 무엇인가?", "options": [{"letter": "A", "text": "배란 유도를 위해"}, {"letter": "B", "text": "체외수정 성공률을 높이기 위해 hCG의 효과를 대체하기 위해"}, {"letter": "C", "text": "난자 채취 시 소실된 granulosa cells로 인한 프로게스테론 결핍을 보충하기 위해"}, {"letter": "D", "text": "자궁내막의 탈락을 예방하기 위해"}, {"letter": "E", "text": "내인성 LH surge를 억제하기 위해"}], "answer": "C", "explanation": "난자 채취 과정에서 난포액을 흡인하면서 프로게스테론을 분비하는 granulosa cells가 함께 제거되므로, 이후 프로게스테론 분비가 급격히 감소하는 의인성 황체기 결함이 발생합니다. 이를 보충하여 정상적인 자궁내막 변화를 유지하고 착상 환경을 조성하기 위해 프로게스테론을 투여합니다. 자궁내막 탈락 예방은 궁극적 목적이지만, 직접적 원인에 대한 설명으로는 부족합니다. 배란 유도는 hCG나 GnRH agonist가 담당하며, LH surge 억제는 GnRH antagonist나 agonist의 역할입니다. 체외수정 성공률 향상은 결과이지 기전적 이유가 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "과배란 유도 중 난소과자극증후군(OHSS)이 심하게 발생할 위험이 높은 환자에서 가장 적절한 대처 방법은 무엇인가?", "options": [{"letter": "A", "text": "hCG 용량을 절반으로 줄여 난자 성숙을 유도한다."}, {"letter": "B", "text": "배아 이식을 예정대로 진행하되 프로게스테론을 증량한다."}, {"letter": "C", "text": "모든 배아를 동결 보존하고 추후 냉동 배아 이식을 시행한다."}, {"letter": "D", "text": "채취된 난자를 모두 폐기하고 주기를 취소한다."}, {"letter": "E", "text": "GnRH antagonist를 즉시 투여하여 LH surge를 유도한다."}], "answer": "C", "explanation": "심한 OHSS 위험이 있는 경우, 신선 배아 이식을 하면 임신에 의해 생성되는 내인성 hCG가 OHSS를 악화시킬 수 있습니다. 따라서 모든 배아를 동결(freeze-all)하고 추후 자연주기나 조절된 주기에 냉동 배아 이식을 시행하는 것이 안전합니다. hCG 용량을 줄이는 것은 효과가 불확실하고, 난자 폐기는 가임력 보존에 반합니다. 신선 이식을 강행하면 OHSS가 중증으로 악화될 수 있으며, 프로게스테론 증량은 OHSS 치료와 무관합니다. GnRH antagonist는 억제 효과가 있으며 이미 과배란 중에는 사용하지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "다낭성 난소 증후군(PCOS) 환자에서 과배란 유도를 위해 난소 예비력 평가 후 antral follicle count(AFC)가 한쪽 난소당 15개로 나타났다. 이때 가장 적절한 조치는?", "options": [{"letter": "A", "text": "즉시 체외수정 취소"}, {"letter": "B", "text": "난소 예비력이 좋으므로 아무 조치 필요 없음"}, {"letter": "C", "text": "저용량 FSH로 시작하며 난소 반응에 따라 조절"}, {"letter": "D", "text": "고용량 FSH로 난포 수 극대화"}, {"letter": "E", "text": "FSH 없이 hCG만 사용"}], "answer": "D", "explanation": "PCOS 환자는 antral follicle 수가 많아 난소과자극증후군(OHSS)의 고위험군이므로, 과배란 유도 시 저용량 FSH로 시작하여 난소 반응을 주의깊게 모니터링하며 조절하는 것이 중요하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 125}, {"question": "체외수정을 위한 GnRH agonist 장기요법(long protocol)의 주된 목적은 무엇인가?", "options": [{"letter": "A", "text": "내인성 LH surge를 억제하기 위해"}, {"letter": "B", "text": "자궁내막의 착상력을 높이기 위해"}, {"letter": "C", "text": "황체기 기능을 보강하기 위해"}, {"letter": "D", "text": "난포의 성장을 촉진하기 위해"}, {"letter": "E", "text": "난소 과자극증후군(OHSS)을 예방하기 위해"}], "answer": "A", "explanation": "GnRH agonist 장기요법은 뇌하수체의 GnRH 수용체를 지속적으로 자극하여 결국 탈감작(downregulation)을 유도함으로써 내인성 gonadotropin 분비를 억제합니다. 이로 인해 endogenous LH surge를 방지하여 과배란 유도 주기 중 조기 배란을 막고, follicular development를 완전히 외인성 gonadotropin으로 조절할 수 있습니다. 난포 성장 촉진은 FSH의 역할입니다. 자궁내막 착상력 향상은 주로 progesterone 보충으로 이루어집니다. 황체기 보강은 progesterone 투여가 주된 방법입니다. OHSS 예방은 GnRH agonist 프로토콜 사용 시에도 발생할 수 있으며, 용량 조절이 더 중요합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 126}, {"question": "임신 초기 초음파 검사에서 관찰되는 소견으로, 임신낭(gestational sac)의 가장자리에서 아기의 심장 박동이 반짝이듯 보이는 것을 무엇이라 하는가?", "options": [{"letter": "A", "text": "Double decidual sac sign"}, {"letter": "B", "text": "Chorionic bump sign"}, {"letter": "C", "text": "Yolk sac sign"}, {"letter": "D", "text": "Fetal pole sign"}, {"letter": "E", "text": "Diamond ring sign"}], "answer": "E", "explanation": "임신 5주경 질식 초음파에서 임신낭과 그 안의 난황낭, 그리고 심장 박동이 보이는 것을 다이아몬드 반지 모양에 비유하여 Diamond ring sign이라고 하며, 정상 임신을 확인하는 중요한 소견이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "포배(blastocyst)에서 미래의 태아로 발달하는 구조는?", "options": [{"letter": "A", "text": "영양막"}, {"letter": "B", "text": "난황낭"}, {"letter": "C", "text": "내세포덩어리"}, {"letter": "D", "text": "투명대"}, {"letter": "E", "text": "태반"}], "answer": "C", "explanation": "포배는 내세포덩어리(inner cell mass)와 영양막(trophoblast)으로 구성되며, 내세포덩어리는 태아로, 영양막은 태반으로 발달합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "체외 수정 후 자궁 내 임신과 난관 임신이 동시에 확인된 30세 여성의 적절한 치료 방침은?", "options": [{"letter": "A", "text": "MTX 전신 투여"}, {"letter": "B", "text": "난관 절제술 후 자궁 내 임신 유지"}, {"letter": "C", "text": "전자궁절제술"}, {"letter": "D", "text": "경과 관찰"}, {"letter": "E", "text": "자궁내막 소파술"}], "answer": "B", "explanation": "자궁 내외 동시 임신(heterotopic pregnancy)에서는 자궁 내 정상 임신을 유지하면서 자궁외 임신만 외과적으로 제거해야 한다. MTX는 자궁 내 태아에 유해하므로 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "과배란 유도 및 인공수정(IUI) 후 발생할 수 있는 주요 합병증으로, 난포 수가 많을 때 발생 위험이 높은 것은 무엇인가?", "options": [{"letter": "A", "text": "다태 임신"}, {"letter": "B", "text": "선천성 기형"}, {"letter": "C", "text": "자궁 파열"}, {"letter": "D", "text": "자궁외 임신"}, {"letter": "E", "text": "난소 과자극증후군(OHSS)"}], "answer": "A", "explanation": "과배란 유도를 통해 여러 개의 난포가 성장하면 배란 후 다수의 난자가 수정될 가능성이 높아져 다태 임신이 발생할 수 있습니다. 특히 IUI에서는 여러 난포가 동시에 배란되면 3등신, 4등신 임신도 생길 수 있어 주의가 필요합니다. OHSS는 주로 hCG 투여 후 모세혈관 투과성 증가로 발생하는 심각한 합병증으로, 다태 임신과는 별개입니다. 자궁외 임신은 나팔관 손상 등 위험 요인이 있을 때 발생할 수 있으나 과배란 유도와의 직접적 관련성은 상대적으로 낮습니다. 선천성 기형은 원인 불명인 경우가 많고, 자궁 파열은 매우 드뭅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "심한 정자 감소증(oligospermia) 환자에게 적용되는 미세조작술(micromanipulation)로, 하나의 정자를 난자 세포질 내에 직접 주입하는 시술은 무엇인가?", "options": [{"letter": "A", "text": "Gamete intrafallopian transfer (GIFT)"}, {"letter": "B", "text": "Zygote intrafallopian transfer (ZIFT)"}, {"letter": "C", "text": "Assisted hatching"}, {"letter": "D", "text": "Preimplantation genetic diagnosis (PGD)"}, {"letter": "E", "text": "Intracytoplasmic sperm injection (ICSI)"}], "answer": "E", "explanation": "ICSI는 하나의 정자를 난자에 직접 주입하여 수정시키는 방법으로, 정자 수가 매우 적거나 운동성이 저하된 남성 불임 환자에게 가장 효과적인 치료법입니다. Assisted hatching은 배아의 투명대를 레이저로 일부 절개하여 착상을 돕는 시술로 수정 과정과는 무관합니다. PGD는 착상 전 유전 진단으로 유전 질환을 선별하기 위해 배아에서 세포를 채취하는 방법입니다. GIFT와 ZIFT는 나팔관으로 생식세포나 접합자를 이식하는 시술로 현재 거의 사용되지 않으며, 정자 직접 주입과 다릅니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "부모 모두 특정 유전질환의 보인자인 불임 부부에게 체외수정 시술을 시행할 때, 이식할 배아를 선별하기 위해 사용할 수 있는 술기는 무엇인가?", "options": [{"letter": "A", "text": "Assisted hatching"}, {"letter": "B", "text": "Preimplantation genetic diagnosis (PGD)"}, {"letter": "C", "text": "Hysterosalpingography (HSG)"}, {"letter": "D", "text": "Intracytoplasmic sperm injection (ICSI)"}, {"letter": "E", "text": "Cryopreservation"}], "answer": "B", "explanation": "PGD는 배아를 착상 전에 유전자 검사하여 질환이 없는 배아만 이식함으로써 유전병을 가진 아이의 출생을 예방하는 방법입니다. 유전 질환 보인자 부부는 각각 변이 유전자를 가지고 있어 자연 임신 시 발현 가능성이 있으므로 PGD가 적응증입니다. Assisted hatching은 착상 보조술, ICSI는 남성 불임 치료, Cryopreservation은 동결 보존술입니다. HSG는 자궁난관 조영술로 진단 검사이며 유전 선별과 무관합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "체외수정 시술 후 발생할 수 있는 다음 중 자궁강 내 임신과 동시에 다른 부위에 착상된 임신을 의미하는 용어는?", "options": [{"letter": "A", "text": "난소과자극증후군"}, {"letter": "B", "text": "병합 임신 (heterotopic pregnancy)"}, {"letter": "C", "text": "자궁외 임신"}, {"letter": "D", "text": "다태 임신"}, {"letter": "E", "text": "경부 임신"}], "answer": "A", "explanation": "병합 임신(heterotopic pregnancy)은 정상 자궁 내 임신과 자궁외 임신이 동시에 존재하는 상태로, 보조생식술 후 발생률이 증가하는 심각한 합병증 중 하나이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "배아의 착상 과정을 돕기 위해, 레이저로 투명대(zona pellucida)를 일부 얇게 만들어 주는 미세조작술은?", "options": [{"letter": "A", "text": "착상 전 유전 진단 (PGD)"}, {"letter": "B", "text": "배아 이식"}, {"letter": "C", "text": "보조 부화 (assisted hatching)"}, {"letter": "D", "text": "세포질 내 정자 주입술 (ICSI)"}, {"letter": "E", "text": "배아 동결 보존"}], "answer": "A", "explanation": "보조 부화는 투명대가 비정상적으로 두꺼워져 착상이 어려울 것으로 예상되는 경우, 레이저를 이용하여 부분적으로 투명대를 얇게 만들어 배아가 탈출할 수 있도록 돕는 술기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 127}, {"question": "임신 반응 검사 양성인 30세 여성이 질출혈로 내원했다. 혈청 hCG는 2,800 IU/L이나 질식 초음파에서 자궁 내 임신낭이 관찰되지 않고 부속기 종괴도 없다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "정상 초기 자궁 내 임신"}, {"letter": "B", "text": "자궁외 임신 (Ectopic pregnancy)"}, {"letter": "C", "text": "계류유산 (Missed abortion)"}, {"letter": "D", "text": "포상기태 (Molar pregnancy)"}, {"letter": "E", "text": "난소 낭종"}], "answer": "B", "explanation": "hCG가 2,000-3,500 IU/L 이상일 때 정상 자궁 내 임신이라면 임신낭이 관찰되어야 한다. 자궁 내 임신낭이 보이지 않는 것은 자궁외 임신을 시사한다. 계류유산에서는 임신낭이 자궁 내 있으나 태아 심박동이 없을 수 있고, 포상기태는 특이적인 영상 소견을 보인다. 난소 낭종은 hCG 상승을 동반하지 않는다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "파열되지 않은 난관 임신 환자에서 methotrexate 약물 치료의 적응증이 되는 경우는?", "options": [{"letter": "A", "text": "중증 빈혈과 혈소판 감소증이 있는 경우"}, {"letter": "B", "text": "급성 골반통과 저혈압이 동반된 경우"}, {"letter": "C", "text": "혈청 hCG 1,200 IU/L, 부속기 종괴 2 cm, 심박동 없는 경우"}, {"letter": "D", "text": "혈청 hCG 8,000 IU/L, 임신낭 직경 50 mm"}, {"letter": "E", "text": "초음파상 태아 심박동이 있는 경우"}], "answer": "C", "explanation": "MTX 치료는 혈역학적으로 안정되고, hCG가 낮고(보통 5,000 미만), 임신낭 크기가 작으며, 태아 심박동이 없고, 추적 관찰이 가능한 환자에서 시행한다. hCG 8,000 IU/L 이상, 심박동 확인, 혈역학적 불안정, 중증 빈혈 및 혈소판 감소증은 금기이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "자궁외 임신이 의심되는 혈역학적으로 안정된 초기 임신 환자에서 진단적 자궁내막 소파술(D&C)을 시행하는 주된 목적은?", "options": [{"letter": "A", "text": "호르몬 치료 효과 증대"}, {"letter": "B", "text": "자궁내 임신 여부 확인"}, {"letter": "C", "text": "출혈량 감소"}, {"letter": "D", "text": "자궁내막 증식증의 치 : "B", "text": "50000 mIU/mL 이상"}, {"letter": "C", "text": "2000 mIU/mL 이상"}, {"letter": "D", "text": "10000 mIU/mL 이상"}, {"letter": "E", "text": "1000 mIU/mL 이상"}], "answer": "A", "explanation": "혈청 HCG가 5000 mIU/mL 이상이면 정상 자궁내임신의 경우 경질 초음파에서 gestational sac이 반드시 관찰되어야 한다. 이 역치를 discriminatory zone이라고 하며, HCG 5000 이상에서 sac이 보이지 않으면 자궁외임신이나 완전유산을 의심한다. 2000은 일부 문헌에서 보이지만, 본 강의에서는 5000을 기준으로 제시하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 129}, {"question": "다음 중 자궁내막 증식증 및 자궁내막암의 위험인자로 옳은 것은?", "options": [{"letter": "A", "text": "Tamoxifen 사용"}, {"letter": "B", "text": "저체중 (low body weight)"}, {"letter": "C", "text": "경구 피임제 복용"}, {"letter": "D", "text": "다산력 (multiparity)"}, {"letter": "E", "text": "조기 폐경 (early menopause)"}], "answer": "A", "explanation": "Tamoxifen 사용은 유방암 치료에 사용되는 선택적 에스트로겐 수용체 조절제로, 자궁내막에 에스트로겐 작용을 나타내어 증식증과 암의 위험을 증가시킵니다. 다산력이나 경구 피임제 복용은 배란 억제를 통해 오히려 보호 효과가 있습니다. 조기 폐경과 저체중은 에스트로겐 노출 감소와 관련되어 위험을 낮춥니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "2014년 WHO 분류에 따른 자궁내막 증식증의 분류에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "Atypia가 없는 hyperplasia는 암으로 진행될 가능성이 매우 높다."}, {"letter": "B", "text": "Atypia가 있는 hyperplasia는 EIN(Endometrial Intraepithelial Neoplasia)으로 불리며 전암병변이다."}, {"letter": "C", "text": "Simple hyperplasia with atypia는 예후가 가장 양호한 아형이다."}, {"letter": "D", "text": "2014년 분류는 simple/complex 구분을 그대로 유지하고 있다."}, {"letter": "E", "text": "Complex hyperplasia without atypia는 즉시 자궁절제술이 필요하다."}], "answer": "B", "explanation": "2014년 WHO 분류는 자궁내막 증식증을 비정형이 없는 경우(양성)와 비정형이 있는 경우(EIN/atypical hyperplasia)로 간소화했으며, 후자는 전암병변으로 암 진행 위험이 높습니다. 'Atypia가 없는 hyperplasia는 비종양성 변화로 간주되어 보존적 치료가 가능하고, 복합 비정형 증식증은 예후가 불량합니다. 이전 분류의 simple/complex는 더 이상 예후 판단의 주요 기준이 아닙니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "mesh isthmus)는 자궁체부(body)와 자궁경부(cervix) 사이의 좁아지는 부분으로, 임신 시 자궁하절이 형성되는 부위이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "에스트로겐 단독 지속 분비 시 발생할 수 있는 자궁내막 조직학적 변화는?", "options": [{"letter": "A", "text": "chronic endometritis"}, {"letter": "B", "text": "endometrial atrophy"}, {"letter": "C", "text": "endometrial hyperplasia"}, {"letter": "D", "text": "secretory change"}, {"letter": "E", "text": "stromal fibrosis"}], "answer": "C", "explanation": "estrogen이 progesterone의 상쇄 효과 없이 지속적으로 분비되면 자궁내막은 과도하게 증식하여 endometrial hyperplasia가 발생할 수 있습니다. secretory change는 progesterone 영향이며, atrophy는 호르몬 부족 시에 나타납니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "임신 6주에 난소의 종양으로 인해 수술이 필요한 산모에서, 유산 위험을 최소화하기 위해 수술을 연기해야 하는 적절한 시기는 언제인가?", "options": [{"letter": "A", "text": "임신 16주"}, {"letter": "B", "text": "임신 10~12주"}, {"letter": "C", "text": "임신 8주"}, {"letter": "D", "text": "임신 20주"}, {"letter": "E", "text": "분만 후"}], "answer": "B", "explanation": "임신 5주경까지는 황체가 프로게스테론을 분비하여 임신을 유지하지만, 이후 luteoplacental shift가 완료되어 태반이 임신 유지 역할을 대신하게 된다. 따라서 임신 6주의 난소 수술은 유산을 초래할 수 있으므로, luteoplacental shift가 완성되는 10~12주 이후로 수술을 연기해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "임신 6주 산모가 난소 낭종으로 인해 수술이 불가피하다면, 가장 적절한 수술 시기는?", "options": [{"letter": "A", "text": "약물 치료로 대체한다"}, {"letter": "B", "text": "임신 10-12주 이후로 연기한다"}, {"letter": "C", "text": "출산 후 수술한다"}, {"letter": "D", "text": "즉시 수술한다"}, {"letter": "E", "text": "임신 5주 이전에 수술한다"}], "answer": "B", "explanation": "임신 5주 이후에는 황체-태반 전환이 완성되어 태반이 주된 프로게스테론 공급원이 되므로, 그 이전에 난소를 제거하면 유산 위험이 있으나 10-12주 이후에는 난소 제거가 임신 유지에 영향을 미치지 않습니다. 따라서 수술이 필요한 경우, 전환이 완성되는 10-12주 이후로 연기하는 것이 안전합니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "불임을 주소로 내원한 여성의 자궁내막 조직검사에서 건락성 괴사와 다핵 거대세포를 동반한 육아종이 관찰되었다. 가장 의심되는 진단은?", "options": [{"letter": "A", "text": "자궁선근증"}, {"letter": "B", "text": "골반 결핵(pelvic tuberculosis)"}, {"letter": "C", "text": "자궁내막증"}, {"letter": "D", "text": "골반염증성질환(PID)"}, {"letter": "E", "text": "자궁경부암"}], "answer": "B", "explanation": "골반 결핵은 결핵균(Mycobacterium tuberculosis)에 의해 발생하며, 특징적인 조직 소견은 건락성 괴사를 동반한 육아종과 Langhans 거대세포입니다. 강의에서도 'granuloma와 giant cell이 보이면 결핵을 진단'한다고 하였습니다. PID는 중성구 침윤이 주이며, 자궁내막증은 내막선과 기질이 보입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "FIGO의 PALM-COEIN 분류에서 구조적 이상(PALM)에 해당하는 것은?", "options": [{"letter": "A", "text": "응고장애 (Coagulopathy)"}, {"letter": "B", "text": "아직 분류되지 않은 경우 (Not yet classified)"}, {"letter": "C", "text": "의인성 원인 (Iatrogenic)"}, {"letter": "D", "text": "배란장애 (Ovulatory dysfunction)"}, {"letter": "E", "text": "자궁내막 폴립 (Endometrial polyp)"}], "answer": "E", "explanation": "PALM은 구조적 원인으로 Polyp(용종), Adenomyosis(선근증), Leiomyoma(근종), Malignancy(악성)을 포함한다. 응고장애, 배란장애, 의인성 원인, 미분류는 모두 COEIN에 해당하는 비구조적 원인이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "청소년기 비정상 자궁출혈의 가장 흔한 원인은?", "options": [{"letter": "A", "text": "응고장애 (Coagulopathy)"}, {"letter": "B", "text": "다낭성 난소 증후군 (Polycystic ovary syndrome)"}, {"letter": "C", "text": "자궁내막 증식증 (Endometrial hyperplasia)"}, {"letter": "D", "text": "무배란 (Anovulation)"}, {"letter": "E", "text": "자궁근종 (Uterine fibroids)"}], "answer": "D", "explanation": "청소년기에는 시상하부-뇌하수체-난소축이 미성숙하여 무배란성 출혈이 가장 흔하다. 응고장애는 약 10%에서 발견되지만 가장 흔한 원인은 아니다. 자궁내막 증식증이나 근종은 이 연령대에서 드물다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "6세 여아가 질출혈을 주소로 내원했다. 가장 적절한 평가 방법은?", "options": [{"letter": "A", "text": "혈청 CA-125 측정"}, {"letter": "B", "text": "복부 CT"}, {"letter": "C", "text": "골반 MRI"}, {"letter": "D", "text": "자궁내막 생검"}, {"letter": "E", "text": "마취하 진찰 및 질내시경 (Vaginoscopy) 시행"}], "answer": "E", "explanation": "사춘기 이전 여아의 질출혈은 이물질, 외상, 질염, 성조숙증 등이 원인일 수 있으며, 외진이 어려운 경우 전신마취하 검진과 질내시경이 필요하다. MRI, CT는 일차적 검사로 권장되지 않으며, 자궁내막 생검이나 CA-125는 적절하지 않다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "28세 여성이 불규칙한 질출혈로 내원했다. 병력과 상관없이 가장 먼저 시행해야 하는 검사는?", "options": [{"letter": "A", "text": "자궁내막 생검"}, {"letter": "B", "text": "갑상선 기능 검사"}, {"letter": "C", "text": "소변 임신 반응 검사"}, {"letter": "D", "text": "질식 초음파"}, {"letter": "E", "text": "응고 검사 (Coagulation profile)"}], "answer": "C", "explanation": "가임기 여성의 비정상 자궁출혈에서는 반드시 임신 여부를 확인한다. 임신이 확인되지 않은 상태에서 초음파나 자궁내막 생검을 시행할 수 있지만, 임신 가능성을 배제하기 위해 가장 먼저 hCG 검사를 시행해야 한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "72세 폐경 후 여성이 간헐적 질출혈을 호소한다. 질식 초음파에서 자궁내막 두께가 8 mm이다. 가장 적절한 다음 조치는?", "options": [{"letter": "A", "text": "호르몬 대체 요법 시작"}, {"letter": "B", "text": "자궁내막 생검 시행"}, {"letter": "C", "text": "3개월 후 초음파 재검사"}, {"letter": "D", "text": "Tranexamic acid 처방"}, {"letter": "E", "text": "자궁절제술 의뢰"}], "answer": "B", "explanation": "폐경 후 출혈에서 자궁내막 두께가 6 mm 이상이면 자궁내막 증식증 또는 암의 위험이 있으므로 조직검사가 필요하다. 초음파 추적만으로는 충분하지 않으며, 호르몬 요법이나 지혈제는 원인 확인 전에 사용하지 않는다. 자궁절제술은 조직검사 결과 악성 등이 확인된 후 결정한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁외 임신에서 착상이 가장 흔히 발생하는 부위는?", "options": [{"letter": "A", "text": "난소"}, {"letter": "B", "text": "자궁경부"}, {"letter": "C", "text": "복강"}, {"letter": "D", "text": "자궁각 (Cornual region)"}, {"letter": "E", "text": "난관 팽대부 (Ampulla)"}], "answer": "E", "explanation": "난관 임신이 전체의 약 95%를 차지하며, 그 중 팽대부가 70%로 가장 흔하다. 난소, 자궁각, 자궁경부, 복강 임신은 모두 드물다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "45세 여성이 생리과다로 내원하여 식염수 주입 초음파를 시행한 결과 자궁강 내에 국한된 동글동글한 충만 결손이 관찰된다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "자궁근종 (Leiomyoma)"}, {"letter": "B", "text": "자궁내막암 (Endometrial cancer)"}, {"letter": "C", "text": "자궁내막 증식증 (Endometrial hyperplasia)"}, {"letter": "D", "text": "자궁선근증 (Adenomyosis)"}, {"letter": "E", "text": "자궁내막 폴립 (Endometrial polyp)"}], "answer": "E", "explanation": "식염수 주입 초음파에서 자궁강 내에 떠 있는 국소적 충만 결손은 전형적인 폴립 소견이다. 선근증은 근층 내 불균질 에코, 근종은 근층에서 기원하는 종괴, 증식증이나 암은 미만성 비후나 불균일한 내막으로 나타난다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "15세 여아가 반복적인 생리과다로 내원하였다. 무배란 출혈 외에 반드시 확인해야 할 검사는?", "options": [{"letter": "A", "text": "응고 인자 검사"}, {"letter": "B", "text": "소변 배양 검사"}, {"letter": "C", "text": "자궁내막 생검"}, {"letter": "D", "text": "혈청 프로게스테론 검사"}, {"letter": "E", "text": "갑상선 기능 검사"}], "answer": "A", "explanation": "청소년기 비정상 자궁출혈의 가장 흔한 원인은 무배란성 출혈이지만, 응고장애가 이 시기에 호발하며 과다 월경 환자의 약 10%에서 발견됩니다. 따라서 과다 월경이 반복되는 청소년에서는 응고 인자 검사가 필수적입니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "65세 폐경 여성이 간헐적 질출혈을 호소한다. 질식 초음파에서 자궁내막 두께가 3mm로 얇고, 기타 자궁 내 병변은 보이지 않는다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "자궁내막증식증"}, {"letter": "B", "text": "자궁경부암"}, {"letter": "C", "text": "자궁내막용종"}, {"letter": "D", "text": "위축성 질염"}, {"letter": "E", "text": "자궁근종"}], "answer": "D", "explanation": "폐경 후 질출혈의 약 30%는 에스트로겐 저하로 인한 위축성 질염에 의한 것으로, 자궁내막이 얇고 다른 병변이 없을 때 의심할 수 있습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "5세 여아가 질출혈로 내원하였다. 외상 병력은 부인하며, 외음부 진찰에서 명확한 손상은 보이지 않는다. 가장 중요하게 고려해야 할 원인은?", nType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "27세 여성이 외음부에 여러 개의 사마귀 모양 병변으로 내원하였다. 조직 검사에서 인유두종바이러스(HPV) 6번 형이 확인되었다. 이 환자에게 시행할 수 있는 치료 중 태아에 대한 안전성으로 인해 임신 중에도 사용 가능한 약제는?", "options": [{"letter": "A", "text": "Podophyllin 크림"}, {"letter": "B", "text": "Imiquimod 크림"}, {"letter": "C", "text": "Trichloroacetic acid (TCA)"}, {"letter": "D", "text": "인터페론 연고"}, {"letter": "E", "text": "5-Fluorouracil 크림"}], "answer": "C", "explanation": "콘딜로마(생식기 사마귀)의 치료로 냉동치료(Cryotherapy), Trichloroacetic acid(TCA) 국소 도포, Imiquimod, Podophyllin 등이 사용되지만, 임신 중에는 TCA가 가장 안전하게 권장됩니다. Podophyllin과 Imiquimod는 임신 중 안전성이 확립되지 않아 사용을 피하며, 인터페론과 5-Fluorouracil도 임신 중에는 권장되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁선근증과 자궁근종을 감별하는 특징으로 옳은 것은?", "options": [{"letter": "A", "text": "자궁선근증은 뚜렷한 결절이 없고 자궁이 고정되지 않는다."}, {"letter": "B", "text": "자궁선근증은 뚜렷한 결절이 촉지된다."}, {"letter": "C", "text": "자궁선근증은 자궁이 고정되어 만져지지 않는다."}, {"letter": "D", "text": "자궁근종은 자궁압통이 없는 것이 특징이다."}, {"letter": "E", "text": "자궁근종은 자궁이 후굴되어 있다."}], "answer": "A", "explanation": "강의에 따르면 자궁선근증은 자궁이 커지고 압통이 있으나, 완전히 고정된 형태가 아니고 뚜렷한 결절이 없다는 점이 자궁근종과의 차이점이다. 자궁근종은 종괴가 만져질 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "Endometriosis의 정의와 조직학적 소견으로 옳은 것은?", "options": [{"letter": "A", "text": "Endometrial hyperplasia와 동일한 질환이다."}, {"letter": "B", "text": "자궁근층 내에 endometrial gland와 stroma가 존재한다."}, {"letter": "C", "text": "자궁 외부에 endometrial gland와 stroma가 존재한다."}, {"letter": "D", "text": "폐경 이후에 가장 호발한다."}, {"letter": "E", "text": "난소의 표층 상피에서만 발생한다."}], "answer": "C", "explanation": "Endometriosis는 자궁 외부에 endometrial gland와 stroma가 존재하는 질환으로 정의됩니다. '자궁근층 내에 존재'하는 것은 adenomyosis입니다. Endometrial hyperplasia는 자궁내막의 비정상 증식으로 endometriosis와 다릅니다. 난소는 가장 흔한 발생 부위이지만, 다른 장기에도 생길 수 있고 '난소에서만 발생'한다는 설 ons": [{"letter": "A", "text": "자궁근종"}, {"letter": "B", "text": "자궁경부암"}, {"letter": "C", "text": "자궁선근증"}, {"letter": "D", "text": "다낭성 난소 증후군"}, {"letter": "E", "text": "조기 난소 부전"}], "answer": "E", "explanation": "강의에서 자궁내막증 수술, 특히 난소의 자궁내막종 제거 시 정상 난소 조직이 같이 손상되어 난소 예비능이 급감할 수 있으며, 반복 수술은 누적 손상을 일으켜 젊은 나이에도 난소 기능이 폐경 수준으로 떨어질 수 있다고 경고하였다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "불임 환자의 자궁내시경(hysteroscopy)에서 자궁강 내로 돌출된 점막하 근종(submucosal myoma)이 발견되었다. 임신율 향상을 위한 가장 적절한 처치는 무엇인가?", "options": [{"letter": "A", "text": "복강경 근종 절제술을 시행한다."}, {"letter": "B", "text": "GnRH agonist로 근종 크기를 줄인 후 체외수정을 시행한다."}, {"letter": "C", "text": "hysteroscopic myomectomy를 시행한다."}, {"letter": "D", "text": "근종 절제술(myomectomy) 없이 체외수정을 시행한다."}, {"letter": "E", "text": "자궁동맥색전술(UAE)을 시행한다."}], "answer": "C", "explanation": "점막하 근종은 자궁강을 변형시켜 착상률을 저하시키므로, 임신율을 높이기 위해서는 hysteroscopic myomectomy를 통해 완전히 제거하는 것이 가장 효과적입니다. 강의에서도 submucosal myoma 제거 시 임신율이 50% 향상된다고 언급하였습니다. 근종 절제 없이 체외수정을 바로 하는 것은 착상 실패의 원인이 될 수 있습니다. GnRH agonist는 근종 크기를 일시적으로 줄일 수 있으나 완전 제거가 아니며 효과가 제한적입니다. 복강경 근종 절제술은 장막하 또는 근층내 근종에 적용되며, 점막하 근종은 자궁내시경으로 접근하는 것이 표준입니다. UAE는 주로 증상이 있는 근종에 시행하며, 가임력 보존 환자에게는 일반적으로 권고되지 않습니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "35세 여성이 심한 월경통과 불임을 호소한다. 초음파에서 자궁이 미만성으로 커져 있고 자궁근층이 불규칙하게 두꺼워져 있다. 점막하 근종과 감별해야 할 이 질환은?", "options": [{"letter": "A", "text": "자궁내막 용종"}, {"letter": "B", "text": "자궁경부 협착"}, {"letter": "C", "text": "자궁내막증"}, {"letter": "D", "text": "자궁선근증"}, {"letter": "E", "text": "골반염증성 질환"}], "answer": "C", "explanation": "자궁선근증(adenomyosis)은 자궁근층 내에 자궁내막 조직이 존재하여 자궁이 비대되고 출혈과 통증을 유발하며, 난임의 원인이 될 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁평활근종 (uterine leiomyoma)의 역학에 대한 설명으로 옳은 것은?", "options": [{"letter": "A", "text": "아시아 여성에서 흑인보다 유병률이 높다."}, {"letter": "B", "text": "폐경 후 크기가 증가하는 경향을 보인다."}, {"letter": "C", "text": "흡연은 중요한 위험 인자이다."}, {"letter": "D", "text": "사춘기 이전에 가장 호발한다."}, {"letter": "E", "text": "35세 이상 여성의 약 40~50%에서 발견된다."}], "answer": "E", "explanation": "자궁근종은 사춘기 이후, 특히 가임기 여성에서 발생하는 가장 흔한 양성종양이다. 35세 이상에서는 40-50%의 유병률을 보이며, 흑인에서 특히 많다. 에스트로겐 의존성으로 폐경 후에는 크기가 감소한다. 흡연은 위험을 감소시킨다는 보고도 있으나 확립된 것은 아니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종의 발생 위험을 감소시키는 요인은 무엇인가?", "options": [{"letter": "A", "text": "비만"}, {"letter": "B", "text": "출산력 (다산력)"}, {"letter": "C", "text": "고령의 미산부"}, {"letter": "D", "text": "초경 연령이 빠른 경우"}, {"letter": "E", "text": "자궁근종 가족력"}], "answer": "B", "explanation": "출산력(multiparity)은 자궁근종의 위험을 낮추는 것으로 알려져 있다. 반대로 초경이 빠르거나, 비만, 가족력이 있으면 위험이 증가한다. 고령 및 미산부는 상대적으로 근종 노출 기간이 길어 위험 인자가 된다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "FIGO 분류에 따르면, 유경성 장막하근종 (pedunculated subserosal myoma)은 어느 유형에 해당하는가?", "options": [{"letter": "A", "text": "Type 0"}, {"letter": "B", "text": "Type 6"}, {"letter": "C", "text": "Type 5"}, {"letter": "D", "text": "Type 7"}, {"letter": "E", "text": "Type 2"}], "answer": "D", "explanation": "FIGO 분류상 Type 7은 유경성 장막하근종이다. Type 0은 유경성 점막하근종, Type 1은 50% 미만이 근층에 잠긴 점막하근종, Type 2는 50% 이상이 근층에 잠긴 점막하근종, Type 3과 4는 근층내근종, Type 5와 6은 장막하근종의 근층 침범 정도에 따른 분류이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "점막하 근종이 자궁내강으로 돌출된 정도를 평가하는 데 가장 유용한 영상 검사는?", "options": [{"letter": "A", "text": "자궁경 (Hysteroscopy)"}, {"letter": "B", "text": "경질 초음파 (Transvaginal ultrasound)"}, {"letter": "C", "text": "식염수 주입 초음파 (Saline infusion sonography, SIS)"}, {"letter": "D", "text": "CT"}, {"letter": "E", "text": "MRI"}], "answer": "C", "explanation": "SIS는 자궁내강에 식염수를 주입하여 근종 주위를 채움으로써 근종의 자궁내강 돌출 비율을 시각화할 수 있다. 경질 초음파는 개괄적 평가에 유용하지만 정확한 돌출 정도 측정에는 SIS가 더 우수하다. MRI는 전체 근종 분포를 보는 데 좋지만 침습도가 낮은 SIS가 먼저 시도될 수 있다. 자궁경은 직접 관찰이 가능하지만 침습적이며 돌출 정도를 정량화하기 어렵다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종 치료를 위해 GnRH agonist를 투여받는 환자에게 초기에 나타날 수 있는 효과에 대해 올바르게 설명한 것은?", "options": [{"letter": "A", "text": "골밀도를 증가시킨다."}, {"letter": "B", "text": "영구적인 난소 기능 소실을 초래한다."}, {"letter": "C", "text": "즉시 폐경 수준의 에스트로겐 억제를 유도한다."}, {"letter": "D", "text": "자궁근종 세포의 직접적인 세포자멸사를 유도한다."}, {"letter": "E", "text": "FSH/LH 분비의 일시적 증가 (flare-up)를 유발할 수 있다."}], "answer": "E", "explanation": "GnRH agonist는 투약 초기 1-2주간 gonadotropin 분비를 오히려 자극하는 flare-up 현상이 나타날 수 있으며, 이로 인해 배란이 일어나 임신될 가능성이 있으므로 환자에게 주의가 필요하다. 이후 down-regulation으로 에스트로겐이 억제되나 이는 일시적이며, 장기 사용 시 골밀도 감소 등의 부작용이 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종에 동반된 월경과다를 보이는 42세 여성이 비수술적 치료를 원할 때, 내막을 위축시켜 출혈을 감소시키는 가장 적절한 치료는?", "options": [{"letter": "A", "text": "NSAIDs"}, {"letter": "B", "text": "GnRH agonist"}, {"letter": "C", "text": "경구 피임약"}, {"letter": "D", "text": "자궁동맥 색전술 (UAE)"}, {"letter": "E", "text": "Levonorgestrel 분비 자궁내 장치 (LNG-IUS)"}], "answer": "E", "explanation": "LNG-IUS (Mirena)는 자궁내에서 levonorgestrel을 지속적으로 방출하여 프로게스틴 효과로 자궁내막을 위축시킨다. 이로 인해 월경량이 현저히 줄어든다. NSAIDs는 약 30% 정도의 출혈 감소 효과가 있고 통증 조절에 유효하지만 LNG-IUS보다 출혈 감소 효과는 적다. GnRH agonist는 일시적 사용만 가능하고, UAE는 임신 희망 시 권장되지 않는 침습적 시술이다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "48세 여성이 기지의 5cm 자궁근종에 대한 추적 관찰 중 1년 만에 10cm으로 급격히 커졌다. 생식 능력을 보존할 필요가 없는 이 환자에게 가장 적절한 처치는?", "options": [{"letter": "A", "text": "MRI 추적 관찰"}, {"letter": "B", "text": "HIFU (고강도 집속 초음파)"}, {"letter": "C", "text": "자궁적출술 (Hysterectomy)"}, {"letter": "D", "text": "GnRH agonist 투여 후 재평가"}, {"letter": "E", "text": "주기적 경질 초음파"}], "answer": "C", "explanation": "자궁근종의 급격한 성장은 평활근육종(leiomyosarcoma)의 가능성을 의심하게 한다. 폐경 전후 연령에서 생식 보존이 필요 없다면 악성 가능성을 배제하기 위해 자궁적출술이 표준 치료이다. 약물 치료나 HIFU 등은 근종 크기를 일시적으로 줄일 수 있으나 악성 종양을 완전히 제거하지 못하고 조직학적 진단을 지연시킬 수 있다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "35세 여성이 다발성 자궁근종으로 인한 월경과다를 호소하며 향후 임신 계획이 있다. 이 환자에게 피해야 할 치료는 무엇인가?", "options": [{"letter": "A", "text": "경구 피임약"}, {"letter": "B", "text": "GnRH agonist 전처치"}, {"letter": "C", "text": "자궁동맥 색전술 (UAE)"}, {"letter": "D", "text": "LNG-IUS"}, {"letter": "E", "text": "근종절제술 (Myomectomy)"}], "answer": "C", "explanation": "UAE는 자궁으로 가는 혈류를 차단하여 근종을 수축시키지만, 자궁 전체와 내막에도 영향을 주어 괴사, 염증, 난소 기능 저하 등을 초래할 수 있어 임신을 원하는 여성에게는 권장되지 않는다. 근종절제술은 임신 희망 환자에서 우선되는 수술적 옵션이다. GnRH agonist는 일시적으로 사용할 수 있고, LNG-IUS는 피임 목적으로 사용되나 제거 후 임신 가능하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "38세 여성이 진행성 월경통, 월경과다, 그리고 심부 성교통을 호소한다. 골반 진찰에서 자궁은 미만성으로 커져 있고 압통이 있으며, 분리된 종괴는 촉지되지 않는다. 가장 가능성 높은 진단은?", "options": [{"letter": "A", "text": "난소낭종 (Ovarian cyst)"}, {"letter": "B", "text": "자궁근종 (Leiomyoma)"}, {"letter": "C", "text": "자궁내막용종 (Endometrial polyp)"}, {"letter": "D", "text": "자궁선근증 (Adenomyosis)"}, {"letter": "E", "text": "자궁내막증 (Endometriosis)"}], "answer": "D", "explanation": "자궁선근증의 특징적인 소견은 미만성으로 비대하고 압통이 있는 자궁이며, 점차 악화되는 월경통과 월경과다, 성교통이 동반된다. 자궁근종은 보통 불규칙하고 단단한 덩어리로 만져진다. 자궁내막증은 골반 전반의 유착과 압통을 보일 수 있으나 자궁 자체가 미만성으로 커지는 경우는 드물다. 용종은 특정 종괴로 관찰되며, 난소 낭종은 부속기에서 만져진다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "45세 여성이 출산 계획이 없으며, 심한 월경통과 빈혈을 동반한 월경과다로 약물 치료에 반응하지 않는 자궁선근증으로 진단되었다. 가장 효과적인 근본적 치료는?", "options": [{"letter": "A", "text": "자궁동맥 색전술 (UAE)"}, {"letter": "B", "text": "자궁적출술 (Hysterectomy)"}, {"letter": "C", "text": "Levonorgestrel IUS"}, {"letter": "D", "text": "GnRH agonist 장기 투여"}, {"letter": "E", "text": "NSAIDs 및 경구 피임약"}], "answer": "B", "explanation": "약물치료에 반응하지 않는 심한 증상의 자궁선근증에서 자궁적출술은 병변을 완전히 제거하는 유일한 방법이다. UAE, HIFU, 자궁내막소작술 등은 보존적 치료이나 효과가 일시적이고 완전하지 않다. GnRH agonist는 장기 사용이 불가하며 중단 시 재발한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁선근증이 의심되는 환자의 경질 초음파 소견으로 가장 특징적인 것은?", "options": [{"letter": "A", "text": "미만성 자궁비대와 근층 내 낭포"}, {"letter": "B", "text": "자궁내막강 내 유경성 종괴"}, {"letter": "C", "text": "복합성 난소 낭종과 격벽"}, {"letter": "D", "text": "근층의 비대칭적 비후와 경계 불분명"}, {"letter": "E", "text": "명확한 경계를 가진 저에코 종괴"}], "answer": "D", "explanation": "자궁선근증은 초음파에서 근층의 비대칭적 비후(주로 후벽), 경계가 불분명한 에코 변화, 근층 내 작은 낭포, 그리고 junctional zone의 소실 또는 불규칙성 등을 보인다. 자궁근종은 명확한 경계의 결절로 나타나며, 유경성 종괴는 점막하근종이나 용종, 복합성 낭종은 난소 병변을 시사한다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "이중합진 (bimanual pelvic examination)에서 자궁근종과 자궁선근증을 감별하는 데 가장 도움이 되는 소견은?", "options": [{"letter": "A", "text": "분리된 단단한 결절성 종괴 대 미만성 확대"}, {"letter": "B", "text": "부속기 압통"}, {"letter": "C", "text": "자궁경부 움직임 시 압통"}, {"letter": "D", "text": "자궁의 가동성 (mobility)"}, {"letter": "E", "text": "자궁의 크기"}], "answer": "A", "explanation": "자궁근종은 촉진 시 단단하고 분리된 결절들이 불규칙하게 만져지는 반면, 자궁선근증은 자궁 전체가 미만성으로 확대되고 압통을 동반하는 부드러운 확대가 특징이다. 자궁의 크기나 가동성만으로는 감별이 어렵고, 자궁경부 압통이나 부속기 압통은 감염이나 자궁내막증 등에서 더 흔하다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종으로 인한 월경통과 월경과다를 호소하는 환자에게 약물 치료로 가장 우선적으로 권할 수 있는 약제는 무엇인가?", "options": [{"letter": "A", "text": "Mifepristone"}, {"letter": "B", "text": "경구피임약"}, {"letter": "C", "text": "GnRH agonist"}, {"letter": "D", "text": "Levonorgestrel IUS"}, {"letter": "E", "text": "NSAIDs"}], "answer": "E", "explanation": "NSAIDs are effective for pain and can reduce menstrual bleeding by about 30%, making them a first-line medical option for symptomatic uterine myoma.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "45세 여성이 점막하 근종으로 인한 월경과다로 내원하였다. 자궁근종 이외에 다른 초음파 이상은 없으나, 지속적인 이상 출혈이 있다. 다음 중 이 환자에게 시행해야 할 필수 검사는?", "options": [{"letter": "A", "text": "Endometrial curettage"}, {"letter": "B", "text": "Sonohysterography"}, {"letter": "C", "text": "Laparoscopy"}, {"letter": "D", "text": "MRI"}, {"letter": "E", "text": "Hysteroscopy"}], "answer": "A", "explanation": "In any woman with abnormal uterine bleeding, even with known myoma, endometrial sampling (curettage) is necessary to rule out endometrial hyperplasia or cancer. Myoma alone does not exclude other causes.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "GnRH agonist의 자궁근종 치료 목적으로 가장 적절한 경우는?", "options": [{"letter": "A", "text": "폐경을 유도하여 근종 제거"}, {"letter": "B", "text": "임신을 원하는 환자의 근종 크기 감소"}, {"letter": "C", "text": "수술 전 근종 크기 감소"}, {"letter": "D", "text": "장기간 투여로 근종 완치"}, {"letter": "E", "text": "급성 통증 조절"}], "answer": "C", "explanation": "GnRH agonist induces hypoestrogenism, shrinking myomas and correcting anemia preoperatively. It is not curative nor for acute pain; long-term use is limited due to bone loss, and while it may reduce myoma size, it is not primarily indicated solely for fertility planning without other surgical intent.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "자궁근종 진단을 위한 MRI 촬영이 일차적으로 고려되는 경우는?", "options": [{"letter": "A", "text": "자궁근종의 첫 진단 시"}, {"letter": "B", "text": "성 경험이 없어 질초음파가 어려운 환자의 수술 전 평가"}, {"letter": "C", "text": "월경과다가 심한 청소년 환자"}, {"letter": "D", "text": "급성 복통 환자"}, {"letter": "E", "text": "임신 중 근종 확인"}], "answer": "B", "explanation": "MRI provides high-resolution imaging for precise mapping and is particularly useful when transvaginal ultrasound is not feasible, such as in patients without sexual contact. It is not first-line for initial diagnosis in most cases.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "출산 계획이 있는 35세 자궁선근증 환자에게 시행할 수 있는 적절한 치료는?", "options": [{"letter": "A", "text": "자궁내막소작술"}, {"letter": "B", "text": "자궁적출술"}, {"letter": "C", "text": "자궁동맥색전술"}, {"letter": "D", "text": "HIFU"}, {"letter": "E", "text": "GnRH agonist"}], "answer": "E", "explanation": "For fertility preservation in adenomyosis, medical therapy with GnRH agonist can suppress symptoms and potentially improve fertility. Hysterectomy is not an option; UAE, endometrial ablation, and HIFU are not recommended for women desiring pregnancy.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 130}, {"question": "외음부 파제트병(Paget's disease)의 특징적인 병리 소견은?", "options": [{"letter": "A", "text": "편평 상피 진주(squamous pearl)"}, {"letter": "B", "text": "파제트 세포(Paget cell)"}, {"letter": "C", "text": "코일로사이트(koilocyte)"}, {"letter": "D", "text": "리드-스턴버그 세포(Reed-Sternberg cell)"}, {"letter": "E", "text": "아스코프 세포(Aschoff cell)"}], "answer": "B", "explanation": "파제트병의 특징적 소견은 조직검사에서 파제트 세포(Paget cell)가 관찰되는 것입니다. 코일로사이트는 HPV 감염, 편평 상피 진주는 편평세포암, 리드-스턴버그 세포는 호지킨 림프종, 아스코프 세포는 류마티스 질환과 관련됩니다.", "chunkTranscript": "", "setName": "REI", "fileName": "", "questionType": "conventional", "meshPath": "", "matchedSlide": 134}, {"question": "외음부 파제트병의 최적 치료 방법은?", "options": [{"letter": "A", "text": "레이저 치료"}, {"letter": "B", "text": "이미퀴모드(imiquimod) 국소 도포"}, {"letter": "C", "text": "경과 관찰"}, {"letter": "D", "text": "근치적 음
